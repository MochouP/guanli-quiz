案，并附具安全验算结果，经施工单位技术负责人、总监理工程师签字后实施，由专职安全生产管理人员进行现场监督。"}, {"id": 940, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "进出建筑物主体通道口应搭设防护棚。棚宽大于道口，两端各长出1m，进深尺寸应符合高处作业安全防护范围。当坠落物高度为2～5m时，坠落半径R为（　　）m。", "opts": ["3", "4", "5", "6"], "ans": [0], "exp": "进出建筑物主体通道口应搭设防护棚。棚宽大于道口，两端各长出1m，进深尺寸应符合高处作业安全防护范围。坠落半径（R）分别为：当坠落物高度为2～5m时，R为3m；当坠落物高度为5～15m时，R为4m；当坠落物高度为15～30m时，R为5m；当坠落物高度大于30m时，R为6m。"}, {"id": 941, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "操作平台临边应设置防护栏杆，单独设置的操作平台应设置供人上下、踏步间距不大于（　　）mm的扶梯。", "opts": ["100", "200", "300", "400"], "ans": [3], "exp": "操作平台临边应设置防护栏杆，单独设置的操作平台应设置供人上下、踏步间距不大于400mm的扶梯。"}, {"id": 942, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "防护栏杆应为两道横杆，上杆距地面高度应为（　　）m，下杆应在上杆和挡脚板中间设置。", "opts": ["1", "1.2", "1.5", "2"], "ans": [1], "exp": "防护栏杆应为两道横杆，上杆距地面高度应为1.2m，下杆应在上杆和挡脚板中间设置。"}, {"id": 943, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "挡脚板高度不应小于（　　）mm。", "opts": ["150", "160", "170", "180"], "ans": [3], "exp": "挡脚板高度不应小于180mm。"}, {"id": 944, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "以下关于配供电系统说法错误的是（　　）。", "opts": ["工作接零与保护接地不允许混接", "灯具距地面高度不小于2m", "生活区民工住宿达不到标准的必须使用36V安全电压", "在整改过程中必须两人进行，应关闭上级开关方可作业，一人操作、一人监护"], "ans": [1], "exp": "按规范设置配供电系统。施工现场临时用电必须执行相关标准，线路采用TN-S系统，现场用电必须使用便桥标准闸箱，执行“三级控制、两极保护”“一机、一闸、一漏、一箱”，工作接零与保护接地不允许混接，现场机具设备进场前必须进行验收，验收合格后方可使用。现场照明要和动力照明分开，现场移动式灯具采用便桥防水灯具，设备外皮做好保护接地，灯具距地面高度不小于3m，生活区民工住宿达不到标准的必须使用36V安全电压；在整改过程中必须两人进行，应关闭上级开关方可作业，一人操作、一人监护，现场不得带电作业，并做好记录等。"}, {"id": 945, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "下列关于设置消防扑救通道的说法，错误的是（　　）。", "opts": ["施工现场出入口的设置应满足消防车通行的要求，并宜布置在不同方向，其数量不宜少于2个", "当确有困难只能设置1个出入口时，应在施工现场内设置满足消防车通行的环形道路", "施工现场内应设置临时消防车道，临时消防车道与在建工程、临时用房、可燃材料堆场及其加工场的距离，不宜小于5m，且不宜大于30m", "施工现场周边道路满足消防车通行及灭火救援要求时，施工现场内可不设置临时消防车道"], "ans": [2], "exp": "合理设置消防扑救通道。施工现场出入口的设置应满足消防车通行的要求，并宜布置在不同方向，其数量不宜少于2个。当确有困难只能设置1个出入口时，应在施工现场内设置满足消防车通行的环形道路。施工现场内应设置临时消防车道，临时消防车道与在建工程、临时用房、可燃材料堆场及其加工场的距离，不宜小于5m，且不宜大于40m；施工现场周边道路满足消防车通行及灭火救援要求时，施工现场内可不设置临时消防车道。"}, {"id": 946, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "其他临时用房、临时设施与在建工程的防火间距不应小于（　　）m。", "opts": ["6", "10", "15", "20"], "ans": [0], "exp": "其他临时用房、临时设施与在建工程的防火间距不应小于6m。"}, {"id": 947, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "坠落高度基准面（　　）m及以上进行临边作业时，应在临空一侧设置防护栏杆，并应采用密目式安全立网或工具式栏板封闭。", "opts": ["0.5", "1", "1.5", "2"], "ans": [3], "exp": "距坠落高度基准面2m及以上进行临边作业时，应在临空一侧设置防护栏杆，并应采用密目式安全立网或工具式栏板封闭。"}, {"id": 948, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "某竖向洞口短边边长为1000mm，应采取的洞口作业防坠措施有（　　）。", "opts": ["盖板覆盖", "设置高度不小于1.2m的防护栏杆", "安全平网封闭", "安全立网封闭", "设置挡脚板"], "ans": [1, 3, 4], "exp": "当竖向洞口短边边长大于或等于500mm时，应在临空一侧设置高度不小于1.2m的防护栏杆，并应采用密目式安全立网或工具式栏板封闭，设置挡脚板。"}, {"id": 949, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "临边防护栏杆由横杆、立杆及挡脚板组成，下列符合防护栏杆安全技术要求的有（　　）。", "opts": ["防护栏杆应为两道横杆，上杆距地面高度应为1.2m", "防护栏立杆间距不应大于2m", "防护栏杆高度大于1.2m，应增设横杆，横杆间距不应大于600mm", "防护栏杆立杆底端应固定牢固", "挡脚板高度不应小于200mm"], "ans": [0, 1, 2, 3], "exp": "防护栏杆应符合下列规定：①防护栏杆应为两道横杆，上杆距地面高度应为1.2m，下杆应在上杆和挡脚板中间设置；②当防护栏杆高度大于1.2m时，应增设横杆，横杆间距不应大于600mm；③防护栏杆立杆间距不应大于2m；④挡脚板高度不应小于180mm；⑤防护栏杆立杆底端应固定牢固。"}, {"id": 950, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "下列关于施工现场临时消防设施配置的说法，正确的有（　　）。", "opts": ["临时消防设施应与在建工程的施工同步设置", "可以将在建工程可利用已具备使用条件的永久性消防设施作为临时消防设施", "消防配电线路应从施工现场总配电箱的总断路器上端接入", "在建工程单体体积大于5000m3应设置室外消防给水系统", "临时用房建筑面积之和大于1000m2应设置临时室外消防给水系统"], "ans": [0, 1, 2, 4], "exp": "临时用房建筑面积之和大于1000m2或在建工程单体体积大于10000m3应设置室外消防给水系统，选项D错误。"}, {"id": 951, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "《建设工程安全生产管理条例》规定，对下列（　　）达到一定规模的危险性较大的分部分项工程，施工单位应编制专项施工方案。", "opts": ["基坑开挖", "基坑支护", "降水工程", "人工吊装", "土方开挖工程"], "ans": [1, 2, 4], "exp": "《建设工程安全生产管理条例》规定，对下列达到一定规模的危险性较大的分部分项工程，施工单位应编制专项施工方案，并附具安全验算结果，经施工单位技术负责人、总监理工程师签字后实施，由专职安全生产管理人员进行现场监督：①基坑支护与降水工程；②土方开挖工程；③模板工程；④起重吊装工程；⑤脚手架工程；⑥拆除、爆破工程；⑦国务院建设行政主管部门或者其他有关部门规定的其他危险性较大的工程。"}, {"id": 952, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "专项施工方案的主要内容应包括（　　）。", "opts": ["施工计划", "计算书", "应急处置措施", "施工平面图", "施工质量保证措施"], "ans": [0, 1, 2], "exp": "专项施工方案的主要内容应包括：（1）工程概况。（2）编制依据。（3）施工计划。（4）施工工艺技术。（5）施工安全保证措施。（6）施工管理及作业人员配备和分工。（7）验收要求。（8）应急处置措施。（9）计算书及相关施工图纸。"}, {"id": 953, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "施工工艺技术包括（　　）。", "opts": ["工艺流程", "施工方法", "检测要求", "技术参数", "检查要求"], "ans": [0, 1, 3, 4], "exp": "施工工艺技术。包括：技术参数、工艺流程、施工方法、操作要求、检查要求等。"}, {"id": 954, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "专家论证的主要内容包括（　　）。", "opts": ["专项施工方案是否满足现场实际情况", "专项施工方案图是否符合有关标准规范", "专项施工方案计算书是否符合有关标准规范", "专项施工方案内容是否完整", "专项施工方案内容是否经确认"], "ans": [0, 2, 3], "exp": "专家论证的主要内容应包括：①专项施工方案内容是否完整、可行；②专项施工方案计算书和验算依据、施工图是否符合有关标准规范；③专项施工方案是否满足现场实际情况，并能够确保施工安全。"}, {"id": 955, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "下列关于防高处坠落的安全技术措施的说法，正确的是（　　）。", "opts": ["使用单梯时梯面应与水平面成75°夹角，踏步不得缺失，梯格间距宜为300mm", "悬空作业，施工人员必须站在操作平台上作业", "坠落高度基准面2.5m及以上进行临边作业时，应在临空一侧设置防护栏杆", "当竖向洞口短边边长小于600mm时，应采取封堵措施", "施工现场人员进出的通道口，应搭设安全防护棚"], "ans": [0, 1, 4], "exp": "C选项错误，坠落高度基准面2m及以上进行临边作业时，应在临空一侧设置防护栏杆。D选项错误，当竖向洞口短边边长小于500mm时，应采取封堵措施。"}, {"id": 956, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "下列关于防触电技术措施的说法，错误的是（　　）。", "opts": ["施工现场临时用电必须执行相关标准，线路采用TN-S系统", "现场用电可使用便桥标准闸箱", "采用保护接地，仅能减轻触电的危险程度，但不能完全保证人身安全。", "现场移动式灯具采用便桥防水灯具，设备外皮做好保护接地，灯具距地面高度不小于3.5m", "工作接地主要指的是变压器中性点或中性线接地"], "ans": [1, 3], "exp": "B选项正确表述为：现场用电必须使用便桥标准闸箱；D选项正确表述为：现场移动式灯具采用便桥防水灯具，设备外皮做好保护接地，灯具距地面高度不小于3m。"}, {"id": 957, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "根据《建设工程安全生产管理条例》，对达到一定规模的危险性较大的分部分项工程，正确的安全管理做法有（　　）。", "opts": ["所有专项施工方案均应组织专家进行论证、审查", "施工单位应当编制专项施工方案，并附具安全验算结果", "专项施工方案由专职安全生产管理人员进行现场监督", "专项施工方案经现场工程师签字后即可实施", "专项施工方案应由企业法定代表人审批"], "ans": [1, 2], "exp": "A选项错误，并不是所有的专项施工方案都需组织专家进行论证、审查。D、E选项错误，专项施工方案经施工单位技术负责人、总监理工程师签字后实施。"}, {"id": 958, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "根据《建设工程安全生产管理条例》，施工单位应当组织专家对专项施工方案进行论证、审查的分部分项工程有（　　）。", "opts": ["拆除工程", "地下暗挖工程", "高大模板工程", "起重吊装工程", "深基坑工程"], "ans": [1, 2, 4], "exp": "深基坑、地下暗挖工程、高大模板工程的专项施工方案，施工单位还应当组织专家进行论证、审查。"}, {"id": 959, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "施工安全技术交底，首先，由项目技术负责人向（　　）交底。", "opts": ["施工员", "班组长", "分包单位技术负责人", "操作工人", "监理工程师"], "ans": [0, 1, 2], "exp": "根据《建设工程安全生产管理条例》，建设工程施工前，施工单位负责项目管理的技术人员应对有关安全施工的技术要求向施工作业班组、作业人员作出详细说明，并由双方签字确认。首先，由项目技术负责人向施工员、班组长、分包单位技术负责人交底，再由班组长向操作工人交底；分包单位项目技术负责人按照相同程序进行交底；对于超过一定规模的危险性较大分部分项工程，必须先由施工单位技术负责人向项目技术负责人交底。"}, {"id": 960, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "施工安全技术交底的要求有（　　）。", "opts": ["施工项目部必须实行逐级安全技术交底制度，纵向延伸到班组全体作业人员", "技术交底的内容应针对分部分项工程施工中给作业人员带来的潜在危险因素和存在问题", "应优先采用新的安全技术措施", "应定期向由两个以上作业班组和/或多工种进行交叉施工的作业班组进行口头交底", "应保存书面安全技术交底签字记录并归档"], "ans": [0, 1, 2, 4], "exp": "施工安全技术交底的要求：①施工项目部必须实行逐级安全技术交底制度，纵向延伸到班组全体作业人员；②应将工程概况、施工方法、施工程序、安全技术措施等向施工员、班组长进行详细交底，应将安全技术措施、安全操作规程、防护用品用具使用等向操作人员进行详细交底；③技术交底的内容应针对分部分项工程施工中给作业人员带来的潜在危险因素和存在问题；④应优先采用新的安全技术措施；⑤应定期向由两个以上作业班组和/或多工种进行交叉施工的作业班组进行书面交底；⑥应保存书面安全技术交底签字记录并归档。"}, {"id": 961, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "坠落悬挂式安全带的性能要求如下（　　）。", "opts": ["带扣不应松脱，模拟人不应与系带滑脱或坠落至地面", "安全带冲击作用力峰值应小于或等于8kN", "织带或绳在各调节扣内的最大滑移应小于或等于35mm", "模拟人悬吊在空中时，其腋下、大腿内侧不应有金属件", "模拟坠落时，连接器不应打开，零部件不应断裂"], "ans": [0, 3, 4], "exp": "安全带是防止作业人员发生坠落或发生坠落后将作业人员安全悬挂的个体防护装备。按照其种类不同，安全带可分为围杆作业安全带、区域限制安全带和坠落悬挂式安全带。其中，坠落悬挂式安全带的性能要求如下：（1）带扣不应松脱，模拟人不应与系带滑脱或坠落至地面。（2）模拟坠落时，连接器不应打开，零部件不应断裂。（3）安全带冲击作用力峰值应小于或等于6kN。（4）安全带应标明伸展长度，且伸展长度应小于或等于永久标识中明示的数值。（5）模拟人悬吊在空中时，不应出现头朝下的现象，系带不应出现明显不对称滑移或不对称变形。（6）模拟人悬吊在空中时，其腋下、大腿内侧不应有金属件。（7）模拟人悬吊在空中时，不应有任何部件压迫其喉部、外生殖器。（8）织带或绳在各调节扣内的最大滑移应小于或等于25mm。（9）如果系带具备坠落指示功能，坠落指示功能应正常显示坠落发生。安全带还应满足附加性能要求，这些性能包括：救援性能、阻燃性能、防静电性能、耐化学品性能、安全带金属零部件耐腐蚀性能等。"}, {"id": 962, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "施工现场及生活区防触电的安全技术措施有（    ）。", "opts": ["电力系统工作接地", "宿舍使用48V安全电压", "装设漏电保护器", "电工持证上岗", "电气设备保护接地"], "ans": [0, 2, 4], "exp": "防触电相火灾的安全技术措施：①按规范设置配供电系统（生活区民工住宿达不到标准的必须使用36V安全电压）。②保护接地。③保护接零。④工作接地。⑤装设漏电保护器。⑥绝缘安全用具。"}, {"id": 963, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "为防止施工现场物体坠落或飞溅造成物体打击伤害，可采取的安全技术措施有（    ）。", "opts": ["在施工工程邻近必须通行的道路上方搭设防护棚", "对短边边长小于500mm的竖向洞口进行封闭", "进入施工现场的人员佩戴符合标准的安全帽", "为登高作业设置专用梯子或其他攀爬设施", "在起重机械作业区域周边设置防护栏杆"], "ans": [0, 2], "exp": "B项属于洞口作业防坠落措施，D项属于攀登作业防坠落措施，E项属于悬空作业防坠落措施。"}, {"id": 964, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "根据安全事故隐患治理体系，（　　）是事故隐患排查、治理和防控的责任主体。", "opts": ["建设单位", "企业", "质量监督机构", "设计单位"], "ans": [1], "exp": "企业是事故隐患排查、治理和防控的责任主体。企业主要负责人对本单位事故隐患排查治理工作全面负责。"}, {"id": 965, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "针对重要生产设施、重大危险源而制订的应急预案属于（　　）。", "opts": ["现场施工方案", "专项应急预案", "现场处置方案", "综合应急预案"], "ans": [1], "exp": "专项应急预案是指企业为应对某一种或者多种类型生产安全事故，或者针对重要生产设施、重大危险源、重大活动防止生产安全事故而制定的专项性工作方案。"}, {"id": 966, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "事故风险单一、危险性小的企业，可只编制（　　）。", "opts": ["现场施工方案", "专项应急预案", "现场处置方案", "综合应急预案"], "ans": [2], "exp": "事故风险单一、危险性小的企业，可只编制现场处置方案。"}, {"id": 967, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "下列关于应急预案的分类的说法，不正确的是（　　）。", "opts": ["综合应急预案是本单位应对生产安全事故的总体工作程序、措施和应急预案体系的总纲", "专项应急预案与综合应急预案中的应急组织机构、应急响应程序相近时，可不编写综合应急预案", "针对具体场所所制定的应急处置措施是现场处置方案", "事故风险单一、危险性小的企业，可只编制现场处置方案"], "ans": [1], "exp": "专项应急预案与综合应急预案中的应急组织机构、应急响应程序相近时，可不编写专项应急预案，相应的应急处置措施并入综合应急预案。"}, {"id": 968, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "应急预案的编制应以（　　）为核心。", "opts": ["以人为本", "依法依规", "注重实效", "应急处置"], "ans": [3], "exp": "应急预案的编制应遵循以人为本、依法依规、符合实际、注重实效的原则，以应急处置为核心，明确应急职责、规范应急程序、细化保障措施。"}, {"id": 969, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "下列关于应急预案评审的说法，不正确的是（　　）。", "opts": ["应急预案编制完成后，建设单位应按法律法规有关规定组织评审或论证", "参加应急预案评审的人员可包括有关安全生产及应急管理方面的、有现场处置经验的专家", "评审人员与所评审应急预案的企业有利害关系的，应当回避", "应急预案论证可通过推演的方式开展"], "ans": [0], "exp": "应急预案编制完成后，企业应按法律法规有关规定组织评审或论证。"}, {"id": 970, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "企业应在应急预案公布之日起（　　）个工作日内，按照分级属地原则，向县级以上人民政府应急管理部门和其他负有安全生产监督管理职责的部门进行备案，并依法向社会公布。", "opts": ["15", "20", "30", "45"], "ans": [1], "exp": "企业应在应急预案公布之日起20个工作日内，按照分级属地原则，向县级以上人民政府应急管理部门和其他负有安全生产监督管理职责的部门进行备案，并依法向社会公布。"}, {"id": 971, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "建筑施工企业应当每（　　）年进行一次应急预案评估。", "opts": ["一", "两", "三", "五"], "ans": [2], "exp": "建筑施工企业应当每三年进行一次应急预案评估。"}, {"id": 972, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "根据《生产安全事故报告和调查处理条例》，某轨道交通隧道坍塌，造成7人死亡，8人重伤，间接经济损失约6000万元，该事故属于（　　）。", "opts": ["一般事故", "较大事故", "重大事故", "特别重大事故"], "ans": [1], "exp": "依据《生产安全事故报告和调查处理条例》，生产安全事故分为以下等级：（1）特别重大事故，是指造成30人及以上死亡，或者100人及以上重伤（包括急性工业中毒，下同），或者1亿元及以上直接经济损失的事故。（2）重大事故，是指造成10人及以上30人以下死亡，或者50人及以上100人以下重伤，或者5000万元及以上1亿元以下直接经济损失的事故。（3）较大事故，是指造成3人及以上10人以下死亡，或者10人及以上50人以下重伤，或者1000万元及以上5000万元以下直接经济损失的事故。（4）一般事故，是指造成3人以下死亡，或者10人以下重伤，或者1000万元以下直接经济损失的事故。"}, {"id": 973, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "事故调查组应当自事故发生之日起（　　）日内提交事故调查报告。", "opts": ["30", "45", "60", "90"], "ans": [2], "exp": "事故调查组应当自事故发生之日起60日内提交事故调查报告；特殊情况下，经负责事故调查的人民政府批准，提交事故调查报告的期限可以适当延长，但延长的期限最长不超过60日。"}, {"id": 974, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "根据施工安全事故隐患分类，因外部因素影响致使企业自身难以排除的隐患属于（　　）。", "opts": ["一般事故隐患", "较大事故隐患", "重大事故隐患", "特大事故隐患"], "ans": [2], "exp": "施工安全事故隐患分为一般事故隐患和重大事故隐患。一般事故隐患是指危害和整改难度较小，发现后能够立即整改排除的隐患。重大事故隐患是指危害和整改难度较大，应当全部或者局部停产停业，并经过一定时间整改治理方能排除的隐患，或者因外部因素影响致使企业自身难以排除的隐患。"}, {"id": 975, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "企业应制定本单位的应急预案演练计划，建筑施工单位应至少每（　　）组织一次生产安全事故应急预案演练，并将演练情况报送所在地县级以上地方人民政府负有安全生产监督管理职责的部门。", "opts": ["半年", "季度", "年", "月"], "ans": [0], "exp": "企业应制定本单位的应急预案演练计划，建筑施工单位应至少每半年组织一次生产安全事故应急预案演练，并将演练情况报送所在地县级以上地方人民政府负有安全生产监督管理职责的部门。"}, {"id": 976, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "某项目部针对现场脚手架拆除作业而制定的事故应急预案称为（　　）。", "opts": ["综合应急预案", "现场处置预案", "专项应急预案", "现场应急预案"], "ans": [2], "exp": "专项应急预案是指企业为应对某一种或者多种类型生产安全事故，或者针对重要生产设施、重大危险源、重大活动防止生产安全事故而制定的专项性工作方案。"}, {"id": 977, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "事故调查组应当自事故发生之日起60日内提交事故调查报告；特殊情况下，经负责事故调查的人民政府批准，提交事故调查报告的期限可以适当延长，但延长的期限最长不超过60日。事故调查期限不包括（　　）。", "opts": ["技术鉴定所需时间", "调查取证所需时间", "事故分析所需时间", "撰写调查报告所需时间"], "ans": [0], "exp": "事故调查中需要进行技术鉴定的，事故调查组应当委托具有国家规定资质的单位进行技术鉴定。必要时，事故调查组可以直接组织专家进行技术鉴定。技术鉴定所需时间不计入事故调查期限。"}, {"id": 978, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "重大事故、较大事故、一般事故，负责事故调查的人民政府应当自收到事故调查报告之日起（　　）日内做出批复。", "opts": ["10", "15", "25", "30"], "ans": [1], "exp": "重大事故、较大事故、一般事故，负责事故调查的人民政府应当自收到事故调查报告之日起15日内做出批复；特别重大事故，30日内做出批复，特殊情况下，批复时间可以适当延长，但延长的时间最长不超过30日。"}, {"id": 979, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "针对重大生产安全事故隐患，企业制定并实施事故隐患治理方案的组织者是（    ）。", "opts": ["企业安全生产管理委员会", "企业技术部门负责人", "企业主要负责人", "企业安全生产管理部门"], "ans": [2], "exp": "对于重大事故隐患，由企业主要负责人组织制定并实施事故隐患治理方案。"}, {"id": 980, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "施工企业应建立安全风险分级管控和隐患排查治理双重预防机制。针对项目重大安全风险填写的清单汇总造册后，应报告的主管部门是（    ）。", "opts": ["项目属地负有安全生产监督管理职责的部门", "项目属地县级以上建设行政主管部门", "企业注册地负有安全生产监督管理职责的部门", "建设单位所在地县级以上建设行政主管部门"], "ans": [0], "exp": "密集型场所、高危作业工序和受影响的人群规模。安全风险等级从高到低划分为重大风险、较大风险、一般风险和低风险，分别用红、橙、黄、蓝四种颜色标示。其中，重大安全风险应填写清单、汇总造册，按照职责范围报告属地负有安全生产监督管理职责的部门。要依据安全风险类别和等级建立企业安全风险数据库，绘制企业“红橙黄蓝”四色安全风险空间分布图。"}, {"id": 981, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "应急预案的编制应遵循的原则包括（　　）。", "opts": ["以人为本", "依法依规", "符合实际", "注重实效", "应急处置"], "ans": [0, 1, 2, 3], "exp": "应急预案的编制应遵循以人为本、依法依规、符合实际、注重实效的原则，以应急处置为核心，明确应急职责、规范应急程序、细化保障措施。"}, {"id": 982, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "下列选项中，不属于应急预案评审内容的是（　　）。", "opts": ["应急资源的经济性", "应急预案体系设计的针对性", "应急预案的衔接性", "应急保障措施的安全性", "应急响应程序和措施的科学性"], "ans": [0, 3], "exp": "评审内容：风险评估和应急资源调查的全面性、应急预案体系设计的针对性、应急组织体系的合理性、应急响应程序和措施的科学性、应急保障措施的可行性、应急预案的衔接性。"}, {"id": 983, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "下列选项中，属于安全事故报告内容的有（　　）。", "opts": ["事故发生单位概况", "初步估计的直接经济损失", "事故发生的原因和事故性质", "事故责任的认定", "事故防范和整改措施"], "ans": [0, 1], "exp": "报告事故应包括下列内容：（1）事故发生单位概况。（2）事故发生的时间、地点以及事故现场情况。（3）事故的简要经过。（4）事故已经造成或者可能造成的伤亡人数（包括下落不明的人数）和初步估计的直接经济损失。（5）已经采取的措施。（6）其他应当报告的情况。"}, {"id": 984, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "下列选项中，属于重大事故治理方案应当包括的内容有（　　）。", "opts": ["治理的目标和任务", "治理的时限和要求", "隐患的治理方案", "经费和物资的落实", "隐患的现状及其产生原因"], "ans": [0, 1, 3], "exp": "重大事故隐患治理方案应当包括以下内容：①治理的目标和任务；②采取的方法和措施；③经费和物资的落实；④负责治理的机构和人员；⑤治理的时限和要求；⑥安全措施和应急预案。"}, {"id": 985, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "对于排查发现的重大事故隐患，应做到（　　）和预案“五落实”，实现隐患排查治理的闭环管理。", "opts": ["时限", "措施", "资金", "责任", "技术"], "ans": [0, 1, 2, 3], "exp": "对于排查发现的重大事故隐患，应当在向负有安全生产监督管理职责的部门报告的同时，制定并实施严格的隐患治理方案，做到责任、措施、资金、时限和预案“五落实”，实现隐患排查治理的闭环管理。"}, {"id": 986, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "根据《生产安全事故罚款处罚规定》，发生一般生产安全事故后，事故发生单位将被处以100万元以上150万元以下罚款的行为有（    ）。", "opts": ["瞒报事故而贻误事故抢救", "谎报或者瞒报事故", "伪造事故现场影响事故调查", "伪造或者故意破坏事故现场", "在事故调查中作伪证"], "ans": [1, 3, 4], "exp": "事故发生单位有下列行为之一的，将根据事故等级处以不同额度的罚款：①谎报或者瞒报事故的；②伪造或者故意破坏事故现场的；③转移、隐匿资金、财产，或者销毁有关证据、资料的；④拒绝接受调查或者拒绝提供有关情况和资料的；⑤在事故调查中作伪证或者指使他人作伪证的。具体罚款额度如下：（1）发生一般事故的，处100万元以上150万元以下的罚款。（2）发生较大事故的，处150万元以上200万元以下的罚款。（3）发生重大事故的，处200万元以上250万元以下的罚款。（4）发生特别重大事故的，处250万元以上300万元以下的罚款。"}, {"id": 987, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "针对生产安全事故，施工单位应急救援准备工作的正确做法有（    ）。", "opts": ["应根据工程特点制定现场应急救援预案", "应单独组建专业应急救援队伍", "应急救援预案应具有科学性和通用性", "应配备必要的应急救援器材和设备", "应急救援预案应明确组织体系和职责分工"], "ans": [0, 3, 4], "exp": "施工单位应制定本单位生产安全事故应急救援预案，建立应急救援组织或者配备应急救援人员，配备必要的应急救援器材、设备，并定期组织演练。应急救援预案准备。生产安全事故应急救援预案应符合有关法律、法规、规章和标准的规定，具有科学性、针对性和可操作性，明确规定应急组织体系、职责分工及应急救援程序和措施。"}, {"id": 988, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "single", "q": "建设单位应在工程（　　）组织编制项目绿色策划方案。", "opts": ["立项阶段", "方案设计阶段", "决策阶段", "施工阶段"], "ans": [0], "exp": "建设单位应在工程立项阶段组织编制项目绿色策划方案。"}, {"id": 989, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "single", "q": "绿色设计宜应用（　　）等数字化设计方式，实现设计协同、设计优化。", "opts": ["EPC", "3R", "BIM", "GIS"], "ans": [2], "exp": "绿色设计宜应用BIM等数字化设计方式，实现设计协同、设计优化。"}, {"id": 990, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "single", "q": "项目交付前应进行绿色建造的（　　）。", "opts": ["节水、节电、节能评估", "效果评估", "节能评估", "成果评估"], "ans": [1], "exp": "项目交付前应进行绿色建造的效果评估。"}, {"id": 991, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "single", "q": "施工单位应建立以（　　）为第一责任人的绿色施工管理体系，制定绿色施工管理制度，负责绿色施工的组织实施，进行绿色施工教育培训，定期开展自检、联检和评价工作。", "opts": ["项目经理", "项目技术负责人", "单位负责人", "单位技术负责人"], "ans": [0], "exp": "施工单位应建立以项目经理为第一责任人的绿色施工管理体系，制定绿色施工管理制度，负责绿色施工的组织实施，进行绿色施工教育培训，定期开展自检、联检和评价工作。"}, {"id": 992, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "single", "q": "在编制（　　）和招标文件时，应明确绿色施工的要求，并提供包括场地、环境、工期、资金等方面的条件保障。", "opts": ["工程预算", "工程估算", "工程概算", "工程结算"], "ans": [2], "exp": "在编制工程概算和招标文件时，应明确绿色施工的要求，并提供包括场地、环境、工期、资金等方面的条件保障。"}, {"id": 993, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "single", "q": "实行总承包管理的建设工程，（　　）应对绿色施工负总责。", "opts": ["劳务单位", "专业承包单位", "分包单位", "总承包单位"], "ans": [3], "exp": "实行总承包管理的建设工程，总承包单位应对绿色施工负总责。"}, {"id": 994, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "single", "q": "在该工程地下室底板混凝土浇筑期间，按《建筑施工场界噪声限值》（GBl2523—2011）规定，昼间施工噪声应控制在（　　）dB（A）以内。", "opts": ["55", "60", "65", "70"], "ans": [3], "exp": "昼间场界环境噪声不得超过70dB（A），夜间场界环境噪声不得超过55dB（A）。"}, {"id": 995, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "single", "q": "现场办公和生活用房采用周转式活动房。现场围挡应最大限度地利用已有围墙，或采用装配式可重复使用围挡封闭。力争工地临房、临时围挡材料的可重复使用率达到（　　）。", "opts": ["50%", "60%", "70%", "80%"], "ans": [2], "exp": "现场办公和生活用房采用周转式活动房。现场围挡应最大限度地利用已有围墙，或采用装配式可重复使用围挡封闭。力争工地临房、临时围挡材料的可重复使用率达到70%。"}, {"id": 996, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "single", "q": "鼓励就地取材，施工现场500km以内生产的建筑材料用量占建筑材料总重量的（　　）以上，宜优先选用获得绿色建材评价认证标识的建筑材料和产品。", "opts": ["40%", "50%", "60%", "70%"], "ans": [3], "exp": "鼓励就地取材，施工现场500km以内生产的建筑材料用量占建筑材料总重量的70%以上，宜优先选用获得绿色建材评价认证标识的建筑材料和产品。"}, {"id": 997, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "single", "q": "土方作业阶段，采取洒水、覆盖等措施，达到作业区目测扬尘高度小于（　　）m，不扩散到场区外。", "opts": ["0.5", "1", "1.5", "2"], "ans": [2], "exp": "土方作业阶段，采取洒水、覆盖等措施，达到作业区目测扬尘高度小于1.5m，不扩散到场区外。"}, {"id": 998, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "single", "q": "结构施工、安装装饰装修阶段，作业区目测扬尘高度小于（　　）m。", "opts": ["0.5", "1", "1.5", "2"], "ans": [0], "exp": "结构施工、安装装饰装修阶段，作业区目测扬尘高度小于0.5m。"}, {"id": 999, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "single", "q": "加强建筑垃圾的回收再利用，力争使建筑垃圾的再利用和回收率达到（　　）。", "opts": ["30%", "40%", "50%", "60%"], "ans": [0], "exp": "加强建筑垃圾的回收再利用，力争使建筑垃圾的再利用和回收率达到30%，建筑物拆除产生的废弃物再利用和回收率大于40%。对于碎石类、土石方类建筑垃圾，可采用地基填埋、铺路等方式提高再利用率，力争再利用率大于50%。"}, {"id": 1000, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "single", "q": "为实现绿色施工，需要通过测定影响环境质量要素的（    ）来确定环境质量状况和污染程度。", "opts": ["代表值", "平均值", "最低值", "最高值"], "ans": [0], "exp": "应积极开展并配合环境监测工作。环境监测是通过对影响环境质量要素代表值的测定，确定环境质量状况和污染程度，了解环境系统变化规律与发展趋势的活动。环境监测具有环节构成的系统性，监测对象和监测手段的综合性，环境状态随时间变化的时序性特征。"}, {"id": 1001, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "single", "q": "将废物的全部或部分作为其他产品的部件予以使用，属于（    ）。", "opts": ["“资源化”原则", "“再循环”原则", "“减量化”原则", "“再利用”原则"], "ans": [3], "exp": "“减量化”原则：通过输入端控制方式，用较少资源投入来达到既定的生产目的，从经济活动的源头就注意节约资源和减少废弃物排放。“再利用”原则：通过过程端控制方式，将废物直接作为产品或经修复、翻新、再制造后继续作为产品使用，或者将废物的全部或部分作为其他产品的部件予以使用。“再循环”原则：通过输出端控制方式，将生产出来的物品在完成其使用功能后通过回收利用重新变成可用资源，减少垃圾的产生。"}, {"id": 1002, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "multi", "q": "可持续发展的基本原则有（　　）。", "opts": ["共同性", "持续性", "延续性", "公正性", "公平性"], "ans": [0, 1, 4], "exp": "可持续发展有公平性、持续性和共同性三项基本原则。"}, {"id": 1003, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "multi", "q": "LCA方法应用可分（　　）阶段。", "opts": ["解释说明", "清单分析", "效果评估", "影响评估", "目的与范围确定"], "ans": [0, 1, 3, 4], "exp": "LCA方法应用可分为以下四个阶段：（1）目的与范围确定；（2）清单分析；（3）影响评估；（4）解释说明。"}, {"id": 1004, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "multi", "q": "以下关于节水的说法，正确的有（　　）。", "opts": ["现场搅拌用水、养护用水应采取有效的节水措施，优先采用中水搅拌、中水养护", "有条件的地区和工程应收集雨水养护", "处于基坑降水阶段的工地，宜优先采用地下水作为混凝土搅拌用水", "现场机具、设备、车辆冲洗、喷洒路面、绿化浇灌等用水，优先采用市政自来水", "力争施工中非传统水源和循环水的再利用量大于30%"], "ans": [0, 1, 2, 4], "exp": "施工中应采用先进的节水施工工艺。混凝土养护采用覆膜、喷淋设备、养护液等节水工艺。现场搅拌用水、养护用水应采取有效的节水措施，优先采用中水搅拌、中水养护，有条件的地区和工程应收集雨水养护。处于基坑降水阶段的工地，宜优先采用地下水作为混凝土搅拌用水、养护用水、冲洗用水和部分生活用水。现场机具、设备、车辆冲洗、喷洒路面、绿化浇灌等用水，优先采用非传统水源，尽量不使用市政自来水。力争施工中非传统水源和循环水的再利用量大于30%。"}, {"id": 1005, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "multi", "q": "精益管理中的“益”体现在（　　）上。", "opts": ["质量", "进度", "成本", "安全"], "ans": [2], "exp": "精益管理中的“益”体现在成本上。"}, {"id": 1006, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "multi", "q": "现场围挡采用封闭围挡，高度不小于（　　）m。", "opts": ["1.2", "1.5", "1.8", "2"], "ans": [2], "exp": "现场围挡采用封闭围挡，高度不小于1.8m。"}, {"id": 1007, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "multi", "q": "“控制项”是指绿色施工过程中必须达到的基本要求条款对于施工现场环境保护而言，下列关于“控制项”内容的说法，错误的是（　　）。", "opts": ["施工现场可以焚烧废弃物", "应建立环境保护管理制度", "制定地下文物保护应急预案", "施工现场应在醒目位置设置环境保护标识"], "ans": [0], "exp": "这里的“控制项”是指绿色施工过程中必须达到的基本要求条款。对于施工现场环境保护而言“控制项”包括以下内容：（1）绿色施工策划文件中应包含环境保护内容，并建立环境保护管理制度。（2）施工现场应在醒目位置设置环境保护标识。（3）施工现场的古迹、文物、树木及生态环境等应采取有效保护措施，制定地下文物保护应急预案。"}, {"id": 1008, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "multi", "q": "绿色施工一般项中，工程污水和试验室养护用水应处理合格后，排入市政污水管道，检测频率不应少于（　　）。", "opts": ["1月/次", "2月/次", "3月/次", "4月/次"], "ans": [0], "exp": "绿色施工一般项中，工程污水和试验室养护用水应处理合格后，排入市政污水管道，检测频率不应少于1月/次。"}, {"id": 1009, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "multi", "q": "施工现场围挡设置高度不得低于（　　）m。", "opts": ["1", "1.8", "2", "2.2"], "ans": [1], "exp": "施工现场采用封闭围挡，高度不小于1.8m。"}, {"id": 1010, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "multi", "q": "施工现场文明施工“五牌一图”中，“五牌”是指（　　）。", "opts": ["工程概况牌、管理人员名单及监督电话牌、消防保卫牌、安全生产牌、文明施工牌", "工程概况牌、管理人员名单和监督电话牌、现场平面布置牌、安全生产牌、文明施工牌", "工程概况牌、现场危险警示牌、现场平面布置牌、安全生产牌、文明施工牌", "工程概况牌、现场危险警示牌、消防保卫牌、安全生产牌、文明施工牌"], "ans": [0], "exp": "“五牌一图”，即工程概况牌、管理人员名单及监督电话牌、消防保卫牌、安全生产牌、文明施工牌和施工现场平面图。"}, {"id": 1011, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "multi", "q": "以下关于建筑垃圾处置一般项的说法，错误的是（　　）。", "opts": ["非装配式建筑施工的垃圾产生量不应大于300t/万m2", "建筑垃圾回收利用率应达到20%", "施工选用绿色、环保材料", "废电池、废硒鼓、废墨盒、剩油漆、剩涂料等有毒有害的废弃物应封闭分类存放，设置醒目标志"], "ans": [1], "exp": "建筑垃圾处置应包括下列内容：①制定建筑垃圾减量化专项方案，明确减量化、资源化具体指标及各项措施；②装配式建筑施工的垃圾排放量不大于200t/万m2，非装配式建筑施工的垃圾排放量不大于300/万m2；③建筑垃圾回收利用率达到30%，建筑材料包装物回收利用率达到100%；④现场垃圾分类、封闭、集中堆放；⑤办理施工渣土、建筑废弃物等排放手续，按指定地点排放；⑥碎石和土石方类等建筑垃圾用作地基和路基回填材料；⑦土方回填不采用有毒有害废弃物；⑧施工现场办公用纸两面使用，废纸回收，废电池、废硒鼓、废墨盒、剩油漆、剩涂料等有毒有害的废弃物封闭分类存放，设置醒目标志，并由符合要求的专业机构消纳处置；⑨施工选用绿色、环保材料。"}, {"id": 1012, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "multi", "q": "以下关于污水排放一般项规定的说法错误的是（　　）。", "opts": ["现场道路和材料堆放场地周边应设置排水沟", "工程污水和试验室养护用水应处理合格后，排入市政污水管道，检测频率不应少于1次/年", "现场厕所应设置化粪池，化粪池定期清理", "工地厨房应设置隔油池，定期清理"], "ans": [1], "exp": "污水排放应符合下列规定：①现场道路和材料堆放场地周边应设置排水沟；②工程污水和试验室养护用水处理合格后，排入市政污水管道，检测频率不应少于1次/月；③现场厕所应设置化粪池，化粪池定期清理；④工地厨房应设置隔油池，定期清理；⑤工地生活污水、预制场和搅拌站等施工污水达标排放和利用；⑥钻孔桩、顶管或盾构法作业采用泥浆循环利用系统，不得外溢漫流。"}, {"id": 1013, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "multi", "q": "（　　）是文明施工的决定性因素，对管理人员和施工人员的教育是做好文明施工工作的重点。", "opts": ["人", "环境", "管理", "组织"], "ans": [0], "exp": "人是文明施工的决定性因素，对管理人员和施工人员的教育是做好文明施工工作的重点。"}, {"id": 1014, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "multi", "q": "以下不属于5S管理理念的是（　　）。", "opts": ["整理", "整顿", "清扫", "安全"], "ans": [3], "exp": "文明施工作为施工现场管理的重要工作，应贯彻“8S”管理理念。首先，要对施工现场的各种要素进行整理（Seri）、整顿（Seiton）、清扫（Seiso）、清洁（Seiketsu），并考虑人的素养（Shitsuke）。上述五大要素在日语中罗马发音均以“S”打头，故称为“5S”。在此基础上，增加安全（Safety）要素，即称为“6S”。之后，又增加了节约（Save）和学习（Study）两大要素，即成为当今施工现场的“8S”管理理念。"}, {"id": 1015, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "multi", "q": "文明施工的主要作用是（　　）。", "opts": ["以人为本、安全第一的现实需要", "反映企业能力和企业形象的重要窗口", "保证施工质量、施工安全的必要条件", "以人为本、关心公众的现实需要", "保证施工质量、施工安全的支持条件"], "ans": [1, 3, 4], "exp": "文明施工的主要作用：（1）文明施工是保证施工质量、施工安全的支持条件。（2）文明施工是以人为本、关心公众的现实需要。（3）文明施工是反映企业能力和企业形象的重要窗口。"}, {"id": 1016, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "multi", "q": "“8S”管理理念包括（　　）。", "opts": ["人的素养", "节约", "质量", "学习", "安全"], "ans": [0, 1, 3, 4], "exp": "文明施工作为施工现场管理的重要工作，应贯彻“8S”管理理念。首先，要对施工现场的各种要素进行整理（Seri）、整顿（Seiton）、清扫（Seiso）、清洁（Seiketsu），并考虑人的素养（Shitsuke）。上述五大要素在日语中罗马发音均以“S”打头，故称为“5S”。在此基础上，增加安全（Safety）要素，即称为“6S”。之后，又增加了节约（Save）和学习（Study）两大要素，即成为当今施工现场的“8S”管理理念。"}, {"id": 1017, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "multi", "q": "建筑企业及施工项目部应努力做到文明施工管理的“六化”包括（　　）。", "opts": ["现场管理制度化", "安全设施标准化", "现场布置条理化", "机料摆放定置化", "作业行为灵活化"], "ans": [0, 1, 2, 3], "exp": "建筑企业及施工项目部应努力做到文明施工管理的“六化”：现场管理制度化、安全设施标准化、现场布置条理化、机料摆放定置化、作业行为规范化、环境协调和谐化。"}, {"id": 1018, "source": "教材", "ch": 8, "year": null, "sourceLabel": "第8章", "type": "multi", "q": "根据《建筑与市政工程绿色施工评价标准》，下列施工现场环境保护措施中，属于绿色施工评价“优选项”的有（    ）。", "opts": ["绿色施工策划文件中包含环境保护内容", "现场设置可移动环保厕所并定期清运、消毒", "现场建立洒水清扫制度并配备洒水设备", "现场采用自动喷雾（淋）降尘系统", "现场设置动态连续噪声监测设施并保存昼夜噪声曲线"], "ans": [1, 3, 4], "exp": "这里的“优选项”是指绿色施工过程中实施难度较大、要求较高的条款。对于施工现场环境保护而言，“优选项”包括以下内容：（1）施工现场宜设置可移动环保厕所，并定期清运、消毒。（2）现场宜采用自动喷雾（淋）降尘系统。（3）施工场界宜设置扬尘自动监测仪，动态连续定量监测扬尘（总悬浮颗粒物TSP，PM10）。（4）施工场界宜设置动态连续噪声监测设施，保存昼夜噪声曲线。（5）装配式建筑施工的垃圾排放量不宜大于140t/万m²，非装配式建筑施工的垃圾排放量不宜大于210t/万m²。（6）建筑垃圾回收利用率宜达到50%。（7）施工现场宜采用地磅或自动监测平台，动态计量建筑废弃物重量。（8）施工现场宜采用雨水就地渗透措施。（9）施工现场宜采用生态环保泥浆、泥浆净化器反循环快速清孔等环境保护技术。（10）施工现场宜采用水封爆破、静态爆破等高效降尘的先进工艺。（11）土方施工宜采用水浸法湿润土壤等降尘方法。（12）施工现场淤泥质渣土宜经脱水后外运。"}, {"id": 1019, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "实行备案管理的项目中，投资主体是中央管理企业的，备案机关是（　　）。", "opts": ["投资主体注册地的省级政府发展改革部门", "被投资主体注册地的省级政府发展改革部门", "当地政府省级政府发展改革部门", "国家发展和改革委员会"], "ans": [3], "exp": "实行备案管理的项目中，投资主体是中央管理企业的，备案机关是国家发展和改革委员会。"}, {"id": 1020, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "新加坡工程主管部门是（　　）。", "opts": ["建设厅", "建设局", "建筑业发展局", "公共工程部"], "ans": [1], "exp": "新加坡工程主管部门是建设局。"}, {"id": 1021, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "外国人在马来西亚工作必须获得（　　）。", "opts": ["工作签证", "人力资源部颁发的工作证", "工作许可", "无限制性要求"], "ans": [2], "exp": "外国人在马来西亚工作必须获得工作许可。"}, {"id": 1022, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "以下国际工程项目采用中国标准的是（　　）。", "opts": ["中国援非盟会议中心", "中国公司承建的埃塞俄比亚石油大厦项目", "中国公司承建的厄瓜多尔水电站项目", "中国公司承包的阿尔及利亚某铁路项目"], "ans": [0], "exp": "B、C选项采用了当地标准；D选项采用了欧洲标准、法国标准以及阿尔及利亚标准等组合技术标准。"}, {"id": 1023, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "不同国家和地区对外国企业在当地注册公司的要求存在差异，考虑国际商业实体注册申请的普遍性，公司注册申请的框架性流程，第一步是（　　）。", "opts": ["确定外国企业设立的形式", "明确注册企业的受理机构及申请受理流程", "委派企业或委托代理人员进行当地公司注册申请", "开设企业银行账户并注入注册资金"], "ans": [0], "exp": "不同国家和地区对外国企业在当地注册公司的要求存在差异，考虑国际商业实体注册申请的普遍性，公司注册申请可参考如下框架性流程：（1）确定外国企业设立的形式。（2）明确注册企业的受理机构及申请受理流程。（3）委派企业或委托代理人员进行当地公司注册申请。（4）开设企业银行账户并注入注册资金。（5）完成属地公司税务、国家保险和医疗保险等企业义务注册事宜。"}, {"id": 1024, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "促进对外承包工程高质量发展的基本原则有（　　）。", "opts": ["坚持安全第一", "坚持规范有序", "坚持质量优先", "坚持企业主体", "坚持互利共赢"], "ans": [1, 2, 3, 4], "exp": "促进对外承包工程高质量发展的基本原则有：（1）坚持企业主体。（2）坚持质量优先。（3）坚持互利共赢。（4）坚持规范有序。"}, {"id": 1025, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "国务院于2017年修订的《对外承包工程管理条例》是规范对外承包工程，促进对外承包工程健康发展的重要法规。对外承包工程的根本性要求有（　　）。", "opts": ["应当维护国家利益和社会公共利益，保障外派人员的合法权益", "应当遵守工程项目所在国家或者地区的法律，信守合同，尊重当地的风俗习惯，注重生态环境保护，促进当地经济社会发展", "应当与境外工程项目发包人订立书面合同，明确双方的权利和义务，并按照合同约定履行义务", "应当加强对工程质量和安全生产的管理，建立、健全并严格执行工程质量和安全生产管理的规章制度", "应当依法与其招用的外派人员订立劳动合同，按照合同约定向外派人员提供工作条件和支付报酬，履行用人单位义务"], "ans": [0, 1], "exp": "国务院于2017年修订的《对外承包工程管理条例》是规范对外承包工程，促进对外承包工程健康发展的重要法规。该条例主要规定如下：（1）对外承包工程的根本性要求：①应当维护国家利益和社会公共利益，保障外派人员的合法权益；②应当遵守工程项目所在国家或者地区的法律，信守合同，尊重当地的风俗习惯，注重生态环境保护，促进当地经济社会发展。（2）对外承包工程单位应履行的基本义务：①应当与境外工程项目发包人订立书面合同，明确双方的权利和义务，并按照合同约定履行义务；②应当加强对工程质量和安全生产的管理，建立、健全并严格执行工程质量和安全生产管理的规章制度；③应当依法与其招用的外派人员订立劳动合同，按照合同约定向外派人员提供工作条件和支付报酬，履行用人单位义务。"}, {"id": 1026, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "国际工程承包企业涉及工程的税种主要有流转税、收益税、财产税、杂项税。其中流转税主要包括（　　）等。", "opts": ["营业税", "增值税", "消费税", "进口关税", "公司所得税"], "ans": [0, 1, 2, 3], "exp": "国际工程承包企业涉及工程的税种主要有流转税、收益税、财产税、杂项税。其中流转税主要包括营业税、增值税、消费税、进口关税、许可证税、印花税等；收益税主要包括公司所得税、个人所得税；财产税主要包括固定资产税、房产税、土地使用税等；杂项税是以各种名目征收的税费，或者以摊派名义征收的费用。"}, {"id": 1027, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "国际工程承包企业涉及工程的税种主要有流转税、收益税、财产税、杂项税。其中杂项税主要包括（　　）等。", "opts": ["以各种名目征收的税费", "以摊派名义征收的费用", "消费税", "个人所得税", "公司所得税"], "ans": [0, 1], "exp": "国际工程承包企业涉及工程的税种主要有流转税、收益税、财产税、杂项税。其中流转税主要包括营业税、增值税、消费税、进口关税、许可证税、印花税等；收益税主要包括公司所得税、个人所得税；财产税主要包括固定资产税、房产税、土地使用税等；杂项税是以各种名目征收的税费，或者以摊派名义征收的费用。"}, {"id": 1028, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "（　　）应当建立对外承包工程安全风险评估机制。", "opts": ["国务院商务主管部门", "国家安全部", "国家建设厅", "国家工商局"], "ans": [0], "exp": "国务院商务主管部门应当会同国务院有关部门建立对外承包工程安全风险评估机制。"}, {"id": 1029, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "以下有关国际工程承包商面临的风险说法，不正确的是（　　）。", "opts": ["地区保护主义与歧视性政策造成的风险是社会风险", "国际市场风险加剧属于市场风险", "宗教纷争和语言差异属于社会风险", "当地复杂的地质条件对项目产生的影响是自然风险"], "ans": [0], "exp": "地区保护主义与歧视性政策对工程项目产生的影响属于政治风险。"}, {"id": 1030, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "国际工程项目的法律风险不包括（　　）。", "opts": ["市场准入制度", "行政许可制度", "外汇管制", "施工方案"], "ans": [3], "exp": "施工方案风险属于技术风险。"}, {"id": 1031, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "汇率风险发生的基本要素是（　　）。", "opts": ["兑换机构", "外币", "政局稳定", "时间", "本币"], "ans": [1, 3, 4], "exp": "本币、外币和时间是汇率风险发生的三个基本要素，中国企业需充分考虑收汇及汇率变动风险。"}, {"id": 1032, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "国际工程承包商面临的经济风险包括所在国（　　）。", "opts": ["经济政策", "产业结构", "经济不稳定性", "通货膨胀", "资金紧缺"], "ans": [0, 1, 2, 3], "exp": "国际工程承包受项目所在国当地经济体制、经济结构、国民收入、发展水平、宏观政策等经济环境影响，国际工程承包商面临的经济风险包括所在国经济政策、产业结构、经济不稳定性、通货膨胀、汇率波动、利率变化等方面。近年来，全球经济增速放缓、复苏乏力，贸易投资环境恶化，各国主要央行加速收紧货币政策，新兴市场及发展中国家汇率波动加剧，汇兑风险攀升。不少国家经济低迷、财力拮据、资金短缺，融资成本上升，企业利润空间缩小。中国国际工程承包企业必须密切关注并做出研判。"}, {"id": 1033, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "ESG评价指标体系中环境评价指标包括（　　）。", "opts": ["企业的能源使用", "碳及温室气体排放", "水资源管理", "废物污染及管理政策", "性别及性别平衡政策"], "ans": [0, 1, 2, 3], "exp": "环境（E）评价指标：评估企业在经营过程中对环境的影响，包括企业的能源使用、碳及温室气体排放、水资源管理、废物污染及管理政策、环境治理、自然资源使用和管理政策、生物多样性、合规性、员工环境意识、绿色采购政策、节能减排措施、环境成本核算、绿色技术等。"}, {"id": 1034, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "ESG评价指标体系中社会评价指标包括（　　）。", "opts": ["企业的能源使用", "管理培训", "健康安全", "人权政策及违反情况", "性别及性别平衡政策"], "ans": [1, 2, 3, 4], "exp": "社会（S）评价指标：评估企业对所在社区、员工和相关利益相关者的义务履行程度，包括性别及性别平衡政策、人权政策及违反情况、健康安全、管理培训、产品责任、产品质量、企业员工福利、劳动关系、供应链责任管理、扶贫济困、公益慈善等。"}, {"id": 1035, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "ESG评价指标体系中治理（G）评价指标包括（　　）。", "opts": ["董事会运作", "股东权利", "公司透明度", "内部控制", "扶贫济困"], "ans": [0, 1, 2, 3], "exp": "治理（G）评价指标：评估企业管理结构的稳健性、透明度和合规性，包括董事会运作、股东权利、公司透明度、内部控制、公司治理、贪污受贿政策、反不公平竞争、风险管理、道德行为准则、合规性、组织结构、投资者关系等。"}, {"id": 1036, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "对于要在开工后才由业主研究决定是否实施的暂定项，对大概率要实施的暂定项单价可考虑（　　）。", "opts": ["低报", "适当低报", "高报", "适当高报"], "ans": [3], "exp": "对于要在开工后才由业主研究决定是否实施的暂定项，对大概率要实施的暂定项单价可考虑适当高报。"}, {"id": 1037, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "FIDIC出版的《施工合同条件》又称（　　）。", "opts": ["“新红皮书”", "“银皮书”", "“红皮书”", "“绿皮书”"], "ans": [0], "exp": "FIDIC出版的《施工合同条件》又称“新红皮书”。"}, {"id": 1038, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "工程师应在开工日期前至少（　　）天向承包商发出开工日期的通知。", "opts": ["7", "14", "21", "24"], "ans": [1], "exp": "工程师应在开工日期前至少14天向承包商发出开工日期的通知。"}, {"id": 1039, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "AIA系列合同条件主要用于（　　）。", "opts": ["私营的房屋建筑工程", "民宅", "公共建筑", "高层建筑"], "ans": [0], "exp": "AIA系列合同条件主要用于私营的房屋建筑工程。"}, {"id": 1040, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "（　　）是做好投标报价的基础和前提。", "opts": ["工程量的确认和复核", "施工方案的比选和制定", "合同价款的确认", "项目环境的调查"], "ans": [0], "exp": "工程量的确认和复核是做好投标报价的基础和前提。"}, {"id": 1041, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "以下关于不平衡报价的说法，错误的是（　　）。", "opts": ["在采用工程量清单模式，将根据实际完成的工程量进行结算的情况下，考虑工程量变化对结算金额的影响，预计实际工程量会比报价清单中工程量增加的项目，单价可适当高报", "考虑货币的时间价值和支付风险，项目前期款项支付时间早的工程内容（如土方开挖、基础工程）可以偏高报价", "对于不计入标价的或仅有内容项而没有工程数量的，可以适当偏低报价", "对于要在开工后才由业主研究决定是否实施的暂定项，对大概率要实施的暂定项单价可考虑适当高报"], "ans": [2], "exp": "（1）在采用工程量清单模式，将根据实际完成的工程量进行结算的情况下，考虑工程量变化对结算金额的影响，预计实际工程量会比报价清单中工程量增加的项目，单价可适当高报；反之，预计实际工程量会比清单中减少的，单价可适当低报，以在结算时获得更大收益。（2）考虑货币的时间价值和支付风险，项目前期款项支付时间早的工程内容（如土方开挖、基础工程）可以偏高报价；项目后期实施的工程内容（如装饰装修、试运行）可以偏低报价。（3）对于不计入标价的或仅有内容项而没有工程数量的，可以适当偏高报价，如计日工、推荐的备品备件等的报价。（4）对于要在开工后才由业主研究决定是否实施的暂定项，对大概率要实施的暂定项单价可考虑适当高报，对大概率不实施的暂定项单价可适当低报。"}, {"id": 1042, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "FIDIC系列合同中，下列选项中适用于《施工合同条件》的是（　　）。", "opts": ["承包商以交钥匙方式进行设计、采购和施工的总承包", "投资金额相对较小、工期短或技术简单，或重复性的工程项目施工", "传统的“设计一招标一建造”模式，承包商按照业主提供的设计进行施工", "承包商按发包人设计进行施工的房屋建筑和土木工程的施工项目"], "ans": [2], "exp": "《施工合同条件》（1999年第1版、2017年第2版），又称“新红皮书”，适用于各类大型或较复杂的工程或房建项目，尤其适用于传统的“设计一招标一建造”模式，承包商按照业主提供的设计进行施工，采用工程量清单计价，业主委托工程师管理合同，由工程师监管施工并签证支付。"}, {"id": 1043, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "FIDIC合同系列中，《施工合同条件》中，如果承包商在被要求对测量记录进行审查后（　　）天内未向工程师发出不同意通知，则视为记录准确予以认可。", "opts": ["7", "10", "14", "28"], "ans": [2], "exp": "如承包商参加现场测量工作或检查测量记录后14天内未向工程师发出不同意通知，则视为已认可测量记录的准确性。"}, {"id": 1044, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "FIDIC系列中，《施工合同条件》中，如果承包商提交接收申请28天内，工程师仍未答复，则若工程达到规定条件，即视为工程已在工程师收到承包商的申请通知后的第（　　）天竣工，且被视为已颁发了接收证书。", "opts": ["7", "14", "24", "28"], "ans": [1], "exp": "如果工程师在收到承包商申请通知后的28天内既未签发接收证书、也未拒绝承包商的申请，若工程已满足要求的条件，则应视为该工程已在工程师收到承包商的申请通知后的第14天竣工，且视为接收证书已经签发。"}, {"id": 1045, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "如果任一方对DAAB的决定不满，可以在收到该决定通知后（　　）天内，将其不满向另一方发出通知。", "opts": ["7", "14", "28", "42"], "ans": [2], "exp": "如果任一方对DAAB的决定不满，可以在收到该决定通知后28天内，将其不满向另一方发出通知。如双方均未发出表示不满的通知，则该决定应作为最终的对双方有约束力的决定。"}, {"id": 1046, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "FIDIC系列中《施工合同条件》，工程师在收到承包商申请通知后（　　）天内，应向承包商颁发接收证书。", "opts": ["7", "14", "24", "28"], "ans": [3], "exp": "工程师在收到承包商申请通知后28天内，应向承包商颁发接收证书，注明工程或分项工程按照合同要求竣工的日期，对工程或分项工程预期使用无实质影响的少量收尾工作和缺陷（直到或当收尾工作和缺陷修补完成时）除外。"}, {"id": 1047, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "FIDIC系列中，《施工合同条件》中，承包商可在其认为工程即将竣工并做好接收准备的日期前不少于（　　）天，向工程师发出申请接收证书的通知。", "opts": ["28", "14", "10", "7"], "ans": [1], "exp": "承包商可在其认为工程即将竣工并做好接收准备的日期前不少于14天，向工程师发出申请接收证书的通知。如工程分成若干个分项工程，承包商可类似地为每个分项工程申请接收证书。"}, {"id": 1048, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "FIDIC系列合同，《施工合同条件》中承包商的试验，工程师应提前至少（　　）小时将其参加试验的意向通知承包商。", "opts": ["12", "24", "48", "72"], "ans": [3], "exp": "工程师应提前至少72小时将其参加试验的意向通知承包商。如果工程师未在商定的时间和地点参加试验，除非工程师另有指令，承包商可自行进行试验，并视为是在工程师在场的情况下进行的。"}, {"id": 1049, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "FIDIC系列合同中，在《施工合同条件》模式下，项目主要参与方不包括（　　）。", "opts": ["业主", "工程师", "分包商", "承包商"], "ans": [2], "exp": "在FIDIC施工合同条件下，项目主要参与方为业主、承包商和工程师。"}, {"id": 1050, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "FIDIC系列合同，《施工合同条件》中，不属于业主的主要责任和义务的是（　　）。", "opts": ["委托任命工程师代表业主进行合同管理", "办理工程保险", "做好项目资金安排", "在必要时指定专业分包商和供应商"], "ans": [1], "exp": "业主的主要责任和义务：（1）委托任命工程师代表业主进行合同管理；（2）承担大部分或全部设计工作并及时向承包商提供设计图纸；（3）给予承包商现场占有权；（4）向承包商及时提供信息、指示、同意、批准及发出通知；（5）避免可能干扰或阻碍工程进展的行为；（6）提供业主方应提供的保障、物资；（7）在必要时指定专业分包商和供应商；（8）做好项目资金安排；（9）在承包商完成相应工作时按时支付工程款；（10）协助承包商申办工程所在国法律要求的相关许可等。"}, {"id": 1051, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "FIDIC系列合同，《施工合同条件》中，属于工程师的主要责任和义务的是（　　）。", "opts": ["工程师有权修改合同，有权解除任何一方依照合同具有的职责、义务或责任", "做好项目资金安排", "给予承包商现场占有权", "确定确认合同款支付、工程变更、试验、验收等专业事项等"], "ans": [3], "exp": "工程师的主要责任和义务：（1）执行业主委托的施工项目质量、进度、费用、安全、环境等目标监控和日常管理工作，包括协调、联系、指示、批准和决定等；（2）确定确认合同款支付、工程变更、试验、验收等专业事项等；（3）工程师还可以向助手指派任务和委托部分权力，但工程师无权修改合同，无权解除任何一方依照合同具有的职责、义务或责任。"}, {"id": 1052, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "根据FIDIC施工合同条件，在接收证书颁发前业主使用了工程的任何部分，该部分视为自（　　）起已被业主接收。", "opts": ["开始使用之日前28天", "开始使用之日", "计划颁发接收证书之日", "实际颁发接收证书之日"], "ans": [1], "exp": "在接收证书颁发前业主确实使用了工程的任何部分，该使用的部分应视为自开始使用之日起已被业主接收。"}, {"id": 1053, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "银皮书合同文件的组成中，按照优先次序排序，通用合同条件后面是（　　）。", "opts": ["专用条件", "通用条件", "合同协议书", "业主要求"], "ans": [3], "exp": "银皮书合同文件组成及其优先解释顺序如下：（1）合同协议书；（2）专用条件；（3）通用条件；（4）业主要求；（5）明细表；（6）投标书；（7）联合体保证（如投标人为联合体）；（8）其他组成合同的文件。"}, {"id": 1054, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "《设计采购施工（EPC）/交钥匙合同条件》中，合同文件的组成及其优先次序说法正确的是（　　）。", "opts": ["明细表优于投标书", "投标书优于通用条件", "通用条件优于专用条件", "专用条件优于合同协议书"], "ans": [0], "exp": "银皮书合同文件的组成及其优先次序是： （1）合同协议书；（2）专用条件；（3）通用条件；（4）业主要求；（5）明细表；（6）投标书；（7）联合体保证（如投标人为联合体）；（8）其他组成合同的文件。"}, {"id": 1055, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "《设计采购施工（EPC）/交钥匙合同条件》中，如果业主方希望替换任何已任命的业主代表，应在不少于（　　）天前将替换人员的姓名、地址、职责、权力及任命日期通知给承包商。", "opts": ["7", "14", "28", "42"], "ans": [1], "exp": "业主代表应行使业主方授予的权力，履行职责、完成受托的任务，除非业主方另行通知，业主代表应被认为具有业主方根据合同规定的全部权利（由业主方终止合同的权力除外），如果业主方希望替换任何已任命的业主代表，应在不少于14天前将替换人员的姓名、地址、职责、权力及任命日期通知给承包商。承包商有权对替换人选提出反对，但需要给出合理的理由。"}, {"id": 1056, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "根据NEC《工程施工合同》，对于签订合同时价格已经确定的合同适用于（　　）。", "opts": ["目标合同", "标价合同", "管理合同", "成本补偿合同"], "ans": [1], "exp": "标价合同适用于在签订合同时价格已经确定的合同；目标合同适用于在签订合同时工程范围尚未确定，合同双方先约定合同的目标成本，当实际费用节支或超支时，双方按合同约定的方式分摊；成本补偿合同适用于工程范围很不确定且急需尽早开工的项目，工程成本部分实报实销，再根据合同确定承包商酬金的取值比例或计算方法；管理合同适用于施工管理承包，管理承包商与业主签订管理承包合同，但不直接承担施工任务，以管理费用和估算的分包合同总价报价，管理承包商与若干施工分包商订立分包合同，分包合同费用由业主支付。"}, {"id": 1057, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "（　　）是NEC系列合同编制的重要基础。", "opts": ["工程施工合同", "专业服务合同", "工程设计与施工简要合同", "裁决人合同"], "ans": [0], "exp": "工程施工合同（ECC）是NEC系列合同编制的重要基础，具有选项形式多样、结构组成灵活、条款用词简洁、易于通读理解、操作性强的特点，得到广泛应用。"}, {"id": 1058, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "（　　）是工程施工合同的基本构架。", "opts": ["核心条款", "主要选项条款", "次要选项条款", "基本条款"], "ans": [0], "exp": "核心条款是施工合同的主要共性条款，包括：总则；承包商的主要责任；工期；测试和缺陷；付款；补偿事件；所有权；风险和保险；争端和合同终止等9条，构成了施工合同的基本构架，适用于施工承包、设计施工总承包和交钥匙工程承包等不同模式。"}, {"id": 1059, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "在NEC合同文本中，目标合同（　　）。", "opts": ["适用于签订合同时价格已经确定的合同", "适用于在签订合同时工程范围尚未确定的项目", "适用于工程范围的界定尚不明确，甚至用目标合同为基础也不够充分，而且又要求尽早动工的情况", "适用于施工管理承包，管理承包商与雇主签订管理承包合同"], "ans": [1], "exp": "目标合同适用于在签订合同时工程范围尚未确定，合同双方先约定合同的目标成本，当实际费用节支或超支时，双方按合同约定的方式分摊。"}, {"id": 1060, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "NEC合同文本是由（　　）编制的。", "opts": ["国际咨询工程师联合会", "英国土木工程师学会", "美国建筑师学会", "中国建筑工程学会"], "ans": [1], "exp": "FIDIC是指国际咨询工程师联合会编制的，NEC是由英国土木工程师学会编制，AIA系列合同是由美国建筑师学会编制的。"}, {"id": 1061, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "ECC合同，管理承包商与若干施工分包商订立分包合同，确定的分包合同费用由（　　）支付。", "opts": ["业主", "承包商", "工程师", "监理人"], "ans": [0], "exp": "管理承包商与业主签订管理承包合同，但不直接承担施工任务，以管理费用和估算的分包合同总价报价，管理承包商与若干施工分包商订立分包合同，分包合同费用由业主支付。"}, {"id": 1062, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "工程施工合同（ECC）中，（　　）是对核心条款的补充和细化。", "opts": ["基础条款", "次要选项条款", "主要选项条款", "合同条款"], "ans": [2], "exp": "主要选项条款是对核心条款的补充和细化，使用者应根据需要选择适用的条款。"}, {"id": 1063, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "根据NEC《工程施工合同》，选项F属于（　　）。", "opts": ["目标合同", "标价合同", "管理合同", "成本补偿合同"], "ans": [2], "exp": "选项A：带有分项工程表的标价合同；选项B：带有工程量清单的标价合同；选项C：带有分项工程表的目标合同；选项D：带有工程量清单的目标合同；选项E：成本补偿合同；选项F：管理合同。"}, {"id": 1064, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "single", "q": "美国建筑师学会（AIA）编制的系列标准合同文本不适用于（　　）。", "opts": ["非传统模式", "CM模式", "设计—建造模式", "集成化管理模式"], "ans": [0], "exp": "AIA系列合同条件主要用于私营的房屋建筑工程，该合同条件下确定了传统模式、设计—建造模式、CM模式和集成化管理模式等不同类型的工程管理模式。"}, {"id": 1065, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "以下属于投标前社会经济环境调查的是（　　）。", "opts": ["业主资信", "地形", "当地生活条件", "当地通货膨胀率", "物资设备购置租赁条件"], "ans": [2, 3, 4], "exp": "A选项属于业主方和竞争者调查；B选项属于施工现场及周边地区的环境考察。"}, {"id": 1066, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "FIDIC系列合同，《施工合同条件》中属于业主主要责任和义务的是（　　）。", "opts": ["提交竣工文件以及操作和维修手册", "承担大部分或全部设计工作并及时向承包商提供设计图纸", "按照合同规定及工程师的指示对工程进行设计、施工和竣工并修补缺陷", "向承包商及时提供信息、指示、同意、批准及发出通知", "委托任命工程师代表业主进行合同管理"], "ans": [1, 3, 4], "exp": "业主的主要责任和义务：（1）委托任命工程师代表业主进行合同管理；（2）承担大部分或全部设计工作并及时向承包商提供设计图纸；（3）给予承包商现场占有权；（4）向承包商及时提供信息、指示、同意、批准及发出通知；（5）避免可能干扰或阻碍工程进展的行为；（6）提供业主方应提供的保障、物资；（7）在必要时指定专业分包商和供应商；（8）做好项目资金安排；（9）在承包商完成相应工作时按时支付工程款；（10）协助承包商申办工程所在国法律要求的相关许可等。"}, {"id": 1067, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "FIDIC系列合同，《施工合同条件》中属于承包商的主要责任和义务的有（　　）。", "opts": ["应按照合同规定及工程师的指示对工程进行设计、施工和竣工并修补缺陷", "提交竣工文件以及操作和维修手册", "为工程的设计、施工、竣工及修补缺陷提供所需的设备、文件、人员、物资和服务", "提供履约担保", "委托任命工程师代表业主进行合同管理"], "ans": [0, 1, 2, 3], "exp": "承包商的主要责任和义务：（1）按照合同规定及工程师的指示对工程进行设计、施工和竣工并修补缺陷；（2）为工程的设计、施工、竣工及修补缺陷提供所需的设备、文件、人员、物资和服务；（3）对所有现场作业和施工方法的完备性、稳定性和安全性负责，并保护环境；（4）提供工程执行和竣工所需的各类计划、实施情况、意见和通知；（5）提交竣工文件以及操作和维修手册；（6）提供履约担保；（7）办理工程保险；（8）履行承包商日常管理职能等。"}, {"id": 1068, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "FIDIC系列合同，《施工合同条件》中关于修补工作说法正确的是（　　）。", "opts": ["实施任何因不可预见事件导致的为保护工程安全而急需的修补工作", "对不符合合同规定的任何工作进行返工", "如果是业主方原因等导致的，承包商无权提出索赔", "将不符合合同规定的永久设备或材料从现场移走并进行更换", "实施任何因事故导致的为保护工程安全而急需的修补工作"], "ans": [0, 1, 3, 4], "exp": "修补工作。即使工程师先前已经进行了检查、检验或测试，在签发工程接收证书之前的任何时候，工程师仍可以指示承包商：①将不符合合同规定的永久设备或材料进行修理修补或从现场移走并更换；②对不符合合同规定的任何工作进行修理修补或移除并返工；③实施任何因事故、不可预见事件等导致的为保护工程安全而急需的修补工作。"}, {"id": 1069, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "业主选择EPC合同多有考虑的内容包括（　　）。", "opts": ["严格竣工检验以保证工程完工的质量，使项目发挥预期效益", "业主经验丰富，可以掌握承包商的整个项目质量", "项目风险大部分由承包商承担", "期望工期确定，使项目能在预定的时间投产运行", "期望工程总造价固定、不超过投资限额"], "ans": [0, 2, 3, 4], "exp": "业主选择EPC合同多有如下考虑：期望工程总造价固定、不超过投资限额；期望工期确定，使项目能在预定的时间投产运行；业主缺乏经验或人员有限，需要一揽子将项目发包给一个承包商，由其负责组织完成整个项目；项目风险大部分由承包商承担；为实现设计、采购、施工的深度交叉及协调配合提供条件；业主采用比较宽松的管理方式，按里程碑方式支付；严格竣工检验以保证工程完工的质量，使项目发挥预期效益。"}, {"id": 1070, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "根据银皮书，承包商有权提出要求延长竣工时间的索赔的情形有（　　）。", "opts": ["因流行病或政府行为导致的由业主提供的材料的不可预见的短缺", "根据合同条件承包商有权获得工期顺延", "异常不利的气候条件", "由业主或在现场的业主的其他承包商造成的延误或阻碍", "根据合同变更的规定"], "ans": [0, 1, 3, 4], "exp": "根据银皮书，承包商有权提出要求延长竣工时间的索赔的情形只有下列3种：（1）根据合同变更的规定；（2）根据合同条件承包商有权获得竣工时间的延长；（3）由业主或在现场的业主的其他承包商造成的延误或阻碍。（或因流行病或政府行为导致的由业主提供的材料的不可预见的短缺）。"}, {"id": 1071, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "《设计采购施工（EPC）/交钥匙合同条件》中，属于业主的主要责任和义务的有（　　）。", "opts": ["建立质量保证体系", "为承包商提供协助和配合", "审核承包商文件", "准备并负责由业主提供的材料和设备", "发出变更通知"], "ans": [1, 2, 3, 4], "exp": "业主责任和义务：向承包商提供现场地形、地下、水文、气候及环境条件的数据资料；向承包商提供现场进入权和占用权；委派业主代表；做好项目资金安排；向承包商支付工程款；向承包商发出根据合同履行义务所需要的指示；发出变更通知；审核承包商文件；为承包商提供协助和配合；准备并负责由业主提供的材料和设备；签发工程接收证书等。"}, {"id": 1072, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "《设计采购施工（EPC）/交钥匙合同条件》中，承包商的主要责任和义务包括（　　）。", "opts": ["负责承包商设备", "发出变更通知", "办理工程保险", "对业主人员进行工程操作和维护培训", "负责现场保安"], "ans": [0, 2, 3, 4], "exp": "承包商责任和义务：按照合同进行设计、实施和完成工程，并修补工程中的缺陷；交付工程应满足合同规定的预期目标；应提供合同规定的生产设备和承包商文件，以及设计、施工、竣工和修补缺陷所需的人员、物资和服务；为工程的完备性、稳定性和安全性承担责任；提供履约保证；负责核实和解释现场数据；遵守安全程序；保护环境；建立质量保证体系；编制提交月进度报告；办理工程保险；负责承包商设备；负责现场保安；照管工程和货物；编制和提交竣工文件；对业主人员进行工程操作和维护培训等。"}, {"id": 1073, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "在FIDIC设计采购施工EPC合同条件中，以下（　　）属于合同文件的内容。", "opts": ["合同协议书", "中标通知书", "业主要求", "明细表", "投标书"], "ans": [0, 2, 3, 4], "exp": "合同文件组成及其优先解释顺序如下：合同协议书、专用条件、通用条件、业主要求、明细表、投标书、联合体保证（如投标人为联合体）、其他组成合同的文件。"}, {"id": 1074, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "下列（　　）属于NEC的合同系列。", "opts": ["工程施工合同", "专业服务合同", "工程施工分包合同", "裁决人合同", "不定期合同"], "ans": [0, 1, 2, 3], "exp": "NEC系列合同条件主要包括：（1）工程施工合同（ECC），用于业主和总承包商之间的主合同，也被用于总包管理的一揽子合同。（2）工程施工分包合同，用于总承包商与分包商之间的合同。（3）专业服务合同，用于业主与项目管理人、监理人、设计人、测量师、律师、社区关系咨询师等之间的合同。（4）裁决人合同，用于业主和承包商共同与裁决人订立的合同，也可用于分包和专业服务合同。"}, {"id": 1075, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "下列（　　）属于工程施工合同的核心条款。", "opts": ["总则", "雇主的主要责任", "工期", "测试和缺陷", "所有权"], "ans": [0, 2, 3, 4], "exp": "核心条款是施工合同的主要共性条款，包括：总则；承包商的主要责任；工期；测试和缺陷；付款；补偿事件；所有权；风险和保险；争端和合同终止等9条。"}, {"id": 1076, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "下列工程施工合同主要选项条款说法正确的有（　　）。", "opts": ["选项A：带有分项工程表的标价合同", "选项B：带有工程量清单的标价合同", "选项C：带有分项工程表的目标合同", "选项D：带有工程量清单的目标合同", "选项E：管理利润补偿合同"], "ans": [0, 1, 2, 3], "exp": "主要选项条款是对核心条款的补充和细化，使用者应根据需要选择适用的条款。对于主要选项条款，可在如下6个不同合同计价模式中选择一个适用模式（且只能选择一项），将其纳入到合同条款之中：选项A：带有分项工程表的标价合同；选项B：带有工程量清单的标价合同；选项C：带有分项工程表的目标合同；选项D：带有工程量清单的目标合同；选项E：成本补偿合同；选项F：管理合同。"}, {"id": 1077, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "下列（　　）属于工程施工合同文本次要选项条款。", "opts": ["通货膨胀引起的价格调整", "母公司担保", "按时竣工奖金", "“伙伴关系”协议", "保留金"], "ans": [0, 1, 4], "exp": "在主要选项条款之后，ECC还提供了十多项可供选择的次要选项条款，包括履约保证；母公司担保；支付承包商预付款；多种货币；区段竣工；承包商对其设计所承担的责任只限运用合理的技术和精心设计；通货膨胀引起的价格调整；保留金；提前竣工奖金；工期延误赔偿费；功能欠佳赔偿费；法律的变化等。"}, {"id": 1078, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "下列关于美国建筑师学会（AIA）编制的系列标准合同文本的说法正确的有（　）。", "opts": ["《施工合同通用条件》（A201）是施工期间所涉及各类合同文件的核心文件", "A系列：业主与施工承包商、CM承包商、供应商之间的合同，以及总承包商与分包商之间合同的文本", "B系列：业主与建筑师之间合同的文本", "E系列：建筑师与专业咨询机构之间合同的文本", "D系列：建筑师行业的有关文件"], "ans": [0, 1, 2, 4], "exp": "AIA针对不同项目管理模式和合同各方关系颁布了多个系列的合同和文件，分为A至G系列：（1）A系列：业主与施工承包商、CM承包商、供应商，以及总承包商与分包商之间的标准合同文件；其中，A201《施工合同通用条件》是AIA系列合同中的核心文件，是业主与承包商订立承包合同的标准文本。（2）B系列：业主与建筑师之间的标准合同文件；（3）C系列：建筑师与专业咨询人员之间的标准合同文件；（4）D系列：建筑师行业内部使用的文件；（5）E系列：合同和办公管理中使用的文件；（6）F系列：财务管理报表；（7）G系列：建筑师企业与项目管理中使用的文件。"}, {"id": 1079, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "AIAC191合同包括IPD多方合同标准协议和附件，附件包括（　　）。", "opts": ["专业条款", "通用条款", "业主标准", "目标标准修正案", "项目法律描述"], "ans": [1, 2, 3, 4], "exp": "AIA发布了以C191合同条件为代表的系列IPD合同文件。AIAC191合同包括IPD多方合同标准协议和4个附件（通用条款、项目法律描述、业主标准、目标标准修正案），由业主、设计单位、承包商（还可包括供应商、分包商）共同签署一份合同（AIAC191），形成多方合同型IPD模式。"}, {"id": 1080, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "根据IPD合同条件，任何一方提出的争议应提交到由（　　）所组成的争议处理委员会协商解决。", "opts": ["业主", "设计单位", "承包商", "工程师", "项目中立人"], "ans": [0, 1, 2, 4], "exp": "在争端处理方面，该模式下任何一方提出的争议应提交到由业主、设计单位、承包商等参与方的高层代表和项目中立人所组成的争议处理委员会协商解决，项目中立人由参与各方共同指定。"}, {"id": 1081, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "AIAC191将整个项目实施过程分为8个阶段，其中包括（　　）。", "opts": ["概念阶段", "采购分包阶段", "准备阶段", "施工阶段", "机构审查阶段"], "ans": [0, 1, 3, 4], "exp": "AIAC191将整个项目实施过程分为如下8个阶段：概念阶段；标准设计阶段；详细设计阶段；执行文件阶段；机构审查阶段；采购分包阶段；施工阶段；竣工收尾阶段。"}, {"id": 1082, "source": "教材", "ch": 9, "year": null, "sourceLabel": "第9章", "type": "multi", "q": "资金风险主要是指承包商在国际工程中遭遇（　　）所引发的风险。", "opts": ["资金紧缺", "支付困难", "使用资金不平衡", "资金链断裂", "合同履行不当"], "ans": [0, 1, 2, 3], "exp": "资金风险主要是指承包商在国际工程中遭遇资金紧缺、支付困难、使用资金不平衡、资金链断裂所引发的风险。国际工程承包市场上有大量项目缺乏可靠融资渠道，业主方筹资困难、支付能力弱，在建项目还款困难、断贷、项目烂尾，承包商垫付大笔资金、承包商实际收益与预期收益明显偏离等。这些都给中国国际工程承包企业带来巨大风险。19．根据FIDIC《设计采购施工（EPC）／交钥匙工程合同条件》，对于符合要求的分包工作，承包商应在不少于28天前向业主通知的事项有（  ）。"}, {"id": 1083, "source": "教材", "ch": 10, "year": null, "sourceLabel": "第10章", "type": "single", "q": "建筑信息模型是指在（　　）内，对其物理和功能特性进行数字化表达。", "opts": ["建设工程全寿命期", "建设工程施工阶段", "建设工程决策阶段", "建设工程保修阶段"], "ans": [0], "exp": "建筑信息模型是指在建设工程全寿命期内，对其物理和功能特性进行数字化表达。"}, {"id": 1084, "source": "教材", "ch": 10, "year": null, "sourceLabel": "第10章", "type": "single", "q": "除对工程对象进行3D几何信息和拓扑关系的描述外，还包括完整的工程信息描述，这体现了（　　）。", "opts": ["模型操作的可视化", "模型信息的一致性", "模型信息的完备性", "模型信息的关联性"], "ans": [2], "exp": "除对工程对象进行3D几何信息和拓扑关系的描述外，还包括完整的工程信息描述，这体现了模型信息的完备性。"}, {"id": 1085, "source": "教材", "ch": 10, "year": null, "sourceLabel": "第10章", "type": "single", "q": "建筑信息模型中的信息可以随着工程建设不同阶段和变化而更新和调整，这体现了（　　）。", "opts": ["模型操作的可视化", "模型信息的一致性", "模型信息的动态性", "模型信息的关联性"], "ans": [2], "exp": "建筑信息模型中的信息可以随着工程建设不同阶段和变化而更新和调整，这体现了模型信息的动态性，"}, {"id": 1086, "source": "教材", "ch": 10, "year": null, "sourceLabel": "第10章", "type": "single", "q": "“模型深度等级”，通常用（　　）代表不同阶段的深度要求。", "opts": ["100~200", "100~300", "100~400", "100~500"], "ans": [3], "exp": "“模型深度等级”，通常用100~500代表不同阶段的深度要求。"}, {"id": 1087, "source": "教材", "ch": 10, "year": null, "sourceLabel": "第10章", "type": "single", "q": "实现建设工程项目管理数智化的重要手段中，侧重于建造条件和场景的是（　　）。", "opts": ["建筑信息模型（BIM）", "智慧工地", "智能建造", "传统管理模式"], "ans": [1], "exp": "BIM侧重于建筑模型；智能建造侧重于建造过程和方式；智慧工地侧重于建造条件和场景。"}, {"id": 1088, "source": "教材", "ch": 10, "year": null, "sourceLabel": "第10章", "type": "single", "q": "下面部门或单位不可以作为BIM总协调方的是（　　）。", "opts": ["建设单位相关部门", "施工单位", "第三方咨询机构", "监理单位"], "ans": [3], "exp": "BIM总协调方可以为满足要求的建设单位相关部门、设计单位、施工单位或第三方咨询机构。"}, {"id": 1089, "source": "教材", "ch": 10, "year": null, "sourceLabel": "第10章", "type": "single", "q": "通过将BIM与施工进度计划相连接，将空间信息与时间信息整合在一个可视的（　　）模型中，可以直观、精确地反映整个工程施工过程。", "opts": ["2D", "3D", "4D", "5D"], "ans": [2], "exp": "通过将BIM与施工进度计划相连接，将空间信息与时间信息整合在一个可视的4D模型中（即3D+时间维度），可以直观、精确地反映整个工程施工过程。"}, {"id": 1090, "source": "教材", "ch": 10, "year": null, "sourceLabel": "第10章", "type": "multi", "q": "BIM技术应用中，以下属于建设单位职责的是（　　）。", "opts": ["制定项目BIM应用方案", "与各参与方签订合同", "接收通过审查的BIM交付模型", "确定项目的BIM应用目标", "配置BIM团队"], "ans": [1, 2, 3], "exp": "A选项是BIM总协调方职责；E选项是施工总承包单位职责。"}, {"id": 1091, "source": "教材", "ch": 10, "year": null, "sourceLabel": "第10章", "type": "multi", "q": "BIM技术应用中，以下属于专业分包单位职责的是（　　）。", "opts": ["利用BIM技术辅助现场管理施工，安排施工顺序节点", "组织开展对各参与方的BIM工作流程的培训", "组织策划项目BIM实施策略", "完善分包施工BIM模型", "接受BIM总协调方和施工总承包方的监督"], "ans": [0, 3, 4], "exp": "B选项是BIM总协调方职责；C选项是建设单位职责。"}, {"id": 1092, "source": "教材", "ch": 10, "year": null, "sourceLabel": "第10章", "type": "single", "q": "智慧工地运行应以（　　）为核心。", "opts": ["施工现场", "电脑场景", "施工场景", "机器人"], "ans": [2], "exp": "智慧工地运行应以施工场景为核心。"}, {"id": 1093, "source": "教材", "ch": 10, "year": null, "sourceLabel": "第10章", "type": "single", "q": "当前形势下，在智慧工地的机械设备管理模块的运行中，主要考虑对（　　）的运行进行智能监控。", "opts": ["塔式起重机和施工升降机", "施工机器人", "机械设备供应商", "混凝土运输车辆"], "ans": [0], "exp": "在智慧工地的机械设备管理模块的运行中，主要考虑对塔式起重机和施工升降机的运行进行智能监控。"}, {"id": 1094, "source": "教材", "ch": 10, "year": null, "sourceLabel": "第10章", "type": "single", "q": "（　　）是指智慧工地依赖于物联网、云计算、人工智能、大数据、移动互联网等先进的信息技术。", "opts": ["全面感知与数据收集", "技术驱动", "信息的共享和协作", "自动识别装置"], "ans": [1], "exp": "技术驱动：智慧工地依赖于物联网、云计算、人工智能、大数据、移动互联网等先进的信息技术。"}, {"id": 1095, "source": "教材", "ch": 10, "year": null, "sourceLabel": "第10章", "type": "multi", "q": "以下属于物资管理模块的运行数据是（　　）。", "opts": ["扬尘检测仪", "智能靠尺", "RFID芯片", "AI智能识别技术", "基础信息数据"], "ans": [2, 3, 4], "exp": "A选项属于环境与能耗管理模块的运行数据，B选项属于施工过程检测与监测管理模块的运行数据。"}, {"id": 1096, "source": "教材", "ch": 10, "year": null, "sourceLabel": "第10章", "type": "multi", "q": "智能建造的基本特征是（　　）。", "opts": ["应以实现数字化集成设计、精益化生产施工、工业化组织管理为核心", "应以数智化管控平台和建筑机器人开发应用为着力点", "应以实现数字化集成设计、精益化生产施工、工业化组织管理为着力点", "应以新一代信息技术融合应用为基础", "应以新一代经济技术融合应用为基础"], "ans": [0, 1, 3], "exp": "C选项错误，应以数智化管控平台和建筑机器人开发应用为着力点；E选项错误，应以新一代信息技术融合应用为基础。"}, {"id": 1097, "source": "教材", "ch": 10, "year": null, "sourceLabel": "第10章", "type": "multi", "q": "（　　）是智能建造的重要支撑和核心内容。", "opts": ["智能机器人", "建筑机器人", "AI管控平台", "数智化管控网络", "数智化管控平台"], "ans": [1, 4], "exp": "数智化管控平台和建筑机器人是智能建造的重要支撑和核心内容。"}, {"id": 1098, "source": "教材", "ch": 10, "year": null, "sourceLabel": "第10章", "type": "multi", "q": "以下属于智能建造重点任务的是（　　）。", "opts": ["推行一体化集成设计", "推行平行发承包模式", "推动科技成果学术研究", "推动新一代信息技术与建筑工业化技术协同发展", "加快突破部品部件现代工艺制造"], "ans": [0, 3, 4], "exp": "B选项正确表述应该是：推行一体化集成设计；C选项正确表述应该是：推动科技成果转化。"}, {"id": 1099, "source": "教材", "ch": 10, "year": null, "sourceLabel": "第10章", "type": "multi", "q": "智慧工地总体架构，主要可分为（　　）三个层次，每一层都有其特定的功能和责任，共同构成了一个高效、智能的工地管理系统。", "opts": ["感知层", "终端层", "网络层", "应用层", "监控层"], "ans": [0, 2, 3], "exp": "智慧工地总体架构主要可分为三个层次：感知层、网络层、应用层。"}, {"id": 1100, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "安全生产管理预警体系运行中，“找出诸多致灾因素中危险性最高、危险程度最严重的主要因素，并对其成因进行分析”属于（　　）环节的工作。", "opts": ["诊断", "监测", "识别", "评价"], "ans": [0], "exp": "诊断：对已被识别的各种事故现象，进行成因过程的分析和发展趋势预测。诊断的主要任务是在诸多致灾因素中找出危险性最高、危险程度最严重的主要因素，并对其成因进行分析，对发展过程及可能的发展趋势进行准确定量的描述。诊断的工具是企业特性和行业安全生产共性相统一的评价指标体系。"}, {"id": 1101, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "在进度控制中，缺乏动态控制观念的表现是（　　）。", "opts": ["同一项目不同进度计划之间的关联性不够", "不重视进度计划的比选", "不重视进度计划的调整", "不注意分析影响进度的风险"], "ans": [2], "exp": "建设工程项目进度控制在管理观念方面存在的问题：①缺乏进度计划系统的观念：分别编制各种独立而互不联系的计划，形成不了计划系统；②缺乏动态控制的观念：只重视计划的编制，而不重视及时地进行计划的动态调整。"}, {"id": 1102, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "关于固定单价合同的说法，正确的是（　　）。", "opts": ["当通货膨胀达到一定水平时，可对单价进行调整", "当国家政策发生变化时，可对单价进行调整", "当实际工程量发生较大变化时，可对单价进行调整", "无论发生哪些影响价格的因素都不对单价进行调整"], "ans": [3], "exp": "固定单价合同条件下，无论发生哪些影响价格的因素都不对单价进行调整，因而对承包商而言就存在一定的风险。"}, {"id": 1103, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "某分项工程某月计划工程量为3200m2，计划单价为15元/m2，月末核定实际完成工程量为2800m2，实际单价为20元/m2，则该分项工程的已完工作预算费用（BCWP）是（　　）元。", "opts": ["48000", "42000", "56000", "64000"], "ans": [1], "exp": "已完工作预算费用（BCWP）=实际完成工程量×计划单价=2800×15=42000（元）。"}, {"id": 1104, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "与单价合同相比较，总价合同的特点是（　　）。", "opts": ["发包人的协调工作量大", "发包人可以缩短招标准备时间", "承包人的风险较小", "在施工进度上能调动承包人的积极性"], "ans": [3], "exp": "总价合同的特点是：①发包单位可以在报价竞争状态下确定项目的总造价，可以较早确定或者预测工程成本。②业主的风险较小，承包人将承担较多的风险。③评标时易于迅速确定最低报价的投标人。④在施工进度上能极大地调动承包人的积极性。⑤发包单位能更容易、更有把握地对项目进行控制。⑥必须完整而明确地规定承包人的工作。⑦必须将设计和施工方面的变化控制在最小限度内。"}, {"id": 1105, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "在领取施工许可证或者开工报告前，按照国家有关规定办理工程质量监督手续的是（　　）。", "opts": ["设计方", "业主方", "施工方", "监理方"], "ans": [1], "exp": "建设单位在领取施工许可证或者开工报告前，应当按照国家有关规定办理工程质量监督手续。"}, {"id": 1106, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "绘制时间-成本累积曲线的步骤中，紧接“计算规定时间t计划累计支出的成本额”之后的工作是（　　）。", "opts": ["在时标网络图上，按时间编制成本支出计划", "确定工程项目进度计划，编制进度计划的横道图", "绘制S形曲线", "计算单位时间的成本"], "ans": [2], "exp": "时间-成本累积曲线的绘制步骤如下：①确定工程项目进度计划，编制进度计划的横道图；②根据每单位时间内完成的实物工程量或投入的人力、物力和财力，计算单位时间（月或旬）的成本，在时标网络图上按时间编制成本支出计划；③计算规定时间t计划累计支出的成本额；④按各规定时间的值，绘制S形曲线。"}, {"id": 1107, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "施工质量事故的调查处理程序包括：①事故调查；②事故原因分析；③事故处理；④事故处理的鉴定验收；⑤制定事故处理的技术方案。正确的程序是（　　）。", "opts": ["①-②-③-④-⑤", "②-①-③-④-⑤", "④-②-⑤-①-③", "①-②-⑤-③-④"], "ans": [3], "exp": "施工质量事故的调查处理程序为：事故调查；事故原因分析；制定事故处理的技术方案；事故处理；事故处理的鉴定验收。"}, {"id": 1108, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "下列合同实施偏差的调整措施中，属于组织措施的是（　　）。", "opts": ["变更技术方案", "调整工作流程", "增加投入", "签订附加协议"], "ans": [1], "exp": "A选项属于技术措施；C选项属于经济措施；D选项属于合同措施。"}, {"id": 1109, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "某施工单位于2020年6月为订立某项目建造合同共发生差旅费、投标费50万元，该项目于2021年6月完成，工程完工时共发生人工费700万元，差旅费5万元，项目管理人员工资98万元，材料采购及保管费15万元。根据《财政部关于印发〈企业产品成本核算制度（试行）〉的通知》，应计入直接费用的是（　　）万元。", "opts": ["770", "765", "798", "813"], "ans": [1], "exp": "直接费用包括：①耗用的材料费用；②耗用的人工费用；③耗用的机械使用费；④其他直接费用。为订立某项目建造合同共发生差旅费、投标费为其他直接费，应计入直接费用的是50+700+15=765（万元）。"}, {"id": 1110, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "某承包单位在施工中有针对性地制定和落实施工质量保证措施来降低质量事故发生概率，这一行为属于质量风险应对的（　　）策略。", "opts": ["减轻", "规避", "转移", "自留"], "ans": [0], "exp": "针对无法规避的质量风险，研究制定有效的应对方案，尽量把风险发生的概率和损失量降到最低程度，从而降低风险量和风险等级。例如，在施工中有针对性地制定和落实有效的施工质量保证措施和质量事故应急预案，可以降低质量事故发生的概率和减少事故损失量。"}, {"id": 1111, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "关于建筑施工企业劳动用工的说法，错误的是（　　）。", "opts": ["建筑施工企业应当按照相关规定办理用工手续，不得使用零散工", "劳动合同应一式三份，双方当事人各持一份，劳动者所在工地保留一份备查", "建筑施工企业与劳动者应当自试用期满后，按照有关法规签订书面劳动合同", "每个工程项目中作业人员的有关情况应按规定如实填报"], "ans": [2], "exp": "C选项错误，建筑施工企业与劳动者建立劳动关系，应当自用工之日起按照劳动合同法规的规定订立书面劳动合同。"}, {"id": 1112, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "关于网络计划中节点的说法，正确的是（　　）。", "opts": ["节点内可以用工作名称代替编号", "节点在网络计划中只表示事件，即前后工作的交接点", "所有节点均既有向内又有向外的箭线", "所有节点编号不能重复"], "ans": [3], "exp": "节点是网络图中箭线之间的连接点。在时间上节点表示指向某节点的工作全部完成后该节点后面的工作才能开始的瞬间，它反映前后工作的交接点。C选项，起点节点只有外向箭线，终点节点只有内向箭线；D选项，节点编号可以间断，但不能重复。"}, {"id": 1113, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "关于建设工程施工现场环境保护措施的说法，正确的是（　　）。", "opts": ["工地茶炉不得使用烧煤茶炉", "经无害化处理后的建筑废弃残渣用于土方回填", "施工现场设置符合规定的装置用于熔化沥青", "严格控制噪声作业，夜间作业将噪声控制在70dB（A）以下"], "ans": [2], "exp": "A选项错误，工地茶炉应尽量采用电热水器。若只能使用烧煤茶炉和锅炉时，应选用消烟除尘型茶炉和锅炉，大灶应选用消烟节能回风炉灶，使烟尘降至允许排放范围为止。B选项错误，固体废弃物要经过无害化、减量化处理再进行填埋。D选项错误，夜间噪声应控制在55dB以下。"}, {"id": 1114, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "关于网络计划中箭线的说法，正确的是（　　）。", "opts": ["箭线在网络计划中只表示工作", "箭线都要占用时间，多数要消耗资源", "箭线的长度表示工作的持续时间", "箭线的水平投影方向不能从右往左"], "ans": [3], "exp": "A选项错误，虚箭线不表示工作，B选项错误，虚箭线既不占用时间，也不消耗资源；C选项错误，在无时间坐标的网络图中，箭线的长度原则上可以任意画，其占用的时间以下方标注的时间参数为准。D选项正确，箭线可以为直线、折线或斜线，但其行进方向均应从左向右。"}, {"id": 1115, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "建设工程项目质量控制体系的建立过程包括：①制定质量控制制度；②编制质量控制计划；③建立系统质量控制网络；④分析质量控制界面。正确的程序是（　　）。", "opts": ["①-②-③-④", "③-①-④-②", "③-④-①-②", "①-③-②-④"], "ans": [1], "exp": "建设工程项目质量控制体系的建立过程为：建立系统质量控制网络；制定质量控制制度；分析质量控制界面；编制质量控制计划。"}, {"id": 1116, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "关于施工专业分包合同的说法，正确的是（　　）。", "opts": ["分包合同约定的工程变更调整的合同价款应与工程进度款同期调整支付", "分包人须服从由发包人直接发出的与分包工程有关的指令", "承包人要求分包人采取特殊措施保护所增加的费用，由分包人负责", "分包人不得将劳务作业再分包给具有相应劳务承包资质的劳务分包企业"], "ans": [0], "exp": "B选项错误，发包人不得直接向分包人发布指令；C选项错误，承包人要求分包人采取特殊措施保护所增加的费用，由承包人负责；D选项错误，分包人可以将劳务作业再分包给具有相应劳务承包资质的劳务分包企业。"}, {"id": 1117, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "施工项目年度成本分析的内容，除了月（季）度成本分析的六个方面以外，重点是（　　）。", "opts": ["针对下一年度施工进展情况，制定切实可行的成本管理措施", "通过对技术组织措施执行效果的分析，寻求更加有效的节约途径", "通过实际成本与计划成本的对比，分析成本降低水平", "通过实际成本与目标成本的对比，分析目标成本控制措施落实情况"], "ans": [0], "exp": "年度成本分析的内容，除了月（季）度成本分析的六个方面以外，重点是针对下一年度的施工进展情况制定切实可行的成本管理措施，以保证施工项目成本目标的实现。"}, {"id": 1118, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "建筑材料采购合同中应明确结算的（　　）。", "opts": ["时间、方式和手续", "地点、时间和人员", "时间、方式和人员", "地点、人员和手续"], "ans": [0], "exp": "合同中应明确结算的时间、方式和手续。首先应明确是验单付款还是验货付款。结算方式可以是现金支付和转账结算。现金支付适用于成交货物数量少且金额小的合同；转账结算适用于同城市或同地区内的结算，也适用于异地之间的结算。"}, {"id": 1119, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "下列沟通过程的要素中，处于主导地位的是（　　）。", "opts": ["沟通环境", "沟通渠道", "沟通主体", "沟通客体"], "ans": [2], "exp": "沟通过程包括五个要素，即：沟通主体、沟通客体、沟通介体、沟通环境和沟通渠道。沟通主体是指有目的地对沟通客体施加影响的个人和团体。沟通主体可以选择和决定沟通客体、沟通介体、沟通环境和沟通渠道，在沟通过程中处于主导地位。"}, {"id": 1120, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "根据《职业健康安全管理体系要求及使用指南》，属于“运行”部分的内容是（　　）。", "opts": ["管理评审", "危险源识别", "理解组织及其所处的环境", "应急准备和响应"], "ans": [3], "exp": "A选项属于绩效评价；B选项属于策划；C选项属于组织所处的环境。"}, {"id": 1121, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "关于建设工程现场文明施工措施的说法，正确的是（　　）。", "opts": ["施工现场应设置排水系统，直接排入市政管网", "一般工地围挡高度不得低于1.6m", "施工现场严禁设置吸烟处，应设置于生活区", "施工总平面图应随工程实施的不同阶段进行调整"], "ans": [3], "exp": "A选项错误，现场污水必须要通过处理合格后方能排入市政管网；B选项错误，市区主要路段和其他涉及市容景观路段的工地设置围挡的高度不低于2.5m，其他工地的围挡高度不低于1.8m；C选项错误，施工现场适当地方设置吸烟处，作业区内禁止随意吸烟。"}, {"id": 1122, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "根据工伤保险和社会保险相关法律规定，由建筑施工企业自主决定是否投保的险种是（　　）。", "opts": ["意外伤害保险", "养老保险", "医疗保险", "失业保险"], "ans": [0], "exp": "修正后的《中华人民共和国建筑法》与修订后的《社会保险法》和《工伤保险条例》等法律法规的规定保持一致，明确了建筑施工企业作为用人单位为职工参加工伤保险并交纳工伤保险费是其应尽的法定义务，但为从事危险作业的职工投保意外伤害险并非强制性规定，是否投保意外伤害险由建筑施工企业自主决定。"}, {"id": 1123, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "下列工程总承包合同义务中，属于承包人义务的是（　　）。", "opts": ["办理施工许可证", "负责组织设计阶段审查会议，并承担会议费用", "提供与施工有关的现场障碍资料", "按照行业工程建设标准规范规定的设计深度开展工程设计"], "ans": [3], "exp": "承包人有义务按照发包人提供的项目基础资料、现场障碍资料和国家有关部门、行业工程建设标准规范规定的设计深度开展工程设计，并对其设计的工艺技术和（或）建筑功能，及工程的安全、环境保护、职业健康的标准，设备材料的质量、工程质量和完成时间负责。"}, {"id": 1124, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "某工作有两个紧前工作，最早完成时间分别是第2天和第4天，该工作持续时间是5天，则其最早完成时间是第（　　）天。", "opts": ["9", "6", "7", "11"], "ans": [0], "exp": "工作的最早完成时间就是本工作的最早开始时间与本工作的持续时间之和，本工作的最早完成时间=4+5=9（天）。"}, {"id": 1125, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "下列分部分项工程中，应当组织专家论证、审查专项施工方案的是（　　）。", "opts": ["起重吊装工程", "拆除工程", "爆炸工程", "地下暗挖工程"], "ans": [3], "exp": "对工程中涉及深基坑、地下暗挖工程、高大模板工程的专项施工方案，施工单位还应当组织专家进行论证、审查。"}, {"id": 1126, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "根据安全生产教育培训制度，新上岗的施工企业从业人员，岗前培训时间的最少学时是（　　）学时。", "opts": ["12", "36", "48", "24"], "ans": [3], "exp": "企业新员工上岗前必须进行三级安全教育，企业新员工须按规定通过三级安全教育和实际操作训练，并经考核合格后方可上岗。企业新上岗的从业人员，岗前培训时间不得少于24学时。"}, {"id": 1127, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "关于施工预算和施工图预算的说法，正确的是（　　）。", "opts": ["施工预算的编制以预算定额为主要依据", "施工图预算的编制以施工定额为主要依据", "施工图预算只适用于建设单位，而不适用于施工单位", "施工预算是施工企业内部管理用的一种文件，与建设单位无直接关系"], "ans": [3], "exp": "A、B选项错误，施工预算的编制以施工定额为主要依据，施工图预算的编制以预算定额为主要依据。C选项错误，施工图预算既适用于发包人，又适用于承包人。"}, {"id": 1128, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "在工程项目质量监督的“双随机、一公开”方法中，“双随机”是指（　　）。", "opts": ["随机确定检查时间、随机抽取检查对象", "随机选派监督检查人员、随机确定检查时间", "随机抽取检查对象、随机选派监督检查人员", "随机选派监督检查人员、随机确定抽检部位"], "ans": [2], "exp": "“双随机、一公开”即随机抽取检查对象，随机选派监督检查人员，及时公开检查情况和查处结果。"}, {"id": 1129, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "下列组织工具中，反映一个组织系统各项工作之间逻辑关系的是（　　）。", "opts": ["项目结构图", "组织分工图", "工作流程图", "组织结构图"], "ans": [2], "exp": "项目结构图反映组成该项目的所有工作任务；工作流程图用图的形式反映一个组织系统中各项工作之间的逻辑关系；组织结构图反映一个组织系统中各组成部门（组成元素）之间的组织关系。"}, {"id": 1130, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "某工程混凝土浇筑过程中，因工人直接浇筑高度超出施工方案要求造成质量事故，该事故按照事故责任分类属于（　　）。", "opts": ["操作责任事故", "指导责任事故", "技术责任事故", "管理责任事故"], "ans": [0], "exp": "按事故责任分类分为指导责任事故、操作责任事故和自然灾害事故。①指导责任事故：指由于工程实施指导或领导失误而造成的质量事故。例如，由于工程负责人片面追求施工进度，放松或不按质量标准进行控制和检验，降低施工质量标准等。②操作责任事故：指在施工过程中，由于实施操作者不按规程和标准实施操作，而造成的质量事故。例如，浇筑混凝土时随意加水，或振捣疏漏造成混凝土质量事故等。③自然灾害事故：指由于突发的严重自然灾害等不可抗力造成的质量事故。例如地震、台风、暴雨、雷电、洪水等对工程造成破坏甚至倒塌。这类事故虽然不是人为责任直接造成，但灾害事故造成的损失程度也往往与人们是否在事前采取了有效的预防措施有关，相关责任人员也可能负有一定责任。"}, {"id": 1131, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "某工地在地基施工中，遇到大量不可预见的地下水，承包人处理地下水的费用应该向（　　）索赔。", "opts": ["勘察单位", "设计人", "保险公司", "发包人"], "ans": [3], "exp": "地下水为不可预见，属于发包人提供的勘察信息有误，承包人处理费用应向发包人索赔。"}, {"id": 1132, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "建设工程项目风险有多种类型，承包方技术管理人员能力欠缺属于（　　）。", "opts": ["组织风险", "技术风险", "工程环境风险", "经济与管理风险"], "ans": [0], "exp": "组织风险，如：①组织结构模式。②工作流程组织。③任务分工和管理职能分工。④业主方（包括代表业主利益的项目管理方）人员的构成和能力。⑤设计人员和监理工程师的能力。⑥承包方管理人员和一般技工的能力。⑦施工机械操作人员的能力和经验。⑧损失控制和安全管理人员的资历和能力等。"}, {"id": 1133, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "根据《建筑工程质量验收统一标准》，单位工程竣工预验收的组织方式是（　　）。", "opts": ["施工单位项目负责人组织各专业负责人进行", "建设单位项目负责人组织总监理工程师、专业监理工程师进行", "总监理工程师组织各专业监理工程师进行", "总监理工程师组织施工单位项目负责人、专业负责人进行"], "ans": [2], "exp": "单位工程完工后，施工单位应组织有关人员进行自检。总监理工程师应组织各专业监理工程师对工程质量进行竣工预验收。存在施工质量问题时，应由施工单位及时整改。"}, {"id": 1134, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "下列建设工程项目信息中，属于技术类信息的是（　　）。", "opts": ["进度控制信息", "投资控制信息", "质量控制信息", "工作量控制信息"], "ans": [2], "exp": "技术类信息包括：前期技术信息，设计技术信息；质量控制信息；材料设备技术信息；施工技术信息；竣工验收技术信息。"}, {"id": 1135, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "第三方认证机构对认证合格单位质量管理体系维持情况进行定期检查的频次通常是（　　）。", "opts": ["每年两次", "两年一次", "每年一次", "一季度一次"], "ans": [2], "exp": "认证机构对认证合格单位质量管理体系维持情况进行监督性现场检查，包括定期和不定期的监督检查。定期检查通常是每年一次，不定期检查视需要临时安排。"}, {"id": 1136, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "下列项目管理工具中，服务于项目所有参与单位的是（　　）。", "opts": ["管理信息系统", "项目信息门户", "项目管理信息系统", "设施管理信息系统"], "ans": [1], "exp": "管理信息系统服务于一个企业，项目管理信息系统服务于一个企业的一个项目，项目信息门户服务于一个项目的所有参与单位。"}, {"id": 1137, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "某防水工程施工出现了设计变更，导致工程量由1600m2增加到了2400m2，原定施工工期60天，合同约定工程量增减10％为承包商承担的风险，则承包商可索赔工期（　　）天。", "opts": ["12", "30", "24", "60"], "ans": [2], "exp": "合同约定工程量增减10％为承包商承担的风险，则索赔工期按照工程量增多800-160=640（m2），索赔工期=640×60/1600=24（天）。"}, {"id": 1138, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "关于建设工程项目总进度目标论证的说法，正确的是（　　）。", "opts": ["已编制总进度规划的项目，可以不进行总进度目标论证", "总进度目标论证应涉及工程实施的条件分析及工程实施策划", "总进度目标论证时，应论证项目动用后的工作进度", "总进度目标论证就是论证施工进度目标实施的可能性"], "ans": [1], "exp": "A选项错误，大型建设工程项目总进度目标论证的核心工作是通过编制总进度纲要论证总进度目标实现的可能性，总进度纲要包括总进度规划；C选项错误，总进度目标论证不论证项目动用后工作进度；D选项错误，总进度目标论证是论证总进度目标实现的可能性，不仅仅包括施工进度目标。"}, {"id": 1139, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "根据《建筑市场诚信行为信息管理方法》，不良行为记录信息公布期限最短不得少于（　　）个月", "opts": ["3", "6", "12", "24"], "ans": [0], "exp": "省、自治区和直辖市建设行政主管部门负责审查整改结果，对整改确有实效的，由企业提出申请，经批准，可缩短其不良行为记录信息公布期限，但公布期限最短不得少于3个月。"}, {"id": 1140, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "在建设工程项目施工成本管理的程序中，“进行项目过程成本分析”的紧后工作是（　　）。", "opts": ["编制成本计划", "确定项目合同价", "编制项目成本报告", "进行项目过程成本考核"], "ans": [3], "exp": "项目成本管理应遵循下列程序：①掌握生产要素的价格信息；②确定项目合同价；③编制成本计划，确定成本实施目标；④进行成本控制；⑤进行过程成本分析；⑥进行项目过程成本考核；⑦编制项目成本报告；⑧项目成本管理资料归档。"}, {"id": 1141, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "某工程的合同总额为1000万元，则发包人合理的支付担保额是（　　）万元。", "opts": ["100", "500", "1000", "200"], "ans": [3], "exp": "发包人的支付担保实行分段滚动担保。支付担保的额度为工程合同总额的20％～25%，1000×20％=200（万元），1000×25％=250（万元），故合理的支付担保额为200万元～250万元，D选项最符合题意。"}, {"id": 1142, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "关于进度控制的说法，正确的是（　　）。", "opts": ["施工方必须在确保工程质量的前提下，控制工程进度", "进度控制的目的是实现建设项目的总进度目标", "各项目管理方进度控制目标和时间范畴应相同", "施工方对整个工程项目进度目标的实现具有决定性作用"], "ans": [0], "exp": "B选项错误，进度控制的目的是通过控制以实现工程的进度目标。C选项错误，建设工程项目管理有多种类型，代表不同利益方的项目管理业主方和项目参与各方都有进度控制的任务，但是，其控制的目标和时间范畴并不相同。D选项错误，业主方对整个工程项目进度目标的实现具有决定性作用。"}, {"id": 1143, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "在成本核算中，应当对可能发生的损失和费用作出合理预计，以增强抵御风险的能力。这体现了成本核算原则的（　　）。", "opts": ["相关性原则", "谨慎原则", "一贯性原则", "配比原则"], "ans": [1], "exp": "谨慎原则，是指在市场经济条件下，在成本、会计核算中应当对可能发生的损失和费用，作出合理预计，以增强抵御风险的能力。"}, {"id": 1144, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "某双代号网络计划如下图所示，存在的不妥之处是（　　）。", "opts": ["有多个起点节点", "工作表示方法不一致", "节点编号不连续", "有多余时间参数"], "ans": [1], "exp": "①-③和⑦-⑧，箭线上面为工作名称，下面为持续时间。"}, {"id": 1145, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "关于施工成本核算的说法，正确的是（　　）。", "opts": ["施工成本核算包括四个基本环节", "施工成本核算应按规定的会计周期进行", "施工成本核算对象只能是单位工程", "竣工工程现场成本应由企业财务部门进行核算分析"], "ans": [1], "exp": "A选项错误，施工成本核算包括两个基本环节：一是按照规定的成本开支范围对施工成本进行归集和分配，计算出施工成本的实际发生额；二是根据成本核算对象，采用适当的方法，计算出该施工项目的总成本和单位成本。C选项错误，施工成本核算一般以单位工程为对象，但也可以按照承包工程项目的规模、工期、结构类型、施工组织和施工现场等情况，结合成本管理要求，灵活划分成本核算对象。D选项错误，对竣工工程的成本核算，应区分为竣工工程现场成本和竣工工程完全成本，分别由项目管理机构和企业财务部门进行核算分析，其目的在于分别考核项目管理绩效和企业经营效益。"}, {"id": 1146, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "关于施工方项目管理目标的说法，正确的是（　　）。", "opts": ["分包方的成本目标由施工总承包方确定", "施工总承包方的工期目标和质量目标必须符合合同的要求", "施工总承包方的成本目标由施工企业根据合同确定", "与业主方签订分包合同的工程，其工期目标和质量目标由分包方负责"], "ans": [1], "exp": "A选项错误，分包方的成本目标是该施工企业内部自行确定的。C选项错误，施工总承包方或施工总承包管理方的成本目标是由施工企业根据其生产和经营的情况自行确定的。D选项错误，按国际工程的惯例，当采用指定分包商时，不论指定分包商与施工总承包方，或与施工总承包管理方，或与业主方签订合同，由于指定分包商合同在签约前必须得到施工总承包方或施工总承包管理方的认可，因此，施工总承包方或施工总承包管理方应对合同规定的工期目标和质量目标负责。"}, {"id": 1147, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "下列项目策划工作内容中，属于实施阶段管理策划的是（　　）。", "opts": ["项目实施期管理总体方案", "业主方项目管理组织机构", "生产运营期设施管理总体方案", "项目风险管理与工程保险方案"], "ans": [3], "exp": "项目实施的管理策划主要工作内容包括：①项目实施各阶段项目管理的工作内容。②项目风险管理与工程保险方案。"}, {"id": 1148, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "建设工程项目决策阶段策划的主要任务是（　　）。", "opts": ["确定项目建设的指导思想", "定义建设项目的建设目标", "定义项目开发或建设的任务和意义", "确定项目的开发或建设模式"], "ans": [2], "exp": "建设工程项目决策阶段策划的主要任务是定义（指的是严格地确定）项目开发或建设的任务和意义。"}, {"id": 1149, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "建设工程项目总承包的基本出发点是借鉴工业生产组织的经验，实现建设生产过程的（　　）。", "opts": ["组织扁平化", "组织标准化", "组织柔性化", "组织集成化"], "ans": [3], "exp": "建设项目工程总承包的基本出发点是借鉴工业生产组织的经验，实现建设生产过程的组织集成化，以克服由于设计与施工的分离致使投资增加，以及克服由于设计和施工的不协调而影响建设进度等弊病。"}, {"id": 1150, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "根据《建设工程项目管理规范》，项目管理实施策划的编制过程包括：①熟悉相关法规和文件；②分析项目具体特点和环境条件；③履行报批手续；④实施编制活动；⑤了解相关方的要求。正确的程序是（　　）。", "opts": ["①-⑤-②-③-④", "①-②-⑤-④-③", "⑤-②-①-④-③", "②-⑤-①-③-④"], "ans": [2], "exp": "项目管理实施规划的编制工作程序，编制工作程序如下：①了解相关方的要求。②分析项目具体特点和环境条件。③熟悉相关的法规和文件。④实施编制活动。⑤履行报批手续。"}, {"id": 1151, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "建设工程管理的核心任务是（　　）。", "opts": ["项目的目标控制", "为工程建设和使用增值", "实现项目建设阶段的目标", "为项目建设的决策或实施提供依据"], "ans": [1], "exp": "建设工程管理的核心任务是为工程建设和使用增值。"}, {"id": 1152, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "下列施工准备的质量控制工作中，属于现场施工准备工作的是（　　）。", "opts": ["组织设计交底", "细化施工方案", "复核测量控制点", "编制作业指导书"], "ans": [2], "exp": "现场施工准备工作的质量控制包括：①计量控制；②测量控制；③施工平面图控制。A、B、D选项属于施工技术准备工作的质量控制。这类工作内容繁多，主要在室内进行。"}, {"id": 1153, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "关于FIDIC《施工合同条件》的说法，正确的是（　　）。", "opts": ["合同计价方式采用单价合同，但也有些子项采用包干单价", "由业主或业主代表管理合同", "“新红皮书”的应用范围比原“红皮书”较小", "“新红皮书”适用于由承包商做绝大部分设计的工程项目"], "ans": [0], "exp": "B选项错误，业主委派工程师管理合同，监督工程进度、质量，签发支付证书、接收证书和履约证书，处理合同管理中的有关事项。C选项错误，“新红皮书”与原“红皮书”相对应，但其名称改变后合同的适用范围更大。D选项错误，“新黄皮书”适用于由承包商做绝大部分设计的工程项目。"}, {"id": 1154, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "下列质量检查内容中，可通过目测法中“照”的手段检查的是（　　）。", "opts": ["油漆的光滑度", "内墙抹灰的大面是否平直", "混凝土的强度是否符合要求", "管道井内管线、设备安装质量"], "ans": [3], "exp": "照：就是通过人工光源或反射光照射，检查难以看到或光线较暗的部位。例如，管道井、电梯井等内部管线、设备安装质量，装饰吊顶内连接及设备安装质量等。"}, {"id": 1155, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "关于投标申请人资格预审的说法，正确的是（　　）。", "opts": ["资格预审可以在招标开始之前或者初期进行", "公开招标只能采用资格预审方式", "资格预审结果不需要通知所有的投标意向者", "规定截止日期后，潜在投标人可以根据发包人要求修改资格预审文件"], "ans": [0], "exp": "A选项正确、B选项错误，资格预审是指招标人在招标开始之前或者开始初期，由招标人对申请参加投标的潜在投标人进行资质条件、业绩、信誉、技术、资金等多方面的情况进行资格审查，经认定合格的潜在投标人，才可以参加投标。C选项错误，由业主组织资格预审评审委员会，对资格预审文件进行评审，并将评审结果及时以书面形式通知所有参加资格预审的投标意向者。D选项错误，投标意向者在规定的截止日期之前完成填报的内容，报送资格预审文件，所报送的文件在规定的截止日期后不能再进行修改。"}, {"id": 1156, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "根据《建筑施工组织设计规范》，主持编制施工组织设计的应是（　　）。", "opts": ["施工单位技术负责人", "项目负责人", "项目总监理工程师", "项目技术负责人"], "ans": [1], "exp": "施工组织设计应由项目负责人主持编制，可根据需要分阶段编制和审批。"}, {"id": 1157, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "工程监理人员在实施监理过程中，发现工程设计不符合工程质量标准或合同约定的质量要求时，应当采取的措施是（　　）。", "opts": ["要求施工单位报告设计单位改正", "报告建设单位要求设计单位改正", "直接与设计单位确认修改工程设计", "要求设计单位改正并报告建设单位"], "ans": [1], "exp": "工程监理人员发现工程设计不符合建筑工程质量标准或者合同约定的质量要求的，应当报告建设单位要求设计单位改正。"}, {"id": 1158, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "一般情况下，负责特别重大事故调查的人民政府应当自收到事故调查报告之日起（　　）日内作出批复。", "opts": ["15", "30", "60", "90"], "ans": [1], "exp": "重大事故、较大事故、一般事故，负责事故调查的人民政府应当自收到事故调查报告之日起15日内作出批复；特别重大事故，30日内作出批复，特殊情况下，批复时间可以适当延长，但延长的时间最长不超过30日。"}, {"id": 1159, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "建设工程政府质量监督机构履行质量监督职责时，可以采取的措施是（　　）。", "opts": ["发现有影响工程质量的问题时，责令改正", "暂时扣押被检查单位的固定资产", "对被检查单位负责人进行处罚", "吊销被检查单位的资质证书"], "ans": [0], "exp": "政府建设行政主管部门和其他有关部门履行工程质量监督检查职责时，有权采取下列措施：①要求被检查的单位提供有关工程质量的文件和资料。②进入被检查单位的施工现场进行检查。③发现有影响工程质量的问题时，责令改正。"}, {"id": 1160, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "下列成本管理的职责中，属于成本会计岗位的是（　　）。", "opts": ["每月编制一次材料复核报告", "制定采用新技术降低成本的措施", "编制月材料盘点表", "开具限额领料单"], "ans": [0], "exp": "成本会计职责包括：①编制月度成本计划；②进行成本核算，编制月度成本核算表；③每月编制一次材料复核报告。"}, {"id": 1161, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "下列项目目标动态控制的纠偏措施中，属于技术措施的是（　　）。", "opts": ["优化项目管理任务分工", "选用高效的施工机具", "调整项目管理职能分工", "改变控制的方法和手段"], "ans": [1], "exp": "A、C选项属于组织措施。"}, {"id": 1162, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "根据合同风险产生的原因分类，属于合同工程风险的是（　　）。", "opts": ["非法分包", "偷工减料", "物价上涨", "以次充好"], "ans": [2], "exp": "合同工程风险是指客观原因和非主观故意导致的。如工程进展过程中发生不利的地质条件变化、工程变更、物价上涨、不可抗力等。合同信用风险是指主观故意原因导致的。表现为合同双方的机会主义行为，如业主拖欠工程款，承包商层层转包、非法分包、偷工减料、以次充好、知假买假等。A、B、D选项属于合同信用风险。"}, {"id": 1163, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "关于横道图进度计划的说法，正确的是（　　）。", "opts": ["横道图中的工作均无机动时间", "横道图中工作的时间参数无法计算", "计划的资源需要量无法计算", "计划的关键工作无法确定"], "ans": [3], "exp": "横道图进度计划法也存在一些问题，如：①工序（工作）之间的逻辑关系可以设法表达，但不易表达清楚。②适用于手工编制计划。③没有通过严谨的进度计划时间参数计算，不能确定计划的关键工作、关键路线与时差。④计划调整只能用手工方式进行，其工作量较大。⑤难以适应大的进度计划系统。"}, {"id": 1164, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "某网络计划执行情况的检查结果分析如下表所示，对工作M的判断分析，正确的是（　　）。", "opts": ["比计划延迟4天，影响紧后工作2天，不影响工期", "比计划提前4天，不影响工期", "比计划延迟4天，不影响紧后工作，不影响工期", "比计划延迟4天，影响工期1天"], "ans": [0], "exp": "根据表格可知，M工作原有总时差为5天，还剩有1天，可以得知M工作比计划延误了4天，但是不影响总工期；M工作原有自由时差为2天，还剩0天，可以得知M工作影响紧后工作2天。"}, {"id": 1165, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "某单代号网络计划如下图（时间单位：天）所示，计算工期是（　　）天。", "opts": ["8", "13", "10", "12"], "ans": [1], "exp": "关键线路：B-E-G，2+6+5=13（天）。"}, {"id": 1166, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "下列施工项目综合成本的分析方法中，可以全面了解单位工程的成本构成和降低成本来源的是（　　）。", "opts": ["分部分项工程成本分析", "月（季）度成本分析", "竣工成本的综合分析", "年度成本分析"], "ans": [2], "exp": "竣工成本的综合分析：凡是有几个单位工程且单独进行成本核算（即成本核算对象）的施工项目，其竣工成本分析应以各单位工程竣工成本分析资料为基础，再加上项目管理层的经营效益（如资金调度、对外分包等所产生的效益）进行综合分析。如果施工项目只有一个成本核算对象（单位工程），就以该成本核算对象的竣工成本资料作为成本分析的依据。单位工程竣工成本分析，应包括以下三方面内容：①竣工成本分析。②主要资源节超对比分析。③主要技术节约措施及经济效果分析。通过以上分析，可以全面了解单位工程的成本构成和降低成本的来源，对今后同类工程的成本管理提供参考。"}, {"id": 1167, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "下列建设工程安全事故中，县级人民政府可以委托事故发生单位组织事故调查组进行调查的|是（　　）。", "opts": ["2人轻伤，总损失1000万元", "1人重伤，直接经济损失200万元", "无伤亡，直接经济损失1000万元以下", "1人轻伤，无其他损失"], "ans": [2], "exp": "特别重大事故由国务院或者国务院授权有关部门组织事故调查组进行调查。重大事故、较大事故、一般事故分别由事故发生地省级人民政府、设区的市级人民政府、县级人民政府负责调查。省级人民政府、设区的市级人民政府、县级人民政府可以直接组织事故调查组进行调查，也可以授权或者委托有关部门组织事故调查组进行调查。未造成人员伤亡的一般事故，县级人民政府也可以委托事故发生单位组织事故调查组进行调查。"}, {"id": 1168, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "single", "q": "根据《建筑工程施工质量验收统一标准》，分项工程质量验收的组织者是（　　）。", "opts": ["项目经理", "项目技术负责人", "总监理工程师", "专业监理工程师"], "ans": [3], "exp": "分项工程应由专业监理工程师组织施工单位项目专业技术负责人等进行验收。"}, {"id": 1169, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "下列现场文明施工的管理措施中，属于现场消防、防火管理措施的有（　　）。", "opts": ["建立门卫值班管理制度", "建立消防管理制度及消防领导小组", "作业区与生活区必须明显划分", "现场必须有消防平面布置图", "对违反消防条例的有关人员进行严肃处理"], "ans": [1, 3, 4], "exp": "现场消防、防火管理：①现场建立消防管理制度，建立消防领导小组，落实消防责任制和责任人员，做到思想重视、措施跟上、管理到位。②定期对有关人员进行消防教育，落实消防措施。③现场必须有消防平面布置图，临时设施按消防条例有关规定搭设，做到标准规范。④易燃易爆物品堆放间、油漆间、木工间、总配电室等消防防火重点部位要按规定设置灭火器和消防沙箱，并有专人负责，对违反消防条例的有关人员进行严肃处理。⑤施工现场用明火做到严格按动用明火规定执行，审批手续齐全。A选项属于治安管理；C选项属于施工现场生活设施布置。"}, {"id": 1170, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "关于分部分项工程成本分析的说法，正确的有（　　）。", "opts": ["分部分项工程成本分析的对象为已完分部分项工程", "分部分项工程成本分析是施工项目成本分析的基础", "必须对施工项目的所有分部分项工程进行成本分析", "主要分部分项工程要做到从开工到竣工进行系统的成本分析", "分部分项工程成本分析是定期的中间成本分析"], "ans": [0, 1, 3], "exp": "C选项错误，由于施工项目包括很多分部分项工程，无法也没有必要对每一个分部分项工程都进行成本分析，特别是一些工程量小、成本费用少的零星工程。但是，对于那些主要分部分项工程必须进行成本分析，而且要做到从开工到竣工进行系统的成本分析。E选项错误，月（季）度成本分析是定期的中间成本分析。"}, {"id": 1171, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "钢筋混凝土构件和允许出现裂缝的预应力混凝土构件进场质量验收时，应进行的检验项目包括（　　）。", "opts": ["承载力", "材料性能", "挠度", "裂缝宽度", "外观质量"], "ans": [0, 2, 3], "exp": "钢筋混凝土构件和允许出现裂缝的预应力混凝土构件应进行承载力、挠度和裂缝宽度检验。"}, {"id": 1172, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "在项目的实施阶段，项目总进度应包括（　　）进度。", "opts": ["设计前准备阶段的工作", "设计工作", "项目建议书的编制工作", "招标工作", "项目动用后的保修工作"], "ans": [0, 1, 3], "exp": "在项目的实施阶段，项目总进度应包括：①设计前准备阶段的工作进度；②设计工作进度；③招标工作进度；④施工前准备工作进度；⑤工程施工和设备安装进度；⑥工程物资采购工作进度；⑦项目动用前的准备工作进度等。"}, {"id": 1173, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "下列施工现场噪声的控制措施中，属于控制传播途径的有（　　）。", "opts": ["利用多孔材料吸收声能", "设置隔声屏障", "振动源上涂覆阻尼材料", "压缩机风管处设置消声器", "操作人员使用耳塞、耳罩"], "ans": [0, 1, 2], "exp": "传播途径的控制：①吸声：利用吸声材料（大多由多孔材料制成）或由吸声结构形成的共振结构（金属或木质薄板钻孔制成的空腔体）吸收声能，降低噪声。②隔声：应用隔声结构，阻碍噪声向空间传播，将接收者与噪声声源分隔。隔声结构包括隔声室、隔声罩、隔声屏障、隔声墙等。③消声：利用消声器阻止传播。允许气流通过的消声降噪是防治空气动力性噪声的主要装置。如对空气压缩机、内燃机产生的噪声等。④减振降噪：对来自振动引起的噪声，通过降低机械振动减小噪声，如将阻尼材料涂在振动源上，或改变振动源与其他刚性结构的连接方式等。D选项属于声源控制；E选项属于接收者的防护。"}, {"id": 1174, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "关于工作最迟完成时间计算的说法，正确的有（　　）。", "opts": ["单代号搭接网络计划中，等于该工作最早完成时间加上该工作的总时差", "单代号搭接网络计划中，等于各紧后工作最迟开始（或结束）时间减相应时距加该工作持续时间的最小值", "双代号网络计划中，等于各紧后工作最迟开始时间的最小值", "双代号网络计划中，等于该工作完成节点的最迟时间", "双代号时标网络计划中，等于该工作实箭线结束点对应的时间坐标"], "ans": [0, 2, 3], "exp": "A选项，最迟完成时间﹣最早完成时间=总时差；C选项，依据口诀“逆求取最小”，最迟完成时间=min{紧后工作最迟开始时间}；E选项，时标网络图中，该工作实箭线结束点对应时间为最早完成时间。"}, {"id": 1175, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "下列施工作业质量控制点中，属于“见证点”的有（　　）。", "opts": ["隐蔽工程", "重要部位施工", "压力容器特种作业", "二次结构砌体施工", "预应力施工工艺"], "ans": [1, 2, 4], "exp": "凡属“见证点”的施工作业，如重要部位、特种作业、专门工艺等，施工方必须在该项作业开始前，书面通知现场监理机构到位旁站，见证施工作业过程；如隐蔽工程等属“待检点”的施工作业。"}, {"id": 1176, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "关于工程保险的说法，正确的有（　　）。", "opts": ["工程一切险要求投保人以项目法人的名义投保", "国内工程通常由项目法人办理工程一切险", "第三者责任险一般附加在工程一切险中", "承包人设备保险的保险范围包括准备用于永久工程的设备", "国内工程开工前均要集中投保工程一切险"], "ans": [1, 2, 3], "exp": "A、B选项，工程一切险要求投保人办理保险时应以双方名义共同投保。为了保证保险的有效性和连贯性，国内工程通常由项目法人办理保险，国际工程一般要求承包人办理保险。C选项，第三者责任险的被保险人也应是项目法人和承包人。该险种一般附加在工程一切险中。D选项，承包人设备保险：保险的范围包括承包人运抵施工现场的施工机具和准备用于永久工程的材料及设备。我国的工程一切险包括此项保险内容。E选项，如果承包商不愿投保一切险，也可以就承包商的材料、机具设备、临时工程、已完工程等分别进行保险，但应征得业主的同意。"}, {"id": 1177, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "关于成本核算方法的说法，正确的有（　　）。", "opts": ["表格核算法简单易懂，方便操作", "表格核算法精度不高
