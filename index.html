<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>一建管理题库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--primary:#1a73e8;--primary-light:#e8f0fe;--success:#34a853;--danger:#ea4335;--warning:#fbbc04;--bg:#f5f7fa;--card:#fff;--text:#202124;--text2:#5f6368;--border:#dadce0;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:800px;margin:0 auto;padding:12px 12px 80px}
.header{display:flex;align-items:center;gap:8px;padding:12px 0;margin-bottom:8px;flex-wrap:wrap}
.header h1{font-size:18px;font-weight:700;flex:1}
.header .badge{background:var(--primary);color:#fff;font-size:10px;padding:2px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
.tabs{display:flex;gap:4px;background:var(--card);border-radius:var(--radius);padding:4px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tab{flex:1;text-align:center;padding:10px 4px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:.2s;border:none;background:none}
.tab.active{background:var(--primary);color:#fff;font-weight:600}
.tab:not(.active):active{background:#e8e8e8}
.panel{display:none}
.panel.active{display:block}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-card .num{font-size:28px;font-weight:800;color:var(--primary)}
.stat-card .label{font-size:12px;color:var(--text2);margin-top:4px}
.stat-card.green .num{color:var(--success)}
.stat-card.orange .num{color:#e37400}
.stat-card.red .num{color:var(--danger)}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-bar select,.filter-bar button{padding:8px 12px;border-radius:8px;border:2px solid var(--border);font-size:13px;background:#fff;color:var(--text);cursor:pointer}
.filter-bar select{flex:1;min-width:80px}
.filter-bar button{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600}
.quick-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.qa-btn{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;border:none;font-size:14px;font-weight:600;color:var(--text);transition:.2s}
.qa-btn:active{transform:scale(.97);background:var(--primary-light)}
.qa-btn .icon{font-size:24px;display:block;margin-bottom:6px}
.q-area{position:relative}
.top-bar{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.back-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:4px;color:var(--text)}
.top-bar .title{font-size:15px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top-bar .info{font-size:13px;color:var(--text2);white-space:nowrap}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:10px;overflow:hidden}
.progress-bar .fill{height:100%;background:var(--primary);border-radius:2px;transition:width .3s}
.q-card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:12px}
.q-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:4px}
.q-meta .src{background:var(--primary-light);color:var(--primary);padding:1px 8px;border-radius:4px;font-weight:600}
.q-meta .tag-type{background:#e8e8e8;padding:1px 8px;border-radius:4px}
.q-text{font-size:15px;line-height:1.7;margin-bottom:12px;font-weight:500}
.options{display:flex;flex-direction:column;gap:6px}
.option{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:10px;border:2px solid var(--border);cursor:pointer;transition:.2s;background:#fff;font-size:14px;line-height:1.5}
.option:active{transform:scale(.98)}
.option .tag{flex-shrink:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--bg);font-weight:700;font-size:12px;color:var(--text2)}
.option .text{flex:1;padding-top:2px}
.option.selected{border-color:var(--primary);background:var(--primary-light)}
.option.selected .tag{background:var(--primary);color:#fff}
.option.correct{border-color:var(--success);background:#e6f4ea}
.option.correct .tag{background:var(--success);color:#fff}
.option.wrong{border-color:var(--danger);background:#fce8e6}
.option.wrong .tag{background:var(--danger);color:#fff}
.option.disabled{cursor:default;pointer-events:none}
.option.reveal{border-color:var(--success);background:#e6f4ea}
.option.reveal .tag{background:var(--success);color:#fff}
.feedback{margin-top:12px;padding:12px;border-radius:10px;font-size:13px;line-height:1.6;display:none}
.feedback.show{display:block}
.feedback.correct{background:#e6f4ea;border-left:4px solid var(--success)}
.feedback.wrong{background:#fce8e6;border-left:4px solid var(--danger)}
.q-actions{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.q-actions button{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;min-width:60px}
.q-actions button:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:#fff;color:var(--text2);border:2px solid var(--border)!important}button:disabled{opacity:0.4;cursor:not-allowed!important;transform:none!important}
.btn-star{background:#fff;color:#e37400;border:2px solid var(--border)!important}
.btn-star.active{background:#fff3e0;border-color:#e37400!important;color:#e37400}
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.empty .icon{font-size:48px;margin-bottom:12px}
.ans-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ans-card .ans-item{padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px}
.ans-card .ans-item:last-child{border-bottom:none}
.ans-card .ans-item .qno{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;background:var(--bg);color:var(--text2);flex-shrink:0}
.ans-card .ans-item .qno.answered{background:var(--primary);color:#fff}
.ans-card .ans-item .qno.answered-wrong{background:var(--danger);color:#fff}
.ans-card .ans-item .qno.current-q{box-shadow:0 0 0 3px var(--primary)}
.ans-card .ans-item .qno.starred{background:#e37400;color:#fff}
.ans-card .ans-item .q-texto{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)}
.section-grid{display:grid;gap:8px}
.sec-btn{background:var(--card);border-radius:var(--radius);padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;border:2px solid transparent;transition:.2s;display:flex;align-items:center;justify-content:space-between}
.sec-btn:active{border-color:var(--primary);background:var(--primary-light)}
.sec-btn .name{font-size:13px;font-weight:500}
.sec-btn .count{font-size:12px;color:var(--text2)}
.setting-row{display:flex;align-items:center;justify-content:space-between;background:var(--card);padding:14px 16px;border-radius:var(--radius);margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.setting-row .label{font-size:14px}
.setting-row .hint{font-size:12px;color:var(--text2);margin-top:2px}
.toggle{position:relative;width:48px;height:28px;background:var(--border);border-radius:14px;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--primary)}
.toggle .knob{position:absolute;top:3px;left:3px;width:22px;height:22px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on .knob{left:23px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:10px 24px;border-radius:24px;font-size:14px;z-index:100;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.timer{background:var(--danger);color:#fff;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600;white-space:nowrap}
.fav-item{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer}
.fav-item .q{font-size:14px;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.fav-item .meta{font-size:12px;color:var(--text2);margin-top:4px}
.timer-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:8px;overflow:hidden}
.timer-bar .fill{height:100%;transition:width 1s linear}
@media(max-width:400px){.q-text{font-size:14px}.option{font-size:13px;padding:8px 10px}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <h1>📗 一建管理题库</h1>
    <span class="badge" id="versionBadge">v1.0</span>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="home">🏠 首页</button>
    <button class="tab" data-tab="practice">📝 练习</button>
    <button class="tab" data-tab="answerCard">📋 答题卡</button>
    <button class="tab" data-tab="settings">⚙️ 设置</button>
  </div>

  <div class="panel active" id="panel-home">
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">总题数</div></div>
      <div class="stat-card green"><div class="num" id="statDone">0</div><div class="label">已练习</div></div>
      <div class="stat-card orange"><div class="num" id="statRate">0%</div><div class="label">正确率</div></div>
      <div class="stat-card red"><div class="num" id="statWrong">0</div><div class="label">错题数</div></div>
    </div>
    <div class="filter-bar">
      <select id="filterSection"><option value="all">全部章节/年份</option><option value="ch1">第1章</option><option value="ch2">第2章</option><option value="ch3">第3章</option><option value="ch4">第4章</option><option value="ch5">第5章</option><option value="ch6">第6章</option><option value="ch7">第7章</option><option value="ch8">第8章</option><option value="ch9">第9章</option><option value="ch10">第10章</option><option value="year2021">2021年真题</option><option value="year2022">2022年真题</option><option value="year2023">2023年真题</option><option value="year2024">2024年真题</option><option value="year2025">2025年真题</option></select>
      <select id="filterType"><option value="all">全部题型</option><option value="single">单选题</option><option value="multi">多选题</option></select>
    </div>
    <div class="quick-actions">
      <button class="qa-btn" onclick="startPractice()"><span class="icon">🎲</span>刷题模式</button>
      <button class="qa-btn" onclick="startRandomPractice()"><span class="icon">🔀</span>随机练习</button>
      <button class="qa-btn" onclick="startExam()"><span class="icon">⏱️</span>考试模式</button>
      <button class="qa-btn" onclick="showWrong()"><span class="icon">📕</span>错题重练</button>
      <button class="qa-btn" onclick="showFavorites()"><span class="icon">⭐</span>收藏题目</button>
    </div>
  </div>

  <div class="panel" id="panel-practice">
    <div class="top-bar">
      <button class="back-btn" onclick="backToHome()">←</button>
      <div class="title" id="practiceTitle">刷题模式</div>
      <div class="info" id="progressInfo">0/0</div>
    </div>
    <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
    <div id="questionArea"></div>
  </div>

  <div class="panel" id="panel-answerCard">
    <div class="top-bar">
      <button class="back-btn" onclick="backToHome()">←</button>
      <div class="title">答题卡</div>
      <div class="info" id="ansCardInfo">0/0</div>
    </div>
    <div id="ansCardList"></div>
  </div>

  <div class="panel" id="panel-settings">
    <div class="setting-row">
      <div><div class="label">📖 显示解析</div><div class="hint">答题后立即显示答案解析</div></div>
      <div class="toggle on" id="toggleShowAnswer" onclick="toggleSetting(&apos;showAnswer&apos;)"><div class="knob"></div></div>
    </div>
    <div class="setting-row">
      <div><div class="label">🔀 随机出题</div><div class="hint">题目顺序随机排列</div></div>
      <div class="toggle" id="toggleShuffle" onclick="toggleSetting(&apos;shuffle&apos;)"><div class="knob"></div></div>
    </div>
    <div class="setting-row">
      <div><div class="label">⏱️ 考试时长</div><div class="hint">考试模式限时（分钟）</div></div>
      <div style="display:flex;align-items:center;gap:8px">
        <button onclick="adjExamTime(-5)" style="width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:none;font-size:18px;cursor:pointer">-</button>
        <span id="examTimeDisplay" style="font-size:16px;font-weight:600;min-width:32px;text-align:center">60</span>
        <button onclick="adjExamTime(5)" style="width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:none;font-size:18px;cursor:pointer">+</button>
      </div>
    </div>
    <div style="margin-top:16px">
      <button onclick="clearAllProgress()" style="width:100%;padding:12px;border-radius:10px;border:2px solid var(--danger);background:#fff;color:var(--danger);font-size:14px;font-weight:600;cursor:pointer">🗑️ 清除所有进度</button>
    </div>
    <div style="margin-top:20px;text-align:center;font-size:12px;color:var(--text2);line-height:1.8" id="versionDisplay"></div>
  </div>

    <div class="toast" id="toast"></div>
</div>
<script>
const APP_VERSION = "一建管理题库 v1.0 (含教材1099题+真题499题)";
const QUESTIONS = [{"id": 1, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "建设工程的实体质量监督以（　　）方式为主，重点检查涉及结构安全和使用功能的实体质量。", "opts": ["检测", "巡查", "检查", "抽查"], "ans": [3], "exp": "工程实体质量监督以抽查方式为主，重点检查涉及结构安全和使用功能的实体质量。"}, {"id": 2, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "工程竣工验收应该由（　　）组织进行。", "opts": ["建设单位", "监理单位", "施工单位", "质量监督单位"], "ans": [0], "exp": "工程竣工验收应该由建设单位组织。"}, {"id": 3, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据《建设工程监理范围和规模标准规定》，下列工程项目中，必须实行监理的是（　　）。", "opts": ["总投资额为1亿元的服装厂改建项目", "总投资额为4000万美元的联合国环境署援助项目", "总投资额为2500万元的垃圾处理项目", "建筑面积为4万m2的住宅建设项目"], "ans": [1], "exp": "选项A错误，不属于项目总投资额在3000万元以上关系社会公共利益、公众安全的基础设施项目，故不属于必须实行监理的项目范围。选项C错误，如投资额在3000万元以上，则必须实行监理。选项D错误，建筑面积在5万m2以上的住宅建设工程必须实行监理。"}, {"id": 4, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列关于设计－招标－建造（DBB）模式的说法，正确的是（　　）。", "opts": ["勘察设计单位与施工单位之间存在合同关系", "各单位行使其职责和履行义务，责权利分配明确", "各平行承包单位前后工作衔接，不利于发现工程质量问题", "工程设计、招标、施工按顺序依次进行，不容易产生设计变更"], "ans": [1], "exp": "选项A错误，工程勘察设计单位与施工单位之间没有合同关系，只是协作关系。选项C错误，各平行承包单位前后工作衔接，构成质量制约，有助于发现工程质量问题。选项D错误，工程设计、招标、施工按顺序依次进行，建设周期长，设计施工协调困难，容易产生设计变更。"}, {"id": 5, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列关于项目资本金制度的说法，正确的是（　　）。", "opts": ["政府投资项目实行核准制和备案制", "采用投资补助方式的政府投资项目，政府需要审批项目建议书", "采用直接投资的政府投资项目，政府需要审批项目建议书和可行性研究报告", "企业不使用政府资金投资建设的项目，需向政府提交项目申请报告和开工报告"], "ans": [2], "exp": "选项AD，对于非政府投资工程，区别不同情况实行核准制或登记备案制。其中实行核准制的仅需向核准机关提交项目申请书，不再经过批准项目建议书、可行性研究报告和开工报告等程序。选项B，对于采用投资补助方式的政府投资项目，政府只需要审批资金申请报告。"}, {"id": 6, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "工程总概算是在（　　）阶段编制。", "opts": ["可行性研究", "初步设计", "技术设计", "施工图设计"], "ans": [1], "exp": "按照规定，初步设计阶段编制工程总概算。"}, {"id": 7, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据固定资产投资项目资本金制度，作为计算资本金基数的总投资是指投资项目（　　）之和。", "opts": ["建筑工程费和安装工程费", "固定资产和铺底流动资金", "建安工程费和设备购置费", "建安工程费和工程建设其他费"], "ans": [1], "exp": "根据《国务院关于固定资产投资项目试行资本金制度的通知》（国发〔1996〕35号）规定，所谓项目资本金，是指在项目总投资中由投资者认缴的出资额。这里的总投资，是指投资项目的固定资产投资与铺底流动资金之和。"}, {"id": 8, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据《国务院关于投资体制改革的决定》（国发〔2004〕20号），关于项目投资审批、核准或备案管理的说法，正确的是（　　）。", "opts": ["政府投资资金按项目安排，以投资补助方式为主", "对确需支持的经营性项目，政府投资资金主要采取直接投资方式投入，也可适当采取投资补助、贷款贴息等方式进行引导", "对于采用直接投资和资本金注入方式的政府投资项目，政府投资主管部门需从投资决策角度只审批可行性研究报告", "对于采用投资补助、转贷和贷款贴息方式的政府投资项目，政府投资主管部门只审批资金申请报告"], "ans": [3], "exp": "选项A错误，政府投资资金按项目安排，以直接投资方式为主。选项B错误，对确需支持的经营性项目，政府投资资金主要采取资本金注入方式投入，也可适当采取投资补助、贷款贴息等方式进行引导。选项C错误，对于采用直接投资和资本金注入方式的政府投资项目，政府投资主管部门需从投资决策角度审批项目建议书和可行性研究报告。"}, {"id": 9, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "在工程设计中，具体确定各种设备的型号、规格及各种非标准设备的制造加工图的阶段是（　　）。", "opts": ["初步设计", "方案设计", "技术设计", "施工图设计"], "ans": [3], "exp": "施工图设计还包括各种运输、通信、管道系统、建筑设备设计等。在工艺方面，应具体确定各种设备的型号、规格及各种非标准设备的制造加工图。施工图设计还应编制施工图预算，作为工程施工依据。"}, {"id": 10, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据《建设工程质量管理条例》，下列建设工程中，必须实行监理的是（　　）。", "opts": ["国有资金控股工程", "基础设施工程", "利用国际组织贷款的工程", "公共卫生工程"], "ans": [2], "exp": "《建设工程质量管理条例》规定，下列建设工程必须实行监理：①国家重点建设工程；②大中型公用事业工程；③成片开发建设的住宅小区工程；④利用外国政府或者国际组织贷款、援助资金的工程；⑤国家规定必须实行监理的其他工程。"}, {"id": 11, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列投资项目中，资本金占项目总投资比例最大的是（　　）。", "opts": ["城市轨道交通项目", "港口、沿海及内河航运项目", "保障性住房和普通商品住房项目", "机场项目"], "ans": [3], "exp": ""}, {"id": 12, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据《建设工程监理范围和规模标准规定》（中华人民共和国建设部令第86号），必须实行监理的工程范围和规模标准，以下不属于利用外国政府或者国际组织贷款、援助资金的工程的是（　　）。", "opts": ["使用世界银行、亚洲开发银行等国际组织贷款资金的项目", "使用国际组织或者外国政府援助资金的项目", "使用外国政府及其机构贷款资金的项目", "使用外国银行贷款资金的项目"], "ans": [3], "exp": "利用外国政府或者国际组织贷款、援助资金的工程包括：（1）使用世界银行、亚洲开发银行等国际组织贷款资金的项目；（2）使用外国政府及其机构贷款资金的项目；（3）使用国际组织或者外国政府援助资金的项目。"}, {"id": 13, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列关于资本金的说法，正确的是（　　）。", "opts": ["项目资本金中的总投资，是指投资项目的固定资产投资与建安工程费之和", "投资者可按其出资比例依法享有所有者权益，不可转让其出资，也不得以任何方式抽回", "项目资本金属于非债务性资金，项目法人需承担这部分资金的利息和债务", "对于银行等金融机构或资本市场的投资者而言，项目资本金可视为项目法人进行债务融资的信用基础"], "ans": [3], "exp": "选项A错误，项目资本金中的总投资，是指投资项目的固定资产投资与铺底流动资金之和。选项B错误，投资者可按其出资比例依法享有所有者权益，也可转让其出资，但不得以任何方式抽回。选项C错误，项目资本金属于非债务性资金，项目法人不承担这部分资金的任何利息和债务。"}, {"id": 14, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据《国务院关于投资体制改革的决定》（国发〔2004〕20号），按照（　　）的原则，政府投资项目实行审批制。", "opts": ["谁投资、谁决策、谁收益、谁承担风险", "谁投资、谁决策、谁管理、谁承担风险", "谁审批、谁决策、谁收益、谁承担风险", "谁投资、谁决策、谁建设、谁承担风险"], "ans": [0], "exp": "根据《国务院关于投资体制改革的决定》（国发〔2004〕20号），按照“谁投资、谁决策、谁收益、谁承担风险”的原则，政府投资项目实行审批制。"}, {"id": 15, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "对于政府投资项目，初步设计提出的投资概算超过经批准的可行性研究报告提出的投资估算（　　）的，项目单位应当向投资主管部门或者其他有关部门报告。", "opts": ["15%", "10%", "20%", "25%"], "ans": [1], "exp": "对于政府投资项目，初步设计提出的投资概算超过经批准的可行性研究报告提出的投资估算10%的，项目单位应当向投资主管部门或者其他有关部门报告，投资主管部门或者其他有关部门可以要求项目单位重新报送可行性研究报告。"}, {"id": 16, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "除国家对采用高新技术成果有特别规定外，以工业产权、非专利技术作价出资的比例不得超过投资项目资本金总额的（　　）。", "opts": ["30%", "25%", "20%", "15%"], "ans": [2], "exp": "除国家对采用高新技术成果有特别规定外，以工业产权、非专利技术作价出资的比例不得超过投资项目资本金总额的20%。"}, {"id": 17, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据《国务院关于投资体制改革的决定》，实行核准制的项目，企业应向政府主管部门提交（　　）。", "opts": ["项目建议书", "项目可行性研究", "项目申请书", "项目开工报告"], "ans": [2], "exp": "企业办理投资项目核准手续时，仅需向核准机关提交项目申请书，不再经过批准项目建议书、可行性研究报告和开工报告等程序。"}, {"id": 18, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "工程开工时间是指该工程（　　）中规定的任何一项（　　）工程第一次正式破土开槽开始施工的时间。不需开槽的工程，正式开始（　　）的时间就是开工时间。", "opts": ["设计文件；决定性；打桩", "施工文件；永久性；地基浇筑", "施工文件；决定性；地基浇筑", "设计文件；永久性；打桩"], "ans": [3], "exp": "工程开工时间是指该工程设计文件中规定的任何一项永久性工程第一次正式破土开槽开始施工的时间。不需开槽的工程，正式开始打桩的时间就是开工时间。"}, {"id": 19, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据《企业投资项目核准和备案管理条例》，实行登记备案制的项目是（　　）。", "opts": ["政府直接投资的项目", "采用资本金注入方式的政府投资项目", "《政府核准的投资项目目录》外的企业投资项目", "《政府核准的投资项目目录》内的企业投资项目"], "ans": [2], "exp": "根据《企业投资项目核准和备案管理条例》，《政府核准的投资项目目录》外的企业投资项目实行备案管理。"}, {"id": 20, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据《建设工程监理规范》，监理员的职责是（　　）。", "opts": ["进行工程计量", "进行见证取样", "组织编写监理日志", "参与编写监理月报"], "ans": [1], "exp": "监理员是在专业监理工程师领导下从事工程检查、材料的见证取样、有关数据复核等具体监理工作的人员。监理员应履行下列职责：①检查施工单位投入工程的人力、主要设备的使用及运行状况；②进行见证取样；③复核工程计量有关数据；④检查工序施工结果；⑤发现施工作业中的问题，及时指出并向专业监理工程报告。选项ACD属于专业监理工程师的职责。"}, {"id": 21, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据《建设工程监理规范》，监理人员应参加（　　）主持召开的图纸会审会议。", "opts": ["建设单位", "施工单位", "施工图审查机构", "设计单位"], "ans": [0], "exp": "监理人员应熟悉工程设计文件，有关监理人员应参加建设单位主持召开的图纸会审和设计交底会议。图纸会审和设计交底会议纪要应由项目监理机构负责整理，建设单位、设计单位、施工单位代表及总监理工程师共同签字。"}, {"id": 22, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "工程质量监督工作内容如下：①组织安排工程质量监督准备工作；②组织实施工程竣工验收质量监督；③组织实施工程施工质量监督；④审核办理工程质量监督手续。下列程序正确的是（　　）。", "opts": ["④①③②", "①④②③", "①②④③", "④①②③"], "ans": [0], "exp": "工程质量监督程序：①审核办理工程质量监督手续；②组织安排工程质量监督准备工作；③组织实施工程施工质量监督；④组织实施工程竣工验收质量监督。"}, {"id": 23, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "在合作体承包模式中，当合作体内某一家施工单位倒闭破产时，其风险将由（　　）承担。", "opts": ["合作体内其他成员单位", "倒闭破产的施工单位", "建设单位", "施工总承包单位"], "ans": [2], "exp": "当合作体内某一家施工单位倒闭破产时，其他成员单位及合作体机构不承担其承包合同的经济责任，这一风险将由建设单位承担。"}, {"id": 24, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列工程项目承包模式中，建设单位组织协调工作量小，但风险较大的是（　　）。", "opts": ["施工总承包模式", "合作体承包模式", "平行承包模式", "联合体承包模式"], "ans": [1], "exp": "合作体承包模式有以下特点：①建设单位组织协调工作量小，但风险较大；②各承包单位之间有合作愿望，但又不愿意组成联合体。"}, {"id": 25, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "第一次工地会议由（　　）主持召开。", "opts": ["施工单位", "监理单位", "建设单位", "设计单位"], "ans": [2], "exp": "施工单位应参加由建设单位主持召开的第一次工地会议。在会上，施工单位应介绍派驻现场的组织机构、人员及其职责分工，以及施工准备情况。会议纪要由项目监理机构负责整理，与会各方代表会签。"}, {"id": 26, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "建设工程采用CM承包模式时，CM单位有代理型和非代理型两种。工程分包单位的签约对象是（　　）。", "opts": ["代理型为建设单位，非代理型为CM单位", "代理型为CM单位，非代理型为建设单位", "无论代理型或非代理型，均为建设单位", "无论代理型或非代理型，均为CM单位"], "ans": [0], "exp": "采用CM承包模式时，代理型由建设单位直接签订，非代理型为CM单位与分包单位签订分包合同。"}, {"id": 27, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据《标准施工招标文件》，缺陷责任期最长不超过（　　）年。", "opts": ["2", "1", "3", "4"], "ans": [0], "exp": "建设工程自竣工验收合格之日起即进入缺陷责任期。施工承包单位应在缺陷责任期内对已交付使用的工程质量缺陷承担责任。缺陷责任期最长不超过2年。"}, {"id": 28, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据城市和交通基础设施项目，港口、沿海及内河航运项目，最低资本金比例为（　　）。", "opts": ["25%", "30%", "35%", "20%"], "ans": [3], "exp": "根据城市和交通基础设施项目，港口、沿海及内河航运项目，最低资本金比例为20%。"}, {"id": 29, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据政府投资项目的审批制，对于采用直接投资和资本金注入方式的政府投资项目，政府投资主管部门需从投资决策角度审批项目建议书和可行性研究报告。除特殊情况外，不再审批（　　）。", "opts": ["资金申请报告", "安全生产责任制", "流程文件", "开工报告"], "ans": [3], "exp": "根据政府投资项目的审批制，对于采用直接投资和资本金注入方式的政府投资项目，政府投资主管部门需从投资决策角度审批项目建议书和可行性研究报告。除特殊情况外，不再审批开工报告。"}, {"id": 30, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "关于工程建设实施程序中，（　　）是工程建设实施阶段的首要环节。", "opts": ["工程监理", "工程勘察设计", "建设准备", "生产准备"], "ans": [1], "exp": "工程勘察设计是工程建设实施阶段的首要环节，在工程建设中发挥着龙头作用。"}, {"id": 31, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据工程建设实施程序说法中，错误的是（　　）。", "opts": ["工程设计一般分为初步设计和施工图设计两个阶段，对于重大工程和技术复杂工程，可根据需要增加技术设计阶段", "工程开工时间是指该工程设计文件中规定的任何一项临时性工程第一次正式破土开槽开始施工的时间", "生产准备是工程项目交付投产前由建设单位进行的一项重要工作", "铁路、公路、水库等需要进行大量土石方工程的，以正式开始进行土方、石方工程的时间作为正式开工时间"], "ans": [1], "exp": "工程开工时间是指该工程设计文件中规定的任何一项永久性工程第一次正式破土开槽开始施工的时间。"}, {"id": 32, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "关于平行承包模式的特点，说法错误的是（　　）。", "opts": ["有利于控制工程质量", "工程造价控制难度小", "有利于缩短建设工期", "有利于建设单位择优选择施工单位"], "ans": [1], "exp": "平行承包模式有以下特点：（1）有利于建设单位择优选择施工单位。（2）有利于控制工程质量。（3）有利于缩短建设工期。（4）组织管理和协调工作量大。（5）工程造价控制难度大。（6）与总承包模式相比，平行承包模式不利于发挥那些技术水平高、综合管理能力强的总承包商综合优势。"}, {"id": 33, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列选项中，属于首次监督会议议题的是（　　）。", "opts": ["检查工程参建各方提供的有关任命文件", "检查有关工程质量文件、施工技术资料是否齐全并符合规定", "核查工程参建各方主要管理人员资格", "审查施工组织设计、监理规划和监理实施细则等文件内容及审批手续"], "ans": [0], "exp": "首次监督会议议题包括：①介绍负责工程质量监督负责人和监督工程师；②介绍工程质量监督计划；③明确必须监督的重要施工部位和重要环节；④检查工程参建各方提供的有关任命文件（如总监理工程师、施工项目经理、建设单位代表任命书等）；⑤宣布监督工作纪律；⑥公布监督举报电话。首次监督会议应形成会议纪要。BCD选项属于检查各方主体行为，确认具备开工条件。"}, {"id": 34, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列工程造价文件中，属于技术设计阶段文件的是（　　）。", "opts": ["施工图预算", "投资估算", "设计概算", "修正概算"], "ans": [3], "exp": "技术设计是指为解决初步设计未解决的重大技术问题而进行的活动，包括工艺流程、建筑结构、设备选型等问题的解决。技术设计文件中需要包含修正概算。"}, {"id": 35, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "项目监理机构应签发工程暂停令的情形是（　　）。", "opts": ["施工单位出现安全隐患", "施工单位违反工程建设企业标准的", "施工单位未按审查通过的专项施工方案施工的", "因施工不当造成工程质量不合格的"], "ans": [2], "exp": "工程施工有下列情形之一时，总监理工程师将会及时签发工程暂停令：（1）建设单位要求暂停施工且工程需要暂停施工的；（2）施工单位未经批准擅自施工或拒绝项目监理机构管理的；（3）施工单位未按审查通过的工程设计文件施工的；（4）施工单位未按批准的施工组织设计、（专项）施工方案施工或违反工程建设强制性标准的；（5）施工存在重大质量、安全事故隐患或发生质量、安全事故的。"}, {"id": 36, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "工程设计是对工程建设所需技术、经济、资源、环境等条件进行综合分析论证，编制工程设计文件的活动。以下关于工程设计的说法，正确的是（　　）。", "opts": ["施工图设计是指为解决初步设计未解决的重大技术问题而进行的活动，包括工艺流程、建筑结构、设备选型等问题的解决", "工程设计一般分为初步设计和施工图设计两个阶段，对于重大工程和技术复杂工程，可根据需要增加技术设计阶段", "通过初步设计，完整地表现建筑物外形、内部空间分割、结构体系、构造状况及建筑群组成和周围环境的配合", "施工图设计还应编制施工预算，作为工程施工依据"], "ans": [1], "exp": "A选项错误，技术设计是指为解决初步设计未解决的重大技术问题而进行的活动，包括工艺流程、建筑结构、设备选型等问题的解决。技术设计文件中需要包含修正概算。C选项错误，通过绘制施工图，完整地表现建筑物外形、内部空间分割、结构体系、构造状况及建筑群组成和周围环境的配合。D选项错误，施工图设计还应编制施工图预算，作为工程施工依据。"}, {"id": 37, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "工程项目寿命期包含（　　）和（　　）两个阶段。", "opts": ["投资决策；建设实施", "建设实施；运营维护", "可行性研究；建设实施", "投资决策；运营维护"], "ans": [0], "exp": "工程项目寿命期包含投资决策和建设实施两个阶段。"}, {"id": 38, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "公路（含政府收费公路）、铁路、城建、物流、生态环保、社会民生等领域的补短板基础设施项目，在投资回报机制明确、收益可靠、风险可控的前提下，可以适当降低项目最低资本金比例，但下调不得超过（　　）个百分点。", "opts": ["5", "10", "15", "20"], "ans": [0], "exp": "公路（含政府收费公路）、铁路、城建、物流、生态环保、社会民生等领域的补短板基础设施项目，在投资回报机制明确、收益可靠、风险可控的前提下，可以适当降低项目最低资本金比例，但下调不得超过5个百分点。"}, {"id": 39, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "房地产开发其他项目最低资本金比例是（　　）。", "opts": ["20%", "25%", "30%", "40%"], "ans": [1], "exp": "房地产开发项目其他项目的最低资本金比例为25%。"}, {"id": 40, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "水泥项目最低资本金比例是（　　）。", "opts": ["20%", "25%", "35%", "40%"], "ans": [2], "exp": "水泥项目最低资本金比例为35%。"}, {"id": 41, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "通过发行金融工具等方式筹措的各类资金，按照国家统一的会计制度应当分类为权益工具的，可以认定为投资项目资本金，但不得超过资本金总额的（　　）。", "opts": ["10%", "30%", "40%", "50%"], "ans": [3], "exp": "通过发行金融工具等方式筹措的各类资金，按照国家统一的会计制度应当分类为权益工具的，可以认定为投资项目资本金，但不得超过资本金总额的50%。"}, {"id": 42, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "（　　）办理施工许可证、工程质量监督等手续。", "opts": ["建设单位", "施工单位", "设计单位", "监理单位"], "ans": [0], "exp": "建设准备。在工程开工建设前，需要切实做好各项准备工作，这些准备工作包括：（1）征地、拆迁和场地平整；（2）完成施工用水、电、通信网络、交通道路等接通工作；（3）准备必要的施工图纸；（4）组织工程监理、施工及材料设备采购招标工作；（5）办理施工许可证、工程质量监督等手续。上述建设准备工作主要应由建设单位完成。对于有些工程的施工场地平整，施工用水、电、通信网络、交通道路等接通工作，可纳入工程施工合同交由施工单位承担。在工程总承包模式下，施工图纸的准备也将由工程总承包单位完成。"}, {"id": 43, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "对于直接用于物质生产或为物质生产服务的项目（即生产性项目）而言，生产准备是工程项目交付投产前由（　　）进行的一项重要工作。", "opts": ["施工单位", "建设单位", "设计单位", "监理单位"], "ans": [1], "exp": "对于直接用于物质生产或为物质生产服务的项目（即生产性项目）而言，生产准备是工程项目交付投产前由建设单位进行的一项重要工作。生产准备是衔接建设与生产的桥梁，是工程建设转入生产经营的必要条件。建设单位需要适时组成专门机构进行生产准备工作，确保工程建成后能及时投产。"}, {"id": 44, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "建设工程自（　　）之日起即进入缺陷责任期。", "opts": ["竣工结算完成", "监理预验收", "工程完工", "竣工验收合格"], "ans": [3], "exp": "建设工程自竣工验收合格之日起即进入缺陷责任期。施工承包单位应在缺陷责任期内对已交付使用的工程质量缺陷承担责任。缺陷责任期最长不超过2年。在缺陷责任期内发现有质量缺陷的，应及时修复，修复和查验费用由责任方承担。缺陷责任期届满时，建设单位应向工程承包单位返还工程施工过程中扣留的工程质量保证金。缺陷责任期届满时，工程承包单位未履行缺陷修补义务的，建设单位有权扣留与未履行责任部分所需金额相应的工程质量保证金，并有权根据合同约定要求延长缺陷责任期，直至履行缺陷义务为止。"}, {"id": 45, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "设计、采购和施工任务综合的承包被简称为（　　）。", "opts": ["EPC承包", "联合体承包", "DB承包", "CM总承包"], "ans": [0], "exp": "工程总承包有丰富内涵和不同模式DB（设计—建造）/EPC（设计—采购—施工）是其中常见的两种代表性模式"}, {"id": 46, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "某工程施工合同结构图如下，则该工程施工发承包模式是（　　）。", "opts": ["施工总承包模式", "施工总承包管理模式", "建设项目工程总承包模式", "平行承包模式"], "ans": [3], "exp": "平行承包是指建设单位将工程项目划分为若干标段，分别发包给多家承包单位承担。"}, {"id": 47, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "某地铁工程，业主将10座车站的土建工程分别发包给10个土建施工单位，机电安装工程分别发包给10个机电安装单位。业主采用的发承包模式是（　　）。", "opts": ["施工总承包模式", "施工平行承包模式", "施工总承包管理模式", "EPC承包模式"], "ans": [1], "exp": "平行承包是指建设单位将工程项目划分为若干标段，分别发包给多家承包单位承担。"}, {"id": 48, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "以下关于联合体承包模式的特点，说法不正确的是（　　）。", "opts": ["建设单位合同结构复杂", "有利于工程造价和工期控制", "有利于增强竞争能力", "有利于增强抗风险能力"], "ans": [0], "exp": "联合体承包模式有以下特点：（1）建设单位合同结构简单，组织协调工作量小，而且有利于工程造价和工期控制。（2）可以集中联合体各成员单位在资金、技术和管理等方面优势，克服一家单位力不能及的困难，不仅有利于增强竞争能力，同时有利于增强抗风险能力。"}, {"id": 49, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "（　　）是由工程监理单位法定代表人书面任命，负责履行建设工程监理合同、主持项目监理机构工作的注册监理工程师。", "opts": ["总监理工程师", "总监理工程师代表", "专业监理工程师", "监理员"], "ans": [0], "exp": "总监理工程师是由工程监理单位法定代表人书面任命，负责履行建设工程监理合同、主持项目监理机构工作的注册监理工程师。"}, {"id": 50, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "图纸会审和设计交底会议纪要应由（　　）负责整理，建设单位、设计单位、施工单位代表及总监理工程师共同签认。", "opts": ["建设单位", "项目监理机构", "设计单位", "施工项目部"], "ans": [1], "exp": "图纸会审和设计交底会议纪要应由项目监理机构负责整理，建设单位、设计单位、施工单位代表及总监理工程师共同签认。"}, {"id": 51, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "经项目监理机构审查符合要求的施工组织设计，由（　　）签认后将会报送建设单位。", "opts": ["总监理工程师", "专业监理工程师", "监理员", "项目经理"], "ans": [0], "exp": "经项目监理机构审查符合要求的施工组织设计，由总监理工程师签认后将会报送建设单位。"}, {"id": 52, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "项目监理机构施工分包单位的内容中，（　　）不是必须审查项。", "opts": ["营业执照", "安全生产许可文件", "类似工程业绩", "施工工人身份信息"], "ans": [3], "exp": "项目监理机构将会审查施工分包单位以下内容：（1）营业执照、企业资质等级证书；（2）安全生产许可文件；（3）类似工程业绩；（4）专职管理人员和特种作业人员资格。"}, {"id": 53, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "对涉及深基坑、地下暗挖工程、高大模板工程的专项施工方案，项目监理机构还要检查（　　）组织专家进行论证、审查的情况。", "opts": ["建设单位", "监理单位", "施工单位", "勘察单位"], "ans": [2], "exp": "对于施工单位报送的施工方案，项目监理机构的审查内容包括：①编审程序是否符合相关规定；②工程质量保证措施是否符合有关标准。对于施工单位报送的专项施工方案，项目监理机构的审查内容包括：①编审程序是否符合相关规定；②安全技术措施是否符合工程建设强制性标准。对达到一定规模危险性较大的分部分项工程的专项施工方案，还要检查是否附具安全验算结果。对涉及深基坑、地下暗挖工程、高大模板工程的专项施工方案，还要检查施工单位组织专家进行论证、审查的情况。"}, {"id": 54, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "编制可行性研究报告属于建设工程项目（　　）。", "opts": ["投资决策阶段的工作", "建设实施阶段的工作", "设计准备阶段的工作", "施工阶段的工作"], "ans": [0], "exp": "编制项目建议书、编制可行性研究报告均属于项目投资决策阶段的工作。"}, {"id": 55, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "建设工程缺陷责任期最长的期限为（    ）。", "opts": ["1年", "2年", "3年", "5年"], "ans": [1], "exp": "建设工程自竣工验收合格之日起即进入缺陷责任期。施工承包单位应在缺陷责任期内对已交付使用的工程质量缺陷承担责任。缺陷责任期最长不超过2年。"}, {"id": 56, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "通过发行权益型金融工具筹措的资金，认定为投资项目资本金的，占项目资本金总额的最高比例是（    ）。", "opts": ["30%", "40%", "50%", "60%"], "ans": [2], "exp": "通过发行金融工具等方式筹措的各类资金，按照国家统一的会计制度应当分类为权益工具的，可以认定为投资项目资本金，但不得超过资本金总额的50%。"}, {"id": 57, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "工程质量监督机构发现其监督的工程有影响使用功能的质量问题时，应采取的监督措施是（    ）。", "opts": ["签发工程质量问题整改通知单并进行现场取证", "签发工程质量问题整改通知单并监督整改过程", "签发工程暂停令并组织召开现场整改工作会", "签发工程暂停令并进行现场取证重新测算"], "ans": [0], "exp": "工程质量监督机构发现有影响主体结构、使用功能和施工安全的质量问题和事故隐患时，应即时签发工程质量问题整改通知单，并采取摄影、摄像方式进行现场取证。对于存在严重质量事故隐患或发生质量事故的，应立即责令停工。"}, {"id": 58, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列工业投资项目中，项目资本金不应低于项目总投资40%的是（    ）。", "opts": ["水泥项目", "铁合金项目", "电解铝项目", "多晶硅项目"], "ans": [2], "exp": "城市和交通基础设施项目；城市轨道交通项目20%。港口、沿海及内河航运项目；铁路、公路项目；机场项目25%。房地产开发项目；保障性住房和普通商品住房项20%。其他项目25%。产能过剩行业项目；钢铁、电解铝项目40%。水泥项目35%。煤炭、电石、铁合金、烧碱、焦炭、黄磷、多晶硅项30%。其他工业项目；玉米深加工项目20%。化肥（钾肥除外）项目25%；电力等其他项目20%。"}, {"id": 59, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据《企业投资项目核准和备案管理条例》，对于需要备案的项目，企业应根据属地管理原则，通过项目在线监管平台进行备案的时间是（    ）。", "opts": ["提交项目申请书前", "开工建设前", "施工图设计后", "初步设计后"], "ans": [1], "exp": "企业投资项目备案制。根据《企业投资项目核准和备案管理条例》（中华人民共和国国务院令第673号），《政府核准的投资项目目录》外的企业投资项目实行备案管理。企业应根据属地原则，在开工建设前通过项目在线监管平台将下列信息告知备案机关：①企业基本情况；②项目名称、建设地点、建设规模、建设内容；③项目总投资额；④项目符合产业政策的声明。企业应对备案项目信息的真实性负责。"}, {"id": 60, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "采用施工总承包招标的工程，投标人投标报价的基础通常是（    ）。", "opts": ["施工图设计", "技术设计", "初步设计", "方案设计"], "ans": [0], "exp": "采用施工总承包模式，投标人通常以施工图设计为基础进行投标报价，在工程开工前即有较为明确的合同价。"}, {"id": 61, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "工程开工前，质量监督机构召开的首次监督会议需要检查施工单位提供的文件是（    ）。", "opts": ["施工组织设计", "施工项目经理任命书", "施工方案", "施工质量承诺书"], "ans": [1], "exp": "召开首次监督会议，明确相关职责。在办理工程质量监督于续后、工程开工前，工程质量监督机构应召开建设单位、勘察单位、设计单位、施工单位、工程监理单位等相关责任主体参加的首次监督会议，明确监督程序、监督人员、监督工作纪律、廉政要求和投诉举报受理方式，提出工程建设相关事项发生变化后及时补报等相关工作要求。首次监督会议议题包括：①介绍负责工程质量监督负责人和监督工程师；②介绍工程质量监督计划；③明确必须监督的重要施工部位和重要环节；④检查工程参建各方提供的有关任命文件（如总监理工程师、施工项目经理、建设单位代表任命书等）；⑤宣布监督工作纪律；⑥公布监督举报电话。首次监督会议应形成会议纪要。"}, {"id": 62, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "下列关于承发包模式的说法，正确的有（　　）。", "opts": ["联合体承发包模式中，业主应和联合体各方分别签订承包合同", "平行承发包模式中，业主的组织管理工作量大，有利于工程质量和造价控制", "非代理型CM承包模式中，业主与CM单位和分包商分别签订合同", "合作体承包模式中，建设单位组织协调工作量小，但风险较大", "DB和EPC是工程总承包中常见的两种代表性模式"], "ans": [3, 4], "exp": "选项A错误，联合体承包模式中，联合体各成员单位共同与建设单位签订工程承包合同。选项B错误，平行承包模式中，组织管理和协调工作量大，工程造价控制难度大。选项C错误，非代理型的CM单位直接与分包单位签订分包合同。"}, {"id": 63, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "下列关于工程总承包模式的说法，正确的有（　　）。", "opts": ["建设工期较长", "有利于减少工程变更", "工程设计与施工责任主体一体化", "合同管理工作量大大减少", "建设单位前期工作量少"], "ans": [1, 2, 3], "exp": "选项A错误，工程总承包单位能够在全部设计完成之前便可开始其他工作，有利于缩短建设工期。选项E错误，建设单位前期工作量大。由于工程总承包单位的技术水平和职业道德将直接影响到工程成败，因此，建设单位为慎重选择工程总承包单位，不得不在招标和评标阶段花费大量时间和精力对投标单位进行评审，这使得项目初期投入将会加大。"}, {"id": 64, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "下列关于工程质量监督的说法，错误的有（　　）。", "opts": ["工程质量监督报告必须由工程质量监督负责人签认", "核验工程质量保证资料的目的是验证工程实体质量", "工程开工前，建设单位需申请办理工程质量监督手续", "工程质量监督机构应对工程质量保证资料进行逐一检查", "工程竣工验收工作之前工程质量监督机构应出具工程质量监督报告"], "ans": [3, 4], "exp": "选项D错误，工程质量监督机构应对工程质量保证资料进行抽查。选项E错误，工程竣工验收工作结束后出具工程质量监督报告。"}, {"id": 65, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "下列关于施工过程中报审报验的说法，正确的有（　　）。", "opts": ["对涉及高大模板工程的专项施工方案，要检查施工单位组织专家进行论证、审查的情况", "项目监理机构不需要对用于工程的材料进行检验", "施工单位应直接向建设单位提出索赔费用", "施工单位应通过项目监理机构向建设单位要求工程延期", "项目监理机构应检查试验室的资质等级及试验范围"], "ans": [0, 3, 4], "exp": "选项B错误，项目监理机构还将会按照有关规定、工程监理合同约定，对用于工程的材料进行平行检验。选项C错误，施工单位向建设单位索赔费用或要求工程延期，均应通过项目监理机构提出。"}, {"id": 66, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "下列关于partnering模式的说法，正确的有（　　）。", "opts": ["partnering协议只是建设单位与承包单位之间的协议", "partnering模式强调资源共享", "partnering模式是一种独立存在的承发包模式", "partnering模式特别强调工程参建方基层人员的参与", "partnering协议不是法律意义上的合同"], "ans": [1, 4], "exp": "选项A错误，Partnering协议并不仅是建设单位与承包单位之间的协议，而需要工程建设参与各方共同签署。选项C错误，Partnering模式不是一种独立存在的模式，它通常需要与工程项目其他组织模式中的某一种结合使用。选项D错误，partnering模式特别强调高层管理者参与。"}, {"id": 67, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "下列关于项目资本金的说法，正确的有（　　）。", "opts": ["公益性投资项目不实行资本金制度", "项目资本金对投资项目来说是非债务性资金", "项目资本金可以用货币出资，也可以用实物、工业产权、非技术专利等作价出资", "投资者可以转让、抽回其出资", "各种经营性固定资产投资项目必须先落实资本金才能建设"], "ans": [0, 1, 2, 4], "exp": "投资者可按其出资比例依法享有所有者权益，也可转让其出资，但不得以任何方式抽回。"}, {"id": 68, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "下列选项中，关于建设工程新开工时间，说法正确的有（　　）。", "opts": ["平整场地开始施工的日期", "不需开槽的工程，以正式开始打桩的日期作为正式开工日期", "需要进行大量土石方工程的水库工程，以开始进行土方、石方工程施工的日期作为正式开工日期", "既有建筑物拆除开始施工的日期", "建设工程设计文件中规定的任何一项永久性工程第一次正式破土开槽的开始日期"], "ans": [1, 2, 4], "exp": "建设工程经批准开工建设或取得施工许可证后，即可进入施工阶段。工程开工时间是指该工程设计文件中规定的任何一项永久性工程第一次正式破土开槽开始施工的时间。不需开槽的工程，正式开始打桩的时间就是开工时间。铁路、公路、水库等需要进行大量土石方工程的，以正式开始进行土方、石方工程的时间作为正式开工时间。工程地质勘察、平整场地、既有建筑物拆除、临时建筑、施工用临时道路和水、电等工程开始施工不能算作正式开工。分期建设的工程分别以各期工程开工的时间作为开工时间，如二期工程应根据工程设计文件规定的永久性工程开工时间作为开工时间。"}, {"id": 69, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "平行承包是指建设单位将工程项目划分为若干标段，分别发包给多家施工单位承包。以下属于平行承包模式特点的有（　　）。", "opts": ["有利于缩短建设工期", "有利于建设单位择优选择施工单位", "有利于控制工程质量", "组织管理和协调工作量小", "工程造价控制难度大"], "ans": [0, 1, 2, 4], "exp": "平行承包模式有以下特点：（1）有利于建设单位择优选择承包单位。由于合同内容比较单一、合同价值小、风险小，有利于不具备总承包能力的中小承包商参与竞争。建设单位可在更大范围内选择承包单位。（2）有利于控制工程质量。整个工程经分解后分别发包给各承包单位，合同约束与相互制约使每一部分都能较好地实现其质量要求。如主体工程与装修工程分别由两个施工单位承包，当主体工程不合格时，装修单位不会同意在不合格的主体工程上进行装修，这种他控机制比自控更有约束力。（3）有利于缩短建设工期。由于工程施工任务经分解后平行发包，在工艺技术及场地允许的条件下，多个标段任务并行实施，可缩短整个工程项目工期。（4）组织管理和协调工作量大。由于合同数量多，使工程项目系统中合同界面（结合部）数量增加，要求建设单位具有较强的组织协调能力。（5）工程造价控制难度大。由于招标任务量大，需控制多项合同价格，从而使工程造价控制难度增加。（6）与总承包模式相比，平行承包模式不利于发挥那些技术水平高、综合管理能力强的承包商综合优势。"}, {"id": 70, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "总监理工程师是由工程监理单位法定代表人书面任命，负责履行建设工程监理合同、主持项目监理机构工作的注册监理工程师。总监理工程师应履行的职责有（　　）。", "opts": ["参与编制监理规划，负责编制监理实施细则", "组织审核施工单位的付款申请，签发工程款支付证书，组织审核竣工结算", "审查开复工报审表，签发工程开工令、暂行令和复工令", "处置发现的质量问题和安全事故隐患", "组织审核分包单位资格"], "ans": [1, 2, 4], "exp": "AD选项错误，属于专业监理工程师职责。"}, {"id": 71, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "工程质量监督机构实施监督检查。监督检查内容主要包括（　　）。", "opts": ["工程参建各方主体质量行为", "工程实体质量", "工程质量保证资料", "年度、季度检查计划", "工程质量事故隐患及问题查处"], "ans": [0, 1, 2], "exp": "监督检查内容主要包括：①工程参建各方主体质量行为。②工程实体质量。③工程质量保证资料。"}, {"id": 72, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "关于工程项目投资管理制度，说法错误的有（　　）。", "opts": ["项目资本金可以用货币出资，也可以用实物、工业产权、专利技术、土地使用权作价出资", "煤炭、电石、铁合金、烧碱、焦炭、黄磷、多晶硅项目最低资本金比例为25%", "玉米深加工项目最低资本金比例为25%", "通过发行金融工具等方式筹措的各类资金，按照国家统一的会计制度应当分类为权益工具的，可以认定为投资项目资本金，但不得超过资本金总额的50%", "对于采用投资补助、转贷和贷款贴息方式的政府投资项目，政府投资主管部门只审批开工报告"], "ans": [0, 1, 2, 4], "exp": "A选项错误，项目资本金可以用货币出资，也可以用实物、工业产权、非专利技术、土地使用权作价出资；B选项错误，煤炭、电石、铁合金、烧碱、焦炭、黄磷、多晶硅项目最低资本金比例为30%；C选项错误，玉米深加工项目最低资本金比例为20%；E选项错误，对于采用投资补助、转贷和贷款贴息方式的政府投资项目，政府投资主管部门只审批资金申请报告。"}, {"id": 73, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "在工程开工建设前，建设单位建设准备工作包括（　　）。", "opts": ["征地、拆迁和场地平整", "组织材料设备采购招标工作", "提供完整的施工图纸", "办理施工许可证", "办理工程质量监督手续"], "ans": [0, 1, 3, 4], "exp": "在工程开工建设前，需要切实做好各项准备工作，这些准备工作包括：①征地、拆迁和场地平整；②完成施工用水、电、通信网络、交通道路等接通工作；③准备必要的施工图纸；④组织工程监理、施工及材料设备采购招标工作；⑤办理施工许可证、工程质量监督等手续。"}, {"id": 74, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "建设单位在申请办理工程质量监督手续时，需提供的资料有（　　）。", "opts": ["中标通知书和施工、监理合同", "施工图设计文件审查报告和批准书", "施工组织设计和监理实施细则", "建设单位、施工单位和工程监理单位的项目负责人和机构组成", "竣工报验及结算申请"], "ans": [0, 1, 2, 3], "exp": "工程开工前，建设单位需要到规定的工程质量监督机构办理工程质量监督手续，未按规定办理工程质量监督手续的，一律不得开工。建设单位在申请办理工程质量监督手续时，需提供下列资料：（1）施工图设计文件审查报告和批准书；（2）中标通知书和施工、监理合同；（3）建设单位、施工单位和工程监理单位的项目负责人和机构组成；（4）施工组织设计和监理规划（监理实施细则）；（5）其他需要的文件资料。"}, {"id": 75, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "根据《建设工程监理范围和规模标准规定》，必须实行监理的国家重点建设工程有（    ）。", "opts": ["高科技并能带动行业技术进步的工程", "使用国外政府贷款资金的工程", "基础产业和支柱产业中的大型项目", "跨地区并对全国经济发展有重大影响的项目", "对生态环境影响较大的工程"], "ans": [0, 2, 3], "exp": "国家重点建设工程是指对国民经济和社会发展有重大影响的骨干项目，包括：（1）基础设施、基础产业和支柱产业中的大型项目；（2）高科技并能带动行业技术进步的项目；（3）跨地区并对全国经济发展或者区域经济发展有重大影响的项目；（4）对社会发展有重大影响的项目；（5）其他骨干项目。"}, {"id": 76, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "企业办理投资项目核准手续时，向核准机关提交的项目申请书应包括的内容有（    ）。", "opts": ["项目利用资源情况分析", "项目融资能力分析", "项目对经济的影响分析", "项目财务盈利能力分析", "项目对生态环境的影响分析"], "ans": [0, 2, 4], "exp": "项目申请书应包括下列内容：①企业基本情况；②项目情况，包括项目名称、建设地点、建设规模、建设内容等；③项目利用资源情况分析及对生态环境的影响分析；④项目对经济和社会的影响分析。由国务院有关部门核准的项目，企业可通过项目所在地省、自治区、直辖市和计划单列市人民政府有关部门转送项目申请书。"}, {"id": 77, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "下列施工单位行为中，总监理工程师将会根据《建设工程监理规范》签发工程暂停令的有（    ）。", "opts": ["未对进场的工程材料进行报验", "未按批准的专项施工方案施工", "未按批准的开工时间组织施工", "未按批准的施工组织设计施工", "未按宙查通过的工程设计文件施工"], "ans": [1, 3, 4], "exp": "工程施工有下列情形之一的，总监理工程师将会及时签发工程暂停令：（1）建设单位要求暂停施工且工程需要暂停施工的；（2）施工单位未经批准擅自施工或拒绝项目监理机构管理的；（3）施工单位未按审查通过的工程设计文件施工的；（4）施工单位未按批准的施工组织设计、（专项）施工方案施工或违反工程建设强制性标准的；（5）施工存在重大质量、安全事故隐患或发生质量、安全事故的。"}, {"id": 78, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "关于施工项目管理组织结构形式，如下图所示，则下图属于（　　）。", "opts": ["直线式组织结构", "矩阵式组织结构", "职能式组织结构", "直线职能式组织结构"], "ans": [3], "exp": "直线职能式组织结构综合直线式组织结构和职能式组织结构的优点而形成。与职能式组织结构相同的是，在各管理层设置职能部门，但职能部门只作为相应层级领导的参谋，在其所管辖业务范围内实施管理，不直接指挥下级，与下一层级职能部门构成业务指导关系。职能部门的指令，必须经过同层级领导的批准才能下达。各管理层级之间按直线式组织结构原理构成直接上下级关系。"}, {"id": 79, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列选项中，属于中矩阵式组织结构特点的是（　　）。", "opts": ["精心建立管理程序和配备训练有素的协调人员", "管理人员业务工作专业化，易于提高工作质量，同时可以减轻领导者负担", "拥有专职的、具有较大权限的项目经理及专职项目管理人员", "结构简单、权力集中、易于统一指挥、隶属关系明确、职责分明、决策迅速"], "ans": [0], "exp": "中矩阵式组织也称平衡矩阵式组织。在平衡矩阵式组织结构中，项目经理被授予一定权力，对项目整体及项目目标负责。项目部成员是从各职能部门抽调而来，并在成员中指定一人担任项目主任。一旦项目结束，项目主任的头衔随之消失。平衡矩阵式组织结构的特点是需要精心建立管理程序和配备训练有素的协调人员。平衡矩阵制组织结构适用于中等技术复杂程度且建设周期较长的工程项目。B选项属于职能式组织结构；C选项属于强矩阵式组织结构；D选项属于直线式组织结构。"}, {"id": 80, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "（　　）中，项目经理由企业最高领导任命，并全权负责项目。", "opts": ["职能式组织", "强矩阵式组织", "责任矩阵", "直线职能式组织"], "ans": [1], "exp": "强矩阵式组织中，项目经理由企业最高领导任命，并全权负责项目。项目经理直接向企业最高领导负责，项目部成员绩效完全由项目经理进行考核，项目组成员只对项目经理负责。"}, {"id": 81, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "在矩阵式组织结构中，工作的指令来源会有（　　）个。", "opts": ["1", "2", "3", "4"], "ans": [1], "exp": "矩阵中每一位成员同时受项目经理和职能部门经理的双重领导，如果处理不当，会造成矛盾，产生扯皮现象。因此其指令源有2个。"}, {"id": 82, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "对业主而言，项目进度目标指的是项目（　　）。", "opts": ["竣工的时间目标", "交付使用的时间目标", "移交的时间目标", "竣工结算的时间目标"], "ans": [1], "exp": "进度目标是指工程项目交付使用的时间目标。"}, {"id": 83, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "按照项目经理的权限不同，矩阵式组织结构可分为三种形式是（　　）。", "opts": ["强矩阵式组织、线性矩阵式组织和弱矩阵式组织", "大矩阵式组织、中矩阵式组织和小矩阵式组织", "强矩阵式组织、职能矩阵式组织和弱矩阵式组织", "强矩阵式组织、中矩阵式组织和弱矩阵式组织"], "ans": [3], "exp": "按照项目经理的权限不同，矩阵式组织结构又可分为三种形式：强矩阵式组织、中矩阵式组织和弱矩阵式组织。"}, {"id": 84, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "关于弱矩阵式组织结构的说法，正确的是（　　）。", "opts": ["需要明确对项目目标负责的项目经理", "员工绩效由项目经理进行考核", "适用于技术简单的工程项目", "项目管理者的权限很大"], "ans": [2], "exp": "A选项错误，并未明确对项目目标负责的项目经理。B选项错误，员工绩效由职能部门经理进行考核。D选项错误，项目管理者的权限很小。"}, {"id": 85, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列属于工程总承包方项目管理的试运行执行计划内容的是（　　）。", "opts": ["技术经济要求", "组织机构及职责分工", "质量保证程序和要求", "培训计划"], "ans": [3], "exp": "选项ABC是设计执行计划的内容，选项D是试运行执行计划的内容。"}, {"id": 86, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列选项中，属于施工项目经理权限的是（　　）。", "opts": ["在授权范围内组织编制和落实施工组织设计、项目管理实施规划、施工进度计划、绿色施工及环境保护措施、质量安全技术措施、施工方案和专项施工方案", "在授权范围内直接与项目相关方进行沟通", "组织项目团队成员进行施工合同交底和项目管理目标责任分解", "在授权范围内进行项目管理指标分解，优化项目资源配置，协调施工现场人力资源安排，并对工程材料、构配件、施工机具设备等资源的质量和安全使用进行全程监控"], "ans": [1], "exp": "《建设工程施工项目经理岗位职业标准》T/CCIAT0010—2019规定，项目经理应具有但不限于下列权限：（1）参与项目投标及施工合同签订。（2）参与组建项目经理部，提名项目副经理、项目技术负责人，选用项目团队成员。（3）主持项目经理部工作，组织制定项目经理部管理制度。（4）决定企业授权范围内的资源投入和使用。（5）参与分包合同和供货合同签订。（6）在授权范围内直接与项目相关方进行沟通。（7）根据企业考核评价办法组织项目团队成员绩效考核评价，按企业薪酬制度拟定项目团队成员绩效工资分配方案，提出不称职管理人员解聘建议。"}, {"id": 87, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "工程项目部编制责任矩阵的第一步是（　　）。", "opts": ["列出参与项目管理及负责执行项目任务的个人", "列出需要完成的项目管理任务", "画出纵横交叉的责任矩阵图", "检查各人员的项目管理任务分配是否均衡适当"], "ans": [1], "exp": "工程项目部编制责任矩阵，可按下列程序进行：（1）列出需要完成的项目管理任务。（2）列出参与项目管理及负责执行项目任务的个人或职能部门名称。（3）以项目管理任务为行，以执行任务的个人或部门为列，画出纵横交叉的责任矩阵图。（4）在责任矩阵图的行与列交叉窗口中，用不同字母或符号表示项目管理任务与执行者的责任关系，从而建立“人”与“事”的关联。任务执行者在项目管理中通常有三种角色：①负责人P（Principal）；②支持者或参与者S（Support）；③审核者R（Review）。（5）检查各职能部门或人员的项目管理任务分配是否均衡适当。有过度分配或者分配不当的，则需要进行调整和优化。"}, {"id": 88, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "适用于技术复杂且时间紧迫的工程项目的是（　　）。", "opts": ["强矩阵式组织结构", "中矩阵式组织结构", "弱矩阵式组织结构", "职能式组织结构"], "ans": [0], "exp": "强矩阵式组织结构适用于技术复杂且时间紧迫的工程项目。"}, {"id": 89, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "工程总承包项目经理应履行的职责有（　　）。", "opts": ["①②③④", "①②③⑥", "②③⑤⑥", "②③④⑤"], "ans": [1], "exp": "④⑤是工程总承包项目经理的权限。"}, {"id": 90, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "工程总承包项目经理具有的权限有（　　）。", "opts": ["①②④", "①②⑤", "②③⑤", "①③④"], "ans": [3], "exp": "②⑤是工程总承包项目经理的职责。"}, {"id": 91, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "在责任矩阵图中，通常使用不同字母或符号来表示项目管理任务与执行者的责任关系，其中“P”通常代表（　　）。", "opts": ["支持者或参与者", "审核者", "负责人", "协调者"], "ans": [2], "exp": "任务执行者在项目管理中的角色有三种：“P”代表负责人（Principal）；“S”代表支持者或参与者（Support）；“R”代表审核者（Review）。"}, {"id": 92, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "施工项目管理采用直线职能式组织结构缺点是（　　）。", "opts": ["不利于提高管理效率", "管理部门职责不清", "信息传递时间过长", "缺少专业化分工"], "ans": [2], "exp": "直线职能式组织结构中各职能部门之间的横向联系差，信息传递路线长，职能部门与指挥者之间容易产生矛盾。"}, {"id": 93, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "关于项目管理责任矩阵的说法，正确的是（　　）。", "opts": ["责任检查时，横向检查可以确保每个人员至少负责一项工作", "责任检查时，纵向检查可以确保每项工作有人员负责", "基于管理活动的工作量估算，可以横向统计每个活动的总工作量", "基于管理活动的工作量估算，可以纵向统计每个活动的总工作量"], "ans": [2], "exp": "责任矩阵可以非常方便地进行责任检查：横向检查可以确保每项工作有人负责；纵向检查可以确保每个人至少负责一件“事”。基于管理活动的工作量估算，还可从横向统计每个活动的总工作量，从纵向统计每个角色投入的总工作量。"}, {"id": 94, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "项目组织形式中，（　　）是项目经理直接进行单线垂直领导，决策迅速，运用于中小型项目。", "opts": ["直线式", "矩阵式", "职能式", "事业部制"], "ans": [0], "exp": "直线式组织结构是一种最简单的组织结构形式。在这种组织结构中，各种职位均按直线垂直排列，项目经理直接进行单线垂直领导。"}, {"id": 95, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "在下列工程项目管理组织结构形式中，有利于管理的专业化的是（　　）。", "opts": ["直线职能式和直线式", "矩阵制和职能式", "职能式和直线职能式", "矩阵制和直线职能式"], "ans": [2], "exp": "职能式组织结构的主要优点是强调管理业务专门化，注意发挥各类专家在项目管理中的作用。直线职能式组织结构综合直线式组织结构和职能式组织结构的优点而形成。直线职能式组织结构既保持了直线式组织结构统一指挥的特点，又满足了职能式组织结构对管理工作专业化分工的要求。"}, {"id": 96, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据《建设工程施工项目经理岗位职业标准》，下列属于施工项目经理权限的是（　　）。", "opts": ["解聘不称职的项目管理人员", "主持工地例会", "在授权范围内签署结算文件", "组织制定项目经理部管理制度"], "ans": [3], "exp": "施工项目经理应具有但不限于下列权限：①参与项目投标及施工合同签订；②参与组建项目经理部，提名项目副经理、项目技术负责人，选用项目团队成员；③主持项目经理部工作，组织制定项目经理部管理制度；④决定企业授权范围内的资源投入和使用；⑤参与分包合同和供货合同签订；⑥在授权范围内直接与项目相关方进行沟通；⑦根据企业考核评价办法组织项目团队成员绩效考核评价，按企业薪酬制度拟定项目团队成员绩效工资分配方案，提出不称职管理人员解聘建议。"}, {"id": 97, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "某公司为完成某复杂的大型工程项目，要求在项目管理组织机构内设置职能部门以发挥各类专家作用。同时从公司临时抽调专业人员到项目管理组织机构，要求所有成员只对项目经理负责，项目经理全权负责该项目。该项目管理组织机构宜采用的组织形式是（　　）。", "opts": ["直线式", "强矩阵式", "职能式", "弱矩阵式"], "ans": [1], "exp": "强矩阵式组织结构中，项目经理由企业最高领导任命，并全权负责项目。项目经理直接向企业最高领导负责，项目部成员绩效完全由项目经理进行考核，项目部成员只对项目经理负责。适用于技术复杂且时间紧迫的工程项目。"}, {"id": 98, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "未设置职能部门，项目经理没有参谋和助手，要其通晓各种业务，成为“全能式”人才的管理组织结构形式是（　　）。", "opts": ["直线式组织结构", "职能式组织结构", "直线职能式组织结构", "矩阵式组织结构"], "ans": [0], "exp": "直线式组织结构的主要优点是结构简单、权力集中、易于统一指挥、隶属关系明确、职责分明、决策迅速。但由于未设置职能部门，项目经理没有参谋和助手，需要其通晓各种业务，成为“全能式”人才。无法实现管理工作专业化，不利于提高项目管理水平。"}, {"id": 99, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "在矩阵制组织结构形式中，矩阵中的每一个成员都要受（　　）的领导。", "opts": ["项目总经理和项目经理", "项目经理和指挥部门经理", "指挥部门经理和职能部门经理", "项目经理和职能部门经理"], "ans": [3], "exp": "矩阵中的每一个成员都受项目经理和职能部门经理的双重领导，如果处理不当，会造成矛盾，产生扯皮现象。"}, {"id": 100, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "某建设工程项目的管理按照职能式组织结构模式运行，这个组织结构的特点是（　　）。", "opts": ["传递信息路线长", "隶属关系明确", "易于提高工作质量", "能够实现集权和分权的最优结合"], "ans": [2], "exp": "职能式组织结构的主要优点是强调管理业务专门化，注意发挥各类专家在项目管理中的作用。由于管理人员业务工作专业化，易于提高工作质量，同时可以减轻领导者负担。但是，由于这种组织结构存在多头领导，使下级执行者接受多方指令，容易造成职责不清。"}, {"id": 101, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列项目管理组织结构形式中，未明确项目经理角色的是（　　）组织结构。", "opts": ["职能式", "弱矩阵制", "平衡矩阵制", "强矩阵制"], "ans": [1], "exp": "弱矩阵制组织中，并未明确对项目目标负责的项目经理。即使有项目负责人，其角色也只是一个项目协调者或监督者，而不是一个管理者。"}, {"id": 102, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "关于缺陷责任期的说法，正确的是（　　）。", "opts": ["缺陷责任期最长不超过3年", "建设工程自提交竣工验收申请报告之日起即进入缺陷责任期", "在缺陷责任期内发现有质量缺陷的，应及时修复，修复和查验费用由施工承包单位承担", "施工承包单位应在缺陷责任期内对已交付使用的工程质量缺陷承担责任"], "ans": [3], "exp": "A选项错误，缺陷责任期最长不超过2年。B选项错误，建设工程自竣工验收合格之日起即进入缺陷责任期。C选项错误，在缺陷责任期内发现有质量缺陷的，应及时修复，修复和查验费用由责任方承担。"}, {"id": 103, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "责任矩阵可以非常方便地进行责任检查，纵向检查可以确保（　　）。", "opts": ["每项工作有人负责", "每个人至少负责一件“事”", "不会出现人员闲置", "不会出现成本的浪费"], "ans": [1], "exp": "责任矩阵可以非常方便地进行责任检查：横向检查可以确保每项工作有人负责；纵向检查可以确保每个人至少负责一件“事”。基于管理活动的工作量估算，还可从横向统计每个活动的总工作量，从纵向统计每个角色投入的总工作量。"}, {"id": 104, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列不属于工程施工方项目管理目标的是（　　）。", "opts": ["施工成本目标", "施工质量目标", "施工进度目标", "施工合同目标"], "ans": [3], "exp": "工程施工方项目管理目标包括施工进度、质量、成本和安全。在绿色发展形势下，绿色也成为施工项目管理目标。"}, {"id": 105, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "关于强矩阵式组织结构的说法，正确的是（　　）。", "opts": ["拥有专职的、具有较大权限的项目经理及专职项目管理人员", "不利于加强各职能部门之间的协调配合", "不能用于技术复杂且时间紧迫的工程项目", "项目组成员绩效完全由企业最高领导进行考核"], "ans": [0], "exp": "B选项错误，有利于加强各职能部门之间的协调配合。C选项错误，强矩阵式组织结构适用于技术复杂且时间紧迫的工程项目。D选项错误，项目组成员绩效完全由项目经理进行考核。"}, {"id": 106, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列关于施工项目管理组织结构形式的说法，正确的是（　　）。", "opts": ["矩阵式组织结构的主要优点是强调管理业务专门化，发挥各类专家在项目管理中的作用", "职能式组织结构是一种最简单的组织结构形式", "直线职能式组织结构主要优点是集中领导、职责清楚，有利于提高管理效率", "职能式组织结构的稳定性较差，尤其是业务人员的工作岗位调动频繁"], "ans": [2], "exp": "A选项错误，职能式组织结构的主要优点是强调管理业务专门化，注意发挥各类专家在项目管理中的作用。B选项错误，直线式组织结构是一种最简单的组织结构形式。D选项错误，矩阵式组织结构的稳定性较差，尤其是业务人员的工作岗位调动频繁，此外，矩阵中每一位成员同时受项目经理和职能部门经理的双重领导，如果处理不当，会造成矛盾，产生扯皮现象。"}, {"id": 107, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "工程设计方项目管理不仅仅局限于工程（　　）阶段，而是会延伸到施工阶段和竣工验收阶段。", "opts": ["设计", "投资", "决策", "供货"], "ans": [0], "exp": "工程设计方项目管理不仅仅局限于工程设计阶段，而是会延伸到施工阶段和竣工验收阶段。"}, {"id": 108, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "施工企业项目经理的管理权限应由企业（　　）授予。", "opts": ["董事会", "经理层", "股东大会", "法定代表人"], "ans": [3], "exp": "施工项目经理是指具备相应任职条件，由企业法定代表人授权对工程项目进行全面管理的责任人。"}, {"id": 109, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "某工程项目编制的施工项目管理组织结构如下图所示，则下图属于（　　）。", "opts": ["直线式组织结构", "职能式组织结构", "强矩阵式组织结构", "弱矩阵式组织结构"], "ans": [0], "exp": "本图属于直线式组织结构。直线式组织结构是一种最简单的组织结构形式。在这种组织结构中，各种职位均按直线垂直排列，项目经理直接进行单线垂直领导。"}, {"id": 110, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "某施工企业采用矩阵式组织结构进行管理，该组织结构的的设置对象是（　　）。", "opts": ["职能部门", "项目经理", "班组", "工程项目"], "ans": [3], "exp": "矩阵式组织结构以工程项目为对象设置，各项目管理机构的管理人员从各职能部门临时抽调，归项目经理统一管理，待工程完工交付使用后又回到原职能部门或到其他工程项目管理组织工作。"}, {"id": 111, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据《建设工程施工项目经理岗位职业标准》，施工项目经理应履行的职责是（    ）。", "opts": ["编制施工日志和施工月报", "定期组织召开施工例会", "建立采购管理制度", "考核评价项目团队管理绩效"], "ans": [1], "exp": "《建设工程施工项目经理岗位职业标准》T/CCIAT0010—2019规定，项目经理应履行但不限于下列职责：（1）依据企业规定组建项目经理部，组织制定项目管理岗位职责，明确项目团队成员职责分工。（2）执行企业各项规章制度，组织制定和执行施工现场项目管理制度。（3）组织项目团队成员进行施工合同交底和项目管理目标责任分解。（4）在授权范围内组织编制和落实施工组织设计、项目管理实施规划、施工进度计划、绿色施工及环境保护措施、质量安全技术措施、施工方案和专项施工方案。（5）在授权范围内进行项目管理指标分解，优化项目资源配置，协调施工现场人力资源安排，并对工程材料、构配件、施工机具设备等资源的质量和安全使用进行全程监控。（6）组织项目团队成员进行经济活动分析，进行施工成本目标分解和成本计划编制，制定和实施施工成本控制措施。（7）建立健全协调工作机制，主持工地例会，协调解决工程施工问题。（8）依据施工合同配合企业或受企业委托选择分包单位，组织审核分包工程款支付申请。（9）组织与建设单位、分包单位、供应单位之间的结算工作，在授权范围内签署结算文件。（10）建立和完善工程档案文件管理制度，规范工程资料管理及存档程序，及时组织汇总工程结算和竣工资料，参与工程竣工验收。（11）组织进行缺陷责任期工程保修工作，组织项目管理工作总结。"}, {"id": 112, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列关于弱矩阵式组织的说法中，正确的是（    ）。", "opts": ["项目负责人权限大，需要对员工进行绩效考核", "项目负责人和职能经理权限相同，不需要需要对员工进行绩效考核", "项目负责人权限很小，需要对员工进行绩效考核", "项目负责人权限很小，由职能经理对员工进行考核"], "ans": [3], "exp": "弱矩阵式组织中，并未明确对项目目标负责的项目经理。即使有项目负责人，其角色也只是一个项目协调者或监督者，而不是一个管理者。同时，员工绩效由职能部门经理进行考核。"}, {"id": 113, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "施工项目总目标分析论证过程中，分别采用定性和定量分析方法的是（    ）。", "opts": ["成本目标和进度目标", "质量目标和成本目标", "进度目标和成本目标", "进度目标和质量目标"], "ans": [1], "exp": "在施工项目目标体系中，质量目标通常会采用定性分析方法，而进度、成本目标则需要采用定量分析方法。"}, {"id": 114, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "施工项目管理是施工单位为履行工程施工合同，以（    ）为核心的施工全过程管理活动。", "opts": ["施工项目部核心价值", "施工项目责任成本", "施工项目整体效益", "施工项目经理责任制"], "ans": [3], "exp": "施工项目管理也即施工方项目管理，是指施工单位为履行工程施工合同，以施工项目经理责任制为核心，对工程施工全过程进行计划、组织、指挥、协调和控制的系统活动。"}, {"id": 115, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "弱矩阵式项目管理组织结构中，项目负责人担任的角色是（    ）。", "opts": ["项目决策者或领导者", "项目领导者或协调者", "项目协调者或监督者", "项目监督者或决策者"], "ans": [2], "exp": "弱矩阵式组织中，并未明确对项目目标负责的项目经理。即使有项目负责人，其角色也只是一个项目协调者或监督者，而不是一个管理者。同时，员工绩效由职能部门经理进行考核。"}, {"id": 116, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "工程总承包方作为项目建设的一个重要参与方，其项目管理主要服务于（　　），", "opts": ["业主的利益", "项目的整体利益", "设计方的利益", "总承包方自身的利益", "政府方的利益"], "ans": [1, 3], "exp": "工程总承包方项目管理应服务于项目整体利益和工程总承包方自身利益。"}, {"id": 117, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "下列关于工程项目管理组织的说法，正确的有（　　）。", "opts": ["工程项目管理组织结构形式应根据工程项目规模、专业特点、地理位置及承包单位内部管理模式等因素确定", "对承包单位而言，工程项目管理组织通常称为工程项目部或项目经理部", "按照项目经理的职责不同，矩阵式组织结构可分为强矩阵式组织、中矩阵式组织和弱矩阵式组织", "业主及工程建设各方参与主体均会根据工程项目特点和项目管理需求建立各自的工程项目管理组织", "常见的工程项目管理组织结构形式包括直线式组织结构、职能式组织结构、直线职能式组织结构、矩阵式组织结构"], "ans": [0, 1, 3, 4], "exp": "选项C错误，按照项目经理的权限不同，矩阵式组织结构可分为强矩阵式组织、中矩阵式组织和弱矩阵式组织。"}, {"id": 118, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "施工项目管理中运用责任矩阵的作用有（　　）。", "opts": ["将工程项目管理的具体任务分配、落实到相关职能部门或人员，使工程项目部人员分工一目了然", "有利于项目经理从总体上分析管理任务的分配是否平衡适当，以便进行必要的调整和优化", "拥有专职的、具有较大权限的项目经理及专职项目管理人员", "可清楚地显示出工程项目部各部门或个人的角色、职责和相互关系，避免职责不清而出现推诿、扯皮现象", "强调管理业务专门化，注意发挥各类专家在项目管理中的作用"], "ans": [0, 1, 3], "exp": "选项C是强矩阵式组织结构的特点。选项E是职能式组织结构的优点。"}, {"id": 119, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "根据中国建筑业协会制定的团体标准《建设工程施工项目经理岗位职业标准》，施工项目经理应具备的条件有（　　）。", "opts": ["具有工程建设类相应职业资格，并应取得安全生产考核合格证书", "取得工程建设类注册执业资格或高级专业技术职称", "具备决策、组织、领导和沟通能力，能正确处理和协调与项目发包人、项目相关方之间及企业内部各专业、各部门之间的关系", "具有良好的身体素质，恪守职业道德，诚实守信，不得有不良行为记录", "具有建设工程施工现场管理经验和项目管理业绩"], "ans": [0, 3, 4], "exp": "选项BC是工程总承包项目经理应具备的条件，选项ADE均是施工项目经理应具备的条件。"}, {"id": 120, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "施工项目经理应具有的权限有（　　）。", "opts": ["执行企业各项规章制度，组织制定和执行施工现场项目管理制度", "依据企业规定组建项目经理部，组织制定项目管理岗位职责，明确项目团队成员职责分工", "参与组建项目经理部，提名项目副经理、项目技术负责人，选用项目团队成员", "决定企业授权范围内的资源投入和使用", "组织项目团队成员进行施工合同交底和项目管理目标责任分解"], "ans": [2, 3], "exp": "选项ABE均属于施工项目经理的职责，选项CD属于施工项目经理应具有的权限。"}, {"id": 121, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "某施工单位采用下图所示的组织结构模式，则关于该组织结构模式的说法，正确的有（　　）。", "opts": ["该组织结构属于矩阵式", "甲工作涉及的指令源有两个，即项目部1和技术部", "工程部可以对甲、乙、丙、丁直接下达指令", "技术部可以对甲、乙、丙、丁直接下达指令", "当属于强矩阵式时，乙绩效完全由项目部2中项目经理进行考核"], "ans": [0, 1, 4], "exp": "选项C错误，工程部可以对丙直接下达指令；选项D错误，技术部可以对甲、丁直接下达指令。"}, {"id": 122, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "工程项目管理组织结构形式应根据（　　）等因素确定。", "opts": ["工程项目规模", "施工项目成本", "专业特点", "温度变化", "地理位置"], "ans": [0, 2, 4], "exp": "工程项目管理组织结构形式应根据工程项目规模、专业特点、地理位置及承包单位内部管理模式等因素确定。"}, {"id": 123, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "根据《建设工程施工项目经理岗位职业标准》T/CCIAT0010—2019的规定，下列属于施工项目经理职责的有（　　）。", "opts": ["组织项目团队成员进行施工合同交底和项目管理目标责任分解", "建立健全协调工作机制，主持工地例会，协调解决工程施工问题", "组织进行缺陷责任期工程保修工作，组织项目管理工作总结", "主持项目经理部工作，组织制定项目经理部管理制度", "执行企业各项规章制度，组织制定和执行施工现场项目管理制度"], "ans": [0, 1, 2, 4], "exp": "《建设工程施工项目经理岗位职业标准》T/CCIAT0010—2019规定，项目经理应履行但不限于下列职责：（1）依据企业规定组建项目经理部，组织制定项目管理岗位职责，明确项目团队成员职责分工。（2）执行企业各项规章制度，组织制定和执行施工现场项目管理制度。（3）组织项目团队成员进行施工合同交底和项目管理目标责任分解。（4）在授权范围内组织编制和落实施工组织设计、项目管理实施规划、施工进度计划、绿色施工及环境保护措施、质量安全技术措施、施工方案和专项施工方案。（5）在授权范围内进行项目管理指标分解，优化项目资源配置，协调施工现场人力资源安排，并对工程材料、构配件、施工机具设备等资源的质量和安全使用进行全程监控。（6）组织项目团队成员进行经济活动分析，进行施工成本目标分解和成本计划编制，制定和实施施工成本控制措施。（7）建立健全协调工作机制，主持工地例会，协调解决工程施工问题。（8）依据施工合同配合企业或受企业委托选择分包单位，组织审核分包工程款支付申请。（9）组织与建设单位、分包单位、供应单位之间的结算工作，在授权范围内签署结算文件。（10）建立和完善工程档案文件管理制度，规范工程资料管理及存档程序，及时组织汇总工程结算和竣工资料，参与工程竣工验收。（11）组织进行缺陷责任期工程保修工作，组织项目管理工作总结。"}, {"id": 124, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "下列关于施工项目管理组织结构形式的说法，正确的有（　　）。", "opts": ["矩阵式组织结构是一种最简单的组织结构形式", "在职能式组织结构中，各级领导不直接指挥下级", "有利于提高管理效率属于矩阵式组织结构的优点", "直线式组织结构的稳定性较差，尤其是业务人员的工作岗位调动频繁", "有利于调动各类人员的工作积极性属于矩阵式组织结构的优点"], "ans": [1, 4], "exp": "A选项错误，直线式组织结构是一种最简单的组织结构形式。C选项错误，有利于提高管理效率属于直线职能式组织结构的优点。D选项错误，矩阵式组织结构的稳定性较差，尤其是业务人员的工作岗位调动频繁。"}, {"id": 125, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "直线式组织结构的主要优点包括（　　）。", "opts": ["结构简单", "隶属关系明确", "职责分明、决策迅速", "有利于提高项目管理水平", "容易实现管理工作专业化"], "ans": [0, 1, 2], "exp": "直线式组织结构的主要优点是结构简单、权力集中、易于统一指挥、隶属关系明确、职责分明、决策迅速。"}, {"id": 126, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "关于施工组织总设计中施工总进度计划编制程序，①计算工程量；②确定各单位工程的开竣工时间和相互搭接关系；③编制初步施工总进度计划；④形成正式的施工总进度计划；⑤确定各单位工程施工期限。排序正确的是（　　）。", "opts": ["①②③④⑤", "①②④③⑤", "①⑤②③④", "①⑤③④②"], "ans": [2], "exp": "施工总进度计划可按以下程序编制：计算工程量，确定各单位工程施工期限，确定各单位工程的开竣工时间和相互搭接关系，编制初步施工总进度计划，形成正式的施工总进度计划。"}, {"id": 127, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "关于目标动态控制中，属于事中过程控制的是（　　）。", "opts": ["编制工程项目计划", "构建工程项目目标体系", "采取纠偏措施", "计划与实际对比分析"], "ans": [3], "exp": "AB属于事前计划预控；C属于事后纠偏控制。"}, {"id": 128, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "关于施工项目目标控制措施，下列属于技术措施的是（　　）。", "opts": ["采用工程网络计划技术", "建立工程项目目标控制工作考评机制", "促进各参建单位、各职能部门间协同工作", "系统分析工程承包风险"], "ans": [0], "exp": "选项BC，属于组织措施；选项D，属于合同措施。"}, {"id": 129, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "编制项目管理规划大纲时，首先应进行的工作是（　　）。", "opts": ["明确项目目标", "分析项目环境和条件", "明确项目需求和项目管理范围", "收集项目的有关资料和信息"], "ans": [2], "exp": "项目管理规划大纲应按下列程序编制：①明确项目需求和项目管理范围；②确定项目管理目标；③分析项目实施条件，进行项目工作结构分解；④确定项目管理组织模式、组织结构和职责分工；⑤规定项目管理措施；⑥编制项目资源计划；⑦报送审批。"}, {"id": 130, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "（　　）是施工项目管理的重要手段，也是科学合理、均衡有序地组织施工生产的重要保障。", "opts": ["施工方案", "等节奏流水施工", "施工组织设计", "流水施工"], "ans": [2], "exp": "施工组织设计是施工项目管理的重要手段，也是科学合理、均衡有序地组织施工生产的重要保障。"}, {"id": 131, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "施工组织设计应由（　　）主持编制。", "opts": ["技术负责人", "项目负责人", "项目经理", "总监理工程师"], "ans": [1], "exp": "施工组织设计应由项目负责人主持编制，可根据需要分阶段编制和审批。"}, {"id": 132, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "关于施工组织设计的动态管理中，工程施工过程中发生下列情形时，应及时对施工组织设计进行修改或补充的是（　　）。", "opts": ["工程设计有细微修改", "主要施工方法有调整", "施工环境有重大改变", "有关法律法规及施工合同调整"], "ans": [2], "exp": "工程施工过程中发生下列情形时，应及时对施工组织设计进行修改或补充：①工程设计有重大修改；②有关法律法规及标准实施、修订和废止；③主要施工方法有重大调整；④主要施工资源配置有重大调整；⑤施工环境有重大改变。"}, {"id": 133, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "关于单位工程施工组织设计中施工进度计划编制程序，①施工进度计划的调整和优化；②确定工作项目的持续时间；③编制初始施工进度计划；④计算劳动量和机械台班数；⑤计算工程量；⑥确定施工顺序；⑦划分工作项目，排序正确的是（　　）。", "opts": ["⑦⑥⑤④③②①", "⑦⑥⑤④②③①", "⑦⑥④⑤②③①", "⑦④⑥⑤②③①"], "ans": [1], "exp": "单位工程施工进度计划可按以下程序和方法编制：划分工作项目，确定施工顺序，计算工程量，计算劳动量和机械台班数，确定工程的持续时间，编制初始施工进度计划，施工进度计划的调整和优化。"}, {"id": 134, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "施工方案的确定要遵循的原则，不属于的是（　　）。", "opts": ["先进性", "可行性", "可靠性", "经济性"], "ans": [2], "exp": "施工方案的确定要遵循先进性、可行性和经济性兼顾的原则。"}, {"id": 135, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "施工总进度计划安排全工地性流水作业时，主导对象是（　　）的单位工程。", "opts": ["成本高、工期长", "成本高、工程量大", "工程量大、工期长", "技术复杂、施工难度大"], "ans": [2], "exp": "施工总进度计划应以工程量大、工期长的单位工程为主导，安排全工地性流水作业。"}, {"id": 136, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列关于施工组织设计的动态管理的说法，正确的是（　　）。", "opts": ["工程施工过程中，应严格按照施工组织设计执行，不得变更", "经修改或补充的施工组织设计可直接重新实施", "施工组织设计的交底工作一般在工程施工中期进行", "当施工环境有重大改变时需对施工组织设计进行修改或补充"], "ans": [3], "exp": "选项A错误，工程施工过程中，应对施工组织设计的执行情况进行检查、分析并适时进行调整。选项B错误，经修改或补充的施工组织设计应重新审批后实施。选项C错误，工程施工前，应进行施工组织设计的逐级交底。"}, {"id": 137, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "某项目由于电梯设备采购延误导致总体工程进度延误，项目经理部研究决定调整项目采购负责人，该纠偏措施属于项目目标控制的（　　）。", "opts": ["组织措施", "合同措施", "经济措施", "技术措施"], "ans": [0], "exp": "组织措施。包括：建立健全组织机构和规章制度，配备相应管理人员并明确岗位职责分工；完善沟通机制和工作流程，促进各参建单位、各职能部门间协同工作；强化动态控制中的激励，调动和发挥员工实现项目目标的积极性和创造性；建立工程项目目标控制工作考评机制，通过绩效考核实现持续改进等。"}, {"id": 138, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "编制单位工程施工组织设计时，施工进度计划、施工准备、施工现场平面布置等应围绕（　　）进行编制。", "opts": ["施工部署", "设计方案", "监理方案", "造价控制目标"], "ans": [0], "exp": "单位工程施工组织设计中，施工进度计划、施工准备与资源配置计划、施工方法、施工现场平面布置和主要施工管理计划等均应围绕施工部署进行编制和确定。"}, {"id": 139, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列关于施工组织总设计，说法正确的是（　　）。", "opts": ["施工组织总设计是指以单位工程为主要对象编制的施工组织设计", "施工组织总设计中的工程概况包括确定工程项目施工总目标", "施工组织总设计应绘制施工现场平面布置图", "施工组织总设计的主要资源配置包括，劳动力配置计划和物资配置计划"], "ans": [3], "exp": "A选项错误，单位工程施工组织设计是指以单位工程为主要对象编制的施工组织设计。B选项错误，施工组织总设计中的工程概况应包括工程项目主要情况和主要施工条件。C选项错误，施工组织总设计应绘制施工现场总平面布置图。"}, {"id": 140, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "单位工程施工组织设计的施工准备与资源配置计划中技术准备工作不应包括（　　）。", "opts": ["施工所需技术资料的准备", "试验检验及设备调试工作计划", "样板制作计划", "设备准备工作计划"], "ans": [3], "exp": "技术准备。包括：施工所需技术资料的准备；施工方案编制计划；试验检验及设备调试工作计划；样板制作计划等。"}, {"id": 141, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "关于施工项目目标控制措施中，下列属于合同措施是（　　）。", "opts": ["建立工程项目目标控制工作考评机制", "采用工程网络计划技术进行动态控制", "明确工程责任成本", "通过市场调查系统分析工程承包风险"], "ans": [3], "exp": "A选项，属于组织措施；B选项，属于技术措施；C选项，属于经济措施。"}, {"id": 142, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列选项中不属于施工总平面布置图内容的是（　　）。", "opts": ["施工用地范围内的地形状况", "新建建（构）筑物的位置、轮廓尺寸、层数等", "全部拟建的建（构）筑物和其他基础设施位置", "相邻地上、地下既有建（构）筑物及相关环境"], "ans": [1], "exp": "施工总平面布置图内容。①施工用地范围内的地形状况；②全部拟建的建（构）筑物和其他基础设施位置；③施工用地范围内的加工设施、运输设施、存贮设施、供电设施、供水供热设施、排水排污设施、临时施工道路和办公、生活用房等；④施工现场必备的安全、消防、保卫和环境保护等设施；⑤相邻地上、地下既有建（构）筑物及相关环境。"}, {"id": 143, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "对工程施工过程做出的统筹规划和全面安排的是（　　）。", "opts": ["施工部署", "施工方案", "施工方法", "施工组织"], "ans": [0], "exp": "施工部署是指对工程施工过程进行的统筹规划和全面安排，包括工程项目施工目标、进度安排及空间组织、施工组织安排等。"}, {"id": 144, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "施工方案是以（　　）为主要对象编制的施工技术与组织方案，用以具体指导其施工过程。", "opts": ["单位工程", "任何工程", "分部（分项）工程或专项工程", "子单位工程"], "ans": [2], "exp": "施工方案是指以分部（分项）或专项工程为主要对象编制的施工技术与组织方案，用以具体指导分部（分项）或专项工程的施工过程。"}, {"id": 145, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "实施性施工组织设计的编制单位是（　　）。", "opts": ["设计单位", "施工单位", "监理单位", "建设单位"], "ans": [1], "exp": "设计单位要编制指导性施工组织设计，施工单位要编制实施性施工组织设计。"}, {"id": 146, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "单位工程施工组织设计的内容包括（　　）。", "opts": ["工程主要情况", "施工部署", "施工安排", "总体施工准备和主要资源配置计划"], "ans": [1], "exp": "单位工程施工组织设计的内容包括工程概况、施工部署、施工进度计划、施工准备与资源配置计划、主要施工方案、施工现场平面布置等。"}, {"id": 147, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列施工项目目标控制措施中，属于技术措施的是（　　）。", "opts": ["采用更先进的施工机械", "建立工程项目目标控制工作考评机制", "对工程变更方案进行经济分析", "系统分析工程承包风险"], "ans": [0], "exp": "选项B属于组织措施，选项C属于经济措施，选项D属于合同措施。"}, {"id": 148, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "工程项目目标控制的最终目的指的是（　　）。", "opts": ["有效控制施工项目目标", "保证建设工程顺利建成并交付使用", "合理控制成本支出，项目进度和施工质量", "竣工结算时间目标"], "ans": [1], "exp": "保证建设工程顺利建成并交付使用，是工程项目目标控制的最终目的。"}, {"id": 149, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列组成内容中，属于单位工程施工组织设计纲领性内容的是（　　）。", "opts": ["施工进度计划", "施工方法", "施工现场平面布置", "施工部署"], "ans": [3], "exp": "单位工程施工组织设计纲领性内容是施工部署。"}, {"id": 150, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "在单位工程施工组织设计文件中，施工流水段划分属于（　　）的内容。", "opts": ["工程概况", "施工进度计划", "施工部署", "主要施工方案"], "ans": [2], "exp": "单位工程施工组织设计中的施工部署的进度安排和空间组织应符合下列要求：①应明确说明工程主要施工内容及进度安排，施工顺序应符合工序逻辑关系；②施工流水段应结合工程具体情况分阶段进行合理划分，并说明划分依据及流水方向，确保均衡流水施工。"}, {"id": 151, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "关于单位工程施工组织，下列属于施工准备中资金准备的是（　　）。", "opts": ["编制资金使用计划", "样板制作计划", "试验检验及设备调试工作计划", "准备现场生产、生活临时设施"], "ans": [0], "exp": "资金准备。应根据施工进度计划编制资金使用计划。"}, {"id": 152, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "某工程项目施工中，针对实际施工进度滞后的状况，施工单位改进了施工工艺，该做法表明施工单位采取了（　　）措施进行项目目标动态控制。", "opts": ["技术", "管理", "经济", "组织"], "ans": [0], "exp": "工程项目目标在很大程度上需要通过采取技术措施来实现。为此，需要结合工程项目目标控制需求和工程特点，编制项目管理规划、施工组织设计、施工方案并对其技术可行性进行审查，论证；改进施工方法和施工工艺，采用更先进的施工机具；采用新技术、新材料、新工艺、新设备等“四新”技术并组织专家论证其可靠性和适用性等。"}, {"id": 153, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "某公司承接了某工厂新建厂区的建设任务，公司针对该厂区建设所编制的施工组织设计属于（　　）的内容。", "opts": ["施工规划", "单位工程施工组织设计", "施工组织总设计", "施工方案"], "ans": [2], "exp": "施工组织总设计是指以若干单位工程组成的群体工程或特大型工程项目为主要对象编制的施工组织设计。施工组织总设计对整个工程项目施工过程起着统筹规划、重点控制的作用。"}, {"id": 154, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列不属于施工组织设计编制依据的是（　　）。", "opts": ["工程建设标准和技术经济指标", "相关设计文件", "与工程有关的资源供应情况", "施工单位的生产能力"], "ans": [1], "exp": "施工组织设计的编制依据有：①工程建设有关法律法规及政策；②工程建设标准和技术经济指标；③工程设计文件；④工程招标投标文件或施工合同文件；⑤工程现场条件，工程地质及水文地质、气象等自然条件；⑥与工程有关的资源供应情况；⑦施工单位的生产能力、机具设备状况及技术水平等。选项B属于施工成本计划的编制依据。"}, {"id": 155, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "编制单位工程施工进度计划时，确定工作项目持续时间需要考虑每班施工人数，限定每班施工人数上限的因素是（　　）。", "opts": ["工作项目工程量", "最小劳动组合", "人工产量定额", "最小工作面"], "ans": [3], "exp": "最小工作面限定了每班施工人数的上限，而最小劳动组合规定了每班施工人数的下限。"}, {"id": 156, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据《建筑施工组织设计规范》，施工组织总设计应由（　　）主持编制。", "opts": ["总承包单位技术负责人", "项目负责人", "总承包单位法定代表人", "项目技术负责人"], "ans": [1], "exp": "施工组织总设计应由项目负责人主持编制。"}, {"id": 157, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "单位工程施工组织设计应由（　　）审批。", "opts": ["项目负责人", "项目技术负责人", "施工单位技术负责人", "施工单位负责人"], "ans": [2], "exp": "单位工程施工组织设计应由施工单位技术负责人或技术负责人授权的技术人员审批。"}, {"id": 158, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "根据施工组织设计的管理要求，重点、难点分部（分项）工程施工方案和针对危险性较大的分部分项工程专项施工方案的批准人是（　　）。", "opts": ["项目技术负责人", "施工单位技术负责人", "项目负责人", "总监理工程师"], "ans": [1], "exp": "重点、难点分部（分项）工程施工方案和针对危险性较大的分部分项工程专项施工方案应由施工单位技术部门组织相关专家评审，施工单位技术负责人批准。"}, {"id": 159, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "实施施工项目目标动态控制，应从组织、技术、经济、合同等多方面采取措施。下列属于组织措施的是（　　）。", "opts": ["强化动态控制中的激励，调动和发挥员工实现项目目标的积极性和创造性", "落实加快工程进度所需资金，完善施工成本节约奖励措施", "采用新技术、新材料、新工艺、新设备等“四新”技术", "与建设单位协商确定完善的合同条款，争取有工期提前、合理化建议的奖励条款"], "ans": [0], "exp": "选项B属于经济措施，选项C属于技术措施，选项D属于合同措施。"}, {"id": 160, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "单位工程施工组织设计是以（　　）为对象编制的。", "opts": ["整个建设工程项目", "某些特别重要的工程", "单位工程", "分部分项工程"], "ans": [2], "exp": "单位工程施工组织设计是指以单位（子单位）工程为主要对象编制的施工组织设计。"}, {"id": 161, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "下列属于施工项目目标控制措施中经济措施的是（　　）。", "opts": ["建立健全组织机构和规章制度", "明确工程责任成本", "争取有合理化建议的奖励条款", "采用工程网络计划技术、价值工程、挣值分析等方法进行动态控制"], "ans": [1], "exp": "明确施工责任成本属于经济措施。选项A属于组织措施，选项C属于合同措施，选项D属于技术措施。"}, {"id": 162, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "单位工程施工组织设计中的劳动力配置计划包含在（    ）中。", "opts": ["施工准备", "资源配置计划", "施工进度计划", "施工部署"], "ans": [1], "exp": "主要资源配置计划。包括：劳动力配置计划和物资配置计划。"}, {"id": 163, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "项目多目标体系中，下一级目标对上一级目标所起的作用是（    ）。", "opts": ["控制", "制约", "集成", "保证或保护"], "ans": [3], "exp": "在施工项目多级目标体系中，各级目标之间相互联系，上一级目标控制下一级目标，下一级目标保证上一级日标的实现，最终保证施工项目总目标的实现。"}, {"id": 164, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "施工组织总设计对整个工程项目施工过程所起的作用是（    ）。", "opts": ["施工部署、进度协调", "统筹规划、重点控制", "资源配置、绩效考核", "实施策划、动态控制"], "ans": [1], "exp": "施工组织总设计对整个工程项目施工过程起着统筹规划、重点控制的作用。"}, {"id": 165, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "工程施工过程中，需要及时对施工组织设计进行修改的情形是（    ）。", "opts": ["网架结构由原位拼装改为整体吊装", "采购进场的地面瓷砖尺寸偏差较大", "施工分包单位更换项目技术负责人", "雨季施工地下平均水位有所上升"], "ans": [0], "exp": "工程施工过程中发生下列情形时，应及时对施工组织设计进行修改或补充：①工程设计有重大修改；②有关法律、法规及标准实施、修订和废止；③主要施工方法有重大调整；④主要施工资源配置有重大调整；⑤施工环境有重大改变。"}, {"id": 166, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "编制单位工程施工进度计划时，需要确定各项工作的施工顺序，制约施工顺序的因素是（    ）。", "opts": ["施工定额和工程计量规划", "施工定额和施工部署", "工程计量规则和施工工艺", "施工工艺和施工组织"], "ans": [3], "exp": "施工顺序通常受施工工艺和施工组织两方面因素制约。当施工方案确定后，工作之间的工艺关系也就随之确定。如果违背这种关系，将不可能施工，或者会导致发生工程质量事故和安全事故，或者会造成返工浪费。"}, {"id": 167, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "施工单位确定施工项目目标的正确做法是（    ）。", "opts": ["始终以施工进度为第一保证目标", "确保各个目标最优实现", "根据项目情况确定各个目标的优先等级", "始终以施工质量为优先保证目标"], "ans": [2], "exp": "施工项目的进度、质量、成本目标的优先顺序并非固定不变。由于每一个施工项目的建设背景、复杂程度、建设单位及其他利益相关者的需求等不同，决定了施工项目各个目标的重要性顺序不同。有的施工项目工期紧迫，有的施工项目资金紧张，有的施工项目技术复杂等，从而决定了进度、质量、成本目标在不同施工项目中具有不同的优先等级。"}, {"id": 168, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "single", "q": "为节省临时工程费用，应尽量提前建设可供工程施工使用的工程是（    ）。", "opts": ["降水工程", "预制构件工程", "永久性工程", "装饰装修工程"], "ans": [2], "exp": "尽量提前建设可供工程施工使用的永久性工程，以节省临时工程费用"}, {"id": 169, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "项目管理规划大纲文件内容有（　　）。", "opts": ["项目风险管理要求", "项目管理目标和职责规定", "项目管理程序和方法要求", "项目绿色建造与环境管理规定", "项目管理资源的提供和安排"], "ans": [1, 2, 4], "exp": "项目管理规划大纲文件应包含的内容：①项目管理目标和职责规定；②项目管理程序和方法要求；③项目管理资源的提供和安排。"}, {"id": 170, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "项目管理实施规划文件应满足的要求有（　　）。", "opts": ["规划大纲内容应得到全面深化和具体化", "不同工程项目的各个目标可具有不同的优先等级", "实施规划范围应满足实现项目目标的实际需要", "编制项目实施规划应了解相关方要求", "实施项目管理规划的风险应处于可以接受的水平"], "ans": [0, 2, 4], "exp": "项目管理实施规划文件应满足下列要求：①规划大纲内容应得到全面深化和具体化；②实施规划范围应满足实现项目目标的实际需要；③实施项目管理规划的风险应处于可以接受的水平。"}, {"id": 171, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "下列关于施工组织设计的说法，正确的有（　　）。", "opts": ["对施工单位而言，施工组织设计等同于项目管理实施规划", "每一工程项目均需要进行施工组织设计", "按编制对象不同，施工组织设计分为施工组织总设计、单位工程施工组织设计、分部工程施工组织设计、分项工程施工组织设计和施工方案", "设计单位要编制指导性施工组织设计，施工单位要编制实施性施工组织设计", "施工组织总设计的基本内容包括工程概况、总体施工部署、施工总进度计划、总体施工准备与主要资源配置计划等"], "ans": [0, 1, 3, 4], "exp": "C选项错误，按编制对象不同，施工组织设计可分为三个层次：施工组织总设计、单位工程施工组织设计和施工方案。"}, {"id": 172, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "施工组织总设计对工程施工做出的总体部署有（　　）。", "opts": ["确定工程项目施工总目标，包括施工进度、质量、成本、安全、绿色施工及环境管理目标", "根据工程项目施工总目标要求，制定工程项目各阶段具体实施方案", "根据工程项目施工总目标要求，确定工程项目分阶段（期）交付使用计划", "确定工程项目分阶段（期）施工的合理顺序和空间组织", "对于工程施工中开发和使用的新技术、新工艺应做出部署"], "ans": [0, 2, 3], "exp": "施工组织总设计应对工程施工作出下列总体部署：（1）确定工程项目施工总目标，包括施工进度、质量、成本、安全、绿色施工及环境管理目标。（2）根据工程项目施工总目标要求，确定工程项目分阶段（期）交付使用计划。（3）确定工程项目分阶段（期）施工的合理顺序和空间组织。"}, {"id": 173, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "项目施工过程中，对施工组织设计进行修改或补充的情形有（　　）。", "opts": ["某桥梁工程由于新规范的实施而需要重新调整施工工艺", "由于自然灾害导致施工资源的配置有重大变更", "设计单位应业主要求对楼梯部分进行局部修改", "施工单位发现设计图纸存在重大错误需要修改工程设计", "某钢结构工程施工期间，钢材价格上涨"], "ans": [0, 1, 3], "exp": "工程施工过程中发生下列情形时，应及时对施工组织设计进行修改或补充：①工程设计有重大修改；②有关法律法规及标准实施、修订和废止；③主要施工方法有重大调整；④主要施工资源配置有重大调整；⑤施工环境有重大改变。选项CE不属于上述情形，所以ABD正确。"}, {"id": 174, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "下列工程项目目标控制措施中，属于经济措施的有（　　）。", "opts": ["明确工程责任成本", "改进施工方法和施工工艺，采用先进的施工机具", "建立健全组织机构和规章制度", "落实加快工程进度所需资金", "完善工程成本节约奖励措施"], "ans": [0, 3, 4], "exp": "选项B属于技术措施，选项C属于组织措施。"}, {"id": 175, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "施工组织总设计的基本内容包括（　　）。", "opts": ["工程概况", "施工总平面布置", "施工总进度计划", "施工成本计划", "主要施工方法"], "ans": [0, 1, 2, 4], "exp": "施工组织总设计的基本内容包括工程概况、总体施工部署、施工总进度计划、总体施工准备与主要资料配置计划、主要施工方法和施工总平面布置等。"}, {"id": 176, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "下列关于施工总平面布置原则的说法，正确的有（　　）。", "opts": ["施工场地占用面积大", "符合节能、环保、安全和消防等要求", "办公区、生活区宜紧密布置，生产区宜分离设置", "合理组织运输，减少二次搬运", "施工区域划分和场地临时占用应符合总体施工部署和施工流程要求，减少相互干扰"], "ans": [1, 3, 4], "exp": "施工总平面布置原则：①平面布置科学合理，施工场地占用面积少；②合理组织运输，减少二次搬运；③施工区域划分和场地临时占用应符合总体施工部署和施工流程要求，减少相互干扰；④充分利用既有建（构）筑物和既有设施为工程施工服务，降低临时设施建造费用；⑤临时设施应方便生产、生活，办公区、生活区和生产区宜分离设置；⑥符合节能、环保、安全和消防等要求；⑦遵守工程所在地政府建设主管部门和建设单位关于施工现场安全文明施工的相关规定。"}, {"id": 177, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "编制单位工程施工进度计划的程序包括（　　）。", "opts": ["划分工作", "确定关键工作和里程碑节点", "确定施工顺序", "计算劳动量和机械台班数", "说明施工流水段的划分依据和流水方向"], "ans": [0, 2, 3], "exp": "单位工程施工进度计划可按以下程序和方法编制：划分工作；确定施工顺序；计算工程量；计算劳动量和机械台班数；确定工作的持续时间；编制初始施工进度计划；施工进度计划的调整和优化。"}, {"id": 178, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "单位工程施工组织设计中施工进度计划的调整和优化，要检查初始施工进度计划是否满足要求。检查内容包括（　　）。", "opts": ["各工作项目的施工顺序和搭接关系是否合理", "总工期是否满足设计要求", "主要工种的工人是否能满足连续、均衡施工的要求", "主要施工机具、材料等的利用是否均衡和充分", "施工单位资金供应是否正常"], "ans": [0, 2, 3], "exp": "施工进度计划的调整和优化。要检查初始施工进度计划是否满足要求。检查内容包括：①各工作项目的施工顺序和搭接关系是否合理；②总工期是否满足合同约定；③主要工种的工人是否能满足连续、均衡施工的要求；④主要施工机具、材料等的利用是否均衡和充分。"}, {"id": 179, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "追求工程项目目标间最佳匹配时，应确保（　　）目标符合工程建设强制性标准。", "opts": ["工程质量", "施工安全", "绿色施工", "项目成本", "环境管理"], "ans": [0, 1, 2, 4], "exp": "工程建设强制性标准是有关人民生命财产安全、人体健康、环境保护和公众利益的技术要求，在追求施工项目目标间最佳匹配时，应确保工程质量、施工安全、绿色施工及环境管理目标符合工程建设强制性标准。"}, {"id": 180, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "根据《建筑施工组织设计规范》，以分部（分项）工程或专项工程为主要对象编制的施工方案，其主要内容包括（　　）。", "opts": ["工程概况", "施工部署", "施工方法和工艺要求", "施工准备与资源配置计划", "施工现场平面布置"], "ans": [0, 2, 3], "exp": "施工方案是指以分部（分项）或专项工程为主要对象编制的施工技术与组织方案，用以具体指导分部（分项）或专项工程的施工过程。施工方案内容包括工程概况、施工安排、施工进度计划、施工准备与资源配置计划、施工方法及工艺要求等。"}, {"id": 181, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "施工项目目标体系是有效控制施工项目目标的基本前提，也是施工项目管理是否成功的重要判据。下列关于施工项目目标体系构建的说法，正确的有（　　）。", "opts": ["保证建设工程顺利建成并交付使用，是施工项目目标控制的最终目的", "需要采用定性分析与定量分析相结合的方法来分析论证工程项目目标", "不同标段目标属于按项目组成分解的目标", "确保工程质量、施工安全、绿色施工及环境管理目标符合工程建设强制性标准", "工程的进度、质量、成本目标的优先顺序固定不变"], "ans": [0, 1, 3], "exp": "选项C错误，不同标段目标属于按承包单位分解的目标。选项E错误，不同工程项目的各个目标可具有不同的优先等级。工程进度、质量、成本、安全及绿色目标的优先顺序并非固定不变。"}, {"id": 182, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "分析论证工程项目总目标，应遵循的基本原则有（　　）。", "opts": ["确保工程质量目标符合工程建设强制性标准", "绿色施工可以根据实际情况适当低于工程建设强制性标准", "一般只采用定量分析的方法", "一般只采用定性分析的方法", "不同工程项目的各个目标可具有不同的优先等级"], "ans": [0, 4], "exp": "工程项目总目标的分析论证应遵循下列基本原则：①确保工程质量、施工安全、绿色施工及环境管理目标符合工程建设强制性标准。②定性分析与定量分析相结合。③不同工程项目的各个目标可具有不同的优先等级。"}, {"id": 183, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "施工单位编制施工组织总设计的依据有（    ）。", "opts": ["工程招标投标文件", "工程水文地质条件", "分包单位技术水平", "工程技术经济指标", "工程有关资源供应情况"], "ans": [0, 1, 3, 4], "exp": "施工组织设计的编制依据有：①工程建设有关法律法规及政策；②工程建设标准和技术经济指标；③工程设计文件；④工程招标投标文件或施工合同文件；⑤工程现场条件，工程地质及水文地质、气象等自然条件；⑥与工程有关的资源供应情况；⑦施工单位的生产能力、机具设备状况及技术水平等。"}, {"id": 184, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "施工单位编制单位工程施工组织设计时，在施工部署中除确定工程管理组织结构形式外，针对项目经理部还需要确定的内容有（    ）。", "opts": ["工作岗位", "职责划分", "物资配置", "奖罚制度", "办公地点"], "ans": [0, 1], "exp": "工程管理组织结构形式：根据工程项目规模、复杂程度、专业特点、人员素质和地域范围确定工程管理组织结构形式，并确定项目经理部的工作岗位设置及职责划分。"}, {"id": 185, "source": "教材", "ch": 1, "year": null, "sourceLabel": "第1章", "type": "multi", "q": "下列总体施工准备工作计划中，属于现场准备计划的有（    ）。", "opts": ["临时用水用电计划", "施工方案编制计划", "试验检验工作计划", "临时供热供气计划", "资金使用计划"], "ans": [0, 3], "exp": "现场准备。包括：现场生产、生活等临时设施，临时道路，材料堆放场，临时用水、用电和供热、供气等计划。"}, {"id": 186, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "在质量管理体系中，关于组织机构这一关键要素的说法，正确的是（　　）。", "opts": ["组织机构是组织对人员职责、权限和相互关系的有序安排，其范围通常限于内部组织", "组织最高管理者要肩负起管理职责，对外要将提高组织绩效作为组织生存的首要目标", "组织机构的正式表述通常在质量记录中提供", "组织最高管理者对内要建立和实施质量管理体系，确保组织机构合理和岗位职责明确"], "ans": [3], "exp": "选项A错误，组织机构是组织对人员职责、权限和相互关系的有序安排，其范围可包括与外部组织的有关接口。选项B错误，组织最高管理者要肩负起管理职责，对外要将客户的满意标准作为组织生存的首要目标，对内要建立和实施质量管理体系，确保组织机构合理和岗位职责明确。选项C错误，组织机构的正式表述通常在质量手册或项目质量计划中提供。"}, {"id": 187, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "依据生命周期各阶段的环境影响作出评价，同时评估其中的影响因素的标准属于（　　）。", "opts": ["基础标准", "管理标准", "组织评价标准", "产品评价标准"], "ans": [3], "exp": "产品评价标准主要是依据生命周期各阶段的环境影响对产品作出评价，重点评估产品在原材料购买、生产、使用、废弃等全生命周期的环境影响，同时还包括其中的影响因素评估。"}, {"id": 188, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "根据《环境管理体系要求及使用指南》GB/T24001—2016，下列环境管理体系的核心内容中，属于运行部分内容的是（　　）。", "opts": ["应急准备和响应", "持续改进", "风险应对措施", "监视、测量、分析和评价"], "ans": [0], "exp": "根据《环境管理体系要求及使用指南》GB/T24001—2016，运行包括两方面内容，运行策划和控制、应急准备和响应。"}, {"id": 189, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "职业健康安全管理体系标准符合国际标准化组织（ISO）对管理体系标准的要求，这体现了职业健康安全管理体系标准的（　　）特点。", "opts": ["系统化管理机制", "广泛的适用性", "与其他管理体系兼容", "应用的灵活性"], "ans": [2], "exp": "与其他管理体系兼容：职业健康安全管理体系标准符合国际标准化组织（ISO）对管理体系标准的要求，这些要求包括一个统一的高层结构和相同的核心正文，以及具有核心定义的通用术语，从而保证职业健康安全管理体系的要素可与质量管理体系、环境管理体系等兼容或整合，方便标准使用者实施多个管理体系标准。"}, {"id": 190, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "《卓越绩效评价准则》GB/T19580—2012是以（　　）评价准则为蓝本，结合我国质量管理实际情况而制定的。", "opts": ["美国波多里奇国家质量奖", "欧洲质量奖", "日本戴明奖", "GB/T19004"], "ans": [0], "exp": "卓越绩效管理最早起源于美国波多里奇国家质量奖标准，是世界级成功组织公认的提升组织竞争力的有效方法。"}, {"id": 191, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "下列属于卓越绩效管理中的阐明组织经营行为基本理念的是（　　）。", "opts": ["重视过程与关注结果", "系统管理", "战略导向", "以人为本"], "ans": [3], "exp": "《卓越绩效评价准则》GB/T19580—2012明确了卓越绩效管理的基本理念（也称为核心价值观），这些基本理念可分为三个层面，分别为说明组织驱动力、阐明组织经营行为、提供组织运行方法和技术的基本理念。阐明组织经营行为的基本理念。包括：社会责任；以人为本；合作共赢。"}, {"id": 192, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "下列关于全面一体化管理概念的说法，正确的是（　　）。", "opts": ["全面一体化管理的目的是使领导满意及员工、相关方受益而达到长期成功的管理途径", "全面一体化管理的核心是质量管理", "全面一体化管理是当今企业管理的发展潮流，实施全面一体化管理，可以为建筑企业提供良好的管理环境", "全面一体化管理的基础是卓越绩效管理"], "ans": [2], "exp": "全面一体化管理是指组织在其所有领域以质量、环境、职业健康安全为核心，以全面质量管理理论为基础，依据国际管理体系标准框架，融合其他管理要求，通过建立一体化管理体系，优化整合协调一致管理，其目的是使顾客满意及员工、相关方受益而达到长期成功的管理途径。全面一体化管理是当今企业管理的发展潮流，实施全面一体化管理，可以为建筑企业提供良好的管理环境。"}, {"id": 193, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "下列关于卓越绩效管理基本理念的说法，正确的是（　　）。", "opts": ["企业绩效评价应关注过程，主要包括顾客满意程度、产品和服务、财务和市场、人力资源、组织效率、社会责任等方面", "领导承诺在企业经营管理中处于核心地位", "卓越绩效模式强调以系统的思维来管理整个企业", "员工是组织之本，保障员工的权益并提高员工的满意程度是组织追求卓越的基础"], "ans": [2], "exp": "A选项错误，企业绩效评价应体现结果导向，关注关键结果，主要包括顾客满意程度、产品和服务、财务和市场、人力资源、组织效率、社会责任等方面。B选项错误，战略决策在企业经营管理中处于核心地位。D选项错误，培育学习型组织和个人是组织追求卓越的基础。"}, {"id": 194, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "根据《卓越绩效评价准则》GB/T19580—2012，“领导作用”三角，不包括（　　）。", "opts": ["领导", "战略", "顾客与市场", "员工"], "ans": [3], "exp": "“领导”“战略”“顾客与市场”构成“领导作用”三角，强调高层领导在组织所处的特定环境中，通过制定以顾客与市场为中心的战略，为组织谋划长远未来。“领导作用”是驱动力，关注的是组织如何做正确的事。"}, {"id": 195, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "质量管理体系中，关于过程这一关键要素的说法，正确的是（　　）。", "opts": ["一个过程的输入不能是其他过程的输出", "《质量管理体系要求》GB/T19001—2016中的三大过程分别是顾客导向过程、管理过程和内部审核过程", "管理过程是指通过输入和输出直接与外部联系的过程", "两个或两个以上相互关联和相互作用的连续过程也可作为一个过程"], "ans": [3], "exp": "A选项错误，过程是指利用输入实现预期结果的相互关联或相互作用的一组活动。一个过程的输入通常是其他过程的输出，而一个过程的输出通常又是其他过程的输入。B选项错误，《质量管理体系要求》GB/T19001—2016中的三大过程分别是顾客导向过程、支持过程和管理过程。C选项错误，管理过程是指用来衡量和评价顾客导向过程和支持过程的有效性和效率等的过程。"}, {"id": 196, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "建筑企业在建立全面一体化管理体系前必须具备的条件之一是（　　）。", "opts": ["完成所有细节流程的编排", "初步确定了方针目标", "组织内部进行全员培训", "完成所有项目的验收"], "ans": [1], "exp": "建筑企业建立全面一体化管理体系至少应具备以下条件：①初步确定了方针目标；②基本确定了管理体系的主要过程及其需要开展的主要活动；③明确了组织机构设置或调整的方案；④已完成组织职能的再分配。"}, {"id": 197, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "质量管理体系中，组织通常对（　　）进行策划，并使其在受控条件下运行以实现增值目的。", "opts": ["组织机构", "程序", "过程", "资源"], "ans": [2], "exp": "组织通常对过程进行策划，并使其在受控条件下运行，以实现增值目的。"}, {"id": 198, "source":
