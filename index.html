质量标准等造成的质量事故。"}, {"id": 689, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "施工质量事故从不同角度进行分类，按事故产生原因属于因管理原因引发的质量事故（　　）。", "opts": ["结构设计计算错误", "质量检验制度不严密", "地质情况估计错误", "采用不适宜的施工方法或工艺等引发的质量事故"], "ans": [1], "exp": "因管理原因引发的质量事故。由于管理不完善或失误而引发的质量事故。主要包括：施工单位的质量管理体系不完善；质量检验制度不严密，质量控制不严；质量管理措施落实不力；检测仪器设备管理不善而失准；进料检验不严格等引发的质量事故。"}, {"id": 690, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "某工程发生的质量事故导致3人死亡，重伤30人，直接经济损失4999万元，非直接经济损失1亿元，按照住房和城乡建设部《关于做好房屋建筑和市政基础设施施工质量事故报告和调查处理工作的通知》（建质〔2010〕111号），则该质量事故等级是（　　）。", "opts": ["较大事故", "一般事故", "重大事故", "特别重大事故"], "ans": [0], "exp": "（1）特别重大事故，是指造成30人及以上死亡，或者100人及以上重伤，或者1亿元及以上直接经济损失的事故。（2）重大事故，是指造成10人及以上30人以下死亡，或者50人及以上100人以下重伤，或者5000万元及以上1亿元以下直接经济损失的事故。（3）较大事故，是指造成3人及以上10人以下死亡，或者10人及以上50人以下重伤，或者1000万元及以上5000万元以下直接经济损失的事故。（4）一般事故，是指造成3人以下死亡，或者10人以下重伤，或者100万元以上1000万元以下直接经济损失的事故。"}, {"id": 691, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "工程施工中发生质量事故造成10人死亡，该事故属于（　　）事故。", "opts": ["特别重大", "重大", "较大", "一般"], "ans": [1], "exp": "施工质量事故分为4个等级，包括：①特别重大事故，是指造成30人及以上死亡，或者100人及以上重伤，或者1亿元及以上直接经济损失的事故；②重大事故，是指造成10人及以上30人以下死亡，或者50人及以上100人以下重伤，或者5000万元及以上1亿元以下的直接经济损失的事故；③较大事故，是指造成3人及以上10人以下死亡，或者10人及以上50人以下重伤，或者1000万元及以上5000万元以下直接经济损失的事故；④一般事故，是指3人以下死亡，或者10人以下重伤，或者100万元以上1000万元以下直接经济损失的事故。"}, {"id": 692, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "某一结构构件截面尺寸不足，或材料强度不足，影响结构承载力，但按实际情况进行复核验算后仍能满足设计要求的承载力时，可（　　）处理。", "opts": ["返工", "补强", "不作", "延后"], "ans": [2], "exp": "一般可不作专门处理的情况有以下几种：①不影响结构安全、生产工艺和使用要求的质量缺陷。②下一道工序可以弥补的质量缺陷。③法定检测单位鉴定合格的工程。④出现质量缺陷的工程，经检测鉴定达不到设计要求，但经原设计单位核算，仍能满足结构安全和使用功能的。"}, {"id": 693, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "某建设工程项目施工过程中，由于质量事故导致工程结构受到破坏，造成6000万元的直接经济损失，这一事故属于（　　）。", "opts": ["一般事故", "较大事故", "重大事故", "特别重大事故"], "ans": [2], "exp": "重大事故，是指造成10人及以上30人以下死亡，或者50人及以上100人以下重伤，或者5000万元及以上1亿元以下直接经济损失的事故。"}, {"id": 694, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "由于工程负责人不按规范指导施工，随意压缩工期造成的质量事故，按事故责任分类，属于（　　）。", "opts": ["操作责任事故", "自然灾害事故", "技术责任事故", "指导责任事故"], "ans": [3], "exp": "指导责任事故。工程施工过程中，由于指导或领导失误而造成的质量事故，如工程负责人不按规范规程组织施工、盲目赶工、强令他人违章作业、降低工程质量标准等造成的质量事故。"}, {"id": 695, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "某工程的质量事故，造成人员死亡9人，直接经济损失7000万元。则该事故属于（　　）。", "opts": ["一般事故", "重大事故", "较大事故", "特别重大事故"], "ans": [1], "exp": "重大事故，是指造成10人及以上30人以下死亡，或者50人及以上100人以下重伤，或者5000万元及以上1亿元以下直接经济损失的事故。"}, {"id": 696, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "工程质量事故发生后，事故现场有关人员应当立即向（　　）报告。", "opts": ["施工项目技术负责人", "施工项目组长", "本单位负责人", "施工项目监理人员"], "ans": [2], "exp": "工程质量事故发生后，事故现场有关人员应当立即向本单位负责人报告；单位负责人接到报告后，应于1h内向事故发生地县级以上人民政府住房和城乡建设主管部门及有关部门报告。"}, {"id": 697, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "工程质量事故发生后，事故现场有关人员应当立即向本单位负责人报告；单位负责人接到报告后，应于（　　）h内向事故发生地县级以上人民政府住房和城乡建设主管部门及有关部门报告。", "opts": ["1", "2", "12", "24"], "ans": [0], "exp": "工程质量事故发生后，事故现场有关人员应当立即向本单位负责人报告；单位负责人接到报告后，应于1h内向事故发生地县级以上人民政府住房和城乡建设主管部门及有关部门报告。"}, {"id": 698, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "一般情况下，某混凝土现浇楼面平整度偏差达到10mm，该质量问题可以（　　）。", "opts": ["不作处理", "加固处理", "返工处理", "返修处理"], "ans": [0], "exp": "混凝土现浇楼面的平整度偏差达到10mm，但由于后续垫层和面层的施工可以弥补，所以也可不作处理。"}, {"id": 699, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "某公路桥梁工程预应力按规定张拉系数为1.3，而实际仅为0.8，属于严重的质量缺陷，应采取的处理方式是（　　）。", "opts": ["加固处理", "返工处理", "限制使用", "报废处理"], "ans": [1], "exp": "某公路桥梁工程预应力按规定张拉系数为1.3，而实际仅为0.8，属于严重的质量缺陷，也无法返修，只能返工处理。"}, {"id": 700, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "工程质量缺陷按返修方案处理后，仍无法保证达到规定的使用和安全要求，而又无法返工处理的，其正确的处理方式是（　　）。", "opts": ["不作处理", "报废处理", "加固处理", "限制使用"], "ans": [3], "exp": "当工程质量缺陷按返修方法处理后无法保证达到规定的使用要求和安全要求，而又无法返工处理的情况下，不得已时可做出诸如结构卸荷或减荷以及限制使用的决定。"}, {"id": 701, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "某工程的混凝土结构出现较深裂缝，但经分析判定其不影响结构的安全和使用，正确的处理方法是（　　）。", "opts": ["表面密封", "嵌缝封闭", "灌浆修补", "限制使用"], "ans": [2], "exp": "当工程的某些部分的质量虽未达到规范、标准或设计的要求，存在一定的缺陷，但经过返修后可以达到要求的质量标准，又不影响使用功能或外观的要求，可采取返修处理的方法。混凝土结构裂缝较深，采用灌浆修补法。"}, {"id": 702, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "某工程在浇筑楼板混凝土时，发生支模架坍塌，造成10人死亡，8人重伤，经调查，系现场技术管理人员未进行技术交底所致。该工程质量事故应判定为（　　）。", "opts": ["操作责任的较大事故", "操作责任的重大事故", "指导责任的较大事故", "指导责任的重大事故"], "ans": [3], "exp": "指导责任事故是指工程施工过程中，由于指导或领导失误而造成的质量事故。10人死亡属于重大事故、8人重伤属于一般事故，按照就高原则本题属于重大事故。"}, {"id": 703, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "住房和城乡建设主管部门逐级上报事故情况时，每级上报时间不得超过（　　）h。", "opts": ["1", "2", "3", "4"], "ans": [1], "exp": "住房和城乡建设主管部门逐级上报事故情况时，每级上报时间不得超过2h。"}, {"id": 704, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "重大事故由事故发生地（　　）负责调查。", "opts": ["省级人民政府", "设区的市级人民政府", "县级人民政府", "乡镇政府"], "ans": [0], "exp": "重大事故、较大事故、一般事故分别由事故发生地省级人民政府、设区的市级人民政府、县级人民政府负责调查。"}, {"id": 705, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "较大事故由事故发生地（　　）负责调查。", "opts": ["省级人民政府", "设区的市级人民政府", "县级人民政府", "乡镇政府"], "ans": [1], "exp": "重大事故、较大事故、一般事故分别由事故发生地省级人民政府、设区的市级人民政府、县级人民政府负责调查。"}, {"id": 706, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "一般事故由事故发生地（　　）负责调查。", "opts": ["省级人民政府", "设区的市级人民政府", "县级人民政府", "乡镇政府"], "ans": [2], "exp": "重大事故、较大事故、一般事故分别由事故发生地省级人民政府、设区的市级人民政府、县级人民政府负责调查。"}, {"id": 707, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "未造成人员伤亡的（　　），县级人民政府也可以委托事故发生单位组织事故调查组进行调查。", "opts": ["一般事故", "较大事故", "重大事故", "特别重大事故"], "ans": [0], "exp": "未造成人员伤亡的一般事故，县级人民政府也可以委托事故发生单位组织事故调查组进行调查。"}, {"id": 708, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "下列施工质量事故的成因中，属于材料构配件不合格的情形有（　　）。", "opts": ["水泥安定性不良", "用光圆钢筋代替异形钢筋", "碱集料反应", "预制构件断面尺寸不足", "漏放或少放钢筋"], "ans": [0, 2, 3, 4], "exp": "材料构配件不合格的情形有：钢筋物理力学性能不良会导致钢筋混凝土结构产生裂缝或脆性破坏；集料中活性氧化硅会导致碱集料反应，使混凝土产生裂缝；水泥安定性不良，会造成混凝土爆裂；预制构件断面尺寸不足，支承锚固长度不足，未可靠建立预应力值，漏放或少放钢筋，板面开裂等，均可能出现断裂、坍塌事故。"}, {"id": 709, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "由事故发生地省级人民政府、设区的市级人民政府、县级人民政府组织事故调查进行调查的事故类型有（　　）。", "opts": ["特别重大事故", "重大事故", "较大事故", "一般事故", "未造成人员伤亡的一般事故"], "ans": [1, 2, 3, 4], "exp": "特别重大事故由国务院或国务院授权有关部门组织事故调查组进行调查。重大事故、较大事故、一般事故由事故发生地省级人民政府、设区的市级人民政府、县级人民政府负责调查。"}, {"id": 710, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "根据事故的具体情况，事故调查组由有关人民政府等有关单位派人组成，事故调查报告应包括（　　）内容。", "opts": ["事故发生单位概况", "事故发生经过和事故救援情况", "事故造成的人员伤亡和直接经济损失", "事故发生的原因和事故性质", "事故预防和处理建议"], "ans": [0, 1, 2, 3], "exp": "事故调查报告应包括下列内容：①事故发生单位概况；②事故发生经过和事故救援情况；③事故造成的人员伤亡和直接经济损失；④事故发生的原因和事故性质；⑤事故责任的认定和事故责任者的处理建议；⑥事故防范和整改措施。"}, {"id": 711, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "下列选项属于违反有关法规和工程合同规定的有（　　）。", "opts": ["边设计、边施工，任意修改设计，不按图纸施工", "工程竣工不进行试车运行，未经验收就交付使用", "无证设计、无证施工、越级设计、越级施工", "擅自修改设计", "未搞清工程地质、水文情况等条件就仓促开工"], "ans": [2, 3], "exp": "违反有关法规和工程合同规定。例如，无证设计、无证施工、越级设计、越级施工，工程招标投标中不公平竞争，超低价中标，违法转包或分包，擅自修改设计，不按图纸施工等。"}, {"id": 712, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "当发生了工程质量事故，可以不做处理的情况包括（　　）。", "opts": ["不影响结构安全的", "下一道工序可以弥补的质量缺陷", "法定检测单位鉴定合格的", "经加固补强达到设计要求的", "返工处理的"], "ans": [0, 1, 2], "exp": "一般可不作专门处理的情况有以下几种：①不影响结构安全、生产工艺和使用要求的质量缺陷。②下一道工序可以弥补的质量缺陷。③法定检测单位鉴定合格的工程。④出现质量缺陷的工程，经检测鉴定达不到设计要求，但经原设计单位核算，仍能满足结构安全和使用功能的。"}, {"id": 713, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "下列关于质量事故等级的表述中，正确的有（　　）。", "opts": ["某事故造成了150人重伤，属于重大事故", "某事故造成了45人重伤，属于较大事故", "某事故造成了5人重伤，属于一般事故", "某事故造成了20人死亡，属于较大事故", "某事故造成了5人死亡，属于较大事故"], "ans": [1, 2, 4], "exp": "工程质量事故分为4个等级：（1）特别重大事故，是指造成30人及以上死亡，或者100人及以上重伤，或者1亿元及以上直接经济损失的事故；（2）重大事故，是指造成10人及以上30人以下死亡，或者50人及以上100人以下重伤，或者5000万元及以上1亿元以下直接经济损失的事故；（3）较大事故，是指造成3人及以上10人以下死亡，或者10人及以上50人以下重伤，或者1000万元及以上5000万元以下直接经济损失的事故；（4）一般事故，是指造成3人以下死亡，或者10人以下重伤，或者100万元以上1000万元以下直接经济损失的事故。"}, {"id": 714, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "施工质量事故按事故严重程度分类可划分为（　　）。", "opts": ["特别重大事故", "严重事故", "重大事故", "较大事故", "一般事故"], "ans": [0, 2, 3, 4], "exp": "工程质量事故按事故严重程度分类分为：一般事故、较大事故、重大事故、特别重大事故。"}, {"id": 715, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "按事故责任分类，工程质量事故可分为（　　）。", "opts": ["指导责任事故", "管理责任事故", "技术责任事故", "操作责任事故", "自然灾害事故"], "ans": [0, 3], "exp": "按事故责任分类，可分为指导责任事故、操作责任事故。"}, {"id": 716, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "住房和城乡建设主管部门上报事故情况，应当同时报告本级人民政府；国务院住房和城乡建设主管部门接到（　　）事故的报告后，应当立即报告国务院。", "opts": ["严重", "一般", "较大", "重大", "特别重大"], "ans": [3, 4], "exp": "住房和城乡建设主管部门上报事故情况，应当同时报告本级人民政府；国务院住房和城乡建设主管部门接到重大和特别重大事故的报告后，应当立即报告国务院。"}, {"id": 717, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "事故报告应包括下列内容（　　）。", "opts": ["事故发生单位概况", "事故发生的时间、地点以及事故现场情况", "事故的简要经过", "事故已经造成或者可能造成的伤亡人数（包括下落不明的人数）和初步估计的直接经济损失", "事故处理建议"], "ans": [0, 1, 2, 3], "exp": "事故报告应包括下列内容：①事故发生单位概况；②事故发生的时间、地点以及事故现场情况；③事故的简要经过；④事故已经造成或者可能造成的伤亡人数（包括下落不明的人数）和初步估计的直接经济损失；⑤已经采取的措施；⑥其他应当报告的情况。"}, {"id": 718, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "某工程施工中发生一起混凝土坍塌事故，造成5人重伤。该事故报告及调查处理的正确做法有（    ）。", "opts": ["事故现场有关人员应立即向本单位负责人报告", "事故调查组应邀请县级人民检察院派人参加", "事故发生单位应委托原设计单位提出技术处理方案", "事故单位负责人应在收到报告后2h内向上级主管部门报告", "事故发生地省级人民政府应负责调查事故"], "ans": [0, 1, 2], "exp": "D项错误，单位负责人接到报告后，应于1h内向事故发生地县级以上人民政府住房和城乡建设主管部门及有关部门报告。E项错误，一般事故由事故发生地县级人民政府组织事故调查组进行调查。"}, {"id": 719, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "造成施工质量事故的原因分析中，属于违背基本建设规律的有（    ）。", "opts": ["边设计、边施工", "越级设计、越级施工", "未经验收即交付使用", "技术交底不清", "地质勘察报告不详细"], "ans": [0, 1, 2], "exp": "违背工程建设基本规律（1）违反工程建设程序。工程建设程序是工程建设客观规律的反映，但有些工程不按工程建设程序办事，例如，未经可行性研究、不做调查分析就拍板定案；未搞清工程地质、水文情况等条件就仓促开工；边设计、边施工，任意修改设计，不按图纸施工；工程竣工不进行试车运行，未经验收就交付使用等，这些常常是导致工程质量事故的重要原因。（2）违反有关法规和工程合同规定。例如，无证设计、无证施工、越级设计、越级施工，工程招标投标中不公平竞争，超低价中标，违法转包或分包，擅自修改设计，不按图纸施工等。"}, {"id": 720, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列关于工程成本分类的说法，不正确的是（　　）。", "opts": ["按工程成本对象的范围，工程成本分为建设工程项目总成本、单位工程成本、分部工程成本、分项工程成本、检验批成本", "按工程成本发生的阶段，工程成本分为投标成本、勘察设计成本、采购成本、施工成本及竣工验收成本", "按生产费用计入工程成本的方法，工程成本分为直接成本和间接成本", "按工程成本形成的时间，工程成本可划分为预算成本、计划成本和实际成本"], "ans": [0], "exp": "按工程成本对象的范围，工程成本分为建设工程项目总成本、单项工程成本、单位工程成本、分部工程成本和分项工程成本。"}, {"id": 721, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列不属于影响工程成本因素的是（　　）。", "opts": ["项目范围", "工程设计", "工程质量", "工程施工"], "ans": [2], "exp": "影响工程成本的因素很多，主要来自三个大的方面，包括项目范围、工程设计和工程施工。"}, {"id": 722, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "工程设计是项目管理范围的具体体现，是决策之后影响工程成本最重要的阶段。下列关于工程设计的说法，不正确的是（　　）。", "opts": ["工程设计通常分初步设计、技术设计和施工图设计三个阶段进行", "对于技术上复杂而又缺乏设计经验的项目，可按“三阶段设计”", "工程设计对工程成本的影响主要通过设计标准、设计方案及设计质量方面", "对于特殊的大型项目，事先还要进行总体设计"], "ans": [0], "exp": "工程设计通常分初步设计和施工图设计两个阶段，称为“两阶段设计”；对于技术上复杂而又缺乏设计经验的项目，可按初步设计、技术设计和施工图设计三个阶段进行，称为“三阶段设计”。"}, {"id": 723, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "工程成本管理是指项目管理机构以（　　）为主线，对工程成本进行计划、控制、分析，并进行工程成本管理绩效考核的过程。", "opts": ["投标报价", "责任成本", "工艺流程", "工程设计"], "ans": [1], "exp": "工程成本管理是指项目管理机构以责任成本为主线，对工程成本进行计划、控制、分析，并进行工程成本管理绩效考核的过程。"}, {"id": 724, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "工程成本管理流程的最后一步是（　　）。", "opts": ["成本节约超支分析", "成本管理绩效考核", "成本管理持续改进", "竣工结算"], "ans": [3], "exp": "工程成本管理流程图。"}, {"id": 725, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列不属于工程成本分类的标准是（　　）。", "opts": ["按工程成本对象的范围分类", "按工程造价形成要素划分", "按工程成本要素构成划分", "按生产费用计入工程成本的方法分类"], "ans": [1], "exp": "工程成本可按不同的标准和应用范围分类有七类，选项B不属于工程成本分类内容。"}, {"id": 726, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列成本中，不属于按工程成本发生的阶段分类的是（　　）。", "opts": ["投标成本", "勘察设计成本", "采购成本", "施工成本及竣工验收使用成本"], "ans": [3], "exp": "按工程成本发生的阶段分类，工程成本分为投标成本、勘察设计成本、采购成本、施工成本及竣工验收成本。"}, {"id": 727, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "从建设单位角度说，工程成本（　　）。", "opts": ["包括决策阶段、设计阶段、施工阶段直至竣工验收交付使用阶段所耗费的各种资源", "是为履行合同所发生的各种合理的资源耗费", "是投标阶段、施工阶段及竣工验收阶段的资源耗费", "是投标、设计、采购、施工、竣工验收等阶段的资源耗费"], "ans": [0], "exp": "中国成本协会发布的《成本管理体系术语》CCA2101：2008中将成本定义为：为过程增值和结果有效已付出或应付出的资源代价。工程成本可定义为：以货币单位衡量的为实现工程建设目标所耗费的各种资源。从建设单位角度来说，工程成本包括决策阶段、设计阶段、施工阶段直至竣工验收交付使用阶段所耗费的各种资源。从工程承包单位角度来说，工程成本是为履行合同所发生的各种合理的资源耗费。对于施工承包单位而言，工程成本就是投标阶段、施工阶段及竣工验收阶段的资源耗费；对于工程总承包单位而言，工程成本就是投标、设计、采购、施工、竣工验收等阶段以货币表示的资源耗费。"}, {"id": 728, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "从施工承包单位角度说，工程成本（　　）。", "opts": ["包括决策阶段、设计阶段、施工阶段直至竣工验收交付使用阶段所耗费的各种资源", "是为履行合同所发生的各种合理的资源耗费", "是投标阶段、施工阶段及竣工验收阶段的资源耗费", "是投标、设计、采购、施工、竣工验收等阶段的资源耗费"], "ans": [2], "exp": "从建设单位角度来说，工程成本包括决策阶段、设计阶段、施工阶段直至竣工验收交付使用阶段所耗费的各种资源。从工程承包单位角度来说，工程成本是为履行合同所发生的各种合理的资源耗费。对于施工承包单位而言，工程成本就是投标阶段、施工阶段及竣工验收阶段的资源耗费；对于工程总承包单位而言，工程成本就是投标、设计、采购、施工、竣工验收等阶段以货币表示的资源耗费。"}, {"id": 729, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "（　　）是工程承包单位根据建设单位招标文件要求的要求以及自身的管理水平确定的完成全部合同工程消耗的费用总和。", "opts": ["预算成本", "计划成本", "实际成本", "估算成本"], "ans": [0], "exp": "预算成本是建设单位和工程承包单位通过招标投标签订的工程建设合同中确定的工程成本。该成本是工程承包单位根据建设单位招标文件要求的要求以及自身的管理水平确定的完成全部合同工程消耗的费用总和。这里的预算成本是整个工程承包项目的预算成本。"}, {"id": 730, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "（　　）是工程项目成本控制和考核的基本依据。", "opts": ["预算成本", "计划成本", "实际成本", "估算成本"], "ans": [1], "exp": "计划成本是工程承包单位根据工程合同要求，完成相应的设计、采购、施工等工作，结合项目实际及本单位的管理水平和生产力水平而计算确定的工程项目最低费用总和。该计划成本是工程项目成本控制和考核的基本依据。"}, {"id": 731, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "（　　）是工程承包单位在项目实施期内实际发生的各项费用的总和，包括设计成本、采购成本、施工成本等。", "opts": ["预算成本", "计划成本", "实际成本", "估算成本"], "ans": [2], "exp": "实际成本是工程承包单位在项目实施期内实际发生的各项费用的总和，包括设计成本、采购成本、施工成本等。它受工程承包单位的设计能力、生产技术、施工条件及生产经营管理水平的制约。实际成本与计划成本比较，可反映工程承包单位的成本绩效和成本计划执行情况。"}, {"id": 732, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "工程成本管理各环节是一个有机联系与相互制约的系统过程。以下说法错误的是（　　）。", "opts": ["成本计划是开展成本控制和分析的基础", "成本管理绩效考核是成本控制的主要依据", "成本控制能对成本计划的实施进行监督，保证成本计划的实现", "成本分析是对成本计划是否实现进行的检查，并为成本管理绩效考核提供依据"], "ans": [1], "exp": "工程成本管理各环节是一个有机联系与相互制约的系统过程。其中，成本计划是开展成本控制和分析的基础，也是成本控制的主要依据；成本控制能对成本计划的实施进行监督，保证成本计划的实现；成本分析是对成本计划是否实现进行的检查，并为成本管理绩效考核提供依据；成本管理绩效考核是实现责任成本目标的保证和手段。"}, {"id": 733, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列工程费用中属于质量控制成本的是（    ）。", "opts": ["工程保修费", "损失赔偿费", "工程质量验收费", "质量事故处理费"], "ans": [2], "exp": "控制成本又可分为预防成本和鉴定成本。预防成本是指为防止工程质量缺陷和偏差出现，保证工程质量达到质量标准所采取的各项预防措施所支出的费用，包括质量规划费、工序控制费、新工艺鉴定费、质量培训费、质量信息费等：鉴定成本是指为保证工程质量而对工程本身及材料、构配件、设备等进行质量鉴定所支出的费用，包括施工图纸审查费，施工文件审查费，原材料、外购件检验试验费，工序检验费，工程质量验收费等。"}, {"id": 734, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "按施工成本要素构成划分，质量规划费用属于质量成本中的（    ）。", "opts": ["间接成本", "预防成本", "损失成本", "鉴定成本"], "ans": [1], "exp": "预防成本是指为防止工程质量缺陷和偏差出现，保证工程质量达到质量标准所采取的各项预防措施所支出的费用，包括质量规划费、工序控制费、新工艺鉴定费、质量培训费、质量信息费等。"}, {"id": 735, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "在工程项目施工时，能够分清受益对象，可以直接计入某一成本核算对象的费用有（　　）。", "opts": ["资产使用费", "人工费", "保险费", "机械使用费", "工程保修费"], "ans": [1, 3], "exp": "直接成本是指在工程项目实施过程中直接耗费的构成工程实体或有助于工程形成的各项支出，包括人工费、材料费、机械使用费和其他直接费。其特点是在项目施工时，能够分清受益对象，可以直接计入某一成本核算对象的费用。"}, {"id": 736, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "下列质量控制成本费用中，属于预防成本的有（　　）。", "opts": ["质量信息费", "工序检验费", "工序控制费", "质量培训费", "工程质量验收费"], "ans": [0, 2, 3], "exp": "控制成本可分为预防成本和鉴定成本。预防成本包括质量规划费、工序控制费、新工艺鉴定费、质量培训费、质量信息费等。鉴定成本包括施工图纸审查费，施工文件审查费，原材料、外购件检验试验费，工序检验费，工程质量验收费等。"}, {"id": 737, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "下列质量损失成本费用中，属于外部损失成本的有（　　）。", "opts": ["工程保修费", "停工损失费", "质量事故处理费", "损失赔偿费", "返工损失费"], "ans": [0, 3], "exp": "损失成本属于质量成本，可分为内部损失成本和外部损失成本。内部损失成本包括返工损失、返修损失、停工损失、质量事故处理费用等；外部损失成本包括工程保修费、损失赔偿费等。"}, {"id": 738, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "直接成本是指在工程项目实施过程中直接耗费的构成工程实体或有助于工程形成的各项支出，包括（　　）。", "opts": ["人工费", "材料费", "机械使用费", "其他直接费", "勘察设计费"], "ans": [0, 1, 2, 3], "exp": "直接成本是指在工程项目实施过程中直接耗费的构成工程实体或有助于工程形成的各项支出，包括人工费、材料费、机械使用费和其他直接费。其特点是在项目施工时，能够分清受益对象，可以直接计入某一成本核算对象的费用。"}, {"id": 739, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "间接成本是指工程承包单位为工程设计、采购、施工准备、组织和管理施工生产所发生的全部施工间接费支出，包括（　　）。", "opts": ["人工费", "资产使用费", "现场管理人员的人工费", "工程保修费", "勘察设计费"], "ans": [1, 2, 3, 4], "exp": "间接成本是指工程承包单位为工程设计、采购、施工准备、组织和管理施工生产所发生的全部施工间接费支出，包括勘察设计费、采购成本、现场管理人员的人工费、资产使用费、工具用具使用费、保险费、检验试验费、工程保修费以及其他费用等。其特点是在项目施工时，无法分清受益对象，无法直接计入某一成本核算对象的费用，必须按一定标准和比例分配计入不同成本核算对象。"}, {"id": 740, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "工程成本分为固定成本和变动成本。固定成本是指在一定的期间和一定的工程量范围内不受工程量增减变动影响的成本，如（　　）。", "opts": ["办公设施的折旧费", "管理人员工资", "材料费", "计件工资", "房屋租金"], "ans": [0, 1], "exp": "工程成本分为固定成本和变动成本。固定成本是指在一定的期间和一定的工程量范围内不受工程量增减变动影响的成本，如办公设施的折旧费、管理人员工资等。变动成本是随着工程量的增减变化而成正比例变化的各项成本，如材料费、计件工资等。"}, {"id": 741, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "损失成本又分为内部损失成本和外部损失成本。内部损失成本包括（　　）。", "opts": ["返工损失", "返修损失", "停工损失", "工程保修费", "损失赔偿费"], "ans": [0, 1, 2], "exp": "损失成本又分为内部损失成本和外部损失成本。内部损失成本是指在工程施工过程中因指挥决策失误、违反标准及操作规程、成品保护及机具设备保养不善等引起工程质量缺陷而造成的损失，以及为处理工程质量缺陷而发生的费用，包括返工损失、返修损失、停工损失、质量事故处理费用等；外部损失成本是指工程移交后，在使用过程中发现工程质量缺陷而需支付的费用总和，包括工程保修费、损失赔偿费等。"}, {"id": 742, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "不同的施工成本计划具有不同的性质和作用，下列关于竞争性成本计划的说法，正确的是（　　）。", "opts": ["竞争性成本计划是以有关价格条件说明为基础编制的", "竞争性成本计划的编制需要以项目实施方案为依据", "竞争性成本计划是对战略性成本计划的战术安排", "竞争性成本计划是在选派项目经理阶段编制的"], "ans": [0], "exp": "竞争性成本计划是以有关价格条件说明为基础编制的；以项目实施方案为依据编制成本计划的是实施性成本计划，选项B错误。竞争性成本带有成本战略性质，对战略性成本计划的战术安排是指导性成本和实施性成本，选项C错误。选派项目经理阶段编制的成本计划是指导性成本，选项D错误。"}, {"id": 743, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "施工成本计划需要依据相关文件并依赖各部门配合编制，下列关于施工成本计划编制的依据和分解的说法，正确的是（　　）。", "opts": ["施工成本计划的编制应以控制成本为基础", "施工成本计划的施工成本总额应控制在目标成本范围内", "施工成本计划应该由财务部门组织编制", "施工成本计划的关键是成本预测"], "ans": [1], "exp": "施工成本计划的编制应以成本预测为基础，选项A错误。施工成本总额应控制在目标成本范围内，并建立在切实可行的基础上；施工成本计划应该由项目管理机构负责组织编制，选项C错误。施工成本计划的关键是确定目标成本，选项D错误。"}, {"id": 744, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "某工程项目的某年度时间-成本累积曲线（S曲线）如图所示，下列关于该项目成本计划的描述，错误的是（　　）。", "opts": ["按照当前计划，该项目5月份的计划支出是500万元", "如果将所有工作按照最迟开始时间开始重新计划，新的S曲线将偏右", "该项目月度计划支出最多的月份是7月份", "该项目前三季度成本计划支出总额是4260万元"], "ans": [2], "exp": "根据该S曲线，7月份的月度成本计划支出是700万元，8月份的月度成本计划支出是900万元。所以C错误。"}, {"id": 745, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "施工责任成本是以（　　）为前提。", "opts": ["施工方案", "编制施工组织设计", "企业内部施工定额", "履行施工合同"], "ans": [3], "exp": "施工责任成本是以履行施工合同为前提，依据施工项目预算成本，经过施工单位和项目管理机构协商确定的由项目管理机构控制的成本总额。"}, {"id": 746, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列关于施工责任成本的说法，不正确的是（　　）。", "opts": ["中标后，投标负责人组织对编制、审核标价分离相关人员进行投标交底", "一般由项目经理部组织进行标价分离、完成施工成本测算，协调相关部门编制施工成本降低率", "技术部门配合完成施工方案、周转工具用量、机械设备配置的合理化及费用测算", "人力资源部门配合完成项目管理人员配置及岗位薪酬标准测算"], "ans": [1], "exp": "B错误，一般由商务部门组织进行标价分离、完成施工成本测算，协调相关部门编制施工成本降低率。"}, {"id": 747, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列关于施工成本计划类型的说法，不正确的是（　　）。", "opts": ["按施工成本计划发挥的作用不同，施工成本计划可分为竞争性成本计划、指导性成本计划和实施性成本计划", "竞争性成本计划是指在施工投标及签订合同阶段的估算成本计划", "指导性成本计划是指在选派项目经理阶段的预算成本计划", "实施性成本计划是项目经理的责任成本目标"], "ans": [3], "exp": "D选项错误，指导性成本计划是项目经理的责任成本目标。"}, {"id": 748, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "施工成本计划的编制依据不包括（　　）。", "opts": ["合同文件", "项目管理实施规划", "工程变更通知", "价格信息"], "ans": [2], "exp": "施工成本计划的编制依据包括：合同文件；项目管理实施规划；相关设计文件；价格信息；相关定额；类似项目成本资料等。"}, {"id": 749, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "施工成本计划的编制应以成本预测为基础，关键是（　　）。", "opts": ["预测项目成本", "确定成本计划", "确定目标成本", "进行成本控制"], "ans": [2], "exp": "施工成本计划的编制应以成本预测为基础，关键是确定目标成本。"}, {"id": 750, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "施工成本计划编制应由（　　）负责组织编制。", "opts": ["项目管理机构", "监理机构", "建设单位", "质量监督管理机构"], "ans": [0], "exp": "施工成本计划编制应符合下列规定：由项目管理机构负责组织编制；项目成本计划对项目成本控制具有指导性；各成本项目指标和降低成本指标明确。"}, {"id": 751, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列关于施工责任成本的说法，正确的是（　　）。", "opts": ["施工成本是在既定的市场环境下，根据企业管理水平和管理特点，按企业费用支出标准、资源市场价格信息和工程实际情况，测算的项目各项费用总和", "责任成本具有可核算性、可预计性、不可控制性", "商务部门配合完成项目管理费、规费及各项费用标准测算，完成施工责任成本分解", "施工责任成本是以责任中心为对象来进行归集的可控成本，将企业成本管理中的经济责任进行明确划分，体现出“分级控制”与“责权利一体”的现代企业管理理念"], "ans": [3], "exp": "选项A错误，预算成本是在既定的市场环境下，根据企业管理水平和管理特点，按企业费用支出标准、资源市场价格信息和工程实际情况，测算的项目各项费用总和；选项B错误，责任成本具有可考核性、可预计性、可计量性、可控制性；选项C错误，财务部门配合完成项目管理费、规费及各项费用标准测算，商务部门完成施工责任成本分解。"}, {"id": 752, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列选项中，不属于施工责任成本构成的是（　　）。", "opts": ["人工费", "间接费", "直接费", "专业分包费"], "ans": [2], "exp": "施工责任成本由人工费、材料费、施工机具使用费、专业分包费、措施费、间接费、其他费用组成。"}, {"id": 753, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "项目中标后，相关责任部门进行施工责任成本分解，以下（　　）不属于责任部门。", "opts": ["项目经理", "商务部门", "技术部门", "质量部门"], "ans": [0], "exp": "选项A项目经理是责任岗位。"}, {"id": 754, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列施工成本计划中，（　　）成本计划用于确定施工责任成本。", "opts": ["竞争性成本计划", "指导性成本计划", "实施性成本计划", "计划性成本计划"], "ans": [1], "exp": "指导性成本计划是以合同价为依据，按照企业定额标准制定的施工成本计划，用以确定施工责任成本。"}, {"id": 755, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "责任中心能够计量责任成本的大小，这体现了责任成本的（　　）。", "opts": ["可考核性", "可预计性", "可计量性", "可控制性"], "ans": [2], "exp": "通常而言，责任成本具有四个条件：①可考核性，责任中心能够实时考核责任成本的执行过程及结果；②可预计性，责任中心能够知晓责任成本的发生与发展；③可计量性，责任中心能够计量责任成本的大小；④可控制性，责任中心能够有效调节、控制责任成本。"}, {"id": 756, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "中标后，投标负责人组织对编制、审核标价分离相关人员进行投标交底。一般由（　　）组织进行标价分离、完成施工成本测算，协调相关部门编制施工成本降低率。", "opts": ["商务部门", "技术部门", "工程部门", "物资采购部门"], "ans": [0], "exp": "中标后，投标负责人组织对编制、审核标价分离相关人员进行投标交底。一般由商务部门组织进行标价分离、完成施工成本测算，协调相关部门编制施工成本降低率。"}, {"id": 757, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列成本计划中，用于确定施工责任成本的是（　　）。", "opts": ["指导性成本计划", "竞争性成本计划", "响应性成本计划", "实施性成本计划"], "ans": [0], "exp": "指导性成本计划是选派项目经理阶段的预算成本计划，是项目经理的责任成本目标。它是以合同价为依据，按照企业的预算定额标准制定的施工成本计划，用以确定施工责任成本。"}, {"id": 758, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "施工成本计划的类型按其作用分类不包括（　　）。", "opts": ["竞争性成本计划", "指导性成本计划", "实施性成本计划", "委任性成本计划"], "ans": [3], "exp": "按其发挥的作用不同，施工成本计划可分为竞争性成本计划、指导性成本计划和实施性成本计划。"}, {"id": 759, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "若按项目组成编制施工成本计划，项目应按（　　）的顺序依次进行分解。", "opts": ["单项工程—单位工程—分部工程—分项工程", "单项工程—分部工程—单位工程—分项工程", "单位工程—单项工程—分部工程—分项工程", "单位工程—单项工程—分项工程—分部工程"], "ans": [0], "exp": "大中型工程项目通常是由若干单项工程构成的，而每个单项工作包括多个单位工程，每个单位工程又是由若干个分部分项工程所构成。因此，首先要把项目总施工成本分解到单项工程和单位工程中，再进一步分解为分部工程和分项工程。"}, {"id": 760, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "施工企业在工程投标及签订合同阶段编制的估算成本计划是一种（　　）成本计划。", "opts": ["指导性", "实施性", "作业性", "竞争性"], "ans": [3], "exp": "竞争性成本计划是施工项目投标及签订合同阶段的估算成本计划。"}, {"id": 761, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "实施性成本计划是在项目施工准备阶段，采用（　　）编制的施工成本计划。", "opts": ["估算指标", "概算定额", "施工定额", "预算定额"], "ans": [2], "exp": "实施性成本计划是指在工程项目施工准备阶段，以项目实施方案为依据，以落实项目经理责任目标为出发点，根据企业施工定额编制的施工成本计划。"}, {"id": 762, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "成本计划的编制环节包括：（1）编制项目总体成本计划；（2）确定项目总体成本目标；（3）预测项目成本；（4）针对成本计划制定相应的控制措施；（5）由项目管理机构与组织的职能部门负责人分别审批相应的成本计划；（6）项目管理机构与组织的职能部门根据其责任成本范围，分别确定各自成本目标，并编制相应的成本计划。其中正确的程序是（　　）。", "opts": ["（2）（3）（1）（5）（4）（6）", "（1）（3）（2）（4）（6）（5）", "（3）（2）（1）（6）（4）（5）", "（4）（1）（2）（5）（3）（6）"], "ans": [2], "exp": "施工成本计划编制程序：（1）预测项目成本；（2）确定项目总体成本目标；（3）编制项目总体成本计划；（4）项目管理机构与组织的职能部门根据其责任成本范围，分别确定各自成本目标，并编制相应的成本计划；（5）针对成本计划制定相应的控制措施；（6）由项目管理机构与组织的职能部门负责人分别审批相应的成本计划。"}, {"id": 763, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "关于编制施工项目成本计划时考虑预备费的说法，正确的是（　　）。", "opts": ["只针对整个项目考虑总的预备费，以便灵活调用", "在分析各分项工程风险基础上，只针对部分分项工程考虑预备费", "既要针对项目考虑总体层面上的预备费，也要在主要的分项工程中安排适当的不可预见费", "不考虑整个项目预备费，由施工企业统一考虑"], "ans": [2], "exp": "在编制成本支出计划时，要在项目总体层面上考虑总的预备费，也要在主要的分项工程中安排适当的不可预见费，避免在具体编制成本计划时，可能发现个别单位工程或工程量表中某些内容的工程量计算有较大出入，偏离原来的成本预算。"}, {"id": 764, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "施工单位以施工方案及企业施工定额为依据编制的成本计划是（    ）。", "opts": ["预测性成本计划", "竞争性成本计划", "实施性成本计划", "指导性成本计划"], "ans": [2], "exp": "实施性成本计划是指在工程项目施工准备阶段，以项目实施方案为依据，以落实项目经理责任目标为出发点，根据企业施工定额编制的施工成本计划。"}, {"id": 765, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "将施工总成本分解到单项工程、单位工程，再进一步分解到分部分项工程的方法是按（    ）编制施工成本计划的方法。", "opts": ["成本组成", "实施进度", "项目结构", "施工组织"], "ans": [2], "exp": "按项目结构编制施工成本计划的方法：大中型工程项目通常是由若干单项工程构成的，而每个单项工程又会包含多个单位工程，每个单位工程又是由若干分部分项工程所构成。"}, {"id": 766, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "在工程项目中标后，需要项目的各个部门配合完成施工责任成本分解工作，在此过程中承担大型机械费用控制目标的责任部门有（　　）。", "opts": ["采购部门", "工程部门", "人力资源部门", "质量部门", "技术部门"], "ans": [1, 4], "exp": "根据施工责任成本分解的责任部门分工情况，大型机械费用控制目标应该由工程部门和技术部门共同负责。"}, {"id": 767, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "按照成本组成编制施工成本计划的方法，组成施工成本的费用有（　　）。", "opts": ["施工机具使用费", "人工费", "措施项目费", "企业管理费", "工程定额测定费"], "ans": [0, 1, 3], "exp": "按成本构成分解，施工成本可分为人工费、材料费、施工机具使用费和企业管理费等。"}, {"id": 768, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "施工责任成本的分离通常以（　　）为依据。", "opts": ["施工合同", "项目管理实施规划", "企业内部施工定额", "施工方案", "施工进度计划"], "ans": [0, 2, 3, 4], "exp": "施工责任成本应以施工合同、施工图纸、中标清单、企业内部施工定额、施工组织设计、施工方案、施工进度计划、市场价格信息等为依据，按照一定方法从中标价（合同价）中分离出来。"}, {"id": 769, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "施工项目竞争性成本计划是在（　　）的估算成本计划。", "opts": ["选派项目经理阶段", "投标阶段", "施工准备阶段", "签订合同阶段", "制定企业年度计划阶段"], "ans": [1, 3], "exp": "竞争性成本计划是指在施工投标及签订合同阶段的估算成本计划。"}, {"id": 770, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "下列关于施工责任成本定义的说法，正确的是（　　）。", "opts": ["施工责任成本的确定是以施工图设计为前提", "施工责任成本是以责任中心为对象来进行归集的可控成本", "施工责任成本需体现出“责权利三方分立”的现代企业管理理念", "通常而言，责任成本具有两个条件", "施工责任成本管控是指在工程项目施工全过程中，对工程项目的责任成本进行分解，明确各相关部门的成本责任"], "ans": [1, 4], "exp": "A项错误，施工责任成本的确定是以履行施工合同为前提。C项错误，施工责任成本是以责任中心为对象来进行归集的可控成本，将企业成本管理中的经济责任进行明确划分，体现出“分级控制”与“责权利一体”的现代企业管理理念。D项错误，通常而言，责任成本具有四个条件。"}, {"id": 771, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "下列关于施工成本计划的说法，正确的是（　　）。", "opts": ["在编制成本支出计划时，要在项目总体层面上考虑总的预备费，也要在主要分项工程中安排适当的不可预见费", "实施性成本计划是指在选派项目经理阶段的成本计划", "编制施工成本计划以项目管理实施规划为依据", "编制施工成本计划的三种方法是相互独立的", "成本计划是开展成本控制和分析的基础，也是成本控制的主要依据"], "ans": [0, 2, 4], "exp": "选项B错误，实施性成本计划是指在工程项目施工准备阶段，以项目实施方案为依据，以落实项目经理责任目标为出发点，根据企业施工定额编制的施工成本计划；选项D错误，三种编制施工成本计划的方式并不是相互独立的。在工程实践中，往往结合起来使用，发挥各自优势。"}, {"id": 772, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "项目成本计划的编制方式有（　　）。", "opts": ["按工程实施阶段编制项目成本计划", "按成本组成编制项目成本计划", "按施工质量编制施工成本计划", "按施工合同编制施工成本计划", "按项目结构编制项目成本计划"], "ans": [0, 1, 4], "exp": "施工成本计划的编制方式有：（1）按成本组成编制项目成本计划；（2）按项目结构编制成本计划；（3）按工程实施阶段编制项目成本计划。"}, {"id": 773, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "项目成本指标控制的工作包括：①采集成本数据，监测成本形成过程；②制定对策，纠正偏差；③找出偏差，分析原因；④确定成本管理分层次目标。其正确的工作程序是（　　）。", "opts": ["④→①→③→②", "①→②→③→④", "①→③→②→④", "②→④→③→①"], "ans": [0], "exp": "指标控制程序：（1）确定成本管理分层次目标；（2）采集成本数据，监测成本形成过程；（3）找出偏差，分析原因；（4）制定对策，纠正偏差；（5）调整改进成本管理方法。"}, {"id": 774, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "施工成本中的人工费的控制，实行（　　）的方法。", "opts": ["计量控制", "计价控制", "包干控制", "量价分离"], "ans": [3], "exp": "施工成本中的人工费的控制，实行量价分离的方法。"}, {"id": 775, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列选项中，不属于控制人工费支出的主要手段的是（　　）。", "opts": ["加强劳动定额管理", "改变劳动力工作时间", "提高劳动生产率", "降低工程耗用人工工日"], "ans": [1], "exp": "加强劳动定额管理，提高劳动生产率，降低工程耗用人工工日，是控制人工费支出的主要手段。"}, {"id": 776, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "在施工成本的过程控制中，需进行包干控制的材料是（　　）。", "opts": ["钢钉", "水泥", "钢筋", "石子"], "ans": [0], "exp": "包干控制是指在材料使用过程中，对部分小型及零星材料（如钢钉、钢丝等）根据工程量计算出所需材料量，将其折算成费用，由作业者包干使用。"}, {"id": 777, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "分项工程中的钢筋绑扎、混凝土浇筑、砌筑、抹灰等工程，应以（　　）为对象进行的限额领料。", "opts": ["施工工序", "施工班组", "施工专业队", "项目管理机构"], "ans": [1], "exp": "按分项工程实行限额领料，就是按照分项工程进行限额，如钢筋绑扎、混凝土浇筑、砌筑、抹灰等，它是以施工班组为对象进行的限额领料。"}, {"id": 778, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "在控制施工机具施工费时，应采取（　　）手段对台班单价进行控制。", "opts": ["选择适合项目施工特点的施工机械", "保证施工机械设备的作业时间", "加强现场设备的维修、保养工作", "提高机械设备单位时间的生产效率和利用率"], "ans": [2], "exp": "控制台班单价：①加强现场设备的维修、保养工作；②加强机械操作人员的培训工作；③加强配件的管理；④降低材料成本；⑤成立设备管理领导小组，负责设备调度、检查、维修、评估等具体事宜。"}, {"id": 779, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "某分项工程某月计划工程量为3200m3，预算单价为15元/m3。月末核定实际完成工程量为2800m3，实际单价为20元/m3。则该分项工程当月拟完工程预算费用（BCWS）是（　　）元。", "opts": ["64000", "42000", "56000", "48000"], "ans": [3], "exp": "拟完工程预算费用（BCWS）=计划工程量×预算单价=3200×15=48000元。"}, {"id": 780, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列选项中，属于施工成本偏差中横道图法的不足之处是（　　）。", "opts": ["形象、直观、一目了然", "能够准确表达出费用的绝对偏差", "反映的信息量少", "直观地表明偏差的严重性"], "ans": [2], "exp": "横道图法能够形象、直观、准确地表达费用的绝对偏差，而且能直观地表明费用偏差的严重性。但这种方法反映的信息量少，一般在项目较高管理层应用。"}, {"id": 781, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "在施工项目实施过程中，表明施工项目按预定计划进行三条曲线（已完工程实际费用、拟完工程预算费用、已完工程预算费用）的对应关系应为（　　）。", "opts": ["缓慢离散、急速下降", "靠得很近、平稳上升", "缓慢离散、平稳上升", "靠得很近、缓慢上升"], "ans": [1], "exp": "在施工项目实施过程中，最理想的状态是已完工程实际费用（ACWP）、拟完工程预算费用（BCWS）、已完工程预算费用（BCWP）三条曲线靠得很近、平稳上升，表明施工项目按预定计划进行。"}, {"id": 782, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "结合施工方法，进行材料使用的比选，在满足功能要求的前提下，通过代用、改变配合比、使用外加剂等方法降低材料消耗的费用，属于（　　）。", "opts": ["经济措施", "组织措施", "合同措施", "技术措施"], "ans": [3], "exp": "技术措施。施工过程中降低成本的技术措施，包括：进行技术经济分析，确定最佳的施工方案；结合施工方法，进行材料使用的比选，在满足功能要求的前提下，通过代用、改变配合比、使用外加剂等方法降低材料消耗的费用。"}, {"id": 783, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "关于施工成本纠偏措施的说法中，正确的是（　　）。", "opts": ["组织措施是其他各类措施的前提和保障", "技术措施的关键是要能进行技术经济分析", "经济措施的运用仅限于财务人员", "合同措施的运用时只需要关注己方是否会被对方索赔"], "ans": [0], "exp": "B项错误，运用技术纠偏措施的关键，一是要能提出多个不同的技术方案，二是要对不同的技术方案进行技术经济分析比较，选择最佳方案。C项错误，经济措施的运用绝不仅限于财务人员。D项错误，应仔细分析合同中的索赔条款，既要密切注视对方合同执行情况，以寻求合同索赔的机会；同时也要密切关注己方履行合同的情况，以防被对方索赔。"}, {"id": 784, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列施工成本管理的措施中，属于技术措施的是（　　）。", "opts": ["确定合适的施工机械、设备使用方案", "落实业主签证", "确定合理详细的工作流程", "优化生产要素的配置"], "ans": [0], "exp": "B项为经济措施，CD项为组织措施。"}, {"id": 785, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "某工程主体钢筋计划工程量约2.5t，预算单价4000元/t，计划5个月内均衡完成。在工程开工后，钢筋实际采购价格为4200元/t。施工至第三个月底，实际完成钢筋工程量1.8t。利用挣值分析法，该项目此时的工程费用偏差（CV）是（　　）。", "opts": ["1560元", "-1560元", "360元", "-360元"], "ans": [3], "exp": "费用偏差（CV）=已完工程预算费用（BCWP）-已完工程实际费用（ACWP）=（已完工程量×预算单价）-（已完成工程量×实际单价）=（1.8×4000）-（1.8×4200）=-360元。"}, {"id": 786, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "某土方工程开工前计划某月开挖土方工程6000m3，预算单价20元/m3，实际当月开挖土方5500m3，实际单价18元/m3，则该工程的进度绩效指数（SPI）是（　　）。", "opts": ["1.11", "0.92", "1.21", "0.83"], "ans": [1], "exp": "进度绩效指数（SPI）=已完工程预算费用（BCWP）/拟完工程预算费用（BCWS）=（已完工程量×预算单价）/（计划工程量×预算单价）=（20×5500）/（20×6000）=0.92元。"}, {"id": 787, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "当工程实际成本费用支出超出成本计划时，需要采取施工成本纠偏措施，属于经济措施的是（　　）。", "opts": ["编制成本管理工作计划，确定合理详细工作流程", "对成本管理目标进行风险分析，制定防范对策", "应用先进施工技术，使用新型建筑材料", "对不同技术方案进行技术经济分析，选择最佳方案"], "ans": [1], "exp": "编制成本管理工作计划，确定合理详细工作流程属于组织措施，选项A错误。应用先进施工技术，使用新型建筑材料，对不同技术方案进行技术经济分析，选择最佳方案都属于技术措施，选项C、D错误。"}, {"id": 788, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "（　　）阶段是成本发生的主要阶段。", "opts": ["规划", "设计", "施工", "运维"], "ans": [2], "exp": "施工阶段是成本发生的主要阶段，这个阶段的成本控制主要是通过确定成本目标并按计划成本组织施工，合理配置资源，对施工现场发生的各项成本费用进行有效控制。"}, {"id": 789, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列关于材料费的控制方法的说法，不正确的是（　　）。", "opts": ["材料费的控制实行“量价分离”的方法", "通过定额控制、指标控制、计量控制、包干控制等手段有效控制物资材料的消耗", "对于没有消耗定额的材料，则实行计划管理和按指标控制的办法", "材料价格主要由市场价格控制，包括由买价、运杂费、运输中的合理损耗等"], "ans": [3], "exp": "材料价格主要由材料采购部门控制。"}, {"id": 790, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "施工机具使用费主要由（　　）和台班单价两方面决定。", "opts": ["台班数量", "工程量", "机械种类", "机械参数"], "ans": [0], "exp": "施工机具使用费主要由台班数量和台班单价两方面决定，因此为有效控制施工机具使用费，应主要从两个方面进行控制。"}, {"id": 791, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "挣值法的三个基本参数是：已完工程预算费用、拟完工程预算费用和（　　）。", "opts": ["拟完成工程量", "已完成工程量", "已完工程实际费用", "拟完工程实际费用"], "ans": [2], "exp": "挣值法的三个基本参数是：已完工程预算费用、拟完工程预算费用和已完工程实际费用。"}, {"id": 792, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "在工程施工过程中，对影响施工成本的各项要素，即施工生产所耗费的人力、物力和各项费用开支，采取一定措施进行监督和分析，及时预防、发现和纠正偏差，保证施工成本目标实现的过程，该做法属于成本管理的（　　）的工作内容。", "opts": ["成本计划", "成本控制", "成本分析", "成本考核"], "ans": [1], "exp": "施工成本控制是指在工程施工过程中，对影响施工成本的各项要素，即施工生产所耗费的人力、物力和各项费用开支，采取一定措施进行监督和分析，及时预防、发现和纠正偏差，保证施工成本目标实现的过程。"}, {"id": 793, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列不属于成本偏差的表达方法是（　　）。", "opts": ["横道图法", "表格法", "核算法", "曲线法"], "ans": [2], "exp": "成本偏差可采用不同的表达方法，常用的有横道图法、表格法和曲线法。"}, {"id": 794, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "费用绩效指数（CPI）等于（　　）。", "opts": ["已完工程预算费用/已完工程实际费用", "已完工程预算费用/拟完工程预算费用", "已完工程实际费用/已完工程预算费用", "已完工程实际费用/拟完工程预算费用"], "ans": [0], "exp": "费用绩效指数（CPI）=已完工程预算费用（BCWP）/已完工程实际费用（ACWP）。"}, {"id": 795, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "挣值法评价指标之一的费用偏差反映的是（　　）。", "opts": ["统计偏差", "平均偏差", "绝对偏差", "相对偏差"], "ans": [2], "exp": "费用（进度）偏差反映的是绝对偏差。"}, {"id": 796, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "偏差分析的目的不包含（　　）。", "opts": ["找出引起偏差的原因", "在施工中采取有针对性的措施", "最大程度地节约施工成本开支", "避免相同的问题再次发生"], "ans": [2], "exp": "偏差分析的一个重要目的就是要找出引起偏差的原因，从而采取有针对性的措施减少或避免相同问题的再次发生。"}, {"id": 797, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "某土方工程施工资料如下表所示，则该工程的费用偏差和进度偏差分别为（　　）。", "opts": ["-11000，35000", "46000，35000", "46000，-11000", "35000，-11000"], "ans": [0], "exp": "费用偏差（CV）＝已完工程预算费用（BCWP）-已完工程实际费用（ACWP）＝5500×70-5500×72＝-11000（元）。进度偏差（SV）＝已完工程预算费用（BCWP）-拟完工程预算费用（BCWS）＝5500×70-5000×70＝35000（元），所以A选项正确。"}, {"id": 798, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "对总量1000万元的工程项目进行期中检查，截止检查时已完成工作预算费用410万元，拟完工程预算费用为400万元，已完工程实际费用为430万元，则其进度绩效指数为（　　）。", "opts": ["0.430", "0.930", "0.953", "1.025"], "ans": [3], "exp": "进度绩效指数（SPI）=已完工程预算费用（BCWP）/拟完工程预算费用（BCWS）=410/400=1.025。"}, {"id": 799, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "某土方工程，月计划工程量2800m3，预算单价25元/m3；到月末时已完工程量3000m3，实际单价26元/m3，对该项工作采用赢得值法进行偏差分析的说法，正确的是（　　）。", "opts": ["已完成工作实际费用75000元", "费用绩效指数＞1，表明项目运行超出预算费用", "进度绩效指数＜1，表明实际进度比计划进度拖后", "费用偏差为-3000元，表明项目运行超出预算费用"], "ans": [3], "exp": "选项A错误，已完工程实际费用=已完成工作量×实际单价=3000×26=78000元。选项B错误，费用绩效指数=已完工程预算费用/已完工程实际费用=3000×25÷78000＜1。选项C错误，进度绩效指数=已完工程预算费用/拟完工程预算费用=3000×25/2800×25＞1。选项D，费用偏差=已完工程预算费用－已完工程实际费用=3000×（25-26）=-3000元。"}, {"id": 800, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "某分部分项工程预算单价为300元/m3，计划1个月完成工程量100m3，实际施工中用了两个月（匀速）完成工程量160m3，由于材料费上涨导致实际单价为330元/m3。则该分部分项工程的费用偏差为（　　）元。", "opts": ["4800", "-4800", "18000", "-18000"], "ans": [1], "exp": "费用偏差＝已完工程预算费用-已完工程实际费用＝160×300-160×330＝-4800元。"}, {"id": 801, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "某混凝土工程，9月份计划工程量为5000m3，计划单价为400元/m3；而9月份实际完成工程量为4000m3，实际单价为410元/m3，则该工程9月份的进度偏差为（　　）万元。", "opts": ["-36", "36", "-40", "41"], "ans": [2], "exp": "进度偏差（SV）＝已完工程预算费用（BCWP）-拟完工程预算费用（BCWS）。该工程9月份的进度偏差＝4000×400-5000×400＝-40（万元）。"}, {"id": 802, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列说法中不正确的是（　　）。", "opts": ["当进度绩效指数（SPI）＜1时，表示进度延误，即实际进度比计划进度拖后", "当进度绩效指数（SPI）＞1时，表示进度提前，即实际进度比计划进度快", "当投资绩效指数（CPI）＞1时，表示投资节支，即实际投资低于预算投资", "当进度绩效指数（SPI）＞1时，表示进度延误，即实际进度比计划进度拖后"], "ans": [3], "exp": "当进度绩效指数（SPI）＜1时，表示实际进度延拖后。"}, {"id": 803, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "费用偏差结果为正，进度偏差为负表示（　　）。", "opts": ["投资节约，进度拖后", "投资节约，进度提前", "投资超支，进度拖后", "投资超支，进度提前"], "ans": [0], "exp": "当费用偏差CV为负值时，表明实际费用超支；当费用偏差CV为正值时，表明实际费用节约。CV=0时，表明实际费用按预算支出。当进度偏差SV为负值时，表明实际进度拖后；当进度偏差SV为正值时，表明实际进度提前。SV=0时，表明实际进度正常。"}, {"id": 804, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "施工成本的过程控制中，人工费的控制实行（　　）方法。", "opts": ["量化管理", "量价分离", "弹性管理", "指标包干"], "ans": [1], "exp": "人工费的控制实行“量价分离”的方法，将作业用工及零星用工按定额工日的一定比例综合确定用工数量与单价，通过专业作业分包合同进行控制。"}, {"id": 805, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "施工成本过程控制中，材料费的控制实行（　　）方法。", "opts": ["量化管理", "量价分离", "弹性管理", "指标包干"], "ans": [1], "exp": "材料费控制同样按照“量价分离”原则，控制材料用量和材料价格。"}, {"id": 806, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "某工程施工至6月底，采用挣值分析获得以下数据：已完工程预算费用430万元，已完工程实际费用460万元，拟完工程预算费用440万元，则该工程在6月底的实际状况是（    ）。", "opts": ["费用节约10万元", "进度延误20万元", "费用超支30万元", "进度提前10万元"], "ans": [2], "exp": "费用偏差（CV）：CV=已完工程预算费用（BCWP）-已完工程实际费用（ACWP）。将题目中的数据代入公式可得：CV=430-460=-30（万元）。当CV＜0时，意味着项目运行超出预算费用，即费用超支30万元。进度偏差（SV）：SV=已完工程预算费用（BCWP）-拟完工程预算费用（BCWS）。将题目中的数据代入公式可得：SV=430-440=-10（万元）。当SV＜0时，表示实际进度落后于计划进度，即进度延误10万元。"}, {"id": 807, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "某土方工程计划施工至5月底完成工程量9000立方米，预算单价76元/立方米，实际施工至5月底完成工程量5600立方米，实际单价78元/立方米。采用挣值法分析，工程进度绩效指数为（    ）。", "opts": ["0.97", "1.07", "0.62", "1.61"], "ans": [2], "exp": "进度绩效指数=（5600×76）÷（9000×76）≈0.62。"}, {"id": 808, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列施工成本控制措施中，属于技术措施的是（    ）。", "opts": ["制定详细的成本控制工作流程", "记录实际支出的各项费用", "编制科学的资金使用计划", "确定合适的施工机械使用方案"], "ans": [3], "exp": "A属于组织措施，BC属于经济措施。"}, {"id": 809, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "某工程截至某时刻，已完工程预算费用7800万元，已完工程实际费用8100万元，拟完工程预算费用7600万元。采用挣值法分析该工程实际状况，可得到的正确结论是（    ）。", "opts": ["费用超支300万元", "费用节约200万元", "进度拖后200万元", "进度提前500万元"], "ans": [0], "exp": "费用偏差（CV）=已完工程预算费用（BCWP）-已完工程实际费用（ACWP）=7800-8100=-300万元，费用超支300万元。进度偏差（SV）=已完工程预算费用（BCWP）-拟完工程预算费用（BCWS）=7800-7600=200万元。进度提前200万元。"}, {"id": 810, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "某土方工程计划于2025年2月初至5月底月平均完成土方工程量2400m³，预算单价75/m³，按计划开工后施工至2025年3月底时，实际完成土方工程量5300m³，实际单价81元/m³，采用挣值法分析，该工程在3月底的进度绩效指数是（    ）。", "opts": ["0.91", "1.10", "0.93", "1.08"], "ans": [1], "exp": "2400m³为每月平均完成计划量，3月底计划完成4800m³，进度绩效指数（SPI）=已完工程预算费用（BCWP）/拟完工程预算费用（BCWS）=5300×75/2400×75=5300/4800=1.10。"}, {"id": 811, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "下列关于施工成本过程的控制方法的说法，正确的有（　　）。", "opts": ["人工费采用“量价分离”原则进行控制", "材料价格由项目经理负责控制", "对分包费用的控制，主要是做好分包工程的询价、订立平等互利的分包合同、建立稳定的分包关系网络、加强施工验收和分包结算等工作", "加强劳动定额管理，提高劳动生产率，降低工程耗用人工工日，是控制人工费支出的主要手段", "施工机具使用费主要由台班数量决定"], "ans": [0, 2, 3], "exp": "B项错误，材料价格主要由材料采购部门控制。E项错误，施工机具使用费主要由台班数量和台班单价两方面决定。"}, {"id": 812, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "下列关于赢得值法及相关评价指标的说法，正确的有（　　）。", "opts": ["费用（进度）偏差反映的是相对偏差", "费用（进度）绩效指数反映的是绝对偏差", "费用（进度）偏差适于同一项目和不同项目比较中采用", "在项目费用、进度综合控制中引入挣值法，可以克服进度、费用分开控制的缺点", "引入挣值法可定量判断进度、费用的执行效果"], "ans": [3, 4], "exp": "AB项错误，费用（进度）偏差反映的是绝对偏差，费用（进度）绩效指数反映的是相对偏差，C项错误，费用（进度）偏差仅适合于对同一项目进行偏差分析。"}, {"id": 813, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "下列施工成本管理的措施中，属于经济措施的有（　　）。", "opts": ["进行技术经济分析，确定最佳的施工方案", "落实成本管理的组织机构和人员", "密切注视对方合同执行情况，以寻求合同索赔的机会", "对各种变更及时落实业主签证并结算工程款", "对施工成本管理目标进行风险分析并制定防范性对策"], "ans": [3, 4], "exp": "A项为技术措施，B项为组织措施，C项为合同措施。"}, {"id": 814, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "下列关于施工成本控制的说法，正确的是（　　）。", "opts": ["指标控制是成本控制的重点", "人工费、材料费的控制都实行“量价分离”的方法", "加强劳动定额管理，提高劳动生产率，降低工程耗用人工工日是控制人工费支出的主要手段", "完善职业技能培训体系是控制施工机具使用费的有效手段之一", "施工机具使用费主要由台班数量和台班单价两方面决定"], "ans": [0, 1, 2, 4], "exp": "施工成本控制过程可分为两类：一是管理行为控制过程；二是指标控制过程。管理行为控制是对施工成本全过程控制的基础，指标控制则是成本控制的重点，故选项A正确；人工费的控制实行“量价分离”的方法，将作业用工及零星用工按定额工日的一定比例综合确定用工数量与单价，通过专业作业分包合同进行控制。加强劳动定额管理，提高劳动生产率，降低工程耗用人工工日，是控制人工费支出的主要手段；材料费的控制同样按照“量价分离”原则控制材料用量和材料价格，故选项BC正确；完善职业技能培训体系是控制人工费的手段；施工机具使用费主要由台班数量和台班单价两方面决定，选项E正确。"}, {"id": 815, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "下列控制施工机具使用费的措施中，属于控制台班数量的有（　　）。", "opts": ["加强内部调配，提高机械设备的利用率", "加强机械操作人员的培训工作", "安排好生产工序的衔接，避免停工、窝工", "提高机械设备单位时间的生产效率和利用率", "加强配件的管理"], "ans": [0, 2, 3], "exp": "台班数量：①根据施工方案和现场实际情况，选择适合项目施工特点的施工机械，制定设备需求计划，合理安排施工生产，充分利用现有机械设备，加强内部调配，提高机械设备的利用率。②保证施工机械设备的作业时间，安排好生产工序的衔接，尽量避免停工、窝工，尽量减少施工中所消耗的机械台班数量。③核定设备台班定额产量，实行超产奖励办法，加快施工生产进度，提高机械设备单位时间的生产效率和利用率。④加强设备租赁计划管理，减少不必要的设备闲置和浪费，充分利用社会闲置机械资源。选项BE属于控制台班单价措施。"}, {"id": 816, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "某分项工程采用挣值法分析得到，已完工程预算费用（BCWP）＞拟完工程预算费用（BCWS）＞已完工程实际费用（ACWP），则该工程（　　）。", "opts": ["费用超支", "进度延误", "进度提前", "费用节约", "费用绩效指数>1"], "ans": [2, 3, 4], "exp": "已完工程预算费用（BCWP）＞拟完工程预算费用（BCWS）＞已完工程实际费用（ACWP），费用偏差（CV）=BCWP-ACWP，CV>0，表示费用节约；进度偏差（SV）=BCWP-BCWS，SV>0，表示进度提前；费用绩效指数（CPI）=BCWP/ACWP>1。"}, {"id": 817, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列选项中，不属于成本分析的主要依据是（　　）。", "opts": ["会计核算所提供的资料", "业务核算所提供的资料", "成本管理绩效考核资料", "统计核算所提供的资料"], "ans": [2], "exp": "成本分析的主要依据是会计核算、业务核算和统计核算所提供的资料。"}, {"id": 818, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "在施工成本分析的依据中，不仅可以对已经发生的经济活动进行核算，而且还可以对尚未发生或正在发生的经济活动进行核算的方式是（　　）。", "opts": ["会计核算", "成本核算", "业务核算", "统计核算"], "ans": [2], "exp": "会计核算和统计核算一般是对已经发生的经济活动进行核算，而业务核算不但可以核算已经完成的项目是否达到原定的目的、取得预期的效果，而且可以对尚未发生或正在发生的经济活动进行核算，以确定该项经济活动是否有经济效果，是否有执行的必要。"}, {"id": 819, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列关于成本分析依据的说法，正确的是（　　）。", "opts": ["业务核算主要是价值核算", "会计核算的范围比业务核算、统计核算要广", "业务核算是成本分析的重要依据", "统计核算的计量尺度比会计核算宽，可以用货币计算，也可以用实物或劳动量计算"], "ans": [3], "exp": "A选项错误，会计核算主要是价值核算；B选项错误，业务核算的范围比会计、统计核算要广；C选项错误，由于会计记录具有连续性、系统性、综合性等特点，因此它是成本分析的重要依据。"}, {"id": 820, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列施工成本分析依据的内容中，其目的在于迅速取得资料，以便在经济活动中及时采取措施进行调整的是（　　）。", "opts": ["统计核算", "表格核算", "会计核算", "业务核算"], "ans": [3], "exp": "业务核算的目的是迅速取得资料，以便在经济活动中及时采取措施进行调整。"}, {"id": 821, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "施工成本分析的主要工作有：①收集成本信息；②选择成本分析方法；③分析成本形成原因：④进行成本数据处理；⑤确定成本结果。正确的分析步骤是（　　）。", "opts": ["①→②→④→③→⑤", "②→①→④→③→⑤", "②→③→①→④→⑤", "①→③→②→④→⑤"], "ans": [1], "exp": "施工成本分析方法应遵循下列步骤：①选择成本分析方法；②收集成本信息；③进行成本数据处理；④分析成本形成原因；⑤确定成本结果。"}, {"id": 822, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列成本分析方法中，不属于施工成本分析的基本方法是（　　）。", "opts": ["比较法", "差额计算法", "比率法", "成本项目分析方法"], "ans": [3], "exp": "施工成本分析的基本方法包括：比较法、因素分析法、差额计算法、比率法。"}, {"id": 823, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列指标对比中，通过（　　）对比可以看出各项技术经济指标的变动情况，反映施工管理水平的提高程度。", "opts": ["实际指标与目标指标", "本期实际指标与上期实际指标", "实际指标与本行业平均水平、先进水平", "目标指标与本行业平均水平、先进水平"], "ans": [1], "exp": "通过本期实际指标与上期实际指标对比，可以看出各项技术经济指标的变动情况，反映施工管理水平的提高程度。"}, {"id": 824, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列施工成本分析的基本方法中，可用来分析各种因素对成本的影响程度的是（　　）。", "opts": ["比较法", "差额计算法", "比率法", "连环置换法"], "ans": [3], "exp": "因素分析法又称为连环置换法，可用来分析各种因素对成本的影响程度。"}, {"id": 825, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "在施工项目成本因素分析法中，应遵循的影响因素排序规则是（　　）。", "opts": ["先价值量，后实物量，先绝对值，后相对值", "先实物量，后价值量：先相对值，后绝对值", "先价值量，后实物量；先相对值，后绝对值", "先实物量，后价值量：先绝对值，后相对值"], "ans": [3], "exp": "因素分析法（连环置换法）分析各种因素对成本的影响程度。排序规则：先实物量，后价值量；先绝对值，后相对值。"}, {"id": 826, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "某商品混凝土目标成本与实际成本对比如下表，用因素分析法计算，单价的变动对成本的影响是（　　）元。", "opts": ["24720", "25647", "24960", "25896"], "ans": [3], "exp": "830×（1+4%）×（650-620）=25896元。"}, {"id": 827, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "通过将同类指标不同时期的数值进行对比，以分析该项指标的发展方向和发展速度，该成本分析方法是（　　）。", "opts": ["相关比率法", "构成比率法", "指标对比分析法", "动态比率法"], "ans": [3], "exp": "动态比率法是将同类指标不同时期的数值进行对比，求出比率，以分析该项指标的发展方向和发展速度。动态比率的计算，通常采用基期指数和环比指数两种方法。"}, {"id": 828, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "对施工项目进行综合成本分析时，可作为施工项目成本分析基础的是（　　）。", "opts": ["月度成本分析", "年度成本分析", "分部分项工程成本分析", "竣工成本综合分析"], "ans": [2], "exp": "分部分项工程成本分析是施工项目成本分析的基础。"}, {"id": 829, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列选项中，不属于单位工程竣工成本分析的是（　　）。", "opts": ["竣工成本分析", "分部分项工程成本分析", "主要技术节约措施及经济效果分析", "主要资源节超对比分析"], "ans": [1], "exp": "单位工程竣工成本分析，应包括以下三方面内容：①竣工成本分析；②主要资源节超对比分析；③主要技术节约措施及经济效果分析。"}, {"id": 830, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列施工成本管理绩效考核方法中，适用于需要定性化考核的企业，要求企业具有良好的团队文化、完善的考核指标体系以及较强的数据收集和分析能力，同时部门成员之间相互信任、尊重和共享的是（　　）。", "opts": ["360°反馈法", "PDCA管理循环法", "关键绩效指标", "目标管理法"], "ans": [0], "exp": "360°反馈法适用于需要定性化考核的企业，要求企业具有良好的团队文化、完善的考核指标体系以及较强的数据收集和分析能力，同时部门成员之间相互信任、尊重和共享。"}, {"id": 831, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "下列施工成本管理绩效考核方法中，适用于需要定量化考核且考核周期长的企业是（　　）。", "opts": ["关键绩效指标", "PDCA管理循环法", "平衡积分卡", "目标管理法"], "ans": [2], "exp": "平衡积分卡适用于需要定量化考核且考核周期长的企业，要求企业具有明确的成本管理目标、健全的成本管理流程、先进的成本管理水平，以及较强的数据收集和分析能力。"}, {"id": 832, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "对专业作业合同规定的承包范围和承包内容的执行情况进行考核，属于（　　）的考核内容。", "opts": ["企业的项目成本考核指标", "项目管理机构可控责任成本考核指标", "对各施工队的考核指标", "对各部门的考核指标"], "ans": [2], "exp": "对各施工队的考核内容：对专业作业合同规定的承包范围和承包内容的执行情况；专业作业合同以外的补充收费情况；对班组施工任务单的管理情况，以及班组完成施工任务后的考核情况。"}, {"id": 833, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "某施工项目的成本投标如下表所示，采用动态比率法进行成本分析时，第四季度的基期指数是（　　）。", "opts": ["110.73", "116.49", "107.88", "139.16"], "ans": [3], "exp": "第四季度的基期指数=（56.5/40.6）×100%=139.16%。"}, {"id": 834, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "对施工项目进行综合成本分析时，可作为分析基础的是（　　）。", "opts": ["月（季）度成本分析", "年度成本分析", "分部分项工程成本分析", "施工成本分析"], "ans": [2], "exp": "综合成本，是指涉及多种生产要素，并受多种因素影响的成本费用，如分部分项工程成本，月（季）度成本、年度成本等。分部分项工程成本分析是施工项目成本分析的基础。"}, {"id": 835, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "施工成本分析的依据中，对经济活动进行核算范围最广的是（　　）。", "opts": ["会计核算", "业务核算", "统计核算", "成本核算"], "ans": [1], "exp": "业务核算的范围比会计、统计核算要广。"}, {"id": 836, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "某分部工程商品混凝土消耗情况如下表，则由于混凝土消耗量增加导致的成本增加额为（　　）元。", "opts": ["8600", "9200", "9600", "18200"], "ans": [0], "exp": "由于混凝土消耗量增加导致的成本增加额＝（320－300）×430＝8600（元）。"}, {"id": 837, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "能够通过技术经济指标的对比，检查目标的完成情况，分析产生差异的原因，进而挖掘成本降低潜力的分析方法是（　　）。", "opts": ["因素分析法", "差额分析法", "比率法", "比较法"], "ans": [3], "exp": "比较法，又称“指标对比分析法”，是指对比技术经济指标，检查目标的完成情况，分析产生差异的原因，进而挖掘成本降低潜力的方法。"}, {"id": 838, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "某施工项目经理对商品混凝土的施工成本进行分析，发现其目标成本是44万元，实际成本是48万元，因此要分析产量、单价、损耗率等因素对混凝土成本的影响程度，最适宜采用的分析方法是（　　）。", "opts": ["比较法", "构成比率法", "因素分析法", "动态比率法"], "ans": [2], "exp": "施工成本分析的基本方法包括：比较法、因素分析法、差额计算法、比率法等。其中因素分析法又称连环置换法，可用来分析各种因素对成本的影响程度。在进行分析时，首先要假定众多因素中的一个因素发生了变化，而其他因素则不变，然后逐个替换，分别比较其计算结果，以确定各个因素的变化对成本的影响程度。"}, {"id": 839, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "single", "q": "在进行月（季）度成本分析时，如果存在“政策性”亏损，则应（　　）。", "opts": ["增加收入，弥补亏损", "降低标准，防止再超支", "暂停生产，等待政策调整", "控制支出，压缩超支额"], "ans": [3], "exp": "如果是属于规定的“政策性”亏损，则应从控制支出着手，把超支额压缩到最低限度。"}, {"id": 840, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "下列属于施工成本分析的内容的有（　　）。", "opts": ["人工费分析", "时间节点成本分析", "施工机械使用费分析", "组织单元成本分析", "单项指标成本分析"], "ans": [1, 3, 4], "exp": "成本分析的内容包括：时间节点成本分析；工作任务分解单元成本分析；组织单元成本分析；单项指标成本分析；综合项目成本分析。"}, {"id": 841, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "下列关于分部分项工程成本分析的说法，正确的有（　　）。", "opts": ["分部分项工程成本分析的对象为已完成分部分项工程", "必须对施工项目的每一个分部分项工程都进行成本分析", "分析的方法是：进行预算成本、目标成本和实际成本的“三算”对比", "预算成本来自施工预算，目标成本来自投标报价成本", "主要分部分项工程要做到从开工到竣工进行系统的成本分析"], "ans": [0, 2, 4], "exp": "B项错误，由于施工项目包括很多分部分项工程，无法也没有必要对每一个分部分项工程都进行成本分析。特别是一些工程量小、成本费用少的零星工程。但是，对于那些主要分部分项工程必须进行成本分析，而且要做到从开工到竣工进行系统的成本分析。D项错误，预算成本来自投标报价成本，目标成本来自施工预算，实际成本来自施工任务单的实际工程量、实耗人工和限额领料单的实耗材料。"}, {"id": 842, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "作为施工成本管理绩效考核方法，与其他方法相比，关键绩效指标（KPIs）的优点有（　　）。", "opts": ["明确管理焦点", "提高管理成效", "增强部门协作", "提高考核客观性", "考核成本较低"], "ans": [0, 1, 3], "exp": "关键绩效指标（KPIs）优点如下：①明确管理焦点；②提高管理成效；③提高考核客观性。缺点如下：①指标难界定且缺乏弹性；②适用范围有限；③实施困难。"}, {"id": 843, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "建设工程项目实施过程中或项目完成后，对施工成本管理绩效考核常用的方法有（　　）。", "opts": ["360°反馈法", "PDCA管理循环法", "平衡积分卡", "因素分析法", "目标管理法"], "ans": [0, 1, 2, 4], "exp": "施工成本管理绩效考核方法：①关键绩效指标；②360°反馈法；③PDCA管理循环法；④平衡积分卡；⑤目标管理法。"}, {"id": 844, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "企业对项目管理机构可控责任成本的考核内容应该包括（　　）。", "opts": ["施工项目成本计划的编制和落实情况", "项目成本目标和阶段成本目标完成情况", "施工成本目标（降低额）完成情况", "成本管理中贯彻责权利相结合原则的执行情况", "项目成本管理工作业绩的考核"], "ans": [0, 1, 3], "exp": "企业对项目管理机构可控责任成本的考核包括：①项目成本目标和阶段成本目标完成情况；②建立以项目经理为核心的成本管理责任制的落实情况；③成本计划的编制和落实情况；④对各部门、各施工队和班组责任成本的检查和考核情况；⑤在成本管理中贯彻责权利相结合原则的执行情况。"}, {"id": 845, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "目标管理法通过明确施工成本目标来指导项目管理机构和个人的行为和绩效。该方法存在的缺点有（　　）。", "opts": ["管理成效提高慢", "协调成本较高", "目标设定难度大", "考核成本较高", "过程管理缺乏"], "ans": [1, 2, 4], "exp": "目标管理法的缺点包括：①目标设定难度大且协调成本高；②缺乏过程管理。提高管理成效、考核成本较低是MBO的优点，选项A、D错误。"}, {"id": 846, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "施工成本分析可采用的基本方法有（　　）。", "opts": ["专家意见法", "比较法", "比率法", "因素分析法", "差额计算法"], "ans": [1, 2, 3, 4], "exp": "施工成本分析的基本方法包括比较法、因素分析法、差额计算法、比率法等。"}, {"id": 847, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "企业对项目管理机构可控责任成本的考核有（　　）。", "opts": ["项目成本目标和阶段成本目标完成情况", "建立以项目技术负责人为核心的成本管理责任制的落实情况", "成本计划的编制和落实情况", "对各部门、各施工队和班组责任成本的检查和考核情况", "在成本管理中贯彻责权利相结合原则的执行情况"], "ans": [0, 2, 3, 4], "exp": "企业对项目管理机构可控责任成本的考核包括：①项目成本目标和阶段成本目标完成情况；②建立以项目经理为核心的成本管理责任制的落实情况；③成本计划的编制和落实情况；④对各部门、各施工队和班组责任成本的检查和考核情况；⑤在成本管理中贯彻责权利相结合原则的执行情况。"}, {"id": 848, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "施工成本管理绩效考核方法有（　　）。", "opts": ["关键绩效指标", "360°反馈法", "PDCA管理循环法", "平衡积分卡", "会计核算法"], "ans": [0, 1, 2, 3], "exp": "施工成本管理绩效考核方法有关键绩效指标、360°反馈法、PDCA管理循环法、平衡积分卡、目标管理法。"}, {"id": 849, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "下列关于分部分项工程成本分析资料来源的说法，正确的是（　　）。", "opts": ["预算成本来自投标报价成本", "实际成本来自施工任务单的实际工程量、实耗人工和限额领料单的实耗材料", "投标报价成本来自预算成本", "目标成本来自施工预算", "成本偏差来自目标成本与预算成本的差额"], "ans": [0, 1, 3], "exp": "分部分项工程成本分析的资料来源为：预算成本来自投标报价成本，目标成本来自施工预算，实际成本来自施工任务单的实际工程量、实耗人工和限额领料单的实耗材料。"}, {"id": 850, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "进行成本项目分析时，材料费分析包括（　　）的分析。", "opts": ["主要材料费用", "辅助材料费用", "结构件费用", "周转材料使用费", "材料储备资金"], "ans": [0, 2, 3, 4], "exp": "材料费分析。材料费分析包括主要材料、结构件和周转材料使用费的分析以及材料储备的分析。"}, {"id": 851, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "施工企业结合平衡积分卡进行成本管理绩效考核时，可在财务绩效维度设置的考核指标有（    ）。", "opts": ["成本控制流程", "项目预算完成情况", "成本分析和预测能力", "成本控制率", "成本偏差和利润率"], "ans": [3, 4], "exp": "企业可以结合平衡积分卡的四个维度来设定适当的指标。①财务绩效指标。如成本控制率、成本偏差和利润率等，以评估企业在成本管理方面的财务效果。②客户满意度指标。如项目按预算完成情况和变更管理的效果等，以衡量客户对成本管理的满意程度。③内部流程效率指标。如成本核算流程的准确性、资源利用效率和成本控制流程的执行情况等。④学习与成长方面的指标。如成本分析和预测能力的发展、员工培训和知识管理等。"}, {"id": 852, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "原来的使用量是800m³，单价是75元，损耗率4%，实际使用量是830m³，单价是80元，损耗率3%，求价格变动导致成本增加（    ）。", "opts": ["2340元", "4316元", "-664元", "62400元"], "ans": [1], "exp": "830×（80-75）×（1+4%）=4316元。"}, {"id": 853, "source": "教材", "ch": 6, "year": null, "sourceLabel": "第6章", "type": "multi", "q": "采用360°反馈法考核施工成本管理绩效的优点有（    ）。", "opts": ["提高考核准确性", "促进个体发展", "降低考核成本", "量化考核指标", "增强部门间合作"], "ans": [0, 1, 4], "exp": "360°反馈法的优点如下：①提高考核准确性。②促进个体发展。③增强部门合作。360°反馈法的缺点如下：①考核时间和成本较高。②考核标准不明确。③存在负面影响"}, {"id": 854, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "物体打击事故危险源不包括（　　）。", "opts": ["高处物体坠落打击", "物体飞溅打击", "起重机械引起物体打击", "高处作业面层未设置挡脚板导致材料坠落打击"], "ans": [2], "exp": "物体打击不包括主体机械设备、车辆、起重机械、坍塌等引发的物体打击。"}, {"id": 855, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "以下不属于常见的危险源辨识与评价方法的是（　　）。", "opts": ["曲线比较法", "LEC评价法", "安全检查表法", "事故树分析法"], "ans": [0], "exp": "常见的危险源辨识与评价方法有：安全检查表法；预先危险性分析；危险与可操作性分析；事故树分析法；LEC评价法。"}, {"id": 856, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "LEC评价法中，E表明的是（　　）因素。", "opts": ["人员暴露于危险环境中的损伤程度", "人员暴露于危险环境中的频繁程度", "事故发生的可能性", "一旦发生事故可能造成的后果"], "ans": [1], "exp": "LEC评价法侧重于风险评价，该方法用与风险有关的三种因素指标值的乘积来评价操作人员伤亡风险的大小。这三种因素分别是L（Likelihood），事故发生的可能性）、E（Exposure），人员暴露于危险环境中的频繁程度）和C（Consequence），一旦发生事故可能造成的后果）。"}, {"id": 857, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "下列选项中，属于第一类危险源的是（　　）。", "opts": ["人的不安全行为", "物的不安全状态", "能量源", "环境不良"], "ans": [2], "exp": "能量源于第一类危险源。第一类危险源是指施工现场或施工生产过程中存在的，可能发生意外释放能量（机械能、电能、势能、化学能、热能等）的根源，包括施工现场或施工生产过程中各种能量或危险物质。"}, {"id": 858, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "预先识别、分析和评价工程项目、装置、设备潜在的危险，或通过监控找出工程项目、装置、设备运行过程或状态的变化，然后再继续分析造成偏差的原因、后果及可采取的方法，是属于危险源识别方法的（　　）方法。", "opts": ["预先危险性分析", "安全检查表法", "事故树分析法", "危险与可操作性分析"], "ans": [3], "exp": "危险与可操作性分析：该方法主要用于生产工艺流程分析，可借鉴用于施工生产危险源辨识和评价，其基本过程是以关键词为引导，预先识别、分析和评价工程项目、装置、设备潜在的危险，或通过监控找出工程项目、装置、设备运行过程或状态的变化（即偏差），然后再继续分析造成偏差的原因、后果及可采取对策的方法。"}, {"id": 859, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "根据危险源在事故发生发展中的作用，把危险源分为（　　）大类。", "opts": ["两", "三", "四", "五"], "ans": [0], "exp": "施工生产危险源是指施工现场及施工生产过程中危险的根源、可能导致危险事件发生的状态或行为，或两者的组合。危险源可分为第一类危险源和第二类危险源。"}, {"id": 860, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "下列风险控制方法中，适用于第一类风险源控制的是（　　）。", "opts": ["实施考核评价", "做好危险源控制管理基础工作", "消除能量源", "加强员工的安全意识教育"], "ans": [2], "exp": "第一类危险源是固有的能量或危险物质，主要采用技术手段加以控制，包括消除能量源、约束或限制能量（针对生产过程不能完全消除的能量源）、屏蔽隔离、防护等技术手段，同时应落实应急预案的保障措施。选项A、B、D属于第二类危险源控制方法。"}, {"id": 861, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "下列施工现场危险源中，属于第一类危险源的是（　　）。", "opts": ["存放汽油的区域缺乏必要隔离措施", "工人取用汽油操作不规范", "汽油储存设备老化", "现场存放大量汽油"], "ans": [3], "exp": "第一类危险源是指施工现场及施工生产过程中存在的，可能发生意外释放能量（机械能、电能、势能、化学能、热能等）的根源，包括施工现场及施工生产过程中各种能量或危险物质。"}, {"id": 862, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "第二类危险源是指造成约束、限制能量和危险物质措施失控的各种不安全因素。下列风险控制方法中，适用于第二类风险源控制的有（　　）。", "opts": ["建立健全危险源管理规章制度", "屏蔽隔离危险源", "消除能量源", "限制能量"], "ans": [0], "exp": "第二类危险源主要通过管理手段加以控制，消除人的不安全行为、物的不安全状态，规避环境不良（不安全条件），包括建立健全危险源管理规章制度，做好危险源控制管理基础工作，明确控制责任，加强安全教育，定期开展安全检查和隐患治理，实施考核评价和奖惩等。"}, {"id": 863, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "（　　）从一个可能的事故开始，自下而上、一层层地寻找顶事件的直接原因事件和间接原因事件，直到基本原因事件，并用逻辑图将这些事件之间的逻辑关系表达出来的分析方法。实际发生安全生产事故后，施工安全事故分析报告所归纳的事故直接原因、间接原因及根本原因同样有助于危险源识别和评价。", "opts": ["安全检查表法", "预先危险性分析", "危险与可操作性分析", "事故树分析"], "ans": [3], "exp": "事故树分析从一个可能的事故开始，自下而上、一层层地寻找顶事件的直接原因事件和间接原因事件，直到基本原因事件，并用逻辑图将这些事件之间的逻辑关系表达出来的分析方法。实际发生安全生产事故后，施工安全事故分析报告所归纳的事故直接原因、间接原因及根本原因同样有助于危险源识别和评价。"}, {"id": 864, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "海因里希最初提出的事故因果连锁过程包括的5个因素是（　　）。", "opts": ["人的缺点、人的不安全行为或物的不安全状态、能量意外释放、事故、伤害", "遗传及社会环境、人的缺点、屏蔽失效、事故、伤害", "人的缺点、管理缺陷、人的不安全行为或物的不安全状态、事故、伤害", "遗传及社会环境、人的缺点、人的不安全行为或物的不安全状态、事故、伤害"], "ans": [3], "exp": "海因里希最初提出的事故因果连锁过程包括5个因素：遗传及社会环境、人的缺点、人的不安全行为或物的不安全状态、事故、伤害。"}, {"id": 865, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "海因里希事故因果连锁论提出了（　　）是导致事故的直接原因这一论断。", "opts": ["遗传及社会环境", "人的缺点", "人的不安全行为，物的不安全状态，中断事故连锁的进程", "伤害"], "ans": [2], "exp": "海因里希事故因果连锁论提出了人的不安全行为和物的不安全状态是导致事故的直接原因这一论断，而安全管理工作的中心就是防止人的不安全行为，消除物的不安全状态，中断事故连锁的进程进而避免事故的发生。"}, {"id": 866, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "没有任何一种事物是绝对安全的这一观点的来源是（　　）。", "opts": ["因果连锁理论", "系统理论", "扰动起源理论", "能量意外释放理论"], "ans": [1], "exp": "系统理论中指出没有任何一种事物是绝对安全的，任何事物中都潜伏着危险因素。通常所说的安全或危险只不过是一种主观的判断。"}, {"id": 867, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "根据系统理论的观点，下列关于安全与危险的描述中，错误的是（　　）。", "opts": ["没有一种事物是绝对安全的", "危险是一种主观的判断", "可以根除一切危险源和危险", "安全工作的目标就是控制危险源，努力把事故发生概率降到最低"], "ans": [2], "exp": "不可能根除一切危险源和危险，可以减少来自现有危险源的危险性，应减少总的危险性而不是只消除几种选定的危险。"}, {"id": 868, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "能量意外释放理论认为，在一定条件下，某种形式的能量能否造成人员的伤害取决于能量大小、接触能量时间的长短和频率，以及（　　）。", "opts": ["人的健康状况", "生产能量的原因", "力的集中程度", "事故的类别"], "ans": [2], "exp": "在一定条件下某种形式的能量能否产生伤害造成人员伤亡事故，取决于能量大小、接触能量时间长短和频率以及力的集中程度。"}, {"id": 869, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "海因里希第一次提出了事故因果连锁理论，阐述了导致伤亡事故的各种因素间及与伤害间的关系，概括了事故连锁过程影响因素。下列不属于事故连锁过程影响因素的是（　　）。", "opts": ["遗传及社会环境", "管理制度不完善", "人的不安全行为或物的不安全状态", "人的缺点"], "ans": [1], "exp": "海因里希将事故连锁过程影响因素概括为5个：遗传及社会环境、人的缺点、人的不安全行为或物的不安全状态、事故、伤害。"}, {"id": 870, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "某施工企业承揽房屋建筑工程和市政公用工程，2024年度分别为5000万元和8000万元，该企业当时应提取的安生产费用是（    ）。", "opts": ["220", "270", "245", "310"], "ans": [1], "exp": "建设工程施工企业以建筑安装工程造价为依据，于月末按工程进度计算提取企业安全生产费用。提取标准为：①矿山工程3.5%；②铁路工程、房屋建筑工程、城市轨道交通工程3%；③水利水电工程、电力工程2.5%；④冶炼工程、机电安装工程、化工石油工程、通信工程2%；⑤市政公用工程、港口与航道工程、公路工程1.5%。5000×3%+8000×1.5%=270"}, {"id": 871, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "施工现场容易导致倾覆事故的危险源是（    ）。", "opts": ["高处作业", "悬空作业", "吊装作业", "爆破作业"], "ans": [2], "exp": "发生坍塌倾覆事故的主要危险部位和施工过程有：基坑作业、边坡作业、人工挖孔桩施工、脚手架/防护架搭拆、模板工程搭拆、拆除工程施工、挡土墙施工、物料提升机、塔式起重机、滑模、接料平台、移动操作台等。主要危险因素有：危险性较大的分部分项工程无专项施工方案，土方施工未按规定放坡和支护，基坑/桩孔及边坡护壁未按设计施工，地下水未及时抽取或无降水措施，流砂/泥未及时有效防治，脚手架搭设无设计计算书，起重、吊装、滑模等装置/设备未经验收擅自投入使用，脚手架/防护架架体与建筑物未按规定拉结，未设置剪刀墙，支模架未经设计验算，无足够的强度、刚度、稳定性，拆除工程施工无方案，未按规定顺序拆除，违规进入危险区域，危险区域未设置警示标志、防护措施等。"}, {"id": 872, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "在工程设计阶段对工程施工危险源进行分析评价，源于施工危险源辨识与风险评价方法中的（    ）分析方法。", "opts": ["安全检查表", "危险与可操作性", "初始危险", "事故树"], "ans": [2], "exp": "预先危险性分析也称初始危险分析，是指在每项生产活动之前，特别是在设计的开始阶段，对识别和评价对象存在的危险类别、出现条件、事故后果等进行概略分析，尽可能评价出潜在的危险性。"}, {"id": 873, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "基于事故频发倾向理论，预防安全事故的措施有（　　）。", "opts": ["制定应急预案", "人员选择", "消防演练", "全体人员安全培训", "人事调整"], "ans": [1, 4], "exp": "基于事故频发倾向理论，预防安全事故的措施有：①人员选择，即通过严格的生理、心理检验，选择身体、智力、性格特征及动作特征等方面优秀的人才就业；②人事调整，即把企业中的事故频发倾向者调整岗位或解雇。"}, {"id": 874, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "海因里希事故因果连锁论中，安全管理工作的中心是（　　）。", "opts": ["防止人的不安全行为", "人员选择", "中断事故连锁的进程", "消除物的不安全状态", "人事调整"], "ans": [0, 2, 3], "exp": "海因里希事故因果连锁论提出了人的不安全行为和物的不安全状态是导致事故的直接原因这一论断，而安全管理工作的中心就是防止人的不安全行为，消除物的不安全状态，中断事故连锁的进程进而避免事故的发生。"}, {"id": 875, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "能量意外释放理论同样认为，大多数伤亡事故都是由于能量或有害物质的意外释放所引起，这种意外释放都来源于（　　）。", "opts": ["环境", "物的不安全状态", "管理缺陷", "人的不安全行为", "环境不良"], "ans": [1, 3], "exp": "能量意外释放理论同样认为，大多数伤亡事故都是由于能量或有害物质的意外释放所引起，这种意外释放都来源于（人的不安全行为）或（物的不安全状态）。"}, {"id": 876, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "第二类危险源分类包括的有（　　）。", "opts": ["人的不安全行为", "物的不安全状态", "环境不良", "管理缺陷", "组织不良"], "ans": [0, 1, 2, 3], "exp": "第二类危险源是指导致能量或危险物质约束或限制措施破坏或失效，以及防范措施缺失或失效的因素。包括：物的不安全状态（危险状态）、人的不安全行为、环境不良（环境不安全条件）及管理缺陷等因素。"}, {"id": 877, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "某硫铁矿井下炸药库因防静电设施失效造成炸药发生爆炸，产生大量的一氧化碳、氮氧化物等有毒气体，并形成强大的冲击风流，造成作业人员多人中毒和伤亡。事后，该矿采取了相应的整改措施，下列措施中，符合能量意外释放理论措施的有（　　）。", "opts": ["扩大炸药库通风巷道的面积", "加大检查职工佩戴自救器频次", "降低炸药库存量", "巷道设置防爆水袋", "提高防静电设施标准"], "ans": [0, 2, 3, 4], "exp": "能量意外释放理论揭示了事故发生的物理本质，为人们设计及采取安全技术措施提供了理论依据，扩大炸药库通风巷道面积、降低炸药库存、设置防爆水袋、提高静电防护均属于能量控制手段。"}, {"id": 878, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "施工安全生产方针由（　　）发布。", "opts": ["企业主要负责人", "总包单位工程项目责任人", "建设单位最高管理者", "企业最高管理者"], "ans": [3], "exp": "施工安全生产方针由企业最高管理者发布。"}, {"id": 879, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "企业主要负责人是（　　）安全生产的第一责任人。", "opts": ["施工单位", "建设单位", "生产经营单位", "项目施工"], "ans": [2], "exp": "企业主要负责人是生产经营单位安全生产的第一责任人。"}, {"id": 880, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "（　　）是企业所有安全生产管理制度的核心。", "opts": ["全员安全生产责任制", "安全生产许可制度", "重大危险源管理制度", "安全生产检查制度"], "ans": [0], "exp": "全员安全生产责任制是企业所有安全生产管理制度的核心。"}, {"id": 881, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "建设单位应在合同中单独约定，并于工程开工日一个月内向承包单位支付至少（　　）企业安全生产费用。", "opts": ["50%", "60%", "70%", "40%"], "ans": [0], "exp": "建设单位应在合同中单独约定，并于工程开工日一个月内向承包单位支付至少50%企业安全生产费用。"}, {"id": 882, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "企业主要负责人和安全生产管理人员初次安全培训时间不得少于（　　）学时，每年再培训时间不得少于（　　）学时。", "opts": ["12，32", "12，24", "32，12", "32，24"], "ans": [2], "exp": "企业主要负责人和安全生产管理人员初次安全培训时间不得少于32学时，每年再培训时间不得少于12学时。"}, {"id": 883, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "企业新上岗的从业人员，岗前安全培训时间不得少于（　　）学时。", "opts": ["12", "36", "6", "24"], "ans": [3], "exp": "企业新上岗的从业人员，岗前安全培训时间不得少于24学时。"}, {"id": 884, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "特种作业操作证每（　　）年复审1次。", "opts": ["3", "6", "9", "1"], "ans": [0], "exp": "特种作业操作证每3年复审1次。"}, {"id": 885, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "下列属于专项施工方案内容的是（　　）。", "opts": ["施工总计划", "施工组织设计", "施工工艺", "施工流程"], "ans": [2], "exp": "专项施工方案（措施），内容应包括工程概况、编制依据、施工计划、施工工艺、施工安全技术措施、检查验收内容及标准、计算书及附图等。"}, {"id": 886, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "建设工程施工企业以建筑安装工程造价为依据，于月末按工程进度计算提取企业安全生产费用，以下关于提取标准说法正确的是（　　）。", "opts": ["矿山工程4.5%", "铁路工程、房屋建筑、城市轨道交通工程3%", "市政公用工程、港口与航道工程公路工程2.5%", "水利水电工程、电力工程3.5%"], "ans": [1], "exp": "建设工程施工企业以建筑安装工程造价为依据，于月末按工程进度计算提取企业安全生产费用。提取标准为：①矿山工程3.5%；②铁路工程、房屋建筑工程、城市轨道交通工程3%；③水利水电工程、电力工程2.5%；④冶炼工程、机电安装工程、化工石油工程、通信工程2%；⑤市政公用工程、港口与航道工程、公路工程1.5%。"}, {"id": 887, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "安全生产许可证的有效期为（　　）个月。", "opts": ["36", "12", "24", "48"], "ans": [0], "exp": "安全生产许可证的有效期为3年。"}, {"id": 888, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "安全生产许可证有效期满需要延期的，企业应当于期满前（　　）个月向原安全生产许可证颁发管理机关办理延期手续。", "opts": ["2", "1", "6", "3"], "ans": [3], "exp": "安全生产许可证有效期满需要延期的，企业应当于期满前3个月向原安全生产许可证颁发管理机关办理延期手续。"}, {"id": 889, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "下列不属于安全检查类型的是（　　）。", "opts": ["日常巡查", "专项检查", "专业性检查", "定期检查"], "ans": [2], "exp": "安全检查的类型应包括日常巡查、专项检查、季节性检查、定期检查、不定期抽查等。"}, {"id": 890, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "班前会议应由（　　）进行组织和主持。", "opts": ["班组长", "项目专职安全管理人员", "安全员", "责任工程师"], "ans": [0], "exp": "班前会议由班组长组织和主持。"}, {"id": 891, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "下列关于狭义本质安全内涵的说法，正确的是（　　）。", "opts": ["狭义的本质安全是指人的可靠性", "失误—安全功能要求设备发生故障时还能暂时维持正常运转", "本质安全目标很难达到", "故障－安全功能要求设备本身具有自动防止人的不安全行为的功能"], "ans": [2], "exp": "狭义的本质安全是指机器、设备和工艺本身的可靠性，选项A错误。失误—安全功能指设备、设施和技术工艺本身具有自动防止人的不安全行为的功能，选项B错误。本质安全是绝对安全的理想状态，实际运行中很难实现，选项C正确。故障－安全功能指设备、设施或技术工艺发生故障或损坏时，还能暂时维持正常工作或自动转变为安全状态，选项D错误。"}, {"id": 892, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "项目为避免建筑施工人员受到机械伤害，采取了一系列管控措施。下列措施中，属于人的本质安全化控制措施的是（　　）。", "opts": ["开展预先危险性分析", "落实安全风险分级管控和隐患排查治理双重预防机制", "严把设备、设施使用前的验收关", "做好安全培训和教育"], "ans": [3], "exp": "人的本质安全化控制措施：①建立个人健康档案，定期不定期开展心理测试、健康体检。②按照安全管理和企业规章制度要求，坚持持证上岗。③做好安全培训和教育。④开展安全文化建设，人人树立正确的安全理念，实现由“要我安全”到“我要安全”的观念转变。⑤通过安全培训教育和制度建设，提高员工安全法制观念和自主遵章守纪意识。⑥落实一线岗位人员“两单两卡”清单制度，具体是指企业一线岗位从业人员岗位风险清单、岗位职责清单和岗位操作卡、岗位应急处置卡。该制度旨在通过教育培训、日常管理、严格奖惩等方式，促使企业一线员工对自身岗位安全风险点、职责、规范操作及应急脱险处置等内容记得住、说得明、做得到。⑦动态监控员工心理、生理状况，及时调整工作岗位。"}, {"id": 893, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "从业人员在本单位内调整工作岗位或离岗（　　）年以上重新上岗时，应重新接受项目部和班组级的安全培训。", "opts": ["半", "一", "两", "三"], "ans": [1], "exp": "从业人员在本单位内调整工作岗位或离岗一年以上重新上岗时，应重新接受项目部和班组级的安全培训。"}, {"id": 894, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "党中央、国务院一直重视安全生产投入问题，国家有关主管部门制定印发了关于企业安全管理生产费用提取和使用管理办法，明确了安全生产费用提取，使用和监督管理等工作要求，履行的企业安全生产费用的管理原则是（　　）。", "opts": ["企业提取、政府监管、确保需要、规范使用", "筹措有章、支出有据、管理有序、监督有效", "政府指导、行业规范、足额提取、确保使用", "企业自提、专户核算、集中管理、统筹使用"], "ans": [1], "exp": "安全生产费用应按照“筹措有章、支出有据、管理有序、监督有效”的原则进行管理。"}, {"id": 895, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "三级安全教育是指企业、项目部级、班组三个层次的安全教育，是工人进场上岗前必备的过程。是一线作业人员管理非常重要的一环，切身关联到每个从业人员的人身安全。下列培训内容属于项目部级培训的是（　　）。", "opts": ["从业人员安全生产权利和义务", "安全设备设施、个人防护用品的使用和维护", "岗位安全操作规程", "岗位之间工作衔接配合的安全与职业卫生事项"], "ans": [1], "exp": "施工项目部级岗前安全培训内容应包括：①工作环境及危险因素；②所从事工种可能遭受的职业伤害和伤亡事故；③所从事工种的安全职责、操作技能及强制性标准；④自救互救、急救方法、疏散和现场紧急情况的处理；⑤安全设备设施、个人防护用品的使用和维护；⑥本项目安全生产状况及规章制度；⑦预防事故和职业危害的措施及应注意的安全事项；⑧有关事故案例；⑨其他需要培训的内容。"}, {"id": 896, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "某建筑施工企业制定了安全教育培训制度，明确了各级管理人员的安全培训要求，重点是提升员工的安全意识和能力。下列关于员工安全教育培训的说法，错误的是（　　）。", "opts": ["企业安全管理人员负责组织制定并实施本单位安全培训计划", "企业使用被派遣劳动者的，应将被派遣劳动者纳入本单位从业人员统一管理", "使用被派遣劳务人员，派遣公司应对其进行培训", "总经理王某初次安全培训时间不得少于32学时"], "ans": [0], "exp": "A选项错误，企业主要负责人负责组织制定并实施本单位安全培训计划。"}, {"id": 897, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "下列（　　）不属于施工项目安全生产会议。", "opts": ["定期安全生产例会", "不定期安全生产会议", "班前会议", "季节性安全生产会议"], "ans": [3], "exp": "施工项目安全生产会议包括定期安全生产例会和不定期安全生产会议、班前会议。"}, {"id": 898, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "安全风险等级从高到低划分为重大风险、较大风险、一般风险和低风险，其中重大风险的标示颜色是（　　）。", "opts": ["红", "橙", "黄", "蓝"], "ans": [0], "exp": "安全风险等级从高到低划分为重大风险、较大风险、一般风险和低风险，分别用红、橙、黄、蓝四种颜色标示。"}, {"id": 899, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "特种作业人员在特种作业操作证有效期内，严格遵守有关安全生产法律法规的，经原考核发证机关或者从业所在地考核发证机关同意，特种作业操作证的复审时间可以延长至每6年1次的要求是连续从事本工种（　　）。", "opts": ["3年以上", "5年以上", "6年以上", "10年以上"], "ans": [3], "exp": "特种作业人员在特种作业操作证有效期内，连续从事本工种10年以上，严格遵守有关安全生产法律法规的，经原考核发证机关或者从业所在地考核发证机关同意，特种作业操作证的复审时间可以延长至每6年一次。"}, {"id": 900, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "下列选项中，不属于事故隐患的整改情况的是（　　）。", "opts": ["定人", "定制度", "定时间", "定措施"], "ans": [1], "exp": "事故隐患的整改未做到“三定”（定人、定时间、定措施）。"}, {"id": 901, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "安全生产工作应当以人为本，坚持人民至上、生命至上，把保护人民生命安全摆在首位，树牢安全发展理念，坚持安全第一、预防为主、（　　）的方针，从源头上防范化解重大安全风险。", "opts": ["政府监管", "行业自律", "社会监督", "综合治理"], "ans": [3], "exp": "安全生产工作应当以人为本，坚持人民至上、生命至上，把保护人民生命安全摆在首位，树牢安全发展理念，坚持安全第一、预防为主、综合治理的方针，从源头上防范化解重大安全风险。"}, {"id": 902, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "本质安全中的（　　）功能是指当设备设施发生故障或损坏时，仍能暂时维持正常工作或自动转变为安全状态。", "opts": ["失误—安全", "行为—安全", "故障—安全", "控制—安全"], "ans": [2], "exp": "狭义的本质安全系统固有两项功能：①失误一安全功能；②故障—安全功能。指设备、设施或技术工艺发生故障或损坏时，还能暂时维持正常工作或自动转变为安全状态。"}, {"id": 903, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "关于施工中一般特种作业人员应具备条件的说法，正确的是（　　）。", "opts": ["年满16周岁，且不超过国家法定退休年龄", "必须为男性", "连续从事本工种10年以上", "具有初中及以上文化程度"], "ans": [3], "exp": "特种作业人员应符合下列条件：①年满18周岁，且不超过国家法定退休年龄；②经社区或者县级以上医疗机构体检健康合格，并无妨碍从事相应特种作业的器质性心脏病、癫痫病、美尼尔氏症、眩晕症、癔病、震颤麻痹症、精神病、痴呆症及其他疾病和生理缺陷；③具有初中及以上文化程度；④具备必要的安全技术知识与技能；⑤相应特种作业规定的其他条件。"}, {"id": 904, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "安全生产管理制度的核心是（　　）。", "opts": ["全员安全生产责任制", "安全生产许可证制度", "政府安全生产监督检查制度", "安全生产教育培训制度"], "ans": [0], "exp": "全员安全生产责任制是企业所有安全生产管理制度的核心，是企业最基本的安全管理制度，其他安全生产管理制度的建立、执行、修订完善，离不开各岗位相关责任的支持。"}, {"id": 905, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "（　　）是生产经营单位安全生产的第一责任人。", "opts": ["项目经理", "安全副经理", "企业主要负责人", "项目安全主管"], "ans": [2], "exp": "企业主要负责人是生产经营单位安全生产的第一责任人，工程项目负责人是项目施工安全第一责任人。"}, {"id": 906, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "根据《安全生产许可条例》，施工企业在安全生产许可证有效期内，严格遵守有关安全生产的法律法规，未发生死亡事故的，安全生产许可证（　　）。", "opts": ["有效期为6年B.有效期届满时经同意可以不再审查", "要求企业获得职业健康安全管理体系认证D.应在届满后3个月内办理延期手续"], "ans": [1], "exp": "企业在安全生产许可证有效期内，严格遵守有关安全生产的法律法规，未发生死亡事故的，安全生产许可证有效期届满时，经原安全生产许可证颁发管理机关同意，不再审查，安全生产许可证有效期延期3年。"}, {"id": 907, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "某化工企业聘请王某为安全总监，主抓企业安全生产工作，根据《安全生产法》的要求，下列属于王某应履行安全生产职责的是（　　）。", "opts": ["组织制定并实施公司安全生产规章制度", "建立、健全本公司安全生产责任制", "组织或者参与本公司应急救援演练", "组织制定公司安全生产教育和培训计划"], "ans": [2], "exp": "企业安全生产管理机构及安全生产管理人员的职责如下：（1）组织或者参与拟订本单位安全生产规章制度、操作规程和生产安全事故应急救援预案；（2）组织或者参与本单位安全生产教育和培训，如实记录安全生产教育和培训情况；（3）组织开展危险源辨识和评估，督促落实本单位重大危险源的安全管理措施；（4）组织或者参与本单位应急救援演练；（5）检查本单位的安全生产状况，及时排查生产安全事故隐患，提出改进安全生产管理的建议；（6）制止和纠正违章指挥、强令冒险作业、违反操作规程的行为；（7）督促落实本单位安全生产整改措施。"}, {"id": 908, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "建设单位应在合同中单独约定并于工程开工日一个月内向承包单位支付至少（　　）企业安全生产费用。", "opts": ["30%", "40%", "50%", "60%"], "ans": [2], "exp": "建设单位应在合同中单独约定并于工程开工日一个月内向承包单位支付至少50%企业安全生产费用。"}, {"id": 909, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "总包单位应在合同中单独约定并于分包工程开工日一个月内将至少（　　）企业安全生产费用直接支付分包单位并监督使用，分包单位不再重复提取。", "opts": ["30%", "40%", "50%", "60%"], "ans": [2], "exp": "总包单位应在合同中单独约定并于分包工程开工日一个月内将至少50%企业安全生产费用直接支付分包单位并监督使用，分包单位不再重复提取。"}, {"id": 910, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "房屋建筑工程提取企业安全生产费用的提取标准为（　　）。", "opts": ["1.5%", "2%", "2.5%", "3%"], "ans": [3], "exp": "建设工程施工企业以建筑安装工程造价为依据，于月末按工程进度计算提取企业安全生产费用。提取标准为：①矿山工程3.5%；②铁路工程、房屋建筑工程、城市轨道交通工程3%；③水利水电工程、电力工程2.5%；④冶炼工程、机电安装工程、化工石油工程、通信工程2%；⑤市政公用工程、港口与航道工程、公路工程1.5%。"}, {"id": 911, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "企业新上岗的从业人员，岗前安全培训时间不得少于（　　）学时。", "opts": ["6", "12", "24", "48"], "ans": [2], "exp": "施工企业其他从业人员，在上岗前必须经过企业、施工项目部、班组三级安全培训教育。企业应根据工作性质对其他从业人员进行安全培训，保证其具备本岗位安全操作、应急处置等知识和技能。企业新上岗的从业人员，岗前安全培训时间不得少于24学时。"}, {"id": 912, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "企业级岗前安全培训内容不包括（　　）。", "opts": ["本单位安全生产情况及安全生产基本知识", "本单位安全生产规章制度和劳动纪律", "从业人员安全生产权利和义务", "工作环境及危险因素"], "ans": [3], "exp": "企业级岗前安全培训内容应包括：①本单位安全生产情况及安全生产基本知识；②本单位安全生产规章制度和劳动纪律；③从业人员安全生产权利和义务；④有关事故案例等。"}, {"id": 913, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "班组级岗前安全培训内容不包括（　　）。", "opts": ["岗位安全操作规程", "岗位之间工作衔接配合的安全与职业卫生事项", "有关事故案例", "本项目安全生产状况及规章制度"], "ans": [3], "exp": "班组级岗前安全培训内容应包括：①岗位安全操作规程；②岗位之间工作衔接配合的安全与职业卫生事项；③有关事故案例；④其他需要培训的内容。从业人员在本单位内调整工作岗位或离岗一年以上重新上岗时，应重新接受项目部和班组级的安全培训。"}, {"id": 914, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "安全检查的常见缺陷有（　　）。", "opts": ["对重大事故隐患整改通知所列项目未按期整改和复查", "事故隐患的整改未做到“三定”", "未做好安全检查记录", "变换工种或采用新技术、新工艺、新设备、新材料施工时未进行安全教育", "未建立安全检查制度"], "ans": [0, 1, 2, 4], "exp": "安全检查常见缺陷：①未建立安全检查制度；②未做好安全检查记录；③事故隐患的整改未做到“三定”（定人、定时间、定措施）；④对重大事故隐患整改通知所列项目未按期整改和复查。"}, {"id": 915, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "以下属于施工作业人员安全生产职责的是（　　）。", "opts": ["履行施工安全事故报告义务", "正确佩戴和使用安全防护用具", "及时报告生产安全事故", "督促落实本单位安全生产整改措施", "接受安全生产教育培训的义务"], "ans": [0, 1, 4], "exp": "C选项属于企业主要负责人的职责；D选项属于安全生产管理机构及安全生产管理人员的职责。"}, {"id": 916, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "以下关于企业安全生产费用的提取，说法正确的是（　　）。", "opts": ["建设工程施工企业以建筑安装工程造价为依据，于月初按工程进度计算提取企业安全生产费用", "工程竣工决算后结余的企业安全生产费用，应退回建设单位。", "建设工程施工企业以建筑安装工程造价为依据，于月末按工程进度计算提取企业安全生产费用", "建设工程施工企业提取企业安全生产费用，提取标准为矿山工程3.5%", "建设工程施工企业提取企业安全生产费用，提取标准为电力工程3.5%"], "ans": [1, 2, 3], "exp": "A选项错误，应该于月末按工程进度计算提取企业安全生产费用；E选项错误，电力工程2.5%。"}, {"id": 917, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "建筑施工企业取得安全生产许可证，应具备下列安全生产条件（　　）。", "opts": ["依法参加工伤保险", "设置安全生产管理机构", "保证本单位安全生产条件所需资金的投入", "建立安全生产责任制", "有职业危害防治标准"], "ans": [0, 1, 2, 3], "exp": "建筑施工企业取得安全生产许可证，应具备下列安全生产条件：①建立、健全安全生产责任制，制定完备的安全生产规章制度和操作规程；②保证本单位安全生产条件所需资金的投入；③设置安全生产管理机构，按照国家有关规定配备专职安全生产管理人员；④主要负责人、项目负责人、专职安全生产管理人员经住房城乡建设主管部门或者其他有关部门考核合格；⑤特种作业人员经有关业务主管部门考核合格，取得特种作业操作资格证书；⑥管理人员和作业人员每年至少进行一次安全生产教育培训并考核合格；⑦依法参加工伤保险，依法为施工现场从事危险作业的人员办理意外伤害保险，为从业人员缴纳保险费；⑧施工现场的办公、生活区及作业场所和安全防护用具、机械设备、施工机具及配件符合有关安全生产法律法规、标准和规程的要求；⑨有职业危害防治措施，并为作业人员配备符合国家标准或者行业标准的安全防护用具和安全防护服装；⑩有对危险性较大的分部分项工程及施工现场易发生重大事故的部位、环节的预防、监控措施和应急预案；⑪生产安全事故应急救援预案、应急救援组织或者应急救援人员，配备必要的应急救援器材、设备；⑫法律法规规定的其他条件。"}, {"id": 918, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "安全教育及培训常见缺陷有（　　）。", "opts": ["未建立安全教育培训制度", "施工管理人员、专职安全员未按规定进行培训和考核", "现场管理人员未进行三级安全教育和考核", "未明确具体安全教育内容", "变换工种或采用新技术、新工艺、新设备、新材料施工时未进行安全教育"], "ans": [0, 1, 3, 4], "exp": "安全教育及培训常见缺陷：①未建立安全教育培训制度；②施工管理人员、专职安全员未按规定进行培训和考核；③现场施工人员未进行三级安全教育和考核；④未明确具体安全教育内容；⑤变换工种或采用新技术、新工艺、新设备、新材料施工时未进行安全教育。"}, {"id": 919, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "工程项目施工前，应组织编制施工组织设计、专项施工方案（措施），内容应包括（　　）。", "opts": ["施工总进度计划", "施工组织设计", "施工计划", "施工工艺", "计算书及附图"], "ans": [2, 3, 4], "exp": "工程项目施工前，应组织编制施工组织设计、专项施工方案（措施），内容应包括工程概况、编制依据、施工计划、施工工艺、施工安全技术措施、检查验收内容及标准、计算书及附图等，并应按规定进行审批、论证、交底、验收、检查。"}, {"id": 920, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "根据《安全生产管理条例》，下列建设工程活动中，属于特种作业人员的有（　　）。", "opts": ["起重信号工", "爆破作业人员", "卫生洁具安装作业", "垂直运输机械作业人员", "登高架设作业人员"], "ans": [0, 1, 3, 4], "exp": "《建设工程安全生产管理条例》规定，施工单位垂直运输机械作业人员、安装拆卸工、爆破作业人员、起重信号工、登高架设作业人员等特种作业人员，必须按照国家有关规定经过专门的安全作业培训，并取得特种作业操作资格证书后，方可上岗作业。"}, {"id": 921, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "施工现场劳动保护用品使用和管理的要求有（    ）。", "opts": ["劳动保护用品作为保障安全的预防性措施而不能替代工程防护设施", "用人单位使用的劳务派遣人员由派遣单位管理并配备劳动保护用品", "处于作业地点的外来人员应佩戴使用与作业者相同标准的劳动保护用品", "基层作业人员的劳动保护用品由本人自备且应符合相关标准要求", "用人单位应为接纳的实习人员配备符合标准的劳动保护用品"], "ans": [0, 2, 4], "exp": "B项错误，劳动保护用品的发放和管理，坚持“谁用工，谁负责”的原则。D项错误。施工作业人员所在企业（包括总承包企业、专业承包企业、劳务企业等）必须按国家规定免费发放劳动保护用品，更换已损坏或已到使用期限的劳动保护用品，不得收取或变相收取任何费用。"}, {"id": 922, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "multi", "q": "按照施工现场危险源公示、告知制度，应向从业人员告知的内容有（    ）。", "opts": ["场所存在的危险因素", "危险源名称", "危险出现的时段", "危险源涉及的危险因素", "工作岗位防范措施"], "ans": [0, 4], "exp": "坚持危险源公示、告知制度。危险源公示内容：危险源名称、出现的时段、涉及的危险因素、控制措施、责任部门和责任人。应向从业人员告知危险源及其防范措施。具体内容：作业场所和工作岗位存在的危险因素、防范措施、事故应急措施、危险岗位的操作规范/规程、违章操作的危害"}, {"id": 923, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "根据《建设工程安全生产管理条例》，某施工企业针对达到一定规模危险性较大的土方开挖工程编制专项施工方案，该施工方案应由（　　）签字后实施。", "opts": ["施工单位技术负责人、总监理工程师", "项目经理、总监理工程师", "项目技术负责人、总监理工程师", "项目经理、业主方项目负责人"], "ans": [0], "exp": "《建设工程安全生产管理条例》规定，对达到一定规模的危险性较大的分部分项工程，施工单位应编制专项施工方案，并附具安全验算结果，经施工单位技术负责人、总监理工程师签字后实施。"}, {"id": 924, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "为保证交叉施工作业安全，下层作业位置应处于上层作业的坠落半径之外。在高度为28m的楼层作业面施工时，其坠落半径为（　　）m。", "opts": ["3", "4", "5", "6"], "ans": [2], "exp": "当坠落物高度为15～30m时，R为5m。"}, {"id": 925, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "施工单位应在危险性较大的分部分项工程施工前，组织（　　）编制专项施工方案。", "opts": ["分包工长", "工程技术人员", "监理单位", "单位总工"], "ans": [1], "exp": "施工单位应在危险性较大的分部分项工程施工前，组织工程技术人员编制专项施工方案。"}, {"id": 926, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "专项施工方案应由（　　）审核签字、加盖单位公章，并由总监理工程师审查签字、加盖执业印章后方可实施。", "opts": ["施工单位技术负责人", "总包单位技术负责人", "建设单位技术负责人", "设计单位技术负责人"], "ans": [0], "exp": "专项施工方案应由施工单位技术负责人审核签字、加盖单位公章，并由总监理工程师审查签字、加盖执业印章后方可实施。"}, {"id": 927, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "危险性较大的分部分项工程实行分包并由分包单位编制专项施工方案的，专项施工方案应由（　　）共同审核签字并加盖单位公章。", "opts": ["总承包单位技术负责人及监理单位技术负责人", "建设单位技术负责人及分包单位技术负责人", "总承包单位技术负责人及分包单位技术负责人", "总承包单位技术负责人及建设单位技术负责人"], "ans": [2], "exp": "危险性较大的分部分项工程实行分包并由分包单位编制专项施工方案的，专项施工方案应由总承包单位技术负责人及分包单位技术负责人共同审核签字并加盖单位公章。"}, {"id": 928, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "关于安全帽的阻燃性能，续燃时间不应超过（　　）s，帽壳不得烧穿。", "opts": ["3", "4", "5", "6"], "ans": [2], "exp": "安全帽的阻燃性能，续燃时间不应超过5s，帽壳不得烧穿。"}, {"id": 929, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "施工安全技术交底，由（　　）向施工员、班组长、分包单位技术负责人交底。", "opts": ["企业技术负责人", "施工单位技术负责人", "项目技术负责人", "建设单位技术负责人"], "ans": [2], "exp": "施工安全技术交底，由项目技术负责人向施工员、班组长、分包单位技术负责人交底。"}, {"id": 930, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "易燃易爆危险品库房与在建工程的防火间距不应小于（　　）米。", "opts": ["10", "5", "15", "25"], "ans": [2], "exp": "易燃易爆危险品库房与在建工程的防火间距不应小于15m。"}, {"id": 931, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "可燃材料堆场及其加工场、固定动火作业场与在建工程的防火间距不应小于（　　）米", "opts": ["15", "10", "5", "20"], "ans": [1], "exp": "可燃材料堆场及其加工场、固定动火作业场与在建工程的防火间距不应小于10m。"}, {"id": 932, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "密目式安全立网的网目密度应为10cm×10cm，面积上大于或等于（　　）目。", "opts": ["2000", "2500", "3000", "1500"], "ans": [0], "exp": "密目式安全立网的网目密度应为10cm×10cm，面积上大于或等于2000目。"}, {"id": 933, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "操作平台使用中应每月不少于（　　）定期检查，应由专人进行日常维护工作，及时消除安全隐患。", "opts": ["2次", "3次", "1次", "4次"], "ans": [2], "exp": "操作平台使用中应每月不少于1次定期检查，应由专人进行日常维护工作，及时消除安全隐患。"}, {"id": 934, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "防护栏杆立杆间距不应大于（　　）米。", "opts": ["1.5", "1.2", "1", "2"], "ans": [3], "exp": "防护栏杆立杆间距不应大于2m。"}, {"id": 935, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "以下应当由专职安全生产管理人员进行现场监督的情况是（　　）。", "opts": ["土方开挖工程", "钢筋工程", "混凝土工程", "装饰装修工程"], "ans": [0], "exp": "由专职安全生产管理人员进行现场监督：①基坑支护与降水工程；②土方开挖工程；③模板工程；④起重吊装工程；⑤脚手架工程；⑥拆除、爆破工程；⑦国务院建设行政主管部门或者其他有关部门规定的其他危险性较大的工程。"}, {"id": 936, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "通常，将机械伤害预防（不包含机械本体安全技术可靠性）铁律归纳为“十二条”，其中不属于四必有的是（　　）。", "opts": ["有轴必有套", "有轮必有罩", "有台必有栏", "有障必不修"], "ans": [3], "exp": "通常，将机械伤害预防（不包含机械本体安全技术可靠性）铁律归纳为“十二条”。“四必有”：有轴必有套、有轮必有罩、有台必有栏、有洞必有盖。“四不修”：带电不修、带压不修、高温过冷不修、无专用工具不修。“四停用”：无联锁防护停用、无接地漏电保护停用、无岗前培训停用、无安全操作规程停用。"}, {"id": 937, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "临边作业防护栏杆应由横杆、立杆及挡脚板组成，防护栏杆应符合相关要求，下列说法正确的是（　　）。", "opts": ["上杆距地面高度应为1.1m", "防护栏杆立杆间距不应大于2.2m", "挡脚板高度不应小于16cm", "防护栏杆立杆底端应固定牢固"], "ans": [3], "exp": "A选项错误，上杆距地面高度应为1.2m。B选项错误，防护栏杆立杆间距不应大于2m。C选项错误，挡脚板高度不应小于18cm。"}, {"id": 938, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "下列工程的专项施工方案必须专家论证的是（　　）。", "opts": ["土方开挖工程", "起重吊装工程", "拆除、爆破工程", "地下暗挖工程"], "ans": [3], "exp": "深基坑、地下暗挖工程、高大模板工程的专项施工方案，施工单位还应当组织专家进行论证、审查。"}, {"id": 939, "source": "教材", "ch": 7, "year": null, "sourceLabel": "第7章", "type": "single", "q": "根据《建设工程安全生产管理条例》，施工单位对达到一定规模的危险性较大的分部分项工程编制专项施工方案，经施工单位技术负责人和（　　）签字后实施。", "opts": ["项目经理", "总监理工程师", "项目技术负责人", "建设单位项目负责人"], "ans": [1], "exp": "《建设工程安全生产管理条例》规定，对达到一定规模的危险性较大的分部分项工程，施工单位应编制专项施工方
