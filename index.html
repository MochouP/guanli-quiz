，实用性较差", "项目财务部门一般采用表格核算法", "会计核算法对工程项目内各岗位成本的责任核算比较适用", "会计核算法科学严密，覆盖面较大"], "ans": [0, 4], "exp": "A、B选项，表格核算法优点是简便易懂，方便操作，实用性较好；缺点是难以实现较为科学严密的审核制度，精度不高，覆盖面较小。C选项，项目财务部门一般采用会计核算法。D选项，因为表格核算具有操作简单和表格格式自由等特点，因而对工程项目内各岗位成本的责任核算比较实用。E选项，会计核算法优点是科学严密，人为控制的因素较小而且核算的覆盖面较大。"}, {"id": 1178, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "按施工成本构成要素分类，应计入企业管理费用的有（　　）。", "opts": ["固定资产使用费", "管理人员工资", "工具用具使用费", "材料采购及保管费", "教育规费"], "ans": [0, 1, 2], "exp": "企业管理费包括管理人员工资，办公费，差旅交通费，固定资产使用费，工具用具使用费，劳动保险和职工福利费，劳动保护费，检验试验费，工会经费，职工教育经费，财产保险费，财务费，税金，城市维护建设税，教育费附加，地方教育附加，其他。"}, {"id": 1179, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "关于项目施工总承包模式特点的说法，正确的有（　　）。", "opts": ["合同价不明确，不利于业主的投资控制", "业主选择承包方的招标及合同管理工作量小", "与平行发包模式相比，组织协调工作量大", "开工日期不可能太早，建设周期会较长", "工程质量在很大程度上取决于总承包方的管理水平和技术水平"], "ans": [1, 3, 4], "exp": "A选项错误，施工总承包模式下，在开工前就有较明确的合同价，有利于业主的总投资控制。B选项正确，业主只需要进行一次招标，与施工总承包单位签约，因此招标及合同管理工作量将会减小。C选项错误，由于业主只负责对施工总承包单位的管理及组织协调，其组织与协调的工作量比平行发包会大大减少，这对业主有利。D选项正确，由于一般要等施工图设计全部结束后，业主才进行施工总承包的招标，因此，开工日期不可能太早，建设周期会较长。E选项正确，建设工程项目质量的好坏在很大程度上取决于施工总承包单位的管理水平和技术水平。"}, {"id": 1180, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "关于施工总承包合同中费用控制条款的说法，正确的有（　　）。", "opts": ["发包人签发进度款支付证书，表明发包人已接受了承包人完成的相应工作", "承包人可以使用预付款修建临时工程、组织施工队进场", "发包人在收到预付款催告通知后7天内仍未支付的，承包人有权暂停施工", "发包人应在进度款支付证书签发后28天内完成支付", "发包人在工程款中逐期扣回预付款后，预付款担保额度应相应减少"], "ans": [1, 2, 4], "exp": "A选项，发包人签发进度款支付证书或临时进度款支付证书，不表明发包人已同意、批准或接受了承包人完成的相应部分的工作。B选项，预付款应当用于材料、工程设备、施工设备的采购及修建临时工程、组织施工队伍进场等。C选项，发包人逾期支付预付款超过7天的，承包人有权向发包人发出要求预付的催告通知，发包人收到通知后7天内仍未支付的，承包人有权暂停施工。D选项，除专用合同条款另有约定外，发包人应在进度款支付证书或临时进度款支付证书签发后14天内完成支付。E选项，发包人在工程款中逐期扣回预付款后，预付款担保额度应相应减少，但剩余的预付款担保金额不得低于未被扣回的预付款金额。"}, {"id": 1181, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "关于工作任务分工和管理职能分工的说法，正确的有（　　）。", "opts": ["管理职能是由管理过程的多个环节组成", "管理职能分工表既可用于项目管理，也可用于企业管理", "在项目实施的全过程中，应视具体情况对工作任务分工表进行调整", "项目各参与方应编制统一的工作任务分工表和管理职能分工表", "编制工作任务分工表前应对项目实施各阶段的具体管理工作进行详细分解"], "ans": [0, 1, 2, 4], "exp": "A选项，管理职能分工：管理是由多个环节组成的过程，即：①提出问题；②筹划；③决策；④执行；⑤检查。B选项，管理职能分工表是用表的形式反映项目管理班子内部项目经理、各工作部门和各工作岗位对各项工作任务的项目管理职能分工。管理职能分工表也可用于企业管理。C选项，在工作任务分工表中应明确各项工作任务由哪个工作部门（或个人）负责，由哪些工作部门（或个人）配合或参与。在项目的进展过程中，应视必要对工作任务分工表进行调整。D选项，业主方和项目各参与方，如设计单位、施工单位、供货单位和工程管理咨询单位等都有各自的项目管理的任务，上述各方都应该编制各自的项目管理任务分工表。E选项，为了编制项目管理任务分工表，首先应对项目实施各阶段的费用（投资或成本）控制、进度控制、质量控制、合同管理、信息管理和组织与协调等管理任务进行详细分解。"}, {"id": 1182, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "项目质量控制体系的运行环境包括（　　）。", "opts": ["项目的合同结构", "质量管理的人员配置", "质量管理的政府监督制度", "质量管理的物质资源配置", "质量管理的组织制度"], "ans": [0, 1, 3, 4], "exp": "项目质量控制体系的运行环境：①项目的合同结构；②质量管理的资源配置（质量管理的资源配置，包括专职的工程技术人员和质量管理人员的配置；实施技术管理和质量管理所必需的设备、设施、器具、软件等物质资源的配置。人员和资源的合理配置是质量控制体系得以运行的基础条件）；③质量管理的组织制度。"}, {"id": 1183, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "根据《建筑施工组织设计规范》，施工方案的主要内容包括（　　）。", "opts": ["工程概况", "施工方法及工艺要求", "施工部署", "施工现场平面布置", "施工准备与资源配置计划"], "ans": [0, 1, 4], "exp": "施工方案的主要内容包括：①工程概况；②施工安排；③施工进度计划；④施工准备与资源配置计划；⑤施工方法及工艺要求。"}, {"id": 1184, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "建设工程施工招标应当具备的条件有（　　）。", "opts": ["有编制招标文件和组织评标的能力", "招标人已经依法成立", "有相应资金或资金来源已经落实", "初步设计及概算应当履行审批手续的，已经批准", "有招标所需的设计图纸及技术资料"], "ans": [1, 2, 3, 4], "exp": "建设工程施工招标应该具备的条件包括：招标人已经依法成立；初步设计及概算应当履行审批手续的，已经批准；招标范围、招标方式和招标组织形式等应当履行核准手续的，已经核准；有相应资金或资金来源已经落实；有招标所需的设计图纸及技术资料。这些条件和要求，一方面是从法律上保证了项目和项目法人的合法化，另一方面，也从技术和经济上为项目的顺利实施提供了支持和保障。"}, {"id": 1185, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "对业主而言，成本加酬金合同的优点有（　　）。", "opts": ["可以通过分段施工缩短工期", "便于对工程计划进行合理安排", "可以减少承包商的对立情绪", "可以利用承包商的施工技术专家，帮助弥补设计中的不足", "通过确定最大保证价格约束工程成本不超限值"], "ans": [0, 2, 3, 4], "exp": "对业主而言，这种合同形式也有一定优点，如：①可以通过分段施工缩短工期，而不必等待所有施工图完成才开始招标和施工。②可以减少承包商的对立情绪，承包商对工程变更和不可预见条件的反应会比较积极和快捷。③可以利用承包商的施工技术专家，帮助改进或弥补设计中的不足。④业主可以根据自身力量和需要，较深入地介入和控制工程施工和管理。⑤也可以通过确定最大保证价格约束工程成本不超过某一限值，从而转移一部分风险。"}, {"id": 1186, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "关于施工成本偏差分析表达方法的说法，正确的有（　　）。", "opts": ["横道图法形象、直观，一目了然", "表格法反映的信息量大", "横道图法是最常用的一种方法", "表格法具有灵活、适用性强的优点", "曲线法能够直接用于定量分析"], "ans": [0, 1, 3], "exp": "A选项，横道图法具有形象、直观、一目了然等优点，但这种方法反映的信息量少，一般在项目的较高管理层应用。C选项，表格法是进行偏差分析最常用的一种方法。B、D选项，用表格法进行偏差分析具有如下优点：①灵活、适用性强；②信息量大；③表格处理可借助于计算机，从而节约大量数据处理所需的人力，并大大提高速度。E选项，曲线法不能够直接用于定量分析。"}, {"id": 1187, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "下列建设工程项目施工成本费用中，属于间接成本的有（　　）。", "opts": ["人工费", "管理人员工资", "办公费", "差旅交通费", "机械费"], "ans": [1, 2, 3], "exp": "间接成本是指准备施工、组织和管理施工生产的全部费用支出，是非直接用于也无法直接计入工程对象，但为进行工程施工所必须发生的费用，包括管理人员工资、办公费、差旅交通费等。"}, {"id": 1188, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "若承包商未按合同要求实施工程，关于业主向承包商索赔的说法，正确的有（　　）。", "opts": ["未按合同条件要求，无故不向分包人付款，业主无权进行索赔", "质量不满足要求，业主另找公司完成的，只可向承包商索赔成本", "工程进度太慢，要求承包商赶工时，可索赔业主方工程师的加班费", "合同工期已到而工程仍未完工，可索赔误期损害赔偿费", "未按合同要求办理保险，业主可前去办理并索赔相应的费用"], "ans": [2, 3, 4], "exp": "承包商未按合同要求实施工程发生下列损害业主权益或违约的情况时，业主可索赔费用和（或）利润：①工程进度太慢，要求承包商赶工时，可索赔工程师的加班费。②合同工期已到而工程仍未完工，可索赔误期损害赔偿费。③质量不满足合同要求，如不按照工程师的指示拆除不合格工程和材料，不进行返工或不按照工程师的指示在缺陷责任期内修复缺陷，则业主可找另一家公司完成此类工作，并向承包商索赔成本及利润。④质量不满足合同要求，工程被拒绝接收，在承包商自费修复后，业主可索赔重新检验费。⑤未按合同要求办理保险，业主可前去办理并扣除或索赔相应的费用。⑥由于合同变更或其他原因造成工程施工的性质、范围或进度计划等方面发生变化，承包商未按合同要求去及时办理保险，由此造成的损失或损害可向承包商索赔。⑦未按合同要求采取合理措施，造成运输道路、桥梁等的破坏。⑧未按合同条件要求，无故不向分包商付款。⑨严重违背合同（如工程进度一拖再拖，质量经常不合格等），工程师一再警告而没有明显改进时，业主可没收履约保函。"}, {"id": 1189, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "下列工程质量事故发生的原因中，属于技术原因的有（　　）。", "opts": ["检测设备管理不善造成仪器失准", "结构设计方案不正确", "检验检查制度不严密", "监理人员旁站检验不到位", "施工操作人员施工工艺错误"], "ans": [1, 4], "exp": "技术原因：指引发质量事故是由于在项目勘察、设计、施工中技术上的失误。例如，地质勘察过于疏略，对水文地质情况判断错误，致使地基基础设计采用不正确的方案；结构设计方案不正确，计算失误，构造设计不符合规范要求；施工管理及实际操作人员的技术素质差，采用了不合适的施工方法或施工工艺等。这些技术上的失误是造成质量事故的常见原因。A、C、D选项属于管理原因。"}, {"id": 1190, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "某双代号时标网络计划如下图（时间单位：天）所示，工作总时差正确的有（　　）。", "opts": ["TFA1=0", "TFA2=1", "TFA3=2", "TFC1=2", "TFB3=1"], "ans": [0, 1, 3, 4], "exp": "总时差的计算中，关键线路是A1¯B1¯B2¯C2¯C3，A1在关键线路上，总时差为0，A2在关键节点②和⑤之间，总时差为1天；A3本身自由时差是2天，后续工作总时差是1天，所以总时差是3天，C1工作紧后为关键工作，总时差是2天，B3的紧后是关键工作，总时差是1天。"}, {"id": 1191, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "某双代号网络计划如下图（时间单位：天）所示，其关键工作有（　　）。", "opts": ["工作3-5", "工作1-4", "工作5-9", "工作7-10", "工作8-11"], "ans": [0, 2], "exp": "经计算，总工期为15天，其关键线路为：①¯③¯⑤¯⑨¯⑩¯⑪。"}, {"id": 1192, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "项目风险评估工作包括（　　）。", "opts": ["确定各种风险的风险等级", "分析各种风险的损失量", "确定风险因素", "确定应对各种风险的对策", "分析各种风险因素的发生概率"], "ans": [0, 1, 4], "exp": "项目风险评估包括以下工作：①利用已有数据资料（主要是类似项目有关风险的历史资料）和相关专业方法分析各种风险因素发生的概率。②分析各种风险的损失量，包括可能发生的工期损失、费用损失，以及对工程的质量、功能和使用效果等方面的影响。③根据各种风险发生的概率和损失量，确定各种风险的风险量和风险等级。"}, {"id": 1193, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "关于合同分析及其作用的说法，正确的有（　　）。", "opts": ["合同分析要从合同执行的角度去分析", "合同分析往往由项目经理负责", "合同分析的目的之一是合同任务分解、落实", "分析合同中的漏洞，解释有争议的内容", "合同分析同招标文件分析的侧重点相同"], "ans": [0, 2, 3], "exp": "A选项，合同分析是从合同执行的角度去分析、补充和解释合同的具体内容和要求，将合同目标和合同规定落实到合同实施的具体问题和具体时间上，用以指导具体工作，使合同能符合日常工程管理的需要，使工程按合同要求实施，为合同执行和控制确定依据。B选项，合同分析往往由企业的合同管理部门或项目中的合同管理人员负责。C、D选项，合同分析的目的和作用体现在以下几个方面：①分析合同中的漏洞，解释有争议的内容；②分析合同风险，制定风险对策；③合同任务分解、落实。E选项，合同分析不同于招标投标过程中对招标文件的分析，其目的和侧重点都不同。"}, {"id": 1194, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "下列项目进度控制的措施中，与工程设计技术有关的措施有（　　）。", "opts": ["组织工程设计方案的评审与选用", "分析施工组织设计对进度的影响", "寻求设计变更加快施工进度的可能", "重视信息技术在进度控制中的应用", "改变施工机械设计，提高机械效率"], "ans": [0, 2, 4], "exp": "项目进度控制的技术措施：建设工程项目进度控制的技术措施涉及对实现进度目标有利的设计技术和施工技术的选用。不同的设计理念、设计技术路线、设计方案会对工程进度产生不同的影响，在设计工作的前期，特别是在设计方案评审和选用时，应对设计技术与工程进度的关系作分析比较。在工程进度受阻时，应分析是否存在设计技术的影响因素，为实现进度目标有无设计变更的可能性。施工方案对工程进度有直接的影响，在决策其是否选用时，不仅应分析技术的先进性和经济合理性，还应考虑其对进度的影响。在工程进度受阻时，应分析是否存在施工技术的影响因素，为实现进度目标有无改变施工技术、施工方法和施工机械的可能性。"}, {"id": 1195, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "对某模板工程进行抽样检查，发现在表面平整度、截面尺寸、平面水平度、垂直度和标高等方面存在质量问题。按照排列图法进行统计分析，上述质量问题累计频率依次为41％、79％、89％、98％和100％，需要进行重点管理的A类问题有（　　）。", "opts": ["平面水平度", "垂直度", "标高", "表面平整度", "截面尺寸"], "ans": [3, 4], "exp": "累计频率0～80％定为A类问题，即主要问题，进行重点管理；将累计频率在80%~90％区间的问题定为B类问题，即次要问题，作为次重点管理；将其余累计频率在90％～100％区间的问题定为C类问题，即一般问题，按照常规适当加强管理。"}, {"id": 1196, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "某单代号搭接网络计划如下图（时间单位：天）所示，其时间参数正确的有（　　）。", "opts": ["TFC=1", "FFB=2", "LSD=8", "LSE=5", "LFC=5"], "ans": [0, 2, 3, 4], "exp": "B选项错误，FFB=0。"}, {"id": 1197, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "关于安全技术交底要求的说法，正确的有（　　）。", "opts": ["必须采用新的安全技术措施", "必须实行逐级安全技术交底制度", "定期向多工种交叉施工作业队伍书面交底", "必须采用两阶段技术交底", "保留书面安全技术交底签字记录"], "ans": [1, 2, 4], "exp": "安全技术交底的要求：①项目经理部必须实行逐级安全技术交底制度，纵向延伸到班组全体作业人员。②技术交底必须具体、明确，针对性强。③技术交底的内容应针对分部分项工程施工中给作业人员带来的潜在危险因素和存在问题。④应优先采用新的安全技术措施。⑤对于涉及“四新”项目或技术含量高、技术难度大的单项技术设计，必须经过两阶段技术交底，即初步设计技术交底和实施性施工图技术设计交底。⑥应将工程概况、施工方法、施工程序、安全技术措施等向工长、班组长进行详细交底。⑦定期向由两个以上作业队和多工种进行交叉施工的作业队伍进行书面交底。⑧保持书面安全技术交底签字记录。"}, {"id": 1198, "source": "真题", "ch": null, "year": "2021", "sourceLabel": "2021年真题", "type": "multi", "q": "应当及时修订生产安全事故应急预案的情形有（　　）。", "opts": ["依据的上位预案中的有关规定发生重大变化", "编制人员构成发生重大变化", "重要应急资源发生重大变化", "面临的事故风险发生重大变化", "应急演练中发现问题需要修订"], "ans": [0, 2, 3, 4], "exp": "有下列情形之一的，应急预案应当及时修订并归档：①依据的法律、法规、规章、标准及上位预案中的有关规定发生重大变化的；②应急指挥机构及其职责发生调整的；③面临的事故风险发生重大变化的；④重要应急源发生重大变化的；⑤预案中的其他重要信息发生变化的；⑥在应急演练和事故应急救援中发现问题需要修订的；⑦编制单位认为应当修订的其他情况。"}, {"id": 1199, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "采用增加劳务分包队伍处理合同偏差，属于调整措施中的（　　）措施。", "opts": ["经济", "组织", "合同", "技术"], "ans": [1], "exp": "根据合同实施偏差分析的结果，承包商应该采取相应的调整措施，调整措施可以分为：①组织措施，如增加人员投入，调整人员安排，调整工作流程和工作计划等；②技术措施，如变更技术方案，采用新的高效率的施工方案等；③经济措施，如增加投入，采取经济激励措施等；④合同措施，如进行合同变更，签订附加协议，采取索赔手段等。"}, {"id": 1200, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "合理划分施工区段，属于施工生产要素质量控制中的（　　）质量控制内容。", "opts": ["施工人员", "工艺技术方案", "材料设备", "施工环境因素"], "ans": [1], "exp": "对施工工艺技术方案的质量控制主要包括以下内容：①深入正确地分析工程特征、技术关键及环境条件等资料，明确质量目标、验收标准、控制的重点和难点。②制定合理有效的有针对性的施工技术方案和组织方案，前者包括施工工艺、施工方法，后者包括施工区段划分、施工流向及劳动组织等。③合理选用施工机械设备和设置施工临时设施，合理布置施工总平面图和各阶段施工平面图。④根据施工工艺技术方案选用和设计保证质量和安全的模具、脚手架等施工设备；成批生产的混凝土预制构件模具应具有足够的强度、刚度和整体稳固性。⑤编制工程所采用的新材料、新技术、新工艺的专项技术方案和质量管理方案。⑥针对工程具体情况，分析气象、地质等环境因素对施工的影响，制订应对措施。"}, {"id": 1201, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "成本计划编制过程中，可按（　　）编制“时间-成本累积曲线”成本计划。", "opts": ["工程实施阶段", "成本组成", "项目结构", "工程量清单"], "ans": [0], "exp": "按工程实施阶段编制成本计划，可以按实施阶段，如基础、主体、安装、装修等或按月、季、年等实施进度进行编制。"}, {"id": 1202, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "建设工程项目总进度目标应在（　　）阶段确定。", "opts": ["设计准备", "设计", "动用前准备", "决策"], "ans": [3], "exp": "建设工程项目的总进度目标指的是整个工程项目的进度目标，它是在项目决策阶段项目定义时确定的，项目管理的主要任务是在项目的实施阶段对项目的目标进行控制。"}, {"id": 1203, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "工程施工合同履行中，可用来计算工期索赔时间的方法是（　　）。", "opts": ["动态比率法", "工期定额法", "挣值分析法", "比例分析法"], "ans": [3], "exp": "工期索赔的计算方法包括直接法、比例分析法和网络分析法。"}, {"id": 1204, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "由施工方自行确定的项目管理目标是（　　）。", "opts": ["环保", "安全", "质量", "成本"], "ans": [3], "exp": "施工总承包方或施工总承包管理方必须按工程合同规定的工期目标和质量目标完成建设任务。而施工总承包方或施工总承包管理方的成本目标是由施工企业根据其生产和经营的情况自行确定的。"}, {"id": 1205, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "下列组织工具中，采用双向箭线表达连接对象之间关系的是（　　）。", "opts": ["项目结构图", "合同结构图", "工作流程图", "组织结构图"], "ans": [1], "exp": "项目结构图采用直线表达连接对象之间的关系；工作流程图采用单向箭线表示工作之间的逻辑关系；组织结构图采用单向箭线表达连接对象之间的关系。"}, {"id": 1206, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "项目管理规划可分为项目管理规划大纲和（　　）。", "opts": ["实施规划", "决策规划", "规划策划", "配套策划"], "ans": [0], "exp": "项目管理规划应包括项目管理规划大纲和项目管理实施规划。"}, {"id": 1207, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "工程竣工验收合格后，应由（　　）及时提出工程竣工验收报告。", "opts": ["监理单位", "质量监督机构", "建设单位", "施工单位"], "ans": [2], "exp": "工程竣工验收合格后，建设单位应当及时提出工程竣工验收报告。"}, {"id": 1208, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "工程担保中，最重要且担保金额最大的是（　　）。", "opts": ["投标担保", "履约担保", "支付担保", "预付款担保"], "ans": [1], "exp": "履约担保是工程担保中最重要也是担保金额最大的工程担保。"}, {"id": 1209, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "建设工程项目决策阶段策划工作内容中，项目编码体系分析属于（　　）的工作内容。", "opts": ["组织策划", "管理策划", "合同策划", "技术策划"], "ans": [0], "exp": "建设工程项目决策阶段组织策划的主要工作内容包括：①决策期的组织结构；②决策期任务分工；③决策期管理职能分工；④决策期工作流程；⑤实施期组织总体方案；⑥项目编码体系分析。"}, {"id": 1210, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "按建筑安装工程费用构成要素划分，应计入企业管理费的是（　　）。", "opts": ["社会保险费", "住房公积金", "工伤保险费", "劳动保护费"], "ans": [3], "exp": "A、B、C选项属于规费的内容；D选项属于企业管理费。"}, {"id": 1211, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "关于因果分析图法的说法，正确的是（　　）。", "opts": ["因果分析图可以反映质量数据的分布特征", "通常采用Q", "可以定量分析影响质量的主次因素", "一张因果分析图可以分析多个质量问题"], "ans": [1], "exp": "因果分析图法应用时的注意事项包括：①一个质量特性或一个质量问题使用一张图分析；②通常采用QC小组活动的方式进行，集思广益，共同分析；③必要时可以邀请小组以外的有关人员参与，广泛听取意见；④分析时要充分发表意见，层层深入，排出所有可能的原因；⑤在充分分析的基础上，由各参与人员采用投票或其他方式，从中选择1～5项多数人达成共识的最主要原因。A选项属于直方图法的主要用途。"}, {"id": 1212, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "建设工程项目决策阶段的管理主体是（　　）。", "opts": ["投资方和设计方", "投资方和开发方", "开发方和设计方", "开发方和供货方"], "ans": [1], "exp": "决策阶段的管理主体是业主方，投资方和开发方均属于业主方。"}, {"id": 1213, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "下列各项进度计划中，不属于施工方进度计划的是（　　）。", "opts": ["施工准备工作计划", "施工总进度计划", "单位工程施工进度计划", "施工招标工作计划"], "ans": [3], "exp": "业主进行招投标，招标计划归于业主方。"}, {"id": 1214, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "某工程施工中发生一起质量事故，导致3人死亡，直接经济损失5000万元。该质量事故属于（　　）。", "opts": ["重大事故", "一般事故", "特别重大事故", "较大事故"], "ans": [0], "exp": "根据工程质量事故造成的人员伤亡或者直接经济损失，重大事故是指造成10人以上30人以下死亡，或者50人以上100人以下重伤，或者5000万元以上1亿元以下直接经济损失的事故。"}, {"id": 1215, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "建设工程中使用的施工设施属于工程项目质量影响因素中的（　　）因素。", "opts": ["材料", "环境", "机械", "方法"], "ans": [2], "exp": "项目质量的影响因素包括五个方面：“人、机、料、法、环”。机械主要是指施工机械和各类工器具，包括施工过程中使用的运输设备、吊装设备、操作工具、测量仪器、计量器具以及施工安全设施等。"}, {"id": 1216, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "设计单位项目负责人应参加验收的是（　　）分部工程。", "opts": ["防水", "装饰装修", "设备安装", "节能"], "ans": [3], "exp": "设计单位项目负责人应参加地基与基础、主体结构、节能分部工程验收。"}, {"id": 1217, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "成本管理过程中，检验成本计划是否实现的环节是（　　）。", "opts": ["成本控制", "成本核算", "成本考核", "成本分析"], "ans": [1], "exp": "成本核算是对成本计划是否实现的最后检验。"}, {"id": 1218, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "修一条堤坝的护坡时，一定要等土堤自然沉降完成后开始。用单代号搭接网络计划表达堤坝填筑和堤坝护坡的逻辑关系时，应采用的搭接关系是（　　）。", "opts": ["完成到完成（FTF）", "开始到开始（STS）", "开始到完成（STF）", "完成到开始（FTS）"], "ans": [3], "exp": "单代号搭接网络图中，箭线及其上面的时距符号表示相邻工作间的逻辑关系。FTSi，j-工作i完成时间与其紧后工作j开始时间的时间间距。"}, {"id": 1219, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "项目总负责单位建立项目质量控制体系的第一步工作是（　　）。", "opts": ["建立系统质量控制网络", "建立质量控制制度", "分析质量控制界面", "编制质量控制计划"], "ans": [0], "exp": "质量控制体系建立的程序包括：①建立系统质量控制网络（明确质量控制负责人）；②制定质量控制制度；③分析质量控制界面；④编制质量控制计划。"}, {"id": 1220, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "设备管理预警属于安全生产管理预警体系要素中（　　）的内容。", "opts": ["外部环境预警系统", "预警信息管理系统", "事故预警系统", "内部管理不良预警系统"], "ans": [3], "exp": "内部管理不良预警系统包括：①质量管理预警；②设备管理预警；④人的行为活动管理预警。"}, {"id": 1221, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "项目风险管理工作包括：①风险应对；②风险评估；③风险识别；④风险监控。正确的工作流程是（　　）。", "opts": ["③②④①", "②③④①", "①③②④", "③②①④"], "ans": [3], "exp": "风险管理过程包括项目实施全过程的项目风险识别、项目风险评估、项目风险应对和项目风险监控。"}, {"id": 1222, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "根据《建筑施工场界环境噪声排放标准》，建筑施工机械在昼间和夜间的噪声排放限值分别为（　　）dB（A）。", "opts": ["70和55", "75和55", "70和60", "80和55"], "ans": [0], "exp": "建筑施工机械在昼间和夜间的噪声排放限值分别为70dB（A）和55dB（A）。"}, {"id": 1223, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "计算一般性的项目规划和可行性研究、工程设计和施工监理服务费用时，最常用的费用计算方法是（　　）。", "opts": ["人月费单价法", "按日计费法", "按实计量法", "工程建设费用百分比法"], "ans": [0], "exp": "人月费单价法是咨询服务中最常用、最基本的以服务时间为基础的计费方法。"}, {"id": 1224, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "建筑施工企业因暂时生产经营困难无法按劳动合同约定的日期支付工资的，应当向劳动者说明情况，并经与工会或职工代表协商一致后，可以延期支付工资，但最长不得超过（　　）日。", "opts": ["7", "14", "21", "30"], "ans": [3], "exp": "建筑施工企业因暂时生产经营困难无法按劳动合同约定的日期支付工资的，应当向劳动者说明情况，并经与工会或职工代表协商一致后，可以延期支付工资，但最长不得超过30日。"}, {"id": 1225, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "施工成本过程控制中，控制人工费通常采用的方法是（　　）。", "opts": ["弹性管理", "量价分离", "指标包干", "计量控制"], "ans": [1], "exp": "人工费的控制实行“量价分离”的方法，将作业用工及零星用工按定额工日的一定比例综合确定用工数量与单价，通过劳务合同进行控制。"}, {"id": 1226, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "某工程网络计划中，工作M的持续时间是1天，最早第4天开始。工作M的两个紧后工作的最迟开始时间分别为第7天和第9天，工作M的总时差是（　　）天。", "opts": ["2", "1", "3", "5"], "ans": [0], "exp": "工作M的最早完成时间=最早开始+持续时间=4+1=5（天）。工作M的最迟完成=紧后工作最迟开始的最小值，取值为7。总时差=最迟完成-最早完成=7-5=2（天）。"}, {"id": 1227, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "施工项目投标保证金有效期应当与（　　）一致。", "opts": ["投标截止日期", "投标有效期", "中标通知书发出日期", "评标报告提交日期"], "ans": [1], "exp": "根据《中华人民共和国招标投标法实施条例》，投标保证金有效期应当与投标有效期一致。"}, {"id": 1228, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "某工程网络计划中，工作N的持续时间是1天，最早第14天上班时刻开始，工作N的三个紧前工作A、B、C最早完成时间分别是第9天、第11天、第13天下班时刻，则工作B与工作N的时间间隔是（　　）天。", "opts": ["0", "2", "1", "4"], "ans": [1], "exp": "工作B最早完成时间是第11天下班时刻，即第12天上班时刻。又因工作N最早第14天上班时刻开始，故工作B与工作N的时间间隔=14-12=2（天）。"}, {"id": 1229, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "下列施工质量控制活动中，属于事中控制的是（　　）。", "opts": ["设置质量管理点", "质量活动结果评价", "工序质量检查", "编制施工质量报告"], "ans": [2], "exp": "A、D选项属于事前质量控制；B选项属于事后质量控制。"}, {"id": 1230, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "某建筑材料采购合同约定由运输部门送货，其相应的交货日期应约定为（　　）。", "opts": ["采购方收货戳记的日期", "供货方通知的提货日期", "供货方向承运单位提出运输申请的日期", "供货方交货时承运单位签发的日期"], "ans": [3], "exp": "交货日期的确定可以按照下列方式：①供货方负责送货的，以采购方收货戳记的日期为准；②采购方提货的，以供货方按合同规定通知的提货日期为准；③凡委托运输部门或单位运输、送货或代运的产品，一般以供货方发运产品时承运单位签发的日期为准，不是以向承运单位提出申请的日期为准。"}, {"id": 1231, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "某建设工程项目施工任务采用施工总承包模式，对各个分包单位的工程款项，应由（　　）负责支付。", "opts": ["施工总承包单位", "施工总承包管理单位", "业主方", "业主委托的第三方机构"], "ans": [0], "exp": "当采用施工总承包模式时，对各个分包单位的工程款项，一般由施工总承包单位负责支付。"}, {"id": 1232, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "某拆除工程施工中发生倒塌事故，造成70人重伤、6人死亡。根据《生产安全事故报告和调查处理条例》，该事故属于（　　）。", "opts": ["一般事故", "较大事故", "重大事故", "特别重大事故"], "ans": [2], "exp": "根据《生产安全事故报告和调查处理条例》，重大事故是指造成10人以上30人以下死亡，或者50人以上100人以下重伤，或者5000万元以上1亿元以下直接经济损失的事故。"}, {"id": 1233, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "工程项目部的工作人员在施工作业前，必须对所用的机械设备和工具进行仔细检查，发现问题立即上报。这种检查工作被称为（　　）。", "opts": ["全面安全检查", "专业人员安全检查", "要害部门重点安全检查", "经常性安全检查"], "ans": [3], "exp": "工程项目和班组应开展经常性安全检查，及时排除事故隐患。工作人员必须在工作前，对所用的机械设备和工具进行仔细的检查，发现问题立即上报。下班前，还必须进行班后检查，做好设备的维修保养和清整场地等工作，保证交接安全。"}, {"id": 1234, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "施工质量事故的处理工作包括：①事故调查；②事故的原因分析；③事故处理；④事故处理的鉴定验收；⑤制定事故处理的技术方案。正确的工作程序是（　　）。", "opts": ["①②⑤③④", "①②③④⑤", "①②⑤④③", "②①③④⑤"], "ans": [0], "exp": "施工质量事故处理的一般程序是：事故报告→事故调查→事故的原因分析→制定事故处理的技术方案→事故处理→事故处理的鉴定验收→提交事故处理报告。"}, {"id": 1235, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "施工企业为落实质量管理工作而建立的各项管理标准，属于质量管理体系文件中的（　　）范畴。", "opts": ["质量手册", "质量计划", "质量记录", "程序文件"], "ans": [3], "exp": "企业为落实质量管理工作而建立的各项管理标准、规章制度均属于程序文件范畴。"}, {"id": 1236, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "在FIDIC施工合同条件下，合同双方在收到争端裁决决定后（　　）天内均未提出异议的，则该决定即为最终决定。", "opts": ["28", "14", "21", "42"], "ans": [0], "exp": "当发生合同争议时，由该委员会对其争议作出决定。合同双方在收到决定后28天内，均未提出异议，则该决定即是最终的，对双方均具有约束力。"}, {"id": 1237, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "职业健康安全管理体系与环境管理体系运行中，由组织的最高管理者对管理体系进行系统评价属于（　　）工作。", "opts": ["管理评审", "内部审核", "外部审核", "合规性评价"], "ans": [0], "exp": "管理评审是由组织的最高管理者对管理体系的系统评价。"}, {"id": 1238, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "根据《中华人民共和国建筑法》，下列保险种类中，由建筑施工企业自主决定为从事危险作业的职工投保的是（　　）。", "opts": ["意外伤害险", "工伤保险", "基本医疗保险", "失业保险"], "ans": [0], "exp": "为从事危险作业的职工投保意外伤害险并非强制性规定，是否投保意外伤害险由建筑施工企业自主决定。B、C、D选项均属于法定的强制性保险。"}, {"id": 1239, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "下列成本管理措施中，属于合同措施的是（　　）。", "opts": ["编制科学合理的成本计划", "在项目实施过程中寻找索赔机会", "对成本管理目标进行风险分析", "对不同的技术方案进行比选"], "ans": [1], "exp": "A选项属于组织措施；C选项属于经济措施；D选项属于技术措施。"}, {"id": 1240, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "根据《建筑施工组织设计规范》，单位工程施工组织设计应由（　　）审批。", "opts": ["施工项目负责人", "总承包单位负责人", "施工单位技术负责人", "施工项目技术负责人"], "ans": [2], "exp": "单位工程施工组织设计应由施工单位技术负责人或技术负责人授权的技术人员审批。"}, {"id": 1241, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "下列工作中，属于工程监理单位施工质量控制任务的是（　　）。", "opts": ["核查施工进度计划的调整", "核对工程形象进度", "参加项目应急预案演练", "验收隐蔽工程"], "ans": [3], "exp": "A、B选项属于工程监理单位施工阶段进度控制内容；C选项属于工程监理单位施工阶段安全生产管理任务。"}, {"id": 1242, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "发包人负责采购的铝合金窗，运到工地与承包人共同清点验收后存入承包人仓库。安装完毕后，监理人检查发现铝合金窗存在质量问题，要求承包人拆除。处理此质量事故的正确做法是（　　）。", "opts": ["所需费用和（或）延误工期由发包人承担", "所需费用和（或）延误工期由承包人承担", "所需费用给予补偿，延误工期由承包人承担", "延误工期给予顺延，所需费用由承包人承担"], "ans": [0], "exp": "发包人提供的材料和工程设备的规格、数量或质量不符合合同要求，发包人应承担由此增加的费用和（或）工期延误，并向承包人支付合理利润。"}, {"id": 1243, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "关于政府质量监督机构和监督人员的说法，正确的是（　　）。", "opts": ["质量监督机构应有固定的工作场所和满足监督检查所需的仪器、设备和工具", "质量监督人员应占质量监督机构总人数的70％以上", "质量监督人员具有一年以上工程质量管理或者设计、施工、监理等工作经历", "质量监督机构经建设行政主管部门授权后即实施质量监督"], "ans": [0], "exp": "B选项错误，质量监督人员应当占质量监督机构总人数的75％以上。C选项错误，质量监督人员具有三年以上工程质量管理或者设计、施工、监理等工作经历。D选项错误，质量监督人员符合条件经考核合格后，方可从事工程质量监督工作。"}, {"id": 1244, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "成本分析的工作内容包括：①收集成本信息；②选择成本分析方法；③进行成本数据处理；④分析成本形成原因；⑤确定成本结果。正确的成本分析步骤是（　　）。", "opts": ["①②④③⑤", "①②⑤③④", "②①③④⑤", "②①④⑤③"], "ans": [2], "exp": "成本分析方法应遵循下列步骤：①选择成本分析方法；②收集成本信息；③进行成本数据处理；④分析成本形成原因；⑤确定成本结果。"}, {"id": 1245, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "某分部工程计划工程量5000m³，计划成本500元/m³。某检查时点实际完成工程量4500m³，实际成本520元/m³。用赢得值法分析该分部工程在检查时点的施工成本偏差是（　　）万元。", "opts": ["-10", "-9", "-16", "-35"], "ans": [1], "exp": "费用偏差=已完工作预算费用-已完工作实际费用=4500×500-4500×520=-9（万元）。"}, {"id": 1246, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "关于成本计划的说法，正确的是（　　）。", "opts": ["成本计划是目标成本的一种形式", "成本计划由建设单位或项目监理机构编制", "成本计划是成本决策的前提", "成本计划编制应贯穿于项目实施全过程"], "ans": [0], "exp": "B选项错误，项目成本计划一般由施工单位编制。C选项错误，成本预测是成本决策的前提，成本计划是成本决策所确定目标的具体化。D选项错误，成本控制贯穿于项目实施全过程。"}, {"id": 1247, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "下列职业健康安全与环境管理体系文件中，以体系标准中管理要素为对象编写的文件是（　　）。", "opts": ["作业指导书", "质量手册", "内部审核计划", "记录表格"], "ans": [3], "exp": "程序文件要针对需要编制程序文件体系的管理要素。程序文件的内容可按“4W1H”的顺序和内容来编写，即明确程序中管理要素由谁做（who），什么时间做when），在什么地点做（where），做什么（what），怎么做（how）。程序文件的一般格式可按照目的和适用范围、引用的标准及文件、术语和定义、职责、工作程序、报告和记录的格式以及相关文件等的顺序来编写。"}, {"id": 1248, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "某工程双代号网络图如下图所示，图中存在的错误是（　　）。", "opts": ["节点编号混乱", "存在逆向箭线", "存在多余的虚箭线", "存在多个终点节点"], "ans": [2], "exp": "⑥→⑦是多余的虚工作。"}, {"id": 1249, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "某项目发生职工触电事故后，工程项目部在组织安全用电培训的同时，对现场配电箱进行防护改造，设置漏电开关。此项工作遵循了安全事故隐患治理的（　　）原则。", "opts": ["重点治理", "冗余安全度治理", "综合治理", "动态治理"], "ans": [2], "exp": "从人机料法环五个角度去出发属于单项隐患综合治理原则。"}, {"id": 1250, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "某项目由于电梯设备采购延误导致总体工程进度延误，项目经理部研究决定调整项目采购负责人，该纠偏措施属于项目目标控制的（　　）。", "opts": ["组织措施", "合同措施", "经济措施", "技术措施"], "ans": [0], "exp": "调整人员安排属于组织措施内容。"}, {"id": 1251, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "关于生产安全事故应急预案管理的说法，正确的是（　　）。", "opts": ["生产经营单位应每半年至少组织1次现场处置方案演练", "生产经营单位的安全生产管理专家可参加本单位应急预案评审", "应急预案应报同级人民政府和上一级安全生产监督管理部门备案", "生产经营单位应每年至少组织2次综合应急预案演练或者专项应急预案演练"], "ans": [0], "exp": "B选项错误，有利害关系的专家应当回避。C选项错误，应急预案应报同级人民政府备案抄送上一级人民政府应急管理部门。D选项错误，生产经营单位应每年至少组织1次综合应急预案演练或者专项应急预案演练。"}, {"id": 1252, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "下列延误工期的情形中，承包人不能提出工期索赔的是（　　）。", "opts": ["开工前业主未能及时交付合格施工场地", "季节性雨天导致连续三天不能施工", "因地震原因造成暂时停工", "监理人指令有误导致工程延误"], "ans": [1], "exp": "季节性的雨季属于一个合格的承包商应当能够预见的，所以不能索赔。"}, {"id": 1253, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "下列建设工程项目进度控制措施中，属于组织措施的是（　　）。", "opts": ["分析施工方案对工程进度的影响", "编制相应的资源需求计划", "进度控制会议的组织设计", "对比分析工程物资采购模式"], "ans": [2], "exp": "A选项属于技术措施；B选项属于经济措施；D选项属于管理措施。"}, {"id": 1254, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "采用单价合同时，最终工程结算总价是按（　　）计算确定的。", "opts": ["发包人提供的清单工程量及承包人所填报的单价", "发包人提供的清单工程量及承包人实际发生的单价", "实际完成并经（咨询）工程师计量的工程量及承包人实际发生的单价", "实际完成并经（咨询）工程师计量的工程量及承包人所填报的单价"], "ans": [3], "exp": "单价合同单价优先，即实际发生的工程量乘以合同的单价。"}, {"id": 1255, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "某工程双代号时标网络计划（时间：天）如下图所示，图中表达的正确信息是（　　）。", "opts": ["工作A的总时差和自由时差不同", "工作C为关键工作", "工作E为关键工作", "工作D的总时差为零"], "ans": [2], "exp": "A选项错误，工作A的总时差和自由时差相同。B选项错误，工作C的总时差为1，不是关键工作。D选项错误，工作D的总时差为1。"}, {"id": 1256, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "在工程竣工验收时，政府质量监督机构的监督重点是（　　）。", "opts": ["核验参与竣工验收人员的资格", "检查执行工程建设强制性标准的情况", "监督检查质量问题的整改情况", "监督竣工验收的程序及验收过程"], "ans": [3], "exp": "在竣工阶段，监督机构主要是按规定对工程竣工验收工作进行监督：①竣工验收前，针对在质量监督检查中提出的质量问题进行复查，检查其是否按要求整改完毕；②竣工验收时，参加竣工验收的会议，对验收的程序及验收的过程进行监督。"}, {"id": 1257, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "某生产经营单位生产规模小、危险因素小，编写应急预案的正确做法是（　　）。", "opts": ["可以合并编写综合应急预案和专项应急预案", "仅编写现场处置方案", "仅编写专项应急预案", "不需要编写综合应急预案"], "ans": [0], "exp": "生产规模小、危险因素小，可以合并编写综合应急预案和专项应急预案。"}, {"id": 1258, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "关于施工场界内污染防治的说法，正确的是（　　）。", "opts": ["属于环境保护问题", "既属于环境保护问题，也属于职业健康安全问题", "属于对周围环境污染防治的一部分", "属于职业健康安全问题"], "ans": [3], "exp": "场界内的属于职业健康安全问题，场界外的属于环境保护问题。"}, {"id": 1259, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "根据《建设工程监理合同（示范文本）》，关于监理人职责的说法，正确的是（　　）。", "opts": ["当委托人与承包人之间发生合同争议时，监理人应不参与争议处理", "当委托人与承包人之间的合同争议提交仲裁机构仲裁时，监理人应提交必要的证明资料", "监理人可以遵循公平合理原则，适度超越授权范围处理委托人与承包人所签合同的变更事宜", "除专用条件另有约定外，监理人发现承包人的人员不能胜任本职工作的，有权要求发包人责令承包人予以调换"], "ans": [1], "exp": "A选项错误，在监理与相关服务范围内，委托人和承包人提出的意见和要求，监理人应及时提出处置意见。当委托人与承包人之间发生合同争议时，监理人应协助委托人、承包人协商解决。C选项错误，如果变更超过授权范围，应以书面形式报委托人批准。D选项错误，监理人发现承包人的人员不能胜任本职工作的，有权要求承包人予以调换。"}, {"id": 1260, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "关于暂停施工的说法，正确的是（　　）。", "opts": ["因发包人原因引起暂停施工的，监理人不必征询发包人同意，应及时下达暂停施工指示", "因监理人原因引起暂停施工的，发包人应承担由此增加的费用，承包人承担延误的工期", "因紧急情况需暂停施工，在监理人未下达暂停施工指示前，不得先暂停施工", "监理人认为有必要时，并经发包人同意后，可向承包人发出暂停施工的指示"], "ans": [3], "exp": "A选项错误，停工令的下达必须经过发包人同意。B选项错误，因监理人原因引起暂停施工的，发包人应承担由此增加的费用和延误的工期。C选项错误，因紧急情况需暂停施工，可以先暂停施工。"}, {"id": 1261, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "关于单代号网络图中箭线的说法，正确的是（　　）。", "opts": ["箭线代表的工作不消耗资源", "相邻工作间的时间间隔用波形线表示", "箭线不能自右向左绘制", "用虚箭线表示工作之间的工艺关系"], "ans": [2], "exp": "A选项错误，单代号网络图中箭线仅仅代表逻辑关系。B选项错误，时间间隔需要经过严谨的计算。D选项错误，单代号网络图中无虚箭线。"}, {"id": 1262, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "依据项目管理的组织结构图，对每一个工作部门进行的编码属于（　　）。", "opts": ["项目管理组织结构编码", "项目结构编码", "项目实施工作项编码", "项目参与单位编码"], "ans": [0], "exp": "项目管理组织结构编码，依据项目管理的组织结构图，对每一个工作部门进行编码。"}, {"id": 1263, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "根据《中华人民共和国招标投标法》，招标人对已发出的招标文件进行必要的澄清或者修改的，应当在招标文件要求提交投标文件截止时间至少（　　）日前发出。", "opts": ["7", "15", "14", "21"], "ans": [1], "exp": "招标人对已发出的招标文件进行必要的澄清或者修改的，应当在招标文件要求提交投标文件截止时间至少15日前发出。"}, {"id": 1264, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "某施工单位在2021年6月为订立某项目承包合同发生差旅费、投标费共30万元，该项目于2022年6月完工时发生人工费500万元，差旅费4万元，项目管理人员工资85万元，材料搬运费15万元，施工机械租赁费40万元及生产用具使用费25万元。根据《财政部关于印发〈企业产品成本核算制度（试行）〉的通知》，应计入其他直接费用的是（　　）万元。", "opts": ["74", "59", "70", "34"], "ans": [2], "exp": "其他直接费用，是指施工过程中发生的材料搬运费、材料装卸保管费、燃料动力费、临时设施摊销、生产工具用具使用费、检验试验费、工程定位复测费、工程点交费、场地清理费，以及能够单独区分和可靠计量的为订立建造承包合同而发生的差旅费、投标费等费用。"}, {"id": 1265, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "关于横道图进度计划功能的说法，正确的是（　　）。", "opts": ["确定进度计划的关键线路", "分析进度目标完成的概率", "计算项目资源的需要量", "调整资源需要量的均衡度"], "ans": [2], "exp": "横道图用于小型项目或大型项目的子项目上，或用于计算资源需要景和概要预示进度，也可用于其他计划技术的表示结果。"}, {"id": 1266, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "某工程因政府部门的要求导致工程变更，承包人做法正确的是（　　）。", "opts": ["要求工期延长，补偿费用，再执行工程变更", "执行工程变更，要求发包人补偿费用", "执行工程变更，同时向发包人提出工程索赔", "拒绝执行变更，由发包人另行选择执行人"], "ans": [2], "exp": "由于业主要求、政府部门要求、环境变化、不可抗力、原设计错误等导致的设计修改，应该由业主承担责任。由此所造成的施工方案的变更以及工期的延长和费用的增加应该向业主索赔。"}, {"id": 1267, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "某工程商品混凝土的目标产量为200m3，目标单价430元/m3，损耗率4％。实际产量为270m3，实际单价480元/m3，损耗率3%。采用因素分析法进行分析，因产量增加使成本增加（　　）元。", "opts": ["31003", "45344", "31304", "44908"], "ans": [2], "exp": "量价率排序，求谁谁做差，上实际下计划，（270-200）×430×1.04=31304（元）。"}, {"id": 1268, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "single", "q": "根据《质量管理体系基础和术语》，质量控制是指（　　）。", "opts": ["针对特定时间段所策划并具有特定目标的一组安排", "致力于满足质量要求的一系列相关活动", "对建筑产品具备的满足规定要求能力的程度进行的系统检查", "为达到工程项目质量要求所采取的作业技术和活动"], "ans": [1], "exp": "质量控制是质量管理的一部分，是致力于满足质量要求的一系列相关活动。"}, {"id": 1269, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "下列工作流程中，属于物质流程的有（　　）。", "opts": ["钢结构深化设计工作流程", "合同管理流程", "外立面施工工作流程", "设计变更流程", "弱电工程物资采购工作流程"], "ans": [0, 2, 4], "exp": "B、D选项均属于管理工作流程组织。"}, {"id": 1270, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "工程项目风险管理中常用的风险对策有（　　）。", "opts": ["风险规避", "风险监控", "风险减轻", "风险自留", "风险转移"], "ans": [0, 2, 3, 4], "exp": "常用的风险对策包括风险规避、减轻、转移、自留及其组合等策略。"}, {"id": 1271, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "工程网络计划中，关键线路是指（　　）的线路。", "opts": ["双代号时标网络计划中无波形线", "双代号网络计划中无虚箭线", "双代号网络计划中由关键节点组成", "单代号网络计划中工作自由时差均为零", "单代号网络计划中关键工作之间时间间隔均为零"], "ans": [0, 3, 4], "exp": "单代号网络计划中，从起点节点到终点节点均为关键工作，且所有工作时间间隔均为零的线路为关键线路。双代号时标网络计划中无波形线的线路为关键线路。B选项错误，关键线路中可以有虚箭线。C选项错误，双代号网络计划中关键节点组成的线路不一定是关键线路。"}, {"id": 1272, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "工程网络计划中，关键工作是指（　　）的工作。", "opts": ["最早开始时间与最迟开始时间相差最小", "总时差最小", "时标网络计划中无波形线", "与紧后工作之间间隔时间为零", "双代号网络计划中两端节点均为关键节点"], "ans": [0, 1], "exp": "关键工作是指总时差最小的工作。当计划工期等于计算工期时，总时差为零的工作为关键工作。总时差=最迟开始-最早开始，两者相差最小即为总时差最小的工作。"}, {"id": 1273, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "施工作业质量自控的基本程序中包含的工作有（　　）。", "opts": ["质量监督机构的抽检", "现场旁站检查", "作业技术交底", "作业活动的实施", "专职管理人员的质量检查"], "ans": [2, 3, 4], "exp": "施工作业质量自控的程序包括：①施工作业技术的交底；②施工作业活动的实施；③施工单位内部的工序作业质量自检、互检、专检和交接检查等。"}, {"id": 1274, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "质量管理的实施职能在于将质量目标值，可通过（　　）转换为质量实际值。", "opts": ["生产要素投入", "技术创新研发", "作业技术活动", "管理活动", "产出过程"], "ans": [0, 2, 4], "exp": "实施职能在于将质量的目标值，通过生产要素的投入、作业技术活动和产出过程，转化为质量的实际值。"}, {"id": 1275, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "根据《建设工程安全生产管理条例》，下列危险性较大的分部分项工程中，施工单位应当组织专家对专项施工方案进行论证的有（　　）。", "opts": ["脚手架工程", "起重吊装工程", "深基坑工程", "地下暗挖工程", "高大模板工程"], "ans": [2, 3, 4], "exp": "深基坑、地下暗挖、高大模板工程的专项施工方案，施工单位应组织专家论证。"}, {"id": 1276, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "建设工程项目总进度纲要的主要内容有（　　）。", "opts": ["项目实施的总体部署", "总进度规划", "确定里程碑事件的计划进度目标", "与总进度规划对应的资源需求计划", "总进度目标实现的条件和应采取的措施"], "ans": [0, 1, 2, 4], "exp": "总进度纲要的主要内容包括：①项目实施的总体部署；②总进度规划；③各子系统进度规划；④确定里程碑事件计划进度目标；⑤总进度目标实现的条件和应采取的措施。"}, {"id": 1277, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "施工检验批质量验收的主控项目是指对（　　）起决定性作用的检验项目。", "opts": ["经济效果", "安全", "环境保护", "主要使用功能", "节能"], "ans": [1, 2, 3, 4], "exp": "主控项目是指建筑工程中的对安全、节能、环境保护和主要使用功能起决定性作用的检验项目。"}, {"id": 1278, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "下列进度控制措施中，属于组织措施的有（　　）。", "opts": ["进度控制会议的组织设计", "编制项目进度控制的工作流程", "分析合同交界面对工程进度的影响", "分析影响进度的风险因素", "明确进度控制职能分工"], "ans": [0, 1, 4], "exp": "与组织论、会议有关的属于组织措施。C、D选项均属于管理措施。"}, {"id": 1279, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "关于成本核算中表格核算法的说法，正确的有（　　）。", "opts": ["便于操作", "科学严密", "实用性好", "对核算人员专业要求较高", "覆盖面较小"], "ans": [0, 2, 4], "exp": "表格核算的优点是简便易懂，方便操作，实用性较好；缺点是难以实现较为科学严密的审核制度，精度不高，覆盖面较小。B、D选项均属于会计核算法的特点。"}, {"id": 1280, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "赢得值法评价指标中，适用于不同项目之间偏差分析的有（　　）。", "opts": ["费用偏差", "进度偏差", "综合绩效指数", "费用绩效指数", "进度绩效指数"], "ans": [3, 4], "exp": "费用（进度）偏差仅适合于对同一项目作偏差分析。费用（进度）绩效指数反映的是相对偏差，它不受项目层次的限制，也不受项目实施时间的限制，因而在同一项目和不同项目比较中均可采用。"}, {"id": 1281, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "下列导致工程质量事故的原因中，属于技术原因的有（　　）。", "opts": ["地质勘察水文地质情况判断错误", "质量管理措施落实不力", "结构设计方案不合理", "检测仪器设备管理不善而失准", "采用不合格的施工方法或施工工艺"], "ans": [0, 2, 4], "exp": "B、D选项均属于管理原因。"}, {"id": 1282, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "关于施工现场食堂管理的说法，正确的有（　　）。", "opts": ["食堂必须有卫生许可证", "非炊事人员不得随意进入制作间", "门扇下方应设不低于0.1m的防鼠挡板", "制作间灶台及其周边应贴高度不宜小于1.5m的瓷砖", "各种作料和副食应贴好标识，存放在密闭器皿内"], "ans": [0, 1, 3, 4], "exp": "C选项错误，食堂应设置独立的制作间、储藏间，门扇下方应设不低于0.2m的防鼠挡板。"}, {"id": 1283, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "在工程质量管理中，采用直方图的作用有（　　）。", "opts": ["分析判断生产过程是否处于稳定状况", "分析质量数据的分布特征", "分析质量水平是否保持在公差允许范围内", "确定产生质量问题的主次影响因素", "逐层深入排查产生质量问题的可能原因"], "ans": [0, 1, 2], "exp": "直方图法的主要用途有：①整理统计数据，了解统计数据的分布特征，即数据分布的集中或离散状况，从中掌握质量能力状态。②观察分析生产过程质量是否处于正常、稳定和受控状态以及质量水平是否保持在公差允许的范围内。"}, {"id": 1284, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "根据《生产安全事故报告和调查处理条例》，下列事故中，县级人民政府应当自收到事故调查报告之日起15日内做出批复的有（　　）。", "opts": ["无人员死亡的较大事故", "直接经济损失较小的重大事故", "造成人员伤亡的一般事故", "特别重大事故", "未造成人员伤亡的一般事故"], "ans": [2, 4], "exp": "一般事故由事故发生地县级人民政府负责调查，负责事故调查的人民政府应当自收到事故调查报告之日起15日内作出批复。A选项错误，应由事故发生地设区的市级人民政府负责调查。B选项错误，应由事故发生地省级人民政府负责调查。D选项错误，应由国务院或者国务院授权有关部门组织事故调查组进行调查。"}, {"id": 1285, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "下列成本管理措施中，属于经济措施的有（　　）。", "opts": ["编制项目资金使用计划", "分解成本管理目标", "对成本管理目标进行风险分析", "对施工方案进行技术经济比较", "明确成本管理人员的工作任务"], "ans": [0, 1, 2], "exp": "D选项属于技术措施；E选项属于组织措施。"}, {"id": 1286, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "关于工程保险的说法，正确的有（　　）。", "opts": ["战争或军事行为所造成的损失属于保险人不承担责任的范围", "工程保险同时涉及财务保险和人身保险", "除专用合同条款另有约定外，发包人应投保建筑工程一切险", "除专用合同条款另有约定外，发包人变更保险合同时，应征得承包人同意", "工程保险并不能解决所有的风险问题，只能转移部分风险带来的损失"], "ans": [0, 1, 3, 4], "exp": "工程保险中，保险人不承担责任的范围：①投保人故意行为所造成的损失；②因被保险人不忠实履行约定义务所造成的损失；③战争或军事行为所造成的损失；④保险责任范围以外，其他原因所造成的损失。根据保险标的的不同，保险可以分为财产保险（包括财产损失保险、责任保险、信用保险等）和人身保险（包括人寿保险、健康保险、意外伤害保险等）两大类，而工程保险既涉及财产保险，也涉及人身保险。工程保险并不能解决所有的风险问题，只是转移了部分重大风险可能带来的损害，业主和承包商仍然要采取各种有力措施防止事故和灾害发生，并阻止事故的扩大。C选项错误，为了保证一切险的有效性和连贯性，国内工程通常由项目法人办理保险，国际工程一般要求承包人办理保险。"}, {"id": 1287, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "关于施工总承包管理模式的说法，正确的有（　　）。", "opts": ["业主的招标及合同管理工作量较大", "对分包人的质量控制由施工总承包管理单位进行", "有利于业主控制工程总投资", "业主的协调管理工作量小", "可减少业主实施工程的风险"], "ans": [0, 1], "exp": "C选项错误，开工前没有明确的合同价，对业主的早期投资不利，总投资也不利。D选项错误，总管模式符合他人控制的原则，所以对质量控制有利，总管负责管理但是分包负责施工。E选项错误，总管模式最开始没有完整施工图，边设计边施工，所以发生变更不能作为索赔的全部条件。"}, {"id": 1288, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "某工程单代号网络计划（时间：天）如下图所示，图中节点上下方数字分别表示相应工作代号和持续时间。时间参数计算正确的有（　　）。", "opts": ["LSB=0", "LSA=0", "FFD=0", "LFE=13", "TFC=0"], "ans": [0, 2, 3], "exp": "关键线路为：①→③→⑤→⑥，可得出：LSB=0，LSA=2，FFD=0，LFE=13，TFC=2。"}, {"id": 1289, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "关于总价合同的说法，正确的有（　　）。", "opts": ["发包人可以较早确定或预测工程成本", "能极大地调动承包人控制进度的积极性", "必须完整而明确地规定承包人的工作", "将设计和施工变化控制在最小限度内", "承包人将承担较少的风险"], "ans": [0, 1, 2, 3], "exp": "总价合同的特点是：①发包单位可以在报价竞争状态下确定项目的总造价，可以较早确定或者预测工程成本；②业主的风险较小，承包人将承担较多的风险；③评标时易于迅速确定最低报价的投标人；④在施工进度上能极大地调动承包人的积极性；⑤发包单位能更容易、更有把握地对项目进行控制；⑥必须完整而明确地规定承包人的工作；⑦必须将设计和施工方面的变化控制在最小限度内。"}, {"id": 1290, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "关于工程变更管理的说法，正确的有（　　）。", "opts": ["承包人对变更价格不满意的，有权停止执行变更工作", "工程变更的补偿范围，通常以实际支付工程款的百分比表示", "因业主在授标前要求承包人修改施工方案的承包人可向业主索赔", "设计人提出的工程变更应与业主协商，或经业主批复", "有利于业主的施工方案变更仍然需要（咨询）工程师批准"], "ans": [3, 4], "exp": "A选项错误，承包人应该无条件地执行工程变更的指示。即使承包人对工程师答应给予付款的金额不满意，承包人也必须边进行变更工作，一边根据合同寻求解决办法。B选项错误，工程变更的补偿范围，通常以合同金额一定的百分比表示。C选项错误，业主向承包人授标前（或签订合同前）可以要求承包人对施工方案进行补充、修改或作出说明，以便符合业主的要求。"}, {"id": 1291, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "关于合同订立程序的说法，正确的有（　　）。", "opts": ["招标人发布招标公告或投标邀请函属于要约邀请", "投标人按照招标文件要求提交投标文件属于要约", "招标人发出中标通知书属于承诺", "招标人与中标人进行合同谈判是合同签订的必要条件", "招标人与中标人订立书面合同时合同成立"], "ans": [0, 1, 2, 4], "exp": "D选项错误，“必要条件”过于绝对，在明确中标人并发出中标通知书后，双方即可就建设工程施工合同的具体内容和有关条款展开谈判，直到最终签订合同。"}, {"id": 1292, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "某工程双代号时标网络计划（时间：天）如下图所示，图中表达的正确信息有（　　）。", "opts": ["工作B的自由时差为1天", "工作A的总时差为1天", "工作C的总时差与自由时差相等", "工作D的总时差为4天", "工作E的总时差为零"], "ans": [1, 2, 3], "exp": "工作B的自由时差是0，工作C的自由时差总时差均为1，工作E的总时差是1。"}, {"id": 1293, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "施工组织设计应及时进行修改或补充的情形有（　　）。", "opts": ["某房屋建筑项目的机电系统进行大调整", "因规范调整需要对工程进行检查验收", "因自然灾害导致某在建项目工期严重滞后", "因造价原因需要对某房屋建筑的电梯品牌及参数进行修改", "某在建工程施工场地变化造成现场布置和施工方式改变"], "ans": [0, 2], "exp": "项目施工过程中，发生以下情况之一时，施工组织设计应及时进行修改或补充：①工程设计有重大修改；②有关法律、法规、规范和标准实施、修订和废止；③主要施工方法有重大调整；④主要施工资源配置有重大调整；⑤施工环境有重大改变。"}, {"id": 1294, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "关于建设工程现场文明施工措施的说法，正确的有（　　）。", "opts": ["施工平面布置应随工程实施的不同阶段进行调整和优化", "市区主要路段的工地围挡高度不低于2.4m", "施工作业区适当地方设置吸烟处", "沿工地四周应连续设置围挡", "现场不得焚烧有毒、有害物质"], "ans": [0, 2, 3, 4], "exp": "B选项错误，市区主要路段的工地围挡高度不低于2.5m，其他地方不得低于1.8m。"}, {"id": 1295, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "关于成本分析的说法，正确的有（　　）。", "opts": ["业务核算可以对未发生、正在发生及已完成的经济活动进行核算", "分部分项工程成本分析的对象为已完分部分项工程", "年度成本分析的重点是针对下一年度的施工进展情况制定的成本管理措施", "统计核算不能用劳动量进行计量", "材料采购保管费会随材料采购数量增多而增加"], "ans": [0, 1, 2, 4], "exp": "D选项错误，统计核算不仅可以用货币计算，还可以用实物或劳动量计量。"}, {"id": 1296, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "某建设工程发包人与乙公司签订了工程承包合同，乙公司又与劳务分包人丙公司签订了劳务分包合同。关于丙公司应承担义务的说法，正确的有（　　）。", "opts": ["应就工期和质量向发包人负责", "应与发包人及有关部门建立工作联系", "应安排技术档案资料的收集整理及交工验收", "应服从乙公司转发的发包人指令", "应自觉接受乙公司及有关部门的管理、监督和检查"], "ans": [3, 4], "exp": "A选项错误，应就工期和质量向乙公司负责。B选项错误，分包人不能直接和发包人产生联系。C选项错误，劳务分包人只能干劳务。"}, {"id": 1297, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "下列承包人提出的索赔情形中，索赔能够成立的有（　　）。", "opts": ["施工过程中，因施工方案缺陷导致的工程变更", "发包人减少工程量，造成进场人员材料损失", "由于阴雨天气，造成工期延误和人员窝工", "基础工程覆盖后因建设单位要求进行剥离复验，复验结果合格", "总承包单位经建设单位代表同意更换项目经理，导致工期延误"], "ans": [1, 3], "exp": "索赔成立的情形包括：①与合同对照，事件已造成了承包人工程项目成本的额外支出，或直接工期损失。②造成费用增加或工期损失的原因，按合同约定不属于承包人的行为责任或风险责任。③承包人按合同规定的程序和时间提交索赔意向通知和索赔报告。A选项错误，属于施工方自己有错。C选项错误，阴雨天气是可预见的，不能索赔。E选项错误，总包自己要求更换项目经理，不能索赔。"}, {"id": 1298, "source": "真题", "ch": null, "year": "2022", "sourceLabel": "2022年真题", "type": "multi", "q": "某施工项目的进度和成本数据如下表所示。关于该项目成本计划的说法，正确的有（　　）。", "opts": ["项目总计划成本是460万元", "第4、5月两个月的计划成本相同", "第4月内计划成本是60万元", "8月末计划成本累计310万元", "第8、9月两个月的计划成本相同"], "ans": [0, 2, 3, 4], "exp": ""}, {"id": 1299, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "下列质量管理数理统计方法中，采用ABC分类管理法的是（　　）。", "opts": ["排列图法", "分层法", "直方图法", "因果分析法"], "ans": [0], "exp": "采用ABC分类管理法的是排列图法。"}, {"id": 1300, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "组织论的观点认为系统的组织是由（　　）决定的。", "opts": ["系统的目标", "系统的活动", "系统的结构", "系统的流程"], "ans": [0], "exp": "系统的目标决定了系统的组织，而组织是目标能否实现的决定性因素，这是组织论的一个重要结论。"}, {"id": 1301, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "根据《建筑施工组织设计规范》，按照编制对象不同，施工组织设计分为（　　）。", "opts": ["施工组织总设计、单位工程施工组织设计和施工方案", "单位工程施工组织设计、分部工程施工组织设计和施工方案", "单位工程施工组织设计、施工方案和专项施工指导书", "施工组织总设计、分部工程施工组织设计和施工部署"], "ans": [0], "exp": "施工组织设计按编制对象，可分为施工组织总设计、单位工程施工组织设计和施工方案。"}, {"id": 1302, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "建设工程项目实施阶段策划的时间是（　　）。", "opts": ["在建设项目立项之后", "在建设项目施工招标之前", "在建设项目可行性研究之前", "在建设项目建议书批准之后"], "ans": [0], "exp": "建设工程项目实施阶段策划是在建设项目立项之后，为了把项目决策付诸实施而形成的指导性的项目实施方案。"}, {"id": 1303, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "在工程实施过程中发生索赔事件或者承包人有索赔机会时，承包人首先应提交的文件是（　　）。", "opts": ["索赔意向通知", "索赔初步意见", "索赔报告", "索赔款项计算"], "ans": [0], "exp": "在工程实施过程中发生索赔事件以后，或者承包人发现索赔机会，首先要提出索赔意向。承包人按合同规定的程序和时间提交索赔意向通知和索赔报告。"}, {"id": 1304, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "下列施工承包合同计价方式中，承包商风险最小的是（　　）。", "opts": ["变动单价合同", "固定总价合同", "固定单价合同", "变动总价合同"], "ans": [0], "exp": "当采用变动单价合同时，合同双方可以约定一个估计的工程量，当实际工程量发生较大变化时可以对单价进行调整，同时还应该约定如何对单价进行调整；当然也可以约定，当通货膨胀达到一定水平或者国家政策发生变化时，可以对哪些工程内容的单价进行调整以及如何调整等。因此，承包商的风险就相对较小。"}, {"id": 1305, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "某项目因材料质量检验不严引发质量事故，该质量事故发生的原因属于（　　）。", "opts": ["技术原因", "社会、经济原因", "人为事故原因", "管理原因"], "ans": [3], "exp": "管理原因是指引发质量事故是由于管理上的不完善或失误。例如，施工单位或监理单位的质量管理体系不完善，质量管理措施落实不力，施工管理混乱，不遵守相关规范，违章作业，检验制度不严密，质量控制不严格，检测仪器设备管理不善而失准，以及材料质量检验不严等原因引起质量事故。"}, {"id": 1306, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "在国际上，民用项目总承包的招标多数用（　　）描述项目。", "opts": ["项目投资", "项目构造", "项目功能", "项目质量"], "ans": [2], "exp": "在国际上，民用项目总承包的招标多数采用项目功能描述的方式，而不采用项目构造描述的方式，因为项目构造描述的招标依据是设计文件，而工程总承包招标时业主方还不可能提供具体的设计文件。"}, {"id": 1307, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "以项目施工方案为依据，通过施工预算编制而形成的成本计划是（　　）。", "opts": ["竞争性成本计划", "实施性成本计划", "指导性成本计划", "预测性成本计划"], "ans": [1], "exp": "实施性成本计划是项目施工准备阶段的施工预算成本计划，它是以项目实施方案为依据，以落实项目经理责任目标为出发点，采用企业的施工定额通过施工预算的编制而形成的实施性成本计划。"}, {"id": 1308, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "投标保证金不得超过招标项目估算价的（　　）。", "opts": ["2％", "3％", "5％", "10%"], "ans": [0], "exp": "根据《中华人民共和国招标投标法实施条例》，投标保证金不得超过招标项目估算价的2％。"}, {"id": 1309, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "装配式建筑施工中，混凝土预制构件出厂时的混凝土强度不宜低于设计混凝土强度等级值的（　　）。", "opts": ["50％", "90％", "75％", "100%"], "ans": [2], "exp": "混凝土预制构件出厂时的混凝土强度不宜低于设计混凝土强度等级值的75％。"}, {"id": 1310, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "监理人更换总监理工程师时，应提前（　　）天向委托人书面报告。", "opts": ["7", "3", "5", "14"], "ans": [0], "exp": "监理人可根据工程进展和工作需要调整项目监理机构人员。监理人更换总监理工程师时，应提前7天向委托人书面报告，经委托人同意后方可更换；监理人更换项目监理机构其他监理人员，应以相当资格与能力的人员替换，并通知委托人。"}, {"id": 1311, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "成本管理的每一个环节是相互联系和相互作用的，其中成本决策的前提是（　　）。", "opts": ["成本计划", "成本预测", "成本核算", "成本考核"], "ans": [1], "exp": "成本预测是成本决策的前提，成本计划是成本决策所确定目标的具体化。"}, {"id": 1312, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "下列费用中，可以列入“直接材料”成本项目的是（　　）。", "opts": ["周转材料租赁费", "材料搬运费", "材料装卸保管费", "检验试验费"], "ans": [0], "exp": "直接材料是指在施工过程中所耗用的、构成工程实体的材料、结构件、机械配件和有助于工程形成的其他材料以及周转材料的租赁费和摊销等。B、C、D均属于其他直接费。"}, {"id": 1313, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "在人口稠密区进行施工作业时，停止强噪声作业的时段一般是（　　）。", "opts": ["晚11点到次日早6点", "晚9点到次日早5点", "晚10点到次日早6点", "晚8点到次日早8点"], "ans": [2], "exp": "凡在人口稠密区进行强噪声作业时，须严格控制作业时间，一般晚10到次日早6点之间停止强噪声作业。"}, {"id": 1314, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "在工程网络计划执行中，关键线路的实际进度落后于计划进度时，应在尚未完成的关键工作中，选择（　　）的工作赶工。", "opts": ["资源强度大或费用高", "资源强度小或费用低", "资源强度大或费用低", "资源强度小或费用高"], "ans": [1], "exp": "当关键线路的实际进度比计划进度拖后时，应在尚未完成的关键工作中，选择资源强度小或费用低的工作缩短其持续时间，并重新计算未完成部分的时间参数，将其作为一个新计划实施。"}, {"id": 1315, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "招标发包工程的基准日期是（　　）前28天的日期。", "opts": ["投标截止日", "合同签订日", "开工日", "中标通知书发出日"], "ans": [0], "exp": "招标发包的工程以投标截止日前28天的日期为基准日期，直接发包的工程以合同签订日前28天的日期为基准日期。"}, {"id": 1316, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "项目信息门户的建立和运行的理论基础是（　　）。", "opts": ["绩效优化理论", "远程合作理论", "网络互联理论", "项目集成理论"], "ans": [1], "exp": "远程学中的一个核心问题是远程合作，其主要任务是研究和处理分散的各系统和网络服务的组织关系。应认识到项目信息门户的建立和运行的理论基础是远程合作理论。"}, {"id": 1317, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "省级人民政府建设行政主管部门对质量监督机构的监督人员进行岗位考核的频次是（　　）。", "opts": ["每两年一次", "每半年一次", "每一年一次", "每三年一次"], "ans": [0], "exp": "省、自治区、直辖市人民政府建设主管部门每两年对监督人员进行一次岗位考核，每年进行一次法律法规、业务知识培训，并适时组织开展继续教育培训。"}, {"id": 1318, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "某拆除工程在施工过程中发生倒塌事故，造成60人重伤、8人死亡，根据事故分类等级，该事故属于（　　）。", "opts": ["一般事故", "较大事故", "重大事故", "特大事故"], "ans": [2], "exp": "重大事故是指造成10人以上30人以下死亡，或者50人以上100人以下重伤，或者5000万元以上1亿元以下直接经济损失的事故。"}, {"id": 1319, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "根据《建设工程施工合同（示范文本）》，在合同实施过程中发生的下列事项中，属于工程变更的是（　　）。", "opts": ["更换施工技术负责人", "改动工程的施工顺序", "提供错误的地质资料", "删除工作交他人实施"], "ans": [1], "exp": "根据FIDIC施工合同条件，工程变更的内容可能包括：①改变合同中所包括的任何工作的数量；②改变任何工作的质量和性质；③改变工程任何部分的标高、基线、位置和尺寸；④删减任何工作，但要交他人实施的工作除外；⑤任何永久工程需要的任何附加工作、工程设备、材料或服务；⑥改动工程的施工顺序或时间安排。"}, {"id": 1320, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "下列施工任务中，属于监理工作的是（　　）。", "opts": ["编制施工预算", "验收隐蔽工程", "编制施工进度计划", "组织竣工验收"], "ans": [1], "exp": "工程施工阶段建设监理工作的主要任务中，核验施工测量放线，验收隐蔽工程、分部分项工程，签署分项、分部工程和单位工程质量评定表。"}, {"id": 1321, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "某道路工程包括铺设路基工作A和浇筑路面工作B，根据施工组织安排，需待铺设路基工作A开始一段时间为浇筑路面工作B创造施工条件后，工作B才能开始进行，则制定施工计划时应将工作A与B的关系确定为（　　）的搭接关系。", "opts": ["FTS", "STF", "FTF", "STS"], "ans": [3], "exp": "道路工程中的铺设路基和浇筑路面，待路基开始工作一定时间为路面工程创造一定工作条件之后，路面工程即可开始进行，这种开始工作时间之间的间隔就是STS时距。"}, {"id": 1322, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "当两个或两个以上的延误事件从发生到终止有部分时间重合时，这些事件引起的延误是（　　）。", "opts": ["共同延误", "交叉延误", "连续延误", "重复延误"], "ans": [1], "exp": "当两个或两个以上的延误事件从发生到终止只有部分时间重合时，称为交叉延误。"}, {"id": 1323, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "施工过程质量验收环节中，应由总监理工程师组织验收的是（　　）。", "opts": ["检验批质量验收", "分项工程质量验收", "分部工程质量验收", "竣工质量验收"], "ans": [2], "exp": "分部工程应由总监理工程师组织施工单位项目负责人和项目技术负责人等进行验收。"}, {"id": 1324, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "根据《建设工程施工合同（示范文本）》通用条款规定的优先顺序，排在投标函及其附录之前的文件是（　　）。", "opts": ["招标文件", "专用合同条款", "通用合同条款", "中标通知书"], "ans": [3], "exp": "《建设工程施工合同（示范文本）》通用条款规定的优先顺序包括：①合同协议书；②中标通知书（如果有）；③投标函及其附录（如果有）；④专用合同条款及其附件；⑤通用合同条款；⑥技术标准和要求；⑦图纸；⑧已标价工程量清单或预算书；⑨其他合同文件。"}, {"id": 1325, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "下列施工成本的分析方法中，最适用于分析各因素对成本影响程度的是（　　）。", "opts": ["相关比率法", "比重分析法", "动态比率法", "连环置换法"], "ans": [3], "exp": "因素分析法又称连环置换法，可用来分析各种因素对成本的影响程度。"}, {"id": 1326, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "某项目在施工化粪池时，为确保安全，在开挖的基坑边，既设立了防护栏及警示牌，又设立了照明灯及夜间警示红灯，这体现了安全事故隐患治理的（　　）原则。", "opts": ["重点治理", "冗余安全度治理", "单项隐患综合治理", "预防与减灾并重治理"], "ans": [1], "exp": "冗余安全度治理原则，即为确保安全，在治理事故隐患时应考虑设置多道防线，即使发生有一两道防线无效，还有冗余的防线可以控制事故隐患。例如：道路上有一个坑，既要设防护栏及警示牌，又要设照明及夜间警示红灯。"}, {"id": 1327, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "根据《建设工程施工合同（示范文本）》，项目经理应常驻施工现场，确需离开施工现场时应（　　）。", "opts": ["事先通知发包人，并取得上级单位的书面同意", "事先通知监理人，并取得发包人的书面同意", "取得监理人的书面同意，并报告上级单位", "取得监理人的书面同意，并报告发包人"], "ans": [1], "exp": "项目经理确需离开施工现场时，应事先通知监理人，并取得发包人的书面同意。"}, {"id": 1328, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "建设工程管理工作是一种增值服务，其核心任务是（　　）。", "opts": ["为工程的管理和使用增值", "为工程的质量和成本管理增值", "为工程的设计和施工增值", "为工程的建设和使用增值"], "ans": [3], "exp": "建设工程管理工作是一种增值服务工作，其核心任务是为工程的建设和使用增值。"}, {"id": 1329, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "下列施工质量缺陷问题，可不作处理的是（　　）。", "opts": ["混凝土结构出现了0.4mm宽裂缝", "混凝土结构误用了安定性不合格水泥", "预应力构件张拉系数不满足设计要求", "混凝土现浇楼面平整度偏差10mm"], "ans": [3], "exp": "后道工序可以弥补的质量缺陷。例如，混凝土结构表面的轻微麻面，可通过后续的抹灰、刮涂、喷涂等弥补，也可不作处理。再比如，混凝土现浇楼面的平整度偏差达10mm，但由于后续垫层和面层的施工可以弥补，所以也可不作处理。"}, {"id": 1330, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "建设工程项目的全面质量管理（TQC）强调的是（　　）。", "opts": ["勘察设计和施工组织全过程的质量管理", "全面、全过程和全员参与的质量管理", "最高管理者和组织管理岗位的全员质量管理", "全方位、全要素和全流程的质量管理"], "ans": [1], "exp": "我国从20世纪80年代开始引进和推广全面质量管理，其基本原理就是强调在企业或组织最高管理者的质量方针指引下，实行全面、全过程和全员参与的质量管理。"}, {"id": 1331, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "某工程网络计划中，M工作的持续时间为2天，自由时差为1天，该工作有3项紧后工作，紧后工作的最早开始时间分别为第5天、第6天和第8天，总时差分别为3天、2天和1天，则M工作的最迟开始时间为第（　　）天。", "opts": ["3", "5", "4", "6"], "ans": [3], "exp": "总时差=最迟开始时间-最早开始时间，该工作紧后工作的最早开始时间分别为第5天、第6天和第8天，总时差分别为3天、2天和1天，所以3项紧后工作的最迟开始时间为第8天、第8天和第9天。M工作的最迟完成时间等于其紧后所有工作最迟开始时间的最小值，M工作的最迟完成时间为8，持续时间为2天，故M工作的最迟开始时间=8-2=6（天）。"}, {"id": 1332, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "下列工作任务中，属于施工方进度控制任务的是（　　）。", "opts": ["控制项目招标工作的进度", "编制设计图纸的出图计划", "编制项目生产机具需求计划", "组织工程设备的加工制造"], "ans": [2], "exp": "A选项属于业主方进度控制的任务；B选项属于设计方进度控制的任务；D选项属于供货方进度控制的任务。"}, {"id": 1333, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "建设工程项目信息管理的目的是通过对项目信息传输的有效组织和控制为项目（　　）提供增值服务。", "opts": ["运营维护", "建设", "档案管理", "数据处理"], "ans": [1], "exp": "项目的信息管理的目的旨在通过有效的项目信息传输的组织和控制为项目建设的增值服务。"}, {"id": 1334, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "根据《安全生产许可证条例》，对建筑施工企业安全生产许可证的颁发进行监督指导的是（　　）。", "opts": ["国务院住房和城乡建设主管部门", "国务院发展与改革主管部门", "国务院安全生产监督管理主管部门", "国务院应急管理主管部门"], "ans": [0], "exp": "国务院建设主管部门负责中央管理的建筑施工企业安全生产许可证的颁发和管理，其他企业由省、自治区、直辖市人民政府建设主管部门进行颁发和管理，并接受国务院建设主管部门的指导和监督。"}, {"id": 1335, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "关于施工材料费控制的说法，正确的是（　　）。", "opts": ["主要是控制材料的采购价格", "应由施工作业者包干控制", "应遵循“量价分离”原则", "主要是定额控制"], "ans": [2], "exp": "材料费控制同样按照“量价分离”原则，控制材料用量和材料价格。"}, {"id": 1336, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "与质量保证金方式相比，质量保证金保函的特点是（　　）。", "opts": ["有利于加大承包人的缺陷维修责任", "有利于业主降低质量保证风险", "有利于降低承包人维修缺陷的费用", "有利于承包人提前取回被扣留的现金"], "ans": [3], "exp": "承包人应力争以维修保函来代替业主扣留的质量保证金。与质量保证金相比，维修保函对承包人有利，主要是因为可提前取回被扣留的现金，而且保函是有时效的，期满将自动作废。"}, {"id": 1337, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "某工程双代号网络计划如下图所示（时间单位：天），其中关键线路有（　　）条。", "opts": ["1", "3", "2", "4"], "ans": [1], "exp": "关键线路有3条：①→②→④→⑥→⑨；①→②→⑦→⑧→⑨；①→②→④→⑥→⑦→⑧→⑨。"}, {"id": 1338, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "关于现场围挡的说法，正确的是（　　）。", "opts": ["沿工地四周可以不连续设置围挡", "市区主要路段的工地围挡设置高度不低于2.2m", "围挡材料必须采用机制砖类坚固材料", "涉及市容景观路段的工地围挡设置高度不低于2.5m"], "ans": [3], "exp": "沿工地四周连续设置围挡，市区主要路段和其他涉及市容景观路段的工地设置围挡的高度不低于2.5m，其他工地的围挡高度不低于1.8m，围挡材料要求坚固、稳定、统一、整洁、美观。"}, {"id": 1339, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "成本管理的基础工作是多方面的，其中最重要的基础工作是（　　）。", "opts": ["建立成本管理计划体系", "建立成本管理核算体系", "建立成本管理程序体系", "建立成本管理责任体系"], "ans": [3], "exp": "成本管理首先要做好基础工作，成本管理的基础工作是多方面的，成本管理责任体系的建立是最重要的基础工作，涉及成本管理的一系列组织制度、工作程序、业务标准和责任制度的建立。"}, {"id": 1340, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "某项目施工成本数据如下表所示，应用差额计算法分析，该项目成本降低率提高对成本降低额的影响是（　　）万元。", "opts": ["1.2", "0.6", "1.1", "1.8"], "ans": [0], "exp": "该项目成本降低率提高对成本降低额的影响：240×（3.5％-3％）=1.2（万元）。"}, {"id": 1341, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "建设工程总进度目标论证的工作包括：①进度计划系统的结构分析；②项目结构分析；③编制各层进度计划；④项目的工作编码。上述工作的正确顺序是（　　）。", "opts": ["①—②—③—④", "③—②—①—④", "②—①—④—③", "④—①—②—③"], "ans": [2], "exp": "建设工程项目总进度目标论证的工作步骤包括：①调查研究和收集资料；②项目结构分析；③进度计划系统的结构分析；④项目的工作编码；⑤编制各层进度计划；⑥协调各层进度计划的关系，编制总进度计划；⑦若所编制的总进度计划不符合项目的进度目标，则设法调整；⑧若经过多次调整，进度目标无法实现，则报告项目决策者。"}, {"id": 1342, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "下列施工质量事故预防措施中，属于严格按照基本建设程序办事的是（　　）。", "opts": ["严格控制建筑材料质量", "禁止任意修改设计和不按图纸施工", "严禁脚手架超载堆放材料", "推行终身职业技能培训制度"], "ans": [1], "exp": "严格按照基本建设程序办事：首先要做好项目可行性论证，不可未经深入的调查分析和严格论证就盲目拍板定案；要彻底搞清工程地质水文条件方可开工；杜绝无证设计、无图施工；禁止任意修改设计和不按图纸施工；工程竣工不进行试车运转、不经验收不得交付使用。"}, {"id": 1343, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "建设项目的职业健康安全和环境管理涉及大量的露天作业，受到气候条件、工程地质和水文地质、地理条件和地域资源等不可控因素的影响较大，体现了职业健康安全与环境管理的（　　）特点。", "opts": ["多样性", "复杂性", "多变性", "协调性"], "ans": [1], "exp": "复杂性：建设项目的职业健康安全和环境管理涉及大量的露天作业，受到气候条件、工程地质和水文地质、地理条件和地域资源等不可控因素的影响较大。"}, {"id": 1344, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "项目质量控制包括下列活动：①评价分析；②设定目标；③测量检查；④纠正偏差。上述活动的正确顺序是（　　）。", "opts": ["②—①—④—③", "③—①—④—②", "②—③—①—④", "③—④—②—①"], "ans": [2], "exp": "质量控制是质量管理的一部分，是致力于满足质量要求的一系列相关活动。这些活动主要包括：①设定目标；②测量检查；③评价分析；④纠正偏差。"}, {"id": 1345, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "根据工程项目目标动态控制的工作程序，下列工作中，属于项目目标动态控制准备工作的是（　　）。", "opts": ["收集项目目标的实际值", "对项目目标的计划值和实际值进行比较", "对项目目标进行调整", "将项目的目标进行分解"], "ans": [3], "exp": "项目目标动态控制的准备工作有：将项目的目标进行分解，以确定用于目标控制的计划值。"}, {"id": 1346, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "项目管理过程中，当使用管理职能分工表不足以明确每个工作部门的管理职能时，通常解决的方法是（　　）。", "opts": ["明确管理职能的管理过程", "辅以管理职能分工描述书", "强化各部门的管理职能", "辅以岗位责任描述书"], "ans": [1], "exp": "如使用管理职能分工表还不足以明确每个工作部门的管理职能，则可辅以使用管理职能分工描述书。"}, {"id": 1347, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "某分部工程双代号网络计划如下图所示（时间单位：天），若计划工期等于计算工期，关于工作时间参数的说法，正确的是（　　）。", "opts": ["工作A2的自由时差为1天", "工作B2的最迟完成时间为第8天", "工作C2的总时差为1天", "工作B3的最早开始时间为第7天"], "ans": [1], "exp": "A选项错误，工作A2为关键工作，故A2的自由时差为0天。C选项错误，工作C2为关键工作，故总时差为0天。D选项错误，工作B3的最早开始时间为第8天。"}, {"id": 1348, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "根据《建设工程项目管理规范》，项目管理规划应包括的内容是（　　）。", "opts": ["项目管理规划大纲和项目管理策划", "项目管理策划和项目管理实施规划", "项目管理配套策划和项目管理实施策划", "项目管理规划大纲和项目管理实施规划"], "ans": [3], "exp": "项目管理策划应由项目管理规划策划和项目管理配套策划组成；项目管理规划应包括项目管理规划大纲和项目管理实施规划。"}, {"id": 1349, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "关于组织结构模式和组织分工的说法，正确的是（　　）。", "opts": ["组织结构模式是动态的，组织分工是相对静态的", "组织结构模式是相对静态的，组织分工是动态的", "组织结构模式和组织分工都是相对静态的", "组织结构模式和组织分工都是动态的"], "ans": [2], "exp": "组织结构模式和组织分工都是一种相对静态的组织关系。"}, {"id": 1350, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "某工程的单代号搭接网络计划如下图所示（时间单位：天），该工程的计算工期为（　　）天。", "opts": ["24", "26", "30", "27"], "ans": [2], "exp": "关键线路为：A→C→D→F。A工作3天，A到C：STS=2，C工作8天，所以A没完成C即开始，为3+8-1天；D工作10天，D到F：FTF=10，F工作6天，转化为FTS，即D到F中间多4天，为10+4+6天。由此可知，计算工期=3+8-1+10+4+6=30（天）。"}, {"id": 1351, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "应用曲线法进行施工成本偏差分析时，已完工作实际费用曲线与已完工作预算费用曲线的竖向距离，表示（　　）。", "opts": ["进度累计偏差", "进度局部偏差", "费用局部偏差", "费用累计偏差"], "ans": [3], "exp": "费用偏差（CV）=已完工预算费用（BCWP）-已完工作实际费用（ACWP），故两条曲线的竖向距离表示成本的费用累计偏差。"}, {"id": 1352, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "关于施工预算与施工图预算的说法，正确的是（　　）。", "opts": ["“两算”对比的方法有实物对比法和金额对比法", "一般情况下，施工预算的材料消耗量比施工图预算的材料消耗量高", "施工预算和施工图预算既适用于发包人，也适用于承包人", "施工预算的编制以预算定额为依据，施工图预算的编制以施工定额为依据"], "ans": [0], "exp": "B选项错误，施工预算的材料消耗量及材料费一般低于施工图预算。C选项错误，施工预算是施工企业内部管理用的一种文件，与发包人无直接关系；而施工图预算既适用于发包人，又适用于承包人。D选项错误，施工预算的编制以施工定额为依据，施工图预算的编制以预算定额为依据。"}, {"id": 1353, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "根据《建筑施工组织设计规范》，专业承包工程的施工方案由（　　）审批。", "opts": ["施工总承包单位技术负责人或其授权的技术人员", "施工总承包项目技术负责人或其授权的技术人员", "专业承包单位技术负责人或其授权的技术人员", "专业承包项目技术负责人或其授权的技术人员"], "ans": [2], "exp": "由专业承包单位施工的分部（分项）工程或专项工程的施工方案，应由专业承包单位技术负责人或技术负责人授权的技术人员审批；有总承包单位时，应由总承包单位项目技术负责人核准备案。"}, {"id": 1354, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "工程网络计划在执行过程中，需根据检查情况进行调整，当实际情况要求改变施工顺序时，应当优先调整的内容是（　　）。", "opts": ["压缩关键线路的长度", "调整非关键工作的时差", "改变工作的逻辑关系", "加强资源投入的强度"], "ans": [2], "exp": "逻辑关系的调整只有当实际情况要求改变施工方法或组织方法时才可进行。A、B、D选项均和工期相关。"}, {"id": 1355, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "下列安全生产管理预警体系的构成要素中，属于企业内部管理不良预警系统的是（　　）。", "opts": ["自然环境突变预警", "技术变化预警", "政策法规变化预警", "质量管理预警"], "ans": [3], "exp": "内部管理不良预警系统包括质量管理预警、设备管理预警和人的行为活动管理预警。"}, {"id": 1356, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "关于施工现场宿舍安全卫生要求的说法，正确的是（　　）。", "opts": ["现场宿舍每间居住人数不得超过18人", "现场宿舍的室内净高不得小于2.1m", "现场宿舍通道宽度不得小于0.6m", "现场宿舍内应设置生活用品专柜和垃圾桶"], "ans": [3], "exp": "A、B、C选项错误，现场宿舍的管理中，宿舍内应保证有必要的生活空间，室内净高不得小于2.4m，通道宽度不得小于0.9m，每间宿舍居住人员不得超过16人。"}, {"id": 1357, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "根据《建设工程施工劳务分包合同（示范文本）》，属于劳务分包人责任和义务的是（　　）。", "opts": ["满足劳务作业所需的能源供应", "负责编制施工组织设计", "为从事危险作业的职工办理意外伤害保险", "对工程的工期和质量向发包人负责"], "ans": [2], "exp": "劳务分包人必须为从事危险作业的职工办理意外伤害保险，并为施工场地内自有人员生命财产和施工机械设备办理保险，支付保险费用。A、B、D选项均属于承包人的责任和义务。"}, {"id": 1358, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "建设工程项目质量控制体系的建立包括下列工作：①制定质量控制制度；②编制质量控制计划；③建立系统质量控制网络；④分析质量控制界面。上述工作的正确顺序是（　　）。", "opts": ["①—②—③—④", "③—④—①—②", "①—③—②—④", "③—①—④—②"], "ans": [3], "exp": "项目质量控制体系的建立过程，一般可按以下环节依次展开工作：①建立系统质量控制网络；②制定质量控制制度；③分析质量控制界面；④编制质量控制计划。"}, {"id": 1359, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "对施工质量应进行动态控制，下列工作中，属于事前质量控制的是（　　）。", "opts": ["工序质量控制", "质量控制点的检查", "质量管理点的设置", "对工序质量偏差的纠正"], "ans": [2], "exp": "事前质量控制，即在正式施工前进行的事前主动质量控制，通过编制施工质量计划，明确质量目标，制定施工方案，设置质量管理点，落实质量责任，分析可能导致质量目标偏离的各种影响因素，针对这些影响因素制定有效的预防措施，防患于未然。"}, {"id": 1360, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "下列装配式混凝土建筑预制构件中，应根据设计要求确定是否进行结构性能检验及其检验方式的是（　　）。", "opts": ["简支受弯的预制板", "简支受弯的预制梁", "叠合板预制底板", "叠合梁构件"], "ans": [3], "exp": "预制构件的质量验收中，梁板类简支受弯预制构件进场时应进行结构性能检验，结构性能检验应符合国家现行有关标准的有关规定及设计的要求。对于不可单独使用的叠合板预制底板，可不进行结构性能检验。对叠合梁构件，是否进行结构性能检验、结构性能检验的方式应根据设计要求确定。"}, {"id": 1361, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "物资采购合同中对委托运输部门或单位代运的产品，其交货日期一般以（　　）的日期为准。", "opts": ["承运单位开始运输产品时", "供货方发运产品时承运单位签发", "供货方向承运单位提出交货申请", "所发运的产品到达收货人所在地"], "ans": [1], "exp": "交货日期的确定可以按照下列方式：①供货方负责送货的，以采购方收货戳记的日期为准；②采购方提货的，以供货方按合同规定通知的提货日期为准；③凡委托运输部门或单位运输、送货或代运的产品，一般以供货方发运产品时承运单位签发的日期为准，不是以向承运单位提出申请的日期为准。"}, {"id": 1362, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "美国建筑师学会（AIA）颁布的施工合同通用条件将保险分为（　　）三个部分。", "opts": ["工程一切险、意外伤害保险、保证保险", "承包商责任保险、意外伤害保险、保证保险", "承包商责任保险、业主责任保险、财产保险", "工程一切险、业主责任保险、财产保险"], "ans": [2], "exp": "AIA合同将保险分为三部分，即承包商责任保险、业主责任保险、财产保险。"}, {"id": 1363, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "项目风险管理过程中，属于项目风险评估任务的是（　　）。", "opts": ["确定各种风险因素", "分析各种风险的损失量", "编制项目风险清单", "分析风险应对策略的可行性"], "ans": [1], "exp": "项目风险评估工作包括：①利用已有数据资料（主要是类似项目有关风险的历史资料）和相关专业方法分析各种风险因素发生的概率；②分析各种风险的损失量；③根据各种风险发生的概率和损失量，确定各种风险的风险量和风险等级。"}, {"id": 1364, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "下列生产安全事故应急预案的相关内容中，属于现场处置方案内容的是（　　）。", "opts": ["应急演练总结", "事故特征分析", "应急经费安排", "事故整改措施"], "ans": [1], "exp": "现场处置方案的主要内容包括：①事故特征；②应急组织与职责；③应急处置；④注意事项。"}, {"id": 1365, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "下列工作内容中，属于施工单位质量责任及义务的是（　　）。", "opts": ["组织建设工程的竣工验收", "提供真实的地质、测量、水文等勘察成果", "采取旁站、巡视和平行检验方式对工程质量进行监督", "严格工序管理，做好隐蔽工程的质量检查、记录"], "ans": [3], "exp": "施工单位的质量责任和义务中，施工单位必须建立、健全施工质量的检验制度，严格工序管理，做好隐蔽工程的质量检查和记录。隐蔽工程在隐蔽前，施工单位应当通知建设单位和建设工程质量监督机构。"}, {"id": 1366, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "某工程中期检查时，已完工作预算费用为820万元，计划工作预算费用为800万元，已完工作实际费用为860万元。则中期检查时该工程的费用绩效指数为（　　）。", "opts": ["1.025", "0.930", "1.075", "0.953"], "ans": [3], "exp": "费用绩效指数=已完工作预算费用（BCWP）/已完工作实际费用（ACWP）=820/860=0.953。"}, {"id": 1367, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "下列文件中，既是业主方控制设计进度的依据，也是设计方进度控制依据的是（　　）。", "opts": ["设计准备阶段工作进度计划", "设计和施工招标文件", "设计图纸出图计划", "施工图设计审查计划"], "ans": [2], "exp": "出图计划是设计方进度控制的依据，也是业主方控制设计进度的依据。"}, {"id": 1368, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "single", "q": "对国际工程承包合同，采用争端裁决委员会（DAB）方式处理解决合同争端的特点是（　　）。", "opts": ["具有中立性和终局性并有利于保护守约方权益", "具有强制性和终局性并有利于争端决定的执行", "具有专业性和强制性并有利于快速启动仲裁", "具有中立性和专业性并有利于早期解决争端"], "ans": [3], "exp": "A、B、C选项错误，由于DAB提出的裁决不是强制性的，不具有终局性，合同双方或一方对裁决不满意，仍然可以提请仲裁或诉讼。"}, {"id": 1369, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "英国合同审定联合会制定的建筑工程合同条件（JCT98）的适用条件包括（　　）。", "opts": ["传统的施工总承包项目", "工期较长的大型项目", "设计和项目管理之间的配合度高", "要求业主项目管理人员有丰富经验", "工程量清单单价合同"], "ans": [0, 1, 2, 3], "exp": "JCT98的适用条件包括：①传统的房屋建筑工程，发包前的准备工作完善；②项目复杂程度由低到高都可以适用，尤其适用项目比较复杂，有较复杂的设备安装或专业工作；③设计与项目管理之间的配合紧密程度高，业主主导项目管理的全过程，对业主项目管理人员的经验要求高；④大型项目，合同总金额高，工期较长，至少1年以上；⑤从设计到施工的执行速度较慢；⑥对变更的控制能力强，成本确定性较高；⑦索赔条件较清晰；⑧违约和质量缺陷的风险主要由承包商承担，但工期延误风险由业主和承包商共同承担。"}, {"id": 1370, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "项目质量控制体系的运行环境主要包括（　　）。", "opts": ["质量管理的动力机制", "项目的合同结构", "质量管理的资源配置", "质量管理的持续改进机制", "质量管理的组织制度"], "ans": [1, 2, 4], "exp": "项目质量控制体系的运行环境，主要是指以下几方面为系统运行提供支持的管理关系、组织制度和资源配置的条件：①项目的合同结构；②质量管理的资源配置；③质量管理的组织制度。"}, {"id": 1371, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "竣工验收合格工程的移交是建设工程项目合同实施过程中的一个重要里程碑，该事件代表（　　）。", "opts": ["业主认可并接收工程", "承包人履约义务的结束", "工程照管责任的转移", "承包人保修责任的开始", "工程所有权的转让"], "ans": [0, 2, 3, 4], "exp": "竣工验收合格即办理移交。移交作为一个重要的合同事件，同时又是一个重要的法律概念。它表示：①业主认可并接收工程，承包人工程施工任务的完结；②工程所有权的转让；③承包人工程照管责任的结束和业主工程照管责任的开始；④保修责任的开始；⑤合同规定的工程款支付条款有效。"}, {"id": 1372, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "施工项目成本核算的方法主要有（　　）。", "opts": ["表格核算法", "业务核算法", "会计核算法", "差额计算法", "因素分析法"], "ans": [0, 2], "exp": "施工项目成本核算的方法主要有表格核算法和会计核算法。"}, {"id": 1373, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "政府对工程质量监督管理的内容包括（　　）。", "opts": ["抽查主要建筑材料、建筑构配件的质量", "组织工程竣工验收", "抽查工程结算文件的编制质量", "抽查工程质量责任主体和质量检测单位的工程质量行为", "组织或参与工程质量事故的调查处理"], "ans": [0, 3, 4], "exp": "政府建设行政主管部门和其他有关部门的工程质量监督管理内容应当包括：①执行法律法规和工程建设强制性标准的情况；②抽查涉及工程主体结构安全和主要使用功能的工程实体质量；③抽查工程质量责任主体和质量检测等单位的工程质量行为；④抽查主要建筑材料、建筑构配件的质量；⑤对工程竣工验收进行监督；⑥组织或者参与工程质量事故的调查处理；⑦定期对本地区工程质量状况进行统计分析；⑧依法对违法违规行为实施处罚。"}, {"id": 1374, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "工程施工质量验收环节中，需要进行观感质量验收的有（　　）。", "opts": ["检验批质量验收", "分部工程质量验收", "分项工程质量验收", "单位工程质量验收", "装配式结构质量验收"], "ans": [1, 3], "exp": "分部工程质量验收合格应符合的规定有：①所含分项工程的质量均应验收合格；②质量控制资料应完整；③有关安全、节能、环境保护和主要使用功能的抽样检验结果应符合相应规定；④观感质量应符合要求。单位工程质量验收合格应符合的规定有：①所含分部工程的质量均应验收合格；②质量控制资料应完整；③所含分部工程有关安全、节能、环境保护和主要使用功能的检验资料应完整；④主要使用功能的抽查结果应符合相关专业质量验收规范的规定；⑤观感质量应符合要求。"}, {"id": 1375, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "项目管理机构实施成本控制的依据有（　　）。", "opts": ["质量检查记录", "合同文件", "成本计划", "进度报告", "工程变更资料"], "ans": [1, 2, 3, 4], "exp": "项目管理机构实施成本控制的依据包括：合同文件；成本计划；进度报告；工程变更与索赔资料；各种资源的市场信息。"}, {"id": 1376, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "项目监理机构对施工作业质量进行监督检查的形式有（　　）。", "opts": ["现场互检", "现场旁站", "巡视", "平行检验", "现场专检"], "ans": [1, 2, 3], "exp": "监理工程师应当按照工程监理规范的要求，采取旁站、巡视和平行检验等形式，对建设工程实施监理。"}, {"id": 1377, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "双代号网络图中，虚箭线的作用有（　　）。", "opts": ["强调作用", "联系作用", "区分作用", "断路作用", "分层作用"], "ans": [1, 2, 3], "exp": "虚箭线是实际工作中并不存在的一项虚设工作，故它们既不占用时间，也不消耗资源，一般起着工作之间的联系、区分和断路三个作用。"}, {"id": 1378, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "根据《建筑施工组织设计规范》，施工方案的主要内容包括（　　）。", "opts": ["施工平面布置", "施工进度计划", "施工成本计划", "资源配置计划", "施工方法与工艺要求"], "ans": [1, 3, 4], "exp": "施工方案的主要内容包括：①工程概况；②施工安排；③施工进度计划；④施工准备与资源配置计划；⑤施工方法及工艺要求。"}, {"id": 1379, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "根据《建设工程施工专业分包合同（示范文本）》，分包人的责任和义务包括（　　）。", "opts": ["提供具备施工条件的施工场地", "协调与同一施工场地的其他分包人之间的交叉配合", "编制提交分包工程详细的施工组织设计", "直接向工程师提交分包工程进度统计报表", "负责已完工程交付前的成品保护"], "ans": [2, 4], "exp": "A、B选项属于承包人的责任和义务。D选项错误，在合同约定的时间内，向承包人提供年、季、月度工程进度计划及相应进度统计报表。"}, {"id": 1380, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "根据《建设工程项目管理规范》，项目管理机构负责人的权限有（　　）。", "opts": ["参与组建项目管理机构", "主持项目管理机构工作", "参与签订合同", "负责与项目相关方协调", "主持选定施工分包单位"], "ans": [0, 1, 2], "exp": "项目管理机构负责人的权限包括：①参与项目招标、投标和合同签订；②参与组建项目管理机构；③参与组织对项目各阶段的重大决策；④主持项目管理机构工作；⑤决定授权范围内的项目资源使用；⑥在组织制度的框架下制定项目管理机构管理制度；⑦参与选择并直接管理具有相应资质的分包人；⑧参与选择大宗资源的供应单位；⑨在授权范围内与项目相关方进行直接沟通；⑩法定代表人和组织授予的其他权利。"}, {"id": 1381, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "按费用构成要素划分，下列建筑安装工程费中，应计入企业管理费的有（　　）。", "opts": ["管理人员工资", "材料采购及保管费", "特殊情况下支付的工资", "固定资产使用费", "工具用具使用费"], "ans": [0, 3, 4], "exp": "企业管理费包括：管理人员工资、办公费、差旅交通费、固定资产使用费、工具用具使用费、劳动保险和职工福利费、劳动保护费、检验试验费、工会经费、职工教育经费、财产保险费、财务费、税金、城市维护建设税、教育费附加、地方教育附加、其他。"}, {"id": 1382, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "建设工程施工安全技术交底的主要内容包括（　　）。", "opts": ["本工程项目的施工作业特点和危险点", "作业过程中应注意的安全事项", "针对危险点的具体预防措施", "事故报告的程序与基本要求", "发生事故后应采取的避难和急救措施"], "ans": [0, 1, 2, 4], "exp": "安全技术交底的主要内容包括：①工程项目和分部分项工程的概况；②本施工项目的施工作业特点和危险点；③针对危险点的具体预防措施；④作业中应遵守的安全操作规程以及应注意的安全事项；⑤作业人员发现事故隐患应采取的措施；⑥发生事故后应及时采取的避难和急救措施。"}, {"id": 1383, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "工程网络计划中，工作N有紧后工作，确定其总时差的方法有（　　）。", "opts": ["工作N的最迟完成时间减去其最早完成时间", "工作N紧后工作的最早开始时间减去工作N的最早完成时间", "工作N紧后工作的自由时差加工作N与该紧后工作之间时距的最小值", "工作N与其紧后工作之间间隔时间的最小值", "工作N紧后工作的总时差加工作N与该紧后工作之间间隔时间的最小值"], "ans": [0, 4], "exp": "在双代号网络计划中，工作N的总时差=本工作（最迟开始时间-最早开始时间）=本工作（最迟完成时间-最早完成时间）。在单代号网络计划中，工作N的总时差=紧后工作的总时差+工作N与该紧后工作之间间隔时间的最小值。B、D选项错误，工作N的自由时差=紧后工作的最早开始时间-工作N的最早完成时间=工作N与其紧后工作之间间隔时间的最小值。"}, {"id": 1384, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "建设单位的建设工程项目质量控制责任和义务包括（　　）。", "opts": ["对涉及结构安全的试块、试件及有关材料进行检测", "依法对工程建设有关的重要设备、材料的采购进行招标", "隐蔽工程在隐蔽前通知监理单位和建设工程质量监督机构", "在开工前按照国家有关规定办理工程质量监督手续", "在建设工程竣工验收后向有关部门移交建设项目档案"], "ans": [1, 3, 4], "exp": "建设单位的质量责任和义务中，建设单位应当依法对工程建设项目的勘察、设计、施工、监理以及与工程建设有关的重要设备、材料等的采购进行招标；建设单位在开工前，应当按照国家有关规定办理工程质量监督手续，工程质量监督手续可以与施工许可证或者开工报告合并办理；建设单位应当严格按照国家有关档案管理的规定，及时收集、整理建设项目各环节的文件资料，建立健全建设项目档案，并在建设工程竣工验收后，及时向建设行政主管部门或者其他有关部门移交建设项目档案。"}, {"id": 1385, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "下列建设工程项目进度控制的措施中，属于组织措施的有（　　）。", "opts": ["编制进度控制的工作流程", "进度控制会议的组织设计", "编制相应的资源需求计划", "为实现进度目标变更设计", "明确调整进度计划的管理职能"], "ans": [0, 1, 4], "exp": "组织措施中，进度控制的主要工作环节包括进度目标的分析和论证、编制进度计划、定期跟踪进度计划的执行情况、采取纠偏措施以及调整进度计划。这些工作任务和相应的管理职能应在项目管理组织设计的任务分工表和管理职能分工表中标示并落实。进度控制工作应编制项目进度控制的工作流程，也应进行有关进度控制会议的组织设计。"}, {"id": 1386, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "根据《建设工程项目管理规范》，项目管理规划大纲的内容包括（　　）。", "opts": ["项目质量管理", "项目总体工作安排", "设计与技术措施", "项目收尾管理", "风险管理计划"], "ans": [0, 3], "exp": "项目管理规划大纲包括：①项目概况；②项目范围管理；③项目管理目标；④项目管理组织；⑤项目采购与投标管理；⑥项目进度管理；⑦项目质量管理；⑧项目成本管理；⑨项目安全生产管理；⑩绿色建造与环境管理；⑩项目资源管理；⑩项目信息管理；④项目沟通与相关方管理；④项目风险管理；⑩项目收尾管理。B、C、E选项属于项目管理实施规划的内容。"}, {"id": 1387, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "关于施工成本考核的说法，正确的有（　　）。", "opts": ["公司应以项目成本计划的数量指标作为对项目管理机构成本考核主要指标", "成本考核可以衡量成本降低的实际成果", "成本考核的主要依据是成本计划确定的各类指标", "成本考核要总结和评价成本指标的完成情况", "项目管理机构应根据成本考核结果对相关人员进行奖惩"], "ans": [1, 2, 3, 4], "exp": "A选项错误，公司应以项目成本降低额、项目成本降低率作为对项目管理机构成本考核主要指标。"}, {"id": 1388, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "根据《招标投标法实施条例》，下列招标人的行为中，属于以不合理条件限制、排斥潜在投标人或者投标人的有（　　）。", "opts": ["要求投标人的性质必须是国有企业", "设定的资格条件明显高于招标项目的实际需要", "以项目所在地的业绩作为评标加分条件", "要求投标人不得以联合体的形式投标", "在技术文件中明确了主要设备的性能指标"], "ans": [0, 1, 2], "exp": "招标人有下列行为之一的，属于以不合理条件限制、排斥潜在投标人或者投标人：①就同一招标项目向潜在投标人或者投标人提供有差别的项目信息；②设定的资格、技术、商务条件与招标项目的具体特点和实际需要不相适应或者与合同履行无关；③依法必须进行招标的项目以特定行政区域或者特定行业的业绩、奖项作为加分条件或者中标条件；④对潜在投标人或者投标人采取不同的资格审查或者评标标准；⑤限定或者指定特定的专利、商标、品牌、原产地或者供应商；⑥依法必须进行招标的项目非法限定潜在投标人或者投标人的所有制形式或者组织形式；⑦以其他不合理条件限制、排斥潜在投标人或者投标人。"}, {"id": 1389, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "施工现场空气污染的防治要求有（　　）。", "opts": ["施工现场垃圾渣土要及时清理出现场", "施工现场道路应指定专人定期洒水清扫", "工地茶炉应尽量采用电热水器", "及时焚烧施工现场的油毡、橡胶、各种包装物等废弃物品", "车辆开出工地要做到不带泥砂，基本做到不撒土、不扬尘"], "ans": [0, 1, 2, 4], "exp": "D选项错误，除设有符合规定的装置外，禁止在施工现场焚烧油毡、橡胶、塑料、皮革、树叶、枯草、各种包装物等废弃物品以及其他会产生有毒、有害烟尘和恶臭气体的物质。"}, {"id": 1390, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "某工程双代号时标网络计划执行至第6周末和第10周末检查进度时，实际进度前锋线如下图所示。下列分析结论中，正确的有（　　）。", "opts": ["第6周末检查进度时，工作D拖后1周，影响工期1周", "第10周末检查进度时，工作G拖后1周，不影响工期", "第6周末检查进度时，工作C拖后2周，影响工期2周", "第6周末检查进度时，工作E提前1周，不影响工期", "第10周末检查进度时，工作H已提前完成，不影响工期"], "ans": [2, 3, 4], "exp": "A选项错误，关键线路为①→②→⑤→⑧→⑨→⑩，计算工期为15周，关键工作为A、C、G、K；在第6周末检查进度时，工作D拖后1周，由于有1周的总时差，故不影响工期。B选项错误，在第10周末检查进度时，工作G拖后1周，由于关键工作延后，故影响工期。"}, {"id": 1391, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "关于生产安全事故应急预案管理的说法，正确的有（　　）。", "opts": ["非参建单位的安全生产及应急管理方面的专家，均可受邀参加应急方案评审", "地方各级人民政府应急管理部门的应急预案，应报同级人民政府备案", "生产经营单位应每年至少组织2次综合应急预案演练或者专项应急预案演练", "生产经营单位应每半年至少组织1次现场处置方案演练", "面临的风险发生重大变化时，应急预案应当及时修订并归档"], "ans": [1, 3, 4], "exp": "A选项错误，参加应急预案评审的人员应当包括应急预案涉及的政府部门工作人员和有关安全生产及应急管理方面的专家。评审人员与所评审预案的生产经营单位有利害关系的，应当回避。C选项错误，生产经营单位应当制定本单位的应急预案演练计划，根据本单位的事故预防重点，每年至少组织1次综合应急预案演练或者专项应急预案演练，每半年至少组织1次现场处置方案演练。"}, {"id": 1392, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "在建设工程项目决策阶段，建设单位职业健康安全和环境管理的任务包括（　　）。", "opts": ["提出生产安全事故防范的指导意见", "办理各种有关安全与环境保护方面的审批手续", "委托相关单位进行建设工程项目环境影响评价", "提出保障施工作业人员安全和预防生产安全事故的措施建议", "提供建设工程有关安全施工措施的资料"], "ans": [1, 2], "exp": "在建设工程项目决策阶段，建设单位应按照有关建设工程法律法规的规定和强制性标准的要求，办理各种有关安全与环境保护方面的审批手续。对需要进行环境影响评价或安全预评价的建设工程项目，应组织或委托有相应资质的单位进行建设工程项目环境影响评价和安全预评价。A、D选项在建设工程设计阶段；E选项在建设工程施工阶段。"}, {"id": 1393, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "建设工程项目决策阶段管理工作的主要任务是确定项目的定义，包括的内容有（　　）。", "opts": ["确定和落实项目设备品牌", "确定建设项目的质量目标", "确定和落实项目建设资金", "确定和落实设计单位", "确定和落实建设地点"], "ans": [1, 2, 4], "exp": "决策阶段管理工作的主要任务是确定项目的定义，一般包括：①确定项目实施的组织；②确定和落实建设地点；③确定建设目的、任务和建设的指导思想及原则；④确定和落实项目建设的资金；⑤确定建设项目的投资目标、进度目标和质量目标等。"}, {"id": 1394, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "下列成本管理的措施中，属于组织措施的有（　　）。", "opts": ["进行技术经济分析，确定最佳的施工方案", "对成本管理目标进行风险分析，并制定防范性对策", "编制资金使用计划，确定成本管理目标", "编制成本管理工作计划", "确定合理详细的成本管理工作流程"], "ans": [3, 4], "exp": "A选项属于技术措施；B、C选项属于经济措施。"}, {"id": 1395, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "根据FIDIC《施工合同条件》，不可抗力事件需要满足的条件有（　　）。", "opts": ["一方无法控制", "该方在签订合同前可对其合理预防", "不主要归因于他方", "发生后该方不能合理避免或克服", "发生后将导致合同非正常终止"], "ans": [0, 2, 3], "exp": "不可抗力事件引起的索赔，在新版FIDIC施工合同条件中，不可抗力通常是满足以下条件的特殊事件或情况：一方无法控制的、该方在签订合同前不能对之进行合理防备的、发生后该方不能合理避免或克服的、不主要归因于他方的。不可抗力事件发生导致承包人损失，通常应该由发包人承担，即承包人可以据此提出索赔。"}, {"id": 1396, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "单代号网络计划中，关键线路是指（　　）的线路。", "opts": ["自始至终全部由关键工作组成", "自始至终全部由关键节点组成", "总的工作持续时间最长", "相邻两项工作之间间隔时间均为零的关键工作组成", "自由时差为零的工作组成"], "ans": [2, 3], "exp": "单代号网络计划中，从起点节点开始到终点节点均为关键工作，且所有工作的时间间隔为零的线路为关键线路。在双代号网络计划和单代号网络计划中，关键线路是总的工作持续时间最长的线路。"}, {"id": 1397, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "关于双代号网络计划中关键工作的说法，正确的有（　　）。", "opts": ["关键工作的总时差最小", "关键工作间的时距必为零", "关键工作可以在非关键线路上", "关键线路上相邻关键工作之间的间隔时间必为零", "关键工作的自由时差全部为零"], "ans": [0, 2], "exp": "B、D选项错误，时距、时间间隔属于单代号网络计划的内容。E选项错误，当计划工期（Tp）大于计算工期（Tc）时，关键工作的自由时差不一定为零。"}, {"id": 1398, "source": "真题", "ch": null, "year": "2023", "sourceLabel": "2023年真题", "type": "multi", "q": "与邀请招标方式相比，公开招标方式的特点有（　　）。", "opts": ["招标人有较大的选择范围", "资格审查和评标的工作量大", "有利于降低招标采购的费用", "有利于合理限制不良投标人", "有利于保证竞争的公平性"], "ans": [0, 1, 4], "exp": "C、D选项错误，公开招标的资格审查和评标的工作量比较大，耗时长、费用高，且有可能因资格预审把关不严导致鱼目混珠的现象发生。"}, {"id": 1399, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "固定资产投资项目资本金是指在项目总投资中的（　　）。", "opts": ["建筑安装工程费用与设备工器具费用总和", "铺底流动资金", "建筑安装工程费用", "投资者认缴的出资额"], "ans": [3], "exp": "项目资本金是指在项目总投资中由投资者认缴的出资额。故选D。"}, {"id": 1400, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据《国务院关于投资体制改革的决定》，对于企业不使用政府投资建设的项目，实行的投资管理制度是（　　）。", "opts": ["审批制或核准制", "核准制或登记备案制", "审批制或承诺制", "承诺制或登记备案制"], "ans": [1], "exp": "根据《国务院关于投资体制改革的决定》，按照“谁投资、谁决策、谁收益、谁承担风险”的原则，政府投资项目实行审批制，对于企业不使用政府投资建设的项目，一律不再实行审批制，区别不同情况实行核准制或登记备案制。故选B。"}, {"id": 1401, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "建设工程开工时间是指工程设计文件中规定的任何一项永久性工程（　　）的时间。", "opts": ["施工场址既有建筑物开始拆除", "施工场地平整或临时设施开始施工", "施工用临时道路开始施工", "第一次正式破土开槽开始施工"], "ans": [3], "exp": "建设工程经批准开工建设或取得施工许可证后，即可进入施工阶段。工程开工时间是指该工程设计文件中规定的任何一项永久性工程第一次正式破土开槽开始施工的时间。不需开槽的工程，正式开始打桩的时间就是开工时间。故选D。"}, {"id": 1402, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "与传统的设计—招标—建造（DBB）模式相比，采用工程总承包模式的不足是（　　）。", "opts": ["建设单位前期工作量大", "建设单位合同管理负担重", "不利于缩短建设工期", "不利于建设单位控制工程造价"], "ans": [0], "exp": "采用工程总承包模式的不足：①道德风险高；②建设单位前期工作量大；③工程总承包单位报价高。故选A。"}, {"id": 1403, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "采用联合体方式承包工程时，对联合体各成员单位正确的要求是（　　）。", "opts": ["共同与建设单位签订工程承包合同", "需要具有与工程规模相适应的相同承包资质", "承担相同的工程承包合同义务和责任", "共同与建设单位签订联合体协议"], "ans": [0], "exp": "联合体通常由一家或几家单位发起，经过协商确定各自承担的义务和责任，签署联合体协议，建立联合体组织机构，产生联合体牵头单位（代表），联合体各成员单位共同与建设单位签订工程承包合同。故选A。"}, {"id": 1404, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "建设工程采用CM模式时，CM单位以（　　）的身份进行项目管理。", "opts": ["建设单位", "监理单位", "承包单位", "设计单位"], "ans": [2], "exp": "CM（Construction Management）模式是指由建设单位委托一家CM单位承担项目管理工作，该CM单位以承包单位的身份进行施工管理，并在一定程度上影响工程设计活动，组织快速路径（Fast-Track）的生产方式，使工程项目实现有条件的“边设计、边施工”。故选C。"}, {"id": 1405, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "在建设工程施工准备阶段，项目监理机构需要进行的工作是（　　）。", "opts": ["主持召开图纸会审和设计交底会议", "主持召开第一次工地会议", "核查施工机械和设施的安全许可验收手续", "组织建立工程项目质量安全管理体系"], "ans": [2], "exp": "施工现场质量安全管理组织机构、制度及人员受检。项目监理机构将会检查施工单位现场的施工质量、安全生产管理组织机构和规章制度建立情况，以及专职管理人员配备和特种作业人员的资格，还要核查施工机械和设施的安全许可验收手续。故选C。"}, {"id": 1406, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "施工单位采用新设备、新技术、新材料、新工艺时，应将相应质量认证材料和相关验收标准报送（　　）审查。", "opts": ["项目监理机构", "建设单位", "设计单位", "质量监督机构"], "ans": [0], "exp": "施工单位采用新材料、新工艺、新技术、新设备时，应将相应质量认证材料和相关验收标准报送项目监理机构审查。故选A。"}, {"id": 1407, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "按照项目经理的权限不同，矩阵式项目组织结构可分为不同形式。其中，平衡矩阵式组织结构适用于（　　）的工程项目。", "opts": ["技术较复杂、建设周期较长", "技术较简单、建设周期较短", "技术复杂程度中等、建设周期较长", "技术复杂程度中等、建设周期较短"], "ans": [2], "exp": "平衡矩阵制组织结构适用于中等技术复杂程度且建设周期较长的工程项目。故选C。"}, {"id": 1408, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据《建设项目工程总承包管理规范》，工程总承包项目经理应履行的职责是（　　）。", "opts": ["代表企业签订工程总承包合同", "组织评估工程总承包项目投资估算的合理性", "对项目实施全过程进行策划、组织、协调和控制", "组织选择分包单位并签订工程分包合同"], "ans": [2], "exp": "工程总承包项目经理应履行以下职责：①执行工程总承包企业管理制度，维护企业合法权益；②代表企业组织实施工程总承包项目管理，对实现合同约定的项目目标负责；③完成项目管理目标责任书规定的任务；④在授权范围内负责与项目利益相关者协调，解决项目实施中出现的问题；⑤对项目实施全过程进行策划、组织、协调和控制；⑥负责组织项目的管理收尾和合同收尾工作。故选C。"}, {"id": 1409, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据《建设工程项目管理规范》，编制项目管理规划大纲需进行的工作：①确定项目管理目标；②规定项目管理措施；③编制项目资源计划；④进行项目工作结构分解等。仅就上述工作而言，正确的工作顺序是（　　）。", "opts": ["③→②→①→④", "②→①→③→④", "①→④→②→③", "④→②→③→①"], "ans": [2], "exp": "项目管理规划大纲应按下列程序编制：①明确项目需求和项目管理范围；②确定项目管理目标；③分析项目实施条件，进行项目工作结构分解；④确定项目管理组织模式、组织结构和职责分工；⑤规定项目管理措施；⑥编制项目资源计划；⑦报送审批。故选C。"}, {"id": 1410, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "某单位工程施工进度计划中，工作A由B、C两个分项工程合并而成。已知分项工程B的时间定额和工程量分别是0.35工日/m和5000m，分项工程C的时间定额和工程量分别是0.52工日/m和3000m，则工作A的是（　　）工日/m。", "opts": ["0.41", "0.44", "0.46", "0.67"], "ans": [0], "exp": "综合时间定额（H）=（0.35×5000+0.52×3000）/（5000+3000）=0.41（工日/m）。故选A。"}, {"id": 1411, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "下列管理理念中，属于环境管理体系基本理念的是（　　）。", "opts": ["以顾客为关注焦点", "应用过程方法", "有效管理资源", "注重关系管理"], "ans": [2], "exp": "环境管理体系有如下基本理念：①持续改进；②法律合规；③风险管理；④绩效评估；⑤沟通与参与；⑥资源管理；⑦培训和意识。故选C。"}, {"id": 1412, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据《职业健康安全管理体系要求及使用指南》，建筑企业应界定职业健康安全管理体系的边界和适用性，以满足职业健康安全管理体系标准对（　　）的基本要求。", "opts": ["支持和运行", "绩效评价", "领导作用", "组织所处环境"], "ans": [3], "exp": "职业健康安全管理体系标准对组织所处环境的基本要求：①理解组织及其所处环境。组织应确定与其宗旨相关并影响其实现职业健康安全管理体系预期结果的能力的内部和外部议题。②理解工作人员和其他相关方的需求和期望。组织应确定除工作人员之外的、与职业健康安全管理体系有关的其他相关方；工作人员及其他相关方的有关需求和期望（即要求）；这些需求和期望中哪些是或将可能成为法律法规要求和其他要求。③确定职业健康安全管理体系范围。组织应界定职业健康安全管理体系的边界和适用性，以确定其范围。④职业健康安全管理体系。组织应按照职业健康安全管理体系标准的要求建立、实施、保持和持续改进职业健康安全管理体系，包括所需的过程及其相互作用。故选D。"}, {"id": 1413, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据《卓越绩效评价准则》，建筑企业实施卓越绩效管理，在组织驱动力层面应遵循的基本理念是（　　）。", "opts": ["以战略统领组织的管理活动", "学习、改进与创新", "重视过程与关注结果", "确保组织中员工的发展和权益"], "ans": [0], "exp": "组织驱动力的基本理念：①远见卓识的领导。以前瞻性的视野、敏锐的洞察力，确立组织的使命、愿景和价值观，带领全体员工实现组织的发展战略和目标。②战略导向。以战略统领组织的管理活动，获得持续发展和成功。③顾客驱动。将顾客当前和未来的需求、期望和偏好作为改进产品和服务质量，提高管理水平及不断创新的动力，以提高顾客的满意和忠诚程度。故选A。"}, {"id": 1414, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据《质量管理体系要求》，下列质量管理活动中，属于顾客导向过程的是（　　）。", "opts": ["质量目标策划", "质量风险应对", "外部供应产品质量控制", "产品交付后的防护"], "ans": [3], "exp": "顾客导向过程是指通过输入和输出直接与外部顾客联系的过程。顾客导向过程直接对顾客产生影响，给组织直接带来效益。市场需求的确定、产品和服务的
