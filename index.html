  isAnswered: false,
  selectedAnswers: [],
  answers: {},      // {id: [index,...]}
  wrongIds: new Set(),
  starredIds: new Set(),
  progress: {},     // {id: true} for answered questions
  showAnswer: true,
  shuffle: false,
  examTime: 60,
  randomCount: 15,
  timerInterval: null,
  examStartTime: null,
  examTimeLeft: 0,
};

// Init
function init() {
  loadFromStorage();
  updateStats();
  document.getElementById("versionDisplay").textContent = APP_VERSION;
  document.getElementById("versionBadge").textContent = "v1.0";
  document.querySelectorAll(".tab").forEach(function(t) {
    t.addEventListener("click", function() {
      switchTab(this.dataset.tab);
    });
  });
  document.getElementById("filterSection").addEventListener("change", updateStats);
  document.getElementById("filterType").addEventListener("change", updateStats);
}
function switchTab(name) {
  document.querySelectorAll(".tab").forEach(function(t) {
    t.classList.toggle("active", t.dataset.tab === name);
  });
  document.querySelectorAll(".panel").forEach(function(p) {
    p.classList.remove("active");
  });
  var panel = document.getElementById("panel-" + name);
  if (panel) panel.classList.add("active");
  if (name === "home") updateStats();
  if (name === "answerCard") renderAnswerCard();
}

// Storage
function saveToStorage() {
  try {
    localStorage.setItem("yjgl_answers", JSON.stringify(state.answers));
    localStorage.setItem("yjgl_wrong", JSON.stringify(Array.from(state.wrongIds)));
    localStorage.setItem("yjgl_starred", JSON.stringify(Array.from(state.starredIds)));
    localStorage.setItem("yjgl_progress", JSON.stringify(state.progress));
    localStorage.setItem("yjgl_settings", JSON.stringify({showAnswer:state.showAnswer,shuffle:state.shuffle,examTime:state.examTime}));
  } catch(e) {}
}
function loadFromStorage() {
  try {
    var a = JSON.parse(localStorage.getItem("yjgl_answers") || "{}");
    state.answers = a;
    var w = JSON.parse(localStorage.getItem("yjgl_wrong") || "[]");
    state.wrongIds = new Set(w);
    var s = JSON.parse(localStorage.getItem("yjgl_starred") || "[]");
    state.starredIds = new Set(s);
    var p = JSON.parse(localStorage.getItem("yjgl_progress") || "{}");
    state.progress = p;
    var st = JSON.parse(localStorage.getItem("yjgl_settings") || "{}");
    if (st.showAnswer !== undefined) state.showAnswer = st.showAnswer;
    if (st.shuffle !== undefined) state.shuffle = st.shuffle;
    if (st.examTime) state.examTime = st.examTime;
    // Update UI toggles
    document.getElementById("toggleShowAnswer").classList.toggle("on", state.showAnswer);
    document.getElementById("toggleShuffle").classList.toggle("on", state.shuffle);
    document.getElementById("examTimeDisplay").textContent = state.examTime;
  document.getElementById("randomCountDisplay").textContent = state.randomCount;
  } catch(e) {}
}

// Get filtered questions
function getFilteredQuestions() {
  var sec = document.getElementById("filterSection").value;
  var type = document.getElementById("filterType").value;
  return QUESTIONS.filter(function(q) {
    if (type !== "all" && q.type !== type) return false;
    if (sec === "all") return true;
    if (sec.startsWith("ch")) {
      var chNum = parseInt(sec.slice(2));
      return q.ch === chNum;
    }
    if (sec.startsWith("year")) {
      var y = sec.slice(4);
      return q.year === y;
    }
    return true;
  });
}

// Stats
function updateStats() {
  var filtered = getFilteredQuestions();
  var total = filtered.length;
  var done = 0, correct = 0, wrong = 0;
  filtered.forEach(function(q) {
    var ans = state.answers[q.id];
    if (ans !== undefined) {
      done++;
      if (isCorrect(q, ans)) correct++;
      else wrong++;
    }
  });
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statDone").textContent = done;
  document.getElementById("statRate").textContent = done > 0 ? Math.round(correct/done*100) + "%" : "0%";
  document.getElementById("statWrong").textContent = state.wrongIds.size;
}

function isCorrect(q, ans) {
  if (!ans || !q.ans) return false;
  if (q.type === "single") return ans[0] === q.ans[0];
  if (q.type === "multi") {
    if (ans.length !== q.ans.length) return false;
    var a = ans.slice().sort();
    var b = q.ans.slice().sort();
    return a.every(function(v,i){return v===b[i];});
  }
  return false;
}

// Start practice
function startPractice() {
  var questions = getFilteredQuestions();
  if (questions.length === 0) { showToast("没有符合条件的题目"); return; }
  var toUse = questions.slice();
  if (state.shuffle) shuffleArray(toUse);
  state.currentQuestions = toUse;
  state.currentIndex = 0;
  state.mode = "practice";
  enterPractice();
}

function startExam() {
  var questions = getFilteredQuestions();
  if (questions.length === 0) { showToast("没有符合条件的题目"); return; }
  var toUse = questions.slice();
  if (state.shuffle) shuffleArray(toUse);
  state.currentQuestions = toUse;
  state.currentIndex = 0;
  state.mode = "exam";
  state.examStartTime = Date.now();
  state.examTimeLeft = state.examTime * 60;
  enterPractice();
  startTimer();
}

function enterPractice() {
  switchTab("practice");
  document.getElementById("panel-home").classList.remove("active");
  document.getElementById("panel-practice").classList.add("active");
  renderQuestion();
}

function backToHome() {
  if (state.mode === "exam" && state.timerInterval) {
    if (!confirm("考试模式中返回将终止考试，确定返回？")) return;
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
  switchTab("home");
}

// Render question
function renderQuestion() {
  var qs = state.currentQuestions;
  if (qs.length === 0) {
    document.getElementById("questionArea").innerHTML = '<div class="empty"><div class="icon">✅</div><div>没有题目</div></div>';
    return;
  }
  var idx = state.currentIndex;
  var q = qs[idx];
  var total = qs.length;
  document.getElementById("progressInfo").textContent = (idx + 1) + "/" + total;
  document.getElementById("progressFill").style.width = ((idx + 1) / total * 100) + "%";

  var modeLabel = state.mode === "exam" ? "考试模式" : "刷题模式";
  var timerHtml = "";
  if (state.mode === "exam") {
    var m = Math.floor(state.examTimeLeft / 60);
    var s = state.examTimeLeft % 60;
    timerHtml = '<span class="timer" id="examTimer">' + m + ":" + (s<10?"0":"") + s + "</span>";
  }
  document.getElementById("practiceTitle").innerHTML = modeLabel + " " + timerHtml;

  var srcLabel = q.sourceLabel || "";
  var typeLabel = q.type === "single" ? "单选题" : "多选题";
  var starClass = state.starredIds.has(q.id) ? " active" : "";
  var prevDisabled = idx === 0 ? " disabled" : "";
  var nextDisabled = idx >= total - 1 ? " disabled" : "";

  var optsHtml = "";
  var labels = ["A", "B", "C", "D", "E"];
  q.opts.forEach(function(opt, i) {
    optsHtml += '<div class="option" data-opt="' + i + '" onclick="selectOption(' + i + ')">' +
      '<span class="tag">' + labels[i] + "</span>" +
      '<span class="text">' + escHtml(opt) + "</span></div>";
  });

  var prevAns = state.answers[q.id];
  var showFeedback = false;
  if (state.isAnswered && state.showAnswer) showFeedback = true;

  var feedbackHtml = "";
  if (state.isAnswered && state.showAnswer) {
    var corr = isCorrect(q, state.selectedAnswers);
    var fc = corr ? "correct" : "wrong";
    var txt = corr ? "✅ 回答正确！" : "❌ 回答错误";
    feedbackHtml = '<div class="feedback show ' + fc + '">' + txt + "<br><strong>解析：</strong>" + escHtml(q.exp || "无解析") + "</div>";
  }

  document.getElementById("questionArea").innerHTML =
    '<div class="q-card">' +
    '<div class="q-meta">' +
    '<span class="src">' + escHtml(srcLabel) + "</span>" +
    '<span class="tag-type">' + typeLabel + "</span>" +
    "</div>" +
    '<div class="q-text">' + escHtml(q.q) + "</div>" +
    '<div class="options" id="optionsContainer">' + optsHtml + "</div>" +
    feedbackHtml +
    '<div class="q-actions">' +
    "<button class='btn-outline' onclick='prevQuestion()' " + prevDisabled + ">← 上一题</button>" +
    "<button class='btn-primary' onclick='submitAnswer()' id='submitBtn'>提交</button>" +
    "<button class='btn-star" + starClass + "' onclick='toggleStar(" + q.id + ")' id='starBtn'>⭐</button>" +
    "<button class='btn-outline' onclick='nextQuestion()' " + nextDisabled + ">下一题 →</button>" +
    "</div></div>";

  // Apply previous selections
  state.isAnswered = false;
  state.selectedAnswers = [];
  if (prevAns) {
    state.isAnswered = true;
    state.selectedAnswers = prevAns.slice();
    applyAnswerState(q);
  }
}

function escHtml(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function selectOption(idx) {
  if (state.isAnswered) return;
  var q = state.currentQuestions[state.currentIndex];
  var opts = document.querySelectorAll("#optionsContainer .option");
  if (q.type === "single") {
    opts.forEach(function(o) { o.classList.remove("selected"); });
    opts[idx].classList.add("selected");
    state.selectedAnswers = [idx];
  } else {
    opts[idx].classList.toggle("selected");
    var sel = [];
    opts.forEach(function(o, i) {
      if (o.classList.contains("selected")) sel.push(i);
    });
    state.selectedAnswers = sel;
  }
}

function submitAnswer() {
  if (state.isAnswered) return;
  var q = state.currentQuestions[state.currentIndex];
  if (state.selectedAnswers.length === 0) { showToast("请先选择答案"); return; }

  state.isAnswered = true;
  var prevAns = state.answers[q.id];
  state.answers[q.id] = state.selectedAnswers.slice();
  state.progress[q.id] = true;

  var correct = isCorrect(q, state.selectedAnswers);
  if (correct) {
    if (state.wrongIds.has(q.id)) state.wrongIds.delete(q.id);
  } else {
    state.wrongIds.add(q.id);
  }

  saveToStorage();
  applyAnswerState(q);
  if (state.showAnswer) renderQuestion();
  updateStats();
  if (state.mode === "exam") autoNext();
}

function applyAnswerState(q) {
  var opts = document.querySelectorAll("#optionsContainer .option");
  var ans = state.selectedAnswers;
  var correct = isCorrect(q, ans);

  opts.forEach(function(o, i) {
    o.classList.add("disabled");
    o.classList.remove("selected", "correct", "wrong");

    if (q.ans.indexOf(i) >= 0) {
      o.classList.add("correct");
    } else if (ans.indexOf(i) >= 0) {
      o.classList.add("wrong");
    }

    // In exam mode, also show which was selected
    if (ans.indexOf(i) >= 0) {
      o.classList.add(q.ans.indexOf(i) >= 0 ? "correct" : "wrong");
    }
  });

  // Show feedback
  var fb = document.querySelector(".feedback");
  if (fb && state.showAnswer) {
    fb.classList.add("show");
    fb.className = "feedback show " + (correct ? "correct" : "wrong");
    fb.innerHTML = (correct ? "✅ 回答正确！" : "❌ 回答错误") + "<br><strong>解析：</strong>" + escHtml(q.exp || "无解析");
  }

  document.getElementById("submitBtn").textContent = "已提交";
  document.getElementById("submitBtn").disabled = true;
}

function autoNext() {
  setTimeout(function() {
    if (state.currentIndex < state.currentQuestions.length - 1) {
      nextQuestion();
    }
  }, 800);
}

function nextQuestion() {
  if (state.currentIndex >= state.currentQuestions.length - 1) return;
  state.currentIndex++;
  renderQuestion();
}

function prevQuestion() {
  if (state.currentIndex <= 0) return;
  state.currentIndex--;
  renderQuestion();
}

// Timer
function startTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(function() {
    state.examTimeLeft--;
    var t = document.getElementById("examTimer");
    if (t) {
      var m = Math.floor(state.examTimeLeft / 60);
      var s = state.examTimeLeft % 60;
      t.textContent = m + ":" + (s < 10 ? "0" : "") + s;
    }
    if (state.examTimeLeft <= 0) {
      endExam();
    }
  }, 1000);
}

function endExam() {
  clearInterval(state.timerInterval);
  state.timerInterval = null;
  showToast("时间到！考试结束");
  saveToStorage();
  updateStats();
  // Show results
  var qs = state.currentQuestions;
  var total = qs.length;
  var correct = 0;
  qs.forEach(function(q) {
    var ans = state.answers[q.id];
    if (ans && isCorrect(q, ans)) correct++;
  });
  setTimeout(function() {
    alert("考试结束！\n总题数：" + total + "\n正确：" + correct + "\n错误：" + (total - correct) + "\n正确率：" + Math.round(correct/total*100) + "%");
    backToHome();
  }, 500);
}

// Star
function toggleStar(id) {
  if (state.starredIds.has(id)) {
    state.starredIds.delete(id);
  } else {
    state.starredIds.add(id);
  }
  saveToStorage();
  var btn = document.getElementById("starBtn");
  if (btn) btn.classList.toggle("active");
  showToast(state.starredIds.has(id) ? "已收藏" : "已取消收藏");
}

// Wrong
function showWrong() {
  var wrongList = [];
  state.wrongIds.forEach(function(id) {
    var q = QUESTIONS.find(function(x) { return x.id === id; });
    if (q) wrongList.push(q);
  });
  if (wrongList.length === 0) { showToast("没有错题"); return; }
  if (state.shuffle) shuffleArray(wrongList);
  state.currentQuestions = wrongList;
  state.currentIndex = 0;
  state.mode = "practice";
  enterPractice();
}

// Favorites
function showFavorites() {
  var favList = [];
  state.starredIds.forEach(function(id) {
    var q = QUESTIONS.find(function(x) { return x.id === id; });
    if (q) favList.push(q);
  });
  if (favList.length === 0) { showToast("没有收藏的题目"); return; }
  if (state.shuffle) shuffleArray(favList);
  state.currentQuestions = favList;
  state.currentIndex = 0;
  state.mode = "practice";
  enterPractice();
}

// Answer Card
function renderAnswerCard() {
  var qs = state.currentQuestions.length > 0 ? state.currentQuestions : QUESTIONS;
  var total = qs.length;
  var answered = 0;
  qs.forEach(function(q) {
    if (state.answers[q.id] !== undefined) answered++;
  });
  document.getElementById("ansCardInfo").textContent = answered + "/" + total;

  var html = '<div class="ans-card">';
  qs.forEach(function(q, i) {
    var ans = state.answers[q.id];
    var qnoClass = "qno";
    var cur = state.currentQuestions.length > 0 && i === state.currentIndex ? " current-q" : "";
    if (ans !== undefined) {
      if (isCorrect(q, ans)) {
        qnoClass += " answered" + cur;
      } else {
        qnoClass += " answered-wrong" + cur;
      }
    } else {
      qnoClass += cur;
    }
    if (state.starredIds.has(q.id)) qnoClass += " starred";
    html += '<div class="ans-item" onclick="jumpToQuestion(' + i + ')">' +
      '<span class="' + qnoClass + '">' + (i + 1) + "</span>" +
      '<span class="q-texto">' + escHtml(q.q.substring(0, 30)) + "</span>" +
      "</div>";
  });
  html += "</div>";
  document.getElementById("ansCardList").innerHTML = html;
}

function jumpToQuestion(idx) {
  if (state.currentQuestions.length === 0) {
    state.currentQuestions = QUESTIONS.slice();
  }
  state.currentIndex = idx;
  state.mode = "practice";
  switchTab("practice");
  document.getElementById("panel-home").classList.remove("active");
  document.getElementById("panel-practice").classList.add("active");
  renderQuestion();
}

// Settings
function toggleSetting(name) {
  state[name] = !state[name];
  var el = document.getElementById("toggle" + name.charAt(0).toUpperCase() + name.slice(1));
  el.classList.toggle("on", state[name]);
  saveToStorage();
}

function adjExamTime(delta) {
  state.examTime = Math.max(10, Math.min(180, state.examTime + delta));
  document.getElementById("examTimeDisplay").textContent = state.examTime;
  document.getElementById("randomCountDisplay").textContent = state.randomCount;
  saveToStorage();
}

function adjRandomCount(delta) {
  state.randomCount = Math.max(5, Math.min(100, state.randomCount + delta));
  document.getElementById("randomCountDisplay").textContent = state.randomCount;
  saveToStorage();
}

function clearAllProgress() {
  if (!confirm("确定清除所有进度、错题和收藏吗？")) return;
  state.answers = {};
  state.wrongIds = new Set();
  state.starredIds = new Set();
  state.progress = {};
  saveToStorage();
  updateStats();
  showToast("已清除所有数据");
}

function shuffleArray(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i];
    arr[i] = arr[j];
    arr[j] = tmp;
  }
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function() { t.classList.remove("show"); }, 2000);
}


// Random Practice
function startRandomPractice() {
  var questions = getFilteredQuestions();
  if (questions.length === 0) { showToast("没有符合条件的题目"); return; }
  
  var count = state.randomCount || 15;
  var shuffled = questions.slice();
  shuffleArray(shuffled);
  var toUse = shuffled.slice(0, Math.min(count, shuffled.length));
  
  state.currentQuestions = toUse;
  state.currentIndex = 0;
  state.mode = "practice";
  enterPractice();
}

// Init on load
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
