开发、产品生产和服务提供的控制、产品交付后的防护活动即属于顾客导向过程。故选D。"}, {"id": 1415, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "建筑企业应践行ESG发展理念。这里的“ESG”分别指的是（　　）。", "opts": ["生态、社会、治理", "环境、社会、治理", "环境、监督、绿色", "生态、监督、绿色"], "ans": [1], "exp": "ESG是环境（Environmental）、社会（Social）、治理（Governance）的缩写，是从环境、社会和公司治理三个维度来衡量企业经营的可持续性与对社会价值观念的影响。故选B。"}, {"id": 1416, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据《社会责任指南》，为履行“公平运行实践”的核心主题，建筑企业应确定的社会责任议题是（　　）。", "opts": ["民主管理", "尊重产权", "职业健康安全", "收入创造"], "ans": [1], "exp": "公平运行实践的内容：①反腐败；②公平竞争；③在价值链中促进社会责任；④尊重产权。故选B。"}, {"id": 1417, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据《建设工程项目管理规范》，项目沟通管理首先应进行的工作是（　　）。", "opts": ["项目实施目标分解", "制定项目沟通计划", "明确项目沟通内容", "分析项目相关方需求"], "ans": [0], "exp": "项目沟通管理应按下列程序进行：①项目实施目标分解；②分析各分解目标自身需求和相关方需求；③评估各目标的需求差异；④制定项目沟通计划；⑤明确沟通责任人、沟通内容和沟通方案；⑥按既定方案进行沟通；⑦总结评价沟通效果。故选A。"}, {"id": 1418, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "与公开招标方式相比，采用邀请招标方式具有的优点是（　　）。", "opts": ["招标人不需要发出投标邀请函", "投标人不需要提交表明其资质的证明材料", "评标时不需要对投标文件进行合格性审查", "招标中不需要设置资格预审程序"], "ans": [3], "exp": "与公开招标方式相比，采用邀请招标方式的优点是不需要发布招标公告和设置资格预审程序，可节约招标费用、缩短招标时间。故选D。"}, {"id": 1419, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "工程施工合同采用目标成本加奖罚计价方式时，合同价款正确的计算方式是（　　）。", "opts": ["实际发生的直接费+目标成本×基本酬金计算百分比+奖罚酬金", "目标成本×（1+基本酬金计算百分比）+奖罚酬金", "目标成本+实际发生的直接费×基本酬金计算百分比+奖罚酬金", "实际发生的直接费×（1+基本酬金计算百分比）+奖罚酬金"], "ans": [0], "exp": "目标成本加奖罚合同价款计算：C=Cd+P1C0+P2（C0-Cd）=实际发生的直接费+目标成本×基本酬金计算百分比+奖罚酬金百分比（目标成本-实际发生的直接费）=实际发生的直接费+目标成本×基本酬金计算百分比+奖罚酬金。故选A。"}, {"id": 1420, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "下列工程中，施工单位在投标时可选择报低价的是（　　）。", "opts": ["工期要求紧的工程", "支付条件好的工程", "技术复杂的工程", "施工条件差的工程"], "ans": [1], "exp": "承包单位遇到下列情形时，其报价可低一些：①施工条件好的工程，工作简单、工程量大而其他施工单位都可以做的工程（如大量土方工程、一般房屋建筑工程等）；②承包单位急于打入某一市场、某一地区，或虽已在某一地区经营多年，但即将面临没有工程的情况，机械设备无工地转移时；③附近有工程而本项目可利用该工程的机械设备、劳务或有条件短期内突击完成的工程；④投标对手多，竞争激烈的工程；⑤非急需工程；⑥支付条件好的工程。故选B。"}, {"id": 1421, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据《标准施工招标文件》，发包人提供的工程设备，应在工程设备到货（　　）天前通知承包人。", "opts": ["7", "3", "5", "14"], "ans": [0], "exp": "承包人应根据合同进度计划安排，向监理人报送要求发包人交货的日期计划。发包人应按照监理人与合同双方当事人商定的交货日期，向承包人提交材料和工程设备。发包人应在材料和工程设备到货7天前通知承包人，承包人应会同监理人在约定的时间内，赴交货地点共同进行验收。故选A。"}, {"id": 1422, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "工程施工合同履行过程中，承包人应履行的义务是（　　）。", "opts": ["组织审查施工图设计文件", "查勘施工现场", "取得出入施工场地的专用道路通行权", "组织工程竣工预验收"], "ans": [1], "exp": "承包人主要义务：①查勘施工现场；②编制工程实施措施计划；③负责施工现场内交通道路和临时工程；④测设施工控制网；⑤提出开工申请；⑥完成各项承包工作；⑦保证工程施工和人员的安全；⑧负责施工场地及其周边环境与生态的保护工作；⑨避免施工对公众与他人的利益造成损害；⑩工程的维护和照管。故选B。"}, {"id": 1423, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据《标准施工招标文件》，除专用合同条款另有约定外，进行工程试运行的正确做法是（　　）。", "opts": ["承包人负责提供人员、器材和必要的条件，并承担全部试运行费用", "承包人负责提供人员、器材和必要的条件，发包人承担全部试运行费用", "发包人负责提供人员、器材和必要的条件，并承担全部试运行费用", "发包人负责提供人员、器材和必要的条件，承包人承担全部试运行费用"], "ans": [0], "exp": "承包人应按专用合同条款约定进行工程及工程设备试运行，负责提供试运行所需的人员、器材和必要的条件，并承担全部试运行费用。故选A。"}, {"id": 1424, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据《标准施工招标文件》，除专用合同条款另有约定外，经验收合格工程的实际竣工日期是（　　）。", "opts": ["施工合同约定的竣工日期", "工程接收证书的出具日期", "承包人提交竣工付款申请单的日期", "承包人提交竣工验收申请报告的日期"], "ans": [3], "exp": "除专用合同条款另有约定外，经验收合格工程的实际竣工日期，以提交竣工验收申请报告的日期为准，并在工程接收证书中写明。故选D。"}, {"id": 1425, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据《标准施工招标文件》，关于工程计量的说法，正确的是（　　）。", "opts": ["单价子目按实际完成工程量计量", "单价子目按支付分解报告确定的周期计量", "总价子目的计量可按正常物价波动进行调整", "承包人应会同监理人对已完工程进行计量"], "ans": [3], "exp": "选项AB错误，除专用合同条款另有约定外，单价子目已完成工程量按月计量，总价子目的计量周期按批准的支付分解报告确定。已标价工程量清单中的单价子目工程量为估算工程量。结算工程量是承包人实际完成的，并按合同约定的计量方法进行计量的工程量。选项C错误，总价子目计量和支付应以总价为基础，不因正常的物价波动而进行调整。故选D。"}, {"id": 1426, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据《建设工程施工专业分包合同（示范文本）》，关于专业分包合同价款及支付的说法，正确的是（　　）。", "opts": ["分包合同计价方式应与总包合同约定的方式一致", "分包合同价款应参照总包合同相应部分价款确定", "承包人无须向分包人支付工程预付款", "承包人确认计量结果后7天内支付分包工程进度款"], "ans": [0], "exp": "选项B错误，分包合同价款与总包合同相应部分价款无任何连带关系。选项CD错误，实行工程预付款的，双方应在分包工程专用合同条款中约定：承包人向分包人预付工程款的时间和数额，开工后按约定的时间和比例逐次扣回；在确认计量结果后10天内，承包人向分包人支付工程款（进度款）；③按约定时间承包人应扣回的预付款，与工程款（进度款）同期结算。故选A。"}, {"id": 1427, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据材料设备采购合同，质量保证期起算时间为（　　）。", "opts": ["材料设备采购后", "材料设备交付后", "材料设备验收后", "工程竣工验收后"], "ans": [2], "exp": "除专用合同条款和（或）供货要求等合同文件另有约定外，合同材料的质量保证期自合同材料验收之日起算，至合同材料验收证书或进度款支付函签署之日起12个月止（以先到的为准）。除专用合同条款和（或）供货要求等合同文件另有约定外，合同设备整体质量保证期为验收之日起12个月。对合同设备中关键部件的质量保证期有特殊要求的，买卖双方可在专用合同条款中约定。故选C。"}, {"id": 1428, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据《住房城乡建设部财政部关于印发建设工程质量保证金管理办法的通知》，关于工程质量保证金的说法，正确的是（　　）。", "opts": ["工程质量保证金总预留比例不得高于工程价款结算总额的5%", "工程质量保证金需要与履约保证金一并预留", "工程质量保证金可由承包人以银行保函替代", "工程质量保证金可用于施工过程中工程质量缺陷的修复"], "ans": [2], "exp": "选项A错误，工程质量保证金总预留比例不得高于工程价款结算总额的3%。选项B错误，在工程竣工前，承包人已缴纳履约保证金的，发包人不得同时预留工程质量保证金。选项D错误，工程质量保证金是指发承包双方在施工合同中约定，从应付工程款中预留，用以保证承包人在缺陷责任期内对工程施工质量缺陷进行维修的资金。故选C。"}, {"id": 1429, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "下列工程保险中，属于职业责任保险的是（　　）。", "opts": ["意外伤害险", "设计责任险", "第三者责任险", "施工人员工伤险"], "ans": [1], "exp": "工程设计责任险是指以工程设计单位因设计工作疏忽或过失而引发工程质量事故造成损失或费用应承担的经济赔偿责任为保险标的的职业责任保险。故选B。"}, {"id": 1430, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "在下列影响施工过程的不利因素中，属于社会环境影响因素的是（　　）。", "opts": ["不明水文气象", "地下埋葬文物的处理", "建设资金不到位", "临时停水、停电、断路"], "ans": [3], "exp": "社会环境原因：①其他单位临近工程的施工干扰；②节假日交通、市容整顿限制；③临时停水、停电、断路；④在国外因法律及制度变化，经济制裁，战争、骚乱、罢工、企业倒闭，汇率浮动和通货膨胀等。故选D。"}, {"id": 1431, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "建设单位进度计划系统中，用来明确设计文件交付日期、主要设备交货日期、施工单位进场日期、水电及道路接通日期等的计划表是（　　）。", "opts": ["工程项目综合进度计划表", "工程项目总进度计划表", "工程项目年度计划表", "工程项目进度平衡表"], "ans": [3], "exp": "工程项目进度平衡表主要用来明确设计文件交付日期、主要设备交货日期、施工单位进场日期、水电及道路接通日期等，以保证工程建设中各环节相互衔接，确保工程项目按期投产或交付使用。故选D。"}, {"id": 1432, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "下列流水施工参数中属于工艺参数的是（　　）。", "opts": ["流水段和流水步距", "流水步距和流水强度", "流水强度和施工过程", "施工过程和流水段"], "ans": [2], "exp": "工艺参数是指在组织流水施工时，用以表达流水施工在施工工艺方面进展状态的参数，通常包括施工过程和流水强度两个参数。故选C。"}, {"id": 1433, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "某分部工程有4个施工过程，划分为3个施工段组织加快的成倍节拍流水施工，流水节拍分别为4天、6天、4天和2天，该分部工程需安排的专业工作队数是（　　）个。", "opts": ["8", "3", "4", "6"], "ans": [0], "exp": "流水节拍4天、6天、4天和2天最大公约数为2，工作队数量：（4+6+4+2）/2=8（个）。故选A。"}, {"id": 1434, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "双代号时标网络计划中，某工作箭线中的波形线水平投影长度表示的是（　　）。", "opts": ["该工作的自由时差", "该工作的总时差", "该工作与其紧后工作之间的时间间隔", "该工作与其紧后工作之间的时距"], "ans": [2], "exp": "以波形线表示工作与其紧后工作之间的时间间隔。故选C。"}, {"id": 1435, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "单代号搭接网络计划中，关键线路是指（　　）的线路。", "opts": ["自始至终由关键工作组成", "相邻两项工作之间的时间间隔均为零", "相邻两项工作之间的时距均为零", "自始至终由关键节点组成"], "ans": [1], "exp": "保证相邻两项关键工作之间的时间间隔为零而构成的线路就是关键线路。故选B。"}, {"id": 1436, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "工程施工过程中，通过缩短关键工作的持续时间来调整施工进度计划时，可采取的技术措施是（　　）。", "opts": ["采用更先进的施工机械", "改善施工作业环境", "增加施工机械数量", "组织更多施工队伍"], "ans": [0], "exp": "为压缩某些工作的持续时间，通常需要采取以下措施来达到目的：①组织措施。如增加工作面，组织更多施工队伍；增加每天施工时间，采用加班或多班制施工方式；增加劳动力和施工机械数量等。②技术措施。如改进施工工艺和施工技术，缩短工艺技术间歇时间；采用更先进的施工方式（如将现浇混凝土方案改为预制装配方案），减少施工过程数量；采用更先进的施工机械等。③经济措施。如实行包干奖励；提高奖金数额；对所采取的技术措施给予相应经济补偿等。④其他配套措施。如改善外部配合条件；改善施工作业环境；实施强有力的组织调度等。选项B属于其他配套措施。选项CD属于组织措施。故选A。"}, {"id": 1437, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "某工程网络计划执行过程中，经检查发现仅有工作D的实际进度拖后4天。该工作原计划总时差和自由时差分别为5天和2天，则工作D实际进度拖后造成的影响是（　　）。", "opts": ["影响后续工作最迟开始时间，但不影响总工期", "使紧后工作最早开始时间推迟2天，但不影响总工期", "使紧后工作最早开始时间推迟1天，总工期延长2天", "不影响后续工作最早开始时间，但会影响总工期"], "ans": [1], "exp": "当工作实际进度拖后的时间（偏差）超过该工作的自由时差，但未超过该工作的总时差时，则该工作实际进度偏差会影响该工作后续工作的正常进行，但不会影响总工期。题目中总时差5>4，不影响总工期，4-2=2（天），紧后工作最早开始时间推迟2天。故选B。"}, {"id": 1438, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "建设工程投资决策和建设实施的不同阶段对工程质量有着不同程度的影响。其中对工程质量有着决定性影响的是（　　）。", "opts": ["工程投资决策", "工程勘察设计", "工程施工", "工程竣工验收"], "ans": [1], "exp": "勘察设计阶段是影响工程质量的决定性阶段。故选B。"}, {"id": 1439, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "建设工程项目质量管理体系通常是一个多层次结构体系，其中，由施工总承包单位建立的质量管理体系应属于质量管理体系的第（　　）层次。", "opts": ["一", "三", "二", "四"], "ans": [2], "exp": "第一层次的质量管理体系应由建设单位的工程项目管理机构负责建立；在委托项目管理或实行交钥匙式工程总承包的情况下，应由相应的项目管理机构、工程总承包企业项目管理机构负责建立。第二层次的质量管理体系，是指分别由项目的设计总负责单位、施工总承包单位等建立的相应管理范围内的质量管理体系。第三层次及以下，是承担工程设计、施工安装、材料设备供应等各承包单位的现场质量自控体系，或称各自的施工质量保证体系。故选C。"}, {"id": 1440, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "下列施工质量的物理检验方法中，属于无损检测的是（　　）。", "opts": ["钢材焊接质量的超声波探伤检测", "钢材抗拉、抗弯性能检测", "桩基静载试验检测", "给水管道的压力检测"], "ans": [0], "exp": "常用的无损检测方法是射线探伤法、超声波探伤法等。故选A。"}, {"id": 1441, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "工程施工中进行工序质量检验时，可采用的随机抽样方法是（　　）。", "opts": ["简单随机抽样", "分级随机抽样", "系统随机抽样", "分层随机抽样"], "ans": [2], "exp": "系统随机抽样是指将总体中的抽样单元按某种次序排列，在规定范围内随机抽取一个或一组初始单元，然后按一套规则确定其他样本单元的抽样方法。这种方法主要用于工序质量检验。故选C。"}, {"id": 1442, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "下列施工质量控制工作中，属于事中控制工作内容的是（　　）。", "opts": ["监控质量活动过程", "编制施工方案", "评定质量活动结果", "纠正质量偏差"], "ans": [0], "exp": "事中控制是指对产品生产过程中各项作业技术活动操作者的行为约束和对质量活动过程和结果的监督控制。故选A。"}, {"id": 1443, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "工程施工过程中，施工单位对施工质量的“三检”制度指的是（　　）。", "opts": ["事前检—事中检—事后检", "自检—监理检—业主检", "自检—交接检—专检", "施工检—设计检—监理检"], "ans": [2], "exp": "“三检制度”：作业活动结束后，作业者必须自检；不同工序交接，相关人员必须进行交接检查；施工单位专职质检员的专检。故选C。"}, {"id": 1444, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "为了验收施工质量，制定和审核/确认分部工程划分方案的做法，正确的是（　　）。", "opts": ["由项目监理机构制定，建设单位确认", "由施工单位制定，项目监理机构审核", "由建设单位组织制定，工程质量监督机构确认", "由项目监理机构组织制定，建设单位审核"], "ans": [1], "exp": "工程施工前，应由施工单位制定单位工程、分部工程、分项工程和检验批的划分方案，并应由项目监理机构审核、建设单位确认后实施。故选B。"}, {"id": 1445, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "某工程施工过程中，发生混凝土结构坍塌事故，造成8人重伤和5000万元直接经济损失。该施工质量事故等级是（　　）。", "opts": ["一般事故", "较大事故", "重大事故", "特大事故"], "ans": [2], "exp": "根据《关于做好房屋建筑和市政基础设施施工质量事故报告和调查处理工作的通知》，施工质量事故分为以下4个等级：①特别重大事故，是指造成30人及以上死亡，或者100人及以上重伤，或者1亿元及以上直接经济损失的事故。②重大事故，是指造成10人及以上30人以下死亡，或者50人及以上100人以下重伤，或者5000万元及以上1亿元以下直接经济损失的事故。③较大事故是指造成3人及以上10人以下死亡，或者10人及以上50人以下重伤，或者1000万元及以上5000万元以下直接经济损失的事故。④一般事故，是指造成3人以下死亡，或者10人以下重伤，或者100万元及以上1000万元以下直接经济损失的事故。故选C。"}, {"id": 1446, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "工程成本与工程量的关系划分中，属于成本分类的是（　　）。", "opts": ["目标成本和委托成本", "固定成本和变动成本", "预算成本和计划成本", "直接成本与间接成本"], "ans": [1], "exp": "按工程成本与工程数量的关系，工程成本分为固定成本和变动成本。故选B。"}, {"id": 1447, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "关于施工责任成本的说法，正确的是（　　）。", "opts": ["施工责任成本是以任务中心为对象进行归集的预算成本", "施工责任成本是以责任中心为对象进行归集的预算成本", "施工责任成本是以任务中心为对象进行归集的可控成本", "施工责任成本是以责任中心为对象进行归集的可控成本"], "ans": [3], "exp": "施工责任成本是以责任中心为对象来进行归集的可控成本，将企业成本管理中的经济责任进行明确划分，体现出“分级控制”与“责权利一体”的现代企业管理理念。故选D。"}, {"id": 1448, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "施工单位按实施进度编制施工成本计划时，将施工进度网络计划中的所有工作均按其最早开始时间和最早完成时间安排的优点是（　　）。", "opts": ["可增加非关键工作的总时差", "可使累积工程量曲线更平缓", "可提高工程按期竣工保证率", "可使工程资源投入更均衡"], "ans": [2], "exp": "对施工单位而言，施工进度网络计划中的所有工作均按最早开始时间开始、按最早完成时间完成，可以尽早获得工程进度款支付，同时也能提高工程按期竣工的保证率，但同时也会占用施工单位大量资金。因此，必须合理地确定成本支出计划，达到既节约成本支出又能控制工期的目的。故选C。"}, {"id": 1449, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "某工程开工后至第4月末，累计已完工程实际费用300万元，已完工程预算费用350万元，拟完工程预算费用330万元。关于该工程第4月末实际进展和费用支出状况的说法，正确的是（　　）。", "opts": ["费用绩效指数为0.86，实际费用超支", "进度偏差为20万元，实际进度拖后", "费用偏差为-50万元，实际费用节约", "进度绩效指数为1.06，实际进度超前"], "ans": [3], "exp": "费用偏差（CV）=已完工程预算费用（BCWP）﹣已完工程实际费用（ACWP）=350﹣300=50（万元）>0，表示实际费用节约。进度偏差（SV）=已完工程预算费用（BCWP）﹣拟完工程预算费用（BCWS）=350﹣330=20（万元）>0，表示实际进度超前。费用绩效指数（CPI）=已完工程预算费用（BCWP）/已完工程实际费用（ACWP）=350/300=1.17>1，表示实际费用节约。进度绩效指数（SPI）=已完工程预算费用（BCWP）/拟完工程预算费用（BCWS）=350/330=1.06>1，表示实际进度超前。故选D。"}, {"id": 1450, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "砖基础工程施工成本的主要影响因素由工程量、砖消耗量和价格构成。上述三个影响因素的计划值分别为500m3、529块/m3和0.26元/块，实际值分别为510m3、530块/m3和0.25元/块。采用因素分析法进行成本分析时，按上述影响因素顺序第二次替代与第一次替代的差额是（　　）元。", "opts": ["-2703", "132.6", "-1195", "1375.4"], "ans": [1], "exp": "第一次替代：510×529×0.26=70145.4（元）；第二次替代：510×530×0.26=70278（元）；差额为70278﹣70145.4=132.6（元）。故选B。"}, {"id": 1451, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "进行施工成本管理绩效考核时，从企业层面考核项目施工成本降低额的正确计算公式是（　　）。", "opts": ["项目计划总成本﹣项目实际施工成本", "项目施工合同成本﹣项目实际施工成本", "施工计划总成本﹣工程竣工结算成本", "施工责任目标成本﹣工程竣工结算成本"], "ans": [1], "exp": "企业的项目成本考核指标。计算公式如下：项目施工成本降低额=项目施工合同成本﹣项目实际施工成本。故选B。"}, {"id": 1452, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "施工生产危险源可分为第一类危险源和第二类危险源。下列危险源中，属于第二类危险源的是（　　）。", "opts": ["施工用炸药储存室", "行驶中的车辆", "违规操作设备", "可燃烧危险物质"], "ans": [2], "exp": "第二类危险源是指导致能量或危险物质约束或限制措施破坏或失效，以及防护措施缺乏或失效的因素。包括：物的不安全状态（危险状态）、人的不安全行为、环境不良（环境不安全条件）及管理缺陷等因素。故选C。"}, {"id": 1453, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "海因里希提出的事故因果连锁过程包括5个因素：①伤害；②事故；③遗传及社会环境；④人的缺点；⑤人的不安全行为或物的不安全状态。上述因素之间正确的连锁关系是（　　）。", "opts": ["①→②→③→④→⑤", "③→④→⑤→②→①", "③→④→①→②→⑤", "⑤→③→①→④→②"], "ans": [1], "exp": "5个因素及其连锁关系：遗传及社会环境→（诱发）人的缺点→（造成）人的不安全行为或物的不安全状态→（发生）事故→（导致）伤害。故选B。"}, {"id": 1454, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据《安全生产法》，建筑企业应构建（　　）双重预防机制。", "opts": ["安全风险辨识排查和分级管控", "安全风险分级管控和隐患排查治理", "安全意识教育和隐患排查治理", "安全意识教育和安全风险辨识排查"], "ans": [1], "exp": "企业应根据《安全生产法》，构建安全风险分级管控和隐患排查治理双重预防机制，建立安全风险分级管控制度，按照安全风险分级采取相应的管控措施。故选B。"}, {"id": 1455, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "特种作业操作证的复审时间可以延长的基本条件是持有该证的特种作业人员在证书有效期内，连续从事本工种工作（　　）年以上。", "opts": ["3", "5", "10", "6"], "ans": [2], "exp": "特种作业人员在特种作业操作证有效期内，连续从事本工种10年以上，严格遵守有关安全生产法律法规的，经原考核发证机关或者从业所在地考核发证机关同意，特种作业操作证的复审时间可以延长至每6年1次。故选C。"}, {"id": 1456, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "关于施工现场防触电技术措施的说法，正确的是（　　）。", "opts": ["保护接地是指将电气设备的金属外壳或构架等与电网的零线连接", "保护接零是指将电气设备的金属外壳或构架等与接地体连接", "现场移动式灯具距地面高度应不小于2m", "工作接地是指将电力系统中的某一点直接或经特殊设备与地作金属连接"], "ans": [3], "exp": "选项AB错误，保护接地是为了防止电气设备绝缘损坏时人体遭受触电危险，而在电气设备的金属外壳或构架等与接地体之间所作的良好的连接。采用保护接地，仅能减轻触电的危险程度，但不能完全保证人身安全。选项C错误，现场移动式灯具采用便桥防水灯具，设备外皮做好保护接地，灯具距地面高度不小于3m，生活区民工住宿达不到标准的必须使用36V安全电压。选项D正确，工作接地是指将电力系统中某一点直接或经特殊设备与地作金属连接。故选D。"}, {"id": 1457, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "施工安全风险等级从高到低可划分为重大风险、较大风险、一般风险和低风险，分别用（　　）四种颜色标示。", "opts": ["橙、紫、黄、蓝", "红、橙、黄、蓝", "紫、橙、蓝、黄", "红、橙、蓝、黄"], "ans": [1], "exp": "安全风险等级从高到低划分为重大风险、较大风险、一般风险和低风险，分别用红、橙、黄、蓝四种颜色标示。故选B。"}, {"id": 1458, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "作为绿色策划的主要内容，绿色交付策划应明确的内容是（　　）。", "opts": ["绿色建造效果评估内容及方式", "绿色建造目标及实施路径", "绿色建造全过程数字化技术应用方式", "绿色建造各参与方协同工作机制"], "ans": [0], "exp": "绿色交付策划：①应根据建筑类型和运营维护需求确定绿色建造项目的实体交付内容及交付标准；②宜按照城市信息化建设要求和运营维护需求，制定数字化交付标准和方案，明确各阶段责任主体和交付成果；③应明确综合效能调适及绿色建造效果评估的内容及方式。故选A。"}, {"id": 1459, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "为实现绿色施工，施工单位应建立以（　　）为第一责任人的绿色施工管理体系。", "opts": ["企业法定代表人", "企业技术负责人", "项目经理", "项目技术负责人"], "ans": [2], "exp": "施工单位应建立以项目经理为第一责任人的绿色施工管理体系，制定绿色施工管理制度，负责绿色施工的组织实施，进行绿色施工教育培训，定期开展自检、联检和评价工作。故选C。"}, {"id": 1460, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "为保护环境，在土方作业的阶段，施工现场作业区目测扬尘高度应小于（　　）m。", "opts": ["1.5", "2", "2.5", "3"], "ans": [0], "exp": "土方作业阶段，采取洒水、覆盖等措施，达到作业区目测扬尘高度小于1.5m。故选A。"}, {"id": 1461, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "文明施工应贯彻的“8S”管理理念，是在整理、整顿、清扫、清洁、素养、安全6S管理要素的基础上，又增加了（　　）两大要素。", "opts": ["监督和学习", "节约和学习", "监督和供应", "节约和供应"], "ans": [1], "exp": "首先，要对施工现场的各种要素进行整理（Seri）、整顿（Seiton）、清扫（Seiso）、清洁（Seiketsu），并考虑人的素养（Shitsuke）。上述五大要素在日语中罗马发音均以“S”打头，故称为“5S”。在此基础上，增加安全（Safety）要素，即称为“6S”。之后，又增加了节约（Save）和学习（Study）两大要素，即成为当今施工现场的“8S”管理理念。故选B。"}, {"id": 1462, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据绿色施工评价相关标准，在施工现场环境保护方面作为“控制项”进行评价的内容是（　　）。【教材相关知识点已更改】", "opts": ["采取限时施工和遮光措施", "设置并清理现场厕所化粪池", "制定地下文物保护应急预案", "制定建筑垃圾减量化计划"], "ans": [2], "exp": "这里的“控制项”是指绿色施工过程中必须达到的基本要求条款。对于施工现场环境保护而言，“控制项”包括：①应建立环境保护管理制度；②绿色施工策划文件中应包含环境保护内容；③施工现场应在醒目位置设环境保护标识；④应对施工现场的古迹、文物、墓穴、树木、森林及生态环境等采取有效保护措施，制定地下文物应急预案；⑤施工现场不应焚烧废弃物；⑥土方回填不得采用有毒有害废弃物。故选C。"}, {"id": 1463, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "国际工程承包商在甄选项目、初步确定投标策略时，宜采用的方法是（　　）。", "opts": ["PERT分析法", "LCC评估法", "LCA评估法", "SWOT分析法"], "ans": [3], "exp": "投标人在投标之前应就投标项目开展考虑自身内部的优势（Strengths）、劣势（Weaknesses）和外部市场环境的机会（Opportunities）与威胁（Threats）的SWOT分析，以帮助制定投标的策略定位。故选D。"}, {"id": 1464, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据FIDIC《施工合同条件》，业主应在收到工程师签发的最终付款证书（　　）天内向承包商付款。", "opts": ["14", "21", "56", "28"], "ans": [2], "exp": "工程师应在收到最终报表和结清证明后28天内，向业主签发最终付款证书；业主应在收到工程师签发的最终付款证书56天内向承包商付款。故选C。"}, {"id": 1465, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据FIDIC《施工合同条件》，合同条款未规定费用加利润中的利润计取比例时，应按（　　）计算。", "opts": ["20%", "5%", "3%", "10%"], "ans": [1], "exp": "费用加利润是指合同数据中规定的费用加上适当比例的利润（如未规定，则按5%）。只有当承包人根据合同有权获得费用加利润的支付时，利润才按上述比例计取，并将该费用加利润计入合同价格。故选B。"}, {"id": 1466, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "根据英国土木工程师学会（ICE）颁布的工程施工合同（ECC），在提交诉讼或仲裁之前，能够裁决合同争议的人员或机构是（　　）。", "opts": ["高级代表、裁决员", "工程师、争端避免委员会", "建筑师、高级代表", "裁决员、争端避免委员会"], "ans": [0], "exp": "争议解决与避免程序（Resolving and Avoiding Disputes）提供了以下三种争端解决程序，使用者可根据需要，选择其中一种来完成主要选项的配置：①高级代表—裁决员—诉讼/仲裁；②高级代表（可跳过）—裁决员—诉讼/仲裁；③争端避免委员会（Dispute Avoidance Board，DAB）—诉讼/仲裁。对①②，发生争议时，高级代表应立即与合同双方沟通，尽力促其达成一致，如未能在约定时间内达成合意，高级代表不能作出决定，需交由裁决员进行裁决。对③，DAB的主要职责是通过定期视察现场，及时发现潜在冲突，规避争端，提供解决争端的建议，但不能进行终局裁决。故选A。"}, {"id": 1467, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "为了应用建筑信息模型（BIM）技术，实现对工程项目成本的估算、控制和优化，需要进行的工作是（　　）。", "opts": ["将项目成本管理与2D和3D模型集成，形成4D模型", "将项目成本管理与3D和4D模型集成，形成5D模型", "将项目成本管理与4D和5D模型集成，形成6D模型", "将项目成本管理与5D和6D模型集成，形成7D模型"], "ans": [1], "exp": "通过BIM技术将项目成本管理与3D和4D模型集成，形成5D模型。故选B。"}, {"id": 1468, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "single", "q": "智慧工地总体架构中，发挥桥梁和中枢作用，并负责处理大量数据的层次是（　　）。", "opts": ["感知层", "应用层", "网络层", "保护层"], "ans": [2], "exp": "网络层是智慧工地的数据通道和处理中枢，它起到桥梁和枢纽的作用，连接感知层和应用层，保证数据的高效流动和准确处理。故选C。"}, {"id": 1469, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "作为工程建设实施阶段的最后一个环节，工程竣工验收的基本作用有（　　）。", "opts": ["结算全部工程款项", "全面检验工程质量", "全面进行工程项目后评价", "全面考核工程建设成果", "标志着投资成果转入生产或使用"], "ans": [1, 3, 4], "exp": "工程竣工验收是工程建设实施阶段最后一个环节，是投资成果转入生产或使用的标志，也是全面考核工程建设成果、检验工程质量的重要步骤。故选BDE。"}, {"id": 1470, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "工程质量监督机构参加竣工验收时，对现场验收宜重点监督的内容有（　　）。", "opts": ["验收组织形式", "验收方法", "验收程序", "标准规定的执行情况", "观感质量检查"], "ans": [0, 2, 3], "exp": "工程质量监督机构应参加建设单位组织的工程竣工验收，并对现场验收的组织形式、验收程序、执行标准规定等进行重点监督，发现有违反验收规定的行为，应责令改正。工程竣工验收工作结束后，工程质量监督机构应出具工程质量监督报告。故选ACD。"}, {"id": 1471, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "根据《建设项目工程总承包管理规范》，设计执行计划宜包括的内容有（　　）。", "opts": ["质量保证程序和要求", "费用控制原则和要求", "进度计划和主要控制点", "采购工作范围和内容", "技术经济要求"], "ans": [0, 2, 4], "exp": "设计执行计划宜包括下列内容：①设计依据；②设计范围；③设计的原则和要求；④组织机构及职责分工；⑤适用的标准规范清单；⑥质量保证程序和要求；⑦进度计划和主要控制点；⑧技术经济要求；⑨安全、职业健康和环境保护要求；⑩与采购、施工和试运行的接口关系及要求。故选ACE。"}, {"id": 1472, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "工程施工过程中，需要对施工组织设计进行修改或补充的情形有（　　）。", "opts": ["工程设计有重大修改", "有关费用变化的", "主要施工方法有重大调整", "主要施工资源配置有重大调整", "施工环境有重大改变"], "ans": [0, 2, 3, 4], "exp": "工程施工过程中发生以下情形时，应及时对施工组织设计进行修改或补充：①工程设计有重大修改；②有关法律、法规及标准实施、修订和废止；③主要施工方法有重大调整；④主要施工资源配置有重大调整；⑤施工环境有重大改变。故选ACDE。"}, {"id": 1473, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "下列施工组织设计内容中，属于单位工程施工组织设计中“施工部署”的有（　　）。", "opts": ["主要施工方案", "工程施工目标", "施工重点和难点分析", "主要分项工程施工工艺要求", "项目经理部工作岗位设置与职责划分"], "ans": [1, 2, 4], "exp": "施工部署是指对工程施工过程进行的统筹规划和全面安排，包括：①工程施工目标；②进度安排和空间组织；③施工重点和难点分析；④工程管理组织结构形式，根据工程项目规模、复杂程度、专业特点、人员素质和地域范围确定工程管理组织结构形式，并确定项目经理部的工作岗位设置及职责划分；⑤“四新”使用部署或要求；⑥分包单位要求。故选BCE。"}, {"id": 1474, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "建筑企业建立和实施质量、环境、职业健康安全一体化管理体系时，支持与运行过程需进行的工作有（　　）。", "opts": ["实施并保持沟通", "确定并提供资源", "创建、更新和控制成文信息", "持续改进", "管理评审"], "ans": [0, 1, 2], "exp": "支持与运行过程需进行的工作：①确定并提供所需资源；②确定并确保人员能力意识；③实施并保持沟通；④创建、更新和控制成文信息；⑤进行运行的策划和控制；⑥应急准备和响应。故选ABC。"}, {"id": 1475, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "关于项目群及其管理的说法，正确的有（　　）。", "opts": ["项目群经理负责项目群的整体绩效", "一个项目群应至少包含三个项目群组件", "项目群为利益相关方提供收益", "项目群可以是战略性或经营性的", "项目群收尾后方可实现无形收益"], "ans": [0, 2, 3], "exp": "选项A正确，项目群经理负责项目群及相关项目群组件的整体绩效；项目群管理团队负责单个或多个项目群组件或职能的绩效和实施。选项B错误，一个项目群应至少由两个项目群组件组成。选项C正确，项目群为利益相关方提供收益，并帮助实现战略目标或经营目标。选项D正确，项目群可以是战略性的、变革性的或经营性的。选项E错误，在项目群生命周期或项目群收尾后都有可能实现有形或无形的收益。故选ACD。"}, {"id": 1476, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "工程招标过程中，在开标环节应进行的工作有（　　）。", "opts": ["公布评标委员会成员名单", "对投标文件进行形式审查", "检查投标文件密封情况", "公布投标人名称及其投标报价", "设有标底的工程公布标底"], "ans": [2, 3, 4], "exp": "招标人应按招标文件规定对的投标截止时间（开标时间）和投标人须知前附表规定的地点公开开标，并邀请所有投标人的法定代表人或其委托代理人准时参加。主持人按以下程序进行开标：①宣布开标纪律；②公布在投标截止时间前递交投标文件的投标人名称，并点名确认投标人是否派人到场；③宣布开标人、唱标人、记录人、监标人等有关人员姓名；④按照投标人须知前附表规定检查投标文件的密封情况；⑤按照投标人须知前附表的规定确定并宣布投标文件开标顺序；⑥设有标底的，公布标底；⑦按照宣布的开标顺序当众开标，公布投标人名称、标段名称、投标保证金的递交情况、投标报价、质量目标、工期及其他内容，并记录在案；⑧投标人代表、招标人代表、监标人、记录人等有关人员在开标记录上签字确认；⑨开标结束。故选CDE。"}, {"id": 1477, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "建设单位选择合同计价方式时，通常会考虑的因素有（　　）。", "opts": ["分包合同数量", "工程复杂程度", "工程设计深度", "工期紧迫程度", "专业工程种类"], "ans": [1, 2, 3], "exp": "建设单位通常会综合考虑以下因素来选择合同计价方式：①工程复杂程度；②工程设计深度；③技术先进程度；④工期紧迫程度。故选BCD。"}, {"id": 1478, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "根据《标准施工招标文件》，针对承包人提出的索赔，发包人仅限同时给予工期和费用补偿的情形有（　　）。", "opts": ["承包人遇到不利的物质条件", "因发包人违约承包人暂停施工", "施工现场发掘文物、古迹", "发包人增加合同工作内容", "发包人要求向承包人提前交货"], "ans": [0, 2], "exp": "选项BD属于工期、费用、利润均可补偿的情况。选项E属于只补偿费用的情况。故选AC。"}, {"id": 1479, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "关于工程预付款的说法，正确的有（　　）。", "opts": ["工程预付款支付比例不宜高于签约合同价的20%", "工程预付款应在进度付款中扣回", "工程预付款保函的担保金额可根据预付款扣回的金额相应递减", "承包人应在发包人支付预付款之前提交预付款保函", "发包人应在预付款扣完后的7天内将预付款保函退还给承包人"], "ans": [1, 2], "exp": "选项A错误，根据《计价规范》，包工包料工程的预付款支付比例不得低于签约合同价（扣除暂列金额）的10%，不宜高于签约合同价（扣除暂列金额）的30%。选项D错误，除专用合同条款另有约定外，承包人应在收到预付款的同时向发包人提交预付款保函，预付款保函的担保金额应与预付款金额相同。选项E错误，发包人应在预付款扣完后的14天内将预付款保函退还给承包人。故选BC。"}, {"id": 1480, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "根据《标准设计施工总承包招标文件》，“承包人建议书”应包括的内容有（　　）。", "opts": ["工程设备方案说明", "功能要求", "工程量清单", "分包方案", "对发包人要求中的错误说明"], "ans": [0, 3, 4], "exp": "承包人建议书是对“发包人要求”的响应文件，包括工程设计方案和设备方案说明、分包方案，以及对发包人要求中的错误说明。在合同谈判阶段，随着发包人要求的调整，承包人建议书也应对一些技术细节进一步予以明确或补充修改，作为合同文件的组成部分。故选ADE。"}, {"id": 1481, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "承包人采取的风险应对措施中，属于风险转移的有（　　）。", "opts": ["投保建筑工程一切险", "以联合体方式承包工程", "工程进度计划中留有机动时间", "要求发包人提供工程款支付担保", "与发包人按可调单价方式签订工程合同"], "ans": [0, 3, 4], "exp": "风险转移是指将风险转移给他人承担，以避免风险损失。风险转移可分为保险转移和非保险转移两种方式。（1）保险转移。保险转移是指通过向保险公司投保，将工程实施过程中可能出现的因自然灾害和意外事故造成的损失转移给保险公司。如建筑工程一切险、安装工程一切险、第三者责任险、施工人员意外伤害保险等。（2）非保险转移。施工承包风险的非保险转移主要有三种方式：①工程分包。经建设单位同意，将工程项目中风险较大的部分工作内容分包给其他单位，是一种减轻风险和转移风险的有效策略。②签订合同时明确计价方式。例如对于存在价格上涨风险的材料设备，可以通过签订总价合同方式将风险转移给材料设备供应商。③第三方担保。如承包商履约担保、业主工程款支付担保等。无论采用何种风险转移方式，风险的接收方应具有更强的风险承受能力或更有力的处置能力。故选ADE。"}, {"id": 1482, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "与依次施工和平行施工相比，建设工程组织流水施工的特点有（　　）。", "opts": ["施工工期最短", "各工作队可实现专业化施工", "能够尽可能利用工作面进行施工", "施工现场组织管理比较简单", "单位时间内投入的资源较为均衡"], "ans": [1, 2, 4], "exp": "流水施工组织方式具有以下特点：①尽可能利用工作面进行施工，工期较短；②各工作队实现专业化施工，有利于提高施工技术水平和劳动效率，也有利于提高工程质量；③专业工作队能够连续施工，同时使相邻专业工作队之间能够最大限度地进行搭接作业；④单位时间内投入的劳动力、施工机具等资源较为均衡，有利于资源供应的组织；⑤为施工现场的文明施工和科学管理创造了有利条件。故选BCE。"}, {"id": 1483, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "建设工程组织固定节拍流水施工的特点有（　　）。", "opts": ["相邻施工过程的流水步距相等", "专业工作队数等于施工过程数", "各施工段的流水节拍不全相等", "施工段之间可能有空闲时间", "各专业工作队能够连续作业"], "ans": [0, 1, 4], "exp": "固定节拍流水施工是一种最理想的流水施工方式，具有以下特点：①所有施工过程在各个施工段上的流水节拍均相等；②相邻施工过程的流水步距相等，且等于流水节拍；③专业工作队数等于施工过程数，即每一个施工过程组建一个专业工作队；④各专业工作队在各施工段上能够连续作业，施工段之间没有空闲时间。故选ABE。"}, {"id": 1484, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "工程网络计划工期优化过程中，为达到缩短工期的目的，应选择（　　）的关键工作缩短其持续时间。", "opts": ["有充足备用资源", "单位时间所需资源最少", "持续时间对质量和安全影响不大", "持续时间所需增加费用最少", "持续时间较长"], "ans": [0, 2, 3], "exp": "选择缩短持续时间的关键工作应考虑下列因素：①缩短持续时间对质量和安全影响不大的工作；②有充足备用资源的工作；③缩短持续时间所需增加费用最少的工作。故选ACD。"}, {"id": 1485, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "某工程双代号时标网络计划如下图所示，图中显示的正确信息有（　　）。", "opts": ["工作G的自由时差为4周", "工作E的总时差为2周", "工作D的总时差为1周"], "ans": [0, 1, 3], "exp": "选项C错误，工作G的自由时差为2周。选项E错误，工作D在关键线路上，故工作D的总时差为0周。故选ABD。"}, {"id": 1486, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "与建筑企业建立的质量管理体系相比，建设工程项目层面的质量管理体系的差异有（　　）。", "opts": ["管理原则", "过程方法", "服务范围", "评价方式", "作用时效"], "ans": [2, 3, 4], "exp": "建设工程项目质量管理体系与建筑企业建立的质量管理体系的差异：①目的不同；②服务范围不同；③目标不同；④作用时效不同；⑤评价方式不同。故选CDE。"}, {"id": 1487, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "按产品质量特征不同，抽样检验方法可划分的种类有（　　）。", "opts": ["计数抽样检验", "计量抽样检验", "随机抽样检验", "多次抽样检验", "连续抽样检验"], "ans": [0, 1], "exp": "按产品质量特征不同，抽样检验可分为计数抽样检验和计量抽样检验。故选AB。"}, {"id": 1488, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "采用直方图法分析混凝土预制构件质量时，出现孤岛图的原因有（　　）。", "opts": ["数据分组不当", "原材料发生变化", "短时间内工人操作不熟练", "组距确定不当", "施工操作中控制过严"], "ans": [1, 2], "exp": "孤岛型直方图是因原材料发生变化，或短时间内工人操作不熟练造成的。故选BC。"}, {"id": 1489, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "施工单位编制的分项工程技术交底书应包括的内容有（　　）。", "opts": ["施工方法", "进度安排", "质量要求", "成本控制措施", "验收标准"], "ans": [0, 2, 4], "exp": "技术交底书的内容：施工方法、质量要求和验收标准、施工过程中需注意的问题、可能出现意外情况的应急方案等。故选ACE。"}, {"id": 1490, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "根据工程特点和成本管理要求不同，工程成本可分为不同类别。构成工程实体的材料费可归入的工程成本类别有（　　）。", "opts": ["变动成本", "直接成本", "采购成本", "措施成本", "质量成本"], "ans": [0, 1], "exp": "变动成本是随着工程量的增减变化而变化的各项成本，如材料费、计件工资等。直接成本是指在工程项目实施过程中直接耗费的构成工程实体或有助于工程形成的各项支出，包括人工费、材料费、机械使用费和其他直接费。故选AB。"}, {"id": 1491, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "采用PDCA循环法进行施工成本管理绩效考核的不足有（　　）。", "opts": ["不适合需要周期性考核的企业", "投入成本高", "会抑制各部门之间的协同合作", "难以持续提高管理成效", "过于强调计划性"], "ans": [1, 4], "exp": "PDCA管理循环法的缺点：①投入成本高；②过于强调计划性。故选BE。"}, {"id": 1492, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "根据轨迹交叉理论造成安全事故的直接原因有（　　）。", "opts": ["社会环境条件差", "物的不安全状态", "组织不健全", "管理制度不完善", "人的不安全行为"], "ans": [1, 4], "exp": "事故发生原因仍然是人的不安全行为或物的不安全状态。轨迹交叉理论则基于人的不安全行为和物的不安全状况共同作用进行事故致因分析。故选BE。"}, {"id": 1493, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "安全生产管理3E原则是（　　）。【教材相关知识点已更改】", "opts": ["强制管理", "工程技术", "教育培训", "安全交底", "环境治理"], "ans": [0, 1, 2], "exp": "本质安全属于安全管理范畴，应当遵循安全管理3E原则实施安全管理，促进本质安全化。即：①Engineering（工程技术）：运用技术手段消除不安全因素，实现生产工艺、机械设备等生产条件的安全。②Education（教育培训）：利用不同形式的安全教育和训练，强化员工安全意识，掌握安全生产所必须的知识和技能。③Enforcement（强制管理）：借助于法律法规、规章制度等必要的行政乃至法律。故选ABC。"}, {"id": 1494, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "在建设工程专项施工方案审批环节，需要签字和盖章的有（　　）。", "opts": ["施工单位技术负责人签字", "施工单位公章", "总监理工程师签字", "总监理工程师执业印章", "施工单位法定代表人签字"], "ans": [0, 1, 2, 3], "exp": "专项施工方案应由施工单位技术负责人审核签字、加盖单位公章，并由总监理工程师审查签字、加盖执业印章后方可实施。故选ABCD。"}, {"id": 1495, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "绿色建造需要将绿色发展理念融入工程策划、设计、施工、交付全过程，除体现绿色化外，还应体现的特征有（　　）。", "opts": ["信息化", "工业化", "系统化", "产业化", "集约化"], "ans": [0, 1, 3, 4], "exp": "绿色建造需要将绿色发展理念融入工程策划、设计、施工、交付的建造全过程，充分体现绿色化、工业化、信息化、集约化和产业化的总体特征。故选ABDE。"}, {"id": 1496, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "施工单位应设立安全文明施工费专用账户，做到专款专用。安全文明施工费的用途有（　　）。", "opts": ["建立健全安全文明施工管理体系", "购置和更新施工安全防护用具及设施", "培训施工现场从事危险作业人员", "改善现场安全生产条件和作业环境", "赔付施工安全事故所造成的损失"], "ans": [1, 3], "exp": "安全文明施工费是指按照有关规定，购置和更新施工安全防护用具及设施、改善现场安全生产条件和作业环境所需要的费用。故选BD。"}, {"id": 1497, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "为加快形成对外承包工程发展新优势，国家鼓励建筑企业由建设施工优势为主向同时具有（　　）的综合优势转变。", "opts": ["集成设计", "投融资", "全过程工程咨询", "工程建设", "运营服务"], "ans": [1, 3, 4], "exp": "鼓励企业以建营一体化、投建营一体化等多种方式实施项目，提高产业链参与度和在国际分工中的地位，逐步实现由建设施工优势为主向投融资、工程建设、运营服务的综合优势转变。故选BDE。"}, {"id": 1498, "source": "真题", "ch": null, "year": "2024", "sourceLabel": "2024年真题", "type": "multi", "q": "为了保护本地劳动力就业，世界上不少国家和地区对外籍劳务输入有严格限制，进入此国家和地区承包工程的企业需要办理的事项有（　　）。", "opts": ["申请获得政府担保", "申请纳税证明", "申请劳务输入配额", "申请居留签证", "申请工作许可"], "ans": [2, 3, 4], "exp": "不少国家和地区为了保护本地劳动力就业，对外籍劳务输入有严格限制，一般需经过申请劳务输入配额、办理居留签证和工作许可等申请过程，并常对外籍劳务的技术水平、工作经验、受教育程度、从业工种和就业期限加以限制。故选CDE。"}, {"id": 1499, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据固定资产投资项目资本金制度，水泥项目的最低资本金比例是（  ）。", "opts": ["30%", "35%", "40%", "45%"], "ans": [1], "exp": "各类投资项目最低资本金比例见下表："}, {"id": 1500, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "在工程总承包模式下，负责施工图准备工作的单位是（  ）。", "opts": ["工程设计单位", "工程建设单位", "工程总承包单位", "工程总承包管理单位"], "ans": [2], "exp": "在工程总承包模式下，施工图纸的准备将由工程总承包单位完成。"}, {"id": 1501, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "《关于规范实施政府和社会资本合作新机制的指导意见》规定，关系国计民生、公共属性较强的项目采用政府和社会资本合作方式时，民营企业股权的最低占比原则上是（  ）。", "opts": ["30%", "35%", "40%", "45%"], "ans": [1], "exp": "市场化程度较高、公共属性较弱的项目，应由民营企业独资或控股；关系国计民生、公共属性较强的项目，民营企业股权占比原则上不低于35%。"}, {"id": 1502, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "建设工程采用CM模式时，代理型合同和非代理型合同的共同点是（  ）。", "opts": ["CM单位均不赚取总包与分包之间的差价", "CM单位均须负责工程分包的发包工作", "均采用保证最大工程费用（GMP）加酬金合同形式", "建设单位控制工程造价的风险均较小"], "ans": [0], "exp": "代理型和非代理型的CM合同是有区别的。由于代理型合同是建设单位与分包单位直接签订，因此，采用简单的成本加酬金合同形式。而非代理型合同则采用保证最大工程费用（GMP）加酬金的合同形式。"}, {"id": 1503, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据国家标准《建设工程监理规范》，施工单位做好施工准备后，应向项目监理机构报送的文件是（  ）。", "opts": ["工程开工时间确认书", "工程开工通知", "工程开工报审表", "工程开工报告"], "ans": [2], "exp": "施工单位做好施工准备后，应向项目监理机构报送工程开工报审表及相关资料申请开工。"}, {"id": 1504, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "工程质量监督机构核验工程质量保证资料的目的是（  ）。", "opts": ["跟踪质量形成过程", "验证责任主体行为", "推查质量事故隐患", "验证工程实体质量"], "ans": [3], "exp": "核验工程质量保证资料的目的是验证工程实体质量。"}, {"id": 1505, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "与业主方项目管理目标相比，工程总承包方项目管理目标的不同点是（  ）。", "opts": ["质量目标", "进度目标", "成本目标", "绿色目标"], "ans": [2], "exp": "与业主方项目管理目标相比，工程总承包方项目管理目标的不同点是成本目标。工程总承包方不仅需要考虑项目的总投资，还需要控制自身的成本，以确保项目的经济效益。"}, {"id": 1506, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "从施工承包单位角度看，工程成本是指以货币表示的（  ）阶段资源耗费。", "opts": ["投标、施工及竣工验收", "投标、设计、采购、施工及竣工验收", "决策、设计、施工及竣工验收", "决策、设计、采购、施工及竣工验收"], "ans": [0], "exp": "对于施工承包单位而言，工程成本就是投标阶段、施工阶段及竣工验收阶段的资源耗费；对于工程总承包单位而言，工程成本就是投标、设计、采购、施工、竣工验收等阶段以货币表示的资源耗费。"}, {"id": 1507, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "施工成本分析过程中，将同类指标不同时期的数值进行对比后求出比率的方法是（  ）。", "opts": ["构成比率法", "相关比率法", "综合比率法", "动态比率法"], "ans": [3], "exp": "动态比率法是将同类指标不同时期的数值进行对比，求出比率，以分析该项指标的发展方向和发展速度。"}, {"id": 1508, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "施工投标人在投标截止时间前撤回投标文件的，招标人应在收到该投标人书面撤回通知之日起（  ）日内退还其投标保证金。", "opts": ["7", "10", "14", "5"], "ans": [3], "exp": "招标人已收取投标保证金的，应自收到投标人书面撤回通知之日起5日内退还。"}, {"id": 1509, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "工程项目目标体系中，通常采用定性方法进行分析论证的是（  ）。", "opts": ["安全目标、绿色目标", "质量目标、进度目标", "绿色目标、成本目标", "进度目标、成本目标"], "ans": [0], "exp": "在工程项目目标体系中，质量、安全及绿色目标通常会采用定性分析方法，而进度、成本目标则需要采用定量分析方法。"}, {"id": 1510, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "承包商通过优化施工方案降低其复杂性，属于施工风险管理中的（  ）策略。", "opts": ["风险规避", "风险减轻", "风险转移", "风险自留"], "ans": [1], "exp": "风险减轻，例如在工程施工中，可通过降低施工方案的复杂性来减小风险事件发生的概率；通过增加那些可能出现风险的施工方案的安全冗余度来降低风险事件发生后可能带来的负面效果。"}, {"id": 1511, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据FIDIC《施工合同条件》，合同组成文件包括：①图纸；②资料表；③规范要求。仅就上述合同文件而言，正确的优先解释顺序是（  ）。", "opts": ["①-②-③", "②-③-①", "③-①-②", "②-①-③"], "ans": [2], "exp": "根据FIDIC《施工合同条件》（新红皮书），施工合同由如下文件组成，如有矛盾、歧义或不一致，优先解释顺序如下：①合同协议书；②中标函；③投标函；④专用条件A部分——合同数据；⑤专用条件B部分——特别规定；⑥通用条件；⑦规范要求；⑧图纸；⑨资料表；⑩联营体承诺书（如果承包商是联营体）；⑪构成合同组成部分的任何其他文件。"}, {"id": 1512, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "为保护施工现场环境，在装饰装修阶段的作业区目测扬尘高度应小于（  ）m。", "opts": ["1.0", "0.5", "1.5", "2.0"], "ans": [1], "exp": "结构施工、安装装饰装修阶段，作业区目测扬尘高度小于0.5m。土方作业阶段，采取洒水、覆盖等措施，达到作业区目测扬尘高度小于1.5m，不扩散到场区外。"}, {"id": 1513, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据《标准施工招标文件》，关于计日工价款的说法，正确的是（  ）。", "opts": ["计日工价款应由承包人汇总后，按合同约定列入进度付款申请单", "采用计日工计价的变更工作，相应价款应从暂估价中支付", "承包人应按月提交变更工作人员名单，并向监理人报送计日工价款支付报表", "计日工单价应按照成本加利润的原则，由监理人与承包人商定"], "ans": [0], "exp": "采用计日工计价的任何一项变更工作，应从暂列金额中支付，承包人应在该项变更的实施过程中，每天提交相关报表和有关凭证报送监理人审批。计日工由承包人汇总后，按合同约定列入进度付款申请单，由监理人复核并经发包人同意后列入进度付款。"}, {"id": 1514, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "施工单位将施工责任成本从施工合同价中分离出来后，最终完成施工责任成本分解工作的部门是（  ）。", "opts": ["商务部门", "工程部门", "财务部门", "技术部门"], "ans": [0], "exp": "标价分离完成后，根据项目综合情况，施工单位管理部门与施工项目经理共同确认标价分离、成本降低率，商务部门完成施工责任成本分解。"}, {"id": 1515, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "下列施工现场发生的损失中，属于建筑工程一切险除外责任的是（  ）。", "opts": ["工艺不善引起的事故损失", "矫正原材料缺陷造成的损失", "火灾引起的在建工程损失", "水灾引起的施工机械损坏"], "ans": [1], "exp": "建筑工程一切险保单中的除外责任通常包括：①设计错误引起的损失和费用；②自然磨损、内在或潜在缺陷、物质本身变化、自燃、自热、氧化、锈蚀、渗漏、鼠咬、虫蛀、大气（气候或气温）变化、正常水位变化或其他渐变原因造成的保险财产自身的损失和费用；③因原材料缺陷或工艺不善引起的保险财产本身的损失以及为换置，修理或矫正这些缺点错误所支付的费用；④非外力引起的机械或电气装置损坏，或施工用机具、设备、机械装置失灵造成的本身损失；⑤维修保养或正常检修的费用；⑥档案、文件、账簿、票据、现金、各种有价证券、图表资料及包装物料的损失；⑦货物盘点时发现的盘亏损失；⑧领有公共运输行驶执照的，或已由其他保险予以保障的车辆、船舶和飞机的损失；⑨在保险单保险期限终止前，被保险财产中已由工程所有人签发完工验收证书或验收合格或实际占有或使用或接收的部分。"}, {"id": 1516, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "编制单位工程施工进度计划时需要进行的工作有：①确定施工顺序；②划分工作；", "opts": ["①-③-②", "②-①-③", "①-②-③", "②-③-①"], "ans": [1], "exp": "单位工程施工进度计划可按以下程序和方法编制：（1）划分工作。（2）确定施工顺序。（3）计算工程量。（4）计算劳动量和机械台班数。（5）确定工作的持续时间。（6）编制初始施工进度计划。（7）施工进度计划的调整和优化。"}, {"id": 1517, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "编制施工成本计划的关键是（  ）。", "opts": ["明确责任成本", "进行成本分析", "分解综合成本", "确定目标成本"], "ans": [3], "exp": "施工成本计划的编制应以成本预测为基础，关键是确定目标成本。"}, {"id": 1518, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据国家标准《质量管理体系要求》，成文信息分为要求保持和要求保留两类。下列成文信息中，属于要求保持的是（  ）。", "opts": ["设计评审", "人员能力证据", "质量方针", "外部供方评价"], "ans": [2], "exp": "要求保持的成文信息。包括：质量管理体系的范围、质量方针、质量目标。"}, {"id": 1519, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "下列工程进度计划中，能够对全工地性工程的施工期限及开竣工日期作出安排的是（  ）。", "opts": ["单位工程施工进度计划", "工程项目建设总进度计划", "分部工程施工进度计划", "施工总进度计划"], "ans": [3], "exp": "施工总进度计划是指根据施工部署中施工方案和施工项目开展程序，对承包范围内所有单位工程作出时间上的安排。其目的在于确定各单位工程及全工地性工程的施工期限及开竣工日期，进而确定施工现场劳动力、材料、成品、半成品、施工机械的需求数量和调配情况，以及现场临时设施的数量、水电供应量和能源、交通需求量。因此，科学合理地编制施工总进度计划，是保证整个施工项目按期交付使用的重要前提。"}, {"id": 1520, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "某工程双代号网络计划如下图所示，其中包含的关键工作（不含虚工作）是（  ）项。", "opts": ["7", "5", "6", "8"], "ans": [0], "exp": ""}, {"id": 1521, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "清洁生产可概括为“三清一控”。其中的“一控”是指贯穿于清洁生产的（  ）控制。", "opts": ["减量化", "全过程", "全要素", "碳排放"], "ans": [1], "exp": "清洁生产的主要内容可归纳为“三清一控”：①清洁的原料与能源；②清洁的生产过程；③清洁的产品；④贯穿于清洁生产的全过程控制。"}, {"id": 1522, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "下列建设工程招标投标行为中，属于要约行为的是（  ）。", "opts": ["招标人发布招标公告", "招标人发售招标文件", "投标人提交投标文件", "招标人发出中标通知书"], "ans": [2], "exp": "根据《中华人民共和国民法典》，要约和承诺是订立合同的必经环节。建设单位招标属于要约邀请，建筑企业投标即属于要约，这是签订工程合同的重要环节。"}, {"id": 1523, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "商务部等19部门《关于促进对外承包工程高质量发展的指导意见》提出，为推动对外承包工程转型升级和高质量发展，除坚持企业主体、互利共赢和规范有序原则外，还应坚持的原则是（  ）。", "opts": ["属地经营", "性价合理", "多边合作", "质量优先"], "ans": [3], "exp": "2019年9月，《商务部等19部门发布关于促进对外承包工程高质量发展的指导意见》（商合发〔2019〕273号），要求坚持新发展理念，坚定奉行互利共赢开放战略，以共建“一带一路”为统领，以基础设施等重大项目建设和产能合作为重点，加快形成国际经济合作和竞争新优势，推动对外承包工程转型升级和高质量发展。该指导意见提出如下基本原则：（1）坚持企业主体。（2）坚持质量优先。（3）坚持互利共赢。（4）坚持规范有序。"}, {"id": 1524, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "工程网络计划工期优化的基本方法是通过（  ）来达到优化目标。", "opts": ["改变关键工作之间的逻辑关系", "压缩关键工作的持续时间", "增加非关键工作的资源投入", "降低非关键工作的资源强度"], "ans": [1], "exp": "工期优化的基本方法是在不改变网络计划中各项工作之间逻辑关系的前提下，通过压缩关键工作的持续时间来达到优化目标。"}, {"id": 1525, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "工程施工临边作业时，作业面距坠落基准面高度达到2m及以上的，应在临空一侧采取的防护措施是（  ）。", "opts": ["设置高度不小于1.2m的防护栏杆，并设置挡脚板", "设置防护栏杆，并采用密目式安全立网封闭", "设置警示标志，并安排专人值守", "采用工具式栏板封闭，并设置挡脚板"], "ans": [1], "exp": "距坠落基准面高度2m及以上进行临边作业时，应在临空一侧设置防护栏杆，并应采用密目式安全立网或工具式栏板封闭。"}, {"id": 1526, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "某钢筋混凝土结构工程，计划月浇筑混凝土8000m³，预算单价500元/m³；当月实际浇筑混凝土   7000m³，实际单价540元/m³。则该月工程进度绩效指数（SPI）是（  ）。", "opts": ["0.875", "0.810", "1.058", "1.143"], "ans": [0], "exp": "进度绩效指数（SPI）=已完工程预算费用（BCWP）/拟完工程预算费用（BCWS）=7000×500/8000×500=0.875"}, {"id": 1527, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据《标准施工招标文件》，承包人提出索赔的期限自（  ）时终止。", "opts": ["承包人接受竣工付款证书", "承包人提交最终结清申请单", "承包人提交竣工验收报告", "承包人接受最终结清证书"], "ans": [3], "exp": "承包人按合同约定接受了竣工付款证书后，应被认为已无权再提出在合同工程接收证书颁发前所发生的任何索赔。承包人按合同约定提交的最终结清申请单中，只限于提出工程接收证书颁发后发生的索赔。提出索赔的期限自接受最终结清证书时终止。"}, {"id": 1528, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "下列施工合同计价方式中，施工单位基本没有费用风险的是（  ）。", "opts": ["总价合同", "成本加固定酬金合同", "目标成本加奖罚合同", "单价合同"], "ans": [1], "exp": "合同计价方式比较："}, {"id": 1529, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "工程施工过程中，每一分项工程实施前的技术交底书应由（  ）编制。", "opts": ["企业技术负责人", "项目质量管理人员", "施工班组负责人", "项目技术人员"], "ans": [3], "exp": "施工单位做好技术交底，是取得好的施工质量的条件之一。为此，每一分项工程开始实施前均要进行交底。为做好技术交底，应由项目技术人员编制技术交底书，并经项目技术负责人批准。"}, {"id": 1530, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "除施工单位项目负责人和项目技术负责人外，参加地基与基础、主体结构等分部工程验收的施工单位人员是（  ）。", "opts": ["合同、技术部门负责人", "技术、质量部门负责人", "质量、安全部门负责人", "合同、质量部门负责人"], "ans": [1], "exp": "分部工程应由总监理工程师组织施工单位项目负责人和项目技术负责人等进行验收。勘察、设计单位项目负责人和施工单位技术、质量部门负责人应参加地基与基础分部工程的验收，设计单位项目负责人和施工单位技术、质量部门负责人应参加主体结构、节能分部工程的验收。"}, {"id": 1531, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "某工程施工管理人员检查质量时，发现混凝土结构板表面有宽度为0.4mm且较深的裂缝。经分析研究后判定不影响结构安全和使用，对此可采用的返修处理方法是（  ）。", "opts": ["表面密封法", "嵌缝密闭法", "灌浆修补法", "增大截面法"], "ans": [2], "exp": "对混凝土结构出现的裂缝，经分析研究后如果不影响结构的安全和使用时，也可采取返修处理。例如，当裂缝宽度不大于0.2mm时，可采用表面密封法；当裂缝宽度大于0.3mm时，可采用嵌缝密闭法；当裂缝较深时，则应采取灌浆修补的方法。"}, {"id": 1532, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "建筑信息模型中的信息可以随着工程建设进展和变化而更新和调整。这反映了建筑信息模型的（  ）特征。", "opts": ["完备性", "关联性", "动态性", "一致性"], "ans": [2], "exp": "模型信息的动态性：建筑信息模型中的信息可以随着工程建设不同阶段和变化而更新和调整。它强调了建筑信息模型作为一个动态的数据存储和管理工具的特性。"}, {"id": 1533, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "采用生命周期评估（LCA）方法评价绿色施工时，需进行的工作有：①清单分析；②解释说明；③影响评估。仅就上述工作而言，正确的工作程序是（  ）。", "opts": ["①-②-③", "②-③-①", "①-③-②", "②-①-③"], "ans": [2], "exp": "LCA方法应用可分为以下四个阶段：（1）目的与范围确定。（2）清单分析。（3）影响评估。（4）解释说明。"}, {"id": 1534, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据《标准施工招标文件》，承包人应在（  ）前负责维护和照管工程。", "opts": ["竣工清场完成", "工程接收证书颁发", "缺陷责任期届满", "竣工付款证书颁发"], "ans": [1], "exp": "工程接收证书颁发前，承包人应负责照管和维护工程。"}, {"id": 1535, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "下列无损检测方法中，适用于检测混凝土结构内部质量缺陷的是（  ）。", "opts": ["X射线应力测试法", "超声波探伤法", "光弹性薄膜法", "电磁感应检测法"], "ans": [1], "exp": "在常规无损检测方法中，超声和射线照相方法主要用于探测被检物的内部缺陷；渗透方法仅用于探测被检物表面开口的缺陷；磁粉和电磁（涡流）方法用于探测被检物的表面和近表面缺陷。"}, {"id": 1536, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据《标准设计施工总承包招标文件》，除专用合同条款另有约定外，解释顺序排在“承包人建议书”之后的合同文件是（  ）。", "opts": ["发包人要求", "通用合同条款", "专用合同条款", "价格清单"], "ans": [3], "exp": "除专用合同条款另有约定外，解释合同文件的优先顺序如下：①合同协议书；②中标通知书；③投标函及投标函附录；④专用合同条款；⑤通用合同条款；⑥发包人要求；⑦承包人建议书；⑧价格清单；⑨其他合同文件。"}, {"id": 1537, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据国家标准《建筑施工场界环境噪声排放标准》，夜间场界环境噪声不得超过（  ）。", "opts": ["60dB(A)", "65dB(A)", "55dB(A)", "70dB(A)"], "ans": [2], "exp": "现场噪声排放不得超过国家标准《建筑施工场界噪声限值》GB12523—2011的规定，昼间场界环境噪声不得超过70dB（A），夜间场界环境噪声不得超过55dB（A）。同时，夜间噪声最大声级超过限值的幅度不得高于15dB（A）。"}, {"id": 1538, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据《企业境外投资管理办法》，对于投资主体直接或通过其控制的境外企业开展的敏感类项目，应实行的投资管理方式是（  ）。", "opts": ["审批制", "备案制", "核准制", "登记制"], "ans": [2], "exp": "实行核准管理的范围是投资主体直接或通过其控制的境外企业开展的敏感类项目，核准机关是国家发展和改革委员会。"}, {"id": 1539, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "工程网络计划中，可判定为关键线路的是（  ）的线路。", "opts": ["双代号网络计划中由关键节点组成", "单代号网络计划中由关键工作组成", "单代号搭接网络计划中无虚工作", "双代号时标网络计划中无波形线"], "ans": [3], "exp": "时标网络计划中的关键线路可从网络计划的终点节点开始，逆着箭线方向进行判定。凡自始至终不出现波形线的线路即为关键线路。"}, {"id": 1540, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据国家标准《环境管理体系要求及使用指南》，下列环境管理体系核心内容中，需要明确组织环境方针的是（  ）。", "opts": ["领导作用", "绩效评价", "体系策划", "组织所处环境"], "ans": [0], "exp": "领导作用包括三方面内容：①领导作用和承诺；②环境方针；③组织的角色、职责和权限。"}, {"id": 1541, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "下列施工过程中的行为或状态，属于第一类危险源的是（  ）。", "opts": ["建筑工人违章进入危险区域", "施工现场管理人员违章指挥", "施工现场存在有毒有害物质", "高空作业平台未设防护栏杆"], "ans": [2], "exp": "第一类危险源是指施工现场及施工生产过程中存在的，可能发生意外释放能量(机械能、电能、势能、化学能、热能等)的根源，包括施工现场及施工生产过程中各种能量或危险物质。"}, {"id": 1542, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据《生产安全事故报告和调查处理条例》，造成下列损失的施工安全事故中，属于重大事故的是（  ）。", "opts": ["5人死亡、65人重伤，1.2亿元直接经济损失", "9人死亡、45人重伤，2000万元直接经济损失", "1人死亡、49人重伤，3000万元直接经济损失", "2人死亡、53人重伤，4000万元直接经济损失"], "ans": [3], "exp": "重大事故，是指造成10人及以上30人以下死亡，或者50人及以上100人以下重伤，或者5000万元及以上1亿元以下直接经济损失的事故。"}, {"id": 1543, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据国家标准《风险管理指南》，下列风险管理原则中，有助于风险管理获得一致和可比较结果的是（  ）。", "opts": ["整合和定制化", "定制化和包容性", "结构化和全面性", "动态性和持续改进"], "ans": [2], "exp": "结构化和全面性。采用结构化和全面性的方法开展风险管理，有助于获得一致和可比较的结果。"}, {"id": 1544, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "工程项目管理中应用责任矩阵的目的是（  ）。", "opts": ["避免职责不清而出现推诿扯皮现象", "避免各管理部门之间信息沟通不畅", "促进工程项目管理专业人员培养", "便于评价工程项目管理绩效"], "ans": [0], "exp": "责任矩阵主要有以下作用：(1)将工程项目管理的具体任务分配、落实到相关职能部门或人员，使工程项目部人员分工一目了然。(2)清楚地显示出工程项目部各部门或个人的角色、职责和相互关系，避免职责不清而出现推诿、扯皮现象。(3)有利于项目经理从总体上分析管理任务的分配是否平衡适当，以便进行必要的调整和优化，确保最适合的人员去做最适当的事情，从而提高项目管理工作效率。"}, {"id": 1545, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据《建设工程施工专业分包合同（示范文本）》，分包人应完成的工作是（  ）。", "opts": ["负责整个施工场地的管理工作", "对分包工程进行设计并承担相应设计费用", "为运至施工场地内用于分包工程的材料办理保险", "向承包人提交一份详细施工组织设计"], "ans": [3], "exp": "ABC属于承包人应完成的工作。"}, {"id": 1546, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "下列施工质量统计分析方法中，可用来分析、追溯质量缺陷产生原因的是（  ）。", "opts": ["鱼刺图法", "直方图法", "分层法", "相关图法"], "ans": [0], "exp": "因果分析图又称为质量特性因果图、鱼刺图或树枝图，是一种反映质量特性与质量缺陷产生原因之间关系的图形工具，可用来分析、追溯质量缺陷产生的最根本原因。"}, {"id": 1547, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "施工投标文件编制完成后，按招标文件要求全面校对投标文件的正确做法是（  ）。", "opts": ["合理化建议内容无须进行多人次校对", "编制人员校对后无需交由相关负责人审核", "工程总报价至少应由两人分别校对一遍", "校对时只是重点检查投标文件页码是否有误"], "ans": [2], "exp": "施工投标文件编制完成后，在装订之前需要按招标文件要求进行全面校对。特别是对于较关键的内容，如工程总报价、优惠条件、合理化建议、工程总工期及质量目标、项目经理部及主要组成人员简介、特殊工程施工方法等，至少应由两人各自分别校对一遍。对于特殊重大工程项目，在校对完后再交由相关负责人审核。"}, {"id": 1548, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "下列危险源辨识与评价方法中，仅用于风险评价的是（  ）。", "opts": ["LEC评价法", "安全检查表法", "事故树分析法", "危险与可操作性分析法"], "ans": [0], "exp": "LEC评价法侧重于风险评价，该方法用与风险有关的三种因素指标值的乘积来评价操作人员伤亡风险的大小。"}, {"id": 1549, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "进行施工质量检验时，将检验对象总体中的抽样单元按某种次序排列，在规定范围内随机抽取一个或一组初始单元，然后按一套规则确定其他样本单元的抽样方法是（  ）。", "opts": ["分级随机抽样", "系统随机抽样", "分层随机抽样", "整群随机抽样"], "ans": [1], "exp": "系统随机抽样是指将总体中的抽样单元按某种次序排列，在规定范围内随机抽取一个或一组初始单元，然后按一套规则确定其他样本单元的抽样方法。如每隔一定时间或空间抽取一个样本，其第一个样本是随机的，所以又称为机械随机抽样。用系统随机抽样得到的样本称为系统样本。这种方法主要用于工序质量检验。"}, {"id": 1550, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据施工质量验收标准，检验批质量应按（  ）验收。", "opts": ["主控项目和一般项目", "关键项目和一般项目", "观感质量和关键项目", "主控项目和观感质量"], "ans": [0], "exp": "检验批质量应按主控项目和一般项目验收，并应符合下列规定：①主控项目和一般项目的确定应符合国家现行强制性工程建设标准和现行相关标准的规定；②主控项目的质量经抽样检验应全部合格；③一般项目的质量应符合国家现行相关标准的规定；④应具有完整的施工操作依据和质量验收记录。"}, {"id": 1551, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "下列项目群关键角色和责任者中，负责整个项目群战略和支持的是（  ）。", "opts": ["项目群经理", "项目群协调人", "项目群管理团队负责人", "项目群发起人"], "ans": [3], "exp": "项目群发起人对整个项目群战略和项目群支持负责任；项目群经理负责项目群及相关项目群组件的整体绩效；项目群管理团队负责单个或多个项目群组件或职能的绩效和实施。"}, {"id": 1552, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据《建设工程施工项目经理岗位职业标准》，施工项目经理具有的权限是（  ）。", "opts": ["组建项目经理部并选用项目团队成员", "负责项目投标并参与签订施工合同", "负责确定分包单位并签订分包合同", "组织项目团队成员绩效考核评价"], "ans": [3], "exp": "施工项目经理应具有但不限于下列权限：①参与项目投标及施工合同签订；②参与组建项目经理部，提名项目副经理、项目技术负责人，选用项目团队成员；③主持项目经理部工作，组织制定项目经理部管理制度；④决定企业授权范围内的资源投入和使用；⑤参与分包合同和供货合同签订；⑥在授权范围内直接与项目相关方进行沟通；⑦根据企业考核评价办法组织项目团队成员绩效考核评价，按企业薪酬制度拟定项目团队成员绩效工资分配方案，提出不称职管理人员解聘建议。"}, {"id": 1553, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "在资源投入允许的条件下，施工项目可采取下列不同的施工组织方式：①平行施工；②流水施工；③依次施工。按施工期由长至短排序，三种施工组织方式的正确排序是（  ）。", "opts": ["③-②-①", "①-②-③", "②-③-①", "③-①-②"], "ans": [0], "exp": "依次施工工期较长；流水施工工期较短；平行施工工期短。"}, {"id": 1554, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "施工成本指标控制过程包含的工作有：①采集成本数据；②确定成本管理分层次目标；③调整改进成本管理方法。仅就上述工作而言，正确的工作程序是（  ）。", "opts": ["①-②-③", "②-①-③", "②-③-①", "①-③-②"], "ans": [1], "exp": "施工成本指标控制过程：（1）确定成本管理分层次目标。（2）采集成本数据，监测成本形成过程。（3）找出偏差，分析原因。（4）制定对策，纠正偏差。（5）调整改进成本管理方法。"}, {"id": 1555, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "智慧工地总体架构可分为不同层次，其中的核心层是（  ）。", "opts": ["感知层", "网络层", "门户层", "应用层"], "ans": [3], "exp": "应用层：这一层是智慧工地的核心，主要包括各种基于数据的智能应用。"}, {"id": 1556, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "某分部工程有3个施工过程，划分为4个施工段组织非节奏流水施工，流水节拍见下表，则流水施工工期是（  ）天。", "opts": ["21", "26", "22", "25"], "ans": [1], "exp": "KI，II=4，KII，III=4，T=（4+4）+（5+4+5+4）=26天。"}, {"id": 1557, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "关于本质安全化系统的说法，正确的是（  ）。", "opts": ["狭义的本质安全是指人、物和系统的安全可靠性", "可依靠控制系统、报警系统、联锁系统减小事故发生概率", "本质安全是绝对安全的理想状态，实际运行中很难达到", "广义的本质安全系统不具有“失误一安全功能”和“故障一安全功能”"], "ans": [2], "exp": "A错，本质安全化，狭义上讲是指机器、设备和工艺本身所具有的安全性能。B错，本质安全的理念是从工艺源头上永久地消除风险，而不是仅仅靠控制系统、报警系统、联锁系统的使用来减小事故发生概率和减轻事故后果的严重性。D错，广义的本质安全系统仍然具有“失误一安全功能”和“故障一安全功能”，只是其范围更广泛，包括人的安全可靠性、物的安全可靠性、系统的安全可靠性和制度的规范性。"}, {"id": 1558, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "下列工程进度比较方法中，仅适用于比较工程进度计划中某项工作实际进度与计划进度的是（  ）。", "opts": ["横道图比较法", "S曲线比较法", "前锋线比较法", "赢得值比较法"], "ans": [0], "exp": "横道图比较法是一种基于横道计划的进度比较方法。由于横道计划应用的广泛性，从而使横道图比较法成为最常用的实际进度与计划进度比较方法。在施工进度计划执行过程中，只需将检查收集的实际进度数据加工整理后直接以横道线形式平行绘制于原计划横道线下方，即可形象直观地反映各项工作的实际进度、计划进度及其偏差情况。"}, {"id": 1559, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "建设工程组织流水施工时，用来区别流水施工组织方式的特征参数是（  ）。", "opts": ["流水强度", "流水节拍", "流水段数", "流水步距"], "ans": [1], "exp": "流水节拍决定单位时间的资源供应量，同时，流水节拍也是区别流水施工组织方式的特征参数。"}, {"id": 1560, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据《建设工程施工劳务分包合同（示范文本）》，处理施工变更的正确做法是()。", "opts": ["监理人应提前7天向劳务分包人发出变更通知", "承包人项目经理应提前14天向劳务分包人发出变更通知", "劳务分包人不得对原工程设计进行变更", "承包人承担变更所增加的劳务报酬，但工期不予顺延"], "ans": [2], "exp": "A、B错误，施工中如发生对原工作内容进行变更，工程承包人项目经理应提前7天以书面形式向劳务分包人发出变更通知，并提供变更的相应图纸和说明。劳务分包人按照工程承包人（项目经理）发出的变更通知及有关要求，进行需要的变更。D错误，因变更导致劳务报酬的增加及造成的劳务分包人损失，由工程承包人承担，延误的工期相应顺延；因变更减少工程量，劳务报酬应相应减少，工期相应调整。"}, {"id": 1561, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "工程项目管理采用强矩阵式组织结构的优点是（  ）。", "opts": ["有利于从各职能部门择优选定项目经理", "有利于各职能部门考核项目组成员绩效", "有利于加强各职能部门之间的协调配合", "有利于打通各职能部门之间的技术壁垒"], "ans": [2], "exp": "强矩阵式组织结构的特点是拥有专职的、具有较大权限的项目经理及专职项目管理人员。强矩阵式组织结构适用于技术复杂且时间紧迫的工程项目。对于技术复杂的工程项目，各职能部门之间的技术界面比较繁杂，采用强矩阵式组织结构有利于加强各职能部门之间的协调配合。"}, {"id": 1562, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据《项目管理知识体系指南（第7版）》，衡量项目成功的标志是（  ）。", "opts": ["按期交付项目成果", "可交付成果得到相关方验收", "实现收益并获取价值", "达到预期目标并实现品质提升"], "ans": [2], "exp": "面对复杂多变的项目环境，价值驱动型项目管理是项目管理的发展趋势。《项目管理知识体系指南（第7版）》提出了以价值为导向的项目管理，认为衡量项目成功的标志应由传统项目管理所强调的范围、进度、成本三重要素约束下满足质量要求从而成功地交付项目可交付成果，转变为实现收益并获取价值。"}, {"id": 1563, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "英国土木工程师学会（ICE）颁布的工程施工合同（ECC）所建立的合作机制具有的特征是（  ）。", "opts": ["避免诉讼、早期警告、补偿事件", "早期警告、补偿事件、合作伙伴", "目标合同、避免诉讼、早期警告", "合作伙伴、目标合同、避免诉讼"], "ans": [1], "exp": "ECC通过建立以合作伙伴(Partners)、早期警告(EarlyWarning)、补偿事件（CompensationEvents）为特征的合作机制，让项目各方致力于提高整个工程项目的管理水平。"}, {"id": 1564, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据国家标准《建筑与市政工程绿色施工评价标准》的“一般项”要求，建筑垃圾回收利用率应达到的标准是（  ）。", "opts": ["20%", "40%", "50%", "30%"], "ans": [3], "exp": "建筑垃圾回收利用率达到30%，建筑材料包装物回收利用率达到100%。"}, {"id": 1565, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据《特种作业人员安全技术培训考核管理办法》，特种作业人员连续从事本工种不满10年的，对其特种作业操作证的复审要求是（  ）。", "opts": ["每年复审1次", "每2年复审1次", "每6年复审1次", "每3年复审1次"], "ans": [3], "exp": "特种作业操作证每3年复审1次。特种作业人员在特种作业操作证有效期内，连续从事本工种10年以上，严格遵守有关安全生产法律法规的，经原考核发证机关或者从业所在地考核发证机关同意，特种作业操作证的复审时间可以延长至每6年1次。"}, {"id": 1566, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "下列影响工程质量的环境因素中，属于技术环境因素的是（  ）。", "opts": ["周边建筑工程", "质量检验制度", "水文地质条件", "质量评价标准"], "ans": [3], "exp": "环境因素有很多，主要指自然环境、技术环境和管理环境。自然环境包括地质、水文、气象条件和周边建筑、地下障碍物及其他不可抗力等因素；技术环境包括施工所依据的规范、规程、设计图纸、质量评价标准等因素；管理环境包括质量检验、监控制度、质量管理制度等。"}, {"id": 1567, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "职业健康安全管理体系标准应用灵活性的表现是（  ）。", "opts": ["与其他管理体系兼容", "强调预防为主和持续改进", "只对方针、目标和体系要素做出要求", "基于PDCA循环保证管理规范化"], "ans": [2], "exp": "应用的灵活性：职业健康安全管理体系标准适用于组织控制下的职业健康安全风险，这些风险必须考虑到诸如组织运行所处环境、组织工作人员和其他相关方的需求和期望等因素。因此，职业健康安全管理体系标准只对方针、目标和管理体系要素做出要求，既不规定具体的职业健康安全绩效准则，也不提供职业健康安全管理体系的设计规范。此外，职业健康安全管理体系标准还有助于使组织能够借助其职业健康安全管理体系整合健康和安全的其他方面，如工作人员的福利和（或）幸福等。"}, {"id": 1568, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "single", "q": "根据FIDIC《施工合同条件》，承包商未能在规定时间收到其应得最终付款的，除合同另有约定外，承包商有权按未得付款的（  ）年利率收取延误期融资费用。", "opts": ["4%", "5%", "3%", "6%"], "ans": [2], "exp": "如果承包商未能在规定时间收到应得到的期中付款或最终付款，承包商有权就未得到的付款按月计算复利，除非合同另有规定，应按3%的年利率向业主收取延误期的融资费用。"}, {"id": 1569, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "下列流水施工参数中，属于空间参数的有（  ）。", "opts": ["施工段数", "流水强度", "施工过程数", "工作面", "流水步距"], "ans": [0, 3], "exp": "空间参数是指在组织流水施工时，用以表达流水施工在空间布置上开展状态的参数。空间参数通常包括工作面和施工段数。"}, {"id": 1570, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "全面质量管理具有的基本特点有（  ）。", "opts": ["管理手段的先进性", "管理内容的全面性", "管理方法的多样性", "管理范围的全面性", "管理目标的多样性"], "ans": [1, 2, 3], "exp": "全面质量管理就是要在“全”字上做文章，树立“三全一多样”的管理理念。“三全一多样”就是全面质量管理的基本特点。管理内容的全面性。（2）管理范围的全面性。（3）参加管理人员的全面性。（4）管理方法的多样性。"}, {"id": 1571, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "实施工程项目目标动态控制可采取的技术措施有（  ）。", "opts": ["完善控制工作流程", "及时办理工程款支付手续", "审查论证施工方案", "建立目标控制工作考评机制", "采用价值工程方法"], "ans": [2, 4], "exp": "技术措施。工程项目目标在很大程度上需要通过采取技术措施来实现。为此，需要结合工程项目目标控制需求和工程特点，编制项目管理规划、施工组织设计、施工方案并对其技术可行性进行审查、论证；改进施工方法和施工工艺，采用更先进的施工机具；采用新技术、新材料、新工艺、新设备等“四新”技术并组织专家论证其可靠性和适用性等。还要在整个项目实施过程中，采用工程网络计划技术、价值工程、挣值分析等方法和数字化、智能化技术等进行动态控制。"}, {"id": 1572, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "下列施工环节中，需要设置质量控制点的有（  ）。", "opts": ["预应力混凝土结构的钢筋张拉工序", "钢筋混凝土结构中的钢筋架立", "预应力混凝土结构中的模板支撑", "预应力混凝土结构表面涂饰", "地下防水层施工"], "ans": [0, 1, 2, 4], "exp": "质量控制点的设置应遵循以下原则：①施工过程中的关键工序或环节及隐蔽工程，例如预应力结构的张拉工序、钢筋混凝土结构中的钢筋架立等。②施工中的薄弱环节或质量不稳定的工序、部位或对象，例如地下防水层施工等。③对后续工程施工或对后续工序质量或安全有重大影响的工序、部位或对象，例如预应力结构中的预应力钢筋质量、模板的支撑与固定等。④采用新技术、新工艺、新材料的部位或环节。⑤施工无足够把握、施工条件困难或技术难度大的工序或环节，例如复杂曲线模板的放样等。"}, {"id": 1573, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "根据《标准设计施工总承包招标文件》，工程总承包招标文件应包含的内容有（  ）。", "opts": ["合同条款及格式", "发包人提供的资料", "评标办法", "图纸和工程量清单", "投标资格审查办法"], "ans": [0, 1, 2], "exp": "工程总承包招标文件应包括下列内容：①招标公告或投标邀请书；②投标人须知；③评标办法；④合同条款及格式；⑤发包人要求；⑥发包人提供的资料；⑦投标文件格式；⑧投标人须知前附表规定的其他材料。此外，招标人对招标文件的澄清、修改，也构成招标文件的组成部分。"}, {"id": 1574, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "除实现源头减量目标外，编制施工现场建筑垃圾减量化专项方案还应实现的目标有（  ）。", "opts": ["过程控制", "循环利用", "集中处理", "影响评估", "快速处置"], "ans": [0, 1], "exp": "绿色施工应编制施工现场建筑垃圾减量化专项方案，实现建筑垃圾源头减量、过程控制、循环利用。"}, {"id": 1575, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "下列施工进度控制工作中，属于施工进度监测系统过程的有（  ）。", "opts": ["比较分析实际进度与计划进度", "分析进度偏差产生原因", "收集整理实际进度数据", "确定后续工作的限制条件", "预测进度偏差对总工期的影响"], "ans": [0, 2], "exp": "施工进度计划实施中的检查与分析："}, {"id": 1576, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "工程现场文明施工管理应遵循的原则有（  ）。", "opts": ["综合效益", "科学规划", "规范整齐", "环保达标", "整体和谐"], "ans": [1, 2, 3, 4], "exp": "施工现场管理应以“科学规划、规范整齐、环保达标、整体和谐”为原则，结合施工环境条件，认真进行施工现场文明形象管理的总体策划、设计、布置、使用和管理，做到布局合理，文明施工、安全有序、整洁卫生、不扰民、不损害公众利益。"}, {"id": 1577, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "EPC总承包模式中的“E”（Engineering），除一般意义上的工程设计外，所包含的工作内容有（  ）。", "opts": ["工艺流程设计", "工程管理", "工程策划", "工程估算", "工程融资"], "ans": [0, 1, 2], "exp": "EPC（设计一采购—施工）模式中，工程总承包单位还要负责材料设备的采购工作，且其中的设计（Engineering）也不是一般意义上的工程设计，含有工艺流程设计、策划和管理等。"}, {"id": 1578, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "关于危险性较大的分部分项工程专项施工方案的说法，正确的有（  ）。", "opts": ["实行施工总承包的，专项施工方案应由施工总承包单位编制", "实行施工总承包的，专项施工方案专家论证会应由施工总承包单位组织召开", "实行专业分包的，专项施工方案应由相关专业分包单位组织编制", "专项施工方案论证结论为“修改后通过”的，施工单位宜按专家意见修改", "专项施工方案经施工单位技术负责人和总监理工程师签字后方可实施"], "ans": [0, 1], "exp": "D错误，结论为“修改后通过”的，专家意见要明确具体修改内容，施工单位应按照专家意见进行修改，修改情况应及时告知专家。"}, {"id": 1579, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "中标人在签订施工合同前应进行的谈判准备工作有（  ）。", "opts": ["收集发包人资信情况", "分析发包人经济实力", "研判合同双方地位和优劣势", "草拟施工合同条款", "拟订合同谈判方案"], "ans": [0, 1, 2, 4], "exp": "合同谈判工作的成功与否，通常取决于谈判准备工作的充分程度及谈判策略或技巧的运用程度。谈判准备工作包括：收集发包人资信情况、履约能力及施工项目其他背景资料；分析发包人技术、经济实力及发包人谈判人员的身份、地位、性格、喜好、权限等；研判合同双方地位和优劣势；拟订合同谈判方案等。"}, {"id": 1580, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "下列本质安全化控制措施中，属于物的本质安全控制措施的有（  ）。", "opts": ["开展预先危险性分析", "落实安全风险分级管控和隐患排查治理双重预防机制", "运用人机匹配法分析最佳人机组合", "运用“四新”淘汰落后工艺、设备和材料", "通过合理的现场平面布局避免人与物的运动轨迹交叉"], "ans": [0, 1, 3], "exp": "促进工程项目物的本质安全的主要控制措施有：①开展预先危险性分析。②落实安全风险分级管控和隐患排查治理双重预防机制。③严格工程质量全过程、全方位管理，避免工程质量问题或质量事故引发安全生产事故。④运用“四新”技术提高物的本质安全，淘汰施工现场落后工艺、设备和材料。⑤严把设备设施选用关，采用适应现场作业条件和环境、稳定可靠的设备设施。⑥严把设备、设施使用前的验收关，避免有危险状态的设备、设施未验收前投入运行。"}, {"id": 1581, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "建筑企业对项目管理机构可控责任成本考核的内容有（  ）。", "opts": ["项目成本计划编制和落实情况", "项目成本管理工作制度建立情况", "项目成本管理责任制落实情况", "项目成本目标和阶段成本目标完成情况", "各施工队和班组责任成本检查和考核情况"], "ans": [0, 2, 3, 4], "exp": "企业对项目管理机构可控责任成本的考核包括：①项目成本目标和阶段成本目标完成情况；②建立以项目经理为核心的成本管理责任制的落实情况；③成本计划的编制和落实情况；④对各部门、各施工队和班组责任成本的检查和考核情况；⑤在成本管理中贯彻责权利相结合原则的执行情况。"}, {"id": 1582, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "工程施工方案中的“施工安排”应包含的内容有（  ）。", "opts": ["工程施工条件", "项目管理机构及其职责", "工程施工重点和难点分析", "工程施工顺序及施工流水段", "施工方法及工艺要求"], "ans": [1, 2, 3], "exp": "施工安排中应包括下列内容：（1）工程施工目标。（2）工程施工顺序及施工流水段。（3）工程施工的重点和难点分析，并简述主要的管理和技术措施。（4）项目管理机构及其职责。"}, {"id": 1583, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "某工程双代号网络计划如下图所示（节点上方数字分别为节点最早时间和最迟时间），图中表明的正确信息（  ）。", "opts": ["工作2-7的总时差等于自由时差", "工作5-8的自由时差为2", "工作1-3为关键工作", "工作2-4的总时差为4", "工作3-8的总时差为零"], "ans": [0, 1], "exp": "本题关键线路为：①→②→③→⑤→⑦→⑧。C错误，工作1-3为非关键工作。"}, {"id": 1584, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "根据《建设工程施工项目经理岗位职业标准》，施工项目经理在施工过程管理中应进行的工作有（  ）。", "opts": ["进行项目实施策划", "建立工程项目管理体系", "指派专人记录施工日志", "定期组织召开施工例会", "提交施工进展分析报告"], "ans": [2, 3, 4], "exp": "施工过程管理。施工项目经理应组织项目团队成员分析预测工程施工状况，结合工程项目目标制定和实施相关预控、预防措施。施工项目经理应定期组织召开施工例会，并应参加建设单位或项目监理机构组织召开的专题会议，研究解决与工程施工相关的问题，并指定专人负责记录和形成会议纪要。施工项目经理应组织项目团队成员跟踪检查工程项目实施情况，分析工程项目目标偏差及其原因，并采取有效措施调整工程项目实施计划。施工项目经理应指派专人记录施工日志，定期编制施工月报，按规定向工程项目相关方提交施工进展分析报告。"}, {"id": 1585, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "根据系统理论，关于系统安全管理的说法，正确的有（  ）。", "opts": ["应将人、机械、环境作为一个整体进行研究，追求系统安全", "应在规定的功能、时间、成本条件下，使人员和设备的伤害和损失最小", "安全管理工作的目标是控制危险源，努力将事故发生概率降到最低", "安全管理主要是消除几种选定的危险源，而不是减少总的危险性", "通常所说的安全或危险只是一种主观判断，没有一种事物是绝对安全的"], "ans": [0, 1, 2, 4], "exp": "D错误，不可能根除一切危险源和危险，可以减少来自现有危险源的危险性，应减少总的危险性而不是只消除几种选定的危险。"}, {"id": 1586, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "工程质量成本可分为控制成本和损失成本。下列施工成本中，属于工程质量控制成本的有（  ）。", "opts": ["质量规划费", "工程保修费", "质量培训费", "质量事故处理费", "工序检验费"], "ans": [0, 2, 4], "exp": "质量控制成本又可分为预防成本和鉴定成本。预防成本是指为防止工程质量缺陷和偏差出现，保证工程质量达到质量标准所采取的各项预防措施所支出的费用，包括质量规划费、工序控制费、新工艺鉴定费、质量培训费、质量信息费等；鉴定成本是指为保证工程质量而对工程本身及材料、构配件、设备等进行质量鉴定所支出的费用，包括施工图纸审查费，施工文件审查费，原材料、外购件检验试验费，工序检验费，工程质量验收费等。"}, {"id": 1587, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "根据国家标准《卓越绩效评价准则》，组织实施卓越绩效管理的基本理念可分为三个层面，其中阐明组织经营行为层面的基本理念有（  ）。", "opts": ["合作共赢", "战略导向", "社会责任", "系统管理", "以人为本"], "ans": [0, 2, 4], "exp": "阐明组织经营行为的基本理念。包括：社会责任；以人为本；合作共赢。"}, {"id": 1588, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "建设工程组织加快的成倍节拍流水施工的特点有（  ）。", "opts": ["相邻施工过程的流水步距均相等", "不同施工过程的流水节拍为倍数关系", "施工段之间可能存在空闲时间", "流水步距为流水节拍的最小值", "专业工作队数大于施工过程数"], "ans": [0, 1, 4], "exp": "加快的成倍节拍流水施工具有以下特点：①同一施工过程在各个施工段上的流水节拍均相等；不同施工过程的流水节拍为倍数关系。②相邻施工过程的流水步距相等，且等于流水节拍的最大公约数。③专业工作队数大于施工过程数。对于流水节拍大的施工过程，可按其倍数增加相应专业工作队数目。④各专业工作队在施工段上能够连续作业，施工段之间没有空闲时间。"}, {"id": 1589, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "根据FIDIC《设计采购施工（EPC）／交钥匙工程合同条件》，对于符合要求的分包工作，承包商应在不少于28天前向业主通知的事项有（  ）。", "opts": ["与分包商签订的分包合同文本", "拟雇用的分包商及其相关经验资料", "分包商承担现场工作的拟定完工日期", "分包商承担工作的拟定开工日期", "分包商完成工作的费用清单"], "ans": [1, 3], "exp": "银皮书规定，对符合要求的分包工作，承包商应在不少于28天前向业主通知以下事项：①拟雇用的分包商，并附包括其相关经验的详细资料；②分包商承担工作的拟定开工日期；③分包商承担现场工作的拟定开工日期。"}, {"id": 1590, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "根据国家标准《建设工程监理规范》，施工单位需报送项目监理机构检查复核的施工控制测量成果有（  ）。", "opts": ["施工平面控制网测量成果", "进场道路测量成果", "用地红线控制桩测量成果", "临时水准点测量成果", "高程控制网测量成果"], "ans": [0, 3, 4], "exp": "施工单位应将施工控制测量成果及保护措施报送的项目监理机构检查、复核。项目监理机构将会检查、复核以下内容：①施工单位测量人员的资格证书及测量设备检定证书；②施工平面控制网、高程控制网和临时水准点的测量成果及控制桩的保护措施。"}, {"id": 1591, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "根据《标准施工招标文件》，承包人应编制并报送监理人审批的工程实施措施计划有（  ）。", "opts": ["施工组织设计", "施工成本控制措施文件", "工程质量保证措施文件", "施工安全管理措施计划", "环境保护措施计划"], "ans": [0, 2, 3, 4], "exp": "编制工程实施措施计划。主要包括：①施工组织设计和施工进度计划。②工程质量保证措施文件。③施工安全管理措施计划。④环境保护措施计划。"}, {"id": 1592, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "采用相关图法分析混凝土结构质量时，根据不同风力与混凝土结构强度实测数据绘制的相关图中，数据点形成由左至右向下较为分散的直线带，则该相关图表明的正确信息有（  ）。", "opts": ["风力对混凝土强度有一定程度的影响", "除风力外还存在影响混凝土强度的其他因素", "风力与强度数据之间存在负相关关系", "风力与强度数剧之间存在强相关关系", "风力与强度数据之间存在相互制约的关系"], "ans": [1, 2], "exp": "弱负相关，散布点形成由左至右向下分布的较分散的直线带。说明x与y的相关关系较弱，且变化趋势相反，应考虑寻找影响y的其他更重要的因素。"}, {"id": 1593, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "根据《标准材料采购招标文件》，关于合同价格及价款支付的说法，正确的有（  ）。", "opts": ["供货周期不超过24个月的，应签订固定价合同", "向卖方支付的结清款应为合同价格的5％", "向卖方支付的预付款应为签约合同价的10％", "供货周期超过6个月的，应签订可调价合同", "向卖方支付的进度款应为合同价格的80％"], "ans": [1, 2], "exp": "B错误，供货周期不超过12个月的签约合同价通常为固定价格。C错误，供货周期超过12个月且合同材料交付时材料价格变化超过专用合同条款约定的幅度的，双方应按照专用合同条款中约定的调整方法对合同价格进行调整。D错误，向卖方支付进度款，进度款支付至该批次合同材料的合同价格的95%。"}, {"id": 1594, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "根据《标准设计施工总承包招标文件》，关于竣工试验的说法，正确的有（  ）。", "opts": ["承包人应在竣工试验中进行适当的检查和功能性试验", "承包人应提前14天将申请竣工试验通知送达监理人", "监理人应在接到竣工试验通知后21天内确定竣工试验时间", "除专用合同条款另有约定外，竣工试验应按三阶段进行", "承包人应在竣工试验前提交竣工记录、正式操作和维修手册"], "ans": [0, 3], "exp": "B错误，承包人应提前21天将申请竣工试验的通知送达监理人，并按照专用合同条款约定的份数，向监理人提交竣工记录、暂行操作和维修手册。C错误，监理人应在14天内，确定竣工试验的具体时间。E错误，待竣工试验完成后，承包人再完善、补充相关内容，完成正式的操作和维修手册。"}, {"id": 1595, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "工程承包风险管理中，在风险评估环节需进行的工作有（  ）。", "opts": ["风险等级判定", "工程本身条件分析", "风险因素发生概率分析", "风险损失量分析", "风险发生部位判定"], "ans": [0, 2, 3], "exp": "风险评估主要包括：①风险因素发生的概率；②风险损失量；③风险等级。"}, {"id": 1596, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "下列工作内容中，属于技术复核工作的有（  ）。", "opts": ["图纸会审", "施工工艺修改后的论证", "施工方案修改后的审核", "工程实物量变动的认可", "工程定位引测点的复测"], "ans": [0, 4], "exp": "对工程实施全过程中的关键过程、关键工序和特殊过程及容易发生质量问题的部位进行技术复核，是保证工程质量满足设计要求和合同规定的重要手段。如图纸会审或设计交底，工程定位引测点的复测，钢筋混凝土结构中钢筋的安装位置、规格、数量、连接及锚固情况的复核等，都属于技术复核的工作内容。"}, {"id": 1597, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "企业开展国际工程承包业务时，为应对汇率风险可采用的金融工具有（  ）。", "opts": ["税务优惠", "远期合约", "期权合约", "货币期货", "货币互换"], "ans": [1, 2, 3, 4], "exp": "企业可以根据自身情况和需要选择合适的应对汇率风险的金融工具，主要有：①远期合约，即与银行或金融机构签订远期合约，锁定未来一定期限内的汇率，以防汇率波动风险；②期权合约，即与银行或金融机构签订外汇期权合约，获得在未来约定日期或一定时间内，按照规定汇率买进或卖出一定数量外币的选择权；③货币期货（又称外汇期货），即与银行或金融机构签订以汇率为标的物的期货合约，根据合同规定的到期日内按约定的汇率进行外汇交割，以规避汇率风险；④货币互换（又称货币掉期），是指交易双方就两笔金额相同、期限相同、但货币不同的债务资金之间的调换，同时也进行不同利息额的货币调换，以降低筹资成本及规避汇率风险。"}, {"id": 1598, "source": "真题", "ch": null, "year": "2025", "sourceLabel": "2025年真题", "type": "multi", "q": "建设单位申请办理工程质量监督手续时，需提供的资料有（  ）。", "opts": ["工程监理合同", "施工投标文件", "施工组织设计", "工程质量评估报告", "中标通知书"], "ans": [0, 2, 4], "exp": "建设单位在申请办理工程质量监督手续时，需提供下列资料：（1）施工图设计文件审查报告和批准书；（2）中标通知书和施工、监理合同；（3）建设单位、施工单位和工程监理单位的项目负责人和机构组成；（4）施工组织设计和监理规划（监理实施细则）；（5）其他需要的文件资料。"}];
