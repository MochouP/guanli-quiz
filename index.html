e": "single", "q": "某工程由3个结构形式与建造规模完全一样的单体建筑组成，各单体建筑施工是由3个施工过程组成，各施工过程的流水节拍均为3天。其中，第二个施工过程提前插入2天，第二个施工过程与第三个施工过程之间有2天技术间歇时间，则流水施工工期为（　　）天。", "opts": ["11", "15", "17", "18"], "ans": [1], "exp": "T=（m+n-1）K+∑Z-∑C=（3+3-1）×3+2-2=15天。"}, {"id": 430, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列关于加快的成倍节拍流水施工特点的说法，正确的是（　　）。", "opts": ["相邻施工过程的流水步距相等，且等于流水节拍", "各专业工作队在施工段上不能连续作业，施工段之间有空闲时间", "同一施工过程在各个施工段上的流水节拍可能不相等", "对于流水节拍大的施工过程，可按其倍数增加相应专业工作队数目"], "ans": [3], "exp": "加快的成倍节拍流水施工具有以下特点：①同一施工过程在各个施工段上的流水节拍均相等；不同施工过程的流水节拍为倍数关系。②相邻施工过程的流水步距相等，且等于流水节拍的最大公约数。③专业工作队数大于施工过程数。对于流水节拍大的施工过程，可按其倍数增加相应专业工作队数目。④各专业工作队在施工段上能够连续作业，施工段之间没有空闲时间。"}, {"id": 431, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "全等节拍流水施工是一种最理想的流水施工方式，下列关于全等节拍流水施工特点的说法，错误的是（　　）。", "opts": ["所有施工过程在各个施工段上的流水节拍均相等", "相邻施工过程的流水步距相等，但是不等于流水节拍", "各专业工作队在各施工段上能够连续作业，施工段之间没有空闲时间", "专业工作队数等于施工过程数，即每一个施工过程组建一个专业工作队"], "ans": [1], "exp": "全等节拍流水施工是一种最理想的流水施工方式，具有以下特点：①所有施工过程在各个施工段上的流水节拍均相等；②相邻施工过程的流水步距相等，且等于流水节拍；③专业工作队数等于施工过程数，即每一个施工过程组建一个专业工作队；④各专业工作队在各施工段上能够连续作业，施工段之间没有空闲时间。"}, {"id": 432, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某分部工程由4个施工过程组成，分为5个施工段，流水节拍均为3天，但第四个施工过程需提前1天插入施工，该分部工程的工期为（　　）天。", "opts": ["22", "23", "24", "27"], "ans": [1], "exp": "T=（m+n-1）K+∑Z-∑C=（5+4-1）×3-1=23天。"}, {"id": 433, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某分部工程有3个施工过程，分为4个施工段组织流水施工。各施工过程的流水节拍分别为3天、5天、4天、3天，3天、4天、4天、2天和4天、3天、3天、4天，则流水施工工期为（　　）天。", "opts": ["20", "21", "22", "23"], "ans": [3], "exp": "施工过程I：3，8，12，15；施工过程Ⅱ：3，7，11，13；施工过程Ⅲ：4，7，10，14；K1，2=max[3，5，5，4，-13]=5；K2，3=max[3，3，4，3，-14]=4；T=∑K+∑tn=（5+4）+14=23天。"}, {"id": 434, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某分部工程有4个施工过程，3个施工段组成，已知各施工过程的流水节拍分别为4天、6天、2天和4天，则应当安排（　　）个专业工作队来组织加快的成倍节拍流水施工。", "opts": ["4", "6", "8", "12"], "ans": [2], "exp": "流水步距K=（4，6，2，4）=2天，工作队数=4/2+6/2+2/2+4/2=8个。"}, {"id": 435, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "建设工程组织流水施工时，流水步距的大小取决于（　　）。", "opts": ["参加流水施工的作业队数和流水施工的组织方式", "相邻两个专业工作队在各施工段上的流水节拍和施工段的划分数量", "参加流水施工的作业队数和施工段的划分数量", "相邻两个专业工作队在各施工段上的流水节拍和流水施工的组织方式"], "ans": [3], "exp": "流水步距的大小取决于相邻两个专业工作队在各施工段上的流水节拍及流水施工的组织方式。"}, {"id": 436, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "在有节奏流水施工中，各施工过程的流水节拍各自相等，而不同施工过程之间的流水节拍不尽相等的流水施工指的是（　　）。", "opts": ["等节奏流水施工", "异节奏流水施工", "非节奏流水施工", "固定节拍流水施工"], "ans": [1], "exp": "异节奏流水施工是指在有节奏流水施工中，各施工过程的流水节拍各自相等，而不同施工过程之间的流水节拍不尽相等的流水施工。"}, {"id": 437, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "在组织流水施工中，用来表达流水施工在施工工艺方面进展状态的参数是（　　）。", "opts": ["流水强度和施工段", "流水节拍和施工段", "工作面和施工过程数", "流水强度和施工过程数"], "ans": [3], "exp": "工艺参数是指在组织流水施工时，用以表达流水施工在施工工艺方面进展状态的参数，通常包括施工过程和流水强度两个参数。"}, {"id": 438, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某建设工程划分为4个施工过程，4个施工段组织加快的成倍节拍流水施工，流水节拍分别为6天、3天、9天和12天，则需要专业工作队总数为（　　）个。", "opts": ["3", "4", "10", "11"], "ans": [2], "exp": "首先需要求出流水步距，K=最大公约数{6，3，9，12}=3天；专业工作队数=6/3+3/3+9/3+12/3=10个。"}, {"id": 439, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某分部工程有两个施工过程，分为3个施工段组织非节奏流水施工，各施工过程的流水节拍分别为3天、5天、6天和4天、4天、5天，则两个施工过程之间的流水步距是（　　）天。", "opts": ["3", "4", "5", "6"], "ans": [3], "exp": "大差法求步距："}, {"id": 440, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某工程有3个施工过程，分为3个施工段组织流水施工。3个施工过程的流水节拍依次为3、3、4天，5、2、1天和4、1、5天，则流水施工工期为（　　）天。", "opts": ["13", "15", "18", "20"], "ans": [2], "exp": "用大差法求出流水步距分别为3、5，最后一个施工过程施工了4+1+5=10天，故流水施工工期=3+5+10=18天。"}, {"id": 441, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列不属于流水施工表达方式的是（　　）。", "opts": ["网络图", "鱼刺图", "横道图", "垂直图"], "ans": [1], "exp": "流水施工用网络图表达时，需要编制流水网络计划。除此之外，流水施工通常用横道图和垂直图表示。"}, {"id": 442, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某工程有3个施工过程，3个施工段，流水节拍分别为4、2、4，组织加快的成倍节拍流水施工，则流水施工工期为（　　）天。", "opts": ["10", "14", "16", "18"], "ans": [1], "exp": "流水施工工期计算。流水步距=流水节拍的最大公约数=2，专业工作队数=4/2+2/2+4/2=5，流水施工工期=（3+5-1）×2=14天。"}, {"id": 443, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "流水强度也称为流水能力或生产能力，是指流水施工的（　　）。", "opts": ["若干个劳动量大致相等的施工区段", "某个专业工作队在单位时间内所完成的工程量", "某个专业工作队在一个施工段上的施工时间", "两个相邻专业工作队相继开始施工的最小间隔时间"], "ans": [1], "exp": "流水强度也称为流水能力或生产能力，是指流水施工的某施工过程（或专业工作队）在单位时间内所完成的工程量。"}, {"id": 444, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "组织流水施工时，流水步距是指（　　）。", "opts": ["第一个专业队与最后一个专业队开始施工的最大间隔时间", "第一个专业队与其他专业队开始施工的最小间隔时间", "两个相邻专业工作队相继开始施工的最大时间间隔", "两个相邻专业工作队相继开始施工的最小时间间隔"], "ans": [3], "exp": "流水步距是指两个相邻专业工作队相继开始施工的最小间隔时间。"}, {"id": 445, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "专业工作队在各个施工段上的劳动量要大致相等，其相差幅度不宜超过（　　）。", "opts": ["5%", "10%", "15%", "20%"], "ans": [2], "exp": "同一专业工作队在各个施工段上的劳动量应大致相等，相差幅度不宜超过15%。"}, {"id": 446, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某基础工程包含开挖基槽、浇筑混凝土垫层、砌筑砖基础三项工作，分三个施工段组织流水施工，每项工作均由一个专业班组施工，各工作在各施工段上的流水节拍分别是4天、1天和2天，混凝土垫层和砌筑砖基础之间有1天的技术间歇。在保证各专业班组连续施工的情况下，完成该基础施工的工期是（　　）天。", "opts": ["8", "12", "18", "22"], "ans": [2], "exp": "采用累加数列错位相减取大差法计算异步距异节奏流水步距，再计算流水施工工期。开挖基槽与浇筑混凝土垫层之间的流水步距为10天，浇筑混凝土垫层与砌筑砖基础之间的流水步距为1天，流水施工工期=（10+1）+（2+2+2）+1=18天。"}, {"id": 447, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某工程有3个施工过程，分为4个施工段组织流水施工。流水节拍分别为2天、3天、4天、3天；4天、2天、3天、5天；3天、2天、2天、4天，则流水施工工期为（　　）天。", "opts": ["17", "19", "20", "21"], "ans": [3], "exp": "首先，按照累加数列错位相减取大差的方法，先计算相邻施工过程流水步距分别为3天、7天，T=∑K+∑tn=3+7+11=21天。"}, {"id": 448, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某等节奏流水施工，其中施工过程m=3，施工段n=4，流水节拍t=2，其中施工过程①和施工过程②间隔一天，则该流水施工总工期为（　　）天。", "opts": ["10", "11", "12", "13"], "ans": [3], "exp": "流水施工总工期=T=（m+n-1）K+∑Z-∑C=（3+4-1）×2+1=13天。"}, {"id": 449, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列选项中，不属于流水施工的垂直图表示法的优点是（　　）。", "opts": ["施工过程及其先后顺序表达清楚", "时间和空间状况形象直观", "编制起来比横道图方便", "斜向进度线的斜率可以直观地表示出各施工过程的进展速度"], "ans": [2], "exp": "采用垂直图表达流水施工的优点是：施工过程及其先后顺序表达清楚，不仅时间和空间状况形象直观，而且斜向进度线的斜率还可直观反映各施工过程的进展速度。"}, {"id": 450, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某工程有3个施工过程，分3个施工段组织固定节拍流水施工，流水节拍为2天。各施工过程之间存在2天的工艺间歇时间，则流水施工工期为（　　）天。", "opts": ["10", "12", "14", "16"], "ans": [2], "exp": "流水施工工期=（3+3-1）×2+2×2=14天。"}, {"id": 451, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某工程有3个施工过程，划分为4个施工段组织加快的成倍节拍流水施工，各施工过程流水节拍分别是6天、6天和9天，则该工程的流水步距和专业工作队总数分别是（　　）。", "opts": ["3和7", "3和6", "2和7", "2和6"], "ans": [0], "exp": "各施工过程流水节拍分别是6天、6天和9天，最大公约数为3，因此流水步距为3天，专业工作队数=6/3+6/3+9/3=7个。"}, {"id": 452, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "建设工程组织流水施工时，某一个专业工作队在一个施工段上的施工时间是（　　）。", "opts": ["流水强度", "流水节拍", "流水步距", "时间定额"], "ans": [1], "exp": "流水节拍是指某一个专业工作队在一个施工段上的施工时间。"}, {"id": 453, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列关于施工段与专业队关系的叙述中，说法错误的是（　　）。", "opts": ["施工段数目过多会降低施工速度", "施工段数目过多会延长工期", "施工段数目过多不利于充分利用工作面", "施工段过少可能造成窝工"], "ans": [2], "exp": "施工段的数目要满足合理组织流水施工的要求。施工段过多，会降低施工速度，延长工期；施工段过少，不利于充分利用工作面，可能造成窝工。"}, {"id": 454, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "建设工程组织流水施工时，施工过程数为n，施工段数为m个，则流水步距的总数为（　　）。", "opts": ["n", "n-1", "m", "m-1"], "ans": [1], "exp": "流水步距的数目取决于参加流水的施工过程数。如果施工过程数为n个，则流水步距的总数为n-1个。"}, {"id": 455, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "根据流水施工组织方式的概念，区别流水施工组织方式的特征参数是（　　）。", "opts": ["流水步距", "流水节拍", "施工工期", "施工段数"], "ans": [1], "exp": "流水节拍是指某一个专业工作队在一个施工段上的施工时间。流水节拍表明流水施工的速度和节奏性。流水节拍小，其流水速度快，节奏感强；反之则相反。流水节拍决定单位时间的资源供应量，同时，同时，流水节拍也是区别流水施工组织方式的特征参数。"}, {"id": 456, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列流水施工空间参数中，某专业工种所必须具备的活动空间是指（　　）。", "opts": ["施工层", "施工段", "工作面", "施工过程"], "ans": [2], "exp": "工作面是指供某专业工种的工人或某种施工机械进行施工的活动空间。"}, {"id": 457, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某工程由5个施工过程组成，分为三个施工段组织固定节拍流水施工。在不考虑提前插入时间的情况下，要求流水施工工期不超过42天，则流水节拍的最大值为（　　）天。", "opts": ["4", "5", "6", "8"], "ans": [2], "exp": "施工过程数目n=5，施工段数目m=3，工期T=42，流水节拍用t表示，流水施工工期T=（m+n-1）t，计算可得t=6。"}, {"id": 458, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某建设工程划分为4个施工过程、3个施工段组织加快的成倍节拍流水施工。流水节拍分别为4天，6天，4天和2天，则流水步距为（　　）天。", "opts": ["2", "3", "4", "6"], "ans": [0], "exp": "加快的成倍节拍流水施工下的流水步距等于流水节拍的最大公约数，所以流水步距=min[4，6，4，2]=2（天）。"}, {"id": 459, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某分部工程有3个施工过程，各分为5个流水节拍相等的施工段组织加快的成倍节拍流水施工，已知各施工过程的流水节拍分别为4天、6天、4天，则流水步距和专业工作队数分别为（　　）。", "opts": ["6天和3个", "4天和4个", "4天和3个", "2天和7个"], "ans": [3], "exp": "具体计算过程如下：①计算流水步距。流水步距等于流水节拍的最大公约数，即：K=min[4，6，4]=2。②确定专业工作队数目。每个施工过程成立的专业工作队数目分别为：bI=4/2=2，bII=6/2=3，bIII=4/2=2，于是，参与该工程流水施工的专业工作队总数n′为：n′=2＋3＋2=7。"}, {"id": 460, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某分部工程有4个施工过程，各分为3个施工段组织加快的成倍节拍流水施工。各施工过程在各施工段上的流水节拍分别为6、4、6、4天，则专业工作队数应为（　　）个。", "opts": ["3", "4", "6", "10"], "ans": [3], "exp": "成倍节拍流水施工的计算过程如下：①计算流水步距，流水步距等于流水节拍的最大公约数，即K=min［6，4，6，4］=2；②确定专业工作队数目，每个施工过程成立的专业工作队数目可按公式bj＝tj/K计算；③参与该工程流水施工的专业工作队总数n′=∑bj=3+2+3+2=10（个）。"}, {"id": 461, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "建设工程组织流水施工时，用以表达流水施工在施工工艺方面进展状态的参数是（    ）。", "opts": ["施工段数", "流水强度", "流水步距", "工作面"], "ans": [1], "exp": "工艺参数是指在组织流水施工时，用以表达流水施工在施工工艺方面进展状态的参数，通常包括施工过程数和流水强度两个参数。"}, {"id": 462, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某工程有3个施工过程，分4个施工段，如图所示施工过程Ⅱ到Ⅲ的步距是（    ）。", "opts": ["6", "3", "4", "5"], "ans": [0], "exp": "利用大差法，K1=5，K2=6。"}, {"id": 463, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "与依次施工和平行施工相比，建设工程组织流水施工的特点是（    ）。", "opts": ["施工现场组织管理比较简单", "可充分利用工作面进行施工", "各专业工作队能够连续施工", "单位时间内投入资源量较少"], "ans": [2], "exp": "流水施工组织方式具有以下特点：（1）尽可能利用工作面进行施工，工期较短；（2）各工作队实现专业化施工，有利于提高施工技术水平和劳动效率，也有利于提高工程质量；（3）专业工作队能够连续施工，同时使相邻专业工作队之间能够最大限度地进行搭接作业；（4）单位时间内投入的劳动力、施工机具等资源较为均衡，有利于资源供应的组织；（5）为施工现场的文明施工和科学管理创造了有利条件。"}, {"id": 464, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某分部工程有3个施工过程，划分为4个施工段组织非节奏流水施工，流水节拍见下表。该分部工程流水施工工期是（    ）。", "opts": ["23", "26", "24", "25"], "ans": [1], "exp": "本题为无节奏流水施工，用大差法可以得到。KI-II=4，KII-III=5。所以工期Y=ΣK+Tn=4+5+17=26。"}, {"id": 465, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "下列属于平行施工组织方式特点的有（　　）。", "opts": ["能够充分利用工作面进行施工，工期短", "如果每一施工对象均按专业组建工作队，则各专业工作队不能连续作业", "如果由一个工作队完成一个施工对象的全部施工任务，则不能实现专业化施工", "单位时间内投入的劳动力、施工机具等资源成倍增加，有利于资源供应的组织", "只有一个工作队进行施工作业，施工现场的组织管理比较简单"], "ans": [0, 1, 2], "exp": "平行施工组织方式具有以下特点：（1）能够充分利用工作面进行施工，工期短；（2）如果每一施工对象均按专业组建工作队，则各专业工作队不能连续作业，工作出现间歇，劳动力和施工机具等资源无法均衡使用；（3）如果由一个工作队完成一个施工对象的全部施工任务，则不能实现专业化施工，不利于提高劳动生产率和工程质量；（4）单位时间内投入的劳动力、施工机具等资源成倍增加，不利于资源供应的组织；（5）有多个专业工作队在现场施工，施工现场组织管理比较复杂。"}, {"id": 466, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "下列属于非节奏流水施工特点的有（　　）。", "opts": ["不同施工过程的流水节拍为倍数关系", "专业工作队数等于施工过程数", "相邻施工过程的流水步距不尽相等", "各施工过程在各施工段上的流水节拍不全相等", "各专业工作队能够在施工段上连续作业"], "ans": [1, 2, 3, 4], "exp": "非节奏流水施工具有以下特点：①各施工过程在各施工段上的流水节拍不全相等；②相邻施工过程的流水步距不尽相等；③专业工作队数等于施工过程数；④各专业工作队能够在施工段上连续作业，但有的施工段之间可能有空闲时间。"}, {"id": 467, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "下列关于依次施工组织方式特点的说法，正确的有（　　）。", "opts": ["可以充分利用工作面进行施工，工期较短", "若按专业组建工作队，可保证各专业工作队能连续作业", "只有一个工作队进行施工作业，施工现场的组织管理比较简单", "如果由一个工作队完成全部施工任务，则不能实现专业化施工", "单位时间内投入劳动力、施工机具等资源量较少，有利于资源供应的组织"], "ans": [2, 3, 4], "exp": "依次施工组织方式具有以下特点：（1）没有充分利用工作面进行施工，工期较长；（2）如果按专业组建工作队，则各专业工作队不能连续作业，工作出现间歇，劳动力和施工机具等资源无法均衡使用；（3）如果由一个工作队完成全部施工任务，则不能实现专业化施工，不利于提高劳动生产率和工程质量；（4）单位时间内投入劳动力、施工机具等资源量较少，有利于资源供应的组织；（5）只有一个工作队进行施工作业，施工现场的组织管理比较简单。"}, {"id": 468, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "下列流水施工参数中，不属于时间参数的有（　　）。", "opts": ["流水节拍", "流水强度", "流水步距", "流水施工工期", "施工过程"], "ans": [1, 4], "exp": "时间参数是指在组织流水施工时，用以表达流水施工在时间安排上所处状态的参数，主要包括流水节拍、流水步距和流水施工工期等。"}, {"id": 469, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "下列流水施工参数中，属于空间参数的有（　　）。", "opts": ["流水节拍", "工作面", "流水强度", "施工过程", "施工段数"], "ans": [1, 4], "exp": "空间参数是指在组织流水施工时，用以表达流水施工在空间布置上开展状态的参数。通常包括工作面和施工段数。"}, {"id": 470, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "下列关于流水施工组织方式特点的说法，错误的有（　　）。", "opts": ["尽可能利用工作面进行施工，工期较短", "为施工现场的文明施工和科学管理创造了有利条件", "各工作队能实现专业化施工，但是不利于提高施工技术水平和劳动效率", "单位时间内投入的劳动力、施工机具等资源成倍增加，不利于资源供应的组织", "有多个专业工作队在现场施工，施工现场组织管理比较复杂"], "ans": [2, 3, 4], "exp": "流水施工组织方式具有以下特点：（1）尽可能利用工作面进行施工，工期较短；（2）各工作队实现专业化施工，有利于提高施工技术水平和劳动效率，也有利于提高工程质量；（3）专业工作队能够连续施工，同时使相邻专业工作队之间能够最大限度地进行搭接作业；（4）单位时间内投入的劳动力、施工机具等资源较为均衡，有利于资源供应的组织；（5）为施工现场的文明施工和科学管理创造了有利条件。"}, {"id": 471, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "建设工程组织加快成倍节拍流水施工的特点有（　　）。", "opts": ["同一施工过程的各施工段上的流水节拍成倍数关系", "相邻施工过程的流水步距相等", "专业工作队数等于施工过程数", "各专业工作队在施工段上可连续工作", "施工段之间可能有空闲时间"], "ans": [1, 3], "exp": "加快成倍节拍流水施工的特点：同一施工过程在各个施工段上的流水节拍均相等，不同施工过程流水节拍为倍数关系；相邻施工过程的流水步距相等，等于流水节拍的最大公约数；专业工作队数大于施工过程数；各专业工作队在施工段上连续作业，施工段之间没有空闲时间。"}, {"id": 472, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "有节奏流水施工是指在组织流水施工时，每一个施工过程在各施工段上的流水节拍都各自相等的流水施工，可分为（　　）。", "opts": ["等节奏流水施工", "异节奏流水施工", "固定节拍流水施工", "全等节拍流水施工", "非节奏流水施工"], "ans": [0, 1, 2, 3], "exp": "有节奏流水施工是指在组织流水施工时，每一个施工过程在各施工段上的流水节拍都各自相等的流水施工，又可分为等节奏流水施工和异节奏流水施工。等节奏流水施工是指在有节奏流水施工中，各施工过程的流水节拍都相等的流水施工，也称为固定节拍流水施工或全等节拍流水施工。"}, {"id": 473, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "建设工程组织加快的成倍节拍流水施工时，具有的特点有（    ）。", "opts": ["各施工段之间可能有空闲时间", "相邻施工过程的流水步距相等", "专业工作队数大于施工过程数", "不同施工过程的流水节拍相等", "流水步距与流水节拍成倍数关系"], "ans": [1, 2, 4], "exp": "加快的成倍节拍流水施工特点。加快的成倍节拍流水施工具有以下特点：①同一施工过程在各个施工段上的流水节拍均相等；不同施工过程的流水节拍为倍数关系。②相邻施工过程的流水步距相等，且等于流水节拍的最大公约数。③专业工作队数大于施工过程数。对于流水节拍大的施工过程，可按其倍数增加相应专业工作队数目。④各专业工作队在施工段上能够连续作业，施工段之间没有空闲时间。"}, {"id": 474, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "建设工程组织异节奏流水施工时，可采用的具体方式有（    ）。", "opts": ["等步距异节奏流水施工", "等节拍异节奏流水施工", "固定节拍异节奏流水施工", "异步距异节奏流水施工", "异节拍异节奏流水施工"], "ans": [0, 3], "exp": ""}, {"id": 475, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某工程双代号网络计划如下图所示（时间单位：天），其关键线路有（　　）条。", "opts": ["0", "1", "2", "3"], "ans": [1], "exp": "关键线路为A→C→F→G→I→J。"}, {"id": 476, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某网络计划中，工作A有两项紧后工作C和D，C、D工作的持续时间分别为12天、7天，C、D工作的最迟完成时间分别为第18天、第10天，则工作A的最迟完成时间是第（　　）天。", "opts": ["3", "5", "6", "8"], "ans": [0], "exp": "工作C的最迟开始时间=最迟完成时间-持续时间=18-12=6天。工作D的最迟开始时间=最迟完成时间-持续时间=10-7=3天。工作A的最迟完成时间=紧后工作最迟开始时间的最小值=min{6，3}=3天。"}, {"id": 477, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某双代号网络计划如下图，说法正确的是（　　）。", "opts": ["总工期为16天", "H工作自由时差有2天", "K工作自由时差和总时差不相等", "关键线路有2条"], "ans": [3], "exp": "A选项错误，总工期为10天。B选项错误，H工作的自由时差为0天。C选项错误，K工作的自由时差和总时差相等且都为2天。D选项正确，关键线路有两条：A→D→G、B→E→I。"}, {"id": 478, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某工程双代号时标网络计划如下图所示，其中工作C的总时差是（　　）。", "opts": ["1", "2", "3", "4"], "ans": [1], "exp": "从C工作出发，到达网络计划终点⑧有3条路，波形线长度和分别是3，2，4，取最小值2。"}, {"id": 479, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列双代号网络图中，存在的绘图错误是（　　）。", "opts": ["出现循环回路", "存在多余的虚箭线", "存在多个终点节点", "存在曲线形状的箭线"], "ans": [0], "exp": "③→④→②→③，此为循环回路。"}, {"id": 480, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某项目双代号网络计划如下图（时间单位：天），该网络计划的计算工期是（　　）天。", "opts": ["18", "20", "21", "23"], "ans": [3], "exp": "关键线路为①→②→④→⑤→⑧，工期为8＋6＋9＝23（天）。"}, {"id": 481, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "根据某工程总进度规划而编制的分项工程双代号网络计划如图所示，在该网络计划中，自由时差为2的工作是（　　）。", "opts": ["⑥→⑦", "⑥→⑧", "⑦→⑨", "⑧→⑨"], "ans": [2], "exp": ""}, {"id": 482, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某双代号网络计划中（以天为单位），工作K的最早开始时间为5天，工作持续时间为4天；工作M的最迟完成时间为25天，工作持续时间为15天；工作N的最迟完成时间为20天，工作持续时间为6天。已知工作K只有M、N两项紧后工作，工作K的总时差为（　　）天。", "opts": ["2", "4", "1", "5"], "ans": [2], "exp": "工作M的最迟开始时间为25-15=10天，工作N的最迟开始时间为20-6=14天，工作K的最迟完成时间为min{10，14}=10天，工作K的最早完成时间为5+4=9天，所以，工作K的总时差为10-9=1天。"}, {"id": 483, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "单代号网络计划如下图所示（时间单位：天），工作C的最迟开始时间是（　　）天。", "opts": ["5", "6", "10", "15"], "ans": [2], "exp": "关键路线时间6+3+6+8=23天，终点时间最迟开始时间23-8=15，C工作最迟开始15-5=10天。"}, {"id": 484, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "在计算双代号网络计划的时间参数时，工作的最早开始时间应为其所有紧前工作（　　）。", "opts": ["最早完成时间的最小值", "最早完成时间的最大值", "最迟完成时间的最小值", "最迟完成时间的最大值"], "ans": [1], "exp": "工作的最早开始时间是指在其所有紧前工作全部完成后，本工作有可能开始的最早时间。"}, {"id": 485, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某单代号网络计划如下图所示（时间：天），下列选项中，正确的是（　　）。", "opts": ["E工作总时差为3天", "H工作自由时差为6天", "网络图工期为18天", "存在3条关键线路"], "ans": [0], "exp": "B选项错误，H工作自由时差为5天；C选项错误，工期为21天；D选项错误，只有1条关键线路。"}, {"id": 486, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "根据某工程总进度规划而编制的分项工程双代号网络计划如图所示，在该网络计划中，自由时差为1的工作是（　　）。", "opts": ["②→④", "④→⑧", "④→⑤", "⑧→⑨"], "ans": [2], "exp": ""}, {"id": 487, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某单代号网络计划的部分片段如下所示，且已知工作C与工作D的时间间隔为0，则工作C的持续时间为（　　）。", "opts": ["1", "3", "4", "6"], "ans": [2], "exp": "因为D工作的最早完成时间为10，且持续时间为4，因此D工作的最早开始时间为10-4=6。因为工作C与工作D的时间间隔为0，所以工作C的最早完成时间也为6，因为工作C的最早开始时间为2，所以工作C的持续时间为最早完成时间-最早开始时间=6-2=4天。"}, {"id": 488, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "应用工程网络计划技术编制施工进度计划，主要包括以下几个阶段：①网络图绘制阶段；②网络计划优化阶段；③时间参数计算阶段；④计划编制准备阶段。其中正确的编制程序是（　　）。", "opts": ["④→①→③→②", "④→③→①→②", "①→④→②→③", "①→③→②→④"], "ans": [0], "exp": "应用工程网络计划技术编制施工进度计划，可分为以下四个阶段：①计划编制准备阶段；②网络图绘制阶段；③时间参数计算阶段；④网络计划优化阶段。"}, {"id": 489, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某工程网络计划中，工作A的总时差为5天，自由时差为3天；在计划执行情况的检查中，发现工作A的实际进度拖后了6天。则关于工作A实际进度的说法，正确的（　　）。", "opts": ["使总工期拖后1天，紧后工作最早开始时间拖后3天", "不影响总工期，但使紧后工作最早开始时间拖后3天", "使总工期拖后1天，但不影响紧后工作的正常进行", "既不影响总工期，也不影响紧后工作的正常进行"], "ans": [0], "exp": "工作A的实际进度拖后了6天，拖后时间超过总时差，影响工期6-5=1（天），影响紧后工作的最早开始时间6-3=3（天）。"}, {"id": 490, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某双代号网络图见下图，存在的错误是（　　）。", "opts": ["多个终点节点", "存在循环回路", "节点编号有误", "有多余虚工作"], "ans": [2], "exp": "网络图中的节点都必须有编号，其编号严禁重复，并应使每一条箭线上箭尾节点编号小于箭头节点编号。节点编号有误④→③。"}, {"id": 491, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某双代号网络计划如下图（单位：天），则工作B的总时差为（　　）天。", "opts": ["1", "2", "3", "4"], "ans": [2], "exp": ""}, {"id": 492, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "双代号网络计划见下图（时间单位：天），其关键路线有（　　）条。", "opts": ["4", "3", "2", "1"], "ans": [2], "exp": ""}, {"id": 493, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某工程网络计划如下，工作E的最迟完成时间是第（　　）天。", "opts": ["5", "8", "10", "13"], "ans": [3], "exp": "由图已知工作E的最迟开始时间是第10天，工作延续时间为3天，最迟完成时间=最迟开始时间+持续时间=10+3=13天。"}, {"id": 494, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "在工程网络计划中，某项工作的最迟完成时间与最早完成时间的差值为该工作的（　　）。", "opts": ["自由时差", "总时差", "最迟开始时间", "最早开始时间"], "ans": [1], "exp": "工作的总时差等于该工作最迟完成时间与最早完成时间之差，或该工作最迟开始时间与最早开始时间之差。"}, {"id": 495, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "已知某建设工程网络计划中工作M的自由时差为3天，总时差为6天。监理工程师在检查施工进度时发现该工作实际进度拖延，且影响总工期1天，则该工作实际进度比计划进度拖延（　　）天。", "opts": ["5", "2", "4", "7"], "ans": [3], "exp": "工作的总时差是指在不影响总工期的前提下，本工作可以利用的机动时间。影响总工期1天，也就是工作拖延不但超过了总时差，而且超过了总时差1天。所以，拖延的时间=6+1=7天。"}, {"id": 496, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某单代号网络计划中，工作i的最早开始时间是2天，耗时时间是1天，其紧后工作j的最迟开始时间是第7天，总时差是3天，则工作i、j的间隔时间是（　　）天。", "opts": ["2", "1", "4", "5"], "ans": [1], "exp": "j工作最迟开始时间为第7天，总时差为3天，j工作最早开始时间=7-3=4，4-（2+1）=1天。"}, {"id": 497, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某双代号网络计划如下图（时间单位：天）工作D的最早完成时间为（　　）。", "opts": ["9", "7", "8", "10"], "ans": [0], "exp": "Max{3+5，4+5}=9。"}, {"id": 498, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某工程双代号网络计划如下图所示，关键线路有（　　）条。", "opts": ["3", "1", "2", "4"], "ans": [0], "exp": "关键线路有三条，分别是：①→②→③→⑦；①→②→⑤→⑥→⑦；①→④→⑥→⑦。"}, {"id": 499, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "工作N的最早开始时间是12，持续时间是5，N后有三项紧后工作，他们的最早开始时间分别为：20、21、23，N工作的自由时差（　　）。", "opts": ["0", "1", "2", "3"], "ans": [3], "exp": "自由时差等于紧后工作的最早开始时间减去本工作的最早完成时间所得之差的最小值，工作N的自由时差=min{20-（12+5），21-（12+5），23-（12+5）}=3天。"}, {"id": 500, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "若工作A持续4天，最早第2天开始，有两个紧后工作：工作B持续1天，最迟第10天开始，总时差2天；工作C持续2天，最早第9天完成。则工作A的自由时差是（　　）天。", "opts": ["0", "1", "2", "3"], "ans": [1], "exp": "经计算，得出：工作B的最早开始时间为8，工作C的最早开始时间为7，所以工作A的自由时差＝min{8，7}-6＝1。"}, {"id": 501, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某项目网络计划如图所示（时间单位：天），关于D工作的说法，正确的是（　　）。", "opts": ["工作D只能出现在关键线路上", "工作D只能出现在非关键线路上", "工作D可以出现在非关键线路上", "工作D总时差不为零"], "ans": [2], "exp": "D工作分别经过线路A→D→G，A→D→H，B→D→G，B→D→H，其中ADH为关键线路，其余3条为非关键线路。故AB选项说法错误，C选项说法正确；D工作是属于关键工作，总时差为0，D选项错误。"}, {"id": 502, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某工作最早开始时间为第4天，总时差为2天，持续时间为6天，该工作的最迟完成时间是第（　　）天。", "opts": ["9", "11", "10", "12"], "ans": [3], "exp": "本工作最迟开始时间=最早开始+总时差=6，由于工作持续6天，则最迟完成时间为第12天。"}, {"id": 503, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "网络计划中，某项工作的最早开始时间是第4天，持续2天，其两项紧后工作的最迟开始时间是第9天和第11天，该项工作的最迟开始时间是第（　　）天。", "opts": ["6", "8", "9", "7"], "ans": [3], "exp": "工作最迟完成时间＝各项紧后工作最迟开始时间的最小值，即该工作最迟完成时间为9天，该工作最迟开始时间＝该工作最迟完成时间－持续时间＝9－2＝7（天）。"}, {"id": 504, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列关于网络计划线路的说法，正确的是（　　）。", "opts": ["线路可依次用该线路上的节点代号来表示", "线路段是由多个箭线组成的通路", "总持续时间最短的线路称为关键线路", "关键线路只有一条，非关键线路可以有多条"], "ans": [0], "exp": "网络图中从起始节点开始，沿箭头方向顺序通过一系列箭线与节点，最后达到终点节点的通路称为线路。线路既可依次用该线路上的节点编号来表示，也可依次用该线路上的工作名称来表示。在关键线路法（CPM）中，线路上所有工作的持续时间总和称为该线路的总持续时间。总持续时间最长的线路称为关键线路，关键线路的长度就是网络计划的总工期。工程网络计划中的关键线路可能不止一条。在工程网络计划实施过程中，关键线路还会发生转移。"}, {"id": 505, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "网络计划中，某项工作的持续时间是4天，最早第2天开始，两项紧后工作分别最早在第8和第12天开始。该项工作的自由时差是（　　）天。", "opts": ["4", "2", "6", "8"], "ans": [1], "exp": "自由时差等于各个紧后工作的最早开始时间的最小值减去本工作的最早完成时间。即8－（2+4）=2。"}, {"id": 506, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "在不影响其紧后工作最早开始的前提下，工作可以利用的机动时间是（　　）。", "opts": ["最早开始时间", "最早完成时间", "总时差", "自由时差"], "ans": [3], "exp": "自由时差是指在不影响其紧后工作最早开始的前提下，本工作可以利用的机动时间。"}, {"id": 507, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列工程进度计划方法中，属于肯定型图路计划方法的是（    ）。", "opts": ["计划评审技术", "图示评审技术", "关键线路法", "线性进度法"], "ans": [2], "exp": "（1）按工作持续时间的性质不同，工程网络计划可分为肯定型网络计划、非肯定型网络计划和随机型网络计划。关键线路法（CPM）就是一种肯定型网络计划，计划评审技术（PERT）属于非肯定型网络计划，而图示评审技术（GERT）、风险评审技术（VERT）则属于随机型网络计划。"}, {"id": 508, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某工程双代号网络计划如下图所示，其中关键工作的数量（不含虚工作）是（    ）项。", "opts": ["5", "3", "4", "6"], "ans": [0], "exp": ""}, {"id": 509, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列关于关键工作和关键节点说法中，正确的是（    ）。", "opts": ["关键工作两端的节点一定是关键节点", "关键节点所构成的工作一定是关键工作", "关键节点只能在关键工作两端", "关键工作两端的节点不一定是关键节点"], "ans": [0], "exp": "B项错误，关键节点所构成的工作不一定是关键工作，C项错误，关键节点也可以在非关键工作两端。D项错误，关键工作两端的节点一定是关键节点。"}, {"id": 510, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "在工程网络计划合理可行的的提下，关于各种工期相互关系的说法，正确的是（    ）。", "opts": ["计划工期不应超过计算工期", "计划工期不应超过要求工期", "要求工期不应超过计算工期", "要求工期不应超过计划工期"], "ans": [1], "exp": "工期泛指完成一项任务所需要的时间。在网络计划中，工期一般有以下三种：计算工期、要求工期、计划工期。当已规定要求工期时，计划工期不应超过要求工期；当未规定要求工期时，可令计划工期等于计算工期。"}, {"id": 511, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "按照工程网络计划编制程序，在网络图绘制阶段需要进行的工作是（    ）。", "opts": ["进行工程项目分解", "确定网络计划目标", "调查工程实施条件", "分析工作持续时间"], "ans": [0], "exp": "网络图绘制阶段：主要包括工程项目分解、确定逻辑关系和绘制网络图等工作。"}, {"id": 512, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某工程双代号计划如下图所示，其中关键线路是（    ）条。", "opts": ["4", "3", "2", "1"], "ans": [1], "exp": "关键线路共3条：①→③→④→⑦；①→③→④→⑤→⑥→⑦；①→②→⑤→⑥→⑦。"}, {"id": 513, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "下列关于双代号网络计划中线路的说法，正确的有（　　）。", "opts": ["非关键线路就是指总持续时间最短的线路", "一个网络图中可能有一条或多条关键线路", "线路中各项工作持续时间之和就是该线路的长度", "线路中各节点应从小到大连续编号", "没有虚工作的线路称为关键线路"], "ans": [1, 2], "exp": "A选项错误，总持续时间最长的线路为关键线路，其余线路均为非关键线路。D选项错误，节点编号顺序应从小到大，可以不连续，但不能重复。E选项错误，双代号网络计划的关键线路可以有虚工作。"}, {"id": 514, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "某工程单代号网络计划见下图（时间单位：天），下列说法正确的是（　　）。", "opts": ["总工期为8天", "工作E的总时差是1天", "工作B的最迟完成时间为第8天", "关键线路只有一条", "工作D的自由时差是0天"], "ans": [3, 4], "exp": ""}, {"id": 515, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "下列关于双代号时标网络图（单位：天），说法正确的是（　　）。", "opts": ["关键线路只有一条", "工作H的自由时差为2天，工作H延误3天，对工作J无影响", "工作L的最迟开始时间为第16天", "工作F的紧前工作是工作B、C，紧后工作是工作G、H、I", "工作K、J、L完成后，工作N即可开始"], "ans": [1, 4], "exp": "A选项错误，关键线路共有三条，分别是：①→③→⑥→⑦→⑨→⑪→⑭→⑮，①→③→④→⑤→⑥→⑦→⑨→⑪→⑭→⑮，①→④→⑤→⑥→⑦→⑨→⑪→⑭→⑮；选项C错误，工作L的总时差为3天，工作L的最迟开始时间=最早开始时间+总时差=12+3=15天。选项D错误，工作F的紧前工作是工作A、B、C，紧后工作是工作G、H、I。"}, {"id": 516, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "下列网络图中，存在的绘图错误有（　　）。", "opts": ["存在双向箭头", "工作代号重复", "有多个起点节点", "有循环回路", "有多个终点节点"], "ans": [1, 4], "exp": "双代号网络图中应只有一个起点节点和一个终点节点（多目标网络计划除外），本题图中有两个终点节点⑥和⑦。一项工作应当只有唯一的一条箭线和相应的一对节点，节点③和④在图中表示两项工作。"}, {"id": 517, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "某双代号网络计划如图，其关键工作有（　　）。", "opts": ["①→③", "①→②", "④→⑤", "②→⑥", "⑥→⑧"], "ans": [0, 2, 4], "exp": "本题关键线路为B→D→G，所以关键线路上的工作为关键工作。"}, {"id": 518, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "某双代号网络计划如下图，关键线路有（　　）。", "opts": ["②-③-⑤", "①-③-④", "①-⑤", "①-③-⑤", "②-③-④"], "ans": [2, 3], "exp": "线路上总的工作持续时间最长的线路为关键线路。"}, {"id": 519, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "计划编制准备阶段，主要包括调查研究和确定网络计划目标等工作。其中，确定网络计划目标，一般可分为（　　）。", "opts": ["时间目标", "成本目标", "资源目标", "时间－资源目标", "时间－成本目标"], "ans": [0, 3, 4], "exp": "确定网络计划目标。一般可分为三类：①时间目标，即工期目标。②时间－资源目标，通常会考虑“资源有限，工期最短”目标，即在资源供应能力有限的情况下，寻求工期最短的计划安排；或者考虑“工期固定，资源均衡”目标，即在工期固定前提下，寻求资源需用量尽可能均衡的计划安排。③时间－成本目标，即在限定工期条件下寻求最低总成本或寻求最低总成本时的工期安排。"}, {"id": 520, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "调查研究的主要目的是掌握足够充分、准确的资料，其内容包括（　　）。", "opts": ["工程任务情况", "资源有限，工期最短", "资金需求与供应情况", "有关统计资料", "工期固定，资源均衡"], "ans": [0, 2, 3], "exp": "调查研究的主要目的是掌握足够充分、准确的资料，从而为确定合理的进度目标、编制科学的进度计划提供可靠依据。调查研究内容包括：①工程任务情况、实施条件、设计资料；②有关标准、定额、制度；③劳动力、材料、施工机具等资源需求与供应情况；④资金需求与供应情况；⑤有关统计资料、经验总结及类似工程实际进展资料等。"}, {"id": 521, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "某工程施工进度计划如图所示，下列说法中，正确的有（　　）。", "opts": ["工作L的紧前工作仅有工作I", "工作B的紧后工作仅有工作E", "工作I的紧后工作有工作L和工作K", "工作C的紧后工作有工作D和工作E", "工作F的紧前工作有工作A和工作D"], "ans": [1, 3], "exp": "选项A错误，工作L的紧前工作有工作I和工作E；选项C错误，工作I的紧后工作仅有工作L；选项E错误，工作F的紧前工作仅有工作A。"}, {"id": 522, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "下列关于双代号时标网络计划的说法，正确的有（　　）。", "opts": ["以时间坐标为尺度表示工作进度安排", "宜按各项工作的最迟完成时间编制", "以实箭线表示工作，没有虚箭线", "当计划工期等于计算工期时，波形线的水平投影长度表示其自由时差", "时标网络计划具有直观易懂的优点"], "ans": [0, 3, 4], "exp": "选项B错误，时标网络计划宜按各项工作的最早开始时间编制；选项C错误，在时标网络计划中，以实箭线表示工作，实箭线的水平投影长度表示该工作的持续时间；以虚箭线表示虚工作，由于虚工作的持续时间为零，故虚箭线只能垂直画。"}, {"id": 523, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "下图为一个双代号网络图，其中互为平行的工作有（　　）。", "opts": ["工作A和工作B", "工作D和工作G", "工作G和工作F", "工作B和工作D", "工作M和工作H"], "ans": [0, 2], "exp": "选项B错误，工作C和工作D为工作G的紧前工作；选项D错误，工作A和工作B为工作D的紧前工作；选项E错误，工作M和工作E为工作H的紧前工作。"}, {"id": 524, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "某双代号网络计划如下图所示，图中存在的绘图错误有（　　）。", "opts": ["多个起点节点", "多个终点节点", "两项相同的工作", "节点指向错误", "存在多余虚箭线"], "ans": [1, 2, 3, 4], "exp": "图中存在多个终点节点⑨、⑪；节点③⑤和节点⑦⑩，存在相同的工作F；节点指向错误⑩→⑨；存在多余虚箭线⑧⑨和⑩⑨。"}, {"id": 525, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "某工程单代号网络计划如下图所示，图中节点下方数字为相应工作的持续时间。下列工作中，属于非关键工作的有（    ）。", "opts": ["工作A", "工作B", "工作C", "工作D", "工作E"], "ans": [1, 2, 4], "exp": ""}, {"id": 526, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "某工程双代号网络图计划如下图所示，图中算线上方数字为相应工作的最早开始时间和最迟开始时间，该网络计划显示的正确信息有（    ）。", "opts": ["工作①-⑥的总时差与自由时差相等", "工作④-⑦的自由时差为3", "工作①-③的自由时差为零", "工作②-⑤的总时差为零", "工作⑤-⑦为关键工作"], "ans": [0, 1, 4], "exp": "C项错误，工作1-3的自由时差为2。D项错误，工作②-⑤的总时差为1。"}, {"id": 527, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "工程网络计划中，某工作实际进度拖后超过总时差，则该工作实际进度偏差对后续工作及总工期的影响是（　　）。", "opts": ["影响后续工作，也影响总工期", "不影响后续工作，也不影响总工期", "影响后续工作，但不影响总工期", "不影响后续工作，但影响总工期"], "ans": [0], "exp": "当工作实际进度拖后的时间（偏差）超过该工作的总时差时，则既影响该工作后续工作的正常进行，也会影响总工期。"}, {"id": 528, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "工程进度计划实施中检查发现，某工作进度拖后5天，该工作总时差和自由时差分别是6天和2天，则该工作实际进度偏差对总工期及后续工作的影响是（　　）。", "opts": ["影响总工期，但不影响后续工作", "不影响总工期，但影响后续工作", "既不影响总工期，也不影响后续工作", "影响总工期，也影响后续工作"], "ans": [1], "exp": "当工作实际进度拖后的时间（偏差）超过该工作的自由时差，但未超过该工作的总时差时，则该工作实际进度偏差会影响该工作后续工作的正常进行，但不会影响总工期。"}, {"id": 529, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "当利用S曲线比较工程项目的实际进度与计划进度时，如果检查日期实际进展点落在计划S曲线的左侧，则该实际进展点与计划S曲线在水平方向的距离表示工程项目（　　）。", "opts": ["实际超额完成的任务量", "实际拖欠的任务量", "实际进度拖后的时间", "实际进度超前的时间"], "ans": [3], "exp": "若工程实际进展点落在计划S曲线左侧，表明此时实际进度超前。该实际进展点与计划S曲线在水平方向的距离表示该工程在该时刻实际进度超前的时间。"}, {"id": 530, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "通过缩短某些工作的持续时间对施工进度计划进行调整的方法，其主要特点是（　　）。", "opts": ["增加网络计划中的关键线路", "不改变工作之间的逻辑关系", "增加工作之间的时间间隔", "不改变网络计划中的非关键线路"], "ans": [1], "exp": "通过压缩某些工作的持续时间来缩短工期，这种调整方法的特点是不改变施工进度计划中工作之间的逻辑关系，通过采取增加资源投入、提高劳动效率等措施，来缩短某些工作的持续时间，以达到加快施工进度、缩短工期的目的。"}, {"id": 531, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "调整施工进度计划可采取的组织措施是（　　）。", "opts": ["增加工作面", "改善施工作业方法", "改进施工工艺", "调整施工方法"], "ans": [0], "exp": "组织措施：如增加工作面，组织更多的施工队伍；增加每天的施工时间，采用加班或者多班制施工方式；增加劳动力和施工机械的数量。"}, {"id": 532, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "调整施工进度计划时，为了缩短某些工作的持续时间，可采取的技术措施之一是（　　）。", "opts": ["增加施工机械的数量", "实行包干奖励", "改善外部配合条件", "采用更先进的施工机械"], "ans": [3], "exp": "选项A属于组织措施；选项B属于经济措施；选项C属于其他配套措施。"}, {"id": 533, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "实现施工进度控制的首要前提是（　　）。", "opts": ["确定施工进度目标并编制科学合理的进度计划", "施工进度计划实施中的检查与分析", "实际进度与计划进度的比较", "施工进度计划的调整"], "ans": [0], "exp": "确定施工进度目标并编制科学合理的进度计划是实现施工进度控制的首要前提。"}, {"id": 534, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某工作实施过程中的S曲线如下图所示，图中a和b两点的进度偏差状态是（　　）。", "opts": ["a点进度拖后和b点进度拖后", "a点进度拖后和b点进度超前", "a点进度超前和b点进度拖后", "a点进度超前和b点进度超前"], "ans": [2], "exp": "利用曲线法进行实际进度与计划进度比较，可以获得以下信息：（1）工程实际进展状况。若工程实际进展点落在计划曲线左侧（如上图中的a点），表明此时实际进度超前；若工程实际进展点落在计划曲线右侧（如上图中的b点），表明此时实际进度拖后；若工程实际进展点正好落在计划曲线上，则表示此时实际进度与计划进度一致。"}, {"id": 535, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "进度计划实施过程中，一旦发现进度偏差，应采取措施对进度计划进行调整，下列工作中属于进度调整系统过程的是（　　）。", "opts": ["对实际进度数据进行加工处理", "将实际进度与计划进度进行对比分析", "计算进度偏差", "分析进度偏差对后续工作和总工期的影响"], "ans": [3], "exp": "调整系统过程包括：①分析进度偏差产生原因；②分析进度偏差对后续工作及总工期的影响；③确定后续工作及总工期的限制条件；④调整工程进度计划。"}, {"id": 536, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "调整工程进度计划时，通过增加劳动力和施工机械的数量缩短某些工作持续时间的措施属于（　　）。", "opts": ["经济措施", "技术措施", "组织措施", "合同措施"], "ans": [2], "exp": "增加劳动力和机械数量属于组织措施。"}, {"id": 537, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "施工进度计划调整方法，当工程实际进度偏差影响到后续工作、总工期而需要调整施工进度计划时，不属于调整方法的是（　　）。", "opts": ["压缩某些工作的持续时间", "改变某些工作的逻辑关系", "通过压缩某些工作的持续时间并改变该工作的逻辑关系", "将关键工作变成非关键工作"], "ans": [3], "exp": "当工程实际进度偏差影响到后续工作、总工期而需要调整施工进度计划时，调整方法主要有两种：一是通过压缩某些工作的持续时间来缩短工期；二是通过改变某些工作的逻辑关系来缩短工期。在实际工作中，可根据具体情况选用上述方法或综合应用上述方法调整施工进度计划。"}, {"id": 538, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "在施工进度计划实施过程中，应经常地、定期地对进度计划执行情况进行动态监测，并进行实际进度与计划进度的比较分析，以便发现问题，及时采取措施调整计划，其中施工进度调整系统过程包括：①分析进度偏差产生的原因；②调整施工进度计划；③分析进度偏差对后续工作及总工期的影响；④确定后续工作及总工期的限制条件，正确的顺序是（　　）。", "opts": ["①→②→③→④", "①→③→④→②", "①→④→③→②", "①→③→②→④"], "ans": [1], "exp": "施工进度调整系统过程包括：①分析进度偏差产生的原因；②分析进度偏差对后续工作及总工期的影响；③确定后续工作及总工期的限制条件；④调整施工进度计划。"}, {"id": 539, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "实际进度与计划进度比较方法中，S曲线比较法可以表示出（　　）。", "opts": ["累计完成工程任务量", "局部工程任务量", "累计完成工程成本额", "局部工程成本额"], "ans": [0], "exp": "S曲线比较法是指以横坐标表示时间，纵坐标表示累计完成工程任务量的实际进度与计划进度比较方法。采用S曲线比较法，可在同一坐标系中表示整个工程在不同时点计划累计任务量、实际累计完成任务量及其偏差情况。"}, {"id": 540, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某工程时标网络计划如下图所示，当计划执行到第3周末及第6周末，检查得到的实际进度如图中的实际进度前锋线所示。则该图表明（　　）。", "opts": ["工作A和工作D在第4周至第6周内实际进度正常", "工作B和工作E在第4周至第6周内实际进度正常", "第3周末检查时预计工期拖后1周", "第6周末检查时工作G实际进度拖后1周"], "ans": [2], "exp": "A、B选项错误：因为在第4周至第6周内工作A、B、D、E存在延误，所以不正常，D选项错误，第6周末检查时工作G实际进度拖后2周。"}, {"id": 541, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "通过缩短工程网络计划中关键工作的持续时间来调整施工进度计划时，可采取的组织措施是（    ）。", "opts": ["采用多班制施工方式", "实施强有力的调度指挥", "减少施工现场湿作业量", "改善外部配合条件"], "ans": [0], "exp": "（1）组织措施。如：增加工作面，组织更多施工队伍；增加每天施工时间，采用加班或多班制施工方式；增加劳动力和施工机械数量等。（2）技术措施。如：改进施工工艺和施工技术，缩短工艺技术间歇时间；采用更先进的施工方式（如将现浇混凝土方案改为预制装配方案），减少施工过程数量；采用更先进的施工机械等。（3）经济措施。如：实行包干奖励；提高奖金数额；对所采取的技术措施给予相应经济补偿等。（4）其他配套措施。如：改善外部配合条件；改善施工作业环境；实施强有力的组织调度等。"}, {"id": 542, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列实际进度与计划进度比较分析方法中，既可以进行工作实际进度与计划进度的局部比较，又可用来分析预测工程项目整体进度状况的是（    ）。", "opts": ["横道图比较法", "S曲线比较法", "垂直图比较法", "前锋线比较法"], "ans": [3], "exp": "前锋线比较法既适用于工作实际进度与计划进度之间的局部比较，又可用来分析预测工程项目整体进度状况。"}, {"id": 543, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "通过缩短工程网络计划中关键工作的持续时间来调整施工进度计划时，可以采用的技术措施是（    ）。", "opts": ["増加施工机械数量", "改善施工作业环境", "采用预制装配方案", "设立施工绩效奖励"], "ans": [2], "exp": "A项属于组织措施；B项属于其他配套措施；D项属于经济措施。"}, {"id": 544, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "某双代号时标网络计划执行过程中的实际进度前锋线如下图所示，计划工期为12周，图中正确的信息有（　　）。", "opts": ["工作E进度正常，不影响总工期", "工作G进度拖延1周，影响总工期1周", "工作H进度拖延1周，影响总工期1周", "工作I最早开始时间调后1周，计算工期不变", "根据第7周末的检查结果，压缩工作K的持续时间1周，计划工期不变"], "ans": [0, 1, 4], "exp": "选项C错误，工作H进度拖延1周，但是其总时差为2周，不影响总工期；选项D错误，工作I为关键工作，若调后1周，则工期拖延1周。"}, {"id": 545, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "某工程双代号时标网络计划执行到第30天和第70天时，检查其实际进度绘制的前锋线如图所示，由此可得到正确的结论有（　　）。", "opts": ["第30天检查时，工作C实际进度提前10天，不影响总工期", "第30天检查时，工作D实际进度正常，不影响总工期", "第70天检查时，工作G实际进度拖后10天，影响总工期", "第70天检查时，工作F实际进度拖后10天，不影响总工期", "第70天检查时，工作H实际进度正常，不影响总工期"], "ans": [1, 2, 4], "exp": "选项A错误，第30天检查时，工作C实际进度拖后10天，工作C是关键工作，影响总工期。选项D错误，第70天检查时，工作F实际进度拖后10天，工作F是关键工作，影响总工期。"}, {"id": 546, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "采用S曲线比较法比较工程实际进度与计划进度时，可获得的信息有（　　）。", "opts": ["工程实际拥有的总时差", "工程实际进展情况", "工程实际进度超前或拖后的时间", "工程实际超额或拖欠完成的任务量", "后期工程进度预测值"], "ans": [1, 2, 3, 4], "exp": "采用S曲线比较法比较工程实际进度与计划进度时，可获得的信息：①工程实际进展情况；②实际进度超前或拖后的时间；③实际超额完成或拖欠的任务量；④后期工程进度预测。"}, {"id": 547, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "某分部工程时标网络计划如下图所示，当计划执行到第3周末时和第6周末时检查得到的实际进度如图中的实际进度前锋线所示，该图说明（　　）。", "opts": ["第3周末检查时预计工期拖后一周", "工作A和工作D在第4周至第6周内实际进度正常", "第6周末检查时预计工期拖后一周", "工作B和工作E在第4周至第6周内实际进度正常", "第6周末检查时工作G实际进度拖后一周"], "ans": [0, 2], "exp": "B、D选项错误，实际进度前锋线只能检查时刻进度，不能检查周期进度。E选项错误，第6周末检查时工作G实际进度拖后2周。"}, {"id": 548, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "当工程实际进度偏差影响到后续工作、总工期而需要调整进度计划时，可采用（　　）等方法改变某些工作的逻辑关系。", "opts": ["增加资源投入量", "提高劳动效率", "将顺序进行的工作改为平行作业", "将顺序进行的工作改为搭接作业", "分段组织流水作业"], "ans": [2, 3, 4], "exp": "当施工进度计划中影响后续工作（后续工作的拖延有限制时）及总工期的工作之间逻辑关系允许改变时，可以通过改变其逻辑关系，将顺序作业的工作改为平行作业、搭接作业或分段组织流水作业等，均可有效缩短工期。"}, {"id": 549, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "建设工程要满足强度、刚度、稳定性要求，又要防灾抗灾能力强。这体现了建设工程的（　　）。", "opts": ["实用性", "安全性", "可靠性", "美观性"], "ans": [1], "exp": ""}, {"id": 550, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "工程质量形成过程中，确定建设工程应达到的质量目标及水平在（　　）阶段。", "opts": ["工程保修", "工程施工", "工程竣工验收", "工程投资决策"], "ans": [3], "exp": "建设工程投资决策阶段主要是确定建设工程应达到的质量目标及水平。"}, {"id": 551, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "影响工程质量的决定性阶段是（　　）阶段。", "opts": ["工程勘察设计", "工程施工", "工程竣工验收", "工程投资决策"], "ans": [0], "exp": "建设工程勘察设计是根据投资决策阶段已确定的质量目标和水平，通过工程勘察、设计使其具体化。工程设计在技术上是否可行、工艺是否先进、经济是否合理、设备是否配套、结构是否可靠等，都将决定着工程建成后的功能和使用价值。因此，勘察设计阶段是影响工程质量的决定性阶段。"}, {"id": 552, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "影响工程质量的环境因素中，属于技术环境的是（　　）。", "opts": ["气象条件", "质量检验、监控制度", "质量管理制度", "设计图纸"], "ans": [3], "exp": "自然环境包括地质、水文、气象条件和周边建筑、地下障碍物及其他不可抗力等因素；技术环境包括施工所依据的规范、规程、设计图纸、质量评价标准等因素；管理环境包括质量检验、监控制度、质量管理制度等。"}, {"id": 553, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "建设工程项目质量控制体系的建立过程包括：①制定工程质量管理制度；②编制工程质量计划；③确立工程质量责任的网络架构；④分析工程质量管理界面。正确的程序是（　　）。", "opts": ["①-②-③-④", "③-①-④-②", "③-④-①-②", "①-③-②-④"], "ans": [1], "exp": "工程质量控制体系的建立过程，一般可按下列程序进行：（1）确立工程质量责任的网络架构；（2）制定工程质量管理制度；（3）分析工程质量管理界面；（4）编制工程质量计划。"}, {"id": 554, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "下列不属于全面质量管理的基本特点的是（　　）。", "opts": ["管理内容的全面性", "管理范围的全面性", "参加管理人员的全面性", "管理系统的全面性"], "ans": [3], "exp": "“三全一多样”是全面质量管理的基本特点。（1）管理内容的全面性。（2）管理范围的全面性。（3）参加管理人员的全面性。（4）管理方法的多样性。"}, {"id": 555, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "下列选项中，不属于质量管理中的标准化工作的是（　　）。", "opts": ["技术标准", "管理标准", "工作标准", "工艺标准"], "ans": [3], "exp": "标准化工作包括：技术标准、管理标准、工作标准，它是一个完整的标准化管理体系。"}, {"id": 556, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "工程质量管理体系是以（　　）为对象，由实施的总组织者负责建立的面向项目对象开展质量控制的工作体系。", "opts": ["工程质量", "工程项目", "工程实体", "工程技术"], "ans": [1], "exp": "工程质量管理体系是以工程项目为对象，由工程项目实施的总组织者负责建立的面向项目对象开展质量控制的工作体系。"}, {"id": 557, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "在大中型工程项目尤其是群体工程项目中，第一层次的质量管理体系应由（　　）的工程项目管理机构负责建立。", "opts": ["建设单位", "施工单位", "设计单位", "监理单位"], "ans": [0], "exp": "在大中型工程项目尤其是群体工程项目中，第一层次的质量管理体系应由建设单位的工程项目管理机构负责建立。"}, {"id": 558, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "下列关于分析工程质量管理界面的说法，错误的是（　　）。", "opts": ["工程质量管理体系的质量责任界面，包括静态界面和动态界面", "根据法律法规、合同条件等来确定的属于静态界面", "项目实施过程中设计与施工单位之间的衔接配合关系及其责任划分的属于动态界面", "根据组织内部职能分工来确定的属于动态界面"], "ans": [3], "exp": "工程质量管理体系的质量责任界面，包括静态界面和动态界面。一般说静态界面根据法律法规、合同条件、组织内部职能分工来确定。动态界面主要是指项目实施过程中设计单位之间、施工单位之间、设计与施工单位之间的衔接配合关系及其责任划分，必须通过分析研究，确定管理原则与协调方式。"}, {"id": 559, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "关于工程项目质量管理体系的说法，正确的是（　　）。", "opts": ["涉及工程项目实施中所有的质量责任主体", "目的是用于建筑业企业的质量管理", "其控制目标是建筑业企业的质量管理目标", "体系有效性要进行第三方审核认证"], "ans": [0], "exp": "企业质量管理体系和工程质量管理体系不同：（1）目的不同。工程质量管理体系只用于特定的工程项目质量管理，而不是用于建筑企业或组织的质量管理，其建立的目的不同。（2）服务范围不同。工程质量管理体系涉及工程项目实施过程所有的质量责任主体，而不只是针对某一个承包企业或组织机构，其服务的范围不同。（3）目标不同。工程质量管理体系的管理目标是工程项目质量目标，并非某一具体建筑企业或组织的质量管理目标，其控制的目标不同。（4）作用时效不同。工程质量管理体系与项目管理组织系统相融合，是一次性的质量工作体系，并非永久性的质量管理体系，其作用的时效不同。（5）评价的方式不同。工程质量管理体系的有效性一般由项目管理的总组织者进行自我评价与诊断，不需进行第三方认证，其评价的方式不同。"}, {"id": 560, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "工程质量的各项影响因素中，（　　）是工程建设的物质条件和工程质量的基础。", "opts": ["工程材料", "机械设备", "施工方法", "环境条件"], "ans": [0], "exp": "工程材料是指构成工程实体的原材料、半成品、成品、构配件等。这些材料是构成工程实体的物质条件，是工程实体质量的基础。"}, {"id": 561, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "满足强度、刚度、稳定性要求，体现了建设工程固有特性的（　　）。", "opts": ["安全性", "适用性", "耐久性", "可靠性"], "ans": [0], "exp": "安全性是指满足强度、刚度、稳定性要求，防灾、抗灾能力强，安全防范、预警效果好。"}, {"id": 562, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "下列不属于影响工程质量的因素的是（　　）。", "opts": ["人员素质", "机械设备", "利率变化", "工程材料"], "ans": [2], "exp": "影响工程质量的因素很多，但归纳为人（Man）、材料（Material）、机械（Machine）、方法（Method）和环境（Environment），即4M1E。"}, {"id": 563, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "建设工程固有特性主要体现在由施工形成的建筑产品的（　　）等方面。", "opts": ["实用性、安全性、美观性、耐久性", "安全性、耐久性、美观性、可靠性", "实用性、安全性、经济性、可靠性", "实用性、先进性、耐久性、可靠性"], "ans": [2], "exp": "建设工程固有特性包括实用性、安全性、可靠性、经济性、美观性及与环境协调性六个方面。"}, {"id": 564, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "下列影响工程施工质量的因素中，属于施工质量管理环境因素的是（　　）。", "opts": ["施工单位的质量管理制度", "施工现场的安全防护设施", "施工现场的交通运输和道路条件", "不可抗力对施工质量的影响"], "ans": [0], "exp": "环境因素有很多，主要指自然环境、技术环境和管理环境。自然环境包括地质、水文、气象条件和周边建筑、地下障碍物及其他不可抗力等因素；技术环境包括施工所依据的规范、规程、设计图纸、质量评价标准等因素；管理环境包括质量检验、监控制度、质量管理制度等。环境因素对施工质量的影响具有复杂和多变的特点，且有些因素是人难以控制的。这就需要管理人员尽可能全面地了解可能影响工程质量的各种环境因素，采取相应的预防性控制措施，确保工程质量符合相关要求。"}, {"id": 565, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "工程质量管理体系是面向建设工程项目而建立的质量控制系统。该系统（　　）。", "opts": ["属于一次性的质量控制工作体系", "必须通过第三方认证机构的认证", "仅涉及施工承包单位", "需要通过业主认证"], "ans": [0], "exp": "工程质量管理体系既不是业主方也不是施工方的质量管理体系或质量保证体系，而是整个建设工程项目目标控制的一个工作系统，根据工程项目管理的实际需要而建立，随着工程项目的完成和项目管理组织的解体而消失，因此，是一个一次性的质量控制工作体系，不同于企业的质量管理体系。"}, {"id": 566, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "建设工程项目质量管理体系呈多层次、多单元的结构形态。在实行交钥匙式工程总承包的情况下，第一层次的质量管理体系应由（　　）负责建立。", "opts": ["工程总承包企业的项目管理机构", "施工承包企业的项目管理机构", "建设单位委托的监理机构", "建设单位的项目管理机构"], "ans": [0], "exp": "在大中型工程项目尤其是群体工程项目中，第一层次的质量管理体系应由建设单位的工程项目管理机构负责建立。在委托项目管理或实行交钥匙式工程总承包的情况下，应由相应的项目管理机构、工程总承包企业项目管理机构负责建立。"}, {"id": 567, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "理解当前和未来市场需求，有助于组织持续成功。这体现了质量管理的（    ）。", "opts": ["关系管理", "循证决策", "全员积极参与", "以顾客为关注焦点"], "ans": [3], "exp": "以顾客为关注焦点：理解顾客和其他相关方当前和未来的需求，有助于组织的持续成功。"}, {"id": 568, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "观测各项施工活动及结果是否偏离质量标准的行为，属于质量管理体系运行机制中的（    ）。", "opts": ["质量记录", "质量监控", "质量追溯", "质量评审"], "ans": [1], "exp": "质量管理体系在运行过程中，各项活动及其结果偏离保证的现象在所难免，为此，必须实施质量监控。"}, {"id": 569, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "下列影响工程质量的因素中，可变性最大的是（    ）。", "opts": ["人为影响因素", "施工工艺影响因素", "工程材料影响因素", "机械设备影响因素"], "ans": [0], "exp": "人因影响是工程质量影响因素中可变性最大的因素。在工程质量管理中，人的因素起着决定性作用。"}, {"id": 570, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "下列影响施工质量的环境因素中，属于管理环境因素的有（　　）。", "opts": ["质量检验", "监控制度", "质量管理制度", "施工所依据的规范", "质量评价标准"], "ans": [0, 1, 2], "exp": "管理环境包括质量检验、监控制度、质量管理制度等。"}, {"id": 571, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "下列属于全面质量管理的特点的是（　　）。", "opts": ["管理内容的全面性", "管理范围的全面性", "参加管理人员的全面性", "管理方法的多样性", "管理过程的全面性"], "ans": [0, 1, 2, 3], "exp": "全面质量管理的特点：（1）管理内容的全面性；（2）管理范围的全面性；（3）参加管理人员的全面性；（4）管理方法的多样性。"}, {"id": 572, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "为了充分发挥质量信息的作用，企业的质量信息必须（　　）。", "opts": ["准确", "及时", "全面", "真实", "系统"], "ans": [0, 1, 2, 4], "exp": "为了充分发挥质量信息的作用，企业的质量信息必须准确、及时、全面、系统和完整。"}, {"id": 573, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "下列属于施工机具的有（　　）。", "opts": ["操作工具", "垂直运输设备", "测量仪器", "用于生产产品的电梯", "施工安全设施"], "ans": [0, 1, 2, 4], "exp": "机械设备可分为两类：一类是构成工程实体及配套的工艺设备和各类机具，如用于生产产品的设备、电梯、智能控制及暖通设备等，这些机械设备作为工程实体的一部分，其质量会直接影响工程质量；另一类是指施工机具，即施工过程中使用的各类机械设备，如垂直运输设备，各类操作工具、测量仪器和计量器具，各种施工安全设施等。"}, {"id": 574, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "下列属于《质量管理体系基础和术语》GB/T19000—2016提出的质量管理7项原则的是（　　）。", "opts": ["过程方法", "统计技术的应用", "关系管理", "质量管理体系方法", "全员积极参与"], "ans": [0, 2, 4], "exp": "质量管理7项原则：①以顾客为关注焦点；②领导作用；③全员积极参与；④过程方法；⑤改进；⑥循证决策；⑦关系管理。"}, {"id": 575, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "施工质量影响因素主要有“4MIE”，其中，“4M”是指（　　）。", "opts": ["人", "机械", "方法", "环境", "材料"], "ans": [0, 1, 2, 4], "exp": "工程施工过程中，发生质量缺陷的原因不外乎人（Man）、材料（Material）、机械（Machine）、方法（Method）和环境（Environment），五大方面。"}, {"id": 576, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "下列影响施工质量的因素中，属于材料因素的有（　　）。", "opts": ["计量器具", "工程设备", "建筑构配件", "钢筋原材", "安全防护设施"], "ans": [2, 3], "exp": "工程材料是指构成工程实体的原材料、半成品、成品、构配件等。这些材料是构成工程实体的物质条件，是工程实体质量的基础。"}, {"id": 577, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "以下关于建设工程质量管理体系的说法，正确的有（　　）。", "opts": ["是整个建设工程项目目标控制的一个工作系统", "是以工程项目为对象", "是工程项目管理组织的一个目标控制体系", "是一个一次性的质量管理工作体系", "是施工方的质量管理体系"], "ans": [0, 1, 2, 3], "exp": "建设工程质量管理体系既不是业主方也不是施工方的质量管理体系或质量保证体系，而是整个建设工程项目目标控制的一个工作系统，其性质如下：（1）工程质量管理体系是以工程项目为对象，由工程项目实施的总组织者负责建立的面向项目对象开展质量控制的工作体系。（2）工程质量管理体系是工程项目管理组织的一个目标控制体系，它与项目投资控制、进度控制、职业健康安全与环境管理等目标控制体系，共同依托于同一项目管理组织机构。（3）工程质量管理体系根据工程项目管理的实际需要而建立，随着工程项目的完成和项目管理组织的解体而消失，因此，是一个一次性的质量管理工作体系，不同于企业质量管理体系。"}, {"id": 578, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "以下关于工程质量管理体系的特点，说法正确的有（　　）。", "opts": ["只用于特定的工程项目质量管理", "用于建筑企业或组织的质量管理", "涉及工程项目实施过程所有的质量责任主体", "管理目标是工程项目质量目标", "有效性一般需进行第三方认证"], "ans": [0, 2, 3], "exp": "工程质量管理体系的特点。建设工程项目质量管理系统是面向项目对象而建立的质量控制工作体系，它与建筑企业或其他组织机构按照GB/T19000族标准建立的质量管理体系相比较，有如下不同：（1）目的不同。工程质量管理体系只用于特定的工程项目质量管理，而不是用于建筑企业或组织的质量管理，其建立的目的不同。（2）服务范围不同。工程质量管理体系涉及工程项目实施过程所有的质量责任主体，而不只是针对某一个承包企业或组织机构，其服务的范围不同。（3）目标不同。工程质量管理体系的管理目标是工程项目质量目标，并非某一具体建筑企业或组织的质量管理目标，其控制的目标不同。（4）作用时效不同。工程质量管理体系与项目管理组织系统相融合，是一次性的质量工作体系，并非永久性的质量管理体系，其作用的时效不同。（5）评价的方式不同。工程质量管理体系的有效性一般由项目管理的总组织者进行自我评价与诊断，不需进行第三方认证，其评价的方式不同。"}, {"id": 579, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "通过人工光源或反射光照射，仔细检查难以看清的部位。该方法属于施工质量检验方法中的（　　）。", "opts": ["感观检验法", "物理检验法", "化学检验法", "直接观察法"], "ans": [0], "exp": "感观检验法是以施工规范和检验标准为依据，利用人体的视觉器官、听觉器官和触觉器官来检验施工质量情况。这类方法主要是根据质量要求，采用看、摸、敲、照等方法对检查对象进行检查。所谓“照”，就是通过人工光源或反射光照射，仔细检查难以看清的部位。"}, {"id": 580, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "由于机械性能检测所使用的专用仪器价格昂贵，专业技术性强，因此，这种检验通常是由施工现场抽取检验样品，送至（　　）进行检测。", "opts": ["技术监督机构", "国家建筑工程质量监督检验中心", "市县建设管理委员会", "有资质的工程质量检测机构"], "ans": [3], "exp": "由于机械性能检测所使用的专用仪器价格昂贵，专业技术性强，因此，这种检验通常是由施工现场抽取检验样品，送至有资质的工程质量检测机构进行检测。"}, {"id": 581, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "施工质量统计方法通常需要与一种最基本的工程质量统计分析方法配合使用，常常是首先将原始数据分组后，再应用其他统计分析方法进行分析。该方法称为（　　）。", "opts": ["分层法", "排列图法", "调查表法", "直方图法"], "ans": [0], "exp": "分层法是工程质量统计分析中的一种最基本方法。排列图法、直方图法、控制图法、相关图法等统计方法通常需要与分层法配合使用，常常是首先利用分层法将原始数据分组后，再应用其他统计分析方法进行分析。"}, {"id": 582, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "下列属于计数抽样检验优点的是（　　）。", "opts": ["所需要的样本量较大", "信息利用充分", "使用程序较繁琐", "运用范围广泛"], "ans": [3], "exp": "计数抽样检验具有使用简便、运用范围广泛等优点。缺点是所需要的样本量较大，样本信息利用也不充分。计量抽样检验具有信息利用充分、需要的样本量较小等优点。缺点是使用程序较繁琐，适用范围较窄。"}, {"id": 583, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "计数标准型一次抽样方案为（N、n、C），即：从批量为N的交验产品中随机抽取n件进行检验，并预先规定一个合格判定数C，如果发现n件中有d件不合格品时，若（　　），应判该送检批合格。", "opts": ["d＞C+l", "d=C+l", "d≤C", "d＞C"], "ans": [2], "exp": "一次抽样检验通常用（N，n，C）表示。即：从批量为N的交验产品中随机抽取n件进行检验，并预先规定一个合格判定数C，如果发现n件中有d件不合格品，当d≤C时，则判定该批产品合格，予以接收。"}, {"id": 584, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "下列关于应用因果分析图法进行质量特性因果分析的说法，正确的是（　　）。", "opts": ["可使用一张图分析多个质量问题", "不能邀请QC小组以外的有关人员参与", "由参与人员采用投票方式，从中选择1～3项最主要原因", "通常采用QC小组活动的方式进行，集思广益，共同分析"], "ans": [3], "exp": "A项错误，一个质量特性或一个质量问题使用一张图分析；B项错误，必要时可邀请QC小组以外的有关人员参与，广泛听取意见；C项错误，在充分分析的基础上，由各参与人员采用投票或其他方式，从中选择1～5项多数人达成共识的最主要原因。"}, {"id": 585, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "当一批产品体积大、检验批量大，需要较大储存场所时，需要采用（　　）形式。", "opts": ["流动批", "稳定批", "检验批", "固定批"], "ans": [0], "exp": "检验批有稳定批和流动批两种形式。所谓稳定批，是指将产品整批存放在一起，即批中所有单位产品是同时提交检验的。当一批产品体积大、检验批量大，需要较大储存场所时，需要采用流动批形式。"}, {"id": 586, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "第一级抽样从总体中抽取初级抽样单元，以后每一级抽样是在上一级抽样单元中抽取次一级的抽样单元，指的是随机抽样中的（　　）。", "opts": ["简单随机抽样", "系统随机抽样", "分层随机抽样", "分级随机抽样"], "ans": [3], "exp": "分级随机抽样是指第一级抽样从总体中抽取初级抽样单元，以后每一级抽样是在上一级抽样单元中抽取次一级的抽样单元。分级随机抽样一般用于总体很大的情况下，例如对批量很大的砖的抽样，就可以按二次抽样来进行。"}, {"id": 587, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "判断工序的稳定性，推断工序质量规格标准的满足程度，分析不同因素对质量影响的统计分析方法是（　　）。", "opts": ["直方图法", "调查表法", "因果分析法", "排列图法"], "ans": [0], "exp": "直方图又称频数分布直方图，是用来反映产品质量数据分布状态和波动规律的统计分析方法。直方图的主要用途是：判断工序的稳定性；推断工序质量规格标准的满足程度；分析不同因素对质量的影响；计算工序能力等。"}, {"id": 588, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "因取样时混批所致，如将两台设备、两种不同施工方法的产品混在一起或在两个不同批量中取样，直方图会出现（　　）。", "opts": ["折齿型", "左缓坡型", "双峰型", "峭壁型"], "ans": [2], "exp": "双峰型：双峰型直方图往往是因取样时混批所致，如将两台设备、两种不同施工方法的产品混在一起或在两个不同批量中取样等。"}, {"id": 589, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "将总体分成若干互不重叠的群，每个群由若干个体组成总体中随机抽取若干个群，抽出的群中所有个体便组成样本，这种抽样方式为（　　）。", "opts": ["简单随机抽样", "系统随机抽样", "分层随机抽样", "整群随机抽样"], "ans": [3], "exp": "整群随机抽样是指将总体分成若干互不重叠的群，每个群由若干个体组成，总体中随机抽取若干个群，抽出的群中所有个体便组成样本。"}, {"id": 590, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "某产品质量检验采用计数型二次抽样检验方案，已知：N=1000，n1=40，n2=60，C1=2，C2=4；经二次抽样检得：D1=2，D2=3，则正常的结论是（　　）。", "opts": ["经第一次抽样检验即可判定该批产品质量合格", "经第一次抽样检验即可判定该批产品质量不合格", "经第二次抽样检验即可判定该批产品质量合格", "经第二次抽样检验即可判定该批产品质量不合格"], "ans": [0], "exp": "第一次检验时，在检验批量为1000的一批产品中，随机抽取40件产品进行检验，发现不合格数为2，因为2=2，则判定该批产品合格。"}, {"id": 591, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "工程质量管理体系运行的核心机制是（　　）。", "opts": ["约束机制", "反馈机制", "动力机制", "持续改进机制"], "ans": [2], "exp": "动力机制是工程质量管理体系运行的核心机制。"}, {"id": 592, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "下列现场质量检查的方法中，属于感观检验法“看”的是（　　）。", "opts": ["结构表面是否有裂缝", "通过手感触摸进行检查鉴别", "运用敲击方法进行音感检查", "通过人工光源或反射光照射，仔细检查难以看清的部位"], "ans": [0], "exp": "所谓“看”，就是根据质量标准要求进行外观检查，例如结构表面是否有裂缝、混凝土振捣是否符合要求等。"}, {"id": 593, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "通过手感触摸进行检查鉴别时，属于感官检验法的（　　）。", "opts": ["摸", "看", "敲", "照"], "ans": [0], "exp": "所谓“摸”就是通过手感触摸进行检查鉴别。"}, {"id": 594, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "下列施工现场质量检查项目中，适宜采用度量检测的是（　　）。", "opts": ["检测材料、构件的长度", "利用电工电子仪器检测电器设备", "利用物理力学专用仪器对材料机械性能进行检测", "射线探伤法"], "ans": [0], "exp": "度量检测法是指利用工具和设备通过检测材料、构件、工程等的长度、质量、体积、密度等来判定工程质量情况工程。实践中常用的度量检测工具和设备有钢尺、卡尺、塞尺、水平仪、经纬仪、激光测距仪、超声波探测仪、赫兹密度仪、K30密实度检测车等。"}, {"id": 595, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "相关图中点的集合，反映了两种数据之间的散布状况，下图属于（　　）。", "opts": ["正相关", "弱正相关", "不相关", "负相关"], "ans": [2], "exp": "不相关，散布点形成一团或平行于轴的直线带说明x变化不会引起y的变化或其变化无规律，分析质量原因时可排除x因素。"}, {"id": 596, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "在工程质量统计分析方法中，能够反映质量特性与质量缺陷产生原因之间关系的图形工具，并可用来分析、追溯质量缺陷产生最根本原因的是（　　）。", "opts": ["相关图法", "直方图法", "鱼刺图法", "控制图法"], "ans": [2], "exp": "因果分析图又称为质量特性因果图、鱼刺图或树枝图，是一种反映质量特性与质量缺陷产生原因之间关系的图形工具，可用来分析、追溯质量缺陷产生的最根本原因。"}, {"id": 597, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "在工程质量统计分析方法中，寻找影响质量主次因素的方法一般采用（　　）。", "opts": ["调查表法", "控制图法", "排列图法", "直方图法"], "ans": [2], "exp": "排列图法又称为主次因素分析法或帕累托图法，是用来分析影响质量主次因素的有效方法。"}, {"id": 598, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "下列直方图中，表明工序质量稳定，不会出现废品的是（　　）。", "opts": ["（a）", "（b）", "（c）", "（d）"], "ans": [0], "exp": "图（a）中，B在T中间，质量分布中心x与质量标准中心M正好重合，两侧还有一定余地，表明工序质量稳定，不会出废品。"}, {"id": 599, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "利用样本数据分析质量波动原因，判明生产过程是否处于稳定状态的方法是（　　）。", "opts": ["因果分析图法", "控制图法", "相关图法", "直方图法"], "ans": [1], "exp": "利用控制图分析质量波动原因，判明生产过程是否处于稳定状态的方法，称为控制图法。"}, {"id": 600, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "下列有关排列图法在实际应用中的说法，正确的是（　　）。", "opts": ["对应于累计频率在0～80%范围内的因素属于一般因素", "对应于累计频率在90%～100%范围内的因素属于主要因素", "对应于累计频率在80%～90%范围内的因素属于次要因素", "C类因素即主要因素，是需要加强控制、重点管理的对象"], "ans": [2], "exp": "A项错误，一般将累计频率在0～80%范围内的因素定为A类因素，即主要因素；累计频率在80%～90%范围内的因素定为B类因素，即次要因素；B项错误，累计频率在90%～100%范围内的因素定为C类因素，即一般因素。D项错误，A类因素是需要加强控制、重点管理的对象；对B类因素可按常规管理；对C类因素则可放宽管理，以利于将主要精力放在改善A类因素上。"}, {"id": 601, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "工程建设中，适用于钢材的抗拉、抗弯、抗剪和焊接性能的监测方法是（　　）。", "opts": ["现场试验法", "化学检验法", "度量检测法", "机械性能检测法"], "ans": [3], "exp": "机械性能检测法是指利用物理力学专用仪器对工程材料、构件等机械性能进行检测的方法。工程建设中，机械性能检测项目一般是指钢材的抗拉、抗弯、抗剪和焊接性能；混凝土的抗压、抗渗性；水泥砂浆的抗压性能；机砖的抗压、抗拉、抗剪性能等。"}, {"id": 602, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "工程建设中，适用于混凝土的抗压、抗渗性的监测方法是（　　）。", "opts": ["机械性能检测法", "现场试验法", "度量检测法", "化学检验法"], "ans": [0], "exp": "机械性能检测法是指利用物理力学专用仪器对工程材料、构件等机械性能进行检测的方法。工程建设中，机械性能检测项目一般是指钢材的抗拉、抗弯、抗剪和焊接性能；混凝土的抗压、抗渗性；水泥砂浆的抗压性能；机砖的抗压、抗拉、抗剪性能等。"}, {"id": 603, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "某产品质量检验采用计数型二次抽样检验方案，已知：N=1000，n1=40，n2=60，C1=1，C2=4；经二次抽样检得：d1=2，d2=3，则正常的结论是（　　）。", "opts": ["经第一次抽样检验即可判定该批产品质量合格", "经第一次抽样检验即可判定该批产品质量不合格", "经第二次抽样检验可判定该批产品质量合格", "经第二次抽样检验可判定该批产品质量不合格"], "ans": [3], "exp": "二次抽样的操作程序：在检验批量为N的一批产品中，随机抽取n1件产品进行检验。发现n1中的不合格数为d1，则：若d1≤C1判定该批产品合格，予以接收；若d1＞C2，判定该批产品不合格，予以拒收；若C1＜d1≤C2，则不能判断，在同批产品中继续随机抽取第二个样本n2件产品进行检验。若发现n2中有d2件不合格品，则将（d1+d2）与C2比较进行判断：若d1+d2≤C2，判定该批产品合格；若d1+d2>C2，判定该批产品不合格。根据题干C1=1＜d1=2≤C2=4，经第一次抽样检验不能判断是否合格，第二次抽样检验d1+d2=2+3=5>C2=4，判定该批产品不合格。"}, {"id": 604, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "采用直方图分析法分析工程质量时，出现折齿型直方图的原因是（　　）。", "opts": ["分组不当或组距确定不当", "不同设备生产的数据混合", "原材料发生变化", "人为去掉上限下限数据"], "ans": [0], "exp": "折齿型直方图是由于分组不当或组距确定不当而造成的。"}, {"id": 605, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "对直方图的分布位置与质量控制标准的上下限范围进行比较时，如质量特性数据分布（　　），说明工序能力过于宽裕，经济性差。", "opts": ["B在T中间，质量分布中心与质量标准中心M正好重合，两侧还有一定余地", "B在T中间，质量分布中心与质量标准中心M正好重合，但两侧余地太大", "B虽在T内，但质量分布中心无与质量标准中心M不重合，偏向一侧", "B在T中间，且B的范围与质量标准的范围重合，没有余地"], "ans": [1], "exp": "B在T中间，质量分布中心与质量标准中心M正好重合，但两侧余地太大。表明工序稳定，但工序能力过于宽裕，经济性差。"}, {"id": 606, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "当质量控制图满足（　　）时，可认为生产过程正常并处于稳定状态，不会产生不合格品。", "opts": ["点子随机落在上、下控制界限内", "点子排列有缺陷", "点子超出控制界限", "点子多次同侧"], "ans": [0], "exp": "在生产过程中，通过抽样取得数据后，将样本统计量描在图上来分析生产过程状态。如果点子随机落在上、下控制界限内，则表明生产过程正常并处于稳定状态，不会产生不合格品；如果点子超出控制界限，或点子排列有缺陷，则表明生产状况有异常，生产过程处于失控状态。"}, {"id": 607, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "采用直方图法分析工程质量状况时，因原材料发生变化，可能绘制出（　　）直方图。", "opts": ["孤岛型", "双峰型", "折齿型", "峭壁型"], "ans": [0], "exp": "孤岛型直方图是因原材料发生变化，或短时间内工人操作不熟练造成的。"}, {"id": 608, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "工程施工中，检验混凝土振捣是否符合要求的检验方法有（    ）。", "opts": ["物理检验法", "化学检验法", "感官检验法", "现场试验法"], "ans": [2], "exp": "感观检验法。所谓\"看\"，就是根据质量标准要求进行外观检查，例如结构表面是否有裂缝、混凝土振捣是否符合要求等。"}, {"id": 609, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "下列施工质量统计分析方法中，可用来计算工序能力的是（    ）。", "opts": ["鱼刺图形", "相关图形", "排列图形", "直方图形"], "ans": [3], "exp": "直方图又称频数分布直方图，是用来反映产品质量数据分布状态和波动规律的统计分析方法。直方图的主要用途是：判断工序的稳定性；推断工序质量规格标准的满足程度；分析不同因素对质量的影响；计算工序能力等。"}, {"id": 610, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "工程施工质量检查中，为便于进行抽样检验，在条件允许的情况下，最好采用的检验批形式是（    ）。", "opts": ["流动批", "稳定批", "组合批", "全数批"], "ans": [1], "exp": "检验批有稳定和流动两种形式。只要条件允许，最好采用稳定批形式，其优点是容易进行抽样检验。当一批产品体积大、检验批量大，需要较大储存场所时，需要采用流动批形式。此外，工序检查也可采用流动批形式。"}, {"id": 611, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "下列统计分析方法中，能够根据不同目的和要求，按某一性质整理分析施工质量原始数据的是（    ）。", "opts": ["相关图法", "分层法", "排列图法", "检查表法"], "ans": [1], "exp": "分层法是指将调查收集的原始数据，根据不同的目的和要求，按某一性质进行分组整理的分析方法。"}, {"id": 612, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "采用控制图观察分析时，下列（　　）说明生产过程基本上处于稳定状态。", "opts": ["连续25点中没有一点在界限外或连续35点中最多一点在界限外", "连续100点中最多2点在界限外", "连续14点中至少有12点在中心线同一侧", "连续20点中至少有16点在中心线同一侧", "点子呈周期性变化"], "ans": [0, 1], "exp": "分析用控制图中的点子同时满足以下两个条件时，可以认为生产过程基本上处于稳定状态：①连续25点中没有一点在界限外或连续35点中最多一点在界限外或连续100点中最多2点在界限外；②控制界限内的点子随机排列且没有缺陷。"}, {"id": 613, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "下列抽样方法中，可以代表总体（整批产品）的是（　　）。", "opts": ["简单随机抽样", "系统随机抽样", "分层随机抽样", "计数抽样", "计量抽样"], "ans": [0, 1, 2], "exp": "只有用随机抽样，才能使抽取的样本代表总体（整批产品）。随机抽样可分为简单随机抽样、系统随机抽样、分层随机抽样、分级随机抽样和整群随机抽样等。"}, {"id": 614, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "采用排列图法分析工程质量影响因素时，可将影响因素分为（　　）。", "opts": ["偶然因素", "主要因素", "系统因素", "次要因素", "一般因素"], "ans": [1, 3, 4], "exp": "排列图法在实际应用中，一般将累计频率在0~80%范围内的因素定为A类因素，即主要因素；累计频率在80%~90%范围内的因素定为B类因素，即次要因素；累计频率在90%~100%范围内的因素定为C类因素，即一般因素。"}, {"id": 615, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "工程质量统计分析中，应用控制图分析判断生产过程是否处于稳定状态时，可判断生产过程为异常的情形有（　　）。", "opts": ["点子几乎全部落在控制界限内", "连续7点在中心线同一侧", "中心线两侧有5点连续上升", "点子呈周期性变化", "连续11点中有10点在中心线同一侧"], "ans": [1, 3, 4], "exp": "属于生产过程有异常的情形有：（1）连续7点或更多点在中心线同一侧。（2）连续7点或更多点呈上升或下降趋势。（3）连续11点中至少有10点在中心线同一侧。（4）连续14点中至少有12点在中心线同一侧。（5）连续17点中至少有14点在中心线同一侧。（6）连续20点中至少有16点在中心线同一侧。（7）连续3点中至少有2点和连续7点中至少有3点落在二倍标准差与三倍标准差控制界限之间。（8）点子呈周期性变化。"}, {"id": 616, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "直方图的主要用途包括（　　）。", "opts": ["计算工序能力", "判断工序的稳定性", "分析不同因素对质量的影响", "推断工序质量规格标准的满足程度", "找出影响质量的主要原因"], "ans": [0, 1, 2, 3], "exp": "直方图的主要用途是：判断工序的稳定性；推断工序质量规格标准的满足程度；分析不同因素对质量的影响；计算工序能力等。"}, {"id": 617, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "抽样检验可从不同角度划分为不同类型，按检验目的不同，抽样检验可分为（　　）。", "opts": ["计数抽样检验", "计量抽样检验", "多次抽样检验", "监督检验", "验收检验"], "ans": [3, 4], "exp": "按检验目的不同，抽样检验可分为监督检验和验收检验。按产品质量特征不同，抽样检验可分为计数抽样检验和计量抽样检验。按抽取样本次数不同，抽样检验可分为一次、二次、多次抽样。"}, {"id": 618, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "按是否可组成批，抽样检验可分为（　　）。", "opts": ["逐批检验", "二次抽样检验", "调整型抽样检验", "非调整型抽样检验", "连续抽样检验"], "ans": [0, 4], "exp": "按是否可组成批，抽样检验可分为逐批检验和连续抽样检验；按抽取样本次数不同，抽样检验可分为一次、二次、多次抽样。按抽样方案是否可调整，抽样检验可分为调整型抽样检验和非调整型抽样检验。"}, {"id": 619, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "下列关于施工质量统计分析方法的说法，正确的有（　　）。", "opts": ["分层法是工程质量统计分析中的一种最基本方法", "调查表法是精确地进行原因分析的一种方法", "因果分析图是一种反映质量特性与质量缺陷产生原因之间关系的图形工具", "排列图法是用来观察分析两种质量数据之间相关关系的图形方法", "相关图法是用来分析影响质量主次因素的有效方法"], "ans": [0, 2], "exp": "B项错误，调查表法又称为调查分析法、检查表法，是指利用专门设计的统计表对工程质量数据进行收集和整理，并粗略地进行原因分析的一种方法。D项错误，排列图法又称为主次因素分析法或帕累托图法，是用来分析影响质量主次因素的有效方法。E项错误，相关图又称为散布图，是用来观察分析两种质量数据之间相关关系的图形方法。"}, {"id": 620, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "利用控制图判明生产过程是否处于稳定状态，以下可直接判定生产过程异常的情形有（    ）。", "opts": ["连续100点中一点在控制图界限外", "点子分布呈周期性变化", "连续7点在中心线同一侧", "连续8点呈上升趋势", "连续25点均随机落在控制界线内"], "ans": [1, 2, 3], "exp": "分析用控制图中的点子同时满足以下两个条件时，可以认为生产过程基本上处于稳定状态：①连续25点中没有一点在界限外或连续35点中最多一点在界限外或连续100点中最多2点在界限外；②控制界限内的点子随机排列且没有缺陷。"}, {"id": 621, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "凡涉及施工作业技术活动基准和依据的技术工作，都应该严格进行专人负责的复核性检查。下列不需要进行复核性检查的是（　　）。", "opts": ["工程的定位、轴线、标高", "预留孔洞的位置和尺寸", "室内用大理石的放射性", "混凝土配合比"], "ans": [2], "exp": "凡涉及施工作业技术活动基准和依据的技术工作，都应该严格进行专人负责的复核性检查，以避免基准失误给整个工程质量带来难以补救或全局性危害。例如，工程的定位、轴线、标高，预留孔洞的位置和尺寸，预埋件，管线坡度，混凝土配合比，变电、配电位置，高低压进出口方向、送电方向等。"}, {"id": 622, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "工程施工前，应由施工单位制定单位工程、分部工程、分项工程和检验批的划分方案，经审核，由（　　）确认后实施。", "opts": ["建设单位", "项目监理机构", "总监理工程师", "设计单位"], "ans": [0], "exp": "工程施工前，应由施工单位制定单位工程、分部工程、分项工程和检验批的划分方案，并应由项目监理机构审核、建设单位确认后实施。"}, {"id": 623, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "应建立工程质量回访和质量投诉处理机制的单位是（　　）。", "opts": ["建设单位", "监理单位", "项目监理机构", "施工单位"], "ans": [0], "exp": "建设单位应建立工程质量回访和质量投诉处理机制。施工单位应履行工程质量保修义务。"}, {"id": 624, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "下列关于施工质量验收组织的说法，不正确的是（　　）。", "opts": ["检验批应由总监理工程师组织施工单位项目专业质量检查员、专业工长等进行验收", "分项工程应由专业监理工程师组织施工单位项目专业技术负责人等进行验收", "分部工程应由总监理工程师组织施工单位项目负责人和项目技术负责人等进行验收", "勘察、设计单位项目负责人和施工单位技术、质量部门负责人应参加地基与基础分部工程的验收"], "ans": [0], "exp": "A错误，检验批应由专业监理工程师组织施工单位项目专业质量检查员、专业工长等进行验收。"}, {"id": 625, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "对于建筑工程，施工单位应编制工程使用说明书。下列不属于工程使用说明书的内容是（　　）。", "opts": ["工程概况", "编制依据", "工程设计合理使用年限", "使用维护注意事项"], "ans": [1], "exp": "工程使用说明书应包括下列内容：①工程概况；②工程设计合理使用年限、性能指标及保修期限；③主体结构位置示意图、房屋上下水布置示意图、房屋电气线路布置示意图及复杂设备的使用说明；④使用维护注意事项。"}, {"id": 626, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "施工测量质量的好坏直接决定工程的定位和标高是否正确，并且制约施工过程有关工序的质量。因此，（　　）在工程开工前必须做好施工测量工作。", "opts": ["施工单位", "建设单位", "设计单位", "监理单位"], "ans": [0], "exp": "施工测量质量的好坏直接决定工程的定位和标高是否正确，并且制约施工过程有关工序的质量。因此，施工单位在工程开工前必须做好施工测量工作。"}, {"id": 627, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "作业技术活动结果控制是施工过程中间产品及最终产品质量控制的方式，（　　）是基础，直接影响工程项目整体质量。", "opts": ["分部质量", "工序质量", "隐蔽工程", "工序交接验收"], "ans": [1], "exp": "作业技术活动结果控制是施工过程中间产品及最终产品质量控制的方式，只有作业活动的中间产品质量都符合要求，才能保证最终工程的质量，工序质量是基础，直接影响工程项目整体质量。"}, {"id": 628, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "下列属于施工准备控制中的施工技术准备的是（　　）。", "opts": ["熟悉与会审图纸", "测量控制网的控制", "施工平面布置的控制", "进场材料、构配件检验"], "ans": [0], "exp": "施工技术准备：熟悉与会审图纸，编制和报审施工组织设计。"}, {"id": 629, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "（　　）是保证施工质量达到质量要求的必要前提。", "opts": ["作业技术准备", "施工过程控制", "设置质量控制点", "施工技术参数"], "ans": [2], "exp": "质量控制点是指为保证作业过程质量而确定的重点控制对象、关键部位或薄弱环节。设置质量控制点是保证施工质量达到质量要求的必要前提。"}, {"id": 630, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "施工单位做好技术交底，是取得好的施工质量的条件之一，应由项目技术人员编制技术交底书，并经（　　）批准。", "opts": ["项目技术负责人", "施工项目负责人", "总监理工程师", "项目质量负责人"], "ans": [0], "exp": "施工单位做好技术交底，是取得好的施工质量的条件之一。为此，每一分项工程开始实施前均要进行交底。为做好技术交底，应由项目技术人员编制技术交底书，并经项目技术负责人批准。"}, {"id": 631, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "砌筑与抹灰之间，应在墙体砌筑后留（　　）天时间，让墙体充分沉陷、稳定、干燥后再抹灰。", "opts": ["6～8", "3～7", "6～10", "2～6"], "ans": [2], "exp": "砌筑与抹灰之间，应在墙体砌筑后留6～10天时间，让墙体充分沉陷、稳定、干燥后再抹灰。"}, {"id": 632, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "工序质量检验也是对工序活动效果进行评价，贯穿于整个质量检验全过程的内容是（　　）。", "opts": ["标准具体化", "度量", "比较", "记录"], "ans": [3], "exp": "记录要贯穿于整个质量检验全过程，把度量出来的质量特征值完整、准确、及时地记录下来，以供统计、分析、判定、审核和备查。"}, {"id": 633, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "工序质量检验也是对工序活动效果进行评价，下列对处理说法正确的是（　　）。", "opts": ["根据判定结果，对质量合格与优良的工程或产品予以认证", "根据比较结果来判断工程或产品质量是否符合规程、标准要求，并作出结论", "要贯穿于整个质量检验全过程", "将度量出来的质量特征值与该工程或产品的质量技术标准进行比较，判断有何差异"], "ans": [0], "exp": "处理是指根据判定结果，对质量合格与优良的工程或产品予以认证。判定是指根据比较结果来判断工程或产品质量是否符合规程、标准要求，并做出结论。记录要贯穿于整个质量检验全过程。比较是指将度量出来的质量特征值与该工程或产品的质量技术标准进行比较，判断有何差异。"}, {"id": 634, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "如果工程变更涉及结构主体及安全，该工程变更还要按有关规定报送（　　）进行审查，否则变更不能实施。", "opts": ["设计单位", "监理单位", "施工图原审查单位", "建设单位"], "ans": [2], "exp": "如果工程变更涉及结构主体及安全，该工程变更还要按有关规定报送施工图原审查单位进行审查，否则变更不能实施。"}, {"id": 635, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "项目监理机构审查批准的施工组织设计应报送（　　）。", "opts": ["设计单位", "监理单位", "施工单位", "建设单位"], "ans": [3], "exp": "项目监理机构审查批准的施工组织设计应报送建设单位。"}, {"id": 636, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "可作为质量控制点的对象涉及面广，可能是技术要求高、施工难度大的结构部位，也可能是影响质量的关键工序、操作或某一环节。下列对于质量控制点的设置原则的说法，正确的有（　　）。", "opts": ["施工过程中的关键工序或环节及隐蔽工程，例如复杂曲线模板的放样等", "施工中的薄弱环节或质量不稳定的工序、部位或对象，例如地下防水层施工等", "施工准备过程采用专利技术，特殊材料", "施工无足够把握、施工条件困难或技术难度大的工序或环节，例如预应力结构的张拉工序、钢筋混凝土结构中的钢筋架立等"], "ans": [1], "exp": "质量控制点的设置应遵循以下原则：①施工过程中的关键工序或环节及隐蔽工程，例如预应力结构的张拉工序、钢筋混凝土结构中的钢筋架立等。②施工中的薄弱环节或质量不稳定的工序、部位或对象，例如地下防水层施工等。③对后续工程施工或对后续工序质量或安全有重大影响的工序、部位或对象，例如预应力结构中的预应力钢筋质量、模板的支撑与固定等。④采用新技术、新工艺、新材料的部位或环节。⑤施工无足够把握、施工条件困难或技术难度大的工序或环节，例如复杂曲线模板的放样等。"}, {"id": 637, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "（　　）在完成施工组织设计的编制及内部审批工作后，报请项目监理机构审查，由（　　）审核签认。", "opts": ["设计单位；建设单位", "施工单位；总监理工程师", "监理单位；建设单位", "建设单位；监理单位"], "ans": [1], "exp": "施工单位在完成施工组织设计的编制及内部审批工作后，报请项目监理机构审查，由总监理工程师审核确认。"}, {"id": 638, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "施工测量开始前，（　　）应向项目监理机构提交测量仪器的型号、技术指标、精度等级、法定计量部门的标定证明、测量工的上岗证明，经项目监理机构审核确认后，方可进行正式测量作业。", "opts": ["建设单位", "施工单位", "测量单位", "勘察单位"], "ans": [1], "exp": "施工测量开始前，施工单位应向项目监理机构提交测量仪器的型号、技术指标、精度等级、法定计量部门的标定证明、测量工的上岗证明，经项目监理机构审核确认后，方可进行正式测量作业。"}, {"id": 639, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "（　　）是一个包含事前控制、事中控制和事后控制三大环节的系统过程。", "opts": ["施工成本控制", "施工进度控制", "施工安全控制", "施工质量控制"], "ans": [3], "exp": "施工质量控制是一个包含事前控制、事中控制和事后控制三大环节的系统过程。"}, {"id": 640, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "所谓（　　），是指对质量活动结果的评价认定和对质量偏差的纠正。", "opts": ["事前控制", "事中控制", "事后控制", "动态纠偏"], "ans": [2], "exp": "所谓事后控制，是指对质量活动结果的评价认定和对质量偏差的纠正。"}, {"id": 641, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "（　　）是施工质量的直接实施者和责任者。", "opts": ["设计单位", "施工单位", "建设单位", "监理单位"], "ans": [1], "exp": "施工单位是施工质量的直接实施者和责任者。"}, {"id": 642, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "施工单位必须有整套的制度及工作程序，即“三检制度”：作业活动结束后，作业者必须（　　）；不同工序交接，相关人员必须进行（　　）；施工单位专职质检员的（　　）。", "opts": ["专检；交接检查；互检", "自检；交接检查；专检", "专检；互检；自检", "自检；互检；专检"], "ans": [1], "exp": "施工单位必须有整套的制度及工作程序，即“三检制度”：作业活动结束后，作业者必须自检；不同工序交接，相关人员必须进行交接检查；施工单位专职质检员的专检。"}, {"id": 643, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "（　　）是工程实体最终形成的阶段，也是工程质量和工程使用价值最终形成和实现的阶段，因此，是工程质量控制的重要阶段。", "opts": ["决策阶段", "设计阶段", "成本控制", "施工阶段"], "ans": [3], "exp": "施工阶段是工程实体最终形成的阶段，也是工程质量和工程使用价值最终形成和实现的阶段，因此，是工程质量控制的重要阶段。"}, {"id": 644, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "下列关于施工准备的说法，错误的是（　　）。", "opts": ["施工准备是指为了保证工程顺利开工和施工活动正常进行而必须提前做的一切准备工作", "只有做好施工准备，才能取得良好的施工效果", "施工准备要在施工前进行，不需要贯穿整个施工过程", "施工准备工作要取得各相关单位的支持与配合"], "ans": [2], "exp": "施工准备不仅要在施工前进行，而且贯穿于整个施工过程。"}, {"id": 645, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "（　　）是施工准备工作的重要组成部分，也是指导施工现场全部生产活动的技术经济文件。", "opts": ["设计图纸", "施工组织设计", "监理大纲", "合同"], "ans": [1], "exp": "施工组织设计是施工准备工作的重要组成部分，也是指导施工现场全部生产活动的技术经济文件。"}, {"id": 646, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "（　　）收到拟建工程的设计图纸和有关技术文件后，应尽快组织有关工程技术人员熟悉和自审图纸，写出自审图纸记录。", "opts": ["施工单位", "建设单位", "设计单位", "监理单位"], "ans": [0], "exp": "施工单位收到拟建工程的设计图纸和有关技术文件后，应尽快组织有关工程技术人员熟悉和自审图纸，写出自审图纸记录。"}, {"id": 647, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "施工图会审会议由（　　）主持，设计单位和施工单位、工程监理单位参加。", "opts": ["施工单位", "建设单位", "设计单位", "监理单位"], "ans": [1], "exp": "施工图会审会议由建设单位主持，设计单位和施工单位、工程监理单位参加。"}, {"id": 648, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "下列关于进场材料、构配件质量控制的说法，错误的是（　　）。", "opts": ["凡运到施工现场的原材料、半成品或构配件，必须附有产品出厂合格证及技术说明书", "施工单位按规定要求进行检验的检验或试验报告，经建设单位审查并确认其质量合格后，方准进场", "进口材料设备的检查、验收，应会同国家商检部门进行", "对于某些当地材料及现场配制的制品，施工单位事先要进行试验，达到要求的标准方准施工"], "ans": [1], "exp": "选项B的正确说法，施工单位按规定要求进行检验的检验或试验报告，经项目监理机构审查并确认其质量合格后，方准进场。"}, {"id": 649, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "工程施工前，应由（　　）制定单位工程、分部工程、分项工程和检验批的划分方案，并应由项目监理机构审核、建设单位确认后实施。", "opts": ["设计单位", "施工单位", "监理单位", "建设单位"], "ans": [1], "exp": "工程施工前，应由施工单位制定单位工程、分部工程、分项工程和检验批的划分方案，并应由项目监理机构审核、建设单位确认后实施。"}, {"id": 650, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "关键部位，或技术难度大、施工复杂的检验批，在（　　）施工前，施工单位的技术交底书（或作业指导书）要报项目监理机构。", "opts": ["分部工程", "分项工程", "单位工程", "检验批"], "ans": [1], "exp": "关键部位，或技术难度大、施工复杂的检验批，在分项工程施工前，施工单位的技术交底书（或作业指导书）要报项目监理机构。"}, {"id": 651, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "有些工序之间必须留有必要的（　　）时间，例如砌筑与抹灰之间，应在墙体砌筑后留6～10天时间，让墙体充分沉陷、稳定、干燥后再抹灰；抹灰层干燥后，才能喷刷乳胶漆。", "opts": ["操作", "技术间歇", "准备", "检查"], "ans": [1], "exp": "有些工序之间必须留有必要的技术间歇时间，例如砌筑与抹灰之间，应在墙体砌筑后留6～10天时间，让墙体充分沉陷、稳定、干燥后再抹灰；抹灰层干燥后，才能喷刷乳胶漆。"}, {"id": 652, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "项目监理机构的质量检查与验收，是对施工单位作业活动质量的复核与确认。项目监理机构的检查决不能代替施工单位的（　　）。", "opts": ["专检", "自检", "互检", "内部验收"], "ans": [1], "exp": "项目监理机构的质量检查与验收，是对施工单位作业活动质量的复核与确认；项目监理机构的检查决不能代替施工单位的自检。"}, {"id": 653, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "施工单位进行施工现场准备和施工部署属于施工质量控制的（　　）。", "opts": ["事前控制", "事中控制", "事后控制", "全过程控制"], "ans": [0], "exp": "施工质量控制是一个包含事前控制、事中控制和事后控制三大环节的系统过程。所谓事前控制，就是要预先进行周密的质量计划，并按质量计划进行质量活动前准备工作状态的控制。例如在施工准备阶段，施工单位编制和审查施工组织设计、施工方案，进行施工现场准备和施工部署等。"}, {"id": 654, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "工程竣工验收合格后，（　　）应在建（构）筑物的明显位置设置有关工程质量责任主体的永久性标牌。", "opts": ["建设单位", "施工单位", "设计单位", "监理单位"], "ans": [0], "exp": "工程竣工验收合格后，建设单位应在建（构）筑物的明显位置设置有关工程质量责任主体的永久性标牌。"}, {"id": 655, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "工程施工质量应符合（　　）规定，并应符合工程勘察设计文件要求和合同约定。", "opts": ["工程施工质量验收规范", "国家现行强制性工程建设标准", "工程设计标准", "国家法律法规"], "ans": [1], "exp": "工程施工质量应符合国家现行强制性工程建设标准规定，并应符合工程勘察设计文件要求和合同约定。"}, {"id": 656, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "进口产品应符合合同规定的质量要求，并附有中文说明书和（　　），经进场验收合格后方可使用。", "opts": ["质量监督证明", "报关证明", "商检证明", "合格证明"], "ans": [2], "exp": "C选项正确，进口产品应符合合同规定的质量要求，并附有中文说明书和商检证明，经现场验收合格后方可使用。"}, {"id": 657, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "施工过程中，检验批的验收应由（　　）组织。", "opts": ["项目技术负责人", "建设单位现场代表", "项目经理", "专业监理工程师"], "ans": [3], "exp": "检验批应由专业监理工程师组织施工单位项目专业质量检查员、专业工长等进行验收。"}, {"id": 658, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "根据《建筑工程施工质量验收统一标准》，具备独立使用功能的建筑物或构筑物可划分为一个（　　）。", "opts": ["单项工程", "分部工程", "单位工程", "子分部工程"], "ans": [2], "exp": "单位工程应为具备独立使用功能的建筑物或构筑物。"}, {"id": 659, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "建筑工程施工质量验收中，经返工或返修的检验批，应（　　）。", "opts": ["予以验收", "协商验收", "鉴定验收", "重新进行验收"], "ans": [3], "exp": "经返工或返修的检验批，应重新进行验收。"}, {"id": 660, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "装配式建筑混凝土预制件的原材料质量、钢筋加工和连接的力学性能、混凝土强度、构件结构性能、装饰材料、保温材料及拉结件的质量等均应根据国家现行有关标准进行检查和检验，并应严格遵守操作规程和做好质量检验记录。混凝土预制构件出厂时的混凝土强度不得低于设计混凝土强度等级值的（　　）。", "opts": ["25%", "50%", "75%", "100%"], "ans": [2], "exp": "混凝土预制构件出厂时的混凝土强度不得低于设计混凝土强度等级值的75%。"}, {"id": 661, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "单位工程竣工验收阶段应当编制工程质量评估报告的单位是（    ）。", "opts": ["项目监理机构", "建设单位", "施工单位", "工程质量监督机构"], "ans": [0], "exp": "项目监理机构应在施工单位自检合格后组织工程峻工预验收，预验收合格后应编制工程质量评估报告，按规定程序审批后向建设单位提交。"}, {"id": 662, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "质量检查时，观感质量应符合要求的工程是（    ）。", "opts": ["检验批和分项工程", "分项工程和分部工程", "检验批和分部工程", "分部工程和单位工程"], "ans": [3], "exp": ""}, {"id": 663, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "按照施工作业技术交底要求，分项工程技术交底书的编制人和批准人分别是（    ）。", "opts": ["项目技术人员和项目技术负责人", "项目技术负责人和企业技术负责人", "项目技术负责人和项目负责人", "项目技术人员和项目负责人"], "ans": [0], "exp": "每一分项工程开始实施前均要进行交底。为做好技术交底，应由项目技术人员编制技术交底书，并经项目技术负责人批准。"}, {"id": 664, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "工程施工前，制定和确认施工验收层次划分方案的正确做法是（    ）。", "opts": ["由施工单位和项目监理机构共同制定，经建设单位确认", "由施工单位和设计单位共同制定，经项目监理机构确认", "由施工单位制定，经项目监理机构审核后建设单位确认", "由项目监理机构制定，经建设单位和施工单位共同确认"], "ans": [2], "exp": "工程施工前，应由施工单位制定单位工程、分部工程、分项工程和检验批的划分方案，并应由项目监理机构审核、建设单位确认后实施。"}, {"id": 665, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "下列工作中属于施工质量事前控制的是（    ）。", "opts": ["施工单位编制和审查施工组织设计", "作业技术活动操作者的行为约束", "对质量活动过程和结果的监督控制", "质量活动结果的评价认定"], "ans": [0], "exp": "B项属于事中控制；C项属于事中控制；D项属于事后控制。"}, {"id": 666, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "施工机械设备的选择要满足施工生产的实际需求，施工机械配置质量控制主要考虑因素有（　　）。", "opts": ["施工机械设备的选型", "机械设备性能参数的确定", "机械设备数量", "机械设备使用操作", "机械设备经济性"], "ans": [0, 1, 2, 3], "exp": "施工机械配置的质量控制主要围绕施工机械设备的选型、机械设备性能参数的确定、机械设备数量、使用操作等方面进行。"}, {"id": 667, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "施工质量检查验收时，工程施工质量应符合的要求有（　　）。", "opts": ["工程勘察设计文件", "进度计划", "合同约定", "成本计划", "强制性工程建设标准"], "ans": [0, 2, 4], "exp": "工程施工质量应符合国家现行强制性工程建设标准规定，并应符合工程勘察设计文件要求和合同约定。"}, {"id": 668, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "为了保证工程质量，施工单位应从（　　）方面做好材料、构配件质量控制。", "opts": ["材料、构配件供应量计划", "材料、构配件采购订货", "进场材料、构配件检验", "材料、构配件的仓储保管", "施工机械维修保养"], "ans": [1, 2], "exp": "为了保证工程质量，施工单位应从材料、构配件需要量计划，材料、构配件采购订货，进场材料、构配件检验，材料、构配件的现场储存和使用方面做好材料、构配件质量控制。"}, {"id": 669, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "施工测量开始前，施工单位应向项目监理机构提交（　　）经项目监理机构审核确认后，方可进行正式测量作业。", "opts": ["测量仪器的型号", "质量指标", "精度等级", "标定证明", "岗位合格证"], "ans": [0, 2], "exp": "施工测量开始前，施工单位应向项目监理机构提交测量仪器的型号、技术指标、精度等级、法定计量部门的标定证明、测量工的上岗证明，经项目监理机构审核确认后，方可进行正式测量作业。"}, {"id": 670, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "施工质量验收应包括单位工程、分部工程、分项工程和检验批施工质量验收，并应符合下列规定（　　）。", "opts": ["检验批应根据施工组织、质量控制和专业验收需要，按工程量、楼层、施工段划分，检验批抽样数量应符合有关专业验收标准的规定", "分部工程应根据工种、材料、施工工艺、设备类别划分", "分项工程应根据专业性质、工程部位划分", "单位工程应为具备独立使用功能的建筑物或构筑物", "分部工程应为具备独立使用功能的建筑物或构筑物"], "ans": [0, 3], "exp": "施工质量验收应包括单位工程、分部工程、分项工程和检验批施工质量验收，并应符合下列规定：（1）检验批应根据施工组织、质量控制和专业验收需要，按工程量、楼层、施工段划分，检验批抽样数量应符合有关专业验收标准的规定。（2）分项工程应根据工种、材料、施工工艺、设备类别划分。（3）分部工程应根据专业性质、工程部位划分。（4）单位工程应为具备独立使用功能的建筑物或构筑物。"}, {"id": 671, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "施工质量验收层次中，分项工程应根据（　　）划分。", "opts": ["工种", "材料", "施工工艺", "设备类别", "工程部位"], "ans": [0, 1, 2, 3], "exp": "分项工程应根据工种、材料、施工工艺、设备类别划分。"}, {"id": 672, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "施工质量验收应包括（　　）施工质量验收。", "opts": ["检验批", "分部工程", "分项工程", "单位工程", "工程项目"], "ans": [0, 1, 2, 3], "exp": "施工质量验收应包括单位工程、分部工程、分项工程和检验批施工质量验收。"}, {"id": 673, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "检验批应根据（　　）需要，按工程量、楼层、施工段划分，检验批抽样数量应符合有关专业验收标准的规定。", "opts": ["施工组织", "质量控制", "安全控制", "成本控制", "专业验收"], "ans": [0, 1, 4], "exp": "检验批应根据施工组织、质量控制和专业验收需要，按工程量、楼层、施工段划分，检验批抽样数量应符合有关专业验收标准的规定。"}, {"id": 674, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "分项工程质量验收合格的规定包括（　　）。", "opts": ["观感质量应符合要求", "一些重要的允许偏差项目控制在允许偏差限制之内", "所含检验批的质量验收记录应完整、真实", "所含检验批的质量均应验收合格", "有关安全、节能、环境保护和主要使用功能的抽样检验结果应符合相关规定"], "ans": [2, 3], "exp": "分项工程质量验收合格，应符合下列规定：（1）所含检验批的质量均应验收合格。（2）所含检验批的质量验收记录应完整、真实。"}, {"id": 675, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "multi", "q": "施工测量工作开始前，施工单位应向项目监理机构提交的测量仪器相关信息有（    ）。", "opts": ["仪器型号", "测量精度等级", "购置或租赁凭证", "使用年限", "法定计量部门标定证明"], "ans": [0, 1, 4], "exp": "施工测量开始前，施工单位应向项目监理机构提交测量仪器的型号、技术指标、精度等级、法定计量部门的标定证明、测量工的上岗证明，经项目监理机构审核确认后，方可进行正式测量作业。"}, {"id": 676, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "沉降缝或变形缝设置不当导致工程质量事故的，该施工质量事故的成因是（　　）。", "opts": ["违反有关法规和工程合同规定", "施工与管理失控", "设计计算失误", "工程地质勘察失误"], "ans": [2], "exp": "盲目套用图纸；采用不正确的结构方案，计算简图与实际受力情况不符，荷载取值过小，内力分析有误，沉降缝或变形缝设置不当，悬挑结构未进行抗倾覆验算，以及计算错误等，属于设计计算失误。"}, {"id": 677, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "住房和城乡建设主管部门接到一般事故报告后，应当逐级上报至（　　）。", "opts": ["国务院", "国务院住房和城乡建设主管部门", "省级人民政府住房和城乡建设主管部门", "市级人民政府住房和城乡建设主管部门"], "ans": [2], "exp": "较大、重大及特别重大事故逐级上报至国务院住房和城乡建设主管部门，一般事故逐级上报至省级人民政府住房和城乡建设主管部门。"}, {"id": 678, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "事故调查组由有关人民政府、应急管理部门、负有安全生产监督管理职责的有关部门、监察机关、公安机关以及工会派人组成，并应当邀请（　　）派人参加。", "opts": ["人民检察院", "建设单位", "施工单位", "质量监督机构"], "ans": [0], "exp": "事故调查组由有关人民政府、应急管理部门、负有安全生产监督管理职责的有关部门、监察机关、公安机关以及工会派人组成，并应当邀请人民检察院派人参加。"}, {"id": 679, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "某质量事故造成4人死亡，60人重伤，直接经济损失1.2亿。该事故属于（　　）。", "opts": ["一般事故", "较大事故", "重大事故", "特别重大事故"], "ans": [3], "exp": "施工质量事故分为以下4个等级：（1）特别重大事故，是指造成30人及以上死亡，或者100人及以上重伤，或者1亿元及以上直接经济损失的事故。（2）重大事故，是指造成10人及以上30人以下死亡，或者50人及以上100人以下重伤，或者5000万元及以上1亿元以下直接经济损失的事故。（3）较大事故，是指造成3人及以上10人以下死亡，或者10人及以上50人以下重伤，或者1000万元及以上5000万元以下直接经济损失的事故。（4）一般事故，是指造成3人以下死亡，或者10人以下重伤，或者100万元以上1000万元以下直接经济损失的事故。"}, {"id": 680, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "采用不适宜的施工方法或工艺等引发的质量事故，属于事故按原因分类中的（　　）。", "opts": ["技术原因", "管理原因", "社会原因", "经济原因"], "ans": [0], "exp": "因技术原因引发的质量事故。在工程实施过程中，由于设计、施工技术上的失误而造成的质量事故。主要包括：结构设计计算错误；地质情况估计错误；盲目采用技术上未成熟、实际应用中未得到充分实践检验验证其可靠的新技术；采用不适宜的施工方法或工艺等引发的质量事故。"}, {"id": 681, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "进料检验不严格等引发的质量事故，属于事故按原因分类中的（　　）。", "opts": ["技术原因", "管理原因", "社会原因", "经济原因"], "ans": [1], "exp": "因管理原因引发的质量事故。由于管理不完善或失误而引发的质量事故。主要包括：施工单位的质量管理体系不完善；质量检验制度不严密，质量控制不严；质量管理措施落实不力；检测仪器设备管理不善而失准；进料检验不严格等引发的质量事故。"}, {"id": 682, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "施工质量控制应坚持（　　）的原则。", "opts": ["质量第一", "安全第一", "预防为主", "综合治理"], "ans": [2], "exp": "施工质量控制应坚持“预防为主”的原则，事先对影响施工质量的各种因素加以控制，而不是消极被动地等出现质量问题再进行处理。"}, {"id": 683, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "未经可行性研究、不做调查分析就拍板定案，属于形成施工质量事故的（　　）原因。", "opts": ["违反有关法规和工程合同规定", "违反工程建设程序", "施工与管理失控", "设计计算失误"], "ans": [1], "exp": "违反工程建设程序：工程建设程序是工程建设客观规律的反映，但有些工程不按工程建设程序办事，例如，未经可行性研究、不做调查分析就拍板定案；未搞清工程地质、水文情况等条件就仓促开工；边设计、边施工，任意修改设计，不按图纸施工；工程竣工不进行试车运行，未经验收就交付使用等，这些常常是导致工程质量事故的重要原因。"}, {"id": 684, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "违法转包或分包，属于形成施工质量事故的（　　）原因。", "opts": ["违反有关法规和工程合同规定", "违反工程建设程序", "施工与管理失控", "设计计算失误"], "ans": [0], "exp": "违反有关法规和工程合同规定。例如，无证设计、无证施工、越级设计、越级施工，工程招标投标中不公平竞争，超低价中标，违法转包或分包，擅自修改设计，不按图纸施工等。"}, {"id": 685, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "下列关于质量事故处理程序的说法，不正确的是（　　）。", "opts": ["单位负责人接到报告后，应于1h内向事故发生地县级以上人民政府住房和城乡建设主管部门及有关部门报告", "住房和城乡建设主管部门逐级上报事故情况时，每级上报时间不得超过2h", "事故报告后出现新情况，以及事故发生之日起20日内伤亡人数发生变化的，应当及时补报", "国务院住房和城乡建设主管部门接到重大和特别重大事故的报告后，应当立即报告国务院"], "ans": [2], "exp": "C错误，事故报告后出现新情况，以及事故发生之日起30日内伤亡人数发生变化的，应当及时补报。"}, {"id": 686, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "集料中活性化硅会导致碱集料反应，使混凝土产生（　　）。", "opts": ["爆裂", "脆性破坏", "断裂", "裂缝"], "ans": [3], "exp": "钢筋物理力学性能不良会导致钢筋混凝土结构产生裂缝或脆性破坏；集料中活性化硅会导致碱集料反应，使混凝土产生裂缝；水泥安定性不良，会造成混凝土爆裂；预制构件断面尺寸不足，支撑锚固长度不足，未可靠建立预应力值，漏放或少放钢筋，板面开裂等，均可能出现断裂、坍塌事故。"}, {"id": 687, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "施工质量事故可从不同角度进行分类，按事故造成后果分类，属于未遂事故（　　）", "opts": ["出现了质量问题，经及时采取措施，未造成经济损失", "不符合质量标准造成经济损失", "不符合设计要求造成经济损失", "符合质量标准造成工期延误"], "ans": [0], "exp": "出现了质量问题，经及时采取措施，未造成经济损失、延误工期或其他不良后果，均属于未遂事故。"}, {"id": 688, "source": "教材", "ch": 5, "year": null, "sourceLabel": "第5章", "type": "single", "q": "施工质量事故可从不同角度进行分类，按事故责任分类，下列属于指导责任事故的是（　　）。", "opts": ["土方工程中不按规定的填土含水率和碾压遍数施工", "盲目赶工", "浇筑混凝土时随意加水", "工序操作中不按操作规程进行操作"], "ans": [1], "exp": "工程施工过程中，由于指导或领导失误而造成的质量事故，如工程负责人不按规范规程组织施工、盲目赶工、强令他人违章作业、降低工程
