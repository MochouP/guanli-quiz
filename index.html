 "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "职业健康安全管理体系的系统化管理通过（　　）实现。", "opts": ["组织职责系统化、风险管控系统化、管理过程系统化", "法制化管理、规范化管理、适用性广泛", "自愿原则、与其他管理体系兼容、应用的灵活性", "预防为主、持续改进、法制化管理"], "ans": [0], "exp": "系统化管理通过三个方面实现：①组织职责系统化。组织内每一层次的工作人员均应为其所控制部分承担职业健康安全管理职责。②风险管控系统化。强调应从组织内部和外部，人的行为和物的因素，研发和生产全过程等不同角度进行危险源辨识，将相关风险因素进行系统管控。③管理过程系统化。从危险源辨识、风险评价到风险应对、跟踪监视、评审和改进，均应建立、实施和保持相应的管控过程。"}, {"id": 199, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "下列选项中，不属于环境管理体系基本理念的是（　　）。", "opts": ["持续改进", "合法合规", "利益最大化", "风险管理"], "ans": [2], "exp": "环境管理体系有如下基本理念：（1）持续改进。（2）合法合规。（3）风险管理。（4）绩效评估。（5）沟通与参与。（6）资源管理。（7）培训和意识。"}, {"id": 200, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "为确保职业健康安全管理体系和环境管理体系的持续适宜性、充分性和有效性，对组织的管理体系进行评审的应是施工企业的（　　）。", "opts": ["安全总监", "项目经理", "技术总监", "最高管理者"], "ans": [3], "exp": "最高管理者应按策划的时间间隔对组织的职业健康安全管理体系进行评审，以确保其持续的适16．根据国家标准《质量管理体系要求》，成文信息分为要求保持和要求保留两类。下列成文信息中，属于要求保持的是（  ）。"}, {"id": 201, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "multi", "q": "根据《质量管理体系基础和术语》GB/T19000—2016，关于质量管理基本原则的说法，正确的有（　　）。", "opts": ["组织宗旨和目标的确立是质量管理的首要关注点", "整个组织内各级胜任、经授权并积极参与的人员，是提高组织创造和提供价值能力的必要条件", "质量管理体系是由相互关联的过程所组成", "组织应确定和选择改进机会，并采取必要措施，以满足顾客要求和增强顾客满意", "为了增强决策过程的客观性，对输入类型和输入来源的理解必须是客观的"], "ans": [1, 2, 3], "exp": "选项A错误，根据《质量管理体系基础和术语》GB/T19000—2016，质量管理的首要关注点是满足顾客要求并且努力超越顾客期望。选项E错误，决策总是包含某些不确定性。它经常涉及多种类型和来源的输入及其理解。这些理解可能是主观的，重要的是理解因果关系和潜在的非预期后果。对事实、证据和数据的分析可导致决策更加客观、可信。"}, {"id": 202, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "multi", "q": "在环境管理体系中，支持是指对整个环境管理体系的策划、运行、检查和改进等起支持作用的条款，它包括（　　）。", "opts": ["资源", "能力", "组织的角色、职责和权限", "信息交流", "文件化信息"], "ans": [0, 1, 3, 4], "exp": "根据《环境管理体系要求及使用指南》GB/T24001—2016，支持包括五方面内容，分别是资源、能力、意识、信息交流和文件化信息。"}, {"id": 203, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "multi", "q": "根据《职业健康安全管理体系要求及使用指南》GB/T45001—2020，下列关于职业健康安全管理体系标准特点的说法，正确的有（　　）。", "opts": ["职业健康安全管理体系的规范化管理是通过基于PDCA循环的运行模式实现的", "职业健康安全管理体系标准适用于组织控制下的职业健康安全风险，这些风险不包括其他相关方的需求和期望因素", "职业健康安全管理体系标准既不规定具体的职业健康安全绩效准则，也不提供职业健康安全管理体系的设计规范", "职业健康安全管理体系标准突出强调了预防为主和持续改进的要求", "职业健康安全管理体系标准适用于任何规模、类型和活动的组织"], "ans": [0, 2, 3, 4], "exp": "选项B错误，职业健康安全管理体系标准适用于组织控制下的职业健康安全风险，这些风险必须考虑到诸如组织运行所处环境、组织工作人员和其他相关方的需求和期望等因素。"}, {"id": 204, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "multi", "q": "根据《卓越绩效评价准则》GB/T19580—2012，“过程结果”三角，包括（　　）。", "opts": ["战略", "改进", "结果", "资源", "过程管理"], "ans": [2, 3, 4], "exp": "“资源”“过程管理”“结果”构成“过程结果”三角，强调如何充分调动组织中人的积极性和能动性，通过组织中的人在各个业务流程中发挥作用和过程管理的规范，高效地实现组织所追求的经营结果。“过程结果”是从动的，关注的是组织如何正确地做事，解决的是效率和绩效问题。"}, {"id": 205, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "multi", "q": "在全面一体化管理体系中，关于全面一体化管理体系文件编制原则的说法，正确的有（　　）。", "opts": ["管理体系文件是由管理人员根据管理理念进行编订的", "管理体系文件的编制应基于企业正在开展的各项活动的现实情况", "以手册或其他文件形式表达管理体系的过程或核心要素之间的相互作用，并提供查询相关文件的途径", "在编制用于企业内部管理的文件时，对所必需的体系过程和活动应制定实施计划或方案并限期贯彻", "管理体系文件还是进行组织内部审核和外部评审的重要依据"], "ans": [2, 3, 4], "exp": "选项A错误，编制管理体系文件切忌不宜由少数人“闭门造车”，应充分发动各部门熟悉企业情况、有实践经验的人员，集思广益，共同参与，确保管理体系文件的可行性。选项B错误，管理体系文件的编制过程应成为管理体系的优化过程，不是对体系现状的简单写实，凡对企业特点和产品要求经风险、成本和利益评价所必需的体系过程和活动，尽管目前尚未开展，在编制用于管理文件时亦不可舍去。"}, {"id": 206, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "根据《风险管理指南》GB/T24353—2022，组织通过（　　）将风险管理纳入重要的活动和职能中。", "opts": ["风险管理框架", "风险管理目标", "风险管理方针", "风险管理战略"], "ans": [0], "exp": "风险管理框架的目的是协助组织将风险管理纳入重要的活动和职能中。"}, {"id": 207, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "下列关于“风险管理过程”的说法，正确的是（　　）。", "opts": ["风险管理过程由风险评估和风险应对构成", "不同的风险应对方案应相互排斥", "风险管理过程是组织管理和决策的有机组成部分，需融入组织的架构、运营和流程中，它可以应用在战略、运营、项目群或单个项目层面", "风险管理过程是一个完整的过程，独立于组织的其他过程"], "ans": [2], "exp": "选项A错误，风险管理过程是将政策、程序和实践系统地应用于沟通和咨询、建立环境、风险评估、风险应对、监督和检查、记录和报告等活动。选项B错误，风险应对方案之间不一定是相互排斥的。选项D错误，风险管理过程是组织管理和决策的有机组成部分，需融入组织的架构、运营和流程中。"}, {"id": 208, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "为使社会责任管理体系标准要素可与其他管理体系标准兼容或整合，社会责任管理体系的结构和方法与国际标准化组织（ISO）其他管理体系标准一样，应基于（　　）的概念和高层结构。", "opts": ["识别—分析—评价—应对", "分析—识别—评价—应对", "检查—策划—实施—改进", "策划—实施—检查—改进"], "ans": [3], "exp": "社会责任管理体系的结构和方法与国际标准化组织（ISO）其他管理体系标准一样，也是基于“策划—实施—检查—改进”（PDCA）的概念和高层结构，使社会责任管理体系标准要素可与其他管理体系标准兼容或整合。"}, {"id": 209, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "ESG衡量的三个维度不包括（　　）。", "opts": ["环境", "社会", "治理", "经济"], "ans": [3], "exp": "ESG是环境（Environmental）、社会（Social）、治理（Governance）的缩写，是从环境、社会和公司治理三个维度来衡量企业经营的可持续性与对社会价值观念的影响。"}, {"id": 210, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "不属于《社会责任指南》GB/T36000-2015所强调的社会责任原则的是（　　）。", "opts": ["尊重国际行为规范", "市场经济原则", "合乎道德的行为", "尊重法治"], "ans": [1], "exp": "社会责任原则包括：（1）担责；（2）透明；（3）合乎道德的行为；（4）尊重利益相关方利益；（5）尊重法治；（6）尊重国际行为规范；（7）尊重人权。"}, {"id": 211, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "在风险管理过程中，（　　）的目的是发现、确认和描述可能有助于或妨碍组织实现目标的风险。", "opts": ["风险识别", "风险分析", "风险评价", "风险应对"], "ans": [0], "exp": "风险识别的目的是发现、确认和描述可能有助于或妨碍组织实现目标的风险，采用相关、适当、最新的信息对于识别风险非常重要。"}, {"id": 212, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "根据国家标准《风险管理指南》GB/T24353-2022，下列关于风险管理过程的描述中，不属于风险评估经典过程的是（　　）。", "opts": ["风险识别", "风险分析", "风险预防", "风险评价"], "ans": [2], "exp": "风险评估是风险识别、风险分析和风险评价的整个过程。"}, {"id": 213, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "根据《风险管理指南》GB/T24353-2022采用的“三轮”形式，其中风险管理原则轮中的核心是（　　）。", "opts": ["领导作用与承诺", "风险识别", "创造和保护价值", "持续改进"], "ans": [2], "exp": "①风险管理原则轮中，核心是“创造和保护价值”；②风险管理框架轮中，核心是“领导作用与承诺”；③风险管理过程轮中，反映了风险评估的经典过程：风险识别－风险分析－风险评价。"}, {"id": 214, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "根据《风险管理指南》GB/T24353-2022，风险管理原则不包括（　　）。", "opts": ["整合", "结构化和全面性", "定制化", "领导作用与承诺"], "ans": [3], "exp": "《风险管理指南》GB/T24353-2022第4章指出，有效的风险管理应遵循整合、结构化和全面性、定制化、包容性、动态性、最佳可用信息、人和文化因素、持续改进等原则。"}, {"id": 215, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "multi", "q": "根据《社会责任指南》，社会责任的核心主题有（　　）。", "opts": ["人权", "劳工实践", "消费者问题", "改进", "社区参与和发展"], "ans": [0, 1, 2, 4], "exp": "社会责任的核心主题：①组织治理；②人权；③劳工实践；④环境；⑤公平运行实践；⑥消费者问题；⑦社区参与和发展。"}, {"id": 216, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "multi", "q": "根据国家标准《社会责任报告编写指南》GB/T36001—2015，基于与利益相关方有效沟通的目的，社会责任报告的编写和发布宜遵循（　　）的原则。", "opts": ["主观合理", "获取方便", "易读易懂", "明确回应", "宣传正面（信息）"], "ans": [1, 2, 3], "exp": "根据国家标准《社会责任报告编写指南》GB/T36001—2015，社会责任报告编写和发布宜遵循“完整全面、客观准确、明确回应、及时可比、易读易懂、获取方便”的原则。"}, {"id": 217, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "multi", "q": "下列关于社会责任与ESG的说法，正确的有（　　）。", "opts": ["社会责任更加注重“性质”体现", "社会责任传播属性更强", "ESG更注重口碑建立及品牌推广", "ESG与投融资等关系更为密切", "相对于社会责任，ESG更加关注环境、社会等具体细分内容"], "ans": [0, 1, 3], "exp": "根据社会责任与ESG之间的差异，社会责任更加注重“性质”体现，传播属性更强，更注重口碑建立及品牌推广；ESG更加注重“量值”体现，与投融资等关系更为密切。对于相似之处，社会责任与ESG均关注环境、社会等具体细分内容，且两者有诸多重合。"}, {"id": 218, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "根据《建设工程项目管理规范》GB/T50326—2017，企业在施工投标前，应进行投标策划，确定投标目标，并编制投标计划。下列内容中，属于企业根据招标和竞争需求编制的投标文件内容的是（　　）。", "opts": ["有竞争力的报价", "投标文件评审办法", "投标文件采取的格式", "合同主要条款及签订方式"], "ans": [0], "exp": "企业应根据招标和竞争需求编制包括下列内容的投标文件：（1）响应招标要求的各项商务规定；（2）有竞争力的技术措施和管理方案；（3）有竞争力的报价。选项BCD均属于招标文件中的内容。"}, {"id": 219, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "项目管理机构应根据项目目标管理的要求进行项目资源的计划、配置、控制，并根据授权进行考核和处置。根据项目资源管理的程序，提供并配置各种资源的紧前工作是（　　）。", "opts": ["分析项目整体的资源状态", "编制资源的相关配置计划", "确定资源的各种提供方式", "控制项目资源的使用过程"], "ans": [1], "exp": "项目资源管理应遵循下列程序：（1）明确项目的资源需求；（2）分析项目整体的资源状态；（3）确定资源的各种提供方式；（4）编制资源的相关配置计划；（5）提供并配置各种资源；（6）控制项目资源的使用过程；（7）跟踪分析并总结改进。"}, {"id": 220, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "项目管理的基本制度是（　　）。", "opts": ["项目管理标准化", "项目管理责任制", "项目管理系统化", "项目管理流程化"], "ans": [1], "exp": "项目管理责任制度应作为项目管理的基本制度。"}, {"id": 221, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "根据《建设工程项目管理规范》GB/T50326—2017，“按照项目管理策划要求组织人员和资源”是（　　）的工作内容。", "opts": ["启动过程", "策划过程", "实施过程", "监控过程"], "ans": [2], "exp": "实施过程：应按照项目管理策划要求组织人员和资源，实施具体措施，完成项目管理策划中确定的工作。"}, {"id": 222, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "《项目管理指南》ISO21500：2012是由（　　）制定的项目管理标准。", "opts": ["美国项目管理协会", "国际项目管理协会", "国际标准化组织", "中国项目管理协会"], "ans": [2], "exp": "国际标准化组织（ISO）所属的“项目、项目群及项目组合管理标准化技术委员会”（ISO/TC258）自2012年以来制定了项目管理多项国际标准。这些标准包括：《项目管理指南》ISO21500：2012、《项目与项目组合管理指南》ISO21502：2014、《项目组合管理指南》ISO21504：2015、《项目群管理指南》ISO21503：2017、《项目、项目群和项目组合：治理指南》ISO21505：2018、《项目、项目群管理：挣值管理》ISO21508：2018、《项目、项目群管理：工作分解结构》ISO21511：2018等。"}, {"id": 223, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "美国项目管理协会（PMI）的项目管理标准是（　　）。", "opts": ["项目管理知识体系（PMBOK）", "个人能力基准（IPMAICB）", "组织能力基准（IPMAOCB）", "项目管理系列标准（ISO）"], "ans": [0], "exp": "国际上有较大影响力的项目管理标准有：美国项目管理协会（PMI）的项目管理知识体系（PMBOK）、国际项目管理协会（IPMA）的个人能力基准（IPMAICB）和组织能力基准（IPMAOCB），以及国际标准化组织（ISO）发布的项目管理系列标准。"}, {"id": 224, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "建筑工程施工例会的组织者是（　　）。", "opts": ["建设单位项目负责人", "施工单位项目经理", "总监理工程师", "施工单位项目总工"], "ans": [1], "exp": "施工项目经理应定期组织召开施工例会，并应参加建设单位或项目监理机构组织召开的专题会议，研究解决与工程施工相关的问题，并指定专人负责记录和形成会议纪要。"}, {"id": 225, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "single", "q": "项目管理责任制度的核心内容是（　　）。", "opts": ["项目经理责任制", "项目承包责任制", "项目绩效考核制度", "项目奖惩制度"], "ans": [0], "exp": "项目经理责任制应是项目管理责任制度的核心内容。9．下列项目群关键角色和责任者中，负责整个项目群战略和支持的是（  ）。"}, {"id": 226, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "multi", "q": "项目管理知识体系（PMBOK）以（　　）为基本过程组。", "opts": ["启动", "组织与准备", "计划", "监控", "收尾"], "ans": [0, 2, 3, 4], "exp": "项目管理知识体系（PMBOK）以5个基本过程组和10个知识领域为基本架构。5大基本过程组包括：启动、计划、执行、监控和收尾。"}, {"id": 227, "source": "教材", "ch": 2, "year": null, "sourceLabel": "第2章", "type": "multi", "q": "技术能力包含的能力要素有（　　）。", "opts": ["需求与目标", "组织与信息", "环境能力", "计划与控制", "采购"], "ans": [0, 1, 3, 4], "exp": "技术能力包含13个能力要素：项目策划、需求与目标、范围、时间（进度）、组织与信息、质量、财务（成本）、资源、采购、计划与控制、风险与机会、利益相关方、变化与变革。"}, {"id": 228, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "对于工程规模大、专业复杂的工程，建设单位管理能力有限时，应考虑采用（　　）方式。", "opts": ["施工总承包", "平行承包", "联合体承包", "合作体承包"], "ans": [0], "exp": "对于工程规模大、专业复杂的工程，建设单位管理能力有限时，应考虑采用施工总承包方式，有利于减少各专业之间因配合不当造成的窝工、返工、索赔风险。"}, {"id": 229, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "在施工评标初步评审环节中，投标文件对招标文件的响应性评审包括（　　）。", "opts": ["工程进度计划与措施", "技术标准和要求", "质量管理体系与措施", "投标人的财务状况"], "ans": [1], "exp": "在施工评标初步评审环节中，投标文件对招标文件的响应性评审包括投标内容、工期、工程质量、投标有效期、投标保证金、权利义务、已标价工程量清单、技术标准和要求等是否符合评标办法前附表中要求。"}, {"id": 230, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列关于合同计价方式的说法，正确的是（　　）。", "opts": ["在单价合同中，投标单位填报的单价应为直接费单价", "在单价合同中，工程量清单所列工程量为估算工程量", "单价合同适用于工期短、技术复杂的项目", "采用单价合同形式，不利于合同双方之间较为合理地分担合同履行过程中的风险"], "ans": [1], "exp": "A选项错误，在单价合同中，投标单位填报的单价应为计及各种摊销费用后的综合单价，而非直接费单价。C选项错误，单价合同大多用于工期长、技术复杂的工程。D选项错误，采用单价合同形式，可以在合同双方之间较为合理地分担合同履行过程中的风险。"}, {"id": 231, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "某施工单位报价时，把能够早日结算的项目适当提高报价，后期工程项目的报价可适当降低，又不提高总报价，这是采用的（　　）报价技巧。", "opts": ["不平衡报价法", "多方案报价法", "保本竞标法", "突然降价法"], "ans": [0], "exp": "不平衡报价法是指在不影响工程总报价的前提下，通过调整内部各个项目的报价，以达到既不提高总报价、不影响中标，又能在结算时得到更理想收益的报价方法。"}, {"id": 232, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列投标报价策略中属于恰当使用不平衡报价方法的是（　　）。", "opts": ["前期措施费可以适当降低报价", "装饰工程可适当提高报价", "预计今后工程量会减少的项目，适当提高单价", "单价与包干混合制合同中，招标人要求有些项目采用包干报价时，宜报高价"], "ans": [3], "exp": "A选项错误，前期措施费属于能够早日结算的项目可以适当提高报价；B选项错误，装饰工程属于后期工程项目的报价可适当降低；C选项错误，预计今后工程量会减少的项目适当降低单价。"}, {"id": 233, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "对于招标文件中的工程范围不明确，条款不清楚或不公正，或技术规范要求过于苛刻的工程，适合采用（　　）。", "opts": ["不平衡报价法", "多方案报价法", "保本竞标法", "突然降价法"], "ans": [1], "exp": "多方案报价法适用于招标文件中的工程范围不明确、条款不清楚或不公正，或技术规范要求过于苛刻的工程。"}, {"id": 234, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "招标人对招标文件进行澄清或者修改的内容可能影响投标文件编制的，应当在（　　）以书面形式通知所有获取招标文件的潜在投标人。", "opts": ["投标截止时间至少15日前", "提交投标文件截止时间至少20日前", "资格评审工作开始前15天", "资格评审工作开始前20天"], "ans": [0], "exp": "根据《中华人民共和国招标投标法实施条例》，招标人对招标文件进行澄清或者修改的内容可能影响投标文件编制的，招标人应在投标截止时间至少15日前，以书面形式通知所有获取招标文件的潜在投标人；不足15日的，招标人应顺延提交投标文件的截止时间。"}, {"id": 235, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "公开招标与邀请招标，在招标程序上的主要差异之一表现为是否（　　）。", "opts": ["编制招标文件", "进行资格预审", "进行公开开标", "组织现场考察"], "ans": [1], "exp": "采用邀请招标方式的优点是不需要发布招标公告和设置资格预审程序，可节约招标费用、缩短招标时间。"}, {"id": 236, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "招标人和中标人应当自中标通知书发出之日起（　　）日内，按照招标文件和中标人的投标文件订立书面合同。", "opts": ["10", "15", "30", "60"], "ans": [2], "exp": "招标人和中标人应在中标通知书发出之日起30日内，根据招标文件和中标人的投标文件订立书面合同。"}, {"id": 237, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列合同形式中，建设单位和承包单位都没有太大风险，有利于鼓励承包单位降低成本和缩短工期的有（　　）。", "opts": ["成本加浮动酬金合同", "成本加固定酬金合同", "成本加固定百分比酬金合同", "总价合同"], "ans": [0], "exp": "有利于鼓励承包单位降低成本缩短工期合同形式有：成本加浮动酬金合同、目标成本加奖罚合同。"}, {"id": 238, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列选项中，不属于邀请招标优点的是（　　）。", "opts": ["节约招标费用、缩短招标时间", "减少合同履行过程中承包商违约的风险", "不需要发布招标公告和设置资格预审程序", "可获得有竞争性的报价"], "ans": [3], "exp": "采用邀请招标方式的优点是不需要发布招标公告和设置资格预审程序，可节约招标费用、缩短招标时间。而且，由于招标人比较了解投标人以往业绩和履约能力，可减少合同履行过程中承包商违约的风险。"}, {"id": 239, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列关于多方案报价的说法，错误的是（　　）。", "opts": ["多方案报价法适用于招标文件中的工程范围不明确、条款不清楚或不公正，或技术规范要求过于苛刻的工程", "采用多方案报价法，可降低投标风险，但投标工作量较大", "多方案报价法是指在投标文件中报两个价", "多方案报价法需要编制两份投标文件"], "ans": [3], "exp": "多方案报价法是指在投标文件中报两个价：一个是按招标文件的条件报一个价；另一个是加注解的报价，即如果某条款作某些改动，报价可降低多少。这样，可降低总报价，以此吸引招标人。多方案报价法适用于招标文件中的工程范围不明确、条款不清楚或不公正，或技术规范要求过于苛刻的工程。采用多方案报价法，可降低投标风险，但投标工作量较大。"}, {"id": 240, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "招标人以招标公告的方式邀请具备条件的法人或者组织来投标，这种招标方式称为（　　）。", "opts": ["公开招标", "邀请招标", "议标", "定向招标"], "ans": [0], "exp": "公开招标又称无限竞争性招标，是指招标人通过新闻媒体发布招标公告，邀请具备条件的法人或组织投标竞争，然后从中确定中标者并与之签订施工合同的过程。"}, {"id": 241, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《评标委员会和评标方法暂行规定》，下列关于评标委员会的说法，错误的是（　　）。", "opts": ["评标委员会由招标人代表及有关技术、经济等方面的专家组成", "评标委员会成员应为5人以上单数", "评标委员会成员中，技术、经济等方面的专家不得少于成员总数的2/3", "评标委员会的专家成员由招标人直接确定"], "ans": [3], "exp": "评标委员会的专家成员应从依法组建的专家库中，采取随机抽取或者直接确定的方式确定。对于一般项目，可以采取随机抽取的方式；对于技术复杂、专业性强或者国家有特殊要求的招标项目，采取随机抽取方式确定的专家难以保证胜任的，可以由招标人直接确定。"}, {"id": 242, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列关于评标委员会的说法，正确的是（　　）。", "opts": ["评标委员会成员的名单应当保密到开标", "评标委员会成员的名单应当在开标前确定", "评标委员会成员人数为3人以上单数", "评标委员会中的专家一律采取随机抽取的方式确定"], "ans": [1], "exp": "A选项错误，评标委员会成员名单一般应在开标前确定，在中标结果确定前应当保密。C选项错误，评标委员会成员人数为5人以上单数。D选项错误，评标委员会的专家成员应从依法组建的专家库中，采取随机抽取或者直接确定的方式确定。"}, {"id": 243, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列合同计价方式中，建设单位容易控制造价，施工承包单位风险大的是（　　）。", "opts": ["固定总价合同", "目标成本加奖罚合同", "单价合同", "成本加固定酬金合同"], "ans": [0], "exp": "固定总价合同承包商风险最大。"}, {"id": 244, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "施工投标文件中技术标书主要是指（　　）。", "opts": ["专项施工方案", "施工组织设计", "应急预案", "监理细则"], "ans": [1], "exp": "技术标书主要是指施工组织设计。商务标书主要包括工程报价、优惠条件、对合同条款的确认等内容。"}, {"id": 245, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准设计施工总承包招标文件》，工程总承包合同投标报价单以（　　）为基础编制。", "opts": ["现场调查及踏勘", "自身技术能力", "施工方案", "现场管理水平"], "ans": [0], "exp": "现场调查是投标人投标阶段的重要环节，也是投标报价的基础。通常，投标人给出的报价单都是以现场调查及踏勘为基础编制的，报价单一旦给出，投标人无权再以情况了解不详、现场考查不周为由对工程报价提出调整要求。"}, {"id": 246, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列关于评标的说法，错误的是（　　）。", "opts": ["已标价工程量清单有计算错误的，总价金额与依据单价计算出的结果不一致时，以单价金额为准修正总价，单价金额小数点有明显错误的除外", "书写有错误的，投标文件中的大写金额与小写金额不一致时，以大写金额为准", "评标委员会对投标报价的错误予以修正后，需请投标人书面确认，作为投标报价的金额", "招标文件没有规定的方法、评审因素和标准，可将专家组商议后的决定作为评标依据"], "ans": [3], "exp": "招标文件没有规定的方法、评审因素和标准，不得作为评标依据。"}, {"id": 247, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "招标人最迟应在书面合同签订后（　　）日内向中标人和未中标的投标人退还投标保证金及银行同期存款利息。", "opts": ["3", "5", "7", "10"], "ans": [1], "exp": "招标人最迟应在书面合同签订后5日内向中标人和未中标的投标人退还投标保证金及银行同期存款利息。"}, {"id": 248, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列选项中，不适用于固定总价合同的是（　　）。", "opts": ["招标时已有施工图设计文件", "工程规模较小、技术不太复杂的中小型工程", "工程量小、工期较短（一般为1年之内）", "合同履行中可能出现较大设计变更"], "ans": [3], "exp": "固定总价合同一般适用于下列情形：①招标时已有施工图设计文件，施工任务和发包范围明确，合同履行中不会出现较大设计变更。②工程规模较小、技术不太复杂的中小型工程或承包工作内容较为简单的工程部位，承包单位可在投标报价时合理地预见工程实施过程中可能遇到的各种风险。③工程量小、工期较短（一般为1年之内），合同双方可不必考虑市场价格浮动对承包价格的影响。"}, {"id": 249, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "在合同履行过程中，建设单位没有要求变更原定承包内容的，承包单位在完成承包任务后，不论其实际成本如何，均应按签约合同价获得工程款支付。此种合同称为（　　）。", "opts": ["固定总价合同", "可调总价合同", "固定单价合同", "可调单价合同"], "ans": [0], "exp": "固定总价合同是指承包单位按其投标时建设单位接受的投标报价一笔包死工程任务的计价方式。在合同履行过程中，建设单位没有要求变更原定承包内容的，承包单位在完成承包任务后，不论其实际成本如何，均应按签约合同价获得工程款支付。"}, {"id": 250, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "某项工程计价方式采用单价合同时，其工程款的结算是按（　　）计算确定的。", "opts": ["业主提供的工程量及承包商所填报的单价", "业主提供的工程量及实际发生的单价", "实际完成的工程量及承包商所填报的单价", "实际完成的工程量及实际发生的单价"], "ans": [2], "exp": "单价合同是指承包单位在投标时按工程量清单中的分项工作内容填报单价，然后以实际完成工程量乘以所报单价计算工程价款的合同。"}, {"id": 251, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "承包单位可获得的酬金将随直接成本的增加而增加，因此不能激励承包人努力降低成本和缩短工期的合同形式是（　　）。", "opts": ["成本加浮动酬金合同", "成本加固定酬金合同", "目标成本加奖罚合同", "成本加固定百分比酬金合同"], "ans": [3], "exp": "成本加固定百分比酬金合同中，承包单位可获得的酬金将随直接成本的增加而增加。因此，这种合同虽在签订时简单易行，但不能激励承包单位缩短工期和降低成本。"}, {"id": 252, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "采用成本加浮动酬金合同，当实际成本大于预期成本时，承包人可以得到（　　）。", "opts": ["实际发生的直接费、酬金和预先约定的奖金", "实际发生的直接费和预先约定的奖金，不能得到酬金", "实际发生的直接费，但不能得到酬金和预先约定的奖金", "实际发生的直接费、酬金和罚金"], "ans": [3], "exp": "成本加浮动酬金合同双方在签订合同时约定工程预期成本和固定酬金，以及实际发生的直接成本与预期成本有差异后的奖罚计算办法。当实际成本大于预期成本时，因此承包人可以得到实际发生的直接费、酬金和罚金。"}, {"id": 253, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》，施工招标文件不包括（　　）。", "opts": ["招标公告或投标邀请书", "工程量清单", "发包人要求", "投标文件格式"], "ans": [2], "exp": "施工招标文件包括下列内容：招标公告或投标邀请书；投标人须知；评标办法：合同条款及格式；工程量清单；图纸；技术标准和要求；投标文件格式；投标人须知前附表规定的其他材料。此外，招标人对招标文件所作的澄清、修改，也构成招标文件的组成部分。"}, {"id": 254, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "工程总承包投标人投标报价的工作内容包括：①确定最终报价；②测算工程成本；③研读评标办法；④投标报价检查。下列排序中正确的是（　　）。", "opts": ["①②③④", "③①②④", "③②④①", "③②①④"], "ans": [3], "exp": "工程总承包投标人可按下列程序确定投标报价：①研读评标办法；②测算工程成本；③确定最终报价；④投标报价检查。"}, {"id": 255, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列选项中，不属于公开招标优点的是（　　）。", "opts": ["不需要发布招标公告和设置资格预审程序", "招标人可在较广范围内选择承包商", "有利于招标人将工程项目交予可靠的承包商实施", "较大程度上避免招标过程中的贿标行为"], "ans": [0], "exp": "采用公开招标方式的优点是，招标人可在较广范围内选择承包商，投标竞争激烈，有利于招标人将工程项目交予可靠的承包商实施，并获得有竞争性的报价。同时，也可在较大程度上避免招标过程中的贿标行为。"}, {"id": 256, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《招标投标法实施条例》，潜在投标人或者其他利害关系人对资格预审文件有异议，应当在提交资格预审申请文件截止时间（　　）日前提出。", "opts": ["3", "5", "7", "2"], "ans": [3], "exp": "潜在投标人或者其他利害关系人对资格预审文件有异议的，应在提交资格预审申请文件截止时间2日前向招标人提出。招标人应自收到异议之日起3日内作出答复。作出答复前，应暂停招标投标活动。"}, {"id": 257, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列选项中，不属于施工投标文件的是（　　）。", "opts": ["技术标书", "商务标书", "施工方案", "投标函及其他有关文件"], "ans": [2], "exp": "施工投标文件通常包括技术标书、商务标书、投标函及其他有关文件三部分内容。"}, {"id": 258, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "国家发展改革委等九部委发布的《简明标准施工招标文件》，适用于工期不超过（　　）个月，技术相对简单且设计和施工不是由同一承包人承担的小型项目施工招标。", "opts": ["6", "12", "18", "24"], "ans": [1], "exp": "针对工期不超过12个月、技术相对简单且设计和施工不是由同一承包人承担的小型项目施工招标，九部委还联合发布了《简明标准施工招标文件》。"}, {"id": 259, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "某工程施工招标时，评标委员会成员拟由9人组成，根据《招标投标法》，其中技术、经济等方面的专家应不少于（　　）人。", "opts": ["4", "5", "6", "7"], "ans": [2], "exp": "评标委员会由招标人代表及有关技术、经济等方面的专家组成，成员人数为5人以上单数，其中技术、经济等方面的专家不得少于成员总数的2/3。9×2/3=6人。"}, {"id": 260, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "公式调价法中，各项加权系数之和应等于（　　）。", "opts": ["0", "0.5", "100", "1"], "ans": [3], "exp": "各项加权系数之和应等于1。"}, {"id": 261, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《招标投标法》，下列关于招标的说法中，错误的是（　　）。", "opts": ["招标方式分为公开招标和邀请招标", "履行审批手续的项目不一定需要招标", "依法必须进行招标的项目，其招标范围、招标方式、招标组织形式应报项目审批、核准部门审批、核准", "依法进行招标的项目必须委托招标"], "ans": [3], "exp": "建设单位具有与招标项目规模和复杂程度相适应的技术、经济等方面的专业人员，具有编制招标文件和组织评标的能力的，可以自行组织招标。建设单位不具备自行组织招标的能力条件的，应委托能够编制招标文件和组织评标的相应专业力量办理招标事宜。"}, {"id": 262, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "某招标项目，招标人在原定投标截止之日前10天发出最后一份书面澄清文件，且该文件内容可能影响投标文件编制则此时投标截止时间至少延长（　　）天。", "opts": ["5", "10", "15", "20"], "ans": [0], "exp": "根据《中华人民共和国招标投标法实施条例》，招标人对招标文件进行澄清或者修改的内容可能影响投标文件编制的，招标人应在投标截止时间至少15日前，以书面形式通知所有获取招标文件的潜在投标人；不足15日的，招标人应顺延提交投标文件的截止时间。本题中，招标人在原定投标截止之日前10天发出最后一份书面答疑文件，此时投标截止时间至少延长15-10=5（天）。"}, {"id": 263, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "招标项目设有标底的，标底应当在（　　）时公布。", "opts": ["公布招标公告", "发售招标文件", "开标", "评标"], "ans": [2], "exp": "若招标项目设有标底，应当在开标时公布。"}, {"id": 264, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "关于建设工程招标管理中邀请招标的叙述，有误的是（　　）。", "opts": ["邀请对象的数目不应少于5家", "邀请对象的数目以5～10家为宜", "邀请招标的优点是节约招标费用和节省时间", "邀请招标的投标竞争的激烈程度相对较小"], "ans": [0], "exp": "邀请对象以5～10家为宜，但不应少于3家。邀请招标的优点是，不需要发布招标公告和设置资格预审程序，可节约招标费用、缩短招标时间；邀请招标的缺点是，由于邀请对象的选择面窄、范围较小，有可能会排除某些在技术上或报价上有竞争力的潜在投标人，因而使投标竞争的激烈程度相对较差，进而会提高中标合同价。"}, {"id": 265, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "潜在投标人应严格按照（　　）要求的格式和内容，编制、装订、密封资格预审申请文件，并加写标记和加盖申请人单位章，按照规定的时间、地点、方式递交。", "opts": ["资格审查委员会", "资格预审公告", "资格预审审查报告", "资格预审文件"], "ans": [3], "exp": "潜在投标人应严格按照资格预审文件要求的格式和内容，编制、装订、密封资格预审申请文件，并加写标记和加盖申请人单位章，按照规定的时间、地点、方式递交。"}, {"id": 266, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "工程建设单位自行办理招标事宜，须具备（　　）和组织评标的能力。", "opts": ["编制招标文件", "委托招标代理机构", "编制招标标底", "编制招标公告"], "ans": [0], "exp": "建设单位具有与招标项目规模和复杂程度相适应的技术、经济等方面的专业人员，具有编制招标文件和组织评标的能力的，可自行组织招标。"}, {"id": 267, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "对工程项目招标人而言，与邀请招标相比，公开招标的优点是（　　）。", "opts": ["评标的工作量大", "选择承包商范围广", "评标时间长", "招标费用高"], "ans": [1], "exp": "采用公开招标方式的优点是，招标人可在较广范围内选择承包商，投标竞争激烈，有利于招标人将工程项目交予可靠的承包商实施，并获得有竞争性的报价。同时，也可在较大程度上避免招标过程中的贿标行为。但其缺点是，准备招标、对投标申请者进行资格预审和评标的工作量大，招标时间长、费用高。"}, {"id": 268, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "关于评标委员会组成的说法，正确的是（　　）。", "opts": ["招标人代表1人，专家3人", "招标人代表2人，专家5人", "招标人代表2人，专家4人", "招标人代表2人，专家3人"], "ans": [1], "exp": "评标委员会由招标人代表及有关技术、经济等方面的专家组成，成员人数为5人以上单数，其中技术、经济等方面的专家不得少于成员总数的2/3。"}, {"id": 269, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "工程施工招标，开标过程中，检查投标文件的密封情况的下一程序是（　　）。", "opts": ["确定并宣布投标文件开标顺序", "宣布开标人、唱标人、记录人、监标人等有关人员姓名", "投标人代表、招标人代表、监标人、记录人等有关人员在开标记录上签字确认", "公布在投标截止时间前递交投标文件的投标人名称，并点名确认投标人是否派人到场"], "ans": [0], "exp": "主持人按下列程序进行开标：（1）宣布开标纪律；（2）公布在投标截止时间前递交投标文件的投标人名称，并点名确认投标人是否派人到场；（3）宣布开标人、唱标人、记录人、监标人等有关人员姓名；（4）按照投标人须知前附表规定检查投标文件的密封情况；（5）按照投标人须知前附表的规定确定并宣布投标文件开标顺序；（6）设有标底的，公布标底；（7）按照宣布的开标顺序当众开标，公布投标人名称、标段名称、投标保证金的递交情况、投标报价、质量目标、工期及其他内容，并记录在案；（8）投标人代表、招标人代表、监标人、记录人等有关人员在开标记录上签字确认；（9）开标结束。"}, {"id": 270, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列选项中，不属于标准资格预审文件的主要内容的是（　　）。", "opts": ["申请人须知", "资格审查方法", "施工组织设计", "资格预审公告"], "ans": [2], "exp": "资格预审文件包括下列内容：资格预审公告；申请人须知；资格审查办法；资格预审申请文件格式。"}, {"id": 271, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "采用经评审的最低投标价法评标时，（　　）主要考虑单价遗漏、付款条件等评审因素。", "opts": ["初步审查", "详细评审", "形式评审", "响应性评审"], "ans": [1], "exp": "采用经评审的最低投标价法评标时，详细评审主要考虑单价遗漏、付款条件等评审因素。"}, {"id": 272, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "下列关于投标人资格预审方法的说法，正确的有（　　）。", "opts": ["合格制会使投标竞争更加充分，增加招标成本", "有限数量制不能限制投标人数量", "合格制可不用进行初步审查工作", "有限数量制可不用进行初步审查工作", "有限数量制需要对通过审查的资格预审申请文件进行量化打分"], "ans": [0, 4], "exp": "B选项错误，有限数量制可以限制投标人数量，降低招标工作量和费用。CD选项错误，合格制和有限数量制在审查标准上无本质区别，都需要进行初步审查和详细审查。"}, {"id": 273, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "下列关于施工评标的说法，正确的有（　　）。", "opts": ["评标委员会对投标报价的错误予以修正后，可作为投标报价的金额", "已标价工程量清单书写有错误的，投标文件中的大写金额与小写金额不一致时，以小写金额为准", "投标人名称是否与营业执照一致、投标报价是否具有唯一性属于投标文件的形式评审", "已标价工程量清单有计算错误的，总价金额与依据单价计算出的结果不一致时，以总价金额为准", "项目管理机构评审将会从项目经理任职资格与业绩、技术负责人任职资格与业绩、其他主要人员等方面进行评审"], "ans": [2, 4], "exp": "A选项错误，评标委员会对投标报价的错误予以修正后，需请投标人书面确认，作为投标报价的金额。B选项错误，已标价工程量清单书写有错误的，投标文件中的大写金额与小写金额不一致时，以大写金额为准。D选项错误，已标价工程量清单有计算错误的，总价金额与依据单价计算出的结果不一致时，以单价金额为准修正总价，单价金额小数点有明显错误的除外。"}, {"id": 274, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "下列关于施工决标成交的说法，正确的有（　　）。", "opts": ["合同条件的完善包括工期提前奖励和工程延误罚款、保修期限等", "招标人最迟应在书面合同签订后7日内向中标人和未中标的投标人退还投标保证金及银行同期存款利息", "工程内容和范围即属于施工合同“标的”", "合同价款支付包括工程进度款、最终结算价款支付及工程质量保证金的扣留和返还等", "合同谈判准备工作包括分析发包人技术、经济实力及发包人谈判人员的身份、地位等"], "ans": [2, 3, 4], "exp": "A选项错误，合同条件完善包括工期提前奖励和工程延误罚款，但保修期限属于工程保修内容。B选项错误，招标人最迟应在书面合同签订后5日内向中标人和未中标的投标人退还投标保证金及银行同期存款利息。"}, {"id": 275, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "下列关于合同计价方式的说法，正确的有（　　）。", "opts": ["采用可调单价合同时，合同双方可以以实际工程量为基准，约定实际工程量的变化超过一定比例时合同单价的调整方式", "在成本加固定百分比酬金合同中，承包单位可获得的酬金将随着直接成本的增加而递减", "目标成本加奖罚合同随着工程设计的逐步深化，可对工程量和目标成本进行调整", "对于已完成施工图设计的工程，施工图纸和工程量清单详细而明确，可选择总价合同", "在同一工程合同中采用不同的计价方式，是建设单位和承包单位合理分担工程风险的有效办法"], "ans": [2, 3, 4], "exp": "A选项错误，采用可调单价合同时，合同双方可以估算工程量为基准，约定实际工程量的变化超过一定比例时合同单价的调整方式。B选项错误，在成本加固定百分比酬金合同中，承包单位可获得的酬金将随着直接成本的增加而增加。"}, {"id": 276, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "在施工投标报价策略中，可选择报高价的情形的有（　　）。", "opts": ["一般房屋建筑工程", "地下开挖工程", "港口码头", "大量土方工程", "投标对手少的工程"], "ans": [1, 2, 4], "exp": "在施工投标报价策略中，可选择报高价的情形的有：施工条件差的工程（如条件艰苦、场地狭小或地处交通要道等）；专业要求高的技术密集型工程且施工单位在这方面有专长，声望也较高；总价低的小工程，以及施工单位不愿做而被邀请投标，又不便不投标的工程；特殊工程，如港口码头、地下开挖工程等；投标对手少的工程；工期要求紧的工程；支付条件不理想的工程。"}, {"id": 277, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "可调总价合同，合同中约定的合同价款常用的调价方法有（　　）。", "opts": ["文件证明法", "横道图法", "票据价格调整法", "因素分析法", "公式调价法"], "ans": [0, 2, 4], "exp": "可调总价合同常用的调价方法有：文件证明法、票据价格调整法、公式调价法。"}, {"id": 278, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "发包人在选择合同计价方式时，应考虑的因素有（　　）。", "opts": ["工程设计深度", "工期紧迫程度", "工程复杂程度", "质量要求的高低", "技术先进程度"], "ans": [0, 1, 2, 4], "exp": "工程合同采用不同的计价方式，合同双方的义务和责任就不同，各自承担的风险也不尽相同。建设单位通常会综合考虑以下因素来选择合同计价方式：（1）工程复杂程度；（2）工程设计深度；（3）技术先进程度；（4）工期紧迫程度。"}, {"id": 279, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "下列关于单价合同的说法，正确的有（　　）。", "opts": ["单价合同大多用于工期长、技术复杂、实施过程中发生各种不可预见因素较多的大型工程", "单价合同也可分为固定单价合同和可调单价合同", "采用固定单价合同时，无论发生哪些影响价格的因素，都不对合同约定的单价进行调整", "采用可调单价合同时，合同双方可以估算工程量为基准，约定实际工程量的变化超过一定比例时合同单价的调整方式", "承包单位在投标时据以报价的清单工程量为实际工程量"], "ans": [0, 1, 2, 3], "exp": "E选项错误，承包单位在投标时据以报价的清单工程量为估算工程量。"}, {"id": 280, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "能激励承包人努力降低成本或缩短工期的合同形式是（　　）。", "opts": ["单价合同", "成本加固定百分比合同", "成本加固定酬金合同", "成本加浮动酬金合同", "目标成本加奖罚合同"], "ans": [2, 3, 4], "exp": "成本加固定酬金合同不能鼓励施工单位关心降低直接成本，承包单位会关心缩短工期；成本加浮动酬金合同能促使承包单位关心成本降低和缩短工期；目标成本加奖罚合同有利于鼓励承包单位降低成本和缩短工期。"}, {"id": 281, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "施工投标采用不平衡报价法时，可以适当提高报价的项目有（　　）。", "opts": ["经过工程量核算，预计今后工程量会增加的项目，适当提高单价", "设计图纸不明确、估计修改后工程量要增加的，可以提高单价", "能够早日结算的项目（如前期措施费、基础工程、土石方工程等）可以适当提高报价", "招标文件要求投标人对工程量大的项目报“综合单价分析表”，投标时可将单价分析表中的人工费报得高一些", "如果工程分标，则其中肯定要施工的单价可报高些，不一定要施工的则应报低些"], "ans": [0, 1, 2, 3], "exp": "不平衡报价法适用于以下几种情况：①能够早日结算的项目（如前期措施费、基础工程、土石方工程等）可以适当提高报价；后期工程项目（如设备安装、装饰工程等）的报价可适当降低。②经过工程量核算，预计今后工程量会增加的项目，适当提高单价；而对于将来工程量有可能减少的项目，适当降低单价。③设计图纸不明确、估计修改后工程量要增加的，可以提高单价；而工程内容说明不清楚的，则可降低一些单价，在工程实施阶段通过索赔再寻求提高单价的机会。④对暂定项目要作具体分析。因这一类项目要在开工后由建设单位研究决定是否实施，以及由哪一家承包单位实施。如果工程不分标，不会另由一家承包单位施工，则其中肯定要施工的单价可报高些，不一定要施工的则应报低些。如果工程分标，该暂定项目也可能由其他承包单位施工时，则不宜报高价，以免抬高总报价。⑤单价与包干混合制合同中，招标人要求有些项目采用包干报价时，宜报高价。一来这类项目多半有风险，二来这类项目在完成后可全部按报价结算。对于其余单价项目，则可适当降低报价。⑥有时招标文件要求投标人对工程量大的项目报“综合单价分析表”，投标时可将单价分析表中的人工费及机械设备费报得高一些，而材料费报得低一些。"}, {"id": 282, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "对于允许多方案报价的施工招标项目，投标人宜采用多方案报价法进行报价的情形有（    ）。", "opts": ["设计文件完整清晰", "招标工程范围不明确", "招标文件条款不清楚", "技术规范要求过于苛刻", "投标时间紧迫"], "ans": [1, 2, 3], "exp": "多方案报价法适用于招标文件中的工程范围不明确，条款不清楚或不公正，或技术规范要求过于苛刻的工程。"}, {"id": 283, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》，下列合同文件中拥有最优先解释权的是（　　）。", "opts": ["通用合同条款", "投标函及其附录", "技术标准和要求", "中标通知书"], "ans": [3], "exp": "组成施工合同的各项文件应互相解释，互为说明。除专用合同条款另有约定外，解释合同文件的优先顺序如下：①合同协议书；②中标通知书；③投标函及投标函附录；④专用合同条款；⑤通用合同条款；⑥技术标准和要求；⑦图纸；⑧已标价工程量清单；⑨其他合同文件。"}, {"id": 284, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "监理人应于开工日期（　　）天前向承包人发出开工通知书。", "opts": ["7", "10", "14", "28"], "ans": [0], "exp": "监理人征得发包人同意后，应在开工日期7天前向承包人发出开工通知，合同工期自开工通知中载明的开工日期计算。"}, {"id": 285, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》，工程接收证书颁发时尚有部分未竣工工程的，（　　）应负责未竣工工程的照管和维护工作。", "opts": ["发包人", "监理人", "承包人", "物业公司"], "ans": [2], "exp": "工程接收证书颁发前，承包人应负责照管和维护工程。工程接收证书颁发时尚有部分未竣工工程的，承包人还应负责未竣工工程的照管和维护工作，直至竣工后移交给发包人为止。"}, {"id": 286, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》中的通用合同条款，关于变更指示发出主体的说法，正确的是（　　）。", "opts": ["可以由发包人发出", "只能由监理人发出", "可以由承包人发出", "只能由发包人发出"], "ans": [1], "exp": "在合同履行过程中，经发包人同意，监理人可按合同约定的变更程序向承包人作出变更指示，承包人应遵照执行。没有监理人的变更指示，承包人不得擅自变更。变更指示只能由监理人发出。"}, {"id": 287, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》，承包人自检确认的工程隐蔽部位具备覆盖条件后，监理人未按与承包人约定的时间进行检查且没有其他指示，承包人正确的做法是（　　）。", "opts": ["自行完成覆盖工作，并拒绝监理人重新检查的要求", "自行完成覆盖工作，并将相应记录报送监理人签字确认", "自行完成覆盖工作，并向监理人进行索赔", "报告政府质量监督机构后自行完成覆盖工作"], "ans": [1], "exp": "监理人未按合同约定的时间进行检查的，除监理人另有指示外，承包人可自行完成覆盖工作，并作相应记录报送监理人，监理人应签字确认。监理人事后对检查记录有疑问的，可按合同约定重新检查。"}, {"id": 288, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》，关于承包人提出索赔期限的说法，正确的是（　　）。", "opts": ["按照合同约定接收竣工付款证书后，仍有权提出工程接收证书颁发前发生的索赔", "按照合同约定接收竣工验收证书后，无权提出工程接收证书颁发后发生的索赔", "按照合同约定提交的最终结清申请书中，只限于提出工程接收证书颁发前发生的索赔", "按照合同约定提交的最终结清申请书中，只限于提出工程接收证书颁发后发生的索赔"], "ans": [3], "exp": "选项A、B错误，承包人按合同约定接受了竣工付款证书后，应被认为已无权再提出在合同工程接收证书颁发前所发生的任何索赔。选项C错误，承包人按合同约定提交的最终结清申请单中，只限于提出工程接收证书颁发后发生的索赔。提出索赔的期限自接受最终结清证书时终止。"}, {"id": 289, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准设计施工总承包招标文件》，设计施工总承包合同文件不包括（　　）。", "opts": ["价格清单", "工程量清单", "发包人要求", "承包人建议书"], "ans": [1], "exp": "设计施工总承包合同文件包括：合同协议书、中标通知书、投标函及投标函附录、专用合同条款、通用合同条款、发包人要求、承包人建议书、价格清单及组成设计施工总承包合同的其他文件。与施工合同不同的是，设计施工总承包合同增加了发包人要求和承包人建议书两项内容，并将已标价工程量清单调整为价格清单。"}, {"id": 290, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准设计施工总承包招标文件》，由于发包人要求中引用的原始数据和资料存在错误造成的损失，下列说法正确的是（　　）。", "opts": ["承包人复核未发现此错误，应由承包人承担", "承包人复核时发现此错误，并向发包人提出，由承包人承担", "承包人复核时发现此错误，但未向发包人提出，由承包人承担", "无论承包人复核时发现与否，均由发包人承担"], "ans": [3], "exp": "无论承包人复核时发现与否，由于以下资料的错误，导致承包人增加费用和（或）延误工期的，均由发包人承担，并向承包人支付合理利润：①发包人要求中引用的原始数据和资料；②对工程或其任何部分的功能要求；③对工程的工艺安排或要求；④试验和检验标准；⑤除合同另有约定外，承包人无法核实的数据和资料。"}, {"id": 291, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准设计施工总承包招标文件》，自监理人收到承包人的设计文件之日起，对承包人的设计文件审查期限不超过（　　）天。", "opts": ["7", "14", "21", "28"], "ans": [2], "exp": "自监理人收到承包人的设计文件之日起，对承包人的设计文件审查期限不超过21天。"}, {"id": 292, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准设计施工总承包招标文件》，下列关于竣工验收的说法，正确的是（　　）。", "opts": ["承包人应提前14天将申请竣工试验的通知送达监理人", "发包人在全部工程竣工前，使用已接收的区段工程导致承包人费用增加的，发包人承担因此增加的费用和（或）工期延误，并支付承包人合理利润", "在施工期运行中发现工程存在缺陷的，发包人应在缺陷责任期内对已交付使用的工程承担缺陷责任", "缺陷责任期内，承包人对已接收使用的工程负责日常维护工作"], "ans": [1], "exp": "A选项错误，承包人应提前21天将申请竣工试验的通知送达监理人，并按照专用合同条款约定的份数，向监理人提交竣工记录、暂行操作和维修手册。C选项错误，在施工期运行中发现工程或工程设备损坏或存在缺陷的，承包人应在缺陷责任期内对已交付使用的工程承担缺陷责任。D选项错误，缺陷责任期内，发包人对已接收使用的工程负责日常维护工作。"}, {"id": 293, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《建设工程施工专业分包合同（示范文本）》，关于发包人、承包人和分包人关系的说法，正确的是（　　）。", "opts": ["发包人向分包人提供具备施工条件的施工场地", "就分包范围内的有关工作，承包人随时可以向分包人发出指令", "分包人可直接致电发包人或监理人", "分包合同价款与总承包合同相应部分价款存在连带关系"], "ans": [1], "exp": "A选项错误，承包人向分包人提供具备施工条件的施工场地。C选项错误，未经承包人允许，分包人不得以任何理由与发包人或监理人发生直接工作联系，分包人不得直接致函发包人或项目监理机构，也不得直接接受发包人或监理人的指令。D选项错误，分包合同价款与总承包合同相应部分价款无任何连带关系。"}, {"id": 294, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列合同规定的相关义务中，属于劳务分包人义务的是（　　）。", "opts": ["组建项目管理班子", "负责编制施工组织设计", "负责工程测量定位和沉降观测", "完成施工计划相应的劳动力安排计划"], "ans": [3], "exp": "选项A、B、C属于工程承包人的主要义务。劳务分包人根据施工组织设计总进度计划的要求，每月底前提交下月施工计划，有阶段工期要求的提交阶段施工计划，必要时按工程承包人要求提交旬、周施工计划，以及与完成上述阶段、时段施工计划相应的劳动力安排计划，经工程承包人批准后严格实施。"}, {"id": 295, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《建设工程施工劳务分包合同（示范文本）》，下列关于保险的说法，正确的是（　　）。", "opts": ["劳务分包人必须为从事危险作业的职工办理意外伤害保险并支付保险费用", "运至施工现场用于劳务施工的材料，由劳务分包人办理保险并支付保险费用", "工程承包人提供给劳务分包人使用的设备由劳务分包人办理保险，并支付保险费用", "劳务分包人开始施工前，应由发包人为施工现场所有人员办理保险，由劳务分包人支付费用"], "ans": [0], "exp": "劳务分包人施工开始前，工程承包人应获得发包人为施工场地内的自有人员及第三人人员生命财产办理的保险，且不需劳务分包人支付保险费用。运至施工场地用于劳务施工的材料和待安装设备，由工程承包人办理或获得保险，且不需劳务分包人支付保险费用。此外，工程承包人还必须为租赁或提供给劳务分包人使用的施工机械设备办理保险，并支付保险费用，并应在劳务分包合同中约定工程承包人自行投保的范围（内容）。劳务分包人必须为从事危险作业的职工办理意外伤害保险，并为施工场地内自有人员生命财产和施工机械设备办理保险，支付保险费用。"}, {"id": 296, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《建设工程施工劳务分包合同（示范文本）》，全部分包工作完成，经工程承包人认可后（　　）日内，劳务分包人向工程承包人递交完整的结算资料，按照合同约定进行劳务报酬的最终支付。", "opts": ["7", "14", "28", "42"], "ans": [1], "exp": "全部工作完成，经工程承包人认可后14天内，劳务分包人向工程承包人递交完整的结算资料，双方按照合同约定的计价方式，进行劳务报酬的最终支付。工程承包人收到劳务分包递交的结算资料后14天内进行核实，给予确认或者提出修改意见。工程承包人确认结算资料后14天内向劳务分包人支付劳务报酬尾款。"}, {"id": 297, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准材料采购招标文件》，除专用合同条款另有约定外，材料采购合同价采用固定价格的，合同供货周期一般不超过（　　）个月。", "opts": ["24", "18", "12", "6"], "ans": [2], "exp": "供货周期不超过12个月的签约合同价通常为固定价格。"}, {"id": 298, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准设备采购招标文件》，买卖双方可约定合同设备的所有权和风险转移的节点为（　　）。", "opts": ["验收合格后", "开箱检验后", "交付时", "安装调试完成后"], "ans": [2], "exp": "合同设备的所有权和风险自交付时起由卖方转移至买方，合同设备交付给买方之前包括运输在内的所有风险均由卖方承担。"}, {"id": 299, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列选项中，不属于发包人主要义务的是（　　）。", "opts": ["发出开工通知", "提供施工场地", "组织设计交底", "查勘施工现场"], "ans": [3], "exp": "发包人主要义务：①发出开工通知；②提供施工场地；③协助承包人办理证件和批件；④组织设计交底；⑤支付合同价款；⑥组织竣工验收。D选项属于承包人义务。"}, {"id": 300, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "为了区分因政策法规变化或市场物价变化对合同价格影响的责任，通用合同条款中将（　　）规定为基准日期。", "opts": ["合同签订日", "投标截止日前第28天", "投标截止日", "合同签订日前第28天"], "ans": [1], "exp": "通用合同条款中将投标截止日前第28天规定为基准日期。"}, {"id": 301, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "无论是由承包人还是发包人办理工程一切险和第三者责任保险，均必须以（　　）名义投保，以保障双方均有出现保险范围内的损失时，可从保险公司获得赔偿。", "opts": ["发包人名义", "承包人名义", "监理人名义", "发包人和承包人的共同名义"], "ans": [3], "exp": "无论是由承包人还是发包人办理工程险和第三者责任保险，均必须以发包人和承包人的共同名义投保，以保障双方均有出现保险范围内的损失时，可从保险公司获得赔偿。"}, {"id": 302, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列工程保险的险种中，不是承包人负责投保的是（　　）。", "opts": ["建筑工程一切险", "安装工程一切险", "第三者责任保险", "职业责任险"], "ans": [3], "exp": "考虑到承包人是工程施工的最直接责任人，通用合同条款因此规定，由承包人负责投保“建筑工程一切险”“安装工程一切险”和“第三者责任保险”，并承担办理保险的费用。"}, {"id": 303, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列选项中，承包人有权要求发包人延长工期和（或）增加费用，并支付合理利润的是（　　）。", "opts": ["监理人未按合同约定发出指示、指示延误或指示错误", "采取合同未约定的安全作业环境及安全施工措施", "承包人遇不利物质条件，监理人未发出指示", "发包人提供图纸延误"], "ans": [3], "exp": ""}, {"id": 304, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》，下列关于暂停施工后复工的说法，错误的是（　　）。", "opts": ["暂停施工后，监理人、发包人、承包人应协商采取有效措施消除影响", "承包人收到复工通知后，应在发包人进行经济补偿后复工", "因发包人原因无法按时复工，发包人应承担由此增加的费用、延误的工期和合理的利润", "承包人无故拖延的，应承担由此增加的费用和延误的工期"], "ans": [1], "exp": "B选项错误，承包人收到复工通知后，应在监理人指定的期限内复工。"}, {"id": 305, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》，下列关于工期调整的说法，错误的是（　　）。", "opts": ["出现合同条款规定的异常恶劣气候导致工期延误，承包人有权要求发包人延长工期", "发包人要求承包人提前竣工的，应承担由此增加的费用，并根据合同条款约定支付奖金", "在合同履行过程中，发包人改变某项工作的质量特性，承包人有权要求延长工期和增加费用，并支付合理利润", "监理人认为承包人的施工进度不能满足合同工期要求，承包人应采取措施，增加费用由发包人承担"], "ans": [3], "exp": "D选项错误，由于承包人原因，未能按合同进度计划完成工作，或监理人认为承包人施工进度不能满足合同工期要求的，承包人应采取措施加快进度，并承担加快进度所增加的费用。"}, {"id": 306, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》，发包人应采纳承包人提出的提前竣工建议而获得效益的（    ）给予承包人奖励。", "opts": ["20%", "10%", "30%", "50%"], "ans": [0], "exp": "专用合同条款使用说明中建议，奖励金额可为发包人实际效益的20%。"}, {"id": 307, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》，承包人提出索赔并接受其处理结果的，发包人应在承包人作出索赔处理结果答复后（    ）天完成赔付。", "opts": ["28", "14", "21", "42"], "ans": [0], "exp": "承包人接受索赔处理结果的，发包人应在作出索赔处理结果答复后28天内完成赔付。承包人不接受索赔处理结果的，按合同约定的争议解决办法办理。"}, {"id": 308, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》中的变更估价原则，对于已标价工程量清单中无适用或类似子目的变更工程的单价，应由（　　）商定。", "opts": ["发包人与承包人", "发包人与监理人", "监理人与合同当事人", "监理人与承包人"], "ans": [2], "exp": "已标价工程量清单中无适用或类似子目的单价，可按照成本加利润的原则，由监理人和合同当事人商定或确定变更工作的单价。"}, {"id": 309, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "某招标工程的招标控制价为2.6亿，某投标人报价为2.55亿，经修正计算性错误后以2.45亿的报价中标，则该承包人的报价浮动率为（　　）%。", "opts": ["1.923", "3.922", "5.769", "5.335"], "ans": [2], "exp": "承包人报价浮动率L=（1-中标价/招标控制价）×100%=（1-2.45/2.6）×100%=5.769%。"}, {"id": 310, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》，下列选项中，不属于工程变更范围的有（　　）。", "opts": ["将自行施工的项目分包给专业分包商施工", "为完成工程需要追加的额外工作", "改变合同工程的基线、标高、位置或尺寸", "改变已批准的施工工艺或顺序"], "ans": [0], "exp": "除专用合同条款另有约定外，在履行合同中发生以下情形之一，应进行变更：①取消合同中任何一项工作，但被取消的工作不能转由发包人或其他人实施；②改变合同中任何一项工作的质量或其他特性；③改变合同工程的基线、标高、位置或尺寸；④改变合同中任何一项工作的施工时间或改变已批准的施工工艺或顺序；⑤为完成工程需要追加的额外工作。"}, {"id": 311, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》，除专用合同条款另有约定外，经验收合格工程的实际竣工日期以（　　）为准。", "opts": ["工程验收合格的日期", "颁发竣工验收证书的日期", "将合格工程移交给发包人的日期", "提交竣工验收申请报告的日期"], "ans": [3], "exp": "根据《标准施工招标文件》，除专用合同条款另有约定外，经验收合格工程的实际竣工日期，以提交竣工验收申请报告的日期为准。"}, {"id": 312, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》通用条款，除专用条款另有约定外，下列关于承包人主要义务的说法，正确的是（　　）。", "opts": ["承包人应测设并审批施工控制网", "承包人应负责取得为工程建设所需修建场外设施的权利", "承包人在签订合同协议书后，应对施工场地和周围环境进行查勘", "承包人应按合同约定及时组织竣工验收"], "ans": [2], "exp": "选项A错误，承包人应将施工控制网点的资料报送监理人审批。选项B错误，发包人负责取得为工程建设所需修建场外设施的权利。选项D错误，发包人应按合同约定及时组织竣工验收。"}, {"id": 313, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》通用条款，监理人的职责是（　　）。", "opts": ["要求承包人对不满足合同要求的实施方案进行修改", "征得发包人同意后，在开工日期14天前向承包人发出开工通知", "按合同约定，组织工程竣工验收", "工程接收证书颁发前，负责照管和维护工程"], "ans": [0], "exp": "选项B错误，监理人应在开工日期7天前向承包人发出开工通知。选项C错误，监理人应按合同约定组织工程竣工预验收。选项D错误，工程接收证书颁发前，承包人应负责照管和维护工程。"}, {"id": 314, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列关于《标准施工招标文件》对进度计划审批及修订规定的说法，正确的是（　　）。", "opts": ["经监理人批准的施工进度计划称为最终进度计划", "施工进度计划是控制合同工程进度的依据", "监理人可以直接向承包人作出修订合同进度计划的指示", "承包人应按监理人指示修订合同进度计划，报监理人审批，监理人应在专用合同条款约定的期限内自行批复"], "ans": [2], "exp": "选项A、B错误，经监理人批准的施工进度计划称为合同进度计划，是控制合同工程进度的依据。选项D错误，监理人应在批复前获得发包人同意。"}, {"id": 315, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列关于某工程按合同约定进行试验和检验的说法，正确的是（　　）。", "opts": ["如有需要，应由发包人负责提供必要的试验资料和原始记录", "监理人未按合同约定派员参加试验和检验的，承包人需会同发包人进行试验和检验", "若监理人对试验和检验结果有疑问，在征得发包人同意后，监理人可以重新试验和检验", "监理人在必要时可以使用承包人的试验场所进行以工程质量检查为目的的复核性材料试验"], "ans": [3], "exp": "选项A错误，应由承包人负责提供必要的试验资料和原始记录。选项B错误，承包人可自行试验和检验。选项C错误，由监理人与承包人共同进行重新检验。"}, {"id": 316, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》，下列关于预付款的说法，正确的是（　　）。", "opts": ["预付款的具体比例通常参照《建设工程工程量清单计价规范》GB50500—2013在通用合同条款中约定", "预付款保函的担保金额可根据预付款扣回的金额相应递减", "发包人应在预付款扣完后的28天内将预付款保函退还给承包人", "包工包料工程的预付款支付比例不得低于签约合同价（扣除暂列金额）的30%"], "ans": [1], "exp": "选项A错误，预付款的具体比例通常参照《建设工程工程量清单计价规范》GB50500—2013在专用合同条款中约定。选项C错误，发包人应在预付款扣完后的14天内将预付款保函退还给承包人。包工包料工程的预付款支付比例不得低于签约合同价（扣除暂列金额）的10%，不得高于30%，选项D错误。"}, {"id": 317, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》，下列关于工程施工时施工安全与环境保护的说法，正确的是（　　）。", "opts": ["承包人应对其履行合同所雇佣的全部人员的工伤事故承担责任", "工程施工过程中发生事故的，承包人应立即通知发包人", "工程施工过程中发生事故，移动事故现场物品时，应做出标记并及时向监理人员口头报告", "施工安全措施计划和应对灾害的紧急预案均应报送建设单位审批"], "ans": [0], "exp": "选项B错误，工程施工过程中发生事故的，承包人应立即通知监理人，监理人应立即通知发包人。选项C错误，需要移动现场物品时，应做出标记和书面记录。选项D错误，施工安全措施计划和应对灾害的紧急预案均应报送监理人审批。"}, {"id": 318, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》，下列关于承包人索赔的说法，正确的是（　　）。", "opts": ["承包人按合同约定接受竣工付款证书，不影响其拥有的提出任何索赔的权利", "承包人接受索赔处理结果的，发包人应在作出索赔处理结果答复后56天内完成赔付", "监理人可在审查索赔通知书时要求承包人提交全部原始记录副本", "承包人提出索赔的期限自缺陷责任期到期时终止"], "ans": [2], "exp": "选项A错误，承包人按合同约定接受了竣工付款证书后，应被认为已无权再提出在合同工程接收证书颁发前所发生的任何索赔。选项B错误，发包人应在作出索赔处理结果答复后28天内完成赔付。选项D错误，提出索赔的期限自接受最终结清证书时终止。"}, {"id": 319, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "某工程发包人和承包人在履行合同过程中发生争议，经核查该合同采用争议评审，下列说法正确的是（　　）。", "opts": ["监理人应及时成立争议评审组", "争议评审组应由有成本管理经验的专家组成", "若承包人不接受评审意见，并要求提交仲裁，应在收到评审意见后的14天内将仲裁意向书面通知监理人", "即使发包人不接受评审意见提起了诉讼，在诉讼结束前也应暂按总监理工程师的规定执行"], "ans": [3], "exp": "选项A错误，发包人和承包人应在开工日后的28天内或在争议发生后，协商成立争议评审组。选项B错误，争议评审组由有合同管理和工程实践经验的专家组成。选项C错误，若承包人不接受评审意见，并要求提交仲裁，应在收到评审意见后的14天内将仲裁或起诉意向书面通知另一方，并抄送监理人。"}, {"id": 320, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "相比于施工合同，设计施工总承包合同（　　）。", "opts": ["增加了发包人要求和承包人建议书的内容", "对施工合同中发包人要求的内容进行了细化", "将已标价工程量清单调整为招标工程量清单", "对发包人要求中的错误进行了说明"], "ans": [0], "exp": "相比于施工合同，设计施工总承包合同增加了发包人要求和承包人建议书两项内容，并将已标价工程量清单调整为价格清单。"}, {"id": 321, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "工程总承包合同订立时，需要明确承包人文件，下列说法正确的是（　　）。", "opts": ["承包人文件中，最主要的是施工文件", "专用合同条款需约定监理人对承包人提交文件应批准的合理期限", "通用合同条款需约定承包人向监理人陆续提供文件的内容", "监理人未在约定的期限内提出否定意见，承包人应书面通知监理人尽快提出意见，以便进行后续工作"], "ans": [1], "exp": "选项A错误，承包人文件中最主要的是设计文件。选项C错误，需在专用合同条款中约定承包人向监理人陆续提供文件的内容。选项D错误，工程实施过程中，监理人未在约定的期限内提出否定意见，视为已获批准，承包人可以继续进行后续工作。"}, {"id": 322, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列关于材料采购合同有关条款的说法，正确的是（　　）。", "opts": ["买方支付预付款后，如卖方未履行合同义务，则买方有权收回预付款", "买方签发收货清单即代表对合同材料的接受", "合同材料运输的运输工具及线路安排应由买方选择", "合同材料交付给买方之前包括运输在内的所有风险均由买方承担"], "ans": [0], "exp": "选项B错误，买方签发收货清单不代表对合同材料的接受，双方还应按合同约定进行后续的检验和验收。选项C错误，卖方应自行选择适宜的运输工具及线路安排合同材料运输。选项D错误，合同材料交付给买方之前包括运输在内的所有风险均由卖方承担。"}, {"id": 323, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列关于设备采购合同的说法，正确的是（　　）。", "opts": ["合同设备交货前，卖方应会同买方代表根据合同约定对合同设备进行交货前检验并出具交货前检验记录，有关费用由买方承担", "买方监造人员在监造中如发现合同设备及其关键部件不符合合同约定的标准，则有权提出意见和建议", "买方监造人员对合同设备的监造以及买方代表参与交货前检验及签署交货前检验记录的行为，视为对合同设备质量的确认", "开箱检验的检验结果可以免除或影响卖方依照合同约定对买方负有的包括合同设备质量在内的任何义务或责任"], "ans": [1], "exp": "选项A错误，合同设备交货前，卖方应会同买方代表根据合同约定对合同设备进行交货前检验并出具交货前检验记录，有关费用由卖方承担。选项C错误，买方监造人员对合同设备的监造以及买方代表参与交货前检验及签署交货前检验记录的行为，不视为对合同设备质量的确认。选项D错误，开箱检验的检验结果不能对抗在合同设备的安装、调试、考核、验收中及质量保证期内发现的合同设备质量问题，也不能免除或影响卖方依照合同约定对买方负有的包括合同设备质量在内的任何义务或责任。"}, {"id": 324, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "某筑坝围海工程完成过半时，遭遇强台风正面登陆，堤坝已完合格部分被摧毁，不得不重新设计，工期延长，其损失应由（　　）承担。", "opts": ["承包人", "发包人", "设计单位", "监理单位"], "ans": [1], "exp": "不可抗力后果的分担原则。除专用合同条款另有约定外，不可抗力导致的人员伤亡、财产损失、费用增加和（或）工期延误等后果，由合同双方按以下原则承担：①永久工程，包括已运至施工场地的材料和工程设备的损害，以及因工程损害造成的第三者人员伤亡和财产损失由发包人承担；②承包人设备的损坏由承包人承担；③发包人和承包人各自承担其人员伤亡和其他财产损失及其相关费用；④承包人的停工损失由承包人承担，但停工期间应监理人要求照管工程和清理、修复工程的金额由发包人承担；⑤不能按期竣工的，应合理延长工期，承包人不需支付逾期竣工违约金。发包人要求赶工的，承包人应采取赶工措施，赶工费用由发包人承担。"}, {"id": 325, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工合同》，采用公式法调价方式考虑市场价格浮动对合同价的影响，仅适用于工程量清单中的（　　）部分。", "opts": ["单价支付", "工程材料费用", "总价支付", "人工费用"], "ans": [0], "exp": "通用条款规定用公式法调价，但仅适用于工程量清单中按单价支付部分的工程款，总价支付部分不考虑物价浮动对合同价格的调整。"}, {"id": 326, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》，由于发包人原因发生暂停施工的紧急情况，承包人可先暂停施工并向监理人提出暂停施工的书面请求。监理人应在收到承包人书面请求后的（　　）内给予答复。", "opts": ["5日", "48小时", "3日", "24小时"], "ans": [3], "exp": "由于发包人的原因发生暂停施工的紧急情况且监理人未及时下达暂停施工指示，承包人可先暂停施工，并及时向监理人提出暂停施工的书面请求。监理人应在接到书面请求后的24小时内予以答复，逾期未答复的，视为同意承包人的暂停施工请求。"}, {"id": 327, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "分包人应在约定情况发生后（　　）天内就延误的工期以书面形式向承包人提出报告。承包人在收到报告后（　　）天内予以确认，逾期不予确认也不提出修改意见，视为同意顺延工期。", "opts": ["7，7", "14，28", "14，14", "7，14"], "ans": [2], "exp": "分包人应在上述约定情况发生后14天内，就延误的工期以书面形式向承包人提出报告。承包人在收到报告后14天内予以确认，逾期不予确认也不提出修改意见，视为同意顺延工期。"}, {"id": 328, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工合同》，当中标通知书、图纸和专用合同条款出现含义或内容矛盾时，合同文件的优先解释的顺序是（　　）。", "opts": ["图纸→专用合同条款→中标通知书", "图纸→中标通知书→专用合同条款", "中标通知书→图纸→专用合同条款", "中标通知书→专用合同条款→图纸"], "ans": [3], "exp": "除专用合同条款另有约定外，解释合同文件的优先顺序如下：①合同协议书；②中标通知书；③投标函及投标函附录；④专用合同条款；⑤通用合同条款；⑥技术标准和要求；⑦图纸；⑧已标价工程量清单；⑨其他合同文件。"}, {"id": 329, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工合同》，施工合同文件包括（　　）。", "opts": ["招标文件", "投标函及投标函附录", "委托监理协议书", "投标企业定额标准"], "ans": [1], "exp": "施工合同文件包括：合同协议书、中标通知书、投标函及投标函附录、专用合同条款、通用合同条款、技术标准和要求、图纸、已标价工程量清单及组成施工合同的其他文件。"}, {"id": 330, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "施工合同履行期间市场价格浮动对施工成本造成影响时，是否允许调整合同价格要视（　　）来决定。", "opts": ["合同工期长短", "材料价格浮动幅度", "合同计价方式", "劳动力价格浮动幅度"], "ans": [0], "exp": "合同履行期间市场价格浮动对施工成本造成的影响是否允许调整合同价格，要视合同工期的长短决定。"}, {"id": 331, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "在下列合同文件中，（　　）具有优先的解释效力。", "opts": ["施工合同协议书", "施工合同通用条款", "施工合同专用条款", "图纸"], "ans": [0], "exp": "除专用合同条款另有约定外，解释合同文件的优先顺序如下：①合同协议书；②中标通知书；③投标函及投标函附录；④专用合同条款；⑤通用合同条款；⑥技术标准和要求；⑦图纸；⑧已标价工程量清单；⑨其他合同文件。"}, {"id": 332, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工合同》，合同工期应自（　　）载明的开工日起计算。", "opts": ["发包人发出的中标通知书", "监理人发出的开工通知", "合同双方签订的合同协议书", "监理人批准的施工进度计划"], "ans": [1], "exp": "监理人征得发包人同意后，应在开工日期7天前向承包人发出开工通知，合同工期自开工通知中载明的开工日起计算。"}, {"id": 333, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工合同》，设计交底应由（　　）组织。", "opts": ["设计人", "监理人", "发包人", "总承包人"], "ans": [2], "exp": "发包人应根据合同进度计划，组织设计单位向承包人和监理人对提供的施工图纸和设计文件进行交底，以便承包人制定施工方案和编制施工组织设计。"}, {"id": 334, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "（　　）应负责修建、维修、养护和管理施工所需的临时道路。", "opts": ["发包人", "承包人", "监理人", "工程师"], "ans": [1], "exp": "承包人应负责修建、维修、养护和管理施工所需的临时道路，以及为开始施工所需的临时工程和必要的设施，满足开工的要求。"}, {"id": 335, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "（　　）对承包人报送的施工组织设计、质量管理体系、环境保护措施进行审查。", "opts": ["发包人", "分包人", "监理人", "工程师"], "ans": [2], "exp": "监理人应审查承包人报送的施工组织设计、施工进度计划、（专项）施工方案、质量管理体系、安全生产管理体系、环境保护措施等，批准或要求承包人对不满足合同要求的部分进行修改。"}, {"id": 336, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据国家测绘基础、测绘系统和工程测量技术规范以及合同中对工程精度的要求，（　　）负责测设施工控制网。", "opts": ["承包人", "发包人", "监理人", "勘察人"], "ans": [0], "exp": "承包人依据监理人提供的测量基准点、基准线和水准点及其书面资料，根据国家测绘基准、测绘系统和工程测量技术规范以及合同中对工程精度的要求，测设施工控制网，并将施工控制网点的资料报送监理人审批。"}, {"id": 337, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "按照《建设工程施工合同》规定，（　　）在施工过程中负责管理施工控制网点。", "opts": ["承包人", "发包人", "监理人", "勘察人"], "ans": [0], "exp": "承包人在施工过程中负责管理施工控制网点，对丢失或损坏的施工控制网点应及时修复，并在工程竣工后将施工控制网点移交发包人。"}, {"id": 338, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《施工合同标准文本》的规定，施工工期在12个月以上的工程，由于市场价格浮动对合同价格的影响，此风险应由（　　）。", "opts": ["发包人承担", "承包人承担", "由发包人和承包人分担", "发包人和承包人均不承担"], "ans": [2], "exp": "适用于工期在12个月以内的简明施工合同通用条款没有调价条款，承包人应在投标报价中合理考虑市场价格变化对施工成本的影响。工期12个月以上的施工合同，由于承包人在投标阶段不可能合理预测一年以后的市场价格变化，因此应设有调价条款，由发包人和承包人共同分担市场价格变化的风险。"}, {"id": 339, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "某施工合同约定钢材由发包人供应，但钢材到货时发包人与监理工程师都没有通知承包人验收，供应商就将钢材卸货于施工现场。在使用前发现钢材数量出现较大短缺，这一钢材损失应由（　　）承担。", "opts": ["承包人", "钢材供应商", "监理单位", "发包人"], "ans": [3], "exp": "发包人提供的材料和工程设备的规格、数量或质量不符合合同要求，或由于发包人原因发生交货日期延误及交货地点变更等情况时，发包人应承担由此增加的费用和（或）工期延误，并向承包人支付合理利润。"}, {"id": 340, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "某基础工程施工过程中，承包人未通知工程师检查即自行隐蔽，后又遵照工程师的指示进行剥露检验，经与工程师共同检验，确认该隐蔽工程的施工质量满足合同要求。下列关于处理此事件的说法中，正确的是（　　）。", "opts": ["给承包人顺延工期并追加合同价款", "给承包人顺延工期，但不追加合同价款", "给承包人追加合同价款，但不顺延工期", "工期延误和费用损失均由承包人承担"], "ans": [3], "exp": "承包人未通知监理人到场检查，私自将工程隐蔽部位覆盖的，监理人有权指示承包人钻孔探测或揭开检查，由此增加的费用和（或）工期延误由承包人承担。"}, {"id": 341, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "施工合同履行中，某隐蔽工程经监理工程师检验后进行了隐蔽。之后监理工程师又要求对已隐蔽的工程重新进行检验。检验结果表明该隐蔽工程的施工质量合格，则（　　）。", "opts": ["发包人承担全部费用，工期相应顺延", "发包人承担全部费用，工期不予顺延", "承包人承担全部费用，工期不予顺延", "承包人承担全部费用，工期相应顺延"], "ans": [0], "exp": "监理人对已覆盖的隐蔽工程部位质量有疑问的，可要求承包人对已覆盖的部位进行钻孔探测或揭开重新检查，承包人应遵照执行，并在检验后重新覆盖恢复原状。经检验证明工程质量符合合同要求的，由发包人承担由此增加的费用和（或）工期延误，并支付承包人合理利润；经检验证明工程质量不符合合同要求，由此增加的费用和（或）工期延误由承包人承担。"}, {"id": 342, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "工程施工过程中，对于变更工作的单价在已标价工程量清单中无法适用或类似子目时，应由监理人按照（　　）的原则商定或确定。", "opts": ["成本加酬金", "成本加利润", "成本加规费", "直接成本加间接成本"], "ans": [1], "exp": "除专用合同条款另有约定外，因变更引起的价格调整按以下原则处理：（1）已标价工程量清单中有适用于变更工作的子目，采用该子目的单价；（2）已标价工程量清单中无适用于变更工作的子目，但有类似子目的，可在合理范围内参照类似子目的单价，由监理人和合同当事人商定或确定变更工作的单价；（3）已标价工程量清单中无适用或类似子目的单价，可按照成本加利润的原则，由监理人和合同当事人商定或确定变更工作的单价。"}, {"id": 343, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "施工合同履行过程中，因工程所在地发生洪灾所造成的损失中，应由承包人承担的是（　　）。", "opts": ["工程本身的损害", "因工程损害导致的第三方财产损失", "承包人的施工机械损坏", "工程所需清理费用"], "ans": [2], "exp": "除专用合同条款另有约定外，不可抗力导致的人员伤亡、财产损失、费用增加和（或）工期延误等后果，由合同双方按以下原则承担：（1）永久工程，包括已运至施工场地的材料和工程设备的损害，以及因工程损害造成的第三者人员伤亡和财产损失由发包人承担；（2）承包人设备的损坏由承包人承担；（3）承包人的停工损失由承包人承担，但停工期间应监理人要求照管工程和清理、修复工程的金额由发包人承担；（4）停工损失由承包人承担，但停工期间应监理人要求照管工程和清理、修复工程的金额由发包人承担；（5）不能按期竣工的，应合理延长工期，承包人不需支付逾期竣工违约金。发包人要求赶工的，承包人应采取赶工措施，赶工费用由发包人承担。"}, {"id": 344, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工合同》，承包人向监理人递交索赔意向通知书的时效是（　　）天。", "opts": ["7", "14", "28", "30"], "ans": [2], "exp": "承包人应在知道或应当知道索赔事件发生后28天内，向监理人递交索赔意向通知书，并说明发生索赔事件的事由。承包人未在前述28天内发出索赔意向通知书的，丧失要求追加付款和（或）延长工期的权利。"}, {"id": 345, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《建设工程施工合同（示范文本）》，下列关于承包人提交索赔意向通知的说法中，正确的是（　　）。", "opts": ["承包人应向业主提交索赔意向通知", "承包人应向监理人提交索赔意向通知", "承包人提交索赔意向通知没有期限限制", "承包人不提交索赔意向通知不会导致索赔权利的丧失"], "ans": [1], "exp": "承包人应在知道或应当知道索赔事件发生后28天内，向监理人递交索赔意向通知书，并说明发生索赔事件的事由。承包人未在前述28天内发出索赔意向通知书的，丧失要求追加付款和（或）延长工期的权利。"}, {"id": 346, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "在建设工程施工合同履行中，监理人接到承包人的变更工程价款报告，确认承包人要求的时限为（　　）。", "opts": ["48小时", "3天", "7天", "14天"], "ans": [3], "exp": "除专用合同条款对期限另有约定外，承包人应在收到变更指示或变更意向书后的14天内，向监理人提交变更报价书。监理人收到承包人变更报价书后的14天内，按照合同约定的估价原则与合同当事人商定或确定变更价格。"}, {"id": 347, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列关于不可抗力的说法中不正确的是（　　）。", "opts": ["不可抗力，是指合同当事人不能预见、不能避免并不能克服的客观情况", "不可抗力事件结束后48h内，劳务分包人向工程承包人项目经理通报受害情况、损失情况及预计清理和修复的费用", "不可抗力事件持续发生，劳务分包人应每隔7天向工程承包人项目经理通报一次受害情况", "因不可抗力事件导致工作时间延误的，不可相应顺延时间"], "ans": [3], "exp": "因不可抗力事件导致工作时间延误的，应相应顺延时间。"}, {"id": 348, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "工期（　　）个月以上的施工合同，由于承包人在投标阶段不可能合理预测一年以后的市场价格变化，因此应设有调价条款，由发包人和承包人共同分担市场价格变化的风险。", "opts": ["2", "6", "12", "24"], "ans": [2], "exp": "工期12个月以上的施工合同，由于承包人在投标阶段不可能合理预测一年以后的市场价格变化，因此应设有调价条款，由发包人和承包人共同分担市场价格变化的风险。"}, {"id": 349, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "监理人在收到承包人进度付款申请单以及相应的支持性证明文件后的（　　）天内完成核查。", "opts": ["7", "14", "21", "28"], "ans": [1], "exp": "监理人在收到承包人进度付款申请单以及相应的支持性证明文件后的14天内完成核查，提出发包人到期应支付给承包人的金额以及相应的支持性材料。经发包人审查同意后，由监理人向承包人出具经发包人签认的进度付款证书。"}, {"id": 350, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "施工合同履行过程中对于按计日工计价的变更工作价款支付，应从（    ）中开支。", "opts": ["暂列金额", "工序控制费", "暂估价", "措施项目费"], "ans": [0], "exp": "采用计日工计价的任何一项变更工作，应从暂列金额中支付。"}, {"id": 351, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》，下列施工合同文件解释顺序优先的是（    ）。", "opts": ["合同协议书", "投标函及其附录", "专用合同条款", "通用合同条款"], "ans": [0], "exp": "除专用合同条款另有约定外，解释合同文件的优先顺序如下：①合同协议书；②中标通知书；③投标函及投标函附录；④专用合同条款；⑤通用合同条款；⑥技术标准和要求；⑦图纸；⑧已标价工程量清单；⑨其他合同文件。"}, {"id": 352, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据最高人民法院《关于审理建设工程施工合同纠纷案件适用法律问题的解（一）》，建设工程未经验收，发包人擅自使用的，认定的竣工日期是（    ）。", "opts": ["提交工验收报告", "工程竣工验收合格", "工程完工交付使用", "转移占有建设工程"], "ans": [3], "exp": "实际竣工日期争议解决。当事人对建设工程实际竣工日期有争议的，人民法院应当按照以下情形予以认定：①建设工程经峻工验收合格的，以竣工验收合格之日为竣工日期；②承包人已经提交峻工验收报告，发包人拖延验收的，以承包人提交验收报告之日为竣工日期；③建设工程未经竣工验收，发包人擅自使用的，以转移占有建设工程之日为竣工日期。"}, {"id": 353, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《建设工程施工专业分包合同（示范文本）》，分包人与发包人或监理人发生直接工作联系的，将被视为（    ）行为。", "opts": ["违约", "授权", "无效", "代理"], "ans": [0], "exp": "如分包人与发包人或监理人发生直接工作联系，将被视为违约，并承担违约责任，赔偿因其违约给承包人造成的经济损失。"}, {"id": 354, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》通用合同条款之规定，发包人应给予承包人工期和费用补偿，但不补偿利润的情形是（    ）。", "opts": ["承包人采取措施保护施工现场文物", "发包人延迟提供施工场地", "承包人因发包人违约暂停施工", "发包人未按合同约定支付进度款"], "ans": [0], "exp": "BCD选项，发包人均需要给予承包人费用工期和利润补偿。根据《标准施工招标文件》，除专用合同条款另有约定外，因工程变更需要调整时，已标价工程量清单中。"}, {"id": 355, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "根据《标准施工招标文件》通用条款，除专用条款另有约定外，发包人的主要义务包括（　　）。", "opts": ["在开工日期7天前向承包人发出开工通知", "向承包人提供施工场地内的地下管线和地下设施等有关资料", "承担运输超大件或超重件所需的道路和桥梁临时加固改造费用和其他有关费用", "组织设计单位向承包人和监理人进行设计交底", "发包人应按合同约定及时组织竣工预验收"], "ans": [1, 3], "exp": "选项A错误，发包人应委托监理人发出开工通知。选项C错误，承担运输超大件或超重件所需的道路和桥梁临时加固改造费用和其他有关费用，应该由承包人承担。选项E错误，发包人组织竣工验收。"}, {"id": 356, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "根据《标准施工招标文件》，关于暂停施工及暂停施工后复工的说法，正确的有（　　）。", "opts": ["暂停施工期间发包人应负责妥善保护工程并提供安全保障", "承包人收到复工通知后，应自行根据施工现场情况复工", "当工程具备复工条件时，监理人应立即向承包人发出复工通知", "若因监理人逾期不予批准承包人提出的继续施工请求影响到整个工程，可视为发包人违约", "若监理人逾期未答复承包人暂停施工的书面请求，视为同意承包人的暂停施工请求"], "ans": [2, 3, 4], "exp": "选项A错误，暂停施工期间承包人应负责妥善保护工程并提供安全保障。选项B错误，承包人收到复工通知后，应在监理人指定的期限内复工。"}, {"id": 357, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "根据《标准施工招标文件》，下列关于工程进度付款的说法，正确的有（　　）。", "opts": ["由发包人向承包人出具签认的进度付款证书", "工程进度款的支付应按期中结算价款总额计，不低于60%，不高于80%", "发包人应在监理人收到进度付款申请单后的28天内，将进度应付款支付给承包人", "发包人不按期支付进度应付款的，按专用合同条款的约定支付逾期付款违约金", "政府机关、事业单位、国有企业建设工程进度款支付应不高于已完成工程价款的80%"], "ans": [2, 3], "exp": "选项A错误，经发包人审查同意后，由监理人向承包人出具经发包人签认的进度付款证书。选项B错误，工程进度款的支付应按期中结算价款总额计，不低于60%，不高于90%。选项E错误，政府机关、事业单位、国有企业建设工程进度款支付应不低于已完成工程价款的80%。"}, {"id": 358, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "根据《标准施工招标文件》，下列关于竣工验收的说法，正确的有（　　）。", "opts": ["竣工验收是承包人主体工程完工后，发包人按合同要求进行的验收", "国家验收是整个工程正式交付投运后，政府有关部门根据法律、规范、规程和政策要求，针对发包人全面组织实施的验收", "发包人验收后不同意接收工程的，承包人在完成不合格工程的返工重做或补救工作后应重新提交竣工验收申请报告", "发包人验收后同意接收工程的，应在监理人收到竣工验收申请报告后的28天内，由监理人向承包人出具经发包人签认的工程接收证书", "已签发单位工程接收证书的单位工程由发包人负责照管"], "ans": [2, 4], "exp": "选项A错误，竣工验收是指承包人完成全部合同工作后，发包人按合同要求进行的验收。选项B错误，国家验收是政府有关部门根据法律、规范、规程和政策要求，针对发包人全面组织实施的整个工程正式交付投运前的验收。选项D错误，监理人收到竣工验收申请报告后的56天内，由监理人向承包人出具经发包人签认的工程接收证书。"}, {"id": 359, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "某永久性生活用房工程因在施工过程中遭遇4级地震导致已运至施工场地的材料和工程设备出现损害，根据《标准施工招标文件》，承包人可以向发包人提出索赔，下列说法正确的有（　　）。", "opts": ["承包人应在事件发生后28天内向监理人递交索赔意向通知书", "若承包人未在规定时间内发出索赔意向通知书，须在7天内尽快递交，并以书面形式说明逾期原因", "地震影响结束后14天内，承包人应向监理人递交最终索赔通知书", "发包人应在作出索赔处理结果答复后42天内完成赔付", "承包人可以向发包人索赔费用"], "ans": [0, 4], "exp": "选项B错误，承包人未在前述28天内发出索赔意向通知书的，丧失要求追加付款和（或）延长工期的权利。选项C错误，地震影响结束后28天内，承包人应向监理人递交最终索赔通知书。选项D错误，发包人应在作出索赔处理结果答复后28天内完成赔付。"}, {"id": 360, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "下列关于专业分包合同的说法，正确的有（　　）。", "opts": ["承包人与分包人应就分包工程向发包人承担连带责任", "发包人负责协调分包人与同一施工场地的其他分包人之间的交叉配合", "承包人应提供总包合同（有关承包工程的价格内容除外）供分包人查阅", "已竣工工程未交付承包人之前，分包人应负责已完成分包工程的成品保护工作", "承包人向分包人预付工程款的时间和数额，开工后按约定的时间和比例逐次扣回"], "ans": [0, 2, 3, 4], "exp": "选项B错误，承包人应负责整个施工场地的管理工作，协调分包人与同一施工场地的其他分包人之间的交叉配合。"}, {"id": 361, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "下列关于材料采购合同有关条款的说法，正确的是（　　）。", "opts": ["卖方应按合同约定在材料包装上以不可擦除的、明显的方式作出必要的标记", "除非因买方使用不当，否则卖方应对材料在质量保证期内的质量问题负责，进行修补及退换", "如果卖方不履行合同约定的义务，买方有权扣划相应金额的履约保证金", "卖方应对合同材料进行妥善包装，买方需要将包装物退还给卖方", "买方签发收货清单后双方无需进行后续的检验和验收"], "ans": [0, 1, 2], "exp": "选项D错误，卖方应对合同材料进行妥善包装，以满足合同材料运至施工场地及在施工场地保管的需要。包装应采取防潮、防晒、防锈、防腐蚀、防振动及防止其他损坏的必要保护措施，且买方无需将包装物退还给卖方。选项E错误，买方签发收货清单不代表对合同材料的接受，双方还应按合同约定进行后续的检验和验收。"}, {"id": 362, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "下列工期延误的原因中，承包人有权要求发包人延长工期和增加费用，并支付合理利润的有（　　）。", "opts": ["在施工过程中因遇到特大暴雨", "发包人未按时提供图纸", "施工过程中发现文物、古迹", "发包人未按合同约定及时支付预付款、进度款", "因发包人原因暂停施工后无法按时复工"], "ans": [1, 3, 4], "exp": "选项A，只能要求发包人延长工期。选项C，不能要求发包人支付合理利润。"}, {"id": 363, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "根据《标准施工招标文件》，在卖方按合同约定交付全部合同设备后，买方向卖方支付60%合同价格前，卖方应提交的单据有（    ）。", "opts": ["交货清单", "设备出厂质量合格证", "100%合同价格增值税发票。", "已收预付款证明", "结清款支付函"], "ans": [0, 1, 2], "exp": "卖方按合同约定交付全部合同设备后，买方在收到卖方提交的下列全部单据并经审核无误后28日内，向卖方支付合同价格的60%：卖方出具的交货清单正本一份；买方签署的收货清单正本一份；制造商出具的出厂质量合格证正本一份；合同价格100%金额的增值税发票正本一份。"}, {"id": 364, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "根据《最高人民法院关于审理建设工程施工合同纠纷案件适用法律问题的解释（一）》发包人或监理人未发出开工通知且无相关证据证明工程实际开日期的，认定开工日期时，应结合是否具备开工条件事实综合考虑（    ）所载明的时间。", "opts": ["索赔报告", "施工合同", "施工许可证", "开工报告", "竣工验收报告"], "ans": [1, 2, 3, 4], "exp": "开工日期争议解决。当事人对建设工程开工日期有争议的，人民法院应当分别按照以下情形予以认定：①开工日期为发包人或者监理人发出的开工通知载明的开工日期。开工通知发出后，尚不具备开工条件的，以开工条件具备的时间为开工日期；因承包人原因导致开工时间推迟的，以开工通知载明的时间为开工日期。②承包人经发包人同意已经实际进场施工的，以实际进场施工时间为开工日期。③发包人或者监理人未发出开工通知，亦无相关证据证明实际开工日期的，应当综合考虑开工报告、合同、施工许可证、竣工验收报告或者竣工验收备案表等载明的时间，并结合是否具备开工条件的事实，认定开工日期。"}, {"id": 365, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列关于风险评估的说法，正确的是（　　）。", "opts": ["风险评估应在风险监控的基础上进行", "通常采用专家预测、趋势外推法预测、敏感性分析和盈亏平衡分析及决策树等方法进行风险损失量估计", "风险等级只由风险损失量决定", "风险等级只由风险发生的概率决定"], "ans": [1], "exp": "风险评估应在风险识别的基础上进行，选项A错误。风险损失量估计通常采用专家预测、趋势外推法预测、敏感性分析和盈亏平衡分析及决策树等方法，选项B正确。风险等级由风险损失量和风险发生的概率共同决定，选项C、D错误。"}, {"id": 366, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列风险应对策略中，属于风险转移策略的是（　　）。", "opts": ["施工单位合理安排工期，避开可能发生的自然灾害", "建设单位在工程发包时，要求承包单位提供履约担保", "施工单位在施工中有针对性地制定质量事故应急预案", "建立应急储备"], "ans": [1], "exp": "风险转移是指将风险转移给他人承担，以避免风险损失。风险转移可分为保险转移和非保险转移两种方式。其中第三方担保属于非保险转移，如承包商履约担保、业主工程款支付担保等。A选项为风险规避，C选项为风险减轻，D选项为风险自留。"}, {"id": 367, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《建设工程质量保证金管理办法》，在工程竣工前，承包人已缴纳履约保证金的，发包人不得同时预留（　　）。", "opts": ["工程款支付担保", "投标保证金", "工程质量保证金", "预付款担保"], "ans": [2], "exp": "在工程竣工前，承包人已缴纳履约保证金的，发包人不得同时预留工程质量保证金；采用工程质量保证担保、工程质量保险等其他保证方式的，发包人不得再预留工程质量保证金。"}, {"id": 368, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据我国保险制度，下列关于建设工程第三者责任险的说法，正确的是（　　）。", "opts": ["免责范围包括因原材料缺陷或工艺不善引起的保险财产本身的损失", "责任范围与建筑工程一切险和安装工程一切险的责任范围相同", "责任范围不包括赔偿被保险人因此而支付的诉讼费用", "以承包人和发包人的共同名义投保"], "ans": [3], "exp": "建筑工程一切险的免责范围包括因原材料缺陷或工艺不善引起的保险财产本身的损失，选项A错误。第三者责任险的责任期间与建筑工程一切险和安装工程一切险的责任期间相同，选项B错误。第三者责任险的责任范围包括赔偿被保险人因此而支付的诉讼费用，选项C错误。"}, {"id": 369, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列关于工程保险的说法，正确的是（　　）。", "opts": ["建筑工程一切险保险期限为1年", "发包人可以不用参加工伤保险", "安装工程一切险的保险项目不包括清除残骸费用", "建筑施工企业鼓励企业为从事危险作业的职工办理意外伤害保险，支付保险费"], "ans": [3], "exp": "建筑工程一切险保险期限是从投保工程动工之日起直至工程验收之日止。具体时间由投保人与保险人协商确定，选项A错误。《标准施工招标文件》通用合同条款规定，发包人应依照有关法律规定参加工伤保险，选项B错误。安装工程一切险的保险项目包括清除残骸费用，选项C错误。"}, {"id": 370, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "建设工程招标投标过程中，投标保证金将被没收的情形是（　　）。", "opts": ["投标人的投标报价明显低于其实际成本", "投标人的资格文件中有虚假材料并导致废标", "投标人在投标有效期内要求撤销其投标文件", "投标人向招标人提出修改招标文件的要求"], "ans": [2], "exp": "投标截止后投标人撤销投标文件的，招标人可以不退还投标保证金。"}, {"id": 371, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "发包人与承包人签订一份金额为600万的承包合同，则承包人应提交的履约保证金最大值为（　　）。", "opts": ["60万", "80万", "100万", "120万"], "ans": [0], "exp": "《中华人民共和国招标投标法实施条例》规定，招标文件要求中标人提交履约保证金的，中标人应按照招标文件的要求提交。履约保证金不得超过中标合同金额的10%。"}, {"id": 372, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施工招标文件》，担保金额在担保有效期内随着工程款支付可以逐期减少的担保是（　　）。", "opts": ["投标担保", "履约担保", "预付款担保", "支付担保"], "ans": [2], "exp": "预付款担保的主要作用在于保证承包人能够按合同规定进行施工，偿还发包人已支付的全部预付金额。《标准施工招标文件》通用合同条款规定，承包人应在收到预付款的同时向发包人提交预付款保函，预付款保函的担保金额应与预付款金额相同。保函的担保金额可根据预付款扣回的金额相应递减。"}, {"id": 373, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "某招标项目结算价1000万元，投标截止日为10月30日，投标有效期为11月25日，则该项目投标保证金数额及其有效期分别是（　　）。", "opts": ["最高不超过30万元，有效期为11月25日", "最高不超过30万元，有效期为10月30日", "最高不超过20万元，有效期为10月30日", "最高不超过20万元，有效期为11月25日"], "ans": [3], "exp": "《中华人民共和国招标投标法实施条例》规定，招标人在招标文件中要求投标人提交投标保证金的，投标保证金不得超过招标项目估算价的2%。投标保证金有效期应与投标有效期一致。"}, {"id": 374, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "建设工程施工过程中发生化学品泄漏，造成工程外部邻近人员中毒住院，其医疗费用应由保险公司支付的前提是该工程投保了建筑工程（　　）。", "opts": ["一切险", "一切险加第三者责任险", "一切险加人身保险", "一切险加人身意外伤害险"], "ans": [1], "exp": "第三者责任险的责任期间与建筑工程一切险和安装工程一切险的责任期间相同，只是责任范围仅限于赔偿保险标的工程的工地及邻近地区的第三者因工程实施而蒙受人身伤亡、疾病或财产损失。第三者责任险的责任范围还包括赔偿被保险人因此而支付的诉讼费用和事先经保险人书面同意支付的其他费用，但不能超过保险单列明的赔偿限额。"}, {"id": 375, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列选项中，不属于项目风险管理计划编制依据的是（　　）。", "opts": ["工程范围说明", "招投标文件与工程合同", "工作分解结构", "风险管理目标"], "ans": [3], "exp": "项目风险管理计划编制依据应包括下列内容：①工程范围说明；②招投标文件与工程合同；③工作分解结构；④项目管理策划结果；⑤项目管理机构风险管理制度；⑥其他相关信息和历史资料。"}, {"id": 376, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列选项中，不属于项目风险识别报告内容的是（　　）。", "opts": ["风险源的类型", "风险发生的可能性", "风险可能发生的部位及风险的相关特征", "风险损失量"], "ans": [3], "exp": "项目风险识别报告应包括下列内容：①风险源的类型、数量；②风险发生的可能性；③风险可能发生的部位及风险的相关特征。"}, {"id": 377, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列关于预付款担保的说法，错误的是（　　）。", "opts": ["预付款一般应在开工前7天支付", "预付款必须专用于合同工程", "保函的担保金额数额随时间相应递增", "预付款保函的担保金额应与预付款金额相同"], "ans": [2], "exp": "保函的担保金额可根据预付款扣回的金额相应递减。"}, {"id": 378, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列选项中，不属于建筑工程一切险的责任范围物质损失部分的是（　　）。", "opts": ["设计错误引起的损失和费用", "建筑工程（包括永久和临时工程及物料）损失", "所有人提供的物料及项目损失", "建筑用机器损失"], "ans": [0], "exp": "A错误，设计错误引起的损失和费用为除外责任。"}, {"id": 379, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "对投保建筑工程一切险的工程，保险人不承担赔偿责任的是（　　）。", "opts": ["因暴雨造成的物质损失", "因地面下沉引起的物质损失", "发生火灾引起的场地清理费用", "自然磨损"], "ans": [3], "exp": "D错误，自然磨损为除外责任。"}, {"id": 380, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "一般情况下，安装工程一切险承担的风险主要是（　　）。", "opts": ["意外事故损失", "设计错误损失", "社会动乱损失", "自然磨损损失"], "ans": [0], "exp": "安装工程一切险是指以各种大型机器、设备安装工程为标的，对承保机械和设备在安装过程中因自然灾害或意外事故所造成的物质损失、费用损失承担赔偿责任的保险。"}, {"id": 381, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "工程分包属于风险应对中的（　　）策略。", "opts": ["风险规避", "风险减轻", "风险转移", "风险自留"], "ans": [2], "exp": "风险转移可分为保险转移和非保险转移两种方式。（1）保险转移。保险转移是指通过向保险公司投保，将工程实施过程中可能出现的因自然灾害和意外事故造成的损失转移给保险公司。如建筑工程一切险、安装工程一切险、第三者责任险、施工人员意外伤害保险等。（2）非保险转移。施工承包风险的非保险转移主要有三种方式：①工程分包。经建设单位同意，将工程项目中风险较大的部分工作内容分包给其他单位，是一种减轻风险和转移风险的有效策略。②签订合同时明确计价方式。例如对于存在价格上涨风险的材料设备，可以通过签订总价合同方式将风险转移给材料设备供应商。③第三方担保。如承包商履约担保、业主工程款支付担保等。"}, {"id": 382, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列风险等级图中，风险量处于中等区域的是（　　）。", "opts": ["③⑤⑧", "①②⑦", "①⑤⑨", "④⑤⑥"], "ans": [2], "exp": "⑦等级很小；④⑧等级为小；①⑤⑨等级为中等；②⑥等级为大；③等级为很大。"}, {"id": 383, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列常见的施工风险中，不属于施工项目本身风险的有（　　）。", "opts": ["工程分包风险", "施工组织管理风险", "工程款支付和结算风险", "工程项目主要原材料价格变化风险"], "ans": [3], "exp": "工程承包风险可从工程项目本身和外部环境两方面考虑。就施工承包而言，项目本身的风险主要有施工组织管理风险、施工进度延误风险、施工质量安全风险、工程分包风险、工程款支付及结算风险等；外部环境风险主要有市场风险、政策风险、社会风险、自然环境风险等。"}, {"id": 384, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "下列不同原因造成的损失中，属于建筑工程一切险除外的是（    ）。", "opts": ["原材料缺失，造成保险财产本身的损失", "水灾造成保险财产的损失", "施工技术人员造成的损失", "雷击造成的保险财产的损失X"], "ans": [0], "exp": "建筑工程一切险保单中的除外责任通常包括：①设计错误引起的损失和费用；②自然磨损、内在或潜在缺陷、物质本身变化、自燃、自热、氧化、锈蚀、渗漏、鼠咬、虫蛀、大气（气候或气温）变化、正常水位变化或其他渐变原因造成的保险财产自身的损失和费用；③因原材料缺陷或工艺不善引起的保险财产本身的损失以及为换置，修理或矫正这些缺点错误所支付的费用；④非外力引起的机械或电气装置损坏，或施工用机具、设备、机械装置失灵造成的本身损失；⑤维修保养或正常检修的费用；⑥档案、文件、账簿、票据、现金、各种有价证券、图表资料及包装物料的损失；⑦货物盘点时发现的盘亏损失；⑧领有公共运输行驶执照的，或已由其他保险予以保障的车辆、船舶和飞机的损失；⑨在保险单保险期限终止前，被保险财产中已由工程所有人签发完工验收证书或验收合格或实际占有或使用或接收的部分。"}, {"id": 385, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "作为应对施工风险的常用措施，应急储备的主要形式是（    ）。", "opts": ["合同储备和技术储备", "预算储备和时间储备", "预算储备和技术储备", "合同储备和时间储备"], "ans": [1], "exp": "风险自留经常采用的措施是建立应急储备。应急储备是为应对风险而预留的时间或预算（资金）。因此，应急储备主要有两种：预算储备和时间储备。"}, {"id": 386, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《标准施正招标文件》，承包人应确保其履约担保在（    ）前一直有效。", "opts": ["发包人签认工程验收证书", "工程竣工结算", "缺陷责任期届满", "发包人颁发工程接收证书"], "ans": [3], "exp": "《标准施工招标文件》通用合同条款规定，承包人应保证其履约担保在发包人颁发工程接收证书前一直有效。发包人应在工程接收证书颁发后28天内将履约担保退还给承包人。"}, {"id": 387, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "安装工程一切险主要承保机械和设备在安装过程中因（    ）造成的损失。", "opts": ["设备缺陷或操作失误", "自然灾害或操作失误", "自然灾害或意外事故", "设备缺陷或意外事故"], "ans": [2], "exp": "安装工程一切险是指以各种大型机器、设备安装工程为标的，对承保机械和设备在安装过程中因自然灾害或意外事故所造成的物质损失、费用损失承担赔偿责任的保险。"}, {"id": 388, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "single", "q": "根据《建设工程项目管理规范》，除各类风险发生的概率、可能造成的损失外，施工项目风险评估报告还应包括的内容是（    ）。", "opts": ["风险相关的条件因素", "管理人员责任", "风险发展动态", "风险传递路径"], "ans": [0], "exp": "风险评估报告内容包括：①各类风险发生的概率；②可能造成的损失量和风险等级；③风险相关的条件因素。"}, {"id": 389, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "根据《建设工程项目管理规范》GB/T50326—2017，项目风险管理计划应包括（　　）。", "opts": ["风险管理范围", "确定风险源的类型和数量", "分析各种风险损失量", "收集风险信息", "可使用的风险管理方法、工具"], "ans": [0, 4], "exp": "项目风险管理计划应包括下列内容：①风险管理目标；②风险管理范围；③可使用的风险管理方法、措施、工具和数据；④风险跟踪要求；⑤风险管理责任和权限；⑥必需的资源和费用预算。"}, {"id": 390, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "在进行项目风险识别时，应该考虑的方面有（　　）。", "opts": ["项目管理团队的能力", "自然条件与社会条件", "市场情况", "风险因素发生的概率", "项目相关方影响"], "ans": [0, 1, 2, 4], "exp": "项目管理机构应综合考虑以下方面识别项目风险：①工程本身条件及合同约定条件；②自然条件与社会条件；③市场情况；④项目相关方影响；⑤项目管理团队的能力。选项C为项目风险评估内容。"}, {"id": 391, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "下列措施属于风险转移的有（　　）。", "opts": ["合理安排施工工期、进度计划，避开可能发生的自然灾害", "设立质量缺陷风险基金", "以联合体形式承包工程", "签订合同时明确计价方式", "进行工程分包"], "ans": [3, 4], "exp": "选项A为风险规避，选项B为风险自留，选项C为风险减轻，选项DE均为风险转移措施。"}, {"id": 392, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "下列关于工程担保的说法，正确的有（　　）。", "opts": ["投标截止后投标人撤销投标文件的，招标人可以不退还投标保证金", "单位和个人可以为投标人、中标人指定出具保函、保单的银行、担保机构或保险机构", "承包人应保证其履约担保在发包人颁发工程接收证书前一直有效", "履约保证金不得超过中标合同金额的5%", "承包人应在收到预付款的同时向发包人提交预付款保函，预付款保函的担保金额应与预付款金额相同"], "ans": [0, 2, 4], "exp": "根据《国家发展改革委等部门关于完善招标投标交易担保制度进一步降低招标投标交易成本的通知》（发改法规〔2023〕27号），任何单位和个人不得为投标人、中标人指定出具保函、保单的银行、担保机构或保险机构，选项B错误。《中华人民共和国招标投标法实施条例》规定，履约保证金不得超过中标合同金额的10%，选项D错误。"}, {"id": 393, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "下列关于工程担保的说法，正确的有（　　）。", "opts": ["工程质量保证金总预留比例不得高于工程价款结算总额的2%", "招标人已收取投标保证金的，应自收到投标人书面撤回通知之日起5日内退还", "预付款一般应在开工前7天支付，额度和预付办法在专用合同条款中约定", "发包人应在收到承包人要求提供资金来源证明的书面通知后14天内，向承包人提供能够按照合同约定支付合同价款的相应资金来源证明", "合同约定由承包人以银行保函替代工程质量保证金的，保函金额不得高于工程价款结算总额的3%"], "ans": [1, 2, 4], "exp": "根据《建设工程质量保证金管理办法》，工程质量保证金总预留比例不得高于工程价款结算总额的3%，选项A错误。根据《建设工程施工合同（示范文本）》GF—2017—0201要求，发包人应在收到承包人要求提供资金来源证明的书面通知后28天内，向承包人提供能够按照合同约定支付合同价款的相应资金来源证明，选项D错误。"}, {"id": 394, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "下列关于工程保险的说法，正确的有（　　）。", "opts": ["安装工程风险分布具有明显的阶段性，安装工程一切险的承保风险主要是人为风险", "进行保险索赔时必须提供必要的有效证明，作为索赔依据", "安装工程一切险如因特殊情况需要延长保险期间的，可以不需要获得保险人的书面同意", "安装工程一切险的责任范围与建筑工程一切险的责任范围完全一致", "工程保险是转移工程承包风险的重要方式"], "ans": [0, 1, 4], "exp": "如因特殊情况需要延长安装工程一切险保险期间的，必须事先获得保险人的书面同意，选项C错误。安装工程一切险的责任范围与建筑工程一切险的责任范围基本一致，但增加了对安装工程常遇到的电气事故，如超负荷、超电压、碰线、电弧、走电、短路、大气放电等造成的损失赔偿责任，选项D错误。"}, {"id": 395, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "在工程保险中，承包人应以发包人和承包人的共同名义向双方同意的保险人投保的保险有（　　）。", "opts": ["第三者责任险", "施工人员工伤保险", "意外伤害保险", "建筑工程一切险", "安装工程一切险"], "ans": [0, 3, 4], "exp": "《标准施工招标文件》通用条款规定，承包人应以发包人和承包人的共同名义向双方同意的保险人投保建筑工程一切险、安装工程一切险。《标准施工招标文件》通用合同条款规定，在缺陷责任期终止证书颁发前，承包人应以承包人和发包人的共同名义投保第三者责任险。"}, {"id": 396, "source": "教材", "ch": 3, "year": null, "sourceLabel": "第3章", "type": "multi", "q": "下列关于风险等级的说法正确的是（　　）。", "opts": ["通过风险因素形成风险概率的估计和对发生风险后可能造成的损失量估计，确定风险量及风险等级", "可按风险量大小将风险分为5个等级", "风险等级为大、很大的风险因素属于不可接受的风险，需要给予重点关注", "风险等级为中等的风险因素是不希望有的风险", "风险等级为小的风险因素是可忽略风险"], "ans": [0, 1, 2, 3], "exp": "E选项错误，风险等级为小的风险因素是可接受风险；风险等级为很小的风险因素是可忽略风险。"}, {"id": 397, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列关于施工进度影响因素的说法，正确的是（　　）。", "opts": ["实施施工进度管理，首先需要分析影响施工进度的不利因素", "人为因素是最大的干扰因素", "从产生根源看质量监督单位是最常见的因素", "进度控制是一个被动控制的过程"], "ans": [1], "exp": "A选项错误，实施施工进度管理，首先需要调查和分析影响施工进度的各种因素；C选项错误，从产生根源看没有质量监督单位；D选项错误，进度控制是一个主动控制的过程。"}, {"id": 398, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某工地在基坑开挖过程中，发现古代某国公主墓群，经调查属勘察资料遗漏导致毫无准备。这是施工进度影响因素中（　　）因素。", "opts": ["相关单位影响", "社会环境影响", "自然条件影响", "施工单位自身因素影响"], "ans": [0], "exp": "相关单位影响：勘察设计单位原因。如勘察资料不准确，特别是地质资料错误或遗漏；设计内容不完善，规范应用不当，设计有缺陷或错误；设计方案的可施工性差或设计考虑、不周；施工图纸供应不及时、不配套，或出现重大差错等。"}, {"id": 399, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某地铁车站项目在基坑开挖过程中，发现图纸已标注的古代墓群，施工单位立刻在相关部门的要求下，进行了保护，在施工进度影响因素中，这是（　　）因素。", "opts": ["相关单位影响", "施工单位自身因素影响", "自然条件影响", "社会环境影响"], "ans": [2], "exp": "自然条件影响。如复杂的工程地质条件；不明的水文气象条件；地下埋藏文物的保护、处理；洪水、地震、台风等不可抗力等。"}, {"id": 400, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列关于施工进度计划的说法，正确的是（　　）。", "opts": ["建设单位只需要编制施工进度计划，无需控制施工进度计划的实施", "编制施工进度计划，是保证整个施工项目按期交付使用的重要前提", "按项目组成编制的施工进度计划包括：施工总进度计划、单位工程施工进度计划及分部分项工程进度计划", "常用的施工进度计划表达形式有横道图、进度曲线和网络图三种"], "ans": [2], "exp": "A选项错误，施工单位需要编制施工进度计划，并控制施工进度计划的实施；B选项错误，编制施工总进度计划，是保证整个施工项目按期交付使用的重要前提；D选项错误，常用的施工进度计划表达形式有横道图和网络图两种。"}, {"id": 401, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列关于施工进度计划系统的说法，正确的是（　　）。", "opts": ["常用的施工进度计划表达形式有横道图和网络图两种", "编制单位施工进度计划，是保证整个施工项目按期交付使用的重要前提", "施工总进度计划是编制各种资源需求量计划和进行施工准备的依据", "编制单位施工进度计划是为了保证单位工程施工进度计划的顺利实施"], "ans": [0], "exp": "B选项错误，科学合理地编制施工总进度计划，是保证整个施工项目按期交付使用的重要前提；C选项错误，单位工程施工进度计划是编制各种资源需求量计划和进行施工准备的依据；D选项错误，编制分部分项工程进度计划是为了保证单位工程施工进度计划的顺利实施。"}, {"id": 402, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列关于横道图的说法，错误的是（　　）。", "opts": ["横道图是由甘特在20世纪20年代提出", "横道图的特点是形象、直观，且易于编制和理解", "横道图不能反映工作所具有的时差", "横道图能反映影响工期的关键工作和关键线路"], "ans": [3], "exp": "横道图不能反映影响工期的关键工作和关键线路。"}, {"id": 403, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列关于网络图的说法，正确的是（　　）。", "opts": ["国内外实践证明，网络计划技术是用于控制建设工程进度的最有效工具", "网络计划不能明确表达各项工作之间的先后顺序关系", "双代号网络计划需要通过时间参数计算，直接找出关键线路，不利于施工进度控制", "网络计划不能够利用项目管理软件进行计算"], "ans": [0], "exp": "B选项错误，网络计划能明确表达各项工作之间的先后顺序关系；C选项错误，双代号网络计划需要通过时间参数计算，直接找出关键线路，有利于施工进度控制中抓主要矛盾；D选项错误，网络计划能够利用项目管理软件进行计算。"}, {"id": 404, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "工程设计进度的影响因素主要分为业主建设意图及要求的改变、设计文件审查批准延误和（　　）。", "opts": ["施工单位未按设计图纸施工", "隐蔽工程的处置", "设计各专业之间的协调配合", "监理对设计指挥不合理"], "ans": [2], "exp": "工程设计是一种多专业协作配合的智力性劳动，工程设计进度管理中会存在多种影响因素，主要为业主建设意图及要求的改变、设计各专业之间的协调配合和设计文件审查批准延误。"}, {"id": 405, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "影响施工进度的不利因素中，（　　）是最大的干扰因素。", "opts": ["资金因素", "技术因素", "自然与社会环境因素", "人为因素"], "ans": [3], "exp": "影响施工进度的不利因素有很多，有人为因素，技术因素，设备、材料及构配件因素，施工机具因素，资金因素，水文、地质与气象因素、以及其他自然与社会环境等方面的因素。其中，人为因素是最大的干扰因素。"}, {"id": 406, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "对业主而言，项目进度目标指的是项目（　　）。", "opts": ["竣工的时间目标", "交付使用的时间目标", "移交的时间目标", "竣工结算的时间目标"], "ans": [1], "exp": "在业主方项目管理中，进度目标是指工程项目交付使用的时间目标。"}, {"id": 407, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列影响工程进度的因素中，属于组织管理因素的是（　　）。", "opts": ["资金不到位", "计划安排不周密", "其他单位临近工程施工干扰", "业主使用要求改变"], "ans": [1], "exp": "组织管理因素：如向有关部门提出各种申请审批手续的延误；合同签订时遗漏条款、表达失当；计划安排不周密，组织协调不力，导致停工待料、相关作业脱节；指挥不力，使各专业、各施工过程之间交接配合不顺畅等。A、D选项属于相关单位影响（建设单位）。C选项属于社会环境原因。"}, {"id": 408, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "为确保施工项目按期交付使用，施工单位需要编制施工进度计划，并控制施工进度计划的实施。不属于按时间进展阶段编制的施工进度计划的是（　　）。", "opts": ["年度施工计划", "季度施工计划", "月作业计划", "周作业计划"], "ans": [3], "exp": "按时间进展阶段编制的施工进度计划。为了有效地控制工程施工进度，施工单位应编制年度施工计划、季度施工计划和月（旬）作业计划，将施工进度计划逐层细化，形成一个旬保月、月保季、季保年的计划体系，故D答案不属于。"}, {"id": 409, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "其他单位临近工程的施工干扰属于（　　）影响。", "opts": ["建设单位", "相关协作部门", "自然条件", "社会环境"], "ans": [3], "exp": "社会环境原因：如其他单位临近工程的施工干扰；节假日交通、市容整顿限制；临时停水、停电、断路；以及在国外因法律及制度变化，经济制裁，战争、骚乱、罢工、企业倒闭，汇率浮动和通货膨胀。"}, {"id": 410, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列工程进度计划中，按时间进展阶段编制的施工进度计划是（　　）。", "opts": ["施工总进度计划", "单位工程施工进度计划", "分部分项工程进度计划", "月（旬）作业计划"], "ans": [3], "exp": "按时间进展阶段编制的施工进度计划：为了有效地控制工程施工进度，施工单位应编制年度施工计划、季度施工计划和月（旬）作业计划，将施工进度计划逐层细化，形成一个旬保月、月保季、季保年的计划体系。"}, {"id": 411, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "工程施工进度影响因素中，自然条件影响因素不包括（　　）。", "opts": ["复杂的工程地质条件", "勘察设计时未发现不良地质", "不明的水文气象条件", "洪水、地震、台风等不可抗力"], "ans": [1], "exp": "自然条件影响，如复杂的工程地质条件；不明的水文气象条件；地下埋藏文物的保护、处理；洪水、地震、台风等不可抗力等。勘察设计时未发现不良地质属于勘察设计单位原因。如勘察资料不准确，特别是地质资料错误或遗漏；设计内容不完善，规范应用不当，设计有缺陷或错误；设计方案的可施工性差或设计考虑不周；施工图纸供应不及时、不配套，或出现重大差错等，故选B。"}, {"id": 412, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列施工单位自身影响因素中，不属于技术因素的是（　　）。", "opts": ["施工方案、施工工艺或施工安全措施不当", "特殊材料及新材料的不合理使用", "不成熟的技术应用", "计划安排不周密"], "ans": [3], "exp": "施工技术因素包括：施工方案、施工工艺或施工安全措施不当；特殊材料及新材料的不合理使用；施工设备不配套，选型失当或有故障；不成熟的技术应用等。计划安排不周属于组织管理因素，故选D。"}, {"id": 413, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "为确保施工项目按期交付使用，施工单位需要编制施工进度计划，并控制施工进度计划的实施。下列不属于按项目组成编制的施工进度计划的是（　　）。", "opts": ["施工总进度计划", "单项工程施工进度计划", "单位工程施工进度计划", "分部分项工程进度计划"], "ans": [1], "exp": "施工单位按项目组成编制的施工进度计划包括：施工总进度计划、单位工程施工进度计划及分部分项工程进度计划，故B选项不属于。"}, {"id": 414, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列关于横道图进度计划法特点的说法，正确的是（　　）。", "opts": ["工序（工作）之间的逻辑关系表达清楚", "不能反映工程费用与工期之间的关系", "可以适应大的进度计划系统", "能够直观确定计划的关键工作、关键线路与时差"], "ans": [1], "exp": "工程进度计划采用横道图表示形式，具有编制简单、使用方便等优点，但也有不足：①不能明确反映各项工作之间的相互联系、相互制约关系；②不能反映影响工期的关键工作和关键线路；③不能反映工作所具有的机动时间（时差）；④不能反映工程费用与工期之间的关系，因而不便于施工进度计划的优化。特别是对于大型工程项目，因其工作构成及逻辑关系复杂、无法利用计算机来进行计算分析。因此，采用横道图进行施工进度管理，有一定的局限性。"}, {"id": 415, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "在双代号网络图中，虚工作（　　）。", "opts": ["既不消耗时间，也不消耗资源", "只消耗时间，不消耗资源", "既消耗时间，又消耗资源", "只消耗资源，不消耗时间"], "ans": [0], "exp": "在双代号网络图中，有时存在虚箭线，虚箭线不代表实际工作，称为虚工作。虚工作既不消耗时间，也不消耗资源。"}, {"id": 416, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列关于横道图的说法中，正确的是（    ）。", "opts": ["能反映影响工期的关键工作和关键线路", "不能反映工作所具有的机动时间（时差）", "能反映工程费用与工期之间的关系", "不能反映各项工作之间的相互联系、相互制约关系"], "ans": [1], "exp": "施工进度计划采用横道图表示形式，具有编制简单、使用方便等优点，但也有不足：①不能明确反映各项工作之间的相互联系、相互制约关系；②不能反映影响工期的关键工作和关键线路；③不能反映工作所具有的机动时间（时差）；④不能反映工程费用与工期之间的关系，因而不便于施工进度计划的优化。"}, {"id": 417, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "下列影响施工进度的不利因素中，属于施工单位自身因素的是（    ）。", "opts": ["施工设备选型失当", "施工图纸出现差错", "工程地质资料有误", "工程设计变更频繁"], "ans": [0], "exp": "施工单位自身因素影响：（1）施工技术因素。如施工方案、施工工艺或施工安全措施不当；特殊材料及新材料的不合理使用；施工设备不配套，选型失当或有故障；不成熟的技术应用等。（2）组织管理因素。如向有关部门提出各种申请审批手续的延误；合同签订时遗漏条款、表达失当；计划安排不周密，组织协调不力，导致停工待料、相关作业脱节；指挥不力，使各专业、各施工过程之间交接配合不顺畅等。"}, {"id": 418, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "在工程施工过程中，常见的施工进度影响因素包括（　　）。", "opts": ["相关单位影响", "有关协作部门影响", "自然条件影响", "人为因素影响", "施工机具因素影响"], "ans": [0, 1, 2], "exp": "施工进度影响因素，在工程施工过程中，常见影响因素包括相关单位影响，有关协作部门及社会环境影响，自然条件影响，施工单位自身因素影响。"}, {"id": 419, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "下列关于施工进度计划系统的说法，正确的是（　　）。", "opts": ["按进展时间编制的施工进度计划可以划分为年度施工计划、季度施工计划和月（旬）作业计划", "按项目组成编制的施工进度计划包括：施工总进度计划、单位工程施工进度计划及分部分项工程进度计划", "国内外实践证明，横道图是用于控制建设工程进度的最有效工具", "双代号网络图由于其形象、直观，且易于编制和理解，因而长期以来被广泛应用于工程进度管理", "施工单位需要编制施工进度计划，并控制施工进度计划的实施"], "ans": [0, 1, 4], "exp": "C选项错误，国内外实践证明，网络计划技术是用于控制建设工程进度的最有效工具。D选项错误，横道图由于其形象、直观，且易于编制和理解，因而长期以来被广泛应用于工程进度管理。"}, {"id": 420, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "下列施工进度影响因素中，属于相关单位影响因素的是（　　）。", "opts": ["建设资金不到位，不能及时向施工单位支付工程款", "节假日交通整顿限制", "复杂的工程地质条件", "勘察资料不准确，特别是地质资料错误或遗漏", "设备及构配件供应有差错"], "ans": [0, 3, 4], "exp": "B选项，属于有关协作部门及社会环境影响；C选项，属于自然条件影响。"}, {"id": 421, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "影响建设工程进度的不利因素有很多，下列选项属于施工单位组织管理因素的有（　　）。", "opts": ["地下埋藏文物的保护及处理", "临时停水停电", "施工安全措施不当", "计划安排原因导致相关作业脱节", "向有关部门提出各种申请审批手续的延误"], "ans": [3, 4], "exp": "影响工程施工进度因素中施工单位自身因素中组织管理因素有：向有关部门提出各种申请审批手续的延误；合同签订时遗漏条款、表达失当；计划安排不周密，组织协调不力，导致停工待料、相关作业脱节；指挥不力，使各专业、各施工过程之间交接配合不顺畅等。选项A属于自然条件影响因素，选项B属于社会环境影响因素，选项C属于施工单位自身因素中的技术因素。"}, {"id": 422, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "工程监理总进度分解计划按工程进展阶段分解的监理工作计划包括（　　）。", "opts": ["施工准备阶段监理工作计划", "地基与基础工程施工阶段监理工作计划", "主体结构工程施工阶段监理工作计划", "年度监理工程进度计划", "季度监理工程进度计划"], "ans": [0, 1, 2], "exp": "工程监理总进度分解计划包括：①按工程进展阶段分解的监理工作计划，如施工准备阶段监理工作计划、地基与基础工程施工阶段监理工作计划、主体结构工程施工阶段监理工作计划等；②按时间进展阶段分解的监理工作计划，如年度监理工程进度计划、季度监理工程进度计划、月度监理工作进度计划等。"}, {"id": 423, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "工程监理总进度分解计划按时间进展阶段分解的监理工作计划包括（　　）。", "opts": ["月度监理工作进度计划", "地基与基础工程施工阶段监理工作计划", "主体结构工程施工阶段监理工作计划", "年度监理工程进度计划", "季度监理工程进度计划"], "ans": [0, 3, 4], "exp": "工程监理总进度分解计划包括：①按工程进展阶段分解的监理工作计划，如施工准备阶段监理工作计划、地基与基础工程施工阶段监理工作计划、主体结构工程施工阶段监理工作计划等；②按时间进展阶段分解的监理工作计划，如年度监理工程进度计划、季度监理工程进度计划、月度监理工作进度计划等。"}, {"id": 424, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "阶段性设计进度计划包括（　　）。", "opts": ["设计准备工作进度计划", "方案设计工作进度计划", "初步设计（技术设计）工作进度计划", "工艺设计作业进度计划", "结构设计作业进度计划"], "ans": [0, 1, 2], "exp": "阶段性设计进度计划。阶段性设计进度计划包括：设计准备工作进度计划、方案设计工作进度计划、初步设计（技术设计）工作进度计划和施工图设计工作进度计划。这些计划是用来控制各阶段设计工作进度，从而实现阶段性设计进度目标。"}, {"id": 425, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "设计作业进度计划包括（　　）。", "opts": ["设计准备工作进度计划", "方案设计工作进度计划", "建筑设计作业进度计划", "工艺设计作业进度计划", "结构设计作业进度计划"], "ans": [2, 3, 4], "exp": "设计作业进度计划。为了控制各专业设计进度，应根据施工图设计工作进度计划、单位工程设计工日定额及所投入的设计人员数，编制各专业设计作业进度计划，如工艺设计、结构设计、建筑设计、电气设计、通信设计等。"}, {"id": 426, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "multi", "q": "工程建设总进度计划表格部分包括（　　）。", "opts": ["工程项目一览表", "工程项目总进度计划", "投资计划年度分配表", "工程项目进度平衡表", "年度计划项目表"], "ans": [0, 1, 2, 3], "exp": "工程建设总进度计划的主要内容包括文字和表格两部分。①文字部分。说明工程项目概况和特点，安排工程建设总进度的原则和依据，建设投资来源和资金年度安排情况，工程设计、设备交付和施工力量进场时间的安排，道路、供电、供水等方面的协作配合及进度衔接，计划中存在的主要问题及采取的措施，需要解决的重大问题等。②表格部分。包括工程项目一览表、工程项目总进度计划、投资计划年度分配表和工程项目进度平衡表。"}, {"id": 427, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "工程施工组织方式通常有三种，下列不属于工程施工组织方式的是（　　）。", "opts": ["依次施工", "平行施工", "流水施工", "搭接施工"], "ans": [3], "exp": "根据工程施工特点、工艺流程、资源利用、平面或空间布置等要求不同，工程施工组织方式通常有三种：依次施工、平行施工和流水施工。"}, {"id": 428, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "type": "single", "q": "某楼板结构工程由5个施工段组成，各单体建筑施工共由3个施工过程组成，各施工过程的流水节拍均为4天，则流水施工工期为（　　）天。", "opts": ["21", "27", "28", "32"], "ans": [2], "exp": "T=（m+n-1）K=（5+3-1）×4=28天。"}, {"id": 429, "source": "教材", "ch": 4, "year": null, "sourceLabel": "第4章", "typ
